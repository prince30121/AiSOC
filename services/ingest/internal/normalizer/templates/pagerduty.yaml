# PagerDuty Events API v2 webhook template.
#
# Maps the v2 webhook envelope (event.data.{title,urgency,...}) onto an
# OCSF Security Finding so that PagerDuty incidents flow into the same
# detection / response surface as native AiSOC alerts.
#
# References:
#   https://developer.pagerduty.com/docs/db0fa8c8984fc-overview
#   https://developer.pagerduty.com/docs/ZG9jOjQ1MjU0Njc1-incident-payload-v2
id: pagerduty
vendor_name: PagerDuty
product_name: PagerDuty
class_uid: 2001
class_name: Security Finding
activity_id: 1
field_map:
  event.data.title: finding.title
  event.data.summary: message
  event.data.description: finding.description
  event.data.html_url: url
  event.data.id: finding.uid
  event.data.incident_number: finding.related_events.id
  event.data.service.summary: finding.product.name
  event.data.assignees: finding.evidence.process
  event.event_type: activity_name
severity_field: event.data.urgency
severity_map:
  high: 4
  low: 2
time_field: event.occurred_at
message_field: event.data.summary
constants:
  source_type: pagerduty
  metadata.product.feature.name: events.v2
