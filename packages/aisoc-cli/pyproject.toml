[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aisoc-cli"
version = "0.1.0"
description = "AiSOC Developer CLI — scaffold, validate, and publish plugins and detections"
readme = "README.md"
license = { text = "MIT" }
authors = [
  { name = "Beenu Arora", email = "beenu@cyble.com" },
]
keywords = ["aisoc", "soc", "security", "cli", "plugin"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Security",
]
requires-python = ">=3.11"
dependencies = [
  "click>=8.1",
  "httpx>=0.27",
  "pyyaml>=6.0",
  "jsonschema>=4.21",
  "cryptography>=42.0",
  "rich>=13.7",
  "structlog>=24.1",
]

[project.scripts]
aisoc = "aisoc_cli.main:cli"

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "mypy>=1.8",
  "ruff>=0.3",
]

[project.urls]
Homepage = "https://github.com/beenuar/AiSOC"
Documentation = "https://github.com/beenuar/AiSOC#readme"
Repository = "https://github.com/beenuar/AiSOC"

[tool.hatch.build.targets.wheel]
packages = ["src/aisoc_cli"]

[tool.hatch.build.targets.wheel.force-include]
"src/aisoc_cli/templates" = "aisoc_cli/templates"

[tool.hatch.build.targets.sdist]
include = [
  "src/aisoc_cli",
  "tests",
  "README.md",
  "LICENSE",
  "pyproject.toml",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
strict = true
python_version = "3.11"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
