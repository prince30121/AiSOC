id: det-network-043
name: HTTP CONNECT Method Toward Public IP
description: AiSOC v1 curated detection. Triggers on the network signal described by 'HTTP CONNECT Method
  Toward Public IP'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1090
- tlp.white
category: network
log_source:
  product: proxy
  service: http
detection:
  condition: |
    event_type == "http_request"
    AND method == "CONNECT"
    AND destination_is_internal == false
false_positives:
- Sanctioned outbound proxy (allow-listed)
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
