id: det-network-042
name: DNS Rebinding Indicator (Public→RFC1918 In Same TTL Window)
description: AiSOC v1 curated detection. Triggers on the network signal described by 'DNS Rebinding Indicator
  (Public→RFC1918 In Same TTL Window)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1090
- tlp.white
category: network
log_source:
  product: dns
  service: resolver
detection:
  condition: |
    event_type == "dns_response"
    AND rebinding_detected == true
false_positives:
- IPv6 transition technologies
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
