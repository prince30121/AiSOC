id: det-network-035
name: DNS Query With High-Entropy Subdomain (DGA Indicator)
description: AiSOC v1 curated detection. Triggers on the network signal described by 'DNS Query With High-Entropy
  Subdomain (DGA Indicator)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1568.002
- tlp.white
category: network
log_source:
  product: dns
  service: resolver
detection:
  condition: |
    event_type == "dns_query"
    AND subdomain_entropy > 4.0
    AND subdomain_length > 16
false_positives:
- CDN with hashed hostnames (allow-listed)
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
