id: det-network-075
name: RADIUS Authentication Used PAP (Cleartext Password)
description: AiSOC v1 curated detection. Triggers on the network signal described by 'RADIUS Authentication
  Used PAP (Cleartext Password)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1110
- tlp.white
category: network
log_source:
  product: radius
  service: auth
detection:
  condition: |
    event_type == "radius_auth"
    AND auth_method == "PAP"
false_positives:
- Legacy device that only supports PAP (must be ticketed)
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
