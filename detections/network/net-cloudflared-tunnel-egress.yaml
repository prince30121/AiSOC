id: det-network-062
name: Cloudflared Tunnel Started From Workstation
description: AiSOC v1 curated detection. Triggers on the network signal described by 'Cloudflared Tunnel
  Started From Workstation'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1572
- tlp.white
category: network
log_source:
  product: proxy
  service: netflow
detection:
  condition: |
    event_type == "tls_session"
    AND sni ENDSWITH_ANY ["argotunnel.com", "tcp.cfargotunnel.com"]
    AND src_role == "workstation"
false_positives:
- Authorized engineering tunnel
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
