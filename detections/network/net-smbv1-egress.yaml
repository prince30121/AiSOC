id: det-network-063
name: SMB Version 1 Negotiated In Network Flow
description: AiSOC v1 curated detection. Triggers on the network signal described by 'SMB Version 1 Negotiated
  In Network Flow'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1021.002
- tlp.white
category: network
log_source:
  product: firewall
  service: netflow
detection:
  condition: |
    event_type == "smb_negotiate"
    AND dialect == "SMB 1.0"
false_positives:
- Legacy printer / NAS (allow-listed)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
