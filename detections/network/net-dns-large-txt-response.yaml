id: det-network-036
name: Large DNS TXT Response (Possible C2)
description: AiSOC v1 curated detection. Triggers on the network signal described by 'Large DNS TXT Response
  (Possible C2)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1071.004
- tlp.white
category: network
log_source:
  product: dns
  service: resolver
detection:
  condition: |
    event_type == "dns_response"
    AND qtype == "TXT"
    AND response_size_bytes > 512
false_positives:
- DKIM/SPF audit
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
