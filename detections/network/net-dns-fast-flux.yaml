id: det-network-041
name: DNS Fast-Flux Pattern (Many A Records, Short TTL)
description: AiSOC v1 curated detection. Triggers on the network signal described by 'DNS Fast-Flux Pattern
  (Many A Records, Short TTL)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1568.001
- tlp.white
category: network
log_source:
  product: dns
  service: resolver
detection:
  condition: |
    event_type == "dns_response"
    AND answer_count > 8
    AND ttl_seconds < 60
false_positives:
- Major CDN edge
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
