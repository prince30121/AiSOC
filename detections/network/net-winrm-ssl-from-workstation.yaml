id: det-network-069
name: WinRM HTTPS From Workstation To DC
description: AiSOC v1 curated detection. Triggers on the network signal described by 'WinRM HTTPS From
  Workstation To DC'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1021.006
- tlp.white
category: network
log_source:
  product: firewall
  service: netflow
detection:
  condition: |
    event_type == "flow"
    AND destination_port IN [5985, 5986]
    AND src_role == "workstation"
    AND destination_role == "domain-controller"
false_positives:
- Authorised AD admin from PAW
playbook: tpl-lateral-movement
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
