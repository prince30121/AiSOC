id: det-network-066
name: NTLM Relay Indicator (Same Challenge Reused Across Hosts)
description: AiSOC v1 curated detection. Triggers on the network signal described by 'NTLM Relay Indicator
  (Same Challenge Reused Across Hosts)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1557.001
- tlp.white
category: network
log_source:
  product: firewall
  service: netflow
detection:
  condition: |
    event_type == "ntlm_auth"
    AND challenge_reused_across_hosts == true
false_positives:
- NTLM relay tested in lab
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
