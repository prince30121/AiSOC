id: det-network-067
name: RPC Remote Registry Write From Workstation Subnet
description: AiSOC v1 curated detection. Triggers on the network signal described by 'RPC Remote Registry
  Write From Workstation Subnet'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1112
- tlp.white
category: network
log_source:
  product: firewall
  service: rpc
detection:
  condition: |
    event_type == "rpc_call"
    AND interface == "winreg"
    AND operation == "BaseRegSetValue"
    AND src_role == "workstation"
false_positives:
- IT remote support tool
playbook: tpl-lateral-movement
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
