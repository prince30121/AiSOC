id: det-network-038
name: DNS-Over-HTTPS Egress To Non-Sanctioned Resolver
description: AiSOC v1 curated detection. Triggers on the network signal described by 'DNS-Over-HTTPS Egress
  To Non-Sanctioned Resolver'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1572
- tlp.white
category: network
log_source:
  product: proxy
  service: tls
detection:
  condition: |
    event_type == "tls_session"
    AND destination_port == 443
    AND sni ENDSWITH_ANY ["dns.adguard.com", "cloudflare-dns.com", "dns.google"]
    AND sanctioned_doh == false
false_positives:
- Engineer with personal DoH config (educate)
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
