id: det-network-049
name: Self-Signed Certificate Presented On Public IP
description: AiSOC v1 curated detection. Triggers on the network signal described by 'Self-Signed Certificate
  Presented On Public IP'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1573.002
- tlp.white
category: network
log_source:
  product: proxy
  service: tls
detection:
  condition: |
    event_type == "tls_session"
    AND cert_self_signed == true
    AND destination_is_internal == false
false_positives:
- Misconfigured small SaaS vendor
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
