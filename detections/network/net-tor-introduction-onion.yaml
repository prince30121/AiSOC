id: det-network-061
name: Tor Introduction To Hidden Service From Corp Host
description: AiSOC v1 curated detection. Triggers on the network signal described by 'Tor Introduction
  To Hidden Service From Corp Host'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1090.003
- tlp.white
category: network
log_source:
  product: proxy
  service: tls
detection:
  condition: |
    event_type == "tor_circuit_intro"
    AND circuit_purpose == "HS_CLIENT_INTRO"
false_positives:
- Authorised red-team or penetration test
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
