id: det-network-047
name: TLS Client Offered TLS 1.0 Or 1.1
description: AiSOC v1 curated detection. Triggers on the network signal described by 'TLS Client Offered
  TLS 1.0 Or 1.1'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1573.002
- tlp.white
category: network
log_source:
  product: proxy
  service: tls
detection:
  condition: |
    event_type == "tls_session"
    AND client_version IN ["TLSv1.0", "TLSv1.1"]
false_positives:
- Legacy line-of-business app (allow-listed)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
