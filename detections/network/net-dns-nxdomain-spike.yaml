id: det-network-033
name: High Volume Of NXDOMAIN Responses From Single Host
description: AiSOC v1 curated detection. Triggers on the network signal described by 'High Volume Of NXDOMAIN
  Responses From Single Host'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1568.002
- tlp.white
category: network
log_source:
  product: dns
  service: resolver
detection:
  condition: |
    event_type == "dns_response"
    AND rcode == "NXDOMAIN"
    AND count_5min > 200
    AND src_role == "endpoint"
false_positives:
- Malformed in-house tooling (educate)
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
