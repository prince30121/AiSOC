id: det-network-055
name: Outbound SSH With -R Reverse-Tunnel Flag
description: AiSOC v1 curated detection. Triggers on the network signal described by 'Outbound SSH With
  -R Reverse-Tunnel Flag'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1572
- tlp.white
category: network
log_source:
  product: proxy
  service: ssh
detection:
  condition: |
    event_type == "ssh_command"
    AND argv CONTAINS "-R"
false_positives:
- Engineer working with vendor
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
