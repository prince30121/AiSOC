id: det-network-046
name: HTTP Host Header Is IP Literal
description: AiSOC v1 curated detection. Triggers on the network signal described by 'HTTP Host Header
  Is IP Literal'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1071.001
- tlp.white
category: network
log_source:
  product: proxy
  service: http
detection:
  condition: |
    event_type == "http_request"
    AND host_is_ip_literal == true
false_positives:
- Internal microservice without DNS
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
