id: det-network-056
name: Tor Connection From Corporate Workstation
description: AiSOC v1 curated detection. Triggers on the network signal described by 'Tor Connection From
  Corporate Workstation'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1090.003
- tlp.white
category: network
log_source:
  product: proxy
  service: tls
detection:
  condition: |
    event_type == "tls_session"
    AND destination_in_known_tor_relay == true
    AND src_role == "workstation"
false_positives:
- Threat-intel research workstation
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
