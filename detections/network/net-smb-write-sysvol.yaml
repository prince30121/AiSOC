id: det-network-065
name: SMB Write To SYSVOL Share From Non-DC
description: AiSOC v1 curated detection. Triggers on the network signal described by 'SMB Write To SYSVOL
  Share From Non-DC'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1570
- tlp.white
category: network
log_source:
  product: firewall
  service: netflow
detection:
  condition: |
    event_type == "smb_write"
    AND share_name == "SYSVOL"
    AND src_role_neq == "domain-controller"
false_positives:
- Authorised AD migration tool
playbook: tpl-lateral-movement
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
