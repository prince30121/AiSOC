id: det-network-039
name: DNS-Over-TLS Egress To Public IP
description: AiSOC v1 curated detection. Triggers on the network signal described by 'DNS-Over-TLS Egress
  To Public IP'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1572
- tlp.white
category: network
log_source:
  product: proxy
  service: tls
detection:
  condition: |
    event_type == "tls_session"
    AND destination_port == 853
    AND destination_is_internal == false
false_positives:
- Approved upstream resolver
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
