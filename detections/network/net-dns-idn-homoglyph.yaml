id: det-network-032
name: DNS Query For Homoglyph Of Internal Brand
description: AiSOC v1 curated detection. Triggers on the network signal described by 'DNS Query For Homoglyph
  Of Internal Brand'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1583.001
- tlp.white
category: network
log_source:
  product: dns
  service: resolver
detection:
  condition: |
    event_type == "dns_query"
    AND homoglyph_score > 0.85
false_positives:
- Authorized brand-protection scan
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
