id: det-network-079
name: 'DHCP Starvation: Rapid Lease Churn From Single MAC Range'
description: 'AiSOC v1 curated detection. Triggers on the network signal described by ''DHCP Starvation:
  Rapid Lease Churn From Single MAC Range''. Watch the 1 documented false-positive case before tuning.'
version: 1.0.0
severity: high
tags:
- mitre.attack.t1498
- tlp.white
category: network
log_source:
  product: firewall
  service: dhcp
detection:
  condition: |
    event_type == "dhcp"
    AND leases_per_minute_per_relay > 200
false_positives:
- Conference / event Wi-Fi
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
