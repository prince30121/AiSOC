id: det-network-050
name: TLS Negotiated Weak Cipher Suite
description: AiSOC v1 curated detection. Triggers on the network signal described by 'TLS Negotiated Weak
  Cipher Suite'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1600.001
- tlp.white
category: network
log_source:
  product: proxy
  service: tls
detection:
  condition: |
    event_type == "tls_session"
    AND negotiated_cipher CONTAINS_ANY ["NULL", "EXPORT", "RC4", "DES"]
false_positives:
- Legacy device support
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
