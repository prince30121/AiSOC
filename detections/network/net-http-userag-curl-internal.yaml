id: det-network-045
name: curl/wget User-Agent From Workstation Subnet
description: AiSOC v1 curated detection. Triggers on the network signal described by 'curl/wget User-Agent
  From Workstation Subnet'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1071.001
- tlp.white
category: network
log_source:
  product: proxy
  service: http
detection:
  condition: |
    event_type == "http_request"
    AND user_agent STARTSWITH_ANY ["curl/", "Wget/"]
    AND src_role == "workstation"
false_positives:
- Engineer ad-hoc workflow
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
