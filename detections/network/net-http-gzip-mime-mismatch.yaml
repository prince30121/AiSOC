id: det-network-053
name: HTTP Response MIME And Content-Encoding Mismatch
description: AiSOC v1 curated detection. Triggers on the network signal described by 'HTTP Response MIME
  And Content-Encoding Mismatch'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1027
- tlp.white
category: network
log_source:
  product: proxy
  service: http
detection:
  condition: |
    event_type == "http_response"
    AND mime_type IN ["application/octet-stream"]
    AND content_encoding == "gzip"
    AND filename ENDSWITH_ANY [".jpg", ".png", ".gif"]
false_positives:
- Misconfigured CDN
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
