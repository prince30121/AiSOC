id: det-network-031
name: DNS Query For Newly Registered Domain (NRD)
description: AiSOC v1 curated detection. Triggers on the network signal described by 'DNS Query For Newly
  Registered Domain (NRD)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1071.004
- tlp.white
category: network
log_source:
  product: dns
  service: resolver
detection:
  condition: |
    event_type == "dns_query"
    AND domain_age_days < 7
false_positives:
- Brand-new SaaS launch (rare; verify business need)
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
