id: det-network-072
name: Empire C2 Default URI Pattern Observed
description: AiSOC v1 curated detection. Triggers on the network signal described by 'Empire C2 Default
  URI Pattern Observed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1071.001
- tlp.white
category: network
log_source:
  product: proxy
  service: http
detection:
  condition: |
    event_type == "http_request"
    AND uri ENDSWITH_ANY ["/admin/get.php", "/news.php", "/login/process.php"]
false_positives:
- Authorised red-team or penetration test
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
