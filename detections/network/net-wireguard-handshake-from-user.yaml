id: det-network-059
name: WireGuard Handshake From User Workstation
description: AiSOC v1 curated detection. Triggers on the network signal described by 'WireGuard Handshake
  From User Workstation'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1572
- tlp.white
category: network
log_source:
  product: proxy
  service: netflow
detection:
  condition: |
    event_type == "flow"
    AND destination_port == 51820
    AND src_role == "workstation"
false_positives:
- Approved corporate VPN tier
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
