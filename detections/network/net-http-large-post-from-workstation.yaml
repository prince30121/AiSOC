id: det-network-054
name: Large HTTP POST From Workstation To Public IP
description: AiSOC v1 curated detection. Triggers on the network signal described by 'Large HTTP POST
  From Workstation To Public IP'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1041
- tlp.white
category: network
log_source:
  product: proxy
  service: http
detection:
  condition: |
    event_type == "http_request"
    AND method == "POST"
    AND request_size_bytes > 50000000
    AND src_role == "workstation"
    AND destination_is_internal == false
false_positives:
- Sanctioned cloud upload
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
