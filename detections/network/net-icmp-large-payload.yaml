id: det-network-057
name: ICMP Echo With Unusually Large Payload
description: AiSOC v1 curated detection. Triggers on the network signal described by 'ICMP Echo With Unusually
  Large Payload'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1095
- tlp.white
category: network
log_source:
  product: proxy
  service: icmp
detection:
  condition: |
    event_type == "icmp"
    AND payload_size_bytes > 1024
false_positives:
- MTU diagnostic
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
