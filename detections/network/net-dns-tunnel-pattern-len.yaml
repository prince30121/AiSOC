id: det-network-037
name: 'DNS Tunnel Indicator: Long Hex Subdomain Sequence'
description: 'AiSOC v1 curated detection. Triggers on the network signal described by ''DNS Tunnel Indicator:
  Long Hex Subdomain Sequence''. Watch the 1 documented false-positive case before tuning.'
version: 1.0.0
severity: high
tags:
- mitre.attack.t1071.004
- tlp.white
category: network
log_source:
  product: dns
  service: resolver
detection:
  condition: |
    event_type == "dns_query"
    AND subdomain_hex_ratio > 0.9
    AND subdomain_length > 30
false_positives:
- DNSSEC validation lookups
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
