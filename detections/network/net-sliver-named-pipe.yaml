id: det-network-071
name: Sliver Default Named Pipe Pattern
description: AiSOC v1 curated detection. Triggers on the network signal described by 'Sliver Default Named
  Pipe Pattern'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1573
- tlp.white
category: network
log_source:
  product: firewall
  service: netflow
detection:
  condition: |
    event_type == "smb_pipe"
    AND pipe_name STARTSWITH "sliver_"
false_positives:
- Authorised red-team or penetration test
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
