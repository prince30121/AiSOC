id: det-network-040
name: DNS Query For .onion Address
description: AiSOC v1 curated detection. Triggers on the network signal described by 'DNS Query For .onion
  Address'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1090.003
- tlp.white
category: network
log_source:
  product: dns
  service: resolver
detection:
  condition: |
    event_type == "dns_query"
    AND domain ENDSWITH ".onion"
false_positives:
- Threat-intel research workstation (allow-listed)
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
