id: det-network-034
name: DNS Query Type ANY Volume From Single Host
description: AiSOC v1 curated detection. Triggers on the network signal described by 'DNS Query Type ANY
  Volume From Single Host'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1018
- tlp.white
category: network
log_source:
  product: dns
  service: resolver
detection:
  condition: |
    event_type == "dns_query"
    AND qtype == "ANY"
    AND count_5min > 50
false_positives:
- Approved DNS audit run
playbook: tpl-discovery
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
