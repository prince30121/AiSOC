id: det-identity-080
name: ACL On Sensitive AD Object Modified
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'ACL On Sensitive
  AD Object Modified'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1484.002
- tlp.white
category: identity
log_source:
  product: active-directory
  service: audit
detection:
  condition: |
    event_id == 4670
    AND object_class IN ["domainDNS", "groupPolicyContainer"]
false_positives:
- Approved AD reorg
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
