id: det-identity-139
name: OIDC Client Secret Logged In Plaintext
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'OIDC Client Secret
  Logged In Plaintext'.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1552.004
- tlp.white
category: identity
log_source:
  product: identity
  service: oidc
detection:
  condition: |
    event_type == "log_emit"
    AND field_contains_oidc_secret == true
false_positives: []
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
