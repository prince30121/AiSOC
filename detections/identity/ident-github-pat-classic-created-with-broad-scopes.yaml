id: det-identity-154
name: GitHub Classic PAT Created With repo+workflow+admin:org
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'GitHub Classic
  PAT Created With repo+workflow+admin:org'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098.001
- tlp.white
category: identity
log_source:
  product: github
  service: audit
detection:
  condition: |
    action == "personal_access_token.create"
    AND scopes CONTAINS_ALL ["repo", "workflow", "admin:org"]
false_positives:
- CI bootstrap (must be ticketed)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
