id: det-identity-088
name: User Removed From Protected Users Group
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'User Removed From
  Protected Users Group'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: active-directory
  service: audit
detection:
  condition: |
    event_id == 4729
    AND group_name == "Protected Users"
false_positives:
- Documented break-glass procedure
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
