id: det-identity-103
name: OAuth Access Token Used Before Issue +1s
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'OAuth Access Token
  Used Before Issue +1s'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1550
- tlp.white
category: identity
log_source:
  product: identity
  service: oauth
detection:
  condition: |
    event_type == "token_use"
    AND seconds_after_issue < 1
    AND ip_changed == true
false_positives:
- Clock skew
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
