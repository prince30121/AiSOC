id: det-identity-079
name: Domain Admin Group Membership Added (AD)
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Domain Admin Group
  Membership Added (AD)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1098.007
- tlp.white
category: identity
log_source:
  product: active-directory
  service: audit
detection:
  condition: |
    event_id == 4728
    AND group_name IN ["Domain Admins", "Enterprise Admins", "Schema Admins"]
false_positives:
- Documented break-glass procedure
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
