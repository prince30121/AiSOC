id: det-identity-064
name: Login With Empty User-Agent
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Login With Empty
  User-Agent'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1078
- tlp.white
category: identity
log_source:
  product: identity
  service: auth
detection:
  condition: |
    event_type == "auth_success"
    AND user_agent == ""
false_positives:
- Custom internal client
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
