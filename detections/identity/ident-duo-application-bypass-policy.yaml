id: det-identity-127
name: Duo Application Set To Bypass Policy
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Duo Application
  Set To Bypass Policy'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: duo
  service: admin
detection:
  condition: |
    event_type == "integration_update"
    AND policy_assigned == "bypass"
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
