id: det-identity-160
name: MDM Policy Removed Requiring Device Compliance
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'MDM Policy Removed
  Requiring Device Compliance'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: mdm
  service: audit
detection:
  condition: |
    action == "compliance_policy_disabled"
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
