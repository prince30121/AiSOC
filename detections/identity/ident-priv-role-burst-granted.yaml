id: det-identity-071
name: Privileged Role Grant Burst Across Many Users
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Privileged Role
  Grant Burst Across Many Users'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: identity
log_source:
  product: identity
  service: audit
detection:
  condition: |
    event_type == "role_grant"
    AND role_priv == true
    AND events_per_minute > 10
false_positives:
- Bulk reorg (must be ticketed)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
