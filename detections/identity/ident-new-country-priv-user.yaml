id: det-identity-062
name: Privileged User Login From New Country
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Privileged User
  Login From New Country'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1078
- tlp.white
category: identity
log_source:
  product: identity
  service: auth
detection:
  condition: |
    event_type == "auth_success"
    AND user_priv == true
    AND country_first_seen_for_user == true
false_positives:
- Authorised travel
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
