id: det-identity-134
name: Keycloak realm-admin Role Granted
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Keycloak realm-admin
  Role Granted'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: identity
log_source:
  product: keycloak
  service: audit
detection:
  condition: |
    event_type == "ROLE_ASSIGN"
    AND role == "realm-admin"
false_positives:
- Bootstrap
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
