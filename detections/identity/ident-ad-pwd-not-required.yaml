id: det-identity-085
name: AD Account Set With PASSWD_NOTREQD
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'AD Account Set
  With PASSWD_NOTREQD'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: identity
log_source:
  product: active-directory
  service: audit
detection:
  condition: |
    event_id == 4738
    AND useraccountcontrol_flag_passwd_notreqd == true
false_positives:
- Confirmed test/tuning activity
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
