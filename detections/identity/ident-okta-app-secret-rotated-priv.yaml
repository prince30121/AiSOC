id: det-identity-111
name: Okta App Sign-On Secret Rotated By Non-Admin
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Okta App Sign-On
  Secret Rotated By Non-Admin'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098.001
- tlp.white
category: identity
log_source:
  product: okta
  service: audit
detection:
  condition: |
    event_type == "application.lifecycle.update"
    AND actor_role_priv == false
    AND secret_rotated == true
false_positives:
- Confirmed test/tuning activity
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
