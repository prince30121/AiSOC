id: det-identity-129
name: PingOne Admin Role Burst Granted
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'PingOne Admin Role
  Burst Granted'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: identity
log_source:
  product: ping
  service: audit
detection:
  condition: |
    event_type == "ADMIN_ROLE_GRANT"
    AND events_per_minute > 5
false_positives:
- Bulk admin onboarding
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
