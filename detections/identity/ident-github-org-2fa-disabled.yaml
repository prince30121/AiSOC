id: det-identity-153
name: GitHub Org 2FA Requirement Disabled
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'GitHub Org 2FA
  Requirement Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: github
  service: audit
detection:
  condition: |
    action == "org.disable_two_factor_requirement"
false_positives:
- Org transition (must be ticketed)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
