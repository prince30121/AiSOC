id: det-identity-150
name: Slack Workspace 2FA Disabled
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Slack Workspace
  2FA Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: slack
  service: admin
detection:
  condition: |
    action IN ["workspace_two_factor_required_disabled"]
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
