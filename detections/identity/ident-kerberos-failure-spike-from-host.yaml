id: det-identity-096
name: Kerberos Pre-Auth Failure Spike From Host
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Kerberos Pre-Auth
  Failure Spike From Host'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1110
- tlp.white
category: identity
log_source:
  product: active-directory
  service: kerberos
detection:
  condition: |
    event_id == 4771
    AND failures_per_host_per_minute > 50
false_positives:
- Misconfigured app
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
