id: det-identity-072
name: Service Account Used For Interactive Login
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Service Account
  Used For Interactive Login'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- tlp.white
category: identity
log_source:
  product: identity
  service: auth
detection:
  condition: |
    event_type == "auth_success"
    AND user_type == "service_account"
    AND is_interactive == true
false_positives:
- Approved automation runner using human UI
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
