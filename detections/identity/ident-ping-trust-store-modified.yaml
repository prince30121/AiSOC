id: det-identity-132
name: Ping Trust Store Certificate Added
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Ping Trust Store
  Certificate Added'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1553.004
- tlp.white
category: identity
log_source:
  product: ping
  service: audit
detection:
  condition: |
    event_type == "TRUSTED_CERT_ADDED"
false_positives:
- Approved IdP federation
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
