id: det-identity-069
name: JIT/PIM Privileged Activation Self-Approved
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'JIT/PIM Privileged
  Activation Self-Approved'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078
- tlp.white
category: identity
log_source:
  product: identity
  service: pim
detection:
  condition: |
    event_type == "pim_activation"
    AND approver_eq_actor == true
false_positives:
- Documented break-glass procedure
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
