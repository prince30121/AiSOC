id: det-identity-105
name: SAML Assertion Issuer Mismatched
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'SAML Assertion
  Issuer Mismatched'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: identity
  service: saml
detection:
  condition: |
    event_type == "saml_consume"
    AND issuer_in_trusted_list == false
false_positives:
- IdP migration window
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
