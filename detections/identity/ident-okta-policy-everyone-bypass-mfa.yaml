id: det-identity-107
name: Okta Policy Allows 'Everyone' Without MFA
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Okta Policy Allows
  'Everyone' Without MFA'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: okta
  service: audit
detection:
  condition: |
    event_type IN ["policy.lifecycle.activate", "policy.rule.update"]
    AND factor_required == false
    AND applies_to_everyone == true
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
