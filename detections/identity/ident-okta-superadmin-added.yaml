id: det-identity-109
name: Okta Super Administrator Role Granted
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Okta Super Administrator
  Role Granted'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1098
- tlp.white
category: identity
log_source:
  product: okta
  service: audit
detection:
  condition: |
    event_type == "user.account.privilege.grant"
    AND role == "SUPER_ADMIN"
false_positives:
- Documented break-glass procedure
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
