id: det-identity-119
name: Auth0 Action Deployed
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Auth0 Action Deployed'.
  Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: auth0
  service: audit
detection:
  condition: |
    event_type == "Successful API Operation"
    AND operation == "actions.deploy"
false_positives:
- Approved tenant config
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
