id: det-identity-133
name: Keycloak Master Realm User Created
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Keycloak Master
  Realm User Created'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1136
- tlp.white
category: identity
log_source:
  product: keycloak
  service: audit
detection:
  condition: |
    event_type == "USER_CREATE"
    AND realm == "master"
false_positives:
- Bootstrap
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
