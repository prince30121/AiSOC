id: det-identity-065
name: TOTP Verification Repeatedly Skews Clock
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'TOTP Verification
  Repeatedly Skews Clock'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: low
tags:
- mitre.attack.t1110
- tlp.white
category: identity
log_source:
  product: identity
  service: mfa
detection:
  condition: |
    event_type == "mfa_challenge"
    AND totp_clock_skew_seconds > 60
    AND events_per_minute > 5
false_positives:
- Phone clock drift
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
