id: det-identity-068
name: Privileged Role Granted To Service Account
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Privileged Role
  Granted To Service Account'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- tlp.white
category: identity
log_source:
  product: identity
  service: audit
detection:
  condition: |
    event_type == "role_grant"
    AND role_priv == true
    AND target_user_type == "service_account"
false_positives:
- IaC pipeline
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
