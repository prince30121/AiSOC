id: det-identity-137
name: Generic OIDC Issuer Trust Modified
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Generic OIDC Issuer
  Trust Modified'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: identity
  service: oidc
detection:
  condition: |
    event_type == "issuer.update"
    AND discovery_url_changed == true
false_positives:
- Approved IdP migration
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
