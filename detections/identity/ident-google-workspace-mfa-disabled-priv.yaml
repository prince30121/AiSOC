id: det-identity-141
name: Google Workspace 2SV Disabled For Admin
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Google Workspace
  2SV Disabled For Admin'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1556.006
- tlp.white
category: identity
log_source:
  product: google-workspace
  service: admin
detection:
  condition: |
    event_name == "ENFORCE_STRONG_AUTHENTICATION"
    AND value == false
    AND user_priv == true
false_positives:
- Documented break-glass procedure
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
