id: det-identity-074
name: New User Granted Privileged Role <24h After Creation
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'New User Granted
  Privileged Role <24h After Creation'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: identity
log_source:
  product: identity
  service: audit
detection:
  condition: |
    event_type == "role_grant"
    AND role_priv == true
    AND user_age_minutes < 1440
false_positives:
- First-time provisioning / new-user onboarding
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
