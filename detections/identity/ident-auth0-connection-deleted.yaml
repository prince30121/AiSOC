id: det-identity-121
name: Auth0 Connection Deleted
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Auth0 Connection
  Deleted'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1485
- tlp.white
category: identity
log_source:
  product: auth0
  service: audit
detection:
  condition: |
    event_type == "Successful API Operation"
    AND operation == "connections.delete"
false_positives:
- Tenant cleanup
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
