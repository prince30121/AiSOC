id: det-identity-108
name: Okta Trusted Network Zone Modified
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Okta Trusted Network
  Zone Modified'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: okta
  service: audit
detection:
  condition: |
    event_type == "zone.update"
    AND zone_type == "IP"
    AND trusted == true
false_positives:
- Office relocation
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
