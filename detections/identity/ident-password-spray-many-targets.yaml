id: det-identity-041
name: 'Password Spray: Single IP, Many Targets, Few Tries Each'
description: 'AiSOC v1 curated detection. Triggers on the identity signal described by ''Password Spray:
  Single IP, Many Targets, Few Tries Each''. Watch the 1 documented false-positive case before tuning.'
version: 1.0.0
severity: high
tags:
- mitre.attack.t1110.003
- tlp.white
category: identity
log_source:
  product: identity
  service: auth
detection:
  condition: |
    event_type == "auth_failure"
    AND distinct_users_per_minute > 30
    AND tries_per_user <= 5
false_positives:
- VPN concentrator with shared egress
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
