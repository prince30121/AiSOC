id: det-identity-073
name: Service Account Login Without MFA In Region That Requires It
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Service Account
  Login Without MFA In Region That Requires It'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1078.004
- tlp.white
category: identity
log_source:
  product: identity
  service: auth
detection:
  condition: |
    event_type == "auth_success"
    AND user_type == "service_account"
    AND mfa_used == false
    AND policy_requires_mfa == true
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
