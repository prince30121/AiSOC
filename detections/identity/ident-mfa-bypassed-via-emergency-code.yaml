id: det-identity-053
name: MFA Bypass Via Emergency / Backup Code
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'MFA Bypass Via
  Emergency / Backup Code'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556.006
- tlp.white
category: identity
log_source:
  product: identity
  service: auth
detection:
  condition: |
    event_type == "auth_success"
    AND mfa_factor == "backup_code"
false_positives:
- Documented break-glass procedure
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
