id: det-identity-082
name: Privileged GPO Modified
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Privileged GPO
  Modified'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1484.001
- tlp.white
category: identity
log_source:
  product: active-directory
  service: audit
detection:
  condition: |
    event_id == 5136
    AND gpo_link_priv == true
false_positives:
- Approved GPO refactor
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
