id: det-identity-151
name: Slack App Installed With Bot Scope chat:write.public
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Slack App Installed
  With Bot Scope chat:write.public'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1525
- tlp.white
category: identity
log_source:
  product: slack
  service: audit
detection:
  condition: |
    action == "app_installed"
    AND scopes CONTAINS "chat:write.public"
false_positives:
- Approved bot
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
