id: det-identity-135
name: Keycloak Client Secret Regenerated
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Keycloak Client
  Secret Regenerated'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1098.001
- tlp.white
category: identity
log_source:
  product: keycloak
  service: audit
detection:
  condition: |
    event_type == "CLIENT_UPDATE"
    AND secret_changed == true
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
