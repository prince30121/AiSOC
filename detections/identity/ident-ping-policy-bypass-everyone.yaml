id: det-identity-131
name: PingOne Policy Bypass Applied To 'Everyone'
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'PingOne Policy
  Bypass Applied To 'Everyone''. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: ping
  service: audit
detection:
  condition: |
    event_type == "POLICY_UPDATE"
    AND applies_to_everyone == true
    AND factor_required == false
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
