id: det-identity-149
name: M365 Temporary Access Pass Generated For Priv
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'M365 Temporary
  Access Pass Generated For Priv'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556.006
- tlp.white
category: identity
log_source:
  product: m365
  service: azure-ad
detection:
  condition: |
    operation == "Add temporary access pass"
    AND target_user_priv == true
false_positives:
- Documented break-glass procedure
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
