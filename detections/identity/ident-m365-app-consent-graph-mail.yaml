id: det-identity-147
name: M365 App Granted Mail.Read / Mail.ReadWrite
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'M365 App Granted
  Mail.Read / Mail.ReadWrite'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1528
- tlp.white
category: identity
log_source:
  product: m365
  service: azure-ad
detection:
  condition: |
    operation == "Consent to application"
    AND permissions CONTAINS_ANY ["Mail.Read", "Mail.ReadWrite"]
false_positives:
- Approved SaaS integration
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
