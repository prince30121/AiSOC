id: det-identity-125
name: Duo Admin Created Via Self-Service Activation
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Duo Admin Created
  Via Self-Service Activation'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1098
- tlp.white
category: identity
log_source:
  product: duo
  service: admin
detection:
  condition: |
    event_type == "admin_create"
    AND actor_eq_target == true
false_positives:
- Documented break-glass procedure
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
