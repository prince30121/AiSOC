id: det-identity-061
name: Login From ASN Recently Seen In Credential-Stuffing Activity
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Login From ASN
  Recently Seen In Credential-Stuffing Activity'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1110.004
- tlp.white
category: identity
log_source:
  product: identity
  service: auth
detection:
  condition: |
    event_type == "auth_success"
    AND src_asn_recent_credstuffing == true
false_positives:
- Mobile carrier shared NAT
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
