id: det-identity-055
name: FIDO2 Key Added And Old Key Removed In Same Session
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'FIDO2 Key Added
  And Old Key Removed In Same Session'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556.006
- tlp.white
category: identity
log_source:
  product: identity
  service: mfa
detection:
  condition: |
    event_type == "factor_swap"
    AND old_factor_age_days > 30
    AND session_seconds < 600
false_positives:
- Documented break-glass procedure
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
