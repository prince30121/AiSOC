id: det-identity-070
name: JIT/PIM Activation At Unusual Hour For User
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'JIT/PIM Activation
  At Unusual Hour For User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1078
- tlp.white
category: identity
log_source:
  product: identity
  service: pim
detection:
  condition: |
    event_type == "pim_activation"
    AND hour_unusual_for_user == true
false_positives:
- Documented break-glass procedure
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
