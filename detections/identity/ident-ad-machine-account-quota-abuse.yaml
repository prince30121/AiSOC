id: det-identity-087
name: Machine Account Quota Exhausted By Single User
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Machine Account
  Quota Exhausted By Single User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1136.001
- tlp.white
category: identity
log_source:
  product: active-directory
  service: audit
detection:
  condition: |
    event_id == 4741
    AND machines_created_per_user_per_day > 5
false_positives:
- Approved imaging pipeline
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
