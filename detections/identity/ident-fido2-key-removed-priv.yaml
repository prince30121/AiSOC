id: det-identity-054
name: FIDO2 Hardware Key Removed From Privileged User
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'FIDO2 Hardware
  Key Removed From Privileged User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556.006
- tlp.white
category: identity
log_source:
  product: identity
  service: mfa
detection:
  condition: |
    event_type == "factor_remove"
    AND factor_type == "fido2"
    AND user_priv == true
false_positives:
- Documented break-glass procedure
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
