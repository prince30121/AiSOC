id: det-identity-077
name: Service Account With 5+ Active API Keys
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Service Account
  With 5+ Active API Keys'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1098.001
- tlp.white
category: identity
log_source:
  product: identity
  service: audit
detection:
  condition: |
    event_type == "key_inventory"
    AND active_keys_per_account > 5
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
