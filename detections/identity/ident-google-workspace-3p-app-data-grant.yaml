id: det-identity-143
name: Google Workspace 3rd-Party App Granted Drive Read
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Google Workspace
  3rd-Party App Granted Drive Read'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1528
- tlp.white
category: identity
log_source:
  product: google-workspace
  service: oauth_token
detection:
  condition: |
    event_name == "AUTHORIZE"
    AND scope CONTAINS "https://www.googleapis.com/auth/drive"
false_positives:
- Approved SaaS
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
