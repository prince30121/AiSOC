id: det-identity-067
name: User Granted Privileged Role To Themselves
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'User Granted Privileged
  Role To Themselves'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1098
- tlp.white
category: identity
log_source:
  product: identity
  service: audit
detection:
  condition: |
    event_type == "role_grant"
    AND role_priv == true
    AND actor_eq_target == true
false_positives:
- Documented break-glass procedure
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
