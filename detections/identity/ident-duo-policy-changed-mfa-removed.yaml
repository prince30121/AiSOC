id: det-identity-124
name: 'Duo Policy Changed: MFA Requirement Removed'
description: 'AiSOC v1 curated detection. Triggers on the identity signal described by ''Duo Policy Changed:
  MFA Requirement Removed''. Watch the 1 documented false-positive case before tuning.'
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: duo
  service: admin
detection:
  condition: |
    event_type == "policy_update"
    AND auth_required == false
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
