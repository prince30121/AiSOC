id: det-identity-094
name: 'Silver Ticket Indicator: TGS Without Matching TGT'
description: 'AiSOC v1 curated detection. Triggers on the identity signal described by ''Silver Ticket
  Indicator: TGS Without Matching TGT''. Watch the 1 documented false-positive case before tuning.'
version: 1.0.0
severity: high
tags:
- mitre.attack.t1558.002
- tlp.white
category: identity
