id: det-identity-152
name: Slack Channel Shared Externally
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Slack Channel Shared
  Externally'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1567
- tlp.white
category: identity
log_source:
  product: slack
  service: audit
detection:
  condition: |
    action IN ["external_shared_channel_invite_accepted", "shared_channel_external_org_added"]
false_positives:
- Approved partner channel
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
