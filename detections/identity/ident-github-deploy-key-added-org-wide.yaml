id: det-identity-156
name: GitHub Deploy Key Added Across Many Repos
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'GitHub Deploy Key
  Added Across Many Repos'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1098.001
- tlp.white
category: identity
log_source:
  product: github
  service: audit
detection:
  condition: |
    action == "deploy_key.add"
    AND distinct_repos_per_actor_per_hour > 10
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
