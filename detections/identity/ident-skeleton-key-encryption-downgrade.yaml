id: det-identity-095
name: 'Skeleton Key Indicator: Forced Downgrade To DES/RC4'
description: 'AiSOC v1 curated detection. Triggers on the identity signal described by ''Skeleton Key
  Indicator: Forced Downgrade To DES/RC4''. Watch the 1 documented false-positive case before tuning.'
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1556.001
- tlp.white
category: identity
log_source:
  product: active-directory
  service: kerberos
detection:
  condition: |
    event_id == 4624
    AND logon_type == 3
    AND encryption_type IN ["DES", "RC4"]
    AND domain_controller == true
false_positives:
- Legacy app integration
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
