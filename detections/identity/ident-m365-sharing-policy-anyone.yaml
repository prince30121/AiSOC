id: det-identity-148
name: M365 SharePoint Sharing Policy 'Anyone' Enabled
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'M365 SharePoint
  Sharing Policy 'Anyone' Enabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1530
- tlp.white
category: identity
log_source:
  product: m365
  service: sharepoint
detection:
  condition: |
    operation == "TenantSettingsModified"
    AND sharing_capability == "ExternalUserAndGuestSharing"
false_positives:
- Confirmed test/tuning activity
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
