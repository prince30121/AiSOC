id: det-identity-056
name: TOTP Secret QR-Code Re-Issued Without Old Factor Removal
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'TOTP Secret QR-Code
  Re-Issued Without Old Factor Removal'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: identity
  service: mfa
detection:
  condition: |
    event_type == "factor_create"
    AND factor_type == "totp"
    AND old_factor_removed == false
false_positives:
- Helpdesk-driven recovery
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
