id: det-identity-126
name: Duo Push Marked As Fraud By User
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Duo Push Marked
  As Fraud By User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1621
- tlp.white
category: identity
log_source:
  product: duo
  service: auth
detection:
  condition: |
    event_type == "auth"
    AND result == "fraud"
false_positives:
- Misclick / training
playbook: tpl-credential-access
enabled: true
author: AiSOC
