id: det-identity-042
name: Distributed Password Spray From Many IPs
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Distributed Password
  Spray From Many IPs'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1110.003
- tlp.white
category: identity
log_source:
  product: identity
  service: auth
detection:
  condition: |
    event_type == "auth_failure"
    AND distinct_ips_per_user_per_hour > 30
false_positives:
- Mobile-app users with rotating cellular IPs
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
