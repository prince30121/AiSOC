id: det-identity-138
name: OIDC Client Burst Created By Single Actor
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'OIDC Client Burst
  Created By Single Actor'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1136
- tlp.white
category: identity
log_source:
  product: identity
  service: oidc
detection:
  condition: |
    event_type == "client.create"
    AND events_per_minute_per_actor > 5
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
