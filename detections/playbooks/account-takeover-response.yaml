id: account-takeover-response-v1
name: Account Takeover Response
description: >
  Responds to suspected account takeover (ATO) events. Forces session
  termination, resets credentials, enables MFA enforcement, and notifies
  the user and security team.
version: "1.0.0"
author: Beenu - beenu@cyble.com
enabled: true
tags:
  - account-takeover
  - identity
  - iam
  - credential-compromise

trigger:
  on: alert
  severity:
    - medium
    - high
    - critical
  tags:
    - account-takeover

steps:
  - id: enrich-user
    name: Enrich Compromised User Account
    type: enrich
    params:
      source: identity_provider
      fields:
        - username
        - email
        - department
        - manager
        - last_login_ip
        - mfa_enabled
        - active_sessions
    timeout_seconds: 30
    on_failure: continue

  - id: investigate-logins
    name: Investigate Login History
    type: investigate
    params:
      query: "logins user={{ alert.username }} last_days=7"
      context_fields:
        - alert.username
        - alert.last_login_ip
    timeout_seconds: 45
    on_failure: continue

  - id: check-mfa
    name: Check MFA Status
    type: condition
    condition:
      field: alert.mfa_enabled
      operator: eq
      value: false
    next_true: force-mfa
    next_false: revoke-sessions

  - id: force-mfa
    name: Enforce MFA on Account
    type: http
    params:
      method: POST
      url: "{{ env.IDP_API_URL }}/users/{{ alert.username }}/enforce-mfa"
      body:
        enforce: true
        reason: "ATO response — playbook {{ id }}"
    timeout_seconds: 30
    on_failure: continue

  - id: revoke-sessions
    name: Revoke All Active Sessions
    type: http
    params:
      method: POST
      url: "{{ env.IDP_API_URL }}/users/{{ alert.username }}/revoke-sessions"
      body:
        reason: "Suspected account takeover"
    timeout_seconds: 30
    on_failure: abort
    retry_max: 2

  - id: notify-user
    name: Notify Affected User
    type: notify
    params:
      channel: email
      to: "{{ alert.email }}"
      subject: "Security Alert: Unusual activity detected on your account"
      message: |
        We detected unusual login activity on your account.
        Your sessions have been terminated as a precaution.
        Please contact IT security immediately: security@company.com
    timeout_seconds: 20
    on_failure: continue

  - id: notify-manager
    name: Notify User's Manager
    type: notify
    params:
      channel: email
      to: "{{ alert.manager_email }}"
      subject: "Security Alert: {{ alert.username }} account may be compromised"
      message: |
        The account {{ alert.username }} has been flagged for suspected compromise.
        Sessions terminated. IR team has been notified.
    timeout_seconds: 20
    on_failure: continue

  - id: create-ticket
    name: Create ATO Incident Ticket
    type: create_ticket
    params:
      title: "ATO: {{ alert.username }} — suspicious login from {{ alert.last_login_ip }}"
      severity: P1
      assignee_group: ir-team
    timeout_seconds: 30
    on_failure: continue

  - id: close-case
    name: Close ATO Case
    type: close_case
    params:
      status: contained
      resolution: "Sessions revoked; MFA enforced; user and manager notified; IR ticket created."
    timeout_seconds: 15
    on_failure: continue
