id: insider-threat-response-v1
name: Insider Threat Response
description: >
  Responds to suspected insider threat activity including unauthorized data
  access, bulk downloads, privilege abuse, or off-hours anomalous activity.
  Escalates to HR and Legal with full audit trail.
version: "1.0.0"
author: Beenu - beenu@cyble.com
enabled: true
tags:
  - insider-threat
  - dlp
  - ueba
  - identity
  - data-exfiltration

trigger:
  on: alert
  severity:
    - medium
    - high
    - critical
  tags:
    - insider-threat

steps:
  - id: enrich-user
    name: Enrich Suspected Insider User
    type: enrich
    params:
      source: ueba
      fields:
        - username
        - email
        - department
        - manager
        - role
        - risk_score
        - last_activity
        - anomaly_type
        - data_accessed
        - bytes_transferred
    timeout_seconds: 30
    on_failure: continue

  - id: investigate-activity
    name: Investigate User Activity Timeline
    type: investigate
    params:
      query: "user_activity user={{ alert.username }} risk=high last_days=30"
      context_fields:
        - alert.username
        - alert.anomaly_type
        - alert.risk_score
    timeout_seconds: 60
    on_failure: continue

  - id: check-risk-score
    name: Check UEBA Risk Score Threshold
    type: condition
    condition:
      field: alert.risk_score
      operator: gt
      value: 80
    next_true: escalate-to-hr
    next_false: notify-manager-security

  - id: escalate-to-hr
    name: Escalate to HR and Legal
    type: notify
    params:
      channel: email
      to: "{{ env.HR_SECURITY_EMAIL }}"
      subject: "CONFIDENTIAL: Suspected Insider Threat — {{ alert.username }}"
      message: |
        This is a confidential security notification.

        User: {{ alert.username }} ({{ alert.email }})
        Department: {{ alert.department }}
        Manager: {{ alert.manager }}
        Risk Score: {{ alert.risk_score }}
        Anomaly: {{ alert.anomaly_type }}
        Data transferred: {{ alert.bytes_transferred }} bytes

        Please review with Legal before any action.
        IR Case ID: {{ alert.id }}
    timeout_seconds: 30
    on_failure: continue

  - id: notify-manager-security
    name: Notify Security Manager
    type: notify
    params:
      channel: "#security-leadership"
      message: |
        🔍 *Insider Threat Alert*
        User: `{{ alert.username }}`
        Risk Score: `{{ alert.risk_score }}`
        Anomaly: `{{ alert.anomaly_type }}`
        Data: {{ alert.bytes_transferred }} bytes
        HR escalation: {{ steps.escalate-to-hr.status }}
    timeout_seconds: 20
    on_failure: continue

  - id: create-ticket
    name: Create Insider Threat Ticket
    type: create_ticket
    params:
      title: "INSIDER: {{ alert.username }} — {{ alert.anomaly_type }}"
      severity: P1
      assignee_group: ir-team
      tags:
        - insider-threat
        - confidential
    timeout_seconds: 30
    on_failure: continue

  - id: close-case
    name: Close Insider Threat Case
    type: close_case
    params:
      status: under-investigation
      resolution: "HR/Legal escalated; IR case created; full audit trail preserved."
    timeout_seconds: 15
    on_failure: continue
