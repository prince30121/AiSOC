id: mitre-car-car-2016-04-004
name: Successful Local Account Login
description: The successful use of [Pass The Hash](https://attack.mitre.org/techniques/T1550/002/)
  for lateral movement between workstations would trigger event ID 4624, with an event
  level of Information, from the security log. This behavior would be a LogonType
  of 3 using NTLM authentication where it is not a domain logon and not the ANONYMOUS
  LOGON account.
severity: medium
enabled: false
tags:
  mitre:
  - T1550
  categories:
  - endpoint
references: []
logsource:
  category: Login
detection:
  implementations:
  - name: ''
    type: pseudocode
    code: 'EventCode == 4624 and [target_user_name] != "ANONYMOUS LOGON" and

      [authentication_package_name] == "NTLM"

      '
