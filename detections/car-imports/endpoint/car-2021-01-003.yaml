id: mitre-car-car-2021-01-003
name: Clearing Windows Logs with Wevtutil
description: In an attempt to clear traces after compromising a machine, threat actors
  often try to clear Windows Event logs. This is often done using “wevtutil”, a legitimate
  tool provided by Microsoft. This action interferes with event collection and notification,
  and may lead to a security event going undetected, thereby potentially leading to
  further compromise of the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1070
  categories:
  - endpoint
references: []
logsource:
  category: Process
detection:
  implementations:
  - name: Splunk search - Detecting log clearing with wevtutil
    type: Splunk
    code: 'index=__your_sysmon_index__ sourcetype= __your__windows__sysmon__sourcetype
      EventCode=1 Image=*wevtutil* CommandLine=*cl* (CommandLine=*System* OR CommandLine=*Security*
      OR CommandLine=*Setup* OR CommandLine=*Application*)

      '
