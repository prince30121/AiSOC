id: mitre-car-car-2013-07-005
name: Command Line Usage of Archiving Software
description: 'Before [exfiltrating data](https://attack.mitre.org/tactics/TA0010)
  that an adversary has [collected](https://attack.mitre.org/tactics/TA0009), it is
  very likely that a [compressed archive](https://attack.mitre.org/techniques/T1560)
  will be created, so that transfer times are minimized and fewer files are transmitted.
  There is variety between the tools used to compress data, but the command line usage
  and context of archiving tools, such as ZIP, RAR, and 7ZIP, should be monitored.


  In addition to looking for RAR or 7z program names, command line usage of 7Zip or
  RAR can be detected with the flag usage of "`\* a \*`". This is helpful, as adversaries
  may change program names.'
severity: medium
enabled: false
tags:
  mitre:
  - T1560
  categories:
  - endpoint
references: []
logsource:
  category: Process
detection:
  implementations:
  - name: ''
    type: pseudocode
    code: 'processes = search Process:Create

      rar_argument = filter processes where (command_line == "* a *")

      output rar_argument

      '
  - name: ''
    type: DNIF
    code: '_fetch * from event where $LogName=WINDOWS-SYSMON AND $EventID=1 AND $Process=regex(.*
      a .*)i limit 100

      '
  - name: ''
    type: LogPoint
    code: 'norm_id=WindowsSysmon event_id=1 command="* a *"

      '
provenance:
  source: mitre-attack/car
