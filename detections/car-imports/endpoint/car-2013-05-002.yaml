id: mitre-car-car-2013-05-002
name: Suspicious Run Locations
description: 'In Windows, files should never execute out of certain directory locations.
  Any of these locations may exist for a variety of reasons, and executables may be
  present in the directory but should not execute. As a result, some defenders make
  the mistake of ignoring these directories and assuming that a process will never
  run from one. There are known TTPs that have taken advantage of this fact to go
  undetected. This fact should inform defenders to monitor these directories more
  closely, knowing that they should never contain running processes.


  Monitors the directories


  -   `*:\RECYCLER`

  -   `*:\SystemVolumeInformation`

  -   `%systemroot%\Tasks`

  -   `%systemroot%\debug`'
severity: medium
enabled: false
tags:
  mitre:
  - T1036
  categories:
  - endpoint
references: []
logsource:
  category: Process
detection:
  implementations:
  - name: ''
    type: pseudocode
    code: "processes = search Process:Create\nsuspicious_locations = filter process\
      \ where (\n image_path == \"*:\\RECYCLER\\*\" or\n image_path == \"*:\\SystemVolumeInformation\\\
      *\" or\n image_path == \"%windir%\\Tasks\\*\" or\n image_path == \"%systemroot%\\\
      debug\\*\"\n)\noutput suspicious_locations"
  - name: ''
    type: DNIF
    code: _fetch * from event where $LogName=WINDOWS-SYSMON AND $EventID=1 AND $Process=regex(.*(\:\\recycler\\|\:\\systemvolumeinformation\\|\%windir\%\\tasks\\|\%systemroot\%\\debug\\).*)i
      group count_unique $App limit 100
  - name: ''
    type: Sigma
    code: ''
  - name: ''
    type: LogPoint
    code: norm_id=WindowsSysmon event_id=1 image IN ["*:\RECYCLER\*", "*:\SystemVolumeInformation\*",
      "C:\Windows\Tasks\*", "C:\Windows\System32\debug\*"]
