id: mitre-car-car-2020-11-001
name: Boot or Logon Initialization Scripts
description: Adversaries may schedule software to run whenever a user logs into the
  system; this is done to establish persistence and sometimes for lateral movement.
  This trigger is established through the registry key HKEY_CURRENT_USER\Environment*UserInitMprLogonScript*.
  This signature looks edits to existing keys or creation of new keys in that path.
  Users purposefully adding benign scripts to this path will result in false positives;
  that case is rare, however. There are other ways of running a script at startup
  or login that are not covered in this signature. Note that this signature overlaps
  with the Windows Sysinternals Autoruns tool, which would also show changes to this
  registry path.
severity: medium
enabled: false
tags:
  mitre:
  - T1037
  categories:
  - endpoint
references: []
logsource:
  category: Registry,Process
detection:
  implementations:
  - name: Pseudocode - logon run script key added to registry using reg.exe on commandline,
      or new logon scipt keys in registry from any source.
    type: Pseudocode
    code: "processes = search Process:Create\nlogon_script_key_processes = filter\
      \ processes where (\n  command_line = \"*reg*add*\\Environment*UserInitMprLogonScript\"\
      )\nregistry = search (Registry:Add OR Registry:Edit)\nregistry_logon_key_events\
      \ = filter registry where (\n  key = \"*\\Environment*UserInitMprLogonScript\"\
      )\noutput (logon_script_key_processes, registry_logon_key_events)\n"
  - name: Splunk Search -- logon scripts
    type: Splunk
    code: '(index=__your_sysmon_index__ EventCode=1 Image="C:\\Windows\\System32\\reg.exe"
      CommandLine="*add*\\Environment*UserInitMprLogonScript") OR (index=__your_sysmon_index__
      (EventCode=12 OR EventCode=14 OR EventCode=13) TargetObject="*\\Environment*UserInitMprLogonScript")

      '
  - name: LogPoint Search -- logon scripts
    type: LogPoint
    code: 'norm_id=WindowsSysmon ((event_id=1 image="C:\Windows\System32\reg.exe"
      command="*add*\Environment*UserInitMprLogonScript") OR (event_id IN [12, 13,
      14] target_object="*\Environment*UserInitMprLogonScript"))

      '
