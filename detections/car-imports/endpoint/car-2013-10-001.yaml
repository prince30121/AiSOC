id: mitre-car-car-2013-10-001
name: User Login Activity Monitoring
description: 'Monitoring logon and logoff events for hosts on the network is very
  important for situational awareness. This information can be used as an indicator
  of unusual activity as well as to corroborate activity seen elsewhere.


  Could be applied to a number of different types of monitoring depending on what
  information is desired. Some use cases include monitoring for all remote connections
  and building login timelines for users.

  Logon events are Windows Event Code 4624 for Windows Vista and above, 518 for pre-Vista.
  Logoff events are 4634 for Windows Vista and above, 538 for pre-Vista.


  ### Output Description


  The time of login events for distinct users on individual systems'
severity: medium
enabled: false
tags:
  mitre:
  - T1021
  - T1078
  categories:
  - endpoint
references: []
logsource:
  category: Login,Netflow
detection:
  implementations:
  - name: Account Logon with Filtering
    type: Pseudocode
    code: "logon_events = search User_Session:Login\nfiltered_logons = filter logon_events\
      \ where (\n  user NOT IN TOP30(user))\noutput filtered_logons\n"
  - name: Account Logon with Filtering
    type: Splunk
    code: 'index=__your_win_event_log_index__ EventCode=4624|search NOT [search index=__your_win_event_log_index__
      EventCode=4624|top 30 Account_Name|table Account_Name]

      '
  - name: Account Logon with Filtering
    type: DNIF
    code: '_fetch * from event where $LogName=WINDOWS-NXLOG-AUDIT AND $SubSystem=AUTHENTICATION
      AND $Action=LOGIN group count_unique $ScopeID, $User limit 30

      >>_store in_disk david_test win_top_30 stack_replace

      >>_fetch * from event where $LogName=WINDOWS-NXLOG-AUDIT AND $SubSystem=AUTHENTICATION
      AND $Action=LOGIN limit 10000

      >>_checkif lookup david_test win_top_30 join $ScopeID = $ScopeID str_compare
      $User eq $User exclude

      '
