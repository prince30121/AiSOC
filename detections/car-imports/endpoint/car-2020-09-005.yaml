id: mitre-car-car-2020-09-005
name: AppInit DLLs
description: Adversaries may establish persistence and/or elevate privileges by executing
  malicious content triggered by AppInit DLLs loaded into processes. Dynamic-link
  libraries (DLLs) that are specified in the AppInit_DLLs value in the Registry keys
  `HKEY_LOCAL_MACHINE\Software\Microsoft\Windows NT\CurrentVersion\Windows` or `HKEY_LOCAL_MACHINE\Software\Wow6432Node\Microsoft\Windows
  NT\CurrentVersion\Windows` are loaded by user32.dll into every process that loads
  user32.dll. These values can be abused to obtain elevated privileges by causing
  a malicious DLL to be loaded and run in the context of separate processes. Accordingly,
  this analytic looks for modifications to these registry keys that may be indicative
  of this type of abuse.
severity: medium
enabled: false
tags:
  mitre:
  - T1546
  categories:
  - endpoint
references: []
logsource:
  category: Registry
detection:
  implementations:
  - name: Pseudocode - AppInit DLL registry modification
    type: Pseudocode
    code: "registry_keys = search (Registry:Create AND Registry:Remove AND Registry:Edit)\n\
      appinit_keys = filter registry_keys where (\n  key = \"*\\SOFTWARE\\Microsoft\\\
      Windows NT\\CurrentVersion\\Windows\\Appinit_Dlls\\*\" OR\n  key = \"*\\SOFTWARE\\\
      \\Wow6432Node\\Microsoft\\Windows NT\\CurrentVersion\\Windows\\Appinit_Dlls\\\
      *\"\"\n  )\noutput clsid_keys\n"
  - name: Splunk search - AppInit DLL registry modification
    type: Splunk
    code: 'index=__your_sysmon_index__ (EventCode=12 OR EventCode=13 OR EventCode=14)
      (TargetObject="*\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Windows\\Appinit_Dlls\\*"
      OR TargetObject="*\\SOFTWARE\\Wow6432Node\\Microsoft\\Windows NT\\CurrentVersion\\Windows\\Appinit_Dlls\\*")

      '
  - name: LogPoint search - AppInit DLL registry modification
    type: LogPoint
    code: 'norm_id=WindowsSysmon event_id IN [12, 13, 14] target_object IN ["*\SOFTWARE\Microsoft\Windows
      NT\CurrentVersion\Windows\Appinit_Dlls\*", "*\SOFTWARE\Wow6432Node\Microsoft\Windows
      NT\CurrentVersion\Windows\Appinit_Dlls\*"]

      '
