id: mitre-car-car-2020-11-004
name: Processes Started From Irregular Parent
description: Adversaries may start legitimate processes and then use their memory
  space to run malicious code. This analytic looks for common Windows processes that
  have been abused this way in the past; when the processes are started for this purpose
  they may not have the standard parent that we would expect. This list is not exhaustive,
  and it is possible for cyber actors to avoid this discepency. These signatures only
  work if Sysmon reports the parent process, which may not always be the case if the
  parent dies before sysmon processes the event.
severity: medium
enabled: false
tags:
  mitre:
  - T1055
  categories:
  - endpoint
references: []
logsource:
  category: Process
detection:
  implementations:
  - name: Pseudocode - common processes that do not have the correct parent
    type: Pseudocode
    code: "processes = search Process:Create\nmismatch_processes = filter processes\
      \ where ( parent_exe exists AND\n  (exe=\"smss.exe\" AND (parent_exe!=\"smss.exe\"\
      \ AND parent_exe!=\"System\") OR\n  (exe=\"csrss.exe\" AND (parent_exe!=\"smss.exe\"\
      \ AND parent_exe!=\"svchost.exe\")) OR\n  (exe=\"wininit.exe\" AND parent_exe!=\"\
      smss.exe\") OR\n  (exe=\"winlogon.exe\" AND parent_exe!=\"smss.exe\") OR\n \
      \ (exe=\"lsass.exe\" AND (parent_exe!=\"wininit.exe\" AND parent_exe!=\"winlogon.exe\"\
      )) OR\n  (exe=\"LogonUI.exe\" AND (parent_exe!=\"winlogon.exe\" AND parent_exe!=\"\
      wininit.exe\")) OR\n  (exe=\"services.exe\" AND parent_exe!=\"wininit.exe\"\
      ) OR\n  (exe=\"spoolsv.exe\" AND parent_exe!=\"services.exe\") OR\n  (exe=\"\
      taskhost.exe\" AND (parent_exe!=\"services.exe\" AND parent_exe!=\"svchost.exe\"\
      )) OR\n  (exe=\"taskhostw.exe\" AND (parent_exe!=\"services.exe\" AND parent_exe!=\"\
      svchost.exe\")) OR\n  (exe=\"userinit.exe\" AND (parent_exe!=\"dwm.exe\" AND\
      \ parent_exe!=\"winlogon.exe\"))\noutput mismatch_processes\n"
  - name: Splunk Search - parent/child mismatch
    type: Splunk
    code: '(index=__your_sysmon_index__ EventCode=1) AND ParentImage!="?" AND ParentImage!="C:\\Program
      Files\\SplunkUniversalForwarder\\bin\\splunk-regmon.exe" AND ParentImage!="C:\\Program
      Files\\SplunkUniversalForwarder\\bin\\splunk-powershell.exe" AND

      ((Image="C:\\Windows\System32\\smss.exe" AND (ParentImage!="C:\\Windows\\System32\\smss.exe"
      AND ParentImage!="System")) OR

      (Image="C:\\Windows\\System32\\csrss.exe" AND (ParentImage!="C:\\Windows\\System32\\smss.exe"
      AND ParentImage!="C:\\Windows\\System32\\svchost.exe")) OR

      (Image="C:\\Windows\\System32\\wininit.exe" AND ParentImage!="C:\\Windows\\System32\\smss.exe")
      OR

      (Image="C:\\Windows\\System32\\winlogon.exe" AND ParentImage!="C:\\Windows\\System32\\smss.exe")
      OR

      (Image="C:\\Windows\\System32\\lsass.exe" and ParentImage!="C:\\Windows\\System32\\wininit.exe")
      OR

      (Image="C:\\Windows\\System32\\LogonUI.exe" AND (ParentImage!="C:\\Windows\\System32\\winlogon.exe"
      AND ParentImage!="C:\\Windows\\System32\\wininit.exe")) OR

      (Image="C:\\Windows\\System32\\services.exe" AND ParentImage!="C:\\Windows\\System32\\wininit.exe")
      OR

      (Image="C:\\Windows\\System32\\spoolsv.exe" AND ParentImage!="C:\\Windows\\System32\\services.exe")
      OR

      (Image="C:\\Windows\\System32\\taskhost.exe" AND (ParentImage!="C:\\Windows\\System32\\services.exe"
      AND ParentImage!="C:\\Windows\\System32\\svchost.exe")) OR

      (Image="C:\\Windows\\System32\\taskhostw.exe" AND (ParentImage!="C:\\Windows\\System32\\services.exe"
      AND ParentImage!="C:\\Windows\\System32\\svchost.exe")) OR

      (Image="C:\\Windows\System32\\userinit.exe" AND (ParentImage!="C:\\Windows\\System32\\dwm.exe"
      AND ParentImage!="C:\\Windows\\System32\\winlogon.exe")))

      '
  - name: LogPoint Search - parent/child mismatch
    type: LogPoint
    code: 'norm_id=WindowsSysmon event_id=1 -parent_image="?" ((image="*\smss.exe"
      (-parent_image="*\smss.exe" -parent_image="*\System")) OR

      (image="*\csrss.exe" (-parent_image="*\smss.exe" -parent_image="*\svchost.exe"))
      OR (image="*\wininit.exe" -parent_image="*\smss.exe") OR

      (image="*\winlogon.exe" -parent_image="*\smss.exe") OR (image="*\lsass.exe"  (-parent_image="*\wininit.exe"  -parent_image="*\winlogon.exe"))
      OR

      (image="*\LogonUI.exe"  (-parent_image="*\winlogon.exe"  -parent_image="*\wininit.exe"))
      OR (image="*\services.exe"  -parent_image="*\wininit.exe") OR

      (image="*\spoolsv.exe"  -parent_image="*\services.exe") OR (image="*\taskhost.exe"  (-parent_image="*\services.exe"  -parent_image="*\svchost.exe"))
      OR

      (image="*\taskhostw.exe"  (-parent_image="*\services.exe"  -parent_image="*\svchost.exe"))
      OR

      (image="*\userinit.exe"  (-parent_image="*\dwm.exe"  -parent_image="*\winlogon.exe")))

      '
