id: mitre-car-car-2014-03-006
name: RunDLL32.exe monitoring
description: Adversaries may find it necessary to use [Dyanamic-link Libraries](https://msdn.microsoft.com/en-us/library/windows/desktop/ms682589.aspx)
  (DLLs) to [evade defenses](https://attack.mitre.org/tactics/TA0005). One way these
  DLLs can be "executed" is through the use of the built-in Windows utility [RunDLL32](https://attack.mitre.org/techniques/T1218.011),
  which allows a user to execute code in a DLL, providing the name and optional arguments
  to an exported entry point. Windows uses RunDll32 legitimately in its normal operation,
  but with a proper baseline and understanding of the environment, monitoring its
  usage could be fruitful.
severity: medium
enabled: false
tags:
  mitre:
  - T1218
  categories:
  - endpoint
references: []
logsource:
  category: Process
detection:
  implementations:
  - name: ''
    type: pseudocode
    code: 'process = search Process:Create

      rundll32 = filter process where (exe == "rundll32.exe")

      output rundll32'
  - name: ''
    type: DNIF
    code: _fetch * from event where $LogName=WINDOWS-SYSMON AND $EventID=1 AND $App=rundll32.exe
      limit 100
  - name: ''
    type: LogPoint
    code: norm_id=WindowsSysmon event_id=1 image="*\rundll32.exe"
provenance:
  source: mitre-attack/car
