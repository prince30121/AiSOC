id: det-application-035
name: GraphQL Query With Excessive Recursion Depth
description: AiSOC v1 curated detection. Triggers on the application signal described by 'GraphQL Query
  With Excessive Recursion Depth'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1499
- tlp.white
category: application
log_source:
  product: api-gateway
  service: http
detection:
  condition: |
    event_type == "http_request"
    AND uri == "/graphql"
    AND query_depth > 10
false_positives:
- Sanctioned bulk export
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
