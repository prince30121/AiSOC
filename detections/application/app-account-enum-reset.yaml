id: det-application-040
name: High Volume Of Password Reset Requests From Single IP
description: AiSOC v1 curated detection. Triggers on the application signal described by 'High Volume
  Of Password Reset Requests From Single IP'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1110
- tlp.white
category: application
log_source:
  product: application
  service: auth
detection:
  condition: |
    event_type == "password_reset_request"
    AND count_5min_per_ip > 30
false_positives:
- Internal load test
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
