id: det-application-069
name: SharePoint Tenant-Wide Guest Access Enabled
description: AiSOC v1 curated detection. Triggers on the application signal described by 'SharePoint Tenant-Wide
  Guest Access Enabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- tlp.white
category: application
log_source:
  product: m365
  service: audit
detection:
  condition: |
    event_type == "TenantSettingChanged"
    AND setting == "SharingCapability"
    AND value == "ExternalUserSharingOnly"
false_positives:
- Approved tenant-level policy update
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
