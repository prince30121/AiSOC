id: det-application-034
name: GraphQL Introspection Query Against Production
description: AiSOC v1 curated detection. Triggers on the application signal described by 'GraphQL Introspection
  Query Against Production'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1213
- tlp.white
category: application
log_source:
  product: api-gateway
  service: http
detection:
  condition: |
    event_type == "http_request"
    AND uri == "/graphql"
    AND body CONTAINS "__schema"
    AND environment == "prod"
false_positives:
- Approved schema documentation generator
playbook: tpl-discovery
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
