id: det-application-063
name: Notion Workspace Exported By Non-Admin
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Notion Workspace
  Exported By Non-Admin'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1530
- tlp.white
category: application
log_source:
  product: notion
  service: audit
detection:
  condition: |
    event_type == "workspace.export"
    AND actor_is_admin == false
false_positives:
- Approved knowledge migration
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
