id: det-application-036
name: JNDI LDAP Lookup Pattern (Log4Shell-Style)
description: AiSOC v1 curated detection. Triggers on the application signal described by 'JNDI LDAP Lookup
  Pattern (Log4Shell-Style)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1190
- tlp.white
category: application
log_source:
  product: waf
  service: http
detection:
  condition: |
    event_type == "http_request"
    AND any_header_value CONTAINS_ANY ["${jndi:ldap://", "${jndi:rmi://", "${jndi:dns://"]
false_positives:
- Authorised red-team or penetration test
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
