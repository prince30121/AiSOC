id: det-application-064
name: Confluence Bulk Space Export
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Confluence Bulk
  Space Export'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1530
- tlp.white
category: application
log_source:
  product: confluence
  service: audit
detection:
  condition: |
    event_type == "space.export"
    AND size_bytes > 524288000
false_positives:
- Approved knowledge migration
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
