id: det-application-051
name: Newly Created Secret Has Slack Webhook Pattern
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Newly Created
  Secret Has Slack Webhook Pattern'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078
- tlp.white
category: application
log_source:
  product: vault
  service: secrets
detection:
  condition: |
    event_type == "secret_create"
    AND value CONTAINS "hooks.slack.com/services/"
false_positives:
- Approved alerting webhook
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
