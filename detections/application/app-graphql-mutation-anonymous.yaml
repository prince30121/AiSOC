id: det-application-070
name: GraphQL Mutation Executed By Anonymous Caller
description: AiSOC v1 curated detection. Triggers on the application signal described by 'GraphQL Mutation
  Executed By Anonymous Caller'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1190
- tlp.white
category: application
log_source:
  product: api-gateway
  service: http
detection:
  condition: |
    event_type == "graphql_op"
    AND op_type == "mutation"
    AND actor_authenticated == false
false_positives:
- 'Public mutation endpoint (allow-listed: subscribe / contact)'
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
