id: det-application-062
name: Box Created Many Public Links In Short Window
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Box Created
  Many Public Links In Short Window'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1567.002
- tlp.white
category: application
log_source:
  product: box
  service: audit
detection:
  condition: |
    event_type == "shared_link.create"
    AND access == "open"
    AND count_5min_per_user > 20
false_positives:
- Marketing campaign content drop
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
