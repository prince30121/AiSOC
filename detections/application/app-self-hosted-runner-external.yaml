id: det-application-047
name: Self-Hosted Runner Registered From External IP
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Self-Hosted
  Runner Registered From External IP'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1199
- tlp.white
category: application
log_source:
  product: github
  service: actions
detection:
  condition: |
    event_type == "runner_register"
    AND ip_is_internal == false
false_positives:
- Approved partner-hosted runner
playbook: tpl-supply-chain
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
