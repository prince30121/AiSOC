id: det-application-058
name: Salesforce Mass Data Export Initiated
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Salesforce Mass
  Data Export Initiated'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1530
- tlp.white
category: application
log_source:
  product: salesforce
  service: audit
detection:
  condition: |
    event_type == "DataExport"
    AND row_count > 100000
false_positives:
- Approved data migration
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
