id: det-application-046
name: CI Workflow Modified By Account Without CODEOWNER Approval
description: AiSOC v1 curated detection. Triggers on the application signal described by 'CI Workflow
  Modified By Account Without CODEOWNER Approval'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1199
- tlp.white
category: application
log_source:
  product: github
  service: repo
detection:
  condition: |
    event_type == "push"
    AND path CONTAINS ".github/workflows/"
    AND approver_role_neq == "codeowner"
false_positives:
- Bootstrap of new repository
playbook: tpl-supply-chain
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
