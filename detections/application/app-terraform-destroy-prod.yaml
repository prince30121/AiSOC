id: det-application-050
name: terraform destroy Run Targeting Production Workspace
description: AiSOC v1 curated detection. Triggers on the application signal described by 'terraform destroy
  Run Targeting Production Workspace'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1485
- tlp.white
category: application
log_source:
  product: terraform
  service: cli
detection:
  condition: |
    event_type == "terraform_run"
    AND command == "destroy"
    AND workspace IN ["prod", "production"]
false_positives:
- Authorised infra teardown
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
