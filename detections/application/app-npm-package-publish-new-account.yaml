id: det-application-053
name: NPM Package Published From New Account
description: AiSOC v1 curated detection. Triggers on the application signal described by 'NPM Package
  Published From New Account'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1195.002
- tlp.white
category: application
log_source:
  product: npm
  service: registry
detection:
  condition: |
    event_type == "package_publish"
    AND publisher_account_age_days < 14
    AND package_visibility == "public"
false_positives:
- New maintainer onboarding
playbook: tpl-supply-chain
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
