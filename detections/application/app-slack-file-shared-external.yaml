id: det-application-066
name: Slack File Shared To External Channel
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Slack File Shared
  To External Channel'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1567.002
- tlp.white
category: application
log_source:
  product: slack
  service: audit
detection:
  condition: |
    event_type == "file_shared"
    AND channel_type == "external"
false_positives:
- Approved partner connect channel
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
