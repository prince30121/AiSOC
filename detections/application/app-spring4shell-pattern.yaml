id: det-application-037
name: Spring4Shell Class Loader Manipulation Pattern
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Spring4Shell
  Class Loader Manipulation Pattern'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1190
- tlp.white
category: application
log_source:
  product: waf
  service: http
detection:
  condition: |
    event_type == "http_request"
    AND body CONTAINS_ANY ["class.module.classloader", "class.classLoader"]
false_positives:
- Authorised red-team or penetration test
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
