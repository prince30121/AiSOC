id: det-application-032
name: XML External Entity Reference In Request Body
description: AiSOC v1 curated detection. Triggers on the application signal described by 'XML External
  Entity Reference In Request Body'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1190
- tlp.white
category: application
log_source:
  product: waf
  service: http
detection:
  condition: |
    event_type == "http_request"
    AND body CONTAINS_ANY ["<!ENTITY", "SYSTEM "file://", "SYSTEM "http://"]
false_positives:
- Approved XML SOAP integration
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
