id: det-application-068
name: OneDrive Anonymous Sharing Link Created For Sensitive File
description: AiSOC v1 curated detection. Triggers on the application signal described by 'OneDrive Anonymous
  Sharing Link Created For Sensitive File'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1567.002
- tlp.white
category: application
log_source:
  product: m365
  service: audit
detection:
  condition: |
    event_type == "AnonymousLinkCreated"
    AND sensitivity_label IN ["Confidential", "Highly Confidential"]
false_positives:
- Approved external review
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
