id: det-application-039
name: Session Cookie Failed HMAC Verification
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Session Cookie
  Failed HMAC Verification'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1185
- tlp.white
category: application
log_source:
  product: application
  service: auth
detection:
  condition: |
    event_type == "session_validate"
    AND hmac_valid == false
false_positives:
- Stale cookie after key rotation
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
