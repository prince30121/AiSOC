id: det-application-054
name: PyPI Package Published From New IP
description: AiSOC v1 curated detection. Triggers on the application signal described by 'PyPI Package
  Published From New IP'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1195.002
- tlp.white
category: application
log_source:
  product: pypi
  service: registry
detection:
  condition: |
    event_type == "package_publish"
    AND publisher_ip_seen_before == false
false_positives:
- New maintainer onboarding
playbook: tpl-supply-chain
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
