id: det-application-045
name: Content-Security-Policy Header Removed From Production Response
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Content-Security-Policy
  Header Removed From Production Response'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1190
- tlp.white
category: application
log_source:
  product: application
  service: http
detection:
  condition: |
    event_type == "http_response"
    AND csp_header_present == false
    AND environment == "prod"
false_positives:
- Public marketing pages exempt from CSP
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
