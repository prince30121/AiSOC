id: det-application-061
name: Zoom Cloud Recording Shared Externally
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Zoom Cloud Recording
  Shared Externally'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1530
- tlp.white
category: application
log_source:
  product: zoom
  service: audit
detection:
  condition: |
    event_type == "recording_share"
    AND share_type == "external"
false_positives:
- Customer-facing webinar recording
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
