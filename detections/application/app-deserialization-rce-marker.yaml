id: det-application-038
name: Java/.NET Deserialization Marker In Body
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Java/.NET Deserialization
  Marker In Body'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1059
- tlp.white
category: application
log_source:
  product: waf
  service: http
detection:
  condition: |
    event_type == "http_request"
    AND body CONTAINS_ANY ["rO0AB", "AAEAAAD/////AQAAAAAAAAAM", "TypeObject"]
false_positives:
- Inter-service signed payload (allow-listed)
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
