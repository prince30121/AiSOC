id: det-application-044
name: CORS Response With Wildcard Origin And Credentials Allowed
description: AiSOC v1 curated detection. Triggers on the application signal described by 'CORS Response
  With Wildcard Origin And Credentials Allowed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1190
- tlp.white
category: application
log_source:
  product: application
  service: http
detection:
  condition: |
    event_type == "http_response"
    AND header_access_control_allow_origin == "*"
    AND header_access_control_allow_credentials == "true"
false_positives:
- Public unauthenticated API
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
