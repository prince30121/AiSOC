id: det-application-049
name: Helm Install From Unknown Chart Repository
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Helm Install
  From Unknown Chart Repository'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1195.002
- tlp.white
category: application
log_source:
  product: kubernetes
  service: helm
detection:
  condition: |
    event_type == "helm_install"
    AND repo_url_endswith_in_allow_list == false
false_positives:
- Pilot of new vendor chart
playbook: tpl-supply-chain
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
