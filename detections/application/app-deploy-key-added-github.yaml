id: det-application-052
name: SSH Deploy Key Added To GitHub Repository
description: AiSOC v1 curated detection. Triggers on the application signal described by 'SSH Deploy Key
  Added To GitHub Repository'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1098.004
- tlp.white
category: application
log_source:
  product: github
  service: repo
detection:
  condition: |
    event_type == "deploy_key.create"
false_positives:
- Sanctioned automation onboarding
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
