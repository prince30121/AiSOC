id: det-application-048
name: Build Artifact Signing Key Rotated Outside Maintenance Window
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Build Artifact
  Signing Key Rotated Outside Maintenance Window'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1554
- tlp.white
category: application
log_source:
  product: ci
  service: signing
detection:
  condition: |
    event_type == "key_rotation"
    AND in_change_window == false
false_positives:
- Emergency key rotation (must be ticketed)
playbook: tpl-supply-chain
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
