id: det-application-059
name: Salesforce Sandbox Refreshed Outside Change Window
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Salesforce Sandbox
  Refreshed Outside Change Window'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1199
- tlp.white
category: application
log_source:
  product: salesforce
  service: audit
detection:
  condition: |
    event_type == "SandboxRefresh"
    AND in_change_window == false
false_positives:
- Emergency sandbox refresh (must be ticketed)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
