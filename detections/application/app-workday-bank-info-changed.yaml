id: det-application-060
name: Workday Banking Info Changed Without HR Ticket
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Workday Banking
  Info Changed Without HR Ticket'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: application
log_source:
  product: workday
  service: audit
detection:
  condition: |
    event_type == "BankAccountChange"
    AND linked_ticket == false
false_positives:
- Self-service change with valid step-up auth
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
