id: splunk-security-content-7b4c9f3e-5a88-4b7b-9c4b-94d8e5d67201
name: Cisco ASA - Logging Disabled via CLI
description: 'This analytic detects the disabling of logging functionality on a Cisco
  ASA device

  through CLI commands. Adversaries or malicious insiders may attempt to disable logging

  to evade detection and hide malicious activity. The detection looks for specific
  ASA

  syslog message IDs (111010, 111008) associated with command execution,

  combined with suspicious commands such as `no logging`, `logging disable`,

  `clear logging`, or `no logging host`. Disabling logging on a firewall or security
  device

  is a strong indicator of defense evasion.'
severity: medium
enabled: false
tags:
  mitre:
  - T1562
  categories:
  - application
references:
- https://www.cisco.com/site/us/en/products/security/firewalls/adaptive-security-appliance-asa-software/index.html
- https://sec.cloudapps.cisco.com/security/center/resources/asa_ftd_continued_attacks
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_asa`\nmessage_id IN (111008, 111010)\ncommand IN (\n    \"*no\
    \ logging*\",\n    \"*logging disable*\",\n    \"*clear logging*\",\n    \"*no\
    \ logging host*\",\n    \"*no logging trap*\"\n)\n| stats earliest(_time) as firstTime\n\
    \        latest(_time) as lastTime\n        values(user) as user\n        values(action)\
    \ as action\n        values(message_id) as message_id\n        values(command)\
    \ as command\n        values(src_ip) as src_ip\n        values(process_name) as\
    \ process_name\n  by host\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `cisco_asa___logging_disabled_via_cli_filter`"
provenance:
