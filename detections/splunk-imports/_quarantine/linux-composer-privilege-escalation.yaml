id: splunk-security-content-a3bddf71-6ba3-42ab-a6b2-396929b16d92
name: Linux Composer Privilege Escalation
description: The following analytic detects the execution of the Composer tool with
  elevated privileges on a Linux system. It identifies instances where Composer is
  run with the 'sudo' command, allowing the user to execute system commands as root.
  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process execution logs and command-line arguments. This activity is
  significant because it can indicate an attempt to escalate privileges, potentially
  leading to unauthorized root access. If confirmed malicious, an attacker could gain
  full control over the system, execute arbitrary commands, and compromise sensitive
  data.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/composer/
- https://getcomposer.org/doc/00-intro.md
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *composer*\"\n    AND\n    Processes.process=\"*run-script*\"\n    AND\n    Processes.process=\"\
    *sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_composer_privilege_escalation_filter`"
