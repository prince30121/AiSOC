id: splunk-security-content-aa4f695a-3024-11ec-9987-acde48001122
name: Disable Defender AntiVirus Registry
description: The following analytic detects the modification of Windows Defender registry
  settings to disable antivirus and antispyware protections. It leverages data from
  the Endpoint.Registry data model, specifically monitoring changes to registry paths
  associated with Windows Defender policies. This activity is significant because
  disabling antivirus protections is a common tactic used by adversaries to evade
  detection and maintain persistence on compromised systems. If confirmed malicious,
  this action could allow attackers to execute further malicious activities undetected,
  leading to potential data breaches, system compromise, and further propagation of
  malware within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://thedfirreport.com/2021/10/18/icedid-to-xinglocker-ransomware-in-24-hours/
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime FROM datamodel=Endpoint.Registry WHERE (Registry.registry_path
    = "*\\Policies\\Microsoft\\Windows Defender*" Registry.registry_value_name IN
    ("DisableAntiSpyware","DisableAntiVirus") Registry.registry_value_data = 0x00000001)
    by Registry.action Registry.dest Registry.process_guid Registry.process_id Registry.registry_hive
    Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)` | where isnotnull(registry_value_data)
    | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `disable_defender_antivirus_registry_filter`'
provenance:
