id: splunk-security-content-729aab57-d26f-4156-b97f-ab8dda8f44b1
name: Linux Deletion Of Init Daemon Script
description: The following analytic detects the deletion of init daemon scripts on
  a Linux machine. It leverages filesystem event logs to identify when files within
  the /etc/init.d/ directory are deleted. This activity is significant because init
  daemon scripts control the start and stop of critical services, and their deletion
  can indicate an attempt to impair security features or evade defenses. If confirmed
  malicious, this behavior could allow an attacker to disrupt essential services,
  execute destructive payloads, or persist undetected in the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1070.004
  - T1485
  categories:
  - endpoint
references:
- https://www.sentinelone.com/labs/acidrain-a-modem-wiper-rains-down-on-europe/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE Filesystem.action=deleted\
    \ Filesystem.file_path IN ( \"/etc/init.d/*\")\n  BY Filesystem.action Filesystem.dest\
    \ Filesystem.file_access_time\n     Filesystem.file_create_time Filesystem.file_hash\
    \ Filesystem.file_modify_time\n     Filesystem.file_name Filesystem.file_path\
    \ Filesystem.file_acl\n     Filesystem.file_size Filesystem.process_guid Filesystem.process_id\n\
    \     Filesystem.user Filesystem.vendor_product\n| `drop_dm_object_name(Filesystem)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_deletion_of_init_daemon_script_filter`"
