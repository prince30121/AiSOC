id: splunk-security-content-10399c1e-f51e-11eb-b920-acde48001122
name: Create Remote Thread In Shell Application
description: The following analytic detects suspicious process injection in command
  shell applications, specifically targeting `cmd.exe` and `powershell.exe`. It leverages
  Sysmon EventCode 8 to identify the creation of remote threads within these shell
  processes. This activity is significant because it is a common technique used by
  malware, such as IcedID, to inject malicious code and execute it within legitimate
  processes. If confirmed malicious, this behavior could allow an attacker to execute
  arbitrary code, escalate privileges, or maintain persistence within the environment,
  posing a severe threat to system security.
severity: medium
enabled: false
tags:
  mitre:
  - T1055
  categories:
  - endpoint
references:
- https://thedfirreport.com/2021/07/19/icedid-and-cobalt-strike-vs-antivirus/
logsource:
  product: splunk
detection:
  splunk_spl: '`sysmon` EventCode=8 TargetImage IN ("*\\cmd.exe", "*\\powershell*",
    "*\\pwsh.exe") | stats count min(_time) as firstTime max(_time) as lastTime by
    EventID Guid NewThreadId ProcessID SecurityID SourceImage SourceProcessGuid SourceProcessId
    StartAddress StartFunction StartModule TargetImage TargetProcessGuid TargetProcessId
    UserID dest parent_process_exec parent_process_guid parent_process_id parent_process_name
    parent_process_path process_exec process_guid process_id process_name process_path
    signature signature_id user_id vendor_product | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `create_remote_thread_in_shell_application_filter`'
