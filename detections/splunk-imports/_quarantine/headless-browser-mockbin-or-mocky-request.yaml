id: splunk-security-content-94fc85a1-e55b-4265-95e1-4b66730e05c0
name: Headless Browser Mockbin or Mocky Request
description: The following analytic detects headless browser activity accessing mockbin.org
  or mocky.io. It identifies processes with the "--headless" and "--disable-gpu" command
  line arguments, along with references to mockbin.org or mocky.io. This behavior
  is significant as headless browsers are often used for automated tasks, including
  malicious activities like web scraping or automated attacks. If confirmed malicious,
  this activity could indicate an attempt to bypass traditional browser security measures,
  potentially leading to data exfiltration or further exploitation of web applications.
severity: medium
enabled: false
tags:
  mitre:
  - T1564.003
  categories:
  - endpoint
references:
- https://mockbin.org/
- https://www.mocky.io/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process=\"*--headless*\"\n        AND\n        Processes.process=\"\
    *--disable-gpu*\"\n        AND\n        (Processes.process=\"*mockbin.org/*\"\n\
    \        OR\n        Processes.process=\"*mocky.io/*\")\n    )\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `headless_browser_mockbin_or_mocky_request_filter`"
provenance:
