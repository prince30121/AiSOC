id: splunk-security-content-fddf3b56-7933-11ec-98a6-acde48001122
name: Windows DotNet Binary in Non Standard Path
description: 'The following analytic detects the execution of native .NET binaries
  from non-standard directories within the Windows operating system.

  It leverages Endpoint Detection and Response (EDR) telemetry, comparing process
  names and original file names against a predefined lookup "is_net_windows_file".

  This activity is significant because adversaries may move .NET binaries to unconventional
  paths to evade detection and execute malicious code.

  If confirmed malicious, this behavior could allow attackers to execute arbitrary
  code, escalate privileges, or maintain persistence within the environment, posing
  a significant security risk.

  Also this analytic leverages a sub-search to enhance performance. sub-searches have
  limitations on the amount of data they can return. Keep this in mind if you have
  an extensive list of ransomware note file names.'
severity: medium
enabled: false
tags:
  mitre:
  - T1036.003
  - T1218.004
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1036.003/T1036.003.yaml
- https://attack.mitre.org/techniques/T1036/003/
- https://www.microsoft.com/security/blog/2022/01/15/destructive-malware-targeting-ukrainian-organizations/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218.004/T1218.004.md
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime\nFROM datamodel=Endpoint.Processes where\nNOT Processes.process_path\
    \ IN (\n      \"*:\\\\Windows\\\\ADWS\\\\*\",\n      \"*:\\\\Windows\\\\Microsoft.NET\\\
    \\*\",\n      \"*:\\\\Windows\\\\NetworkController\\\\*\",\n      \"*:\\\\Windows\\\
    \\System32\\\\*\",\n      \"*:\\\\Windows\\\\SystemApps\\\\*\",\n      \"*:\\\\\
    Windows\\\\SysWOW64\\\\*\",\n      \"*:\\\\Windows\\\\WinSxS\\\\*\"\n    )\n(\n\
    \  [ | inputlookup is_net_windows_file\n    | search netFile=true\n    | fields\
    \ originalFileName\n    | rename originalFileName as Processes.original_file_name\n\
    \    | format\n  ]\n)\nby Processes.action Processes.dest Processes.original_file_name\
    \ Processes.parent_process\n   Processes.parent_process_exec Processes.parent_process_guid\
    \ Processes.parent_process_id\n   Processes.parent_process_name Processes.parent_process_path\
    \ Processes.process Processes.process_exec\n   Processes.process_guid Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n   Processes.process_name\
    \ Processes.process_path Processes.user Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(\"Processes\")`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| lookup update=true is_net_windows_file\
    \ filename as process_name OUTPUT netFile\n| lookup update=true is_net_windows_file\
    \ originalFileName as original_file_name OUTPUT netFile\n| search netFile=true\n\
    | `windows_dotnet_binary_in_non_standard_path_filter`"
