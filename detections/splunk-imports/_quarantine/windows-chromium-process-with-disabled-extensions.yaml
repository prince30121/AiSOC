id: splunk-security-content-ce245717-779b-483b-bc52-fc7a94729973
name: Windows Chromium Process with Disabled Extensions
description: The following analytic detects instances of Chromium-based browser processes
  on Windows launched with extensions explicitly disabled via command-line arguments.
  Disabling extensions can be used by automation frameworks, testing tools, or headless
  browser activity, but may also indicate defense evasion or abuse of browser functionality
  by malicious scripts or malware. This behavior reduces browser visibility and bypasses
  user-installed security extensions, making it relevant for detecting non-interactive
  execution, suspicious automation, or living-off-the-land techniques. Analysts should
  validate execution context, parent process, and command-line parameters to determine
  legitimacy.
severity: medium
enabled: false
tags:
  mitre:
  - T1497
  categories:
  - endpoint
references:
- https://www.trendmicro.com/en_us/research/26/a/analysis-of-the-evelyn-stealer-campaign.html
- https://peter.sh/experiments/chromium-command-line-switches/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` min(_time) as firstTime max(_time)\n\
    as lastTime from datamodel=Endpoint.Processes\nwhere Processes.process_name IN\
    \ (\"Chrome.exe\",\"Brave.exe\", \"Opera.exe\", \"Vivaldi.exe\", \"msedge.exe\"\
    )\nProcesses.process = \"*--disable-extensions*\"\nby Processes.action Processes.dest\
    \ Processes.original_file_name Processes.parent_process\n   Processes.parent_process_exec\
    \ Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path Processes.process Processes.process_exec\n   Processes.process_guid\
    \ Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \   Processes.process_name Processes.process_path Processes.user Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_chromium_process_with_disabled_extensions_filter`"
