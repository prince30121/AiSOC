id: splunk-security-content-1d38e5e9-2ff8-4c47-872c-bf1657cefab5
name: Windows Svchost.exe Parent Process Anomaly
description: The following analytic detects an anomaly where an svchost.exe process
  is spawned by a parent process other than the standard services.exe. In a typical
  Windows environment, svchost.exe is a system process that hosts Windows service
  DLLs, and is expected to be a child of services.exe. A process deviation from this
  hierarchy may indicate suspicious behavior, such as malicious code attempting to
  masquerade as a legitimate system process or evade detection. It is essential to
  investigate the parent process and associated behavior for further signs of compromise
  or unauthorized activity.
severity: medium
enabled: false
tags:
  mitre:
  - T1036.009
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1036/009/
- https://www.trendmicro.com/en_nl/research/24/k/earth-estries.html
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime from datamodel=Endpoint.Processes where Processes.parent_process_name
    != "services.exe" AND Processes.process_name = "svchost.exe" AND Processes.process
    != unknown AND Processes.parent_process_path != "C:\\ProgramData\\Microsoft\\Windows
    Defender\\Platform\\*\\MsMpEng.exe" AND Processes.parent_process_path != "C:\\Program
    Files\\Windows Defender\\MsMpEng.exe" by Processes.action Processes.dest Processes.original_file_name
    Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid
    Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path
    Processes.process Processes.process_exec Processes.process_guid Processes.process_hash
    Processes.process_id Processes.process_integrity_level Processes.process_name
    Processes.process_path Processes.user Processes.user_id Processes.vendor_product
    | `drop_dm_object_name(Processes)` | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
    | `windows_svchost_exe_parent_process_anomaly_filter`'
