id: splunk-security-content-8be88f46-f7e8-4ae6-b15e-cf1b13392834
name: Linux Auditd Possible Access To Sudoers File
description: 'The following analytic detects potential access or modification of the
  /etc/sudoers file on a Linux system.

  It leverages data from Linux Auditd, focusing on events of type PATH or CWD.

  This activity could be significant because the sudoers file controls user permissions
  for executing commands with elevated privileges.

  Correlate this with related EXECVE or PROCTITLE events to identify the process or
  user responsible for the access or modification.

  If confirmed malicious, an attacker could gain persistence or escalate privileges,
  compromising the security of the targeted host.'
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1548/003/
- https://web.archive.org/web/20210708035426/https://www.cobaltstrike.com/downloads/csmanual43.pdf
logsource:
  product: splunk
detection:
  splunk_spl: "`linux_auditd`\n(type=PATH OR type=CWD)\n| rex \"msg=audit\\([^)]*:(?<audit_id>\\\
    d+)\\)\"\n\n| stats\n  values(type) as types\n  values(name) as names\n  values(nametype)\
    \ as nametype\n  values(cwd) as cwd_list\n  values(_time) as event_times\n  by\
    \ audit_id, host\n\n| eval current_working_directory = coalesce(mvindex(cwd_list,\
    \ 0), \"N/A\")\n| eval candidate_paths = mvmap(names, if(match(names, \"^/\"),\
    \ names, current_working_directory + \"/\" + names))\n| eval matched_paths = mvfilter(match(candidate_paths,\
    \ \"/etc/sudoers.*\"))\n| eval match_count = mvcount(matched_paths)\n| eval reconstructed_path\
    \ = mvindex(matched_paths, 0)\n| eval e_time = mvindex(event_times, 0)\n| where\
    \ match_count > 0\n| rename host as dest\n\n| stats count min(e_time) as firstTime\
    \ max(e_time) as lastTime\n  values(nametype) as nametype\n  by current_working_directory\n\
    \     reconstructed_path\n     match_count\n     dest\n     audit_id\n\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `linux_auditd_possible_access_to_sudoers_file_filter`"
