id: splunk-security-content-e51fbdb0-0be0-474f-92ea-d289f71a695e
name: Windows Network Share Interaction Via Net
description: The following analytic identifies network share discovery and collection
  activities performed on Windows systems using the Net command. Attackers often use
  network share discovery to identify accessible shared resources within a network,
  which can be a precursor to privilege escalation or data exfiltration. By monitoring
  Windows Event Logs for the usage of the Net command to list and interact with network
  shares, this detection helps identify potential reconnaissance and collection activities.
severity: medium
enabled: false
tags:
  mitre:
  - T1135
  - T1039
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1135/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  `process_net`\n        OR\n        (Processes.process_name=\"net.exe\"\n  \
    \      OR\n        Processes.original_file_name=\"net.exe\")\n    )\n    AND Processes.process\
    \ IN (\"*use *\", \"*view*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_network_share_interaction_via_net_filter`"
