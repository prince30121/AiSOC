id: splunk-security-content-8a618ade-ca8f-4d04-b972-2d526ba59924
name: Windows Process Injection Remote Thread
description: The following analytic detects suspicious remote thread execution in
  processes such as Taskmgr.exe, calc.exe, and notepad.exe, which may indicate process
  injection by malware like Qakbot. This detection leverages Sysmon EventCode 8 to
  identify remote thread creation in specific target processes. This activity is significant
  as it often signifies an attempt by malware to inject malicious code into legitimate
  processes, potentially leading to unauthorized code execution. If confirmed malicious,
  this could allow attackers to execute arbitrary code, escalate privileges, or maintain
  persistence on the compromised host.
severity: medium
enabled: false
tags:
  mitre:
  - T1055.002
  categories:
  - endpoint
references:
- https://twitter.com/pr0xylife/status/1585612370441031680?s=46&t=Dc3CJi4AnM-8rNoacLbScg
- https://thedfirreport.com/2023/06/12/a-truly-graceful-wipe-out/
logsource:
  product: splunk
detection:
  splunk_spl: "`sysmon`\nEventCode=8\nTargetImage IN (\n    \"*\\\\calc.exe\",\n \
    \   \"*\\\\CalculatorApp.exe\",\n    \"*\\\\cmd.exe\",\n    \"*\\\\dxdiag.exe\"\
    ,\n    \"*\\\\explorer.exe\",\n    \"*\\\\mobsync.exe\",\n    \"*\\\\msra.exe\"\
    ,\n    \"*\\\\notepad.exe\",\n    \"*\\\\OneDriveSetup.exe\",\n    \"*\\\\ping.exe\"\
    ,\n    \"*\\\\powershell.exe\",\n    \"*\\\\rdpclip.exe\",\n    \"*\\\\Taskmgr.exe\"\
    ,\n    \"*\\\\wermgr.exe\",\n    \"*\\\\win32calc.exe\",\n    \"*\\\\xwizard.exe\"\
    \n)\n| stats count min(_time) as firstTime\n              max(_time) as lastTime\n\
    by EventID Guid NewThreadId ProcessID SecurityID SourceImage\n   SourceProcessGuid\
    \ SourceProcessId StartAddress StartFunction\n   StartModule TargetImage TargetProcessGuid\
    \ TargetProcessId UserID\n   dest parent_process_exec parent_process_guid parent_process_id\n\
    \   parent_process_name parent_process_path process_exec process_guid\n   process_id\
    \ process_name process_path signature signature_id\n   user_id vendor_product\n\
    \n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_process_injection_remote_thread_filter`"
