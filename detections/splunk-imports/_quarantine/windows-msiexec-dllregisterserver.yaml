id: splunk-security-content-fdb59aef-d88f-4909-8369-ec2afbd2c398
name: Windows MSIExec DLLRegisterServer
description: The following analytic detects the execution of msiexec.exe with the
  /y switch parameter, which enables the loading of DLLRegisterServer. This detection
  leverages data from Endpoint Detection and Response (EDR) agents, focusing on process
  command-line arguments and parent-child process relationships. This activity is
  significant because it can indicate an attempt to register malicious DLLs, potentially
  leading to code execution or persistence on the system. If confirmed malicious,
  this could allow an attacker to execute arbitrary code, escalate privileges, or
  maintain persistence within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.007
  categories:
  - endpoint
references:
- https://thedfirreport.com/2022/06/06/will-the-real-msiexec-please-stand-up-exploit-leads-to-data-exfiltration/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218.007/T1218.007.md
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_msiexec`\
    \ Processes.process IN (\"* /y*\", \"* -y*\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_msiexec_dllregisterserver_filter`"
