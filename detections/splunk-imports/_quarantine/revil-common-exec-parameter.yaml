id: splunk-security-content-85facebe-c382-11eb-9c3e-acde48001122
name: Revil Common Exec Parameter
description: The following analytic detects the execution of command-line parameters
  commonly associated with REVIL ransomware, such as "-nolan", "-nolocal", "-fast",
  and "-full". It leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process execution logs mapped to the `Processes` node of the `Endpoint`
  data model. This activity is significant because these parameters are indicative
  of ransomware attempting to encrypt files on a compromised machine. If confirmed
  malicious, this could lead to widespread data encryption, rendering critical files
  inaccessible and potentially causing significant operational disruption.
severity: medium
enabled: false
tags:
  mitre:
  - T1204
  categories:
  - endpoint
references:
- https://krebsonsecurity.com/2021/05/a-closer-look-at-the-darkside-ransomware-gang/
- https://www.mcafee.com/blogs/other-blogs/mcafee-labs/mcafee-atr-analyzes-sodinokibi-aka-revil-ransomware-as-a-service-what-the-code-tells-us/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process\
    \ = \"* -nolan *\"\n    OR\n    Processes.process = \"* -nolocal *\"\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `revil_common_exec_parameter_filter`"
