id: splunk-security-content-d6b0d627-d0bf-46b1-936f-c48284767d21
name: Potential Telegram API Request Via CommandLine
description: The following analytic detects the presence of "api.telegram.org" in
  the CommandLine of a process. It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process execution logs that include command-line details.
  This activity can be significant as the telegram API has been used as an exfiltration
  mechanism or even as a C2 channel. If confirmed malicious, this could allow an attacker
  or malware to exfiltrate data or receive additional C2 instruction, potentially
  leading to further compromise and persistence within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1102.002
  - T1041
  categories:
  - endpoint
references:
- https://www.virustotal.com/gui/file/0b3ef5e04329cefb5bb4bf30b3edcb32d1ec6bbcb29d22695a079bfb5b56e8ac/behavior
- https://www.virustotal.com/gui/file/72c59eeb15b5ec1d95e72e4b06a030bc058822bc10e5cb807e78a4624d329666/behavior
- https://www.virustotal.com/gui/file/72c59eeb15b5ec1d95e72e4b06a030bc058822bc10e5cb807e78a4624d329666/content
- https://www.virustotal.com/gui/file/1c4541bf70b6e251ef024ec4dde8dce400539c2368461c0d90e15a81b11ace44/content
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\
    \ \"*api.telegram.org*\" NOT Processes.process IN (\"*-osint -url*\", \"* --single-argument*\"\
    )\n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `potential_telegram_api_request_via_commandline_filter`"
