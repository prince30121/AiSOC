id: splunk-security-content-4e5e024e-fabb-11eb-8b8f-acde48001122
name: Fsutil Zeroing File
description: The following analytic detects the execution of the 'fsutil' command
  with the 'setzerodata' parameter, which zeros out a target file. This detection
  leverages data from Endpoint Detection and Response (EDR) agents, focusing on process
  names and command-line arguments. This activity is significant because it is a technique
  used by ransomware, such as LockBit, to evade detection by erasing its malware path
  after encrypting the host. If confirmed malicious, this action could hinder forensic
  investigations and allow attackers to cover their tracks, complicating incident
  response efforts.
severity: medium
enabled: false
tags:
  mitre:
  - T1070
  categories:
  - endpoint
references:
- https://app.any.run/tasks/e0ac072d-58c9-4f53-8a3b-3e491c7ac5db/
- https://news.sophos.com/en-us/2020/04/24/lockbit-ransomware-borrows-tricks-to-keep-up-with-revil-and-maze/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count values(Processes.process)\
    \ as process values(Processes.parent_process) as parent_process min(_time) as\
    \ firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE\
    \ Processes.process_name=fsutil.exe Processes.process=\"*setzerodata*\"\n  BY\
    \ Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `fsutil_zeroing_file_filter`"
