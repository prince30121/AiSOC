id: splunk-security-content-b3b7ce35-fce5-4c73-85f4-700aeada81a9
name: Windows Credential Dumping LSASS Memory Createdump
description: The following analytic detects the use of CreateDump.exe to perform a
  process dump. This binary is not native to Windows and is often introduced by third-party
  applications, including PowerShell 7. The detection leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process names, GUIDs, and complete
  command-line executions. This activity is significant as it may indicate an attempt
  to dump LSASS memory, which can be used to extract credentials. If confirmed malicious,
  this could lead to unauthorized access and lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.001
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.001/T1003.001.md#atomic-test-11---dump-lsass-with-createdumpexe-from-net-v5
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=createdump.exe\n\
    \    OR\n    Processes.original_file_name=\"FX_VER_INTERNALNAME_STR\" Processes.process=\"\
    *-u *\"\n    AND\n    Processes.process=\"*-f *\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_credential_dumping_lsass_memory_createdump_filter`"
