id: splunk-security-content-cd6d7410-9146-4471-a418-49edba6dadc4
name: Windows Modify System Firewall with Notable Process Path
description: The following analytic detects suspicious modifications to system firewall
  rules, specifically allowing execution of applications from notable and potentially
  malicious file paths. This detection leverages data from Endpoint Detection and
  Response (EDR) agents, focusing on command-line executions involving firewall rule
  changes. This activity is significant as it may indicate an adversary attempting
  to bypass firewall restrictions to execute malicious files. If confirmed malicious,
  this could allow attackers to execute unauthorized code, potentially leading to
  further system compromise, data exfiltration, or persistence within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.004
  categories:
  - endpoint
references:
- https://www.splunk.com/en_us/blog/security/more-than-just-a-rat-unveiling-njrat-s-mbr-wiping-capabilities.html
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime from datamodel=Endpoint.Processes where Processes.process
    = "*firewall*" Processes.process = "*allow*" Processes.process = "*add*" Processes.process
    = "*ENABLE*" Processes.process IN ("*\\windows\\fonts\\*", "*\\windows\\temp\\*",
    "*\\users\\public\\*", "*\\windows\\debug\\*", "*\\Users\\Administrator\\Music\\*",
    "*\\Windows\\servicing\\*", "*\\Users\\Default\\*","*Recycle.bin*", "*\\Windows\\Media\\*",
    "\\Windows\\repair\\*", "*\\temp\\*", "*\\PerfLogs\\*") by Processes.action Processes.dest
    Processes.original_file_name Processes.parent_process Processes.parent_process_exec
    Processes.parent_process_guid Processes.parent_process_id Processes.parent_process_name
    Processes.parent_process_path Processes.process Processes.process_exec Processes.process_guid
    Processes.process_hash Processes.process_id Processes.process_integrity_level
    Processes.process_name Processes.process_path Processes.user Processes.user_id
    Processes.vendor_product | `drop_dm_object_name(Processes)` | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `windows_modify_system_firewall_with_notable_process_path_filter`'
