id: splunk-security-content-bf0a378e-5f3c-11ec-a6de-acde48001122
name: Linux At Application Execution
description: The following analytic detects the execution of the "At" application
  in Linux, which can be used by attackers to create persistence entries on a compromised
  host. This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process names and parent process names associated with "at" or "atd".
  This activity is significant because the "At" application can be exploited to maintain
  unauthorized access or deliver additional malicious payloads. If confirmed malicious,
  this behavior could lead to data theft, ransomware attacks, or other severe consequences.
  Immediate investigation is required to determine the legitimacy of the execution
  and mitigate potential risks.
severity: medium
enabled: false
tags:
  mitre:
  - T1053.002
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1053/001/
- https://www.linkedin.com/pulse/getting-attacker-ip-address-from-malicious-linux-job-craig-rowland/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count FROM datamodel=Endpoint.Processes\n\
    \  WHERE Processes.process_name IN (\"at\", \"atd\")\n    OR\n    Processes.parent_process_name\
    \ IN (\"at\", \"atd\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_at_application_execution_filter`"
