id: splunk-security-content-ca5327e1-0a91-4e23-bbd4-8901806c00e1
name: Windows Firewall Rule Deletion
description: This detection identifies instances where a Windows Firewall rule has
  been deleted, potentially exposing the system to security risks. Unauthorized removal
  of firewall rules can indicate an attacker attempting to bypass security controls
  or malware disabling protections for persistence and command-and-control communication.
  The event logs details such as the deleted rule name, protocol, port, and the user
  responsible for the action. Security teams should monitor for unexpected deletions,
  correlate with related events, and investigate anomalies to prevent unauthorized
  access and maintain network security posture.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.004
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/previous-versions/windows/it-pro/windows-10/security/threat-protection/auditing/event-4948
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_security` EventCode=4948\n  | stats count min(_time) as\
    \ firstTime max(_time) as lastTime\n    BY RuleName signature subject\n      \
    \ status dest ProcessID\n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `windows_firewall_rule_deletion_filter`"
