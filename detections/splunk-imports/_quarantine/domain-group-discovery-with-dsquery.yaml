id: splunk-security-content-f0c9d62f-a232-4edd-b17e-bc409fb133d4
name: Domain Group Discovery With Dsquery
description: The following analytic identifies the execution of `dsquery.exe` with
  command-line arguments used to query for domain groups. It leverages Endpoint Detection
  and Response (EDR) data, focusing on process names and command-line arguments. This
  activity is significant because both Red Teams and adversaries use `dsquery.exe`
  to enumerate domain groups, gaining situational awareness and facilitating further
  Active Directory discovery. If confirmed malicious, this behavior could allow attackers
  to map out the domain structure, identify high-value targets, and plan subsequent
  attacks, potentially leading to privilege escalation or data exfiltration.
severity: medium
enabled: false
tags:
  mitre:
  - T1069.002
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1069/002/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=\"dsquery.exe\"\n    )\n    (Processes.process=\"*group*\"\
    )\n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `domain_group_discovery_with_dsquery_filter`"
