id: splunk-security-content-6860a62c-9203-11eb-9e05-acde48001122
name: Disabling Firewall with Netsh
description: The following analytic identifies the disabling of the firewall using
  the netsh application. It leverages data from Endpoint Detection and Response (EDR)
  agents, focusing on command-line executions that include keywords like "firewall,"
  "off," or "disable." This activity is significant because disabling the firewall
  can expose the system to external threats, allowing malware to communicate with
  its command and control (C2) server. If confirmed malicious, this action could lead
  to unauthorized data exfiltration, further malware downloads, and broader network
  compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://tccontre.blogspot.com/2020/01/remcos-rat-evading-windows-defender-av.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_netsh`\
    \ Processes.process= \"*firewall*\" (Processes.process= \"*off*\"\n    OR\n  \
    \  Processes.process= \"*disable*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `disabling_firewall_with_netsh_filter`"
