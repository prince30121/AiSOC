id: splunk-security-content-f9593331-804c-4268-8b4c-2693c5ae786c
name: Windows Rundll32 Execution With Log.DLL
description: 'Identifies the execution of rundll32 with a command line argument of
  "log.dll", as used in the Lotus Blossom Chrysalis backdoor campaign.

  Attackers placed a malicious "log.dll" in "%AppData%\Bluetooth" and invoked it via
  rundll32.exe "log.dll,LogInit" to decrypt and execute ShellCode.

  The legitimate Bitdefender Submission Wizard (BDSubmit.exe, bdsw.exe) also uses
  log.dll and is vulnerable to DLL sideloading.'
severity: medium
enabled: false
tags:
  mitre:
  - T1574
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1574/002/
- https://www.rapid7.com/blog/post/tr-chrysalis-backdoor-dive-into-lotus-blossoms-toolkit/
- https://attack.mitre.org/groups/G0065/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime\n  from datamodel=Endpoint.Processes where\n  `process_rundll32`\n\
    \  Processes.process=\"* log.dll*\"\n  by Processes.action Processes.dest Processes.original_file_name\
    \ Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\
    \ Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\
    \ Processes.process Processes.process_exec Processes.process_guid Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level Processes.process_name\
    \ Processes.process_path Processes.user Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_rundll32_execution_with_log_dll_filter`"
