id: splunk-security-content-75dfd9f4-ca64-45d0-9422-4bde6d26a59e
name: CrushFTP Max Simultaneous Users From IP
description: The following analytic identifies instances where CrushFTP has blocked
  access due to exceeding the maximum number of simultaneous connections from a single
  IP address. This activity may indicate brute force attempts, credential stuffing,
  or automated attacks against the CrushFTP server. This detection is particularly
  relevant following the discovery of CVE-2025-31161, an authentication bypass vulnerability
  in CrushFTP versions 10.0.0 through 10.8.3 and 11.0.0 through 11.3.0.
severity: medium
enabled: false
tags:
  mitre:
  - T1110.001
  - T1110.004
  categories:
  - application
references:
- https://www.huntress.com/blog/crushftp-cve-2025-31161-auth-bypass-and-post-exploitation
- https://nvd.nist.gov/vuln/detail/CVE-2025-31161
- https://www.crushftp.com/crush11wiki/Wiki.jsp?page=Update
logsource:
  product: splunk
detection:
  splunk_spl: '`crushftp` "*User access not allowed.  Max simultaneous users from
    your IP*" | rex field=_raw "SESSION\\|\\d+\\/\\d+\\/\\d+ \\d+:\\d+:\\d+\\.\\d+\\|\\[HTTP:[^:]+:(?<user>[^:]+):(?<src_ip>[0-9\\.]+)\\]"
    | stats count min(_time) as firstTime max(_time) as lastTime values(user) as user
    by src_ip | where count >= 3 | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
    | `crushftp_max_simultaneous_users_from_ip_filter`'
provenance:
  source: splunk/security_content
  source_id: 75dfd9f4-ca64-45d0-9422-4bde6d26a59e
  source_commit: 4d4c7ee
