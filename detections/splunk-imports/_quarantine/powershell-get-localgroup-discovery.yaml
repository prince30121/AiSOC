id: splunk-security-content-b71adfcc-155b-11ec-9413-acde48001122
name: PowerShell Get LocalGroup Discovery
description: The following analytic identifies the use of the `get-localgroup` command
  executed via PowerShell or cmd.exe to enumerate local groups on an endpoint. This
  detection leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process names and command-line arguments. Monitoring this activity is significant
  as it may indicate an attacker attempting to gather information about local group
  memberships, which can be a precursor to privilege escalation. If confirmed malicious,
  this activity could allow an attacker to identify and target privileged accounts,
  potentially leading to unauthorized access and control over the system.
severity: medium
enabled: false
tags:
  mitre:
  - T1069.001
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1069/001/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1069.001/T1069.001.md
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=powershell.exe\n        OR\n        Processes.process_name=cmd.exe\n\
    \    )\n    (Processes.process=\"*get-localgroup*\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `powershell_get_localgroup_discovery_filter`"
