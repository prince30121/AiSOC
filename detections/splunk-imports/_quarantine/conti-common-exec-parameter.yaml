id: splunk-security-content-624919bc-c382-11eb-adcc-acde48001122
name: Conti Common Exec parameter
description: The following analytic detects the execution of suspicious command-line
  arguments commonly associated with Conti ransomware, specifically targeting local
  drives and network shares for encryption. It leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process execution logs that include command-line
  details. This activity is significant because it indicates a potential ransomware
  attack, which can lead to widespread data encryption and operational disruption.
  If confirmed malicious, the impact could be severe, resulting in data loss, system
  downtime, and potential ransom demands.
severity: medium
enabled: false
tags:
  mitre:
  - T1204
  categories:
  - endpoint
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.conti
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process\
    \ IN (\"*-m local\", \"*-m local *\", \"*-m net\", \"*-m net *\", \"*-m all\"\
    ,\"*-m all *\", \"*-nomutex\", \"*-nomutex *\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `conti_common_exec_parameter_filter`"
