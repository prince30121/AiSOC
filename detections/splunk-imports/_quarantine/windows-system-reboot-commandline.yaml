id: splunk-security-content-97fc2b60-c8eb-4711-93f7-d26fade3686f
name: Windows System Reboot CommandLine
description: The following analytic identifies the execution of the Windows command
  line to reboot a host machine using "shutdown.exe" with specific parameters. This
  detection leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process names and command-line arguments. This activity is significant as it
  is often associated with advanced persistent threats (APTs) and remote access trojans
  (RATs) like dcrat, which may use system reboots to disrupt operations, aid in system
  destruction, or inhibit recovery. If confirmed malicious, this could lead to system
  downtime, data loss, or hindered incident response efforts.
severity: medium
enabled: false
tags:
  mitre:
  - T1529
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1529/
- https://www.mandiant.com/resources/analyzing-dark-crystal-rat-backdoor
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as process min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes\n\
    \  WHERE (\n        Processes.process_name = shutdown.exe\n        OR\n      \
    \  Processes.original_file_name = shutdown.exe\n    )\n    Processes.process=\"\
    *shutdown*\" Processes.process IN (\"* /r*\", \"* -r*\") Processes.process IN\
    \ (\"* /t*\",\"* -t*\",\"* /f*\",\"* -f*\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_system_reboot_commandline_filter`"
