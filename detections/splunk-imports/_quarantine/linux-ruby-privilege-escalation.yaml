id: splunk-security-content-097b28b5-7004-4d40-a715-7e390501788b
name: Linux Ruby Privilege Escalation
description: The following analytic detects the execution of Ruby commands with elevated
  privileges on a Linux system. It identifies processes where Ruby is used with the
  `-e` flag to execute commands via `sudo`, leveraging Endpoint Detection and Response
  (EDR) telemetry. This activity is significant because it indicates a potential privilege
  escalation attempt, allowing a user to execute commands as root. If confirmed malicious,
  this could lead to full system compromise, enabling an attacker to gain root access,
  execute arbitrary commands, and maintain persistent control over the affected system.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/ruby/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *ruby*-e*\"\n    AND\n    Processes.process=\"*exec*\"\n    AND\n    Processes.process=\"\
    *sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_ruby_privilege_escalation_filter`"
