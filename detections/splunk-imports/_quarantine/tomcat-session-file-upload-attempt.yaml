id: splunk-security-content-a1d8f5c3-9b7e-4f2d-8c51-3bca5e672410
name: Tomcat Session File Upload Attempt
description: This detection identifies potential exploitation of CVE-2025-24813 in
  Apache Tomcat through the initial stage of the attack. This first phase occurs when
  an attacker attempts to upload a malicious serialized Java object with a .session
  file extension via an HTTP PUT request. When successful, these uploads typically
  result in HTTP status codes 201 (Created) or 409 (Conflict) and create the foundation
  for subsequent deserialization attacks by placing malicious content in a location
  where Tomcat's session management can access it.
severity: medium
enabled: false
tags:
  mitre:
  - T1190
  - T1505.003
  categories:
  - application
references:
- https://lists.apache.org/thread/j5fkjv2k477os90nczf2v9l61fb0kkgq
- https://nvd.nist.gov/vuln/detail/CVE-2025-24813
- https://github.com/vulhub/vulhub/tree/master/tomcat/CVE-2025-24813
- https://www.rapid7.com/db/vulnerabilities/apache-tomcat-cve-2025-24813/
- https://gist.github.com/MHaggis/e106367f6649fbb09ab27e7b4a01cf73
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats count min(_time) as firstTime max(_time) as lastTime FROM\
    \ datamodel=Web\n  WHERE Web.http_method=PUT\n    AND\n    Web.uri_path=\"*.session\"\
    \n    AND\n    (Web.status=201\n    OR\n    Web.status=409)\n  BY Web.src, Web.dest,\
    \ Web.http_user_agent,\n     Web.uri_path, Web.status\n| `drop_dm_object_name(\"\
    Web\")`\n| rex field=uri_path \"/(?<filename>[^/]+)\\.session$\"\n| eval severity=\"\
    High\"\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `tomcat_session_file_upload_attempt_filter`"
