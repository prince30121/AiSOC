id: splunk-security-content-7a85eb24-72da-11ec-ac76-acde48001122
name: Linux Possible Access Or Modification Of sshd Config File
description: The following analytic detects suspicious access or modification of the
  sshd_config file on Linux systems. It leverages data from Endpoint Detection and
  Response (EDR) agents, focusing on command-line executions involving processes like
  "cat," "nano," "vim," and "vi" accessing the sshd_config file. This activity is
  significant because unauthorized changes to sshd_config can allow threat actors
  to redirect port connections or use unauthorized keys, potentially compromising
  the system. If confirmed malicious, this could lead to unauthorized access, privilege
  escalation, or persistent backdoor access, posing a severe security risk.
severity: medium
enabled: false
tags:
  mitre:
  - T1098.004
  categories:
  - endpoint
references:
- https://www.hackingarticles.in/ssh-penetration-testing-port-22/
- https://attack.mitre.org/techniques/T1098/004/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ IN(\"cat\", \"nano*\",\"vim*\", \"vi*\")\n    AND\n    Processes.process IN(\"\
    */etc/ssh/sshd_config\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_possible_access_or_modification_of_sshd_config_file_filter`"
