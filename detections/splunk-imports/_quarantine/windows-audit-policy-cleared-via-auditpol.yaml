id: splunk-security-content-f067f7cf-f41b-4a60-985e-c23e268a13cb
name: Windows Audit Policy Cleared via Auditpol
description: The following analytic identifies the execution of `auditpol.exe` with
  the "/clear" command-line argument used to clears the audit policy. It leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process names
  and command-line executions. This activity can be significant as it indicates potential
  defense evasion by adversaries or Red Teams, aiming to limit data that can be leveraged
  for detections and audits. If confirmed malicious, this behavior could allow attackers
  to bypass defenses, and plan further attacks, potentially leading to full machine
  compromise or lateral movement.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.002
  categories:
  - endpoint
references:
- https://www.microsoft.com/en-us/security/blog/2021/01/20/deep-dive-into-the-solorigate-second-stage-activation-from-sunburst-to-teardrop-and-raindrop/
- https://www.cybereason.com/blog/research/prometei-botnet-exploiting-microsoft-exchange-vulnerabilities
- https://attack.mitre.org/techniques/T1562/002/
- https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/auditpol-clear
- https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/auditpol-remove
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as process min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes\n\
    \  WHERE `process_auditpol` Processes.process IN (\"*/clear*\", \"*/remove*\"\
    )\n    AND\n    NOT Processes.process IN (\"*/resourceSACL*\", \"*/?*\")\n  BY\
    \ Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_audit_policy_cleared_via_auditpol_filter`"
