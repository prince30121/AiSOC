id: splunk-security-content-aa73f80d-d728-4077-b226-81ea0c8be589
name: Script Execution via WMI
description: The following analytic detects the execution of scripts via Windows Management
  Instrumentation (WMI) by monitoring the process 'scrcons.exe'. This detection leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process creation
  events. WMI-based script execution is significant because adversaries often use
  it to perform malicious activities stealthily, such as system compromise, data exfiltration,
  or establishing persistence. If confirmed malicious, this activity could allow attackers
  to execute arbitrary code, escalate privileges, or maintain long-term access to
  the environment. Analysts should differentiate between legitimate administrative
  use and potential threats.
severity: medium
enabled: false
tags:
  mitre:
  - T1047
  categories:
  - endpoint
references:
- https://redcanary.com/blog/child-processes/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=scrcons.exe\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `script_execution_via_wmi_filter`"
