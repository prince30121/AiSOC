id: splunk-security-content-3348aefd-9ed8-451f-9993-1e9fa04b5530
name: MCP Github Suspicious Operation
description: This detection identifies potentially malicious activity through MCP
  GitHub server connections, monitoring for secret hunting in code searches, organization
  and repository reconnaissance, branch protection abuse, CI/CD workflow manipulation,
  sensitive file access, and vulnerability intelligence gathering. These patterns
  indicate potential supply chain attacks, credential harvesting, or pre-attack reconnaissance.
severity: medium
enabled: false
tags:
  mitre:
  - T1552.001
  categories:
  - application
references:
- https://splunkbase.splunk.com/app/8377
- https://www.docker.com/blog/mcp-horror-stories-github-prompt-injection/
- https://www.splunk.com/en_us/blog/security/securing-ai-agents-model-context-protocol.html
logsource:
  product: splunk
detection:
  splunk_spl: "`mcp_server` direction=inbound\n| eval dest=host\n| eval\n    query_lower=lower('params.query'),\n\
    \    file_path_lower=lower('params.path'),\n    search_query='params.query',\n\
    \    file_path='params.path',\n    target_owner='params.owner',\n    is_secret_hunting=if(method=\"\
    search_code\" AND (like(query_lower, \"%password%\") OR like(query_lower, \"%api_key%\"\
    ) OR like(query_lower, \"%secret%\") OR like(query_lower, \"%token%\") OR like(query_lower,\
    \ \"%aws_%\") OR like(query_lower, \"%private_key%\") OR like(query_lower, \"\
    %credential%\") OR like(query_lower, \"%.env%\") OR like(query_lower, \"%config%\"\
    )), 1, 0),\n    is_org_recon=if(method IN (\"list_repositories\", \"get_repository\"\
    , \"get_organization\", \"list_organization_members\", \"get_collaborators\",\
    \ \"list_forks\", \"fork_repository\"), 1, 0),\n    is_branch_protection_abuse=if(method\
    \ IN (\"update_branch_protection\", \"delete_branch_protection\"), 1, 0),\n  \
    \  is_workflow_manipulation=if((method IN (\"create_or_update_file\", \"push_files\"\
    )) AND like(file_path_lower, \"%github/workflows%\"), 1, 0),\n    is_sensitive_file_access=if((method\
    \ IN (\"create_or_update_file\", \"push_files\", \"get_file_contents\")) AND (like(file_path_lower,\
    \ \"%dockerfile%\") OR like(file_path_lower, \"%package.json%\") OR like(file_path_lower,\
    \ \"%requirements.txt%\") OR like(file_path_lower, \"%.env%\") OR like(file_path_lower,\
    \ \"%settings.py%\") OR like(file_path_lower, \"%config%\")), 1, 0),\n    is_issue_intel=if(method\
    \ IN (\"list_issues\", \"search_issues\") AND (like(query_lower, \"%vulnerability%\"\
    ) OR like(query_lower, \"%cve%\") OR like(query_lower, \"%security%\") OR like(query_lower,\
    \ \"%exploit%\") OR like(query_lower, \"%bug%\")), 1, 0)\n| where is_secret_hunting=1\
    \ OR is_org_recon=1 OR is_branch_protection_abuse=1 OR is_workflow_manipulation=1\
    \ OR is_sensitive_file_access=1 OR is_issue_intel=1\n| eval attack_type=case(\n\
    \    is_secret_hunting=1, \"Secret Hunting\",\n    is_branch_protection_abuse=1,\
    \ \"Branch Protection Abuse\",\n    is_workflow_manipulation=1, \"Workflow Manipulation\"\
    ,\n    is_sensitive_file_access=1, \"Sensitive File Access\",\n    is_issue_intel=1,\
    \ \"Vulnerability Intelligence Gathering\",\n    is_org_recon=1, \"Organization\
    \ Reconnaissance\",\n    1=1, \"Unknown\")\n| stats count min(_time) as firstTime\
    \ max(_time) as lastTime values(method) as methods values(search_query) as search_queries\
    \ values(file_path) as file_paths values(target_owner) as target_owners values(attack_type)\
    \ as attack_types dc(attack_type) as attack_diversity by dest\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| table dest firstTime lastTime count attack_diversity\
    \ attack_types methods search_queries file_paths target_owners\n| `mcp_github_suspicious_operation_filter`"
