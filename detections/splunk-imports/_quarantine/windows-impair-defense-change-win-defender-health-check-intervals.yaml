id: splunk-security-content-5211c260-820e-4366-b983-84bbfb5c263a
name: Windows Impair Defense Change Win Defender Health Check Intervals
description: The following analytic detects modifications to the Windows registry
  that change the health check interval of Windows Defender. It leverages data from
  the Endpoint datamodel, specifically monitoring changes to the "ServiceKeepAlive"
  registry path with a value of "0x00000001". This activity is significant because
  altering Windows Defender settings can impair its ability to perform timely health
  checks, potentially leaving the system vulnerable. If confirmed malicious, this
  could allow an attacker to disable or delay security scans, increasing the risk
  of undetected malware or other malicious activities.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://x.com/malmoeb/status/1742604217989415386?s=20
- https://github.com/undergroundwires/privacy.sexy
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime FROM datamodel=Endpoint.Registry where Registry.registry_path=
    "*\\Windows Defender\\ServiceKeepAlive" Registry.registry_value_data="0x00000001"
    by Registry.action Registry.dest Registry.process_guid Registry.process_id Registry.registry_hive
    Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)` | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `windows_impair_defense_change_win_defender_health_check_intervals_filter`'
