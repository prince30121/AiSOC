id: splunk-security-content-a0873b32-5b68-11eb-ae93-0242ac130002
name: Detect mshta inline hta execution
description: The following analytic detects the execution of "mshta.exe" with inline
  protocol handlers such as "JavaScript", "VBScript", and "About". It leverages data
  from Endpoint Detection and Response (EDR) agents, focusing on command-line arguments
  and process details. This activity is significant because mshta.exe can be exploited
  to execute malicious scripts, potentially leading to unauthorized code execution.
  If confirmed malicious, this could allow an attacker to execute arbitrary code,
  escalate privileges, or establish persistence within the environment, posing a severe
  security risk.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.005
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/AtomicTestHarnesses
- https://redcanary.com/blog/introducing-atomictestharnesses/
- https://docs.microsoft.com/en-us/windows/win32/search/-search-3x-wds-extidx-prot-implementing
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count values(Processes.process)\n\
    as process values(Processes.parent_process) as parent_process min(_time) as firstTime\n\
    max(_time) as lastTime from datamodel=Endpoint.Processes where\n\n`process_mshta`\n\
    Processes.process IN (\"*vbscript*\", \"*javascript*\", \"*about*\")\n\nby Processes.action\
    \ Processes.dest Processes.original_file_name Processes.parent_process\n   Processes.parent_process_exec\
    \ Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path Processes.process\n   Processes.process_exec Processes.process_guid\
    \ Processes.process_hash\n   Processes.process_id Processes.process_integrity_level\
    \ Processes.process_name\n   Processes.process_path Processes.user Processes.user_id\
    \ Processes.vendor_product\n\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `detect_mshta_inline_hta_execution_filter`"
