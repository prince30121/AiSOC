id: splunk-security-content-b8003567-c5b6-445b-8966-ecdacc81c24d
name: ESXi SSH Enabled
description: This detection identifies SSH being enabled on ESXi hosts, which can
  be an early indicator of malicious activity. Threat actors often use SSH to gain
  persistent remote access after compromising credentials or exploiting vulnerabilities.
severity: medium
enabled: false
tags:
  mitre:
  - T1021.004
  categories:
  - application
references: []
logsource:
  product: splunk
detection:
  splunk_spl: '`esxi_syslog` Message="*SSH access has been enabled" | rex field=_raw
    "Z (?<dest>[\w\.]+)\s" | stats min(_time) as firstTime max(_time) as lastTime
    count by dest Message | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
    | `esxi_ssh_enabled_filter`'
provenance:
  source: splunk/security_content
  source_id: b8003567-c5b6-445b-8966-ecdacc81c24d
