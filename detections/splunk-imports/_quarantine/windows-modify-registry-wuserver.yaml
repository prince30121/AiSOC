id: splunk-security-content-a02ad386-e26d-44ce-aa97-6a46cee31439
name: Windows Modify Registry WuServer
description: The following analytic detects suspicious modifications to the Windows
  Update Server (WUServer) registry settings. It leverages data from the Endpoint.Registry
  data model to identify changes in the registry path associated with Windows Update
  configurations. This activity is significant because adversaries, including malware
  like RedLine Stealer, exploit this technique to bypass detection and deploy additional
  payloads. If confirmed malicious, this registry modification could allow attackers
  to evade defenses, potentially leading to further system compromise and persistent
  unauthorized access.
severity: medium
enabled: false
tags:
  mitre:
  - T1112
  categories:
  - endpoint
references:
- https://learn.microsoft.com/de-de/security-updates/windowsupdateservices/18127499
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime from datamodel=Endpoint.Registry where Registry.registry_path="*\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate\\WUServer"
    by Registry.action Registry.dest Registry.process_guid Registry.process_id Registry.registry_hive
    Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)` | `security_content_ctime(lastTime)`
    | `security_content_ctime(firstTime)` | `windows_modify_registry_wuserver_filter`'
