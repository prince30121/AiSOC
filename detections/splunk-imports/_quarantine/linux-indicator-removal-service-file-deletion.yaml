id: splunk-security-content-6c077f81-2a83-4537-afbc-0e62e3215d55
name: Linux Indicator Removal Service File Deletion
description: The following analytic detects the deletion of Linux service unit configuration
  files by suspicious processes. It leverages Endpoint Detection and Response (EDR)
  telemetry, focusing on processes executing the 'rm' command targeting '.service'
  files. This activity is significant as it may indicate malware attempting to disable
  critical services or security products, a common defense evasion tactic. If confirmed
  malicious, this behavior could lead to service disruption, security tool incapacitation,
  or complete system compromise, severely impacting the integrity and availability
  of the affected Linux host.
severity: medium
enabled: false
tags:
  mitre:
  - T1070.004
  categories:
  - endpoint
references:
- https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/overview-of-the-cyber-weapons-used-in-the-ukraine-russia-war/
- https://cert.gov.ua/article/3718487
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = \"rm\"\n    AND\n    Processes.process = \"*rm *\"\n    AND\n    Processes.process\
    \ = \"*.service\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `linux_indicator_removal_service_file_deletion_filter`"
