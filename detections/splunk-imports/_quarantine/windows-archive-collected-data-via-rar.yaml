id: splunk-security-content-2015de95-fe91-413d-9d62-2fe011b67e82
name: Windows Archive Collected Data via Rar
description: The following analytic identifies the execution of RAR utilities to archive
  files on a system. It leverages data from Endpoint Detection and Response (EDR)
  agents, focusing on process names, GUIDs, and command-line arguments. This activity
  is significant as threat actors, including red-teamers and malware like DarkGate,
  use RAR archiving to compress and exfiltrate collected data from compromised hosts.
  If confirmed malicious, this behavior could lead to the unauthorized transfer of
  sensitive information to command and control servers, posing a severe risk to data
  confidentiality and integrity.
severity: medium
enabled: false
tags:
  mitre:
  - T1560.001
  categories:
  - endpoint
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.darkgate
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=\"\
    Rar.exe\"\n    OR\n    Processes.original_file_name = \"Rar.exe\"\n    AND\n \
    \   Processes.process = \"*a*\" Processes.process = \"* -ep1*\" Processes.process\
    \ = \"* -r*\" Processes.process = \"* -y*\" Processes.process = \"* -v5m*\" Processes.process\
    \ = \"* -m1*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_archive_collected_data_via_rar_filter`"
