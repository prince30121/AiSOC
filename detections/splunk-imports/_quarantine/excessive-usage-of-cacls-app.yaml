id: splunk-security-content-0bdf6092-af17-11eb-939a-acde48001122
name: Excessive Usage Of Cacls App
description: 'The following analytic identifies excessive usage of `cacls.exe`, `xcacls.exe`,

  or `icacls.exe` to change file or folder permissions.

  It looks for 10 or more execution of the aforementioned processes in the span of
  1 minute.

  It leverages data from Endpoint Detection and Response (EDR) agents,

  focusing on process names and command-line executions.

  This activity is significant as it may indicate an adversary attempting

  to restrict access to malware components or artifacts on a compromised system.

  If confirmed malicious, this behavior could prevent users from deleting or accessing

  critical files, aiding in the persistence and concealment of malicious activities.'
severity: medium
enabled: false
tags:
  mitre:
  - T1222
  categories:
  - endpoint
references:
- https://thedfirreport.com/2020/04/20/sqlserver-or-the-miner-in-the-basement/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  min(_time) as firstTime\n\
    \  max(_time) as lastTime\n  values(Processes.dest) as dest\n  values(Processes.user)\
    \ as user\n  values(Processes.action) as action\n  values(Processes.original_file_name)\
    \ as original_file_name\n  values(Processes.parent_process_exec) as parent_process_exec\n\
    \  values(Processes.parent_process_guid) as parent_process_guid\n  values(Processes.parent_process_id)\
    \ as parent_process_id\n  values(Processes.parent_process_path) as parent_process_path\n\
    \  values(Processes.process) as process\n  values(Processes.process_exec) as process_exec\n\
    \  values(Processes.process_guid) as process_guid\n  values(Processes.process_hash)\
    \ as process_hash\n  values(Processes.process_id) as process_id\n  values(Processes.process_integrity_level)\
    \ as process_integrity_level\n  values(Processes.process_name) as process_name\n\
    \  values(Processes.process_path) as process_path\n  values(Processes.user_id)\
    \ as user_id\n  values(Processes.vendor_product) as vendor_product count\nfrom\
    \ datamodel=Endpoint.Processes where\nProcesses.process_name IN( \"icacls.exe\"\
    , \"cacls.exe\", \"xcacls.exe\")\nby Processes.parent_process_name Processes.parent_process\
    \ Processes.dest Processes.user _time span=1m\n| where count >=10\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `excessive_usage_of_cacls_app_filter`"
