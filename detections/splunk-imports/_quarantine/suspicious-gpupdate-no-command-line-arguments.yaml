id: splunk-security-content-f308490a-473a-40ef-ae64-dd7a6eba284a
name: Suspicious GPUpdate no Command Line Arguments
description: The following analytic detects the execution of gpupdate.exe without
  any command line arguments. This behavior is identified using data from Endpoint
  Detection and Response (EDR) agents, focusing on process execution logs. It is significant
  because gpupdate.exe typically runs with specific arguments, and its execution without
  them is often associated with malicious activities, such as those performed by Cobalt
  Strike. If confirmed malicious, this activity could indicate an attempt to execute
  unauthorized commands or scripts, potentially leading to further system compromise
  or lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1055
  categories:
  - endpoint
references:
- https://raw.githubusercontent.com/xx0hcd/Malleable-C2-Profiles/0ef8cf4556e26f6d4190c56ba697c2159faa5822/crimeware/trick_ryuk.profile
- https://www.cobaltstrike.com/blog/learn-pipe-fitting-for-all-of-your-offense-projects/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count FROM datamodel=Endpoint.Processes\
    \ where\n(Processes.process_name=gpupdate.exe OR Processes.original_file_name=GPUpdate.exe)\n\
    Processes.process IN (\"*gpupdate\",\"*gpupdate.exe\", \"*gpupdate.exe\\\"\")\n\
    by Processes.action Processes.dest Processes.original_file_name\n   Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n   Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n   Processes.process\
    \ Processes.process_exec Processes.process_guid Processes.process_hash\n   Processes.process_id\
    \ Processes.process_integrity_level Processes.process_name Processes.process_path\n\
    \   Processes.user Processes.user_id Processes.vendor_product | `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `suspicious_gpupdate_no_command_line_arguments_filter`"
