id: splunk-security-content-a3b3bc96-1c4f-4eba-8218-027cac739a48
name: Windows Password Managers Discovery
description: The following analytic identifies command-line activity that searches
  for files related to password manager software, such as "*.kdbx*" and "*credential*".
  It leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  process execution logs. This activity is significant because attackers often target
  password manager databases to extract stored credentials, which can be used for
  further exploitation. If confirmed malicious, this behavior could lead to unauthorized
  access to sensitive information, enabling attackers to escalate privileges, move
  laterally, or exfiltrate critical data.
severity: medium
enabled: false
tags:
  mitre:
  - T1555.005
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1555/005/
- https://github.com/carlospolop/PEASS-ng/tree/master/winPEAS
- https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process\
    \ = \"*dir *\"\n    OR\n    Processes.process = \"*findstr*\"\n    AND\n    Processes.process\
    \ IN ( \"*.kdbx*\", \"*credential*\", \"*key3.db*\",\"*pass*\", \"*cred*\", \"\
    *key4.db*\", \"*accessTokens*\", \"*access_tokens*\", \"*.htpasswd*\", \"*Ntds.dit*\"\
    )\n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_password_managers_discovery_filter`"
