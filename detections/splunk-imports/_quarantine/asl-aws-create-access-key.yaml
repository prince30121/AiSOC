id: splunk-security-content-81a9f2fe-1697-473c-af1d-086b0d8b63c8
name: ASL AWS Create Access Key
description: The following analytic identifies the creation of AWS IAM access keys
  by a user for another user, which can indicate privilege escalation. It leverages
  AWS CloudTrail logs to detect instances where the user creating the access key is
  different from the user for whom the key is created. This activity is significant
  because unauthorized access key creation can allow attackers to establish persistence
  or exfiltrate data via AWS APIs. If confirmed malicious, this could lead to unauthorized
  access to AWS services, data exfiltration, and long-term persistence in the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1136.003
  categories:
  - cloud
references:
- https://bishopfox.com/blog/privilege-escalation-in-aws
- https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation-part-2/
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=CreateAccessKey\n  | fillnull\n\
    \  | stats count min(_time) as firstTime max(_time) as lastTime\n    BY actor.user.uid\
    \ api.operation api.service.name\n       http_request.user_agent src_endpoint.ip\
    \ actor.user.account.uid\n       cloud.provider cloud.region\n  | rename actor.user.uid\
    \ as user api.operation as action api.service.name as dest http_request.user_agent\
    \ as user_agent src_endpoint.ip as src actor.user.account.uid as vendor_account\
    \ cloud.provider as vendor_product cloud.region as vendor_region\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `asl_aws_create_access_key_filter`"
