id: splunk-security-content-72170ec5-f7d2-42f5-aefb-2b8be6aad15f
name: Detect Regasm Spawning a Process
description: The following analytic detects regasm.exe spawning a child process. This
  behavior is identified using data from Endpoint Detection and Response (EDR) agents,
  focusing on process creation events where regasm.exe is the parent process. This
  activity is significant because regasm.exe spawning a process is rare and can indicate
  an attempt to bypass application control mechanisms. If confirmed malicious, this
  could allow an attacker to execute arbitrary code, potentially leading to privilege
  escalation or persistent access within the environment. Immediate investigation
  is recommended to determine the legitimacy of the spawned process and any associated
  activities.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.009
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1218/009/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218.009/T1218.009.md
- https://lolbas-project.github.io/lolbas/Binaries/Regsvcs/
- https://lolbas-project.github.io/lolbas/Binaries/Regasm/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name=regasm.exe\
    \ NOT (Processes.process_name IN (\"conhost.exe\"))\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `detect_regasm_spawning_a_process_filter`"
