id: splunk-security-content-8d12f268-c567-4557-9813-f8389e235c06
name: ASL AWS IAM Failure Group Deletion
description: The following analytic detects failed attempts to delete AWS IAM groups,
  triggered by access denial, conflicts, or non-existent groups. It operates by monitoring
  CloudTrail logs for specific error codes related to deletion failures. This behavior
  is significant for a SOC as it may indicate unauthorized attempts to modify access
  controls or disrupt operations by removing groups. Such actions could be part of
  a larger attack aiming to escalate privileges or impair security protocols. Identifying
  these attempts allows for timely investigation and mitigation, preventing potential
  impact on the organizations security posture.
severity: medium
enabled: false
tags:
  mitre:
  - T1098
  categories:
  - cloud
references:
- https://awscli.amazonaws.com/v2/documentation/api/latest/reference/iam/delete-group.html
- https://docs.aws.amazon.com/IAM/latest/APIReference/API_DeleteGroup.html
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=DeleteGroup status=Failure http_request.user_agent!=*.amazonaws.com\n\
    \  | fillnull\n  | stats count min(_time) as firstTime max(_time) as lastTime\n\
    \    BY actor.user.uid api.operation api.service.name\n       http_request.user_agent\
    \ src_endpoint.ip actor.user.account.uid\n       cloud.provider cloud.region\n\
    \  | rename actor.user.uid as user api.operation as action api.service.name as\
    \ dest http_request.user_agent as user_agent src_endpoint.ip as src actor.user.account.uid\
    \ as vendor_account cloud.provider as vendor_product cloud.region as vendor_region\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `asl_aws_iam_failure_group_deletion_filter`"
provenance:
