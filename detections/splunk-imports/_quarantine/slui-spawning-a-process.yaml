id: splunk-security-content-879c4330-b3e0-11eb-b1b1-acde48001122
name: SLUI Spawning a Process
description: The following analytic detects the Microsoft Software Licensing User
  Interface Tool (`slui.exe`) spawning a child process. This behavior is identified
  using Endpoint Detection and Response (EDR) telemetry, focusing on process creation
  events where `slui.exe` is the parent process. This activity is significant because
  `slui.exe` should not typically spawn child processes, and doing so may indicate
  a UAC bypass attempt, leading to elevated privileges. If confirmed malicious, an
  attacker could leverage this to execute code with elevated privileges, potentially
  compromising the system's security and gaining unauthorized access.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.002
  categories:
  - endpoint
references:
- https://www.exploit-db.com/exploits/46998
- https://www.rapid7.com/db/modules/exploit/windows/local/bypassuac_sluihijack/
- https://www.mandiant.com/resources/shining-a-light-on-darkside-ransomware-operations
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name=slui.exe\
    \ AND NOT Processes.process_name=slui.exe\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `slui_spawning_a_process_filter`"
