id: splunk-security-content-b8bccfbf-6ac2-40f2-83b6-e72b7efaa7d4
name: Crowdstrike Admin With Duplicate Password
description: The following analytic detects CrowdStrike alerts for admin accounts
  with duplicate password risk, identifying instances where administrative users share
  the same password. This practice significantly increases the risk of unauthorized
  access and potential breaches. Addressing these alerts promptly is crucial for maintaining
  strong security protocols, ensuring each admin account uses a unique, secure password
  to protect critical systems and data.
severity: medium
enabled: false
tags:
  mitre:
  - T1110
  categories:
  - endpoint
references:
- https://www.crowdstrike.com/wp-content/uploads/2022/12/CrowdStrike-Falcon-Event-Streams-Add-on-Guide-v3.pdf
logsource:
  product: splunk
detection:
  splunk_spl: "`crowdstrike_identities` primaryDisplayName = \"*admin*\"\n  | rename\
    \ riskFactors{}.severity as severity, riskFactors{}.type as risk_type, roles{}.type\
    \ as role_type, accounts{}.domain as domain, accounts{}.dn as dn, accounts{}.samAccountName\
    \ as user\n  | stats count min(_time) as firstTime max(_time) as lastTime\n  \
    \  BY domain dn primaryDisplayName\n       risk_type severity riskScore\n    \
    \   riskScoreSeverity user role_type\n  | where risk_type = \"DUPLICATE_PASSWORD\"\
    \n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `crowdstrike_admin_with_duplicate_password_filter`"
provenance:
