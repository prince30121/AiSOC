id: splunk-security-content-e7a96937-3b58-4962-8dce-538e4763cf15
name: Linux Unix Shell Enable All SysRq Functions
description: The following analytic detects the execution of a command to enable all
  SysRq functions on a Linux system, a technique associated with the AwfulShred malware.
  It leverages Endpoint Detection and Response (EDR) data to identify processes executing
  the command to pipe bitmask '1' to /proc/sys/kernel/sysrq. This activity is significant
  as it can indicate an attempt to manipulate kernel system requests, which is uncommon
  and potentially malicious. If confirmed, this could allow an attacker to reboot
  the system or perform other critical actions, leading to system instability or further
  compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.004
  categories:
  - endpoint
references:
- https://www.kernel.org/doc/html/latest/admin-guide/sysrq.html
- https://cert.gov.ua/article/3718487
- https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/overview-of-the-cyber-weapons-used-in-the-ukraine-russia-war/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ IN (\"dash\", \"sudo\", \"bash\")  Processes.process =  \"* echo 1 &gt; *\"\
    \ Processes.process = \"*/proc/sys/kernel/sysrq\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `linux_unix_shell_enable_all_sysrq_functions_filter`"
