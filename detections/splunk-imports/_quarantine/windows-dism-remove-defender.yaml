id: splunk-security-content-8567da9e-47f0-11ec-99a9-acde48001122
name: Windows DISM Remove Defender
description: The following analytic detects the use of `dism.exe` to remove Windows
  Defender. It leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on command-line executions that include specific parameters for disabling and removing
  Windows Defender. This activity is significant because adversaries may disable Defender
  to evade detection and carry out further malicious actions undetected. If confirmed
  malicious, this could lead to the attacker gaining persistent access, executing
  additional payloads, or exfiltrating sensitive data without being intercepted by
  Windows Defender.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://thedfirreport.com/2020/11/23/pysa-mespinoza-ransomware/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=dism.exe\
    \ (Processes.process=\"*/online*\"\n    AND\n    Processes.process=\"*/disable-feature*\"\
    \n    AND\n    Processes.process=\"*Windows-Defender*\"\n    AND\n    Processes.process=\"\
    */remove*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_dism_remove_defender_filter`"
