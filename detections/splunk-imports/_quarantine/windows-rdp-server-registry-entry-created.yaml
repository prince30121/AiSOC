id: splunk-security-content-61f10919-c360-4e56-9cda-f1f34500cfda
name: Windows RDP Server Registry Entry Created
description: This detection identifies the creation of registry keys under HKEY_CURRENT_USER\Software\Microsoft\Terminal
  Server Client\Servers\, which occur when a user initiates a Remote Desktop Protocol
  (RDP) connection using the built-in Windows RDP client (mstsc.exe). These registry
  entries store information about previously connected remote hosts, including usernames
  and display settings. Their creation is a strong indicator that an outbound RDP
  session was initiated from the system. While the presence of these keys is normal
  during legitimate RDP use, their appearance can be used to track remote access activity,
  especially in environments where RDP is tightly controlled. In post-compromise scenarios,
  these artifacts may be created by threat actors using RDP for lateral movement or
  command-and-control. Monitoring the creation of these registry entries can help
  defenders detect initial use of RDP from a compromised host, particularly when correlated
  with unusual user behavior, logon patterns, or network activity.
severity: medium
enabled: false
tags:
  mitre:
  - T1021.001
  categories:
  - endpoint
references:
- https://medium.com/@bonguides25/how-to-clear-rdp-connections-history-in-windows-cf0ffb67f344
- https://thelocalh0st.github.io/posts/rdp/
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime from datamodel=Endpoint.Registry where Registry.registry_path="*\\Microsoft\\Terminal
    Server Client\\Servers\\*" Registry.action != deleted by Registry.action Registry.dest
    Registry.process_guid Registry.process_id Registry.registry_hive Registry.registry_path
    Registry.registry_key_name Registry.registry_value_data Registry.registry_value_name
    Registry.registry_value_type Registry.status Registry.user Registry.vendor_product
    | `drop_dm_object_name(Registry)` | `security_content_ctime(lastTime)` | `security_content_ctime(firstTime)`
    | `windows_rdp_server_registry_entry_created_filter`'
