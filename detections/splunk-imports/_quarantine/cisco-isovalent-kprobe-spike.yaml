id: splunk-security-content-3df0e9a8-7d5e-4b2f-bcd7-bf93e671d1f2
name: Cisco Isovalent - Kprobe Spike
description: 'This analytic detects excessive kernel probe (kprobe) events in a Kubernetes
  cluster over a short period of time.

  Kprobes are a Linux kernel debugging and instrumentation mechanism that allows dynamic
  monitoring and tracing of kernel functions and system calls.

  In containerized or cloud-native environments, kprobes are occasionally used for
  legitimate low-level diagnostics; however, monitoring a spike in kprobe activity
  is important because malware or attackers may abuse this mechanism to gain insights
  into the kernel, attempt privilege escalation, or tamper with host processes.

  More than 10 kprobe events within 5 minutes may indicate suspicious activity, such
  as an attacker probing the kernel through repeated system calls (e.g., nsenter,
  mount, sethostname).

  Such abnormal volume and frequency of kprobe usage within application pods or on
  nodes can signal container escape attempts or low-level tampering with the host,
  thereby representing a potential security threat.'
severity: medium
enabled: false
tags:
  mitre:
  - T1068
  categories:
  - endpoint
references:
- https://docs.isovalent.com/user-guide/sec-ops-visibility/process-execution/index.html
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_isovalent` process_kprobe.action!=\"\"\n| bin _time span=5m\
    \ | rename process_kprobe.parent.pod.name as pod_name\n| stats count as kprobe_count\n\
    \        values(process_kprobe.function_name) as functions\n        values(process_kprobe.process.binary)\
    \ as binaries\n        values(process_kprobe.args{}.string_arg) as args\n  by\
    \ pod_name _time\n| where kprobe_count > 10 | `cisco_isovalent___kprobe_spike_filter`"
