id: splunk-security-content-61e9a56a-20fa-11ec-8ba3-acde48001122
name: Verclsid CLSID Execution
description: The following analytic detects the potential abuse of the verclsid.exe
  utility to execute malicious files via generated CLSIDs. It leverages data from
  Endpoint Detection and Response (EDR) agents, focusing on specific command-line
  patterns associated with verclsid.exe. This activity is significant because verclsid.exe
  is a legitimate Windows application used to verify CLSID COM objects, and its misuse
  can indicate an attempt to bypass security controls. If confirmed malicious, this
  technique could allow an attacker to execute arbitrary code, potentially leading
  to system compromise or further malicious activities.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.012
  categories:
  - endpoint
references:
- https://gist.github.com/NickTyrer/0598b60112eaafe6d07789f7964290d5
- https://bohops.com/2018/08/18/abusing-the-com-registry-structure-part-2-loading-techniques-for-evasion-and-persistence/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as process\nvalues(Processes.parent_process) as parent_process values(Processes.process_id)\n\
    as process_id count min(_time) as firstTime max(_time) as lastTime from datamodel=Endpoint.Processes\
    \ where\n(Processes.process_name=\"verclsid.exe\" OR Processes.original_file_name=\"\
    verclsid.exe\")\nProcesses.process=\"*/S*\"\nProcesses.process=\"*/C*\"\nProcesses.process=\"\
    *{*\"\nProcesses.process=\"*}*\"\nby Processes.action Processes.dest Processes.original_file_name\n\
    \   Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \   Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \   Processes.process Processes.process_exec Processes.process_guid Processes.process_hash\n\
    \   Processes.process_id Processes.process_integrity_level Processes.process_name\
    \ Processes.process_path\n   Processes.user Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `verclsid_clsid_execution_filter`"
