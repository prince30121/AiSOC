id: splunk-security-content-66ab15c0-63d0-11ec-9e70-acde48001122
name: Linux Common Process For Elevation Control
description: The following analytic identifies the execution of common Linux processes
  used for elevation control, such as `chmod`, `chown`, and `setuid`. It leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process names
  and command-line executions. This activity is significant because these processes
  are often abused by adversaries to gain persistence or escalate privileges on compromised
  hosts. If confirmed malicious, this behavior could allow attackers to modify file
  attributes, change file ownership, or set user IDs, potentially leading to unauthorized
  access and control over critical system resources.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.001
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1548/001/
- https://github.com/Neo23x0/auditd/blob/master/audit.rules#L285-L297
- https://github.com/bfuzzy1/auditd-attack/blob/master/auditd-attack/auditd-attack.rules#L269-L270
- https://github.com/microsoft/MSTIC-Sysmon/blob/main/linux/configs/attack-based/privilege_escalation/T1548.001_ElevationControl_CommonProcesses.xml
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ IN (\"chmod\", \"chown\", \"fchmod\", \"fchmodat\", \"fchown\", \"fchownat\"\
    , \"fremovexattr\", \"fsetxattr\", \"lchown\", \"lremovexattr\", \"lsetxattr\"\
    , \"removexattr\", \"setuid\", \"setgid\", \"setreuid\", \"setregid\", \"chattr\"\
    )\n    OR\n    Processes.process IN (\"*chmod *\", \"*chown *\", \"*fchmod *\"\
    , \"*fchmodat *\", \"*fchown *\", \"*fchownat *\", \"*fremovexattr *\", \"*fsetxattr\
    \ *\", \"*lchown *\", \"*lremovexattr *\", \"*lsetxattr *\", \"*removexattr *\"\
    , \"*setuid *\", \"*setgid *\", \"*setreuid *\", \"*setregid *\", \"*setcap *\"\
    , \"*chattr *\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_common_process_for_elevation_control_filter`"
