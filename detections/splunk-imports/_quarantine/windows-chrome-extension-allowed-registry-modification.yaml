id: splunk-security-content-2846089a-ffe9-4881-a2a2-43f3be2b8cc7
name: Windows Chrome Extension Allowed Registry Modification
description: The following analytic detects modifications to the Windows registry
  keys that control the Chrome Extension Install Allowlist. Unauthorized changes to
  these keys may indicate attempts to bypass Chrome extension restrictions or install
  unapproved extensions. This detection helps identify potential security policy violations
  or malicious activity targeting Chrome extension settings.
severity: medium
enabled: false
tags:
  mitre:
  - T1185
  categories:
  - endpoint
references:
- https://www.gdatasoftware.com/blog/2025/11/38298-learning-about-browser-hijacking
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime FROM datamodel=Endpoint.Registry where Registry.registry_path
    = "*\\Google\\Chrome\\ExtensionInstallAllowlist*" by Registry.action Registry.dest
    Registry.process_guid Registry.process_id Registry.registry_hive Registry.registry_path
    Registry.registry_key_name Registry.registry_value_data Registry.registry_value_name
    Registry.registry_value_type Registry.status Registry.user Registry.vendor_product
    | `drop_dm_object_name(Registry)` | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
    | `windows_chrome_extension_allowed_registry_modification_filter`'
provenance:
