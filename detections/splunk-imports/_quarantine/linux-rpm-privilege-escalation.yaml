id: splunk-security-content-f8e58a23-cecd-495f-9c65-6c76b4cb9774
name: Linux RPM Privilege Escalation
description: The following analytic detects the execution of the RPM Package Manager
  with elevated privileges, specifically when it is used to run system commands as
  root via the `--eval` and `lua:os.execute` options. This detection leverages data
  from Endpoint Detection and Response (EDR) agents, focusing on command-line executions
  and process metadata. This activity is significant because it indicates a potential
  privilege escalation attempt, allowing a user to gain root access. If confirmed
  malicious, this could lead to full system compromise, unauthorized access to sensitive
  data, and further exploitation of the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/rpm/
- https://en.wikipedia.org/wiki/RPM_Package_Manager
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *rpm*--eval*\"\n    AND\n    Processes.process=\"*lua:os.execute*\"\n    AND\n\
    \    Processes.process=\"*sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_rpm_privilege_escalation_filter`"
