id: splunk-security-content-d7297cfa-1f04-4714-bfbe-3679e0666959
name: Windows Office Product Loading Taskschd DLL
description: The following analytic detects an Office document creating a scheduled
  task, either through a macro VBA API or by loading `taskschd.dll`. This detection
  leverages Sysmon EventCode 7 to identify when Office applications load the `taskschd.dll`
  file. This activity is significant as it is a common technique used by malicious
  macro malware to establish persistence or initiate beaconing. If confirmed malicious,
  this could allow an attacker to maintain persistence, execute arbitrary commands,
  or schedule future malicious activities, posing a significant threat to the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1566.001
  categories:
  - endpoint
references:
- https://research.checkpoint.com/2021/irans-apt34-returns-with-an-updated-arsenal/
- https://redcanary.com/threat-detection-report/techniques/scheduled-task-job/
- https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/trojanized-onenote-document-leads-to-formbook-malware/
logsource:
  product: splunk
detection:
  splunk_spl: '`sysmon` EventCode=7 process_name IN ("EQNEDT32.exe", "excel.exe",
    "Graph.exe", "msaccess.exe", "mspub.exe", "onenote.exe", "onenoteim.exe", "onenotem.exe",
    "outlook.exe", "powerpnt.exe", "visio.exe", "winproj.exe", "winword.exe") loaded_file_path
    = "*\\taskschd.dll" | fillnull | stats count min(_time) as firstTime max(_time)
    as lastTime by Image ImageLoaded dest loaded_file loaded_file_path original_file_name
    process_exec process_guid process_hash process_id process_name process_path service_dll_signature_exists
    service_dll_signature_verified signature signature_id user_id vendor_product |
    `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `windows_office_product_loading_taskschd_dll_filter`'
provenance:
