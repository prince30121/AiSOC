id: splunk-security-content-2418780f-7c3e-4c45-b8b4-996ea850cd49
name: Windows System Discovery Using ldap Nslookup
description: The following analytic detects the execution of nslookup.exe to query
  domain information using LDAP. It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process names and command-line arguments. This activity
  is significant as nslookup.exe can be abused by malware like Qakbot to gather critical
  domain details, such as SRV records and server names. If confirmed malicious, this
  behavior could allow attackers to map the network, identify key servers, and plan
  further attacks, potentially leading to data exfiltration or lateral movement within
  the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1033
  categories:
  - endpoint
references:
- https://securelist.com/qakbot-technical-analysis/103931/
- https://learn.microsoft.com/en-us/troubleshoot/windows-server/networking/verify-srv-dns-records-have-been-created
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name = \"nslookup.exe\"\n        OR\n        Processes.original_file_name\
    \ = \"nslookup.exe\"\n    )\n    AND Processes.process = \"*_ldap._tcp.dc._msdcs*\"\
    \n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(\"\
    Processes\")`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_system_discovery_using_ldap_nslookup_filter`"
