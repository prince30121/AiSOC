id: splunk-security-content-6df99886-0e04-4c11-8b88-325747419278
name: Linux Kernel Module Enumeration
description: The following analytic identifies the use of the 'kmod' process to list
  kernel modules on a Linux system. This detection leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process names and command-line executions.
  While listing kernel modules is not inherently malicious, it can be a precursor
  to loading unauthorized modules using 'insmod'. If confirmed malicious, this activity
  could allow an attacker to load kernel modules, potentially leading to privilege
  escalation, persistence, or other malicious actions within the system.
severity: medium
enabled: false
tags:
  mitre:
  - T1082
  - T1014
  categories:
  - endpoint
references:
- https://man7.org/linux/man-pages/man8/kmod.8.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=kmod\
    \ Processes.process IN (\"*lsmod*\", \"*list*\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `linux_kernel_module_enumeration_filter`"
