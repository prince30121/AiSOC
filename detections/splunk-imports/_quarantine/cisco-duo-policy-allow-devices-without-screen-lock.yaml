id: splunk-security-content-114c616b-c793-465d-a80d-758c9fe8a704
name: Cisco Duo Policy Allow Devices Without Screen Lock
description: 'The following analytic detects when a Duo policy is created or updated
  to allow devices without a screen lock requirement. It identifies this behavior

  by searching Duo administrator activity logs for policy creation or update events
  where the ''require_lock'' setting is set to false. This action may indicate

  a weakening of device security controls, potentially exposing the organization to
  unauthorized access if devices are lost or stolen. For a Security Operations

  Center (SOC), identifying such policy changes is critical, as attackers or malicious
  insiders may attempt to lower authentication standards to facilitate

  unauthorized access. The impact of this attack could include increased risk of credential
  compromise, data breaches, or lateral movement within the

  environment due to reduced device security requirements.'
severity: medium
enabled: false
tags:
  mitre:
  - T1556
  categories:
  - application
references:
- https://splunkbase.splunk.com/app/7404
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_duo_administrator` action=policy_update OR action=policy_create\n\
    \  | spath input=description\n  | search require_lock=false\n  | rename object\
    \ as user\n  | stats count min(_time) as firstTime max(_time) as lastTime\n  \
    \  BY action actionlabel description\n       user admin_email\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `cisco_duo_policy_allow_devices_without_screen_lock_filter`"
