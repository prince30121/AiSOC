id: splunk-security-content-2181f261-93e6-4166-a5a9-47deac58feff
name: Windows Information Discovery Fsutil
description: 'The following analytic identifies the execution of the Windows built-in
  tool FSUTIL with the "FSINFO" or "Volume" parameters, in order to discover file
  system and disk information.

  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process execution logs that include command-line details.

  Monitoring this activity is significant because FSUTIL can be abused by adversaries
  to gather detailed information about the file system, aiding in further exploitation.

  If confirmed malicious, this activity could enable attackers to map the file system,
  identify valuable data, and plan subsequent actions such as privilege escalation
  or persistence.'
severity: medium
enabled: false
tags:
  mitre:
  - T1082
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/fsutil
- https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/fsutil-volume
- https://github.com/carlospolop/PEASS-ng/tree/master/winPEAS
- https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
- https://www.microsoft.com/en-us/security/blog/2021/01/20/deep-dive-into-the-solorigate-second-stage-activation-from-sunburst-to-teardrop-and-raindrop/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\nfrom datamodel=Endpoint.Processes where\n\n(\n\
    \  Processes.process_name=\"fsutil.exe\"\n  OR\n  Processes.original_file_name\
    \ = \"fsutil.exe\"\n)\n(\n  Processes.process = \"*fsinfo*\"\n  OR\n  (\n    Processes.process\
    \ = \"*volume*\"\n    AND\n    Processes.process IN (\"*diskfree*\", \"*list*\"\
    )\n  )\n)\nby Processes.action Processes.dest Processes.original_file_name Processes.parent_process\n\
    \   Processes.parent_process_exec Processes.parent_process_guid Processes.parent_process_id\n\
    \   Processes.parent_process_name Processes.parent_process_path Processes.process\
    \ Processes.process_exec\n   Processes.process_guid Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n   Processes.process_name Processes.process_path\
    \ Processes.user Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_information_discovery_fsutil_filter`"
