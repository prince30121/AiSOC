id: splunk-security-content-c8127f87-c7c9-4036-89ed-8fe4b30e678c
name: Windows Remote Service Rdpwinst Tool Execution
description: The following analytic detects the execution of the RDPWInst.exe tool,
  which is an RDP wrapper library used to enable remote desktop host support and concurrent
  RDP sessions. This detection leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process names, original file names, and specific command-line
  arguments. This activity is significant because adversaries can abuse this tool
  to establish unauthorized RDP connections, facilitating remote access and potential
  lateral movement within the network. If confirmed malicious, this could lead to
  unauthorized access, data exfiltration, and further compromise of the targeted host.
severity: medium
enabled: false
tags:
  mitre:
  - T1021.001
  categories:
  - endpoint
references:
- https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as process min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes\n\
    \  WHERE (\n        Processes.process_name=\"RDPWInst.exe\"\n        OR\n    \
    \    Processes.original_file_name=\"RDPWInst.exe\"\n    )\n    AND Processes.process\
    \ IN (\"* -i*\", \"* -s*\", \"* -o*\", \"* -w*\", \"* -r*\")\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_remote_service_rdpwinst_tool_execution_filter`"
