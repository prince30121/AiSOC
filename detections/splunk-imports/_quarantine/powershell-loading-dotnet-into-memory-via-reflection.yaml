id: splunk-security-content-85bc3f30-ca28-11eb-bd21-acde48001122
name: PowerShell Loading DotNET into Memory via Reflection
description: The following analytic detects the use of PowerShell scripts to load
  .NET assemblies into memory via reflection, a technique often used in malicious
  activities such as those by Empire and Cobalt Strike. It leverages PowerShell Script
  Block Logging (EventCode=4104) to capture and analyze the full command executed.
  This behavior is significant as it can indicate advanced attack techniques aiming
  to execute code in memory, bypassing traditional defenses. If confirmed malicious,
  this activity could lead to unauthorized code execution, privilege escalation, and
  persistent access within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.001
  categories:
  - endpoint
references:
- https://docs.microsoft.com/en-us/dotnet/api/system.reflection.assembly?view=net-5.0
- https://help.splunk.com/en/security-offerings/splunk-user-behavior-analytics/get-data-in/5.4.1/add-other-data-to-splunk-uba/configure-powershell-logging-to-see-powershell-anomalies-in-splunk-uba.
- https://blog.palantir.com/tampering-with-windows-event-tracing-background-offense-and-defense-4be7ac62ac63
- https://static1.squarespace.com/static/552092d5e4b0661088167e5c/t/59c1814829f18782e24f1fe2/1505853768977/Windows+PowerShell+Logging+Cheat+Sheet+ver+Sept+2017+v2.1.pdf
- https://www.crowdstrike.com/blog/investigating-powershell-command-and-script-logging/
logsource:
  product: splunk
detection:
  splunk_spl: "`powershell` EventCode=4104\nScriptBlockText IN (\n    \"*.LoadFrom(*\"\
    ,\n    \"*.LoadModule(*\",\n    \"*.LoadWithPartialName*\",\n    \"*Reflection.Assembly.Load*\"\
    ,\n    \"*Reflection.Assembly]::('daoL'[-1..-4] -join '')*\",\n    \"*Reflection.Assembly]::Load*\"\
    ,\n    \"*ReflectionOnlyLoad*\",\n    \"*UnsafeLoadFrom*\"\n)\n\n| fillnull\n\
    | stats count min(_time) as firstTime\n              max(_time) as lastTime\n\
    \  by dest signature signature_id user_id\n     vendor_product EventID Guid Opcode\n\
    \     Name Path ProcessID\n     ScriptBlockId ScriptBlockText\n\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `powershell_loading_dotnet_into_memory_via_reflection_filter`"
