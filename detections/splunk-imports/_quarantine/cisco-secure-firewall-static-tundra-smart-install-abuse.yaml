id: splunk-security-content-7e9a5a2c-2f1a-4b6a-9a4b-9e7d9c8f5a21
name: Cisco Secure Firewall - Static Tundra Smart Install Abuse
description: 'This analytic detects activity associated with "Static Tundra" threat
  actor abuse of the Cisco Smart Install (SMI) protocol

  using Cisco Secure Firewall Intrusion Events. It leverages Cisco Secure Firewall
  Threat Defense IntrusionEvent logs to

  identify occurrences of Smart Install exploitation and protocol abuse, including
  denial-of-service and buffer overflow

  attempts. The detection triggers when multiple Cisco Smart Install-related Snort
  signatures are observed in a short period from the

  same source, which is indicative of active exploitation or reconnaissance against
  Cisco devices that expose SMI.'
severity: medium
enabled: false
tags:
  mitre:
  - T1190
  - T1210
  - T1499
  categories:
  - network
references:
- https://blog.talosintelligence.com/static-tundra/
- https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-20180328-smi2
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_secure_firewall` EventType=IntrusionEvent signature_id IN (46468,\
    \ 46096, 41722, 41723, 41724, 41725)\n| bin _time span=15m\n| fillnull\n| stats\
    \ dc(signature_id) as unique_signature_count\n        values(signature_id) as\
    \ signature_id\n        values(signature) as signature\n        values(class_desc)\
    \ as class_desc\n        values(MitreAttackGroups) as MitreAttackGroups\n    \
    \    values(InlineResult) as InlineResult\n        values(InlineResultReason)\
    \ as InlineResultReason\n        values(dest) as dest\n        values(dest_port)\
    \ as dest_port\n        values(rule) as rule\n        values(transport) as transport\n\
    \        values(app) as app\n        min(_time) as firstTime\n        max(_time)\
    \ as lastTime\n        by src\n| where unique_signature_count >= 2\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `cisco_secure_firewall___static_tundra_smart_install_abuse_filter`"
provenance:
