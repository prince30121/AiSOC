id: splunk-security-content-213b3148-24ea-11ec-93a2-acde48001122
name: MSBuild Suspicious Spawned By Script Process
description: The following analytic detects the suspicious spawning of MSBuild.exe
  by Windows Script Host processes (cscript.exe or wscript.exe). This behavior is
  often associated with malware or adversaries executing malicious MSBuild processes
  via scripts on compromised hosts. The detection leverages Endpoint Detection and
  Response (EDR) telemetry, focusing on process creation events where MSBuild is a
  child of script hosts. This activity is significant as it may indicate an attempt
  to execute malicious code. If confirmed malicious, it could lead to unauthorized
  code execution, potentially compromising the host and allowing further malicious
  activities.
severity: medium
enabled: false
tags:
  mitre:
  - T1127.001
  categories:
  - endpoint
references:
- https://app.any.run/tasks/dc93ee63-050c-4ff8-b07e-8277af9ab939/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count values(Processes.process_name)\
    \ as process_name values(Processes.process) as process min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name\
    \ IN (\"wscript.exe\", \"cscript.exe\")\n    AND\n    `process_msbuild`\n  BY\
    \ Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `msbuild_suspicious_spawned_by_script_process_filter`"
