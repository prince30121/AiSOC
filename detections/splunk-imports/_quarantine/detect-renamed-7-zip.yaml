id: splunk-security-content-4057291a-b8cf-11eb-95fe-acde48001122
name: Detect Renamed 7-Zip
description: The following analytic detects the usage of a renamed 7-Zip executable
  using Sysmon data. It leverages the OriginalFileName field to identify instances
  where the 7-Zip process has been renamed. This activity is significant as attackers
  often rename legitimate tools to evade detection while staging or exfiltrating data.
  If confirmed malicious, this behavior could indicate data exfiltration attempts
  or other unauthorized data manipulation, potentially leading to significant data
  breaches or loss of sensitive information. Analysts should validate the legitimacy
  of the 7-Zip executable and investigate parallel processes for further suspicious
  activities.
severity: medium
enabled: false
tags:
  mitre:
  - T1560.001
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1560.001/T1560.001.md
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.original_file_name=7z*.exe\n        AND\n        Processes.process_name!=7z*.exe\n\
    \    )\n  BY Processes.action Processes.dest Processes.original_file_name\n  \
    \   Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `detect_renamed_7_zip_filter`"
