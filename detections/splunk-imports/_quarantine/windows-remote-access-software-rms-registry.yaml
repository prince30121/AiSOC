id: splunk-security-content-e5b7b5a9-e471-4be8-8c5d-4083983ba329
name: Windows Remote Access Software RMS Registry
description: The following analytic detects the creation or modification of Windows
  registry entries related to the Remote Manipulator System (RMS) Remote Admin tool.
  It leverages data from the Endpoint.Registry datamodel, focusing on registry paths
  containing "SYSTEM\\Remote Manipulator System." This activity is significant because
  RMS, while legitimate, is often abused by adversaries, such as in the Azorult malware
  campaigns, to gain unauthorized remote access. If confirmed malicious, this could
  allow attackers to remotely control the targeted host, leading to potential data
  exfiltration, system manipulation, or further network compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1219
  categories:
  - endpoint
references:
- https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/
- https://malpedia.caad.fkie.fraunhofer.de/details/win.rms
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime FROM datamodel=Endpoint.Registry where Registry.registry_path=
    "*\\SYSTEM\\Remote Manipulator System*" by Registry.action Registry.dest Registry.process_guid
    Registry.process_id Registry.registry_hive Registry.registry_path Registry.registry_key_name
    Registry.registry_value_data Registry.registry_value_name Registry.registry_value_type
    Registry.status Registry.user Registry.vendor_product | `drop_dm_object_name(Registry)`
    | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `windows_remote_access_software_rms_registry_filter`'
