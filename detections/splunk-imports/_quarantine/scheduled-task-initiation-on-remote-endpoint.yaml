id: splunk-security-content-95cf4608-4302-11ec-8194-3e22fbd008af
name: Scheduled Task Initiation on Remote Endpoint
description: The following analytic detects the use of 'schtasks.exe' to start a Scheduled
  Task on a remote endpoint. This detection leverages Endpoint Detection and Response
  (EDR) data, focusing on process details such as process name, parent process, and
  command-line executions. This activity is significant as adversaries often abuse
  Task Scheduler for lateral movement and remote code execution. If confirmed malicious,
  this behavior could allow attackers to execute arbitrary code remotely, potentially
  leading to further compromise of the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1053.005
  categories:
  - endpoint
references:
- https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/schtasks
- https://attack.mitre.org/techniques/T1053/005/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=schtasks.exe\n        OR\n        Processes.original_file_name=schtasks.exe\n\
    \    )\n    (Processes.process= \"* /S *\" AND Processes.process=*/run*)\n  BY\
    \ Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `scheduled_task_initiation_on_remote_endpoint_filter`"
provenance:
