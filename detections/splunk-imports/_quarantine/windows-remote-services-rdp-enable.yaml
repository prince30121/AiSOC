id: splunk-security-content-8fbd2e88-4ea5-40b9-9217-fd0855e08cc0
name: Windows Remote Services Rdp Enable
description: The following analytic detects modifications in the Windows registry
  to enable Remote Desktop Protocol (RDP) on a targeted machine. It leverages data
  from the Endpoint.Registry datamodel, specifically monitoring changes to the "fDenyTSConnections"
  registry value. This activity is significant as enabling RDP via registry is uncommon
  and often associated with adversaries or malware attempting to gain remote access.
  If confirmed malicious, this could allow attackers to remotely control the compromised
  host, potentially leading to further exploitation and lateral movement within the
  network.
severity: medium
enabled: false
tags:
  mitre:
  - T1021.001
  categories:
  - endpoint
references:
- https://www.hybrid-analysis.com/sample/9d6611c2779316f1ef4b4a6edcfdfb5e770fe32b31ec2200df268c3bd236ed75?environmentId=100
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime FROM datamodel=Endpoint.Registry where Registry.registry_path=
    "*\\Control\\Terminal Server\\fDenyTSConnections*" Registry.registry_value_data="0x00000000"
    by Registry.action Registry.dest Registry.process_guid Registry.process_id Registry.registry_hive
    Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)` | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `windows_remote_services_rdp_enable_filter`'
