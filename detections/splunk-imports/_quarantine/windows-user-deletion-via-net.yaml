id: splunk-security-content-b0b6fd2c-8953-4d1b-8f7b-56075ea6ab3e
name: Windows User Deletion Via Net
description: The following analytic detects the use of net.exe or net1.exe command-line
  to delete a user account on a system. It leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process and command-line execution logs.
  This activity is significant as it may indicate an attempt to impair user accounts
  or cover tracks during lateral movement. If confirmed malicious, this could lead
  to unauthorized access removal, disruption of legitimate user activities, or concealment
  of adversarial actions, complicating incident response and forensic investigations.
severity: medium
enabled: false
tags:
  mitre:
  - T1531
  categories:
  - endpoint
references:
- https://thedfirreport.com/2020/04/20/sqlserver-or-the-miner-in-the-basement/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_net`\n\
    \    AND\n    Processes.process=\"*user*\"\n    AND\n    Processes.process=\"\
    */delete*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_user_deletion_via_net_filter`"
