id: splunk-security-content-d2c14d28-5c47-11ec-9892-acde48001122
name: Outbound Network Connection from Java Using Default Ports
description: 'The following analytic detects outbound network connections from Java
  processes to default ports used by LDAP and RMI protocols, which may indicate exploitation
  of the CVE-2021-44228-Log4j vulnerability.

  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process and network traffic logs.

  Monitoring this activity is crucial as it can signify an attacker''s attempt to
  perform JNDI lookups and retrieve malicious payloads.

  If confirmed malicious, this activity could lead to remote code execution and further
  compromise of the affected server.'
severity: medium
enabled: false
tags:
  mitre:
  - T1190
  - T1133
  categories:
  - endpoint
references:
- https://www.lunasec.io/docs/blog/log4j-zero-day/
- https://www.govcert.admin.ch/blog/zero-day-exploit-targeting-popular-java-library-log4j/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count\nFROM datamodel=Endpoint.Processes\
    \ WHERE\n\nProcesses.process_name IN (\n    \"java.exe\",\n    \"javaw.exe\"\n\
    )\nBY Processes.action Processes.dest Processes.original_file_name\n   Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n   Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n   Processes.process\
    \ Processes.process_exec Processes.process_guid\n   Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n   Processes.process_name Processes.process_path\
    \ Processes.user\n   Processes.user_id Processes.vendor_product\n\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | join process_id dest\n[\n    | tstats `security_content_summariesonly` count\n\
    \    FROM datamodel=Network_Traffic.All_Traffic WHERE\n    All_Traffic.dest_port\
    \ IN (\n                389,\n                636,\n                1099,\n  \
    \              1389\n    )\n    BY All_Traffic.action All_Traffic.app All_Traffic.bytes\n\
    \        All_Traffic.bytes_in All_Traffic.bytes_out All_Traffic.dest\n       \
    \ All_Traffic.dest_ip All_Traffic.dest_port All_Traffic.dvc\n        All_Traffic.protocol\
    \ All_Traffic.protocol_version All_Traffic.src\n        All_Traffic.src_ip All_Traffic.src_port\
    \ All_Traffic.transport\n        All_Traffic.user All_Traffic.vendor_product All_Traffic.direction\n\
    \        All_Traffic.process_id\n    | `drop_dm_object_name(All_Traffic)`\n  \
    \  | rename dest as connection_to_CNC\n    | rename src as dest\n]\n| table _time\
    \ dest\n        parent_process_path parent_process_name parent_process\n     \
    \   process_path process_name process process_hash\n        connection_to_CNC\
    \ dest_port user\n| `outbound_network_connection_from_java_using_default_ports_filter`"
