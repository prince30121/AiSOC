id: splunk-security-content-cf06a0ee-ffa9-4ed3-be77-0670ed9bab52
name: Windows Unusual Count Of Users Remotely Failed To Auth From Host
description: The following analytic identifies a source host failing to authenticate
  against a remote host with multiple users, potentially indicating a Password Spraying
  attack. It leverages Windows Event 4625 (failed logon attempts) and Logon Type 3
  (remote authentication) to detect this behavior. This activity is significant as
  it may represent an adversary attempting to gain initial access or elevate privileges
  within an Active Directory environment. If confirmed malicious, this could lead
  to unauthorized access, privilege escalation, and further compromise of the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1110.003
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1110/003/
- https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4625
- https://www.ultimatewindowssecurity.com/securitylog/encyclopedia/event.aspx?eventID=4625
- https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/basic-audit-logon-events
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_security`  EventCode=4625 Logon_Type=3 IpAddress!=\"-\"\
    \n  | bucket span=2m _time\n  | stats dc(TargetUserName) AS unique_accounts values(TargetUserName)\
    \ as tried_accounts values(dest) as dest values(src) as src values(user) as user\n\
    \    BY _time, IpAddress, Computer,\n       action, app, authentication_method,\n\
    \       signature, signature_id\n  | eventstats avg(unique_accounts) as comp_avg\
    \ , stdev(unique_accounts) as comp_std\n    BY IpAddress, Computer\n  | eval upperBound=(comp_avg+comp_std*3)\n\
    \  | eval isOutlier=if(unique_accounts > 10 and unique_accounts >= upperBound,\
    \ 1, 0)\n  | search isOutlier=1\n  | `windows_unusual_count_of_users_remotely_failed_to_auth_from_host_filter`"
