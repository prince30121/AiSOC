id: splunk-security-content-a511426e-184f-4de6-8711-cfd2af29d1e1
name: Okta Multiple Accounts Locked Out
description: The following analytic detects multiple Okta accounts being locked out
  within a short period. It uses the user.account.lock event from Okta logs, aggregated
  over a 5-minute window, to identify this behavior. This activity is significant
  as it may indicate a brute force or password spraying attack, where an adversary
  attempts to guess passwords, leading to account lockouts. If confirmed malicious,
  this could result in potential account takeovers or unauthorized access to sensitive
  Okta accounts, posing a significant security risk.
severity: medium
enabled: false
tags:
  mitre:
  - T1110
  categories:
  - application
references:
- https://attack.mitre.org/techniques/T1110/
- https://splunkbase.splunk.com/app/6553
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count max(_time) as lastTime,\
    \ min(_time) as firstTime values(All_Changes.user) as user FROM datamodel=Change\n\
    \  WHERE All_Changes.change_type=AAA All_Changes.object_category=User\n    AND\n\
    \    All_Changes.action=lockout\n    AND\n    All_Changes.command=user.account.lock\n\
    \  BY _time span=5m All_Changes.result\n     All_Changes.command sourcetype All_Changes.src\n\
    \     All_Changes.dest\n| where count > 5\n| `drop_dm_object_name(\"All_Changes\"\
    )`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `okta_multiple_accounts_locked_out_filter`"
