id: splunk-security-content-cbe2ca30-631e-11ec-8670-acde48001122
name: Linux Preload Hijack Library Calls
description: The following analytic detects the use of the LD_PRELOAD environment
  variable to hijack or hook library functions on a Linux platform. It leverages data
  from Endpoint Detection and Response (EDR) agents, focusing on process execution
  logs that include command-line details. This activity is significant because adversaries,
  malware authors, and red teamers commonly use this technique to gain elevated privileges
  and establish persistence on a compromised machine. If confirmed malicious, this
  behavior could allow attackers to execute arbitrary code, escalate privileges, and
  maintain long-term access to the system.
severity: medium
enabled: false
tags:
  mitre:
  - T1574.006
  categories:
  - endpoint
references:
- https://compilepeace.medium.com/memory-malware-part-0x2-writing-userland-rootkits-via-ld-preload-30121c8343d5
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process\
    \ = \"*LD_PRELOAD*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_preload_hijack_library_calls_filter`"
