id: splunk-security-content-0247f90a-aca4-47b2-a94d-e30f445d7b41
name: Windows File and Directory Permissions Enable Inheritance
description: The following analytic detects the enabling of permission inheritance
  using ICACLS. This analytic identifies instances where ICACLS commands are used
  to enable permission inheritance on files or directories. The /inheritance:e flag,
  which restores inherited permissions from a parent directory, is monitored to detect
  changes that might reapply broader access control settings. Enabling inheritance
  can indicate legitimate administrative actions but may also signal attempts to override
  restrictive custom permissions, potentially exposing sensitive files to unauthorized
  access.
severity: medium
enabled: false
tags:
  mitre:
  - T1222.001
  categories:
  - endpoint
references:
- https://www.splunk.com/en_us/blog/security/-applocker-rules-as-defense-evasion-complete-analysis.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` min(_time) as firstTime max(_time)\
    \ as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ IN( \"icacls.exe\", \"cacls.exe\", \"xcacls.exe\")\n    AND\n    Processes.process\
    \ = \"*/inheritance:e*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_file_and_directory_permissions_enable_inheritance_filter`"
