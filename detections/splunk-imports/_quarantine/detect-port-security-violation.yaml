id: splunk-security-content-2de3d5b8-a4fa-45c5-8540-6d071c194d24
name: Detect Port Security Violation
description: The following analytic detects port security violations on Cisco switches.
  It leverages logs from Cisco network devices, specifically looking for events with
  mnemonics indicating port security violations. This activity is significant because
  it indicates an unauthorized device attempting to connect to a secured port, potentially
  bypassing network access controls. If confirmed malicious, this could allow an attacker
  to gain unauthorized access to the network, leading to data exfiltration, network
  disruption, or further lateral movement within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1200
  - T1498
  - T1557.002
  categories:
  - network
references: []
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_networks` (facility=\"PM\" mnemonic=\"ERR_DISABLE\" disable_cause=\"\
    psecure-violation\") OR (facility=\"PORT_SECURITY\" mnemonic=\"PSECURE_VIOLATION\"\
    \ OR mnemonic=\"PSECURE_VIOLATION_VLAN\")\n  | eval src_interface=src_int_prefix_long+src_int_suffix\n\
    \  | stats min(_time) AS firstTime max(_time) AS lastTime values(disable_cause)\
    \ AS disable_cause values(src_mac) AS src_mac values(src_vlan) AS src_vlan values(action)\
    \ AS action count\n    BY host src_interface\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `detect_port_security_violation_filter`"
provenance:
  source: splunk/security_content
