id: splunk-security-content-cd5aed7e-5cea-11eb-ae93-0242ac130002
name: WBAdmin Delete System Backups
description: The following analytic detects the execution of wbadmin.exe with flags
  that delete backup files, specifically targeting catalog or system state backups.
  It leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  process names and command-line arguments. This activity is significant because it
  is commonly used by ransomware to prevent recovery by deleting system backups. If
  confirmed malicious, this action could severely hinder recovery efforts, leading
  to prolonged downtime and potential data loss.
severity: medium
enabled: false
tags:
  mitre:
  - T1490
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1490/T1490.md
- https://thedfirreport.com/2020/10/08/ryuks-return/
- https://attack.mitre.org/techniques/T1490/
- https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/wbadmin
- https://www.welivesecurity.com/2019/04/30/buhtrap-backdoor-ransomware-advertising-platform/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=wbadmin.exe\n        OR\n        Processes.original_file_name=WBADMIN.EXE\n\
    \    )\n    Processes.process=\"*delete*\" ( Processes.process=\"*catalog*\" OR\
    \ Processes.process=\"*backup*\" )\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `wbadmin_delete_system_backups_filter`"
