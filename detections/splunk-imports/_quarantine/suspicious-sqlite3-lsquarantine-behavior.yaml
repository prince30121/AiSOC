id: splunk-security-content-e1997b2e-655f-4561-82fd-aeba8e1c1a86
name: Suspicious SQLite3 LSQuarantine Behavior
description: The following analytic identifies the use of SQLite3 querying the MacOS
  preferences to determine the original URL from which a package was downloaded. This
  detection leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process names and command-line executions involving LSQuarantine. This activity
  is significant as it is commonly associated with MacOS adware and other malicious
  software. If confirmed malicious, this behavior could indicate an attempt to track
  or manipulate downloaded packages, potentially leading to further system compromise
  or persistent adware infections.
severity: medium
enabled: false
tags:
  mitre:
  - T1074
  categories:
  - endpoint
references:
- https://redcanary.com/blog/clipping-silver-sparrows-wings/
- https://www.marcosantadev.com/manage-plist-files-plistbuddy/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=sqlite3\
    \ Processes.process=*LSQuarantine*\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `suspicious_sqlite3_lsquarantine_behavior_filter`"
