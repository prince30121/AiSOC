id: splunk-security-content-7e3df743-b1d8-4631-8fa8-bd5819688876
name: Detect Certipy File Modifications
description: The following analytic detects the use of the Certipy tool to enumerate
  Active Directory Certificate Services (AD CS) environments by identifying unique
  file modifications. It leverages endpoint process and filesystem data to spot the
  creation of files with specific names or extensions associated with Certipy's information
  gathering and exfiltration activities. This activity is significant as it indicates
  potential reconnaissance and data exfiltration efforts by an attacker. If confirmed
  malicious, this could lead to unauthorized access to sensitive AD CS information,
  enabling further attacks or privilege escalation within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1649
  - T1560
  categories:
  - endpoint
references:
- https://github.com/ly4k/Certipy
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE Filesystem.file_name\
    \ IN (\"*_certipy.zip\",\"*_certipy.txt\", \"*_certipy.json\", \"*.ccache\")\n\
    \  BY Filesystem.action Filesystem.dest Filesystem.file_access_time\n     Filesystem.file_create_time\
    \ Filesystem.file_hash Filesystem.file_modify_time\n     Filesystem.file_name\
    \ Filesystem.file_path Filesystem.file_acl\n     Filesystem.file_size Filesystem.process_guid\
    \ Filesystem.process_id\n     Filesystem.user Filesystem.vendor_product\n| `drop_dm_object_name(Filesystem)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `detect_certipy_file_modifications_filter`"
provenance:
