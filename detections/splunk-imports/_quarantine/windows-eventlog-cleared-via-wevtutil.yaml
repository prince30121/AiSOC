id: splunk-security-content-fdb829a8-db84-4832-b64b-3e964cd44f01
name: Windows Eventlog Cleared Via Wevtutil
description: The following analytic detects the usage of wevtutil.exe with the "clear-log"
  parameter in order to clear the contents of logs. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process names and command-line
  arguments. This activity is significant because clearing event logs can be an attempt
  to cover tracks after malicious actions, hindering forensic investigations. If confirmed
  malicious, this behavior could allow an attacker to erase evidence of their activities,
  making it difficult to trace their actions and understand the full scope of the
  compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1070.001
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1070.001/T1070.001.md
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as process min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes\n\
    \  WHERE Processes.process_name=wevtutil.exe Processes.process IN (\"* cl *\"\
    , \"*clear-log*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_eventlog_cleared_via_wevtutil_filter`"
