id: splunk-security-content-8367cb99-bae1-4748-ae3b-0927bb381424
name: GitHub Enterprise Repository Archived
description: The following analytic detects when a repository is archived in GitHub
  Enterprise. The detection monitors GitHub Enterprise audit logs for repository archival
  events by tracking actor details, repository information, and associated metadata.
  For a SOC, identifying repository archival is important as it could indicate attempts
  to make critical code inaccessible or preparation for repository deletion. While
  archiving is a legitimate feature, unauthorized archival of active repositories
  could signal account compromise, insider threats, or attempts to disrupt development
  operations. The impact of unauthorized repository archival includes loss of active
  development access, disruption to workflows and CI/CD pipelines, and potential business
  delays if critical repositories are affected. Additionally, archived repositories
  may be targeted for subsequent deletion, potentially resulting in permanent loss
  of intellectual property if proper backups are not maintained.
severity: medium
enabled: false
tags:
  mitre:
  - T1485
  - T1195
  categories:
  - cloud
references:
- https://www.googlecloudcommunity.com/gc/Community-Blog/Monitoring-for-Suspicious-GitHub-Activity-with-Google-Security/ba-p/763610
- https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/streaming-the-audit-log-for-your-enterprise#setting-up-streaming-to-splunk
logsource:
  product: splunk
detection:
  splunk_spl: "`github_enterprise` action=repo.archived\n  | fillnull\n  | stats count\
    \ min(_time) as firstTime max(_time) as lastTime\n    BY actor, actor_id, actor_is_bot,\n\
    \       actor_location.country_code, business, business_id,\n       org, org_id,\
    \ repo,\n       repo_id, user_agent, visibility,\n       action\n  | eval user=actor\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `github_enterprise_repository_archived_filter`"
