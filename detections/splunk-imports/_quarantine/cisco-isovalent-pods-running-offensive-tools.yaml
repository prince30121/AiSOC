id: splunk-security-content-e9d0b9e6-2f3c-4a8a-9d61-2b6f4a9c1c2e
name: Cisco Isovalent - Pods Running Offensive Tools
description: The following analytic detects execution of known offensive tooling from
  within Kubernetes pods, including network scanners and post-exploitation frameworks
  (e.g., nmap, masscan, zmap, impacket-*, hashcat, john, SharpHound, kube-hunter,
  peirates). We have created a macro named `linux_offsec_tool_processes` that contains
  the list of known offensive tooling found on linux systems. Adversaries commonly
  introduce these tools into compromised workloads to conduct discovery, lateral movement,
  credential access, or cluster reconnaissance. This behavior may indicate a compromised
  container or supply-chain abuse. Extra scrutiny is warranted for namespaces that
  do not typically run diagnostic scanners and for pods that suddenly begin invoking
  these binaries outside of normal maintenance activity.
severity: medium
enabled: false
tags:
  mitre:
  - T1204.003
  categories:
  - endpoint
references:
- https://dev.to/thenjdevopsguy/attacking-a-kubernetes-cluster-enter-red-team-mode-2onj
- https://www.reddit.com/r/kubernetes/comments/l6e5yr/one_of_our_kubernetes_containers_was_compromised/
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_isovalent_process_exec`  `linux_offsec_tool_processes`\n| stats\
    \ count\n        min(_time) as firstTime\n        max(_time) as lastTime\n   \
    \     values(process) as process\n    by cluster_name container_id pod_name pod_namespace\
    \ pod_image_name parent_process_name process_name process_exec process_id node_name\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `cisco_isovalent___pods_running_offensive_tools_filter`"
