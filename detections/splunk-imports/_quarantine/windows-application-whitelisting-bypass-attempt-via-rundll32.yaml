logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \  max(_time) as lastTime\nfrom datamodel=Endpoint.Processes where\n`process_rundll32`\n\
    Processes.process IN (\"*syssetup*\", \"*advpack*\", \"*setupapi*\")\nProcesses.process\
    \ IN (\"*LaunchINFSection*\", \"*InstallHinfSection*\", \"*SetupInfObjectInstallAction*\"\
    )\nNOT (Processes.parent_process_name=\"msiexec.exe\" Processes.process=\"* C:\\\
    \\Program Files (x86)\\\\Netskope\\\\EPDLP Deployment\\\\*\")\nby Processes.action\
    \ Processes.dest Processes.original_file_name Processes.parent_process\n   Processes.parent_process_exec\
    \ Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path Processes.process Processes.process_exec\n   Processes.process_guid\
    \ Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \   Processes.process_name Processes.process_path Processes.user Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_application_whitelisting_bypass_attempt_via_rundll32_filter`"
