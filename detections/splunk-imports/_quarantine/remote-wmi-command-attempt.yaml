id: splunk-security-content-272df6de-61f1-4784-877c-1fbc3e2d0838
name: Remote WMI Command Attempt
description: The following analytic detects the execution of `wmic.exe` with the `node`
  switch, indicating an attempt to spawn a local or remote process. This detection
  leverages data from Endpoint Detection and Response (EDR) agents, focusing on process
  creation events and command-line arguments. This activity is significant as it may
  indicate lateral movement or remote code execution attempts by an attacker. If confirmed
  malicious, the attacker could gain remote control over the targeted system, execute
  arbitrary commands, and potentially escalate privileges or persist within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1047
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1047/T1047.yaml
- https://www.microsoft.com/en-us/security/blog/2023/05/24/volt-typhoon-targets-us-critical-infrastructure-with-living-off-the-land-techniques/
- https://thedfirreport.com/2023/05/22/icedid-macro-ends-in-nokoyawa-ransomware/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_wmic`\
    \ Processes.process=*node*\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `remote_wmi_command_attempt_filter`"
