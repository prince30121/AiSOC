id: splunk-security-content-238f3a07-8440-480b-b26f-462f41d9a47c
name: Windows Masquerading Msdtc Process
description: The following analytic identifies the execution of msdtc.exe with specific
  command-line parameters (-a or -b), which are indicative of the PlugX malware. This
  detection leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process names and command-line arguments. This activity is significant because
  PlugX uses these parameters to masquerade its malicious operations within legitimate
  processes, making it harder to detect. If confirmed malicious, this behavior could
  allow attackers to gain unauthorized access, exfiltrate data, and conduct espionage,
  severely compromising the affected system.
severity: medium
enabled: false
tags:
  mitre:
  - T1036
  categories:
  - endpoint
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.plugx
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` min(_time) as firstTime max(_time)\
    \ as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = \"msdtc.exe\" Processes.process = \"*msdtc.exe*\" Processes.process IN (\"\
    * -a*\", \"* -b*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_masquerading_msdtc_process_filter`"
