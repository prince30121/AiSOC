id: splunk-security-content-fa1c3040-4680-11ec-a618-3e22fbd008af
name: Remote Process Instantiation via DCOM and PowerShell Script Block
description: The following analytic detects the execution of PowerShell commands that
  initiate a process on a remote endpoint via the DCOM protocol. It leverages PowerShell
  Script Block Logging (EventCode=4104) to identify the use of ShellExecute and ExecuteShellCommand.
  This activity is significant as it may indicate lateral movement or remote code
  execution attempts by adversaries. If confirmed malicious, this behavior could allow
  attackers to execute arbitrary code on remote systems, potentially leading to further
  compromise and persistence within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1021.003
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1021/003/
- https://www.cybereason.com/blog/dcom-lateral-movement-techniques
logsource:
  product: splunk
detection:
  splunk_spl: "`powershell` EventCode=4104 (ScriptBlockText=\"*Document.Application.ShellExecute*\"\
    \ OR ScriptBlockText=\"*Document.ActiveView.ExecuteShellCommand*\")\n  | fillnull\n\
    \  | stats count min(_time) as firstTime max(_time) as lastTime\n    BY dest signature\
    \ signature_id\n       user_id vendor_product EventID\n       Guid Opcode Name\n\
    \       Path ProcessID ScriptBlockId\n       ScriptBlockText\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `remote_process_instantiation_via_dcom_and_powershell_script_block_filter`"
