id: splunk-security-content-1400624a-d42d-484d-8843-e6753e6e3645
name: Detect Computer Changed with Anonymous Account
description: 'The following analytic detects changes to computer accounts using an
  anonymous logon.

  It leverages Windows Security Event Codes 4742 (Computer Change) with a SubjectUserName
  of a value "ANONYMOUS LOGON".

  This activity can be significant because anonymous logons should not typically be
  modifying computer accounts, indicating potential unauthorized access or misconfiguration.

  If confirmed malicious, this could allow an attacker to alter computer accounts,
  potentially leading to privilege escalation or persistent access within the network.'
severity: medium
enabled: false
tags:
  mitre:
  - T1210
  categories:
  - endpoint
references:
- https://www.lares.com/blog/from-lares-labs-defensive-guidance-for-zerologon-cve-2020-1472/
- https://netwrix.com/en/cybersecurity-glossary/cyber-security-attacks/zerologon-vulnerability/
- https://github.com/sbousseaden/EVTX-ATTACK-SAMPLES/blob/master/Credential%20Access/Zerologon_VoidSec_CVE-2020-1472_4626_LT3_Anonym_follwedby_4742_DC_Anony_DC.evtx
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_security`\nEventCode=4742\nSubjectUserName=\"ANONYMOUS\
    \ LOGON\"\nPasswordLastSet=\"*\"\n| stats count min(_time) as firstTime max(_time)\
    \ as lastTime\n    BY action app dest ProcessID PasswordLastSet\n       signature\
    \ signature_id src_user status\n       SubjectDomainName user user_group vendor_product\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `detect_computer_changed_with_anonymous_account_filter`"
