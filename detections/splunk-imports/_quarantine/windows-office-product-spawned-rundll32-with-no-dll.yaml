id: splunk-security-content-f28e787e-69ca-480e-9f98-ab970e6d4bcc
name: Windows Office Product Spawned Rundll32 With No DLL
description: The following analytic detects any Windows Office Product spawning `rundll32.exe`
  without a `.dll` file extension. This behavior is identified using Endpoint Detection
  and Response (EDR) telemetry, focusing on process and parent process relationships.
  This activity is significant as it is a known tactic of the IcedID malware family,
  which can lead to unauthorized code execution. If confirmed malicious, this could
  allow attackers to execute arbitrary code, potentially leading to data exfiltration,
  system compromise, or further malware deployment. Immediate investigation and containment
  are recommended.
severity: medium
enabled: false
tags:
  mitre:
  - T1566.001
  categories:
  - endpoint
references:
- https://www.joesandbox.com/analysis/395471/0/html
- https://app.any.run/tasks/cef4b8ba-023c-4b3b-b2ef-6486a44f6ed9/
- https://any.run/malware-trends/icedid
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_office_products_parent`\
    \ `process_rundll32` (Processes.process!=*.dll*)\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_office_product_spawned_rundll32_with_no_dll_filter`"
