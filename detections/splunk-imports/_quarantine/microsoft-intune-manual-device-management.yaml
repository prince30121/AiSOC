id: splunk-security-content-5ca7ebee-4ee7-4cf2-b3be-0ea26a00d822
name: Microsoft Intune Manual Device Management
description: Microsoft Intune device management configuration policies, scripts &
  apps are a all tools administrators can use to remotely manage intune managed devices.
  Instead of waiting for the devices to poll for changes to polciies, the policies
  can be manually pushed to expidite delivery. This may be useful in a pinch, it may
  also be a sign of an impatient attacker trying to speed up the delivery of their
  payload. This detection identifies when a device management configuration policy
  sync events, on-demand remediation scripts are triggered or when devices are remotely
  restarted.
severity: medium
enabled: false
tags:
  mitre:
  - T1021.007
  - T1072
  - T1529
  categories:
  - cloud
references:
- https://posts.specterops.io/death-from-above-lateral-movement-from-azure-to-on-prem-ad-d18cb3959d4d
- https://securityintelligence.com/x-force/detecting-intune-lateral-movement/
- https://posts.specterops.io/maestro-9ed71d38d546
logsource:
  product: splunk
detection:
  splunk_spl: '`azure_monitor_activity` operationName="*ManagedDevice*" | rename identity
    as user, properties.TargetObjectIds{} as TargetObjectId, properties.TargetDisplayNames{}
    as TargetDisplayName, properties.Actor.IsDelegatedAdmin as user_isDelegatedAdmin
    | rex field="operationName" "^(?P<action>\w+)\s" | table _time operationName action
    user user_type user_isDelegatedAdmin TargetDisplayName TargetObjectId status tenantId
    correlationId | `microsoft_intune_manual_device_management_filter`'
