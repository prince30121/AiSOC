id: splunk-security-content-ef3c5ef2-3f6d-4087-aa75-49bf746dc907
name: Windows WMI Process And Service List
description: The following analytic identifies suspicious WMI command lines querying
  for running processes or services. It leverages data from Endpoint Detection and
  Response (EDR) agents, focusing on specific process and command-line events. This
  activity is significant as adversaries often use WMI to gather system information
  and identify services on compromised machines. If confirmed malicious, this behavior
  could allow attackers to map out the system, identify critical services, and plan
  further attacks, potentially leading to privilege escalation or persistence within
  the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1047
  categories:
  - endpoint
references:
- https://github.com/carlospolop/PEASS-ng/tree/master/winPEAS
- https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_wmic`\
    \ Processes.process IN (\"*process*\", \"*service*\") Processes.process = \"*list*\"\
    \n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_wmi_process_and_service_list_filter`"
provenance:
