id: splunk-security-content-0fe052a5-07b8-48e7-9fc8-d6a3957eb914
name: Cisco SD-WAN - Low Frequency Rogue Peer
description: 'This analytic identifies low-frequency Cisco SD-WAN control peering
  activity from control-connection-state-change events where "new-state:up".


  It extracts "peer-type" and "peer-system-ip", groups events by these two fields,
  and counts how often each combination appears within the selected time window.


  Combinations whose count is less than or equal to the defined threshold (currently
  <=3 occurrences in the search window) are flagged as rare.


  Analysts should prioritize peer identities that are rarely observed in the environment,
  particularly those involving unexpected peer-type roles or unfamiliar peer-system-ip
  values.

  Rare control-plane peers may indicate misconfiguration, unauthorized SD-WAN components,
  infrastructure drift, or potentially malicious control-plane connection attempts.


  Findings might indicate the potential exploitation of CVE-2026-20127.


  Note that the threshold setting is set to "3", but its highly recommended that this
  should be adapted to the environment before deploying this search.'
severity: medium
enabled: false
tags:
  mitre:
  - T1190
  categories:
  - network
references:
- https://www.cisa.gov/news-events/directives/supplemental-direction-ed-26-03-hunt-and-hardening-guidance-cisco-sd-wan-systems
- https://blog.talosintelligence.com/uat-8616-sd-wan/
- https://www.cisco.com/c/en/us/td/docs/routers/sdwan/configuration/Monitor-And-Maintain/monitor-maintain-book/m-alarms-events-logs.html
- https://www.cisco.com/c/en/us/td/docs/routers/sdwan/17-x/systems-interfaces/systems-interfaces-guide-17-x/system-logging.html#config-sys-logging
- https://sec.cloudapps.cisco.com/security/center/resources/Cisco-Catalyst-SD-WAN-HardeningGuide
- https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-rpa-EHchtZk
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_sd_wan_syslog`\nTERM(\"*control-connection-state-change*\")\n\
    TERM(\"*new-state:up*\")\nTERM(\"*peer-system-ip:*\")\nTERM(\"*public-ip:*\")\n\
    | rex field=_raw \"^(?<event_timestamp>(?:[A-Z][a-z]{2}\\s+\\d{1,2}\\s+\\d{2}:\\\
    d{2}:\\d{2}(?:\\.\\d{3})?|[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\\\
    .\\d{1,6})?(?:Z|[+-][0-9]{2}:[0-9]{2})))\\s*:?\"\n| rex field=_raw \"^(?:[A-Z][a-z]{2}\\\
    s+\\d{1,2}\\s+\\d{2}:\\d{2}:\\d{2}(?:\\.\\d{3})?\\s*:?\\s+)(?<prefix_host>[^\\\
    s:]+)\\s+\\S+(?:\\[\\d+\\])?:\\s+%\"\n| eval dest=coalesce(prefix_host, legacy_host,\
    \ device_name, host)\n| rex field=_raw \"new-state:(?<new_state>\\S+)\"\n| rex\
    \ field=_raw \"peer-type:(?<peer_type>\\S+)\"\n| rex field=_raw \"peer-system-ip:(?<peer_system_ip>\\\
    S+)\"\n| rex field=_raw \"public-ip:(?<public_ip>\\S+)\"\n| rex field=_raw \"\
    public-port:(?<public_port>\\d+)\"\n\n| where isnotnull(peer_type) AND isnotnull(peer_system_ip)\n\
    \n| stats count\n        values(dest) as dest\n        values(public_ip) as public_ips\n\
    \        values(public_port) as public_ports\n  by peer_type peer_system_ip\n\
    | where count <= 3\n| sort 0 count asc\n| table dest peer_type peer_system_ip\
    \ public_ips\n        public_ports count\n| `cisco_sd_wan___low_frequency_rogue_peer_filter`"
