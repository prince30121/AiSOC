id: splunk-security-content-f3e86ff3-b1f9-4382-8924-6913385f1019
name: Windows RDP Cache File Deletion
description: This detection identifies the deletion of RDP bitmap cache files—specifically
  .bmc and .bin files—typically stored in the user profile under the Terminal Server
  Client\Cache directory. These files are created by the native Windows Remote Desktop
  Client (mstsc.exe) and store graphical elements from remote sessions to improve
  performance. Deleting these files may indicate an attempt to remove forensic evidence
  of RDP usage. While rare in legitimate user behavior, this action is commonly associated
  with defense evasion techniques used by attackers or red teamers who wish to hide
  traces of interactive remote access. When observed in conjunction with recent logon
  activity, RDP session indicators, or script execution, this behavior should be treated
  as potentially malicious. Monitoring for deletion of these files provides valuable
  visibility into anti-forensic actions that often follow lateral movement or hands-on-keyboard
  activity.
severity: medium
enabled: false
tags:
  mitre:
  - T1070.004
  categories:
  - endpoint
references:
- https://medium.com/@bonguides25/how-to-clear-rdp-connections-history-in-windows-cf0ffb67f344
- https://thelocalh0st.github.io/posts/rdp/
logsource:
  product: splunk
detection:
  splunk_spl: '`sysmon` EventCode IN ("23", "26") TargetFilename IN ("*\\Terminal
    Server Client\\Cache\\*.bmc", "*\\Terminal Server Client\\Cache\\cache*.bin")
    | stats count min(_time) as firstTime, max(_time) as lastTime by action dest dvc
    file_path file_hash file_name file_modify_time process_exec process_guid process_id
    process_name process_path signature signature_id user user_id vendor_product |
    `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `windows_rdp_cache_file_deletion_filter`'
