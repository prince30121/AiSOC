id: splunk-security-content-b8f9947e-065a-11ec-aafb-acde48001122
name: Get DomainPolicy with Powershell
description: The following analytic detects the execution of `powershell.exe` running
  the `Get-DomainPolicy` cmdlet, which is used to retrieve password policies in a
  Windows domain. It leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process names and command-line executions. This activity is significant
  as it indicates potential reconnaissance efforts by adversaries to gather domain
  policy information, which is crucial for planning further attacks. If confirmed
  malicious, this could lead to unauthorized access to sensitive domain configurations,
  aiding in privilege escalation and lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1201
  categories:
  - endpoint
references:
- https://github.com/S1ckB0y1337/Active-Directory-Exploitation-Cheat-Sheet
- https://powersploit.readthedocs.io/en/latest/Recon/Get-DomainPolicy/
- https://attack.mitre.org/techniques/T1201/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=\"cmd.exe\"\n        OR\n        Processes.process_name=\"\
    powershell*\"\n    )\n    AND Processes.process = \"*Get-DomainPolicy*\"\n  BY\
    \ Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `get_domainpolicy_with_powershell_filter`"
