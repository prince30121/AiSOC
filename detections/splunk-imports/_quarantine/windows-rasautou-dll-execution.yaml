id: splunk-security-content-6f42b8be-8e96-11ec-ad5a-acde48001122
name: Windows Rasautou DLL Execution
description: The following analytic detects the execution of an arbitrary DLL by the
  Windows Remote Auto Dialer (rasautou.exe). This behavior is identified by analyzing
  process creation events where rasautou.exe is executed with specific command-line
  arguments. This activity is significant because it leverages a Living Off The Land
  Binary (LOLBin) to execute potentially malicious code, bypassing traditional security
  controls. If confirmed malicious, this technique could allow an attacker to execute
  arbitrary code, potentially leading to system compromise, privilege escalation,
  or persistent access within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1055.001
  - T1218
  categories:
  - endpoint
references:
- https://github.com/mandiant/DueDLLigence
- https://github.com/MHaggis/notes/blob/master/utilities/Invoke-SPLDLLigence.ps1
- https://gist.github.com/NickTyrer/c6043e4b302d5424f701f15baf136513
- https://www.mandiant.com/resources/staying-hidden-on-the-endpoint-evading-detection-with-shellcode
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=rasautou.exe\
    \ Processes.process=\"* -d *\"AND Processes.process=\"* -p *\"\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_rasautou_dll_execution_filter`"
