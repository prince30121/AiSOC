id: splunk-security-content-b0c64d6e-cfdf-441a-b6ce-d956e202563e
name: ESXi User Granted Admin Role
description: This detection identifies when a user is granted the Administrator role
  on an ESXi host. Assigning elevated privileges is a critical action that can indicate
  potential malicious behavior if performed unexpectedly. Adversaries who gain access
  may use this to escalate privileges, maintain persistence, or disable security controls.
severity: medium
enabled: false
tags:
  mitre:
  - T1098
  - T1078
  categories:
  - application
references: []
logsource:
  product: splunk
detection:
  splunk_spl: '`esxi_syslog` Message="*esxcli system permission set*" AND Message="*role
    Admin*" | rex field=_raw "\]: \[(?<user>\w+)\]:(?<command>.+)" | rex field=_raw
    "--id (?<target_user>\w+)" | rex field=_raw "Z (?<dest>[\w\.]+)\s" | stats min(_time)
    as firstTime max(_time) as lastTime count by dest user command target_user | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `esxi_user_granted_admin_role_filter`'
provenance:
  source: splunk/security_content
  source_id: b0c64d6e-cfdf-441a-b6ce-d956e202563e
  source_commit: 4d4c7ee
