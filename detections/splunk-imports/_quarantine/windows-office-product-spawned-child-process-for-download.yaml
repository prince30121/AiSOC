id: splunk-security-content-f02b64b8-cbea-4f75-bf77-7a05111566b1
name: Windows Office Product Spawned Child Process For Download
description: The following analytic identifies Office applications spawning child
  processes to download content via HTTP/HTTPS. It leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process creation events where Office applications
  like Word or Excel initiate network connections, excluding common browsers. This
  activity is significant as it often indicates the use of malicious documents to
  execute living-off-the-land binaries (LOLBins) for payload delivery. If confirmed
  malicious, this behavior could lead to unauthorized code execution, data exfiltration,
  or further malware deployment, posing a severe threat to the organization's security.
severity: medium
enabled: false
tags:
  mitre:
  - T1566.001
  categories:
  - endpoint
references:
- https://app.any.run/tasks/92d7ef61-bfd7-4c92-bc15-322172b4ebec/
- https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/trojanized-onenote-document-leads-to-formbook-malware/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime from datamodel=Endpoint.Processes where\n`process_office_products_parent`\n\
    Processes.process IN (\"*http:*\",\"*https:*\")\nNOT (\n  Processes.original_file_name\
    \ IN (\"firefox.exe\", \"chrome.exe\",\"iexplore.exe\",\"msedge.exe\")\n  OR\n\
    \  Processes.process_name IN (\"firefox.exe\", \"chrome.exe\",\"iexplore.exe\"\
    ,\"msedge.exe\")\n)\nby Processes.action Processes.dest\nProcesses.original_file_name\
    \ Processes.parent_process Processes.parent_process_exec\nProcesses.parent_process_guid\
    \ Processes.parent_process_id Processes.parent_process_name\nProcesses.parent_process_path\
    \ Processes.process Processes.process_exec Processes.process_guid\nProcesses.process_hash\
    \ Processes.process_id Processes.process_integrity_level Processes.process_name\n\
    Processes.process_path Processes.user Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_office_product_spawned_child_process_for_download_filter`"
