id: splunk-security-content-1fdf31c9-ff4d-4c48-b799-0e8666e08787
name: Windows Indirect Command Execution Via forfiles
description: The following analytic detects the execution of programs initiated by
  forfiles.exe. This command is typically used to run commands on multiple files,
  often within batch scripts. The detection leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process creation events where forfiles.exe
  is the parent process. This activity is significant because forfiles.exe can be
  exploited to bypass command line execution protections, making it a potential vector
  for malicious activity. If confirmed malicious, this could allow attackers to execute
  arbitrary commands, potentially leading to unauthorized access or further system
  compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1202
  categories:
  - endpoint
references:
- https://twitter.com/KyleHanslovan/status/912659279806640128
- https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/forfiles
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process=\"\
    *forfiles* /c *\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_indirect_command_execution_via_forfiles_filter`"
