id: splunk-security-content-61059783-574b-40d2-ac2f-69b898afd6b4
name: Linux Auditd Doas Conf File Creation
description: 'The following analytic detects the creation of the doas.conf file on
  a Linux host.

  This file is used by the doas utility to allow standard users to perform tasks as
  root, similar to sudo.

  The detection leverages Linux Auditd data, focusing on the creation of the doas.conf
  file.

  This activity is significant because it can indicate an attempt to gain elevated
  privileges, potentially by an adversary. If confirmed malicious, this could allow
  an attacker to execute commands with root commands with root privileges, leading
  to full system compromise.'
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://wiki.gentoo.org/wiki/Doas
- https://www.makeuseof.com/how-to-install-and-use-doas/
logsource:
  product: splunk
detection:
  splunk_spl: "`linux_auditd`\n(\n  (type=PATH nametype=\"CREATE\")\n  OR\n  type=CWD\n\
    )\n| rex \"msg=audit\\([^)]*:(?<audit_id>\\d+)\\)\"\n\n| stats\n  values(type)\
    \ as types\n  values(name) as names\n  values(nametype) as nametype\n  values(cwd)\
    \ as cwd_list\n  values(_time) as event_times\n  by audit_id host\n\n| eval current_working_directory\
    \ = coalesce(mvindex(cwd_list, 0), \"N/A\")\n| eval candidate_paths = mvmap(names,\
    \ if(match(names, \"^/\"), names, current_working_directory + \"/\" + names))\n\
    | eval matched_paths = mvfilter(match(candidate_paths, \"/etc/doas.conf.*\"))\n\
    | eval match_count = mvcount(matched_paths)\n| eval reconstructed_path = mvindex(matched_paths,\
    \ 0)\n| eval e_time = mvindex(event_times, 0)\n| where match_count > 0\n| rename\
    \ host as dest\n\n| stats count min(e_time) as firstTime max(e_time) as lastTime\n\
    \  values(nametype) as nametype\n  by current_working_directory\n     reconstructed_path\n\
    \     match_count\n     dest\n     audit_id\n\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| table nametype current_working_directory\
    \ reconstructed_path dest audit_id match_count firstTime lastTime\n| `linux_auditd_doas_conf_file_creation_filter`"
