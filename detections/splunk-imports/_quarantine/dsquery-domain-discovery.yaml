id: splunk-security-content-cc316032-924a-11eb-91a2-acde48001122
name: DSQuery Domain Discovery
description: The following analytic detects the execution of "dsquery.exe" with arguments
  targeting `TrustedDomain` queries directly from the command line. This behavior
  is identified using Endpoint Detection and Response (EDR) telemetry, focusing on
  process names and command-line arguments. This activity is significant as it often
  indicates domain trust discovery, a common step in lateral movement or privilege
  escalation by adversaries. If confirmed malicious, this could allow attackers to
  map domain trusts, potentially leading to further exploitation and unauthorized
  access to trusted domains.
severity: medium
enabled: false
tags:
  mitre:
  - T1482
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1482/T1482.md
- https://blog.harmj0y.net/redteaming/a-guide-to-attacking-domain-trusts/
- https://docs.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2012-R2-and-2012/cc732952(v=ws.11)
- https://docs.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2012-R2-and-2012/cc754232(v=ws.11)
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=dsquery.exe\
    \ Processes.process=*trustedDomain*\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `dsquery_domain_discovery_filter`"
