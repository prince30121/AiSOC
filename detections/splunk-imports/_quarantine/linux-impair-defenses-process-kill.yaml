id: splunk-security-content-435c6b33-adf9-47fe-be87-8e29fd6654f5
name: Linux Impair Defenses Process Kill
description: The following analytic identifies the execution of the 'pkill' command,
  which is used to terminate processes on a Linux system. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process names and command-line
  executions. This activity is significant because threat actors often use 'pkill'
  to disable security defenses or terminate critical processes, facilitating further
  malicious actions. If confirmed malicious, this behavior could lead to the disruption
  of security applications, enabling attackers to evade detection and potentially
  corrupt or destroy files on the targeted system.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/overview-of-the-cyber-weapons-used-in-the-ukraine-russia-war/
- https://cert.gov.ua/article/3718487
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ IN ( \"pgrep\", \"pkill\") Processes.process = \"*pkill *\"\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `linux_impair_defenses_process_kill_filter`"
