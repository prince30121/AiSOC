id: splunk-security-content-391329f3-c14b-4b8d-8b37-ac5012637360
name: Windows Steal Authentication Certificates Export PfxCertificate
description: The following analytic detects the use of the PowerShell cmdlet `export-pfxcertificate`
  on the command line, indicating an attempt to export a certificate from the local
  Windows Certificate Store. This detection leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process execution logs and command-line arguments.
  This activity is significant as it may indicate an attempt to exfiltrate authentication
  certificates, which can be used to impersonate users or decrypt sensitive data.
  If confirmed malicious, this could lead to unauthorized access and potential data
  breaches.
severity: medium
enabled: false
tags:
  mitre:
  - T1649
  categories:
  - endpoint
references:
- https://dev.to/iamthecarisma/managing-windows-pfx-certificates-through-powershell-3pj
- https://learn.microsoft.com/en-us/powershell/module/pki/export-pfxcertificate?view=windowsserver2022-ps
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *export-pfxcertificate*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_steal_authentication_certificates_export_pfxcertificate_filter`"
provenance:
