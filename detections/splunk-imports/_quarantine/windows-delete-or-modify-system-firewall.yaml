id: splunk-security-content-b188d11a-eba7-419d-b8b6-cc265b4f2c4f
name: Windows Delete or Modify System Firewall
description: The following analytic identifies 'netsh' processes that delete or modify
  firewall configurations. It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on command-line executions containing specific keywords.
  This activity is significant because it can indicate malware, such as NJRAT, attempting
  to alter firewall settings to evade detection or remove traces. If confirmed malicious,
  this behavior could allow an attacker to disable security measures, facilitating
  further compromise and persistence within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.004
  categories:
  - endpoint
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.njrat
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_netsh`\
    \ Processes.process = \"* firewall *\" Processes.process = \"* del*\"\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(\"Processes\")`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_delete_or_modify_system_firewall_filter`"
