id: splunk-security-content-be6d868d-33b6-4aaa-912e-724fb555b11a
name: Azure AD Successful Authentication From Different Ips
description: The following analytic detects an Azure AD account successfully authenticating
  from multiple unique IP addresses within a 30-minute window. It leverages Azure
  AD SignInLogs to identify instances where the same user logs in from different IPs
  in a short time frame. This behavior is significant as it may indicate compromised
  credentials being used by an adversary, potentially following a phishing attack.
  If confirmed malicious, this activity could allow unauthorized access to corporate
  resources, leading to data breaches or further exploitation within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1110.001
  - T1110.003
  categories:
  - cloud
references:
- https://attack.mitre.org/techniques/T1110
- https://attack.mitre.org/techniques/T1110.001
- https://attack.mitre.org/techniques/T1110.003
logsource:
  product: splunk
detection:
  splunk_spl: "`azure_monitor_aad` properties.authenticationDetails{}.succeeded=true\
    \ category=SignInLogs\n  | rename properties.* as *\n  | bucket span=30m _time\n\
    \  | fillnull\n  | stats count min(_time) as firstTime max(_time) as lastTime\
    \ dc(src) AS unique_ips values(dest) as dest values(src) as src\n    BY user vendor_account\
    \ vendor_product\n       signature\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | where unique_ips > 1\n  | `azure_ad_successful_authentication_from_different_ips_filter`"
