id: splunk-security-content-8b700d7e-54ad-4d7d-81cc-1456c4703306
name: Windows Impair Defense Disable Win Defender App Guard
description: The following analytic detects modifications to the Windows registry
  that disable Windows Defender Application Guard auditing. It leverages data from
  the Endpoint.Registry data model, focusing on specific registry paths and values.
  This activity is significant because disabling auditing can hinder security monitoring
  and threat detection within the isolated environment, making it easier for malicious
  activities to go unnoticed. If confirmed malicious, this action could allow attackers
  to bypass Windows Defender protections, potentially leading to unauthorized access,
  data exfiltration, or further system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://x.com/malmoeb/status/1742604217989415386?s=20
- https://github.com/undergroundwires/privacy.sexy
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime FROM datamodel=Endpoint.Registry where Registry.registry_path=
    "*\\Policies\\Microsoft\\AppHVSI\\AuditApplicationGuard" Registry.registry_value_data="0x00000000"
    by Registry.action Registry.dest Registry.process_guid Registry.process_id Registry.registry_hive
    Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)` | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `windows_impair_defense_disable_win_defender_app_guard_filter`'
