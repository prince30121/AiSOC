id: splunk-security-content-cbc95e44-7c22-443f-88fd-0424478f5589
name: AWS ECR Container Scanning Findings Low Informational Unknown
description: The following analytic identifies low, informational, or unknown severity
  findings from AWS Elastic Container Registry (ECR) image scans. It leverages AWS
  CloudTrail logs, specifically the DescribeImageScanFindings event, to detect these
  findings. This activity is significant for a SOC as it helps in early identification
  of potential vulnerabilities or misconfigurations in container images, which could
  be exploited if left unaddressed. If confirmed malicious, these findings could lead
  to unauthorized access, data breaches, or further exploitation within the containerized
  environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1204.003
  categories:
  - cloud
references:
- https://docs.aws.amazon.com/AmazonECR/latest/userguide/image-scanning.html
logsource:
  product: splunk
detection:
  splunk_spl: "`cloudtrail` eventSource=ecr.amazonaws.com eventName=DescribeImageScanFindings\n\
    \  | spath path=responseElements.imageScanFindings.findings{} output=findings\n\
    \  | mvexpand findings\n  | spath input=findings\n  | search severity IN (\"LOW\"\
    , \"INFORMATIONAL\", \"UNKNOWN\")\n  | rename name as finding_name, description\
    \ as finding_description, requestParameters.imageId.imageDigest as imageDigest,\
    \ requestParameters.repositoryName as repository\n  | rename user_name as user\n\
    \  | stats count min(_time) as firstTime max(_time) as lastTime\n    BY signature\
    \ dest user\n       user_agent src vendor_account\n       vendor_region vendor_product\
    \ finding_name\n       finding_description imageDigest repository\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `aws_ecr_container_scanning_findings_low_informational_unknown_filter`"
provenance:
