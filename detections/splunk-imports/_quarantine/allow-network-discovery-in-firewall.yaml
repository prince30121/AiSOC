id: splunk-security-content-ccd6a38c-d40b-11eb-85a5-acde48001122
name: Allow Network Discovery In Firewall
description: The following analytic detects a suspicious modification to the firewall
  to allow network discovery on a machine. It leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on command-line executions involving the 'netsh'
  command to enable network discovery. This activity is significant because it is
  commonly used by ransomware, such as REvil and RedDot, to discover and compromise
  additional machines on the network. If confirmed malicious, this could lead to widespread
  file encryption across multiple hosts, significantly amplifying the impact of the
  ransomware attack.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.007
  categories:
  - endpoint
references:
- https://community.fortinet.com:443/t5/FortiEDR/How-FortiEDR-detects-and-blocks-Revil-Ransomware-aka-sodinokibi/ta-p/189638?externalID=FD52469
- https://app.any.run/tasks/c0f98850-af65-4352-9746-fbebadee4f05/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_netsh`\
    \ Processes.process= \"*firewall*\" Processes.process= \"*group=\\\"Network Discovery\\\
    \"*\"  Processes.process=\"*enable*\" Processes.process=\"*Yes*\"\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `allow_network_discovery_in_firewall_filter`"
