id: splunk-security-content-726959fe-316d-445c-a584-fa187d64e295
name: ASL AWS IAM Assume Role Policy Brute Force
description: The following analytic detects multiple failed attempts to assume an
  AWS IAM role, indicating a potential brute force attack. It leverages AWS CloudTrail
  logs to identify `MalformedPolicyDocumentException` errors with a status of `failure`
  and filters out legitimate AWS services. This activity is significant as repeated
  failures to assume roles can indicate an adversary attempting to guess role names,
  which is a precursor to unauthorized access. If confirmed malicious, this could
  lead to unauthorized access to AWS resources, potentially compromising sensitive
  data and services.
severity: medium
enabled: false
tags:
  mitre:
  - T1580
  - T1110
  categories:
  - cloud
references:
- https://www.praetorian.com/blog/aws-iam-assume-role-vulnerabilities/
- https://rhinosecuritylabs.com/aws/assume-worst-aws-assume-role-enumeration/
- https://www.elastic.co/guide/en/security/current/aws-iam-brute-force-of-assume-role-policy.html
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=\"AssumeRole\" \"api.response.error\"\
    =AccessDenied\n  | bucket _time span=1h\n  | stats count as failures min(_time)\
    \ as firstTime max(_time) as lastTime values(api.operation) as api.operation values(api.service.name)\
    \ as api.service.name values(http_request.user_agent) as http_request.user_agent\
    \ values(src_endpoint.ip) as src_ip values(actor.user.account.uid) as actor.user.account.uid\
    \ values(cloud.provider) as cloud.provider values(cloud.region) as cloud.region\n\
    \    BY _time actor.user.uid\n  | where failures >= 3\n  | rename actor.user.uid\
    \ as user api.operation as action api.service.name as dest http_request.user_agent\
    \ as user_agent src_endpoint.ip as src actor.user.account.uid as vendor_account\
    \ cloud.provider as vendor_product cloud.region as vendor_region\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `asl_aws_iam_assume_role_policy_brute_force_filter`"
