id: splunk-security-content-5643cdc9-a0be-4123-860b-f13da0bf4fcb
name: ESXi VM Discovery
description: This detection identifies the use of ESXCLI commands to discover virtual
  machines on an ESXi host While used by administrators, this activity may also indicate
  adversary reconnaissance aimed at identifying high value targets, mapping the virtual
  environment, or preparing for data theft or destructive operations.
severity: medium
enabled: false
tags:
  mitre:
  - T1673
  categories:
  - application
references: []
logsource:
  product: splunk
detection:
  splunk_spl: '`esxi_syslog` Message="*esxcli vm process*" Message="*list*" | rex
    field=_raw "\]: \[(?<user>\w+)\]:(?<command>.+)" | rex field=_raw "Z (?<dest>[\w\.]+)\s"
    | stats min(_time) as firstTime max(_time) as lastTime count by dest user command
    | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `esxi_vm_discovery_filter`'
provenance:
  source: splunk/security_content
  source_id: 5643cdc9-a0be-4123-860b-f13da0bf4fcb
  source_commit: 4d4c7ee
