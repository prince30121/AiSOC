id: splunk-security-content-1347b9e8-2daa-4a6f-be73-b421d3d9e268
name: Azure AD User Enabled And Password Reset
description: The following analytic detects an Azure AD user enabling a previously
  disabled account and resetting its password within 2 minutes. It uses Azure Active
  Directory events to identify this sequence of actions. This activity is significant
  because it may indicate an adversary with administrative access attempting to establish
  a backdoor identity within the Azure AD tenant. If confirmed malicious, this could
  allow the attacker to maintain persistent access, escalate privileges, and potentially
  exfiltrate sensitive information from the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1098
  categories:
  - cloud
references:
- https://attack.mitre.org/techniques/T1098/
logsource:
  product: splunk
detection:
  splunk_spl: "`azure_monitor_aad` (operationName=\"Enable account\" OR operationName=\"\
    Reset password (by admin)\" OR operationName=\"Update user\")\n  | transaction\
    \ user startsWith=(operationName=\"Enable account\") endsWith=(operationName=\"\
    Reset password (by admin)\") maxspan=2m\n  | rename properties.* as *\n  | rename\
    \ initiatedBy.user.userPrincipalName as initiatedBy\n  | fillnull\n  | stats count\
    \ min(_time) as firstTime max(_time) as lastTime\n    BY dest user src\n     \
    \  vendor_account vendor_product initiatedBy\n       signature\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `azure_ad_user_enabled_and_password_reset_filter`"
