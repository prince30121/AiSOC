id: splunk-security-content-785bbfb5-d404-42d1-ab9d-45c37a2c75cd
name: Windows MMC Loaded Script Engine DLL
description: The following analytic identifies when a Windows process loads scripting
  libraries like jscript.dll or vbscript.dll to execute script code on a target system.
  While these DLLs are legitimate parts of the operating system, their use by unexpected
  processes or in unusual contexts can indicate malicious activity, such as script-based
  malware, living-off-the-land techniques, or automated attacks. This detection monitors
  which processes load these libraries, along with their command-line arguments and
  parent processes, to help distinguish normal administrative behavior from potential
  threats. Alerts should be investigated with attention to the process context and
  any subsequent network or system activity, as legitimate tools like MMC snap-ins
  may also trigger this behavior under routine administrative tasks.
severity: medium
enabled: false
tags:
  mitre:
  - T1620
  categories:
  - endpoint
references:
- https://www.securonix.com/blog/analyzing-fluxconsole-using-tax-themed-lures-threat-actors-exploit-windows-management-console-to-deliver-backdoor-payloads/
- https://research.checkpoint.com/2019/microsoft-management-console-mmc-vulnerabilities/
logsource:
  product: splunk
detection:
  splunk_spl: '`sysmon` EventCode=7  process_name = mmc.exe ImageLoaded IN ("*\\jscript.dll",
    "*\\vbscript.dll", "*\\jscript9.dll") | fillnull | stats count min(_time) as firstTime
    max(_time) as lastTime by Image ImageLoaded dest loaded_file loaded_file_path
    original_file_name process_exec process_guid process_hash process_id process_name
    process_path service_dll_signature_exists service_dll_signature_verified signature
    signature_id user_id vendor_product | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
    | `windows_mmc_loaded_script_engine_dll_filter`'
