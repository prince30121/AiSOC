id: splunk-security-content-3e27af56-fcf0-4113-988d-24969b062be7
name: Windows Executable in Loaded Modules
description: The following analytic identifies instances where executable files (.exe)
  are loaded as modules, detected through 'ImageLoaded' events in Sysmon logs. This
  method leverages Sysmon EventCode 7 to track unusual module loading behavior, which
  is significant as it deviates from the norm of loading .dll files. This activity
  is crucial for SOC monitoring because it can indicate the presence of malware like
  NjRAT, which uses this technique to load malicious modules. If confirmed malicious,
  this behavior could allow attackers to execute arbitrary code, maintain persistence,
  and further compromise the host system.
severity: medium
enabled: false
tags:
  mitre:
  - T1129
  categories:
  - endpoint
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.njrat
logsource:
  product: splunk
detection:
  splunk_spl: "`sysmon` EventCode=7 ImageLoaded != *.dll AND Signed != true\n  | fillnull\n\
    \  | stats count min(_time) as firstTime max(_time) as lastTime\n    BY Image\
    \ ImageLoaded dest\n       loaded_file loaded_file_path original_file_name\n \
    \      process_exec process_guid process_hash\n       process_id process_name\
    \ process_path\n       service_dll_signature_exists service_dll_signature_verified\
    \ signature\n       Signed signature_id user_id\n       vendor_product\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `windows_executable_in_loaded_modules_filter`"
