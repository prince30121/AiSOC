id: splunk-security-content-e451bd16-e4c5-4109-8eb1-c4c6ecf048b4
name: Suspicious Rundll32 no Command Line Arguments
description: 'The following analytic detects the execution of rundll32.exe without
  any command line arguments.

  This behavior is identified using Endpoint Detection and Response (EDR) telemetry,
  focusing on process execution logs.

  It is significant because rundll32.exe typically requires command line arguments
  to function properly, and its absence is often associated with malicious activities,
  such as those performed by Cobalt Strike.

  If confirmed malicious, this activity could indicate an attempt to execute arbitrary
  code, potentially leading to credential dumping, unauthorized file writes, or other
  malicious actions.'
severity: medium
enabled: false
tags:
  mitre:
  - T1218.011
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1218/011/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218.011/T1218.011.md
- https://lolbas-project.github.io/lolbas/Binaries/Rundll32/
- https://bohops.com/2018/02/26/leveraging-inf-sct-fetch-execute-techniques-for-bypass-evasion-persistence/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nFROM datamodel=Endpoint.Processes WHERE\n\n\
    `process_rundll32`\nProcesses.process IN (\"*rundll32\",\"*rundll32.exe\", \"\
    *rundll32.exe\\\"\")\n\nBY Processes.action Processes.dest Processes.original_file_name\n\
    \   Processes.parent_process Processes.parent_process_exec\n   Processes.parent_process_guid\
    \ Processes.parent_process_id\n   Processes.parent_process_name Processes.parent_process_path\n\
    \   Processes.process Processes.process_exec Processes.process_guid\n   Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n   Processes.process_name\
    \ Processes.process_path Processes.user\n   Processes.user_id Processes.vendor_product\n\
    \n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `suspicious_rundll32_no_command_line_arguments_filter`"
