id: splunk-security-content-92d51712-ee29-11eb-b1ae-acde48001122
name: Suspicious Rundll32 PluginInit
description: The following analytic identifies the execution of the rundll32.exe process
  with the "plugininit" parameter. This detection leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process creation events and command-line
  arguments. This activity is significant because the "plugininit" parameter is commonly
  associated with IcedID malware, which uses it to execute an initial DLL stager to
  download additional payloads. If confirmed malicious, this behavior could lead to
  further malware infections, data exfiltration, or complete system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.011
  categories:
  - endpoint
references:
- https://threatpost.com/icedid-banking-trojan-surges-emotet/165314/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_rundll32`\
    \ Processes.process=*PluginInit*\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `suspicious_rundll32_plugininit_filter`"
