id: splunk-security-content-bf0304b6-6250-11ec-9d7c-acde48001122
name: Linux Setuid Using Chmod Utility
description: The following analytic detects the execution of the chmod utility to
  set the SUID or SGID bit on files, which can allow users to temporarily gain root
  or group-level access. This detection leverages data from Endpoint Detection and
  Response (EDR) agents, focusing on process names and command-line arguments related
  to chmod. This activity is significant as it can indicate an attempt to escalate
  privileges or maintain persistence on a system. If confirmed malicious, an attacker
  could gain elevated access, potentially compromising sensitive data or critical
  system functions.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.001
  categories:
  - endpoint
references:
- https://www.hackingarticles.in/linux-privilege-escalation-using-capabilities/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name = chmod\n        OR\n        Processes.process = \"\
    *chmod *\"\n    )\n    AND Processes.process IN(\"* g+s *\", \"* u+s *\", \"*\
    \ 4777 *\", \"* 4577 *\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_setuid_using_chmod_utility_filter`"
