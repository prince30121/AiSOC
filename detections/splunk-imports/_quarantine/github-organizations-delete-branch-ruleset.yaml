id: splunk-security-content-8e454f64-4bd6-45e6-8a94-1b482593d721
name: GitHub Organizations Delete Branch Ruleset
description: The following analytic detects when branch rulesets are deleted in GitHub
  Organizations. The detection monitors GitHub Organizations audit logs for branch
  ruleset deletion events by tracking actor details, repository information, and associated
  metadata. For a SOC, identifying deleted branch rulesets is critical as it could
  indicate attempts to bypass code review requirements and security controls. Branch
  rulesets are essential security controls that enforce code review, prevent force
  pushes, and maintain code quality. Disabling these protections could allow malicious
  actors to directly push unauthorized code changes or backdoors to protected branches.
  The impact of disabled branch protection includes potential code tampering, bypass
  of security reviews, introduction of vulnerabilities or malicious code, and compromise
  of software supply chain integrity. This activity could be part of a larger attack
  chain where an adversary first disables security controls before attempting to inject
  malicious code.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  - T1195
  categories:
  - cloud
references:
- https://splunk.github.io/splunk-add-on-for-github-audit-log-monitoring/Install/
- https://www.googlecloudcommunity.com/gc/Community-Blog/Monitoring-for-Suspicious-GitHub-Activity-with-Google-Security/ba-p/763610
logsource:
  product: splunk
detection:
  splunk_spl: "`github_organizations` vendor_action=repository_ruleset.destroy\n \
    \ | fillnull\n  | stats count min(_time) as firstTime max(_time) as lastTime\n\
    \    BY actor, actor_id, actor_ip,\n       actor_is_bot, actor_location.country_code,\
    \ business,\n       business_id, org, org_id,\n       repo, repo_id, user_agent,\n\
    \       vendor_action, ruleset_name\n  | eval user=actor\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `github_organizations_delete_branch_ruleset_filter`"
