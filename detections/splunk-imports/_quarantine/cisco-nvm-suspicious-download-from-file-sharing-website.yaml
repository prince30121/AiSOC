id: splunk-security-content-94ebc001-35e7-4ae8-9b0e-52766b2f99c7
name: Cisco NVM - Suspicious Download From File Sharing Website
description: 'This analytic detects suspicious downloads from common file sharing
  and content delivery platforms using known living-off-the-land binaries (LOLBins)

  such as ''curl.exe'', ''certutil.exe'', ''msiexec.exe'', ''powershell.exe'', ''wmic.exe'',
  and others.

  It leverages Cisco Network Visibility Module logs to correlate network flow activity
  with process context, including command-line arguments, process path,

  and parent process information. These tools are often abused by adversaries and
  malware to retrieve payloads from public hosting platforms

  such as GitHub, Discord CDN, Transfer.sh, or Pastebin.

  This detection helps identify potential initial access, payload staging, or command
  and control activity using legitimate services.'
severity: medium
enabled: false
tags:
  mitre:
  - T1197
  categories:
  - endpoint
references:
- https://twitter.com/jhencinski/status/1102695118455349248
- https://isc.sans.edu/forums/diary/Investigating+Microsoft+BITS+Activity/23281/
- https://www.virustotal.com/gui/domain/paste.ee/relations
- https://www.cisa.gov/uscert/ncas/alerts/aa22-321a
- https://www.microsoft.com/en-us/security/blog/2024/01/17/new-ttps-observed-in-mint-sandstorm-campaign-targeting-high-profile-individuals-at-universities-and-research-orgs/
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_network_visibility_module_flowdata`\n(\n  (process_name = \"\
    svchost.exe\" process_arguments = \"*-s BITS*\")\n  OR\n  process_name IN (\n\
    \      \"curl.exe\", \"wmic.exe\", \"wscript.exe\", \"cscript.exe\", \"certutil.exe\"\
    ,\n      \"msiexec.exe\", \"hh.exe\", \"powershell.exe\", \"pwsh.exe\", \"powershell_ise.exe\"\
    ,\n      \"installutil.exe\", \"certoc.exe\", \"bitsadmin.exe\"\n  )\n)\ndest_hostname\
    \ IN (\n    \"*.githubusercontent.com*\", \"*anonfiles.com*\", \"*cdn.discordapp.com*\"\
    , \"*ddns.net*\",\n    \"*dl.dropboxusercontent.com*\", \"*ghostbin.co*\", \"\
    *glitch.me*\", \"*gofile.io*\",\n    \"*hastebin.com*\", \"*mediafire.com*\",\
    \ \"*mega.nz*\", \"*onrender.com*\", \"*pages.dev*\",\n    \"*paste.ee*\", \"\
    *pastebin.*\", \"*pastetext.net*\", \"*privatlab.*\",\n    \"*send.exploit.in*\"\
    , \"*sendspace.com*\", \"*storage.googleapis.com*\",\n    \"*storjshare.io*\"\
    , \"*supabase.co*\", \"*temp.sh*\", \"*transfer.sh*\", \"*trycloudflare.com*\"\
    ,\n    \"*ufile.io*\", \"*w3spaces.com*\", \"*workers.dev*\"\n  )\n| stats count\
    \ min(_time) as firstTime max(_time) as lastTime\n        values(parent_process_arguments)\
    \ as parent_process_arguments\n        values(process_arguments) as process_arguments\n\
    \        values(parent_process_hash) as parent_process_hash\n        values(process_hash)\
    \ as process_hash\n        values(module_name_list) as module_name_list\n    \
    \    values(module_hash_list) as module_hash_list\n        values(dest_port) as\
    \ dest_port\n        values(aliul) as additional_logged_in_users_list\n      \
    \  values(dest_hostname) as dest_hostname\n        by src dest parent_process_path\
    \ parent_process_integrity_level process_path process_name process_integrity_level\
    \ process_id transport\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | table\n  parent_process_integrity_level parent_process_path parent_process_arguments\
    \ parent_process_hash\n  process_integrity_level process_path process_name process_arguments\
    \ process_hash process_id\n  additional_logged_in_users_list module_name_list\
    \ module_hash_list\n  src dest_hostname dest dest_port transport firstTime lastTime\n\
    | `cisco_nvm___suspicious_download_from_file_sharing_website_filter`"
