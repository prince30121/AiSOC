id: splunk-security-content-21af5447-734f-4549-956b-7a255cb2b032
name: HTTP PUA User Agent
description: This Splunk query analyzes web logs to identify and categorize user agents,
  detecting various types of unwanted applications. This activity can signify possible
  compromised hosts on the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1071.001
  categories:
  - network
references:
- https://github.com/mthcht/awesome-lists/blob/main/Lists/suspicious_http_user_agents_list.csv
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Web\n  WHERE Web.http_user_agent != null\n\
    \  BY Web.http_user_agent Web.http_method, Web.url,\n     Web.url_length Web.src,\
    \ Web.dest\n| `drop_dm_object_name(\"Web\")`\n| lookup pua_user_agents pua_user_agent\
    \ AS http_user_agent OUTPUT tool\n| where isnotnull(tool)\n| stats count min(firstTime)\
    \ as first_seen max(lastTime) as last_seen\n  BY tool url http_user_agent\n  \
    \   src dest\n| `security_content_ctime(first_seen)`\n| `security_content_ctime(last_seen)`\n\
    | `http_pua_user_agent_filter`"
provenance:
  source: splunk/security_content
  source_id: 21af5447-734f-4549-956b-7a255cb2b032
  source_commit: 4d4c7ee
