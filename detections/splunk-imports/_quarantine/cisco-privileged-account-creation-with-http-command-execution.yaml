id: splunk-security-content-2c9d4f5a-8b6e-4c7f-9d8e-1a2b3c4d5e6f
name: Cisco Privileged Account Creation with HTTP Command Execution
description: 'This analytic correlates risk events between privileged account creation
  on Cisco IOS devices and HTTP requests to privileged execution paths such as `/level/15/exec/-/*`.

  APT actors have been observed creating privileged accounts and then running commands
  on routers via HTTP GET or POST requests that target privileged execution paths.

  These requests allow attackers to execute commands with the highest privilege level
  (15) on Cisco devices without requiring interactive SSH access.

  This correlation identifies when both "Cisco IOS Suspicious Privileged Account Creation"
  and "Privileged Command Execution via HTTP" Snort detections fire for the same network
  device.

  This behavior indicates an attacker leveraging the newly created account to execute
  commands remotely via HTTP.'
severity: medium
enabled: false
tags:
  mitre:
  - T1021.004
  - T1136
  - T1078
  categories:
  - network
references:
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-239a
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  min(_time) as firstTime\n\
    \  max(_time) as lastTime\n  sum(All_Risk.calculated_risk_score) as risk_score\n\
    \  count(All_Risk.calculated_risk_score) as risk_event_count\n\n  values(All_Risk.annotations.mitre_attack.mitre_tactic_id)\
    \ as annotations.mitre_attack.mitre_tactic_id\n  dc(All_Risk.annotations.mitre_attack.mitre_tactic_id)\
    \ as mitre_tactic_id_count\n\n  values(All_Risk.annotations.mitre_attack.mitre_technique_id)\
    \ as annotations.mitre_attack.mitre_technique_id\n  dc(All_Risk.annotations.mitre_attack.mitre_technique_id)\
    \ as mitre_technique_id_count\n\n  values(All_Risk.tag) as tag\n  values(source)\
    \ as source\n  dc(source) as source_count\n\n  values(contributing_events_search)\n\
    \n  values(All_Risk.threat_object)\n\n  from datamodel=Risk.All_Risk where\n\n\
    \  source IN (\n    \"*Cisco IOS Suspicious Privileged Account Creation*\",\n\
    \    \"*Cisco Secure Firewall - Privileged Command Execution via HTTP*\"\n  )\n\
    \  by All_Risk.normalized_risk_object\n| `drop_dm_object_name(All_Risk)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| where source_count >= 2\n| `cisco_privileged_account_creation_with_http_command_execution_filter`"
