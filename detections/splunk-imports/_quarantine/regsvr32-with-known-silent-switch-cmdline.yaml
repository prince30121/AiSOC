id: splunk-security-content-c9ef7dc4-eeaf-11eb-b2b6-acde48001122
name: Regsvr32 with Known Silent Switch Cmdline
description: The following analytic detects the execution of Regsvr32.exe with the
  silent switch to load DLLs. This behavior is identified using Endpoint Detection
  and Response (EDR) telemetry, focusing on command-line executions containing the
  `-s` or `/s` switches. This activity is significant as it is commonly used in malware
  campaigns, such as IcedID, to stealthily load malicious DLLs. If confirmed malicious,
  this could allow an attacker to execute arbitrary code, download additional payloads,
  and potentially compromise the system further. Immediate investigation and endpoint
  isolation are recommended.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.010
  categories:
  - endpoint
references:
- https://app.any.run/tasks/56680cba-2bbc-4b34-8633-5f7878ddf858/
- https://regexr.com/699e2
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_regsvr32`\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | where match(process,\"(?i)[\\-\n| \\/][Ss]{1}\")\n| `regsvr32_with_known_silent_switch_cmdline_filter`"
