id: splunk-security-content-e530beb9-9b8c-4c9b-9776-0a05521ff32d
name: ESXi Syslog Config Change
description: This detection identifies changes to the syslog configuration on an ESXi
  host using esxcli, which may indicate an attempt to disrupt log collection and evade
  detection.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.003
  categories:
  - application
references: []
logsource:
  product: splunk
detection:
  splunk_spl: '`esxi_syslog` Message="*syslog config set*" AND Message="*esxcli*"
    | rex field=_raw "\].*\[\s*(?P<user>[^\]]+)\]:\s(?P<command>.+)" | rex field=_raw
    "Z (?<dest>[\w\.]+)\s" | stats min(_time) as firstTime max(_time) as lastTime
    count by dest user command | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
    | `esxi_syslog_config_change_filter`'
provenance:
  source: splunk/security_content
  source_id: e530beb9-9b8c-4c9b-9776-0a05521ff32d
  source_commit: 4d4c7ee
  license: Apache-2.0
  license_url: https://github.com/splunk/security_content/blob/develop/LICENSE
  imported_at: '2026-05-04'
  imported_by: splunk_importer
  upstream_path: detections/application/esxi_syslog_config_change.yml
notes:
  splunk_status: production
  splunk_data_source: []
  quarantine_reason: raw SPL — needs translation to AiSOC detection schema
