id: splunk-security-content-dfc18a5a-946e-44ee-a373-c0f60d06e676
name: Windows SQL Spawning CertUtil
description: The following analytic detects the use of certutil to download software,
  specifically when spawned by SQL-related processes. This detection leverages Endpoint
  Detection and Response (EDR) data, focusing on command-line executions involving
  certutil with parameters like *urlcache* and *split*. This activity is significant
  as it may indicate a compromise by threat actors, such as Flax Typhoon, who use
  certutil to establish persistent VPN connections. If confirmed malicious, this behavior
  could allow attackers to maintain access, monitor system availability, and potentially
  escalate to data theft or ransomware deployment.
severity: medium
enabled: false
tags:
  mitre:
  - T1105
  categories:
  - endpoint
references:
- https://www.microsoft.com/en-us/security/blog/2023/08/24/flax-typhoon-using-legitimate-software-to-quietly-access-taiwanese-organizations/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name\
    \ IN (\"sqlservr.exe\", \"sqlagent.exe\", \"sqlps.exe\", \"launchpad.exe\", \"\
    sqldumper.exe\") `process_certutil` (Processes.process=\"*urlcache*\"\n    OR\n\
    \    Processes.process=\"*verifyctl*\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_sql_spawning_certutil_filter`"
