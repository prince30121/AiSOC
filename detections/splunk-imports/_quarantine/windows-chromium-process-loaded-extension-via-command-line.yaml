id: splunk-security-content-1b8a468a-52e3-4206-b14a-73165441684c
name: Windows Chromium Process Loaded Extension via Command-Line
description: The following analytic detects instances where Google Chrome is started
  with the --load-extension command-line flag, which allows loading unpacked or non-standard
  extensions. This behavior can indicate attempts to bypass enterprise extension policies,
  install malicious extensions, or load potentially harmful browser components. Monitoring
  such activity helps identify unauthorized extension usage, potential malware persistence
  mechanisms, or policy violations that could compromise browser security.
severity: medium
enabled: false
tags:
  mitre:
  - T1185
  categories:
  - endpoint
references:
- https://www.gdatasoftware.com/blog/2025/11/38298-learning-about-browser-hijacking
- https://peter.sh/experiments/chromium-command-line-switches/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` min(_time) as firstTime max(_time)\
    \ as lastTime from datamodel=Endpoint.Processes where\nProcesses.process_name\
    \ = \"Chrome.exe\"\nProcesses.process= \"*--load-extension*\"\n\nby Processes.action\
    \ Processes.dest Processes.original_file_name Processes.parent_process\n   Processes.parent_process_exec\
    \ Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path Processes.process Processes.process_exec\n   Processes.process_guid\
    \ Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \   Processes.process_name Processes.process_path Processes.user Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_chromium_process_loaded_extension_via_command_line_filter`"
