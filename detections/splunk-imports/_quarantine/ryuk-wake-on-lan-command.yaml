id: splunk-security-content-538d0152-7aaa-11eb-beaa-acde48001122
name: Ryuk Wake on LAN Command
description: The following analytic detects the use of Wake-on-LAN commands associated
  with Ryuk ransomware. It leverages data from Endpoint Detection and Response (EDR)
  agents, focusing on specific process and command-line activities. This behavior
  is significant as Ryuk ransomware uses Wake-on-LAN to power on devices in a compromised
  network, increasing its encryption success rate. If confirmed malicious, this activity
  could lead to widespread ransomware encryption across multiple endpoints, causing
  significant operational disruption and data loss. Immediate isolation and thorough
  investigation of the affected endpoints are crucial to mitigate the impact.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.003
  categories:
  - endpoint
references:
- https://www.bleepingcomputer.com/news/security/ryuk-ransomware-uses-wake-on-lan-to-encrypt-offline-devices/
- https://www.bleepingcomputer.com/news/security/ryuk-ransomware-now-self-spreads-to-other-windows-lan-devices/
- https://www.cert.ssi.gouv.fr/uploads/CERTFR-2021-CTI-006.pdf
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nFROM datamodel=Endpoint.Processes WHERE\n\n\
    Processes.process IN (\n    \"* 8 LAN\",\n    \"* 8 LAN *\",\n    \"* 9 REP\"\
    ,\n    \"* 9 REP *\"\n)\n\nBY Processes.action Processes.dest Processes.original_file_name\n\
    \   Processes.parent_process Processes.parent_process_exec\n   Processes.parent_process_guid\
    \ Processes.parent_process_id\n   Processes.parent_process_name Processes.parent_process_path\n\
    \   Processes.process Processes.process_exec Processes.process_guid\n   Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n   Processes.process_name\
    \ Processes.process_path Processes.user\n   Processes.user_id Processes.vendor_product\n\
    \n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `ryuk_wake_on_lan_command_filter`"
