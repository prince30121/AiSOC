id: splunk-security-content-635c26cc-0fd1-4098-8ec9-824bf9544b11
name: ASL AWS SAML Update identity provider
description: The following analytic detects updates to the SAML provider in AWS. It
  leverages AWS CloudTrail logs to identify the `UpdateSAMLProvider` event, analyzing
  fields such as `sAMLProviderArn`, `sourceIPAddress`, and `userIdentity` details.
  Monitoring updates to the SAML provider is crucial as it may indicate a perimeter
  compromise of federated credentials or unauthorized backdoor access set by an attacker.
  If confirmed malicious, this activity could allow attackers to manipulate identity
  federation, potentially leading to unauthorized access to cloud resources and sensitive
  data.
severity: medium
enabled: false
tags:
  mitre:
  - T1078
  categories:
  - cloud
references:
- https://www.cisa.gov/uscert/ncas/alerts/aa21-008a
- https://www.splunk.com/en_us/blog/security/a-golden-saml-journey-solarwinds-continued.html
- https://www.fireeye.com/content/dam/fireeye-www/blog/pdfs/wp-m-unc2452-2021-000343-01.pdf
- https://www.cyberark.com/resources/threat-research-blog/golden-saml-newly-discovered-attack-technique-forges-authentication-to-cloud-apps
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=UpdateSAMLProvider\n  | fillnull\n\
    \  | stats count min(_time) as firstTime max(_time) as lastTime\n    BY actor.user.uid\
    \ api.operation api.service.name\n       http_request.user_agent src_endpoint.ip\
    \ actor.user.account.uid\n       cloud.provider cloud.region\n  | rename actor.user.uid\
    \ as user api.operation as action api.service.name as dest http_request.user_agent\
    \ as user_agent src_endpoint.ip as src actor.user.account.uid as vendor_account\
    \ cloud.provider as vendor_product cloud.region as vendor_region\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `asl_aws_saml_update_identity_provider_filter`"
