id: splunk-security-content-3d7df60b-3332-4667-8090-afe03e08dce0
name: Windows ESX Admins Group Creation via Net
description: This analytic detects attempts to create an "ESX Admins" group using
  the Windows net.exe or net1.exe commands. This activity may indicate an attempt
  to exploit the VMware ESXi Active Directory Integration Authentication Bypass vulnerability
  (CVE-2024-37085). Attackers can use this method to gain unauthorized access to ESXi
  hosts by recreating the "ESX Admins" group after its deletion from Active Directory.
severity: medium
enabled: false
tags:
  mitre:
  - T1136.002
  - T1136.001
  categories:
  - endpoint
references:
- https://support.broadcom.com/web/ecx/support-content-notification/-/external/content/SecurityAdvisories/0/24505
- https://www.microsoft.com/en-us/security/blog/2024/07/29/ransomware-operators-exploit-esxi-hypervisor-vulnerability-for-mass-encryption/
- https://www.securityweek.com/microsoft-says-ransomware-gangs-exploiting-just-patched-vmware-esxi-flaw/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_net`\
    \ Processes.process=\"*group*\" Processes.process=\"*ESX Admins*\"\n    AND\n\
    \    Processes.process=\"*/add*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_esx_admins_group_creation_via_net_filter`"
