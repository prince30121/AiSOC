id: splunk-security-content-683e6196-b8e8-11eb-9a79-acde48001122
name: Detect Renamed PSExec
description: The following analytic identifies instances where `PsExec.exe` has been
  renamed and executed on an endpoint. It leverages data from Endpoint Detection and
  Response (EDR) agents, focusing on process names and original file names. This activity
  is significant because renaming `PsExec.exe` is a common tactic to evade detection.
  If confirmed malicious, this could allow an attacker to execute commands remotely,
  potentially leading to unauthorized access, lateral movement, or further compromise
  of the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1569.002
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1569.002/T1569.002.yaml
- https://redcanary.com/blog/threat-hunting-psexec-lateral-movement/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name!=psexec.exe\n        AND\n        Processes.process_name!=psexec64.exe\n\
    \    )\n    AND Processes.original_file_name=psexec.c\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `detect_renamed_psexec_filter`"
provenance:
