id: splunk-security-content-bb37061e-af1f-11eb-a159-acde48001122
name: Schtasks Run Task On Demand
description: The following analytic detects the execution of a Windows Scheduled Task
  on demand via the shell or command line. It leverages process-related data, including
  process name, parent process, and command-line executions, sourced from endpoint
  logs. The detection focuses on 'schtasks.exe' with an associated 'run' command.
  This activity is significant as adversaries often use it to force the execution
  of their created Scheduled Tasks for persistent access or lateral movement within
  a compromised machine. If confirmed malicious, this could allow attackers to maintain
  persistence or move laterally within the network, potentially leading to further
  compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1053
  categories:
  - endpoint
references:
- https://thedfirreport.com/2020/04/20/sqlserver-or-the-miner-in-the-basement/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as process values(Processes.process_id) as process_id count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = \"schtasks.exe\" Processes.process = \"*/run*\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `schtasks_run_task_on_demand_filter`"
