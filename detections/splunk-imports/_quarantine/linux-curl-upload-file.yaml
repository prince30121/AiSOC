id: splunk-security-content-c1de2d9a-0c02-4bb4-a49a-510c6e9cf2bf
name: Linux Curl Upload File
description: The following analytic detects the use of the curl command with specific
  switches (-F, --form, --upload-file, -T, -d, --data, --data-raw, -I, --head) to
  upload AWS credentials or configuration files to a remote destination. This detection
  leverages data from Endpoint Detection and Response (EDR) agents, focusing on command-line
  executions and process details. This activity is significant as it may indicate
  an attempt to exfiltrate sensitive AWS credentials, a technique known to be used
  by the TeamTNT group. If confirmed malicious, this could lead to unauthorized access
  and potential compromise of AWS resources.
severity: medium
enabled: false
tags:
  mitre:
  - T1105
  categories:
  - endpoint
references:
- https://curl.se/docs/manpage.html
- https://www.cadosecurity.com/team-tnt-the-first-crypto-mining-worm-to-steal-aws-credentials/
- https://gtfobins.github.io/gtfobins/curl/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=curl\
    \ Processes.process IN (\"*-F *\", \"*--form *\",\"*--upload-file *\",\"*-T *\"\
    ,\"*-d *\",\"*--data *\",\"*--data-raw *\", \"*-I *\", \"*--head *\")\n    AND\n\
    \    Processes.process IN (\"*.aws/credentials*\". \"*.aws/config*\")\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `linux_curl_upload_file_filter`"
provenance:
