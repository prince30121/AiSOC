id: splunk-security-content-11f93009-8083-43fd-82a7-821fcbdc8342
name: Windows Set Account Password Policy To Unlimited Via Net
description: The following analytic detects the use of net.exe to update user account
  policies to set passwords as non-expiring. It leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on command-line executions involving "/maxpwage:unlimited"
  or "/maxpwage:49710", which achieve a similar outcome theoretically. This activity
  is significant as it can indicate an attempt to maintain persistence, escalate privileges,
  evade defenses, or facilitate lateral movement. If confirmed malicious, this behavior
  could allow an attacker to maintain long-term access to compromised accounts, potentially
  leading to further exploitation and unauthorized access to sensitive information.
severity: medium
enabled: false
tags:
  mitre:
  - T1489
  categories:
  - endpoint
references:
- https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/
- https://docs.microsoft.com/en-us/troubleshoot/windows-server/networking/net-commands-on-operating-systems
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as process min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes\n\
    \  WHERE `process_net`\n    AND\n    Processes.process=\"* accounts *\"\n    AND\n\
    \    (Processes.process=\"* /maxpwage:unlimited\"\n    OR\n    Processes.process=\"\
    /maxpwage:49710\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_set_account_password_policy_to_unlimited_via_net_filter`"
