id: splunk-security-content-568cb83e-d79e-4a23-85ec-6e1f6c30cb2f
name: Cisco NVM - Suspicious Network Connection to IP Lookup Service API
description: 'This analytic identifies non-browser processes reaching out to public
  IP lookup or geolocation services,

  such as `ipinfo.io`, `icanhazip.com`, `ip-api.com`, and others.

  These domains are commonly used by legitimate tools, but their usage outside of
  browsers may indicate

  network reconnaissance, virtual machine detection, or staging by malware.

  This activity is observed in post-exploitation frameworks, stealer malware, and
  advanced threat actor campaigns.

  The detection relies on Cisco Network Visibility Module (NVM) telemetry and excludes
  known browser

  processes to reduce noise.'
severity: medium
enabled: false
tags:
  mitre:
  - T1590.005
  - T1016
  categories:
  - endpoint
references:
- https://github.com/SigmaHQ/sigma/blob/master/rules/windows/network_connection/net_connection_win_domain_external_ip_lookup.yml
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa20-302a
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_network_visibility_module_flowdata`\ndest_hostname IN (\n  \
    \      \"*api.2ip.ua*\", \"*api.bigdatacloud.net*\", \"*api.ipify.org*\", \"*whatismyipaddress.com*\"\
    ,\n        \"*canireachthe.net*\", \"*checkip.amazonaws.com*\", \"*checkip.dyndns.org*\"\
    , \"*curlmyip.com*\",\n        \"*db-ip.com*\", \"*edns.ip-api.com*\", \"*eth0.me*\"\
    , \"*freegeoip.app*\", \"*geoipy.com*\", \"*getip.pro*\",\n        \"*icanhazip.com*\"\
    , \"*ident.me*\", \"*ifconfig.io*\", \"*ifconfig.me*\", \"*ip-api.com*\", \"*ip.360.cn*\"\
    ,\n        \"*ip.anysrc.net*\", \"*ip.taobao.com*\", \"*ip.tyk.nu*\", \"*ipaddressworld.com*\"\
    , \"*ipapi.co*\",\n        \"*ipconfig.io*\", \"*ipecho.net*\", \"*ipinfo.io*\"\
    , \"*ipip.net*\", \"*iplocation.net*\",\n        \"*ipof.in*\", \"*ipv6-test.com*\"\
    , \"*ipwho.is*\", \"*trackip.net*\", \"*inet-ip.info*\",\n        \"*jsonip.com*\"\
    , \"*myexternalip.com*\", \"*seeip.org*\",  \"*wgetip.com*\",\n        \"*whatismyip.akamai.com*\"\
    , \"*whois.pconline.com.cn*\", \"*wtfismyip.com*\", \"*ip.cn\"\n        )\nNOT\
    \ process_name IN (\n        \"brave.exe\", \"chrome.exe\", \"firefox.exe\", \"\
    iexplore.exe\", \"maxthon.exe\",\n        \"MicrosoftEdge.exe\", \"msedge.exe\"\
    , \"msedgewebview2.exe\", \"opera.exe\", \"safari.exe\",\n        \"seamonkey.exe\"\
    , \"vivaldi.exe\", \"whale.exe\"\n  )\n| stats count min(_time) as firstTime max(_time)\
    \ as lastTime\n        values(parent_process_arguments) as parent_process_arguments\n\
    \        values(process_arguments) as process_arguments\n        values(parent_process_hash)\
    \ as parent_process_hash\n        values(process_hash) as process_hash\n     \
    \   values(module_name_list) as module_name_list\n        values(module_hash_list)\
    \ as module_hash_list\n        values(dest_port) as dest_port\n        values(aliul)\
    \ as additional_logged_in_users_list\n        values(dest_hostname) as dest_hostname\n\
    \        by src dest parent_process_path parent_process_integrity_level process_path\
    \ process_name process_integrity_level process_id transport\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| table\n  parent_process_integrity_level\
    \ parent_process_path parent_process_arguments parent_process_hash\n  process_integrity_level\
    \ process_path process_name process_arguments process_hash process_id\n  additional_logged_in_users_list\
    \ module_name_list module_hash_list\n  src dest_hostname dest dest_port transport\
    \ firstTime lastTime\n| `cisco_nvm___suspicious_network_connection_to_ip_lookup_service_api_filter`"
