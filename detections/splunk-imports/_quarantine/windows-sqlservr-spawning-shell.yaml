id: splunk-security-content-d33aac9f-030c-4830-8701-0c2dd75bb6cb
name: Windows Sqlservr Spawning Shell
description: This analytic detects instances where the sqlservr.exe process spawns
  a command shell (cmd.exe) or PowerShell process. This behavior is often indicative
  of command execution initiated from within the SQL Server process, potentially due
  to exploitation of SQL injection vulnerabilities or the use of extended stored procedures
  like xp_cmdshell.
severity: medium
enabled: false
tags:
  mitre:
  - T1505.001
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1505/001/
- https://github.com/MHaggis/notes/tree/master/utilities/SQLSSTT
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name=\"\
    sqlservr.exe\" `process_cmd`\n    OR\n    `process_powershell`\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_sqlservr_spawning_shell_filter`"
provenance:
