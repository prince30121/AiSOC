id: splunk-security-content-94396c3e-7728-422a-9956-e4b77b53dbdf
name: O365 Email Reported By Admin Found Malicious
description: The following analytic detects when an email manually submitted to Microsoft
  through the Security & Compliance portal is found to be malicious. This capability
  is an enhanced protection feature that can be used within o365 tenants by administrative
  users to report potentially malicious emails. This correlation looks for any submission
  that returns a Phish or Malware verdict upon submission.
severity: medium
enabled: false
tags:
  mitre:
  - T1566.001
  - T1566.002
  categories:
  - cloud
references:
- https://learn.microsoft.com/en-us/microsoft-365/security/office-365-security/submissions-outlook-report-messages?view=o365-worldwide
logsource:
  product: splunk
detection:
  splunk_spl: "`o365_management_activity` Workload=SecurityComplianceCenter Operation=AdminSubmission\n\
    \  | search RescanVerdict IN (Phish,Malware)\n  | rename Id as signature_id, SenderIP\
    \ as src, Recipients{} as dest_user, P1Sender as src_user\n  | fillnull\n  | stats\
    \ count min(_time) as firstTime max(_time) as lastTime\n    BY dest user src\n\
    \       vendor_account vendor_product signature\n       signature_id dest_user\
    \ src_user\n       Subject SubmissionContent\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `o365_email_reported_by_admin_found_malicious_filter`"
provenance:
  source: splunk/security_content
  source_id: 94396c3e-7728-422a-9956-e4b77b53dbdf
