id: splunk-security-content-aa1748dd-4a5c-457a-9cf6-ca7b4eb711b3
name: Linux SSH Remote Services Script Execute
description: The following analytic detects the use of SSH to move laterally and execute
  a script or file on a remote host. It leverages data from Endpoint Detection and
  Response (EDR) agents, focusing on specific SSH command-line parameters and URLs.
  This activity is significant as it may indicate an attacker attempting to execute
  remote commands or scripts, potentially leading to unauthorized access or control
  over additional systems. If confirmed malicious, this could result in lateral movement,
  privilege escalation, or the execution of malicious payloads, compromising the security
  of the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1021.004
  categories:
  - endpoint
references:
- https://redcanary.com/blog/lateral-movement-with-secure-shell/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=ssh\
    \ Processes.process IN (\"*oStrictHostKeyChecking*\", \"*oConnectTimeout*\", \"\
    *oBatchMode*\")\n    AND\n    Processes.process IN (\"*http:*\",\"*https:*\")\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_ssh_remote_services_script_execute_filter`"
