id: splunk-security-content-2452e632-9e0d-11eb-bacd-acde48001122
name: DNS Exfiltration Using Nslookup App
description: The following analytic identifies potential DNS exfiltration using the
  nslookup application. It detects specific command-line parameters such as query
  type (TXT, A, AAAA) and retry options, which are commonly used by attackers to exfiltrate
  data. The detection leverages Endpoint Detection and Response (EDR) telemetry, focusing
  on process execution logs. This activity is significant as it may indicate an attempt
  to communicate with a Command and Control (C2) server or exfiltrate sensitive data.
  If confirmed malicious, this could lead to data breaches and unauthorized access
  to critical information.
severity: medium
enabled: false
tags:
  mitre:
  - T1048
  categories:
  - endpoint
references:
- https://www.mandiant.com/resources/fin7-spear-phishing-campaign-targets-personnel-involved-sec-filings
- https://www.varonis.com/blog/dns-tunneling
- https://www.microsoft.com/security/blog/2021/01/20/deep-dive-into-the-solorigate-second-stage-activation-from-sunburst-to-teardrop-and-raindrop/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as process values(Processes.process_id) as process_id values(Processes.parent_process)\
    \ as parent_process count min(_time) as firstTime max(_time) as lastTime FROM\
    \ datamodel=Endpoint.Processes\n  WHERE Processes.process_name = \"nslookup.exe\"\
    \ Processes.process = \"*-querytype=*\"\n    OR\n    Processes.process=\"*-qt=*\"\
    \n    OR\n    Processes.process=\"*-q=*\"\n    OR\n    Processes.process=\"*-type=*\"\
    \n    OR\n    Processes.process=\"*-retry=*\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `dns_exfiltration_using_nslookup_app_filter`"
