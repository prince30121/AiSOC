id: splunk-security-content-51307514-1236-49f6-8686-d46d93cc2821
name: Windows AD Replication Request Initiated by User Account
description: The following analytic detects a user account initiating an Active Directory
  replication request, indicative of a DCSync attack. It leverages EventCode 4662
  from the Windows Security Event Log, focusing on specific object types and replication
  permissions. This activity is significant because it can allow an attacker with
  sufficient privileges to request password hashes for any or all users within the
  domain. If confirmed malicious, this could lead to unauthorized access, privilege
  escalation, and potential compromise of the entire domain.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.006
  categories:
  - endpoint
references:
- https://adsecurity.org/?p=1729
- https://www.linkedin.com/pulse/mimikatz-dcsync-event-log-detections-john-dwyer
- https://github.com/SigmaHQ/sigma/blob/0.22-699-g29a5c6278/rules/windows/builtin/security/win_security_dcsync.yml
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_security` EventCode=4662 ObjectType IN (\"%{19195a5b-6da0-11d0-afd3-00c04fd930c9}\"\
    ,\"domainDNS\")\n  AND Properties IN (\"*Replicating Directory Changes All*\"\
    ,\"*Manage Replication Topology*\",\"*Remove Replica In Domain*\",\"*{1131f6ad-9c07-11d1-f79f-00c04fc2dcd2}*\"\
    ,\"*{9923a32a-3607-11d2-b9be-0000f87a36b2}*\",\"*{1131f6ac-9c07-11d1-f79f-00c04fc2dcd2}*\"\
    )\n  AND AccessMask=\"0x100\" AND NOT (SubjectUserSid=\"NT AUT*\" OR SubjectUserSid=\"\
    S-1-5-18\" OR SubjectDomainName=\"Window Manager\" OR SubjectUserName=\"*$\")\n\
    | stats min(_time) as _time, count by SubjectDomainName, SubjectUserName, Computer,\
    \ Logon_ID, ObjectName, ObjectServer, ObjectType, OperationType, status dest\n\
    | rename SubjectDomainName as Target_Domain, SubjectUserName as user, Logon_ID\
    \ as TargetLogonId, _time as attack_time\n| appendpipe\n    [| map search=\"search\
    \ `wineventlog_security` EventCode=4624 TargetLogonId=$TargetLogonId$\"\n    |\
    \ fields - status]\n| stats min(attack_time) as _time values(TargetUserSid) as\
    \ TargetUserSid, values(Target_Domain) as Target_Domain, values(user) as user,\
    \ values(Computer) as Computer, values(status) as status, values(src_category)\
    \ as\n    src_category, values(src_ip) as src_ip values(action) as action values(authentication_method)\
    \ as authentication_method values(dest) as dest values(signature) as signature\
    \ values(signature_id) as signature_id by TargetLogonId\n| `windows_ad_replication_request_initiated_by_user_account_filter`"
