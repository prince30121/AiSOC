id: splunk-security-content-9b0c2d3e-4f5a-6b7c-8d9e-0f1a2b3c4d5e
name: Cisco Secure Firewall - SSH Connection to Non-Standard Port
description: 'This analytic detects inbound SSH connections to non-standard ports
  on network devices using Cisco Secure Firewall Intrusion Events. APT actors have
  been observed enabling SSH servers on high, non-default TCP ports to maintain encrypted
  remote access to compromised network infrastructure.

  This detection leverages Snort signature 65369 to identify SSH protocol traffic
  on unusual ports, which may indicate persistence mechanisms or backdoor access established
  by threat actors.'
severity: medium
enabled: false
tags:
  mitre:
  - T1021.004
  categories:
  - network
references:
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-239a
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_secure_firewall`\nEventType=IntrusionEvent\nsignature_id=65369\n\
    | fillnull\n| stats dc(signature_id) as unique_signature_count\n        values(signature_id)\
    \ as signature_id\n        values(signature) as signature\n        values(class_desc)\
    \ as class_desc\n        values(MitreAttackGroups) as MitreAttackGroups\n    \
    \    values(InlineResult) as InlineResult\n        values(InlineResultReason)\
    \ as InlineResultReason\n        values(src) as src\n        values(dest_port)\
    \ as dest_port\n        values(rule) as rule\n        values(transport) as transport\n\
    \        values(app) as app\n        min(_time) as firstTime\n        max(_time)\
    \ as lastTime\n        by dest\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `cisco_secure_firewall___ssh_connection_to_non_standard_port_filter`"
provenance:
  source: splunk/security_content
  source_id: 9b0c2d3e-4f5a-6b7c-8d9e-0f1a2b3c4d5e
