id: splunk-security-content-303b38b2-c03f-44e2-8f41-4594606fcfc7
name: Linux Obfuscated Files or Information Base64 Decode
description: The following analytic detects the use of the base64 decode command on
  Linux systems, which is often used to deobfuscate files. It leverages data from
  Endpoint Detection and Response (EDR) agents, focusing on command-line executions
  that include "base64 -d" or "base64 --decode". This activity is significant as it
  may indicate an attempt to hide malicious payloads or scripts. If confirmed malicious,
  an attacker could use this technique to execute hidden code, potentially leading
  to unauthorized access, data exfiltration, or further system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1027
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1027/T1027.md#atomic-test-1---decode-base64-data-into-script
- https://redcanary.com/blog/lateral-movement-with-secure-shell/
- https://linux.die.net/man/1/base64
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_path=\"\
    */base64\" Processes.process=\"*-d*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_obfuscated_files_or_information_base64_decode_filter`"
