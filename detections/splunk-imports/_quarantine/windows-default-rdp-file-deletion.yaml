id: splunk-security-content-30a334c1-f9a5-4fbd-8958-5b65a8435cb2
name: Windows Default Rdp File Deletion
description: This detection identifies the deletion of the Default.rdp file from a
  user’s Documents folder. This file is automatically created or updated by the Remote
  Desktop Connection client (mstsc.exe) whenever a user initiates an RDP session.
  It contains session configuration data, such as the remote hostname and display
  settings. While the presence of this file is normal during legitimate RDP usage,
  its deletion may indicate an attempt to conceal evidence of remote access activity.
  Threat actors and red team operators often remove Default.rdp as part of post-access
  cleanup to evade forensic detection. Detecting this action—especially when correlated
  with recent RDP activity—can help identify defense evasion techniques and uncover
  potentially malicious use of remote desktop connections. Monitoring for this file's
  deletion adds an important layer of visibility into user behavior and can serve
  as an early indicator of interactive attacker presence.
severity: medium
enabled: false
tags:
  mitre:
  - T1070.004
  categories:
  - endpoint
references:
- https://medium.com/@bonguides25/how-to-clear-rdp-connections-history-in-windows-cf0ffb67f344
- https://thelocalh0st.github.io/posts/rdp/
logsource:
  product: splunk
detection:
  splunk_spl: '`sysmon` EventCode IN ("23", "26") TargetFilename = "*\\default.rdp"
    | stats count min(_time) as firstTime, max(_time) as lastTime by action dest dvc
    file_path file_hash file_name file_modify_time process_exec process_guid process_id
    process_name process_path signature signature_id user user_id vendor_product |
    `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `windows_default_rdp_file_deletion_filter`'
