id: splunk-security-content-5672819c-be09-11eb-bbfb-acde48001122
name: SecretDumps Offline NTDS Dumping Tool
description: The following analytic detects the potential use of the secretsdump.py
  tool to dump NTLM hashes from a copy of ntds.dit and the SAM, SYSTEM, and SECURITY
  registry hives. It leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on specific command-line patterns and process names associated with secretsdump.py.
  This activity is significant because it indicates an attempt to extract sensitive
  credential information offline, which is a common post-exploitation technique. If
  confirmed malicious, this could allow an attacker to obtain NTLM hashes, facilitating
  further lateral movement and potential privilege escalation within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.003
  categories:
  - endpoint
references:
- https://github.com/SecureAuthCorp/impacket/blob/master/examples/secretsdump.py
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = \"python*.exe\" Processes.process = \"*.py*\" Processes.process = \"*-ntds*\"\
    \ (Processes.process = \"*-system*\"\n    OR\n    Processes.process = \"*-sam*\"\
    \n    OR\n    Processes.process = \"*-security*\"\n    OR\n    Processes.process\
    \ = \"*-bootkey*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `secretdumps_offline_ntds_dumping_tool_filter`"
