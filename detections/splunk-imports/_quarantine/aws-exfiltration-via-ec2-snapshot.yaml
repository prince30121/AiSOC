id: splunk-security-content-ac90b339-13fc-4f29-a18c-4abbba1f2171
name: AWS Exfiltration via EC2 Snapshot
description: The following analytic detects a series of AWS API calls related to EC2
  snapshots within a short time window, indicating potential exfiltration via EC2
  Snapshot modifications. It leverages AWS CloudTrail logs to identify actions such
  as creating, describing, and modifying snapshot attributes. This activity is significant
  as it may indicate an attacker attempting to exfiltrate data by sharing EC2 snapshots
  externally. If confirmed malicious, the attacker could gain access to sensitive
  information stored in the snapshots, leading to data breaches and potential compliance
  violations.
severity: medium
enabled: false
tags:
  mitre:
  - T1537
  categories:
  - cloud
references:
- https://labs.nettitude.com/blog/how-to-exfiltrate-aws-ec2-data/
- https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_ModifySnapshotAttribute.html
- https://bleemb.medium.com/data-exfiltration-with-native-aws-s3-features-c94ae4d13436
- https://stratus-red-team.cloud/attack-techniques/list/
logsource:
  product: splunk
detection:
  splunk_spl: "`cloudtrail` eventName IN (\"CreateSnapshot\", \"DescribeSnapshotAttribute\"\
    , \"ModifySnapshotAttribute\", \"DeleteSnapshot\") src_ip !=\"guardduty.amazonaws.com\"\
    \n  | bin _time span=5m\n  | rename user_name as user\n  | stats count dc(signature)\
    \ as distinct_api_calls values(signature) as signature values(dest) as dest values(requestParameters.attributeType)\
    \ as attributeType values(requestParameters.createVolumePermission.add.items{}.userId)\
    \ as aws_account_id_added values(user_agent) as user_agent\n    BY _time user\
    \ src\n       vendor_account vendor_region vendor_product\n  | where distinct_api_calls\
    \ >= 2\n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `aws_exfiltration_via_ec2_snapshot_filter`"
provenance:
