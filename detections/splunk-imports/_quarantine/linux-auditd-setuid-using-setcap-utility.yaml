id: splunk-security-content-1474459a-302b-4255-8add-d82f96d14cd9
name: Linux Auditd Setuid Using Setcap Utility
description: The following analytic detects the execution of the 'setcap' utility
  to enable the SUID bit on Linux systems. It leverages Linux Auditd data, focusing
  on process names and command-line arguments that indicate the use of 'setcap' with
  specific capabilities. This activity is significant because setting the SUID bit
  allows a user to temporarily gain root access, posing a substantial security risk.
  If confirmed malicious, an attacker could escalate privileges, execute arbitrary
  commands with elevated permissions, and potentially compromise the entire system.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.001
  categories:
  - endpoint
references:
- https://www.hackingarticles.in/linux-privilege-escalation-using-capabilities/
logsource:
  product: splunk
detection:
  splunk_spl: "`linux_auditd` execve_command IN (\"*setcap *\")  AND execve_command\
    \ IN (\"*cap_setuid+ep*\", \"*cap_setuid=ep*\", \"*cap_net_bind_service+p*\",\
    \ \"*cap_net_raw+ep*\", \"*cap_dac_read_search+ep*\")\n  | rename host as dest\n\
    \  | rename comm as process_name\n  | rename exe as process\n  | stats count min(_time)\
    \ as firstTime max(_time) as lastTime\n    BY argc execve_command dest\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `linux_auditd_setuid_using_setcap_utility_filter`"
