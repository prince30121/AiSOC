id: splunk-security-content-d25feebe-fa1c-4754-8a1e-afb03bedc0f2
name: Linux OpenVPN Privilege Escalation
description: The following analytic detects the execution of OpenVPN with elevated
  privileges, specifically when combined with the `--dev`, `--script-security`, `--up`,
  and `sudo` options. This detection leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process command-line arguments and execution details.
  This activity is significant because it indicates a potential privilege escalation
  attempt, allowing a user to execute system commands as root. If confirmed malicious,
  this could lead to full system compromise, enabling an attacker to gain root access
  and execute arbitrary commands with elevated privileges.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/openvpn/
- https://en.wikipedia.org/wiki/OpenVPN
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *openvpn*\"\n    AND\n    Processes.process=\"*--dev*\"\n    AND\n    Processes.process=\"\
    *--script-security*\"\n    AND\n    Processes.process=\"*--up*\"\n    AND\n  \
    \  Processes.process=\"*sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_openvpn_privilege_escalation_filter`"
