id: splunk-security-content-d36459b1-7901-401a-a67e-44426c15b168
name: Cisco Secure Firewall - React Server Components RCE Attempt
description: 'This analytic detects exploitation activity of CVE-2025-55182 using
  Cisco Secure Firewall Intrusion Events.

  It leverages Cisco Secure Firewall Threat Defense IntrusionEvent logs to identify
  cases where Snort signature 65554 (React Server Components remote code execution
  attempt) is triggered

  If confirmed malicious, this behavior could be indicative of a potential exploitation
  of CVE-2025-55182.'
severity: medium
enabled: false
tags:
  mitre:
  - T1190
  categories:
  - network
references:
- https://react.dev/blog/2025/12/03/critical-security-vulnerability-in-react-server-components
- https://nextjs.org/blog/CVE-2025-66478
- https://nvd.nist.gov/vuln/detail/CVE-2025-55182
- https://gist.github.com/maple3142/48bc9393f45e068cf8c90ab865c0f5f3
- https://www.wiz.io/blog/critical-vulnerability-in-react-cve-2025-55182
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_secure_firewall`\nEventType=IntrusionEvent\nsignature_id = 65554\n\
    | fillnull\n| stats min(_time) as firstTime\n        max(_time) as lastTime\n\
    \        values(signature_id) as signature_id\n        values(signature) as signature\n\
    \        values(class_desc) as class_desc\n        values(MitreAttackGroups) as\
    \ MitreAttackGroups\n        values(InlineResult) as InlineResult\n        values(InlineResultReason)\
    \ as InlineResultReason\n        values(src) as src\n        values(dest_port)\
    \ as dest_port\n        values(rule) as rule\n        values(transport) as transport\n\
    \        values(app) as app\n        by dest\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `cisco_secure_firewall___react_server_components_rce_attempt_filter`"
