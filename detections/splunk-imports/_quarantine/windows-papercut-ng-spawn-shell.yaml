id: splunk-security-content-a602d9a2-aaea-45f8-bf0f-d851168d61ca
name: Windows PaperCut NG Spawn Shell
description: The following analytic detects instances where the PaperCut NG application
  (pc-app.exe) spawns a Windows shell, such as cmd.exe or PowerShell. This behavior
  is identified using Endpoint Detection and Response (EDR) telemetry, focusing on
  process creation events where the parent process is pc-app.exe. This activity is
  significant as it may indicate an attacker attempting to gain unauthorized access
  or execute malicious commands on the system. If confirmed malicious, this could
  lead to unauthorized code execution, privilege escalation, or further compromise
  of the affected environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1059
  - T1190
  - T1133
  categories:
  - endpoint
references:
- https://www.cisa.gov/news-events/alerts/2023/05/11/cisa-and-fbi-release-joint-advisory-response-active-exploitation-papercut-vulnerability
- https://www.papercut.com/kb/Main/PO-1216-and-PO-1219
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name=pc-app.exe\
    \ `process_cmd`\n    OR\n    `process_powershell`\n    OR\n    Processes.process_name=java.exe\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_papercut_ng_spawn_shell_filter`"
