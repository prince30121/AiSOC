id: splunk-security-content-d290eeef-d05e-49a8-b598-72296023b87b
name: Zoom Rare Input Devices
description: Detects rare input devices from Zoom logs. Actors performing Remote Employment
  Fraud (REF) typically use unusual device information compared to a majority of employees.
  Detecting this activity requires careful analysis, regular review, and a thorough
  understanding of the audio and video devices commonly used within your environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1123
  categories:
  - application
references: []
logsource:
  product: splunk
detection:
  splunk_spl: "`zoom_index` microphone=* NOT (camera=*iPhone* OR camera=\"*FaceTime*\"\
    \ OR speaker=\"*AirPods*\" OR camera=\"*MacBook*\" OR microphone=\"*MacBook Pro\
    \ Microphone*\")\n  | rare microphone limit=50\n  | `zoom_rare_input_devices_filter`"
