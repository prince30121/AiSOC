id: splunk-security-content-62fed254-513b-460e-953d-79771493a9f3
name: Detect HTML Help Renamed
description: The following analytic detects instances where hh.exe (HTML Help) has
  been renamed and is executing a Compiled HTML Help (CHM) file. This detection leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process names
  and original file names. This activity is significant because attackers can use
  renamed hh.exe to execute malicious scripts embedded in CHM files, potentially leading
  to code execution. If confirmed malicious, this technique could allow attackers
  to run arbitrary scripts, escalate privileges, or persist within the environment,
  posing a significant security risk.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.001
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1218/001/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218.001/T1218.001.md
- https://lolbas-project.github.io/lolbas/Binaries/Hh/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name!=hh.exe\n\
    \    AND\n    Processes.original_file_name=HH.EXE\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `detect_html_help_renamed_filter`"
