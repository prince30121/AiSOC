id: splunk-security-content-1fece617-e614-4329-9e61-3ba228c0f353
name: AWS Multiple Failed MFA Requests For User
description: The following analytic identifies multiple failed multi-factor authentication
  (MFA) requests to an AWS Console for a single user. It leverages AWS CloudTrail
  logs, specifically the `additionalEventData` field, to detect more than 10 failed
  MFA prompts within 5 minutes. This activity is significant as it may indicate an
  adversary attempting to bypass MFA by bombarding the user with repeated authentication
  requests. If confirmed malicious, this could lead to unauthorized access to the
  AWS environment, potentially compromising sensitive data and resources.
severity: medium
enabled: false
tags:
  mitre:
  - T1586.003
  - T1621
  categories:
  - cloud
references:
- https://attack.mitre.org/techniques/T1621/
- https://aws.amazon.com/what-is/mfa/
logsource:
  product: splunk
detection:
  splunk_spl: "`cloudtrail` eventName= ConsoleLogin \"additionalEventData.MFAUsed\"\
    =Yes errorMessage=\"Failed authentication\"\n  | bucket span=5m _time\n  | rename\
    \ user_name as user\n  | stats dc(_raw) as mfa_prompts min(_time) as firstTime\
    \ max(_time) as lastTime values(user_agent) as user_agent values(src) as src values(dest)\
    \ as dest\n    BY _time user signature\n       vendor_account vendor_region vendor_product\n\
    \       errorMessage\n  | where mfa_prompts > 10\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `aws_multiple_failed_mfa_requests_for_user_filter`"
