id: splunk-security-content-0f43758f-1fe9-470a-a9e4-780acc4d5407
name: Windows File Transfer Protocol In Non-Common Process Path
description: The following analytic detects FTP connections initiated by processes
  located in non-standard installation paths on Windows systems. It leverages Sysmon
  EventCode 3 to identify network connections where the process image path does not
  match common directories like "Program Files" or "Windows\System32". This activity
  is significant as FTP is often used by adversaries and malware, such as AgentTesla,
  for Command and Control (C2) communications to exfiltrate stolen data. If confirmed
  malicious, this could lead to unauthorized data transfer, exposing sensitive information
  and compromising the integrity of the affected host.
severity: medium
enabled: false
tags:
  mitre:
  - T1071.003
  categories:
  - endpoint
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.agent_tesla
logsource:
  product: splunk
detection:
  splunk_spl: "`sysmon`\nEventCode=3\nNOT Image IN(\n  \"C:\\\\Program Files \\(x86\\\
    )\\\\*\",\n  \"C:\\\\Program Files\\\\*\",\n  \"C:\\\\Windows\\\\System32\\\\\
    *\",\n  \"C:\\\\Windows\\\\SysWOW64\\\\*\"\n)\n(\n  DestinationPortName=\"ftp\"\
    \n  OR\n  DestinationPort=21\n)\n| stats count min(_time) as firstTime\n     \
    \   max(_time) as lastTime\n\nby action app dest dest_ip dest_port direction dvc\
    \ protocol protocol_version\n   src src_ip src_port transport user vendor_product\
    \ process_name\n   process_exec process_guid process_id\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_file_transfer_protocol_in_non_common_process_path_filter`"
