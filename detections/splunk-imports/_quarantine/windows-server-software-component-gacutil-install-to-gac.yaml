id: splunk-security-content-7c025ef0-9e65-4c57-be39-1c13dbb1613e
name: Windows Server Software Component GACUtil Install to GAC
description: The following analytic detects the use of GACUtil.exe to add a DLL into
  the Global Assembly Cache (GAC). It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process names and command-line executions. This activity
  is significant because adding a DLL to the GAC allows it to be called by any application,
  potentially enabling widespread code execution. If confirmed malicious, this could
  allow an attacker to execute arbitrary code across the operating system, leading
  to privilege escalation or persistent access.
severity: medium
enabled: false
tags:
  mitre:
  - T1505.004
  categories:
  - endpoint
references:
- https://strontic.github.io/xcyclopedia/library/gacutil.exe-F2FE4DF74BD214EDDC1A658043828089.html
- https://www.microsoft.com/en-us/security/blog/2022/12/12/iis-modules-the-evolution-of-web-shells-and-how-to-detect-them/
- https://www.microsoft.com/en-us/security/blog/2022/07/26/malicious-iis-extensions-quietly-open-persistent-backdoors-into-servers/
- https://learn.microsoft.com/en-us/dotnet/framework/app-domains/gac
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=gacutil.exe\
    \ Processes.process IN (\"*-i *\",\"*/i *\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_server_software_component_gacutil_install_to_gac_filter`"
