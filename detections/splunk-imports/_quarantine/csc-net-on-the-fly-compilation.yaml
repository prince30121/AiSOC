id: splunk-security-content-ea73128a-43ab-11ec-9753-acde48001122
name: CSC Net On The Fly Compilation
description: The following analytic detects the use of the .NET compiler csc.exe for
  on-the-fly compilation of potentially malicious .NET code. It leverages data from
  Endpoint Detection and Response (EDR) agents, focusing on specific command-line
  patterns associated with csc.exe. This activity is significant because adversaries
  and malware often use this technique to evade detection by compiling malicious code
  at runtime. If confirmed malicious, this could allow attackers to execute arbitrary
  code, potentially leading to system compromise, data exfiltration, or further lateral
  movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1027.004
  categories:
  - endpoint
references:
- https://app.any.run/tasks/ad4c3cda-41f2-4401-8dba-56cc2d245488/
- https://tccontre.blogspot.com/2019/06/maicious-macro-that-compile-c-code-as.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=csc.exe\n        OR\n        Processes.original_file_name=csc.exe\n\
    \    )\n    Processes.process = \"*/noconfig*\" Processes.process = \"*/fullpaths*\"\
    \ Processes.process = \"*@*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `csc_net_on_the_fly_compilation_filter`"
