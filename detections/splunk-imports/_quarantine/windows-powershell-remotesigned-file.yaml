id: splunk-security-content-f7f7456b-470d-4a95-9703-698250645ff4
name: Windows Powershell RemoteSigned File
description: The following analytic identifies the use of the "remotesigned" execution
  policy for PowerShell scripts. It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on command-line executions containing "remotesigned" and
  "-File". This activity is significant because the "remotesigned" policy allows locally
  created scripts to run without restrictions, posing a potential security risk. If
  confirmed malicious, an attacker could execute unauthorized scripts, leading to
  code execution, privilege escalation, or persistence within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.001
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/powershell/module/microsoft.powershell.security/set-executionpolicy?view=powershell-7.3
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` min(_time) as firstTime max(_time)\
    \ as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_powershell`\
    \ Processes.process=\"* remotesigned *\" Processes.process=\"* -File *\"\n  BY\
    \ Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_powershell_remotesigned_file_filter`"
provenance:
