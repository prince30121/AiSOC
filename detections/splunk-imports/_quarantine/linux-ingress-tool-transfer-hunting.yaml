id: splunk-security-content-52fd468b-cb6d-48f5-b16a-92f1c9bb10cf
name: Linux Ingress Tool Transfer Hunting
description: The following analytic detects the use of 'curl' and 'wget' commands
  within a Linux environment. It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process names, user information, and command-line executions.
  This activity is significant as 'curl' and 'wget' are commonly used for downloading
  files, which can indicate potential ingress of malicious tools. If confirmed malicious,
  this activity could lead to unauthorized code execution, data exfiltration, or further
  compromise of the system. Monitoring and tuning this detection helps identify and
  differentiate between normal and potentially harmful usage.
severity: medium
enabled: false
tags:
  mitre:
  - T1105
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/curl/
- https://curl.se/docs/manpage.html#-I
- https://gtfobins.github.io/gtfobins/curl/
- https://github.com/rapid7/metasploit-framework/search?q=curl
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=curl\n        OR\n        Processes.process_name=wget\n\
    \    )\n  BY Processes.action Processes.dest Processes.original_file_name\n  \
    \   Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_ingress_tool_transfer_hunting_filter`"
