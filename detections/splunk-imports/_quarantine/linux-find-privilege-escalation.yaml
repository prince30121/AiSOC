id: splunk-security-content-2ff4e0c2-8256-4143-9c07-1e39c7231111
name: Linux Find Privilege Escalation
description: The following analytic detects the use of the 'find' command with 'sudo'
  and '-exec' options, which can indicate an attempt to escalate privileges on a Linux
  system. It leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process execution logs that include command-line arguments. This activity is
  significant because it can allow a user to execute system commands as root, potentially
  leading to a root shell. If confirmed malicious, this could enable an attacker to
  gain full control over the system, leading to severe security breaches and unauthorized
  access to sensitive data.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/find/
- https://en.wikipedia.org/wiki/Find_(Unix)
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *find*\"\n    AND\n    Processes.process=\"*-exec*\"\n    AND\n    Processes.process=\"\
    *sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_find_privilege_escalation_filter`"
