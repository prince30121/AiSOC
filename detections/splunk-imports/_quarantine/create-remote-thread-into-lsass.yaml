id: splunk-security-content-67d4dbef-9564-4699-8da8-03a151529edc
name: Create Remote Thread into LSASS
description: The following analytic detects the creation of a remote thread in the
  Local Security Authority Subsystem Service (LSASS). This behavior is identified
  using Sysmon EventID 8 logs, focusing on processes that create remote threads in
  lsass.exe. This activity is significant because it is commonly associated with credential
  dumping, a tactic used by adversaries to steal user authentication credentials.
  If confirmed malicious, this could allow attackers to gain unauthorized access to
  sensitive information, leading to potential compromise of the entire network. Analysts
  should investigate to differentiate between legitimate tools and potential threats.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.001
  categories:
  - endpoint
references:
- https://2017.zeronights.org/wp-content/uploads/materials/ZN17_Kheirkhabarov_Hunting_for_Credentials_Dumping_in_Windows_Environment.pdf
logsource:
  product: splunk
detection:
  splunk_spl: "`sysmon` EventID=8 TargetImage=*lsass.exe\n  | stats count min(_time)\
    \ as firstTime max(_time) as lastTime\n    BY EventID Guid NewThreadId\n     \
    \  ProcessID SecurityID SourceImage\n       SourceProcessGuid SourceProcessId\
    \ StartAddress\n       StartFunction StartModule TargetImage\n       TargetProcessGuid\
    \ TargetProcessId UserID\n       dest parent_process_exec parent_process_guid\n\
    \       parent_process_id parent_process_name parent_process_path\n       process_exec\
    \ process_guid process_id\n       process_name process_path signature\n      \
    \ signature_id user_id vendor_product\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `create_remote_thread_into_lsass_filter`"
