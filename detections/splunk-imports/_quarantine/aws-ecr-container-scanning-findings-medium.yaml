id: splunk-security-content-0b80e2c8-c746-4ddb-89eb-9efd892220cf
name: AWS ECR Container Scanning Findings Medium
description: The following analytic identifies medium-severity findings from AWS Elastic
  Container Registry (ECR) image scans. It leverages AWS CloudTrail logs, specifically
  the DescribeImageScanFindings event, to detect vulnerabilities in container images.
  This activity is significant for a SOC as it highlights potential security risks
  in containerized applications, which could be exploited if not addressed. If confirmed
  malicious, these vulnerabilities could lead to unauthorized access, data breaches,
  or further exploitation within the container environment, compromising the overall
  security posture.
severity: medium
enabled: false
tags:
  mitre:
  - T1204.003
  categories:
  - cloud
references:
- https://docs.aws.amazon.com/AmazonECR/latest/userguide/image-scanning.html
logsource:
  product: splunk
detection:
  splunk_spl: "`cloudtrail` eventSource=ecr.amazonaws.com eventName=DescribeImageScanFindings\n\
    \  | spath path=responseElements.imageScanFindings.findings{} output=findings\n\
    \  | mvexpand findings\n  | spath input=findings\n  | search severity=MEDIUM\n\
    \  | rename name as finding_name, description as finding_description, requestParameters.imageId.imageDigest\
    \ as imageDigest, requestParameters.repositoryName as repository\n  | rename user_name\
    \ as user\n  | stats count min(_time) as firstTime max(_time) as lastTime\n  \
    \  BY signature dest user\n       user_agent src vendor_account\n       vendor_region\
    \ vendor_product finding_name\n       finding_description imageDigest repository\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `aws_ecr_container_scanning_findings_medium_filter`"
provenance:
  source: splunk/security_content
  source_id: 0b80e2c8-c746-4ddb-89eb-9efd892220cf
