id: splunk-security-content-b1a8ce04-04c2-11ec-bea7-acde48001122
name: Domain Account Discovery with Dsquery
description: The following analytic identifies the execution of `dsquery.exe` with
  command-line arguments used to discover domain users. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process names and command-line
  executions. This activity is significant as it indicates potential reconnaissance
  efforts by adversaries to map out domain users, which is a common precursor to further
  attacks. If confirmed malicious, this behavior could allow attackers to gain insights
  into user accounts, facilitating subsequent actions like privilege escalation or
  lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1087.002
  categories:
  - endpoint
references:
- https://jpcertcc.github.io/ToolAnalysisResultSheet/details/dsquery.htm
- https://attack.mitre.org/techniques/T1087/002/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=\"\
    dsquery.exe\"\n    AND\n    Processes.process = \"*user*\"\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `domain_account_discovery_with_dsquery_filter`"
