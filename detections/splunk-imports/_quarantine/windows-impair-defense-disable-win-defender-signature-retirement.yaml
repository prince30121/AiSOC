id: splunk-security-content-7567a72f-bada-489d-aef1-59743fb64a66
name: Windows Impair Defense Disable Win Defender Signature Retirement
description: The following analytic detects modifications to the Windows registry
  that disable Windows Defender Signature Retirement. It leverages data from the Endpoint.Registry
  data model, specifically monitoring changes to the DisableSignatureRetirement registry
  setting. This activity is significant because disabling signature retirement can
  prevent Windows Defender from removing outdated antivirus signatures, potentially
  reducing its effectiveness in detecting threats. If confirmed malicious, this action
  could allow an attacker to evade detection by using older, less relevant signatures,
  thereby compromising the system's security posture.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://x.com/malmoeb/status/1742604217989415386?s=20
- https://github.com/undergroundwires/privacy.sexy
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime FROM datamodel=Endpoint.Registry where Registry.registry_path=
    "*\\Windows Defender\\NIS\\Consumers\\IPS\\DisableSignatureRetirement" Registry.registry_value_data="0x00000001"
    by Registry.action Registry.dest Registry.process_guid Registry.process_id Registry.registry_hive
    Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)` | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `windows_impair_defense_disable_win_defender_signature_retirement_filter`'
