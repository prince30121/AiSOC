id: splunk-security-content-909f8fd8-7ac8-11eb-a1f3-acde48001122
name: FodHelper UAC Bypass
description: The following analytic detects the execution of fodhelper.exe, which
  is known to exploit a User Account Control (UAC) bypass by leveraging specific registry
  keys. The detection method uses Endpoint Detection and Response (EDR) telemetry
  to identify when fodhelper.exe spawns a child process and accesses the registry
  keys. This activity is significant because it indicates a potential privilege escalation
  attempt by an attacker. If confirmed malicious, the attacker could execute commands
  with elevated privileges, leading to unauthorized system changes and potential full
  system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1112
  - T1548.002
  categories:
  - endpoint
references:
- https://blog.malwarebytes.com/malwarebytes-news/2021/02/lazyscripter-from-empire-to-double-rat/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1548.002/T1548.002.md
- https://github.com/gushmazuko/WinBypass/blob/master/FodhelperBypass.ps1
- https://attack.mitre.org/techniques/T1548/002/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name=fodhelper.exe\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `fodhelper_uac_bypass_filter`"
