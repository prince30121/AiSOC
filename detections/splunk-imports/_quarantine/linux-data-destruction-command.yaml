id: splunk-security-content-b11d3979-b2f7-411b-bb1a-bd00e642173b
name: Linux Data Destruction Command
description: The following analytic detects the execution of a Unix shell command
  designed to wipe root directories on a Linux host. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on the 'rm' command with force recursive
  deletion and the '--no-preserve-root' option. This activity is significant as it
  indicates potential data destruction attempts, often associated with malware like
  Awfulshred. If confirmed malicious, this behavior could lead to severe data loss,
  system instability, and compromised integrity of the affected Linux host. Immediate
  investigation and response are crucial to mitigate potential damage.
severity: medium
enabled: false
tags:
  mitre:
  - T1485
  categories:
  - endpoint
references:
- https://cert.gov.ua/article/3718487
- https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/overview-of-the-cyber-weapons-used-in-the-ukraine-russia-war/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = \"rm\"\n    AND\n    Processes.process IN (\"* -rf*\", \"* -fr*\")\n    AND\n\
    \    Processes.process = \"* --no-preserve-root\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `linux_data_destruction_command_filter`"
