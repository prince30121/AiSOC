id: splunk-security-content-c32f091e-30db-11ec-8738-acde48001122
name: Windows Curl Download to Suspicious Path
description: 'The following analytic detects the use of Windows Curl.exe to download

  a file to a suspicious location, such as AppData, ProgramData, or Public directories.

  It leverages data from Endpoint Detection and Response (EDR) agents, focusing on

  command-line executions that include the -O or --output options. This activity is

  significant because downloading files to these locations can indicate an attempt

  to bypass security controls or establish persistence. If confirmed malicious, this

  behavior could lead to unauthorized code execution, data exfiltration, or further

  compromise of the system.'
severity: medium
enabled: false
tags:
  mitre:
  - T1105
  categories:
  - endpoint
references:
- https://thedfirreport.com/2021/10/18/icedid-to-xinglocker-ransomware-in-24-hours/
- https://attack.mitre.org/techniques/T1105/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1105/T1105.md
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime from datamodel=Endpoint.Processes where\n(\n  Processes.process_name=curl.exe\n\
    \  OR\n  Processes.original_file_name=Curl.exe\n)\nProcesses.process IN (\"*-O\
    \ *\",\"*--output*\", \"*--output-dir*\")\nProcesses.process IN (\n      \"*:\\\
    \\PerfLogs\\\\*\",\n      \"*:\\\\Windows\\\\Temp\\\\*\",\n      \"*\\\\AppData\\\
    \\*\",\n      \"*\\\\ProgramData\\\\*\",\n      \"*\\\\Users\\\\Public\\\\*\"\
    ,\n      \"*%AppData%*\",\n      \"*%Public%*\",\n      \"*%Temp%*\",\n      \"\
    *%tmp%*\"\n      )\nby Processes.action Processes.dest Processes.original_file_name\
    \ Processes.parent_process\n   Processes.parent_process_exec Processes.parent_process_guid\
    \ Processes.parent_process_id\n   Processes.parent_process_name Processes.parent_process_path\
    \ Processes.process Processes.process_exec\n   Processes.process_guid Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n   Processes.process_name\
    \ Processes.process_path Processes.user Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_curl_download_to_suspicious_path_filter`"
