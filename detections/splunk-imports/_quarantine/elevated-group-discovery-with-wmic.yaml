id: splunk-security-content-3f6bbf22-093e-4cb4-9641-83f47b8444b6
name: Elevated Group Discovery With Wmic
description: The following analytic detects the execution of `wmic.exe` with command-line
  arguments querying specific elevated domain groups. It leverages Endpoint Detection
  and Response (EDR) telemetry to identify processes that access the LDAP namespace
  and search for groups like "Domain Admins" or "Enterprise Admins." This activity
  is significant as it indicates potential reconnaissance efforts by adversaries to
  identify high-privilege accounts within Active Directory. If confirmed malicious,
  this behavior could lead to privilege escalation, allowing attackers to gain elevated
  access and control over critical network resources.
severity: medium
enabled: false
tags:
  mitre:
  - T1069.002
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1069/002/
- https://docs.microsoft.com/en-us/windows-server/identity/ad-ds/plan/security-best-practices/appendix-b--privileged-accounts-and-groups-in-active-directory
- https://adsecurity.org/?p=3658
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime from datamodel=Endpoint.Processes where (Processes.process_name="wmic.exe")
    (Processes.process=*/NAMESPACE:\\\\root\\directory\\ldap*) (Processes.process="*Domain
    Admins*" OR Processes.process="*Enterprise Admins*" OR Processes.process="*Schema
    Admins*" OR Processes.process="*Account Operators*" OR Processes.process="*Server
    Operators*" OR Processes.process="*Protected Users*" OR Processes.process="*Dns
    Admins*") by Processes.action Processes.dest Processes.original_file_name Processes.parent_process
    Processes.parent_process_exec Processes.parent_process_guid Processes.parent_process_id
    Processes.parent_process_name Processes.parent_process_path Processes.process
    Processes.process_exec Processes.process_guid Processes.process_hash Processes.process_id
    Processes.process_integrity_level Processes.process_name Processes.process_path
    Processes.user Processes.user_id Processes.vendor_product | `drop_dm_object_name(Processes)`
    | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `elevated_group_discovery_with_wmic_filter`'
