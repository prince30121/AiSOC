id: splunk-security-content-dd04b29a-beed-11eb-87bc-acde48001122
name: Detect SharpHound Usage
description: The following analytic detects the usage of the SharpHound binary by
  identifying its original filename, `SharpHound.exe`, and the process name. This
  detection leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process metadata and command-line executions. SharpHound is a tool used for Active
  Directory enumeration, often by attackers during the reconnaissance phase. If confirmed
  malicious, this activity could allow an attacker to map out the network, identify
  high-value targets, and plan further attacks, potentially leading to privilege escalation
  and lateral movement within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1069.001
  - T1069.002
  - T1087.001
  - T1087.002
  - T1482
  categories:
  - endpoint
references:
- https://attack.mitre.org/software/S0521/
- https://thedfirreport.com/?s=bloodhound
- https://github.com/BloodHoundAD/BloodHound/tree/master/Collectors
- https://github.com/BloodHoundAD/SharpHound3
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1059.001/T1059.001.md#atomic-test-2---run-bloodhound-from-local-disk
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=sharphound.exe\n        OR\n        Processes.original_file_name=SharpHound.exe\n\
    \    )\n  BY Processes.action Processes.dest Processes.original_file_name\n  \
    \   Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `detect_sharphound_usage_filter`"
