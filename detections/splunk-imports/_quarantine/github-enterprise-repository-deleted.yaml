id: splunk-security-content-f709e736-3e6c-492f-b865-bc7696cc24a7
name: GitHub Enterprise Repository Deleted
description: The following analytic detects when a user deletes a repository in GitHub
  Enterprise. The detection monitors GitHub Enterprise audit logs for repository deletion
  events, which could indicate unauthorized removal of critical source code and project
  resources. For a SOC, identifying repository deletions is crucial as it may signal
  account compromise, insider threats, or malicious attempts to destroy intellectual
  property and disrupt development operations. The impact could be severe, potentially
  resulting in permanent loss of source code, documentation, project history, and
  other critical assets if proper backups are not maintained. Repository deletion
  could halt development workflows, cause significant business disruption, and require
  substantial effort to restore from backups if available. Additionally, unauthorized
  repository removal could be part of a larger attack campaign aimed at destroying
  or compromising enterprise assets.
severity: medium
enabled: false
tags:
  mitre:
  - T1485
  - T1195
  categories:
  - cloud
references:
- https://www.googlecloudcommunity.com/gc/Community-Blog/Monitoring-for-Suspicious-GitHub-Activity-with-Google-Security/ba-p/763610
- https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/streaming-the-audit-log-for-your-enterprise#setting-up-streaming-to-splunk
logsource:
  product: splunk
detection:
  splunk_spl: "`github_enterprise` action=repo.destroy\n  | fillnull\n  | stats count\
    \ min(_time) as firstTime max(_time) as lastTime\n    BY actor, actor_id, actor_is_bot,\n\
    \       actor_location.country_code, business, business_id,\n       org, org_id,\
    \ repo,\n       repo_id, user_agent, visibility,\n       action\n  | eval user=actor\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `github_enterprise_repository_deleted_filter`"
