id: splunk-security-content-a17af481-e2ad-494c-9da6-afb4d243a019
name: Windows Registry Entries Restored Via Reg
description: The following analytic detects the execution of reg.exe with the "restore"
  parameter, indicating an attempt to restore registry backup data on a host. This
  detection leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process execution logs and command-line arguments. This activity is significant
  as it may indicate post-exploitation actions, such as those performed by tools like
  winpeas, which use "reg save" and "reg restore" to manipulate registry settings.
  If confirmed malicious, this could allow an attacker to revert registry changes,
  potentially bypassing security controls and maintaining persistence.
severity: medium
enabled: false
tags:
  mitre:
  - T1012
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/quser
- https://github.com/carlospolop/PEASS-ng/tree/master/winPEAS
- https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_reg`\n\
    \    AND\n    Processes.process = \"* restore *\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_registry_entries_restored_via_reg_filter`"
