id: splunk-security-content-8c5835b9-39d9-438b-817c-95f14c69a31e
name: Detect HTML Help URL in Command Line
description: The following analytic detects the execution of hh.exe (HTML Help) loading
  a Compiled HTML Help (CHM) file from a remote URL. This detection leverages data
  from Endpoint Detection and Response (EDR) agents, focusing on command-line executions
  containing URLs. This activity is significant as it can indicate an attempt to execute
  malicious scripts via CHM files, potentially leading to unauthorized code execution.
  If confirmed malicious, this could allow an attacker to run scripts using engines
  like JScript or VBScript, leading to further system compromise or data exfiltration.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.001
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1218/001/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218.001/T1218.001.md
- https://lolbas-project.github.io/lolbas/Binaries/Hh/
- https://blog.sevagas.com/?Hacking-around-HTA-files
- https://gist.github.com/mgeeky/cce31c8602a144d8f2172a73d510e0e7
- https://web.archive.org/web/20220119133748/https://cyberforensicator.com/2019/01/20/silence-dissecting-malicious-chm-files-and-performing-forensic-analysis/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_hh`\
    \ Processes.process=*http*\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `detect_html_help_url_in_command_line_filter`"
