id: splunk-security-content-c9f010da-57ab-11ec-82bd-acde48001122
name: Windows Raccine Scheduled Task Deletion
description: The following analytic identifies the deletion of the Raccine Rules Updater
  scheduled task using the `schtasks.exe` command. This detection leverages data from
  Endpoint Detection and Response (EDR) agents, focusing on process names and command-line
  executions. This activity is significant because adversaries may delete this task
  to disable Raccine, a tool designed to prevent ransomware attacks. If confirmed
  malicious, this action could allow ransomware to execute without interference, leading
  to potential data encryption and loss.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://redcanary.com/blog/blackbyte-ransomware/
- https://github.com/Neo23x0/Raccine
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=schtasks.exe\
    \ Processes.process=\"*delete*\"\n    AND\n    Processes.process=\"*Raccine*\"\
    \n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_raccine_scheduled_task_deletion_filter`"
