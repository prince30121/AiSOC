id: splunk-security-content-5d814af1-1041-47b5-a9ac-d754e82e9a26
name: Process Creating LNK file in Suspicious Location
description: 'The following analytic detects a process creating a `.lnk` file in suspicious
  locations such as `C:\User*` or `*\Local\Temp\*`.

  It leverages filesystem and process activity data from the Endpoint data model to
  identify this behavior.

  This activity can be significant because creating `.lnk` files in these directories
  is a common indicator of spear phishing tools to establish persistence or execute
  malicious payloads.

  If confirmed malicious, this could allow an attacker to maintain persistence, execute
  arbitrary code, or further compromise the system.'
severity: medium
enabled: false
tags:
  mitre:
  - T1566.002
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1566/001/
- https://www.trendmicro.com/en_us/research/17/e/rising-trend-attackers-using-lnk-files-download-malware.html
- https://twitter.com/pr0xylife/status/1590394227758104576
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nFROM datamodel=Endpoint.Filesystem where\n\n\
    Filesystem.action=\"created\"\nFilesystem.file_name=\"*.lnk\"\nFilesystem.file_path\
    \ IN (\n  \"*:\\\\AppData\\\\Local\\\\Temp\\\\*\",\n  \"*:\\\\Temp\\\\*\",\n \
    \ \"*:\\\\Users\\\\*\",\n  \"*:\\\\Windows\\\\Temp\\\\*\"\n)\nNOT Filesystem.file_path\
    \ IN (\n  \"*\\\\AppData\\\\Local\\\\Microsoft\\\\Windows\\\\WinX\\\\*\",\n  \"\
    *\\\\AppData\\\\Roaming\\\\Microsoft\\\\Excel\\\\*\",\n  \"*\\\\AppData\\\\Roaming\\\
    \\Microsoft\\\\Internet Explorer\\\\Quick Launch\\\\*\",\n  \"*\\\\AppData\\\\\
    Roaming\\\\Microsoft\\\\Office\\\\Recent\\\\*\",\n  \"*\\\\AppData\\\\Roaming\\\
    \\Microsoft\\\\Windows\\\\Recent\\\\*\",\n  \"*\\\\AppData\\\\Roaming\\\\Microsoft\\\
    \\Windows\\\\Start Menu\\\\*\",\n  \"*\\\\AppData\\\\Roaming\\\\Microsoft\\\\\
    Word\\\\*\",\n  \"*\\\\Links\\\\*\",\n  \"*\\\\OneDrive *\"\n)\n\nby Filesystem.action\
    \ Filesystem.dest Filesystem.file_access_time\n   Filesystem.file_create_time\
    \ Filesystem.file_hash\n   Filesystem.file_modify_time Filesystem.file_name\n\
    \   Filesystem.file_path Filesystem.file_acl Filesystem.file_size\n   Filesystem.process_guid\
    \ Filesystem.process_id\n   Filesystem.user Filesystem.vendor_product\n\n| `drop_dm_object_name(Filesystem)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `process_creating_lnk_file_in_suspicious_location_filter`"
