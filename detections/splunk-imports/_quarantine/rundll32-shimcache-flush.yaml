id: splunk-security-content-a913718a-25b6-11ec-96d3-acde48001122
name: Rundll32 Shimcache Flush
description: The following analytic detects the execution of a suspicious rundll32
  command line used to clear the shim cache. It leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process execution logs and command-line arguments.
  This activity is significant because clearing the shim cache is an anti-forensic
  technique aimed at evading detection and removing forensic artifacts. If confirmed
  malicious, this action could hinder incident response efforts, allowing an attacker
  to cover their tracks and maintain persistence on the compromised machine.
severity: medium
enabled: false
tags:
  mitre:
  - T1112
  categories:
  - endpoint
references:
- https://blueteamops.medium.com/shimcache-flush-89daff28d15e
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_rundll32`\n\
    \    AND\n    Processes.process = \"*apphelp.dll,ShimFlushCache*\"\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `rundll32_shimcache_flush_filter`"
