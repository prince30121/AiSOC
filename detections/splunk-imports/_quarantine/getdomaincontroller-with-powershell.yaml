id: splunk-security-content-868ee0e4-52ab-484a-833a-6d85b7c028d0
name: GetDomainController with PowerShell
description: The following analytic detects the execution of `powershell.exe` with
  the `Get-DomainController` command, which is used to discover remote systems within
  a Windows domain. This detection leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process names and command-line arguments. Monitoring this
  activity is crucial as it may indicate an attempt to enumerate domain controllers,
  a common tactic in Active Directory discovery. If confirmed malicious, this activity
  could allow attackers to gain situational awareness, potentially leading to further
  exploitation and lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1018
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1018/
- https://powersploit.readthedocs.io/en/latest/Recon/Get-DomainController/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=\"powershell.exe\"\n    )\n    (Processes.process=*Get-DomainController*)\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `getdomaincontroller_with_powershell_filter`"
