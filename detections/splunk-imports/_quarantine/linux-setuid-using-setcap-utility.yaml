id: splunk-security-content-9d96022e-6250-11ec-9a19-acde48001122
name: Linux Setuid Using Setcap Utility
description: The following analytic detects the execution of the 'setcap' utility
  to enable the SUID bit on Linux systems. It leverages Endpoint Detection and Response
  (EDR) data, focusing on process names and command-line arguments that indicate the
  use of 'setcap' with specific capabilities. This activity is significant because
  setting the SUID bit allows a user to temporarily gain root access, posing a substantial
  security risk. If confirmed malicious, an attacker could escalate privileges, execute
  arbitrary commands with elevated permissions, and potentially compromise the entire
  system.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.001
  categories:
  - endpoint
references:
- https://www.hackingarticles.in/linux-privilege-escalation-using-capabilities/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name = setcap\n        OR\n        Processes.process = \"\
    *setcap *\"\n    )\n    AND Processes.process IN (\"* cap_setuid=ep *\", \"* cap_setuid+ep\
    \ *\", \"* cap_net_bind_service+p *\", \"* cap_net_raw+ep *\", \"* cap_dac_read_search+ep\
    \ *\")\n  BY Processes.action Processes.dest Processes.original_file_name\n  \
    \   Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_setuid_using_setcap_utility_filter`"
