id: splunk-security-content-1cefb270-74a5-4e27-aa0c-2b6fa7c5b4ed
name: Linux Kworker Process In Writable Process Path
description: The following analytic detects the execution of a kworker process with
  a command line in writable directories such as /home/, /var/log, and /tmp on a Linux
  machine. It leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process and parent process paths. This activity is significant as kworker processes
  are typically kernel threads, and their presence in writable directories is unusual
  and indicative of potential malware, such as CyclopsBlink. If confirmed malicious,
  this could allow attackers to blend malicious processes with legitimate ones, leading
  to persistent access and further system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1036.004
  categories:
  - endpoint
references:
- https://www.ncsc.gov.uk/files/Cyclops-Blink-Malware-Analysis-Report.pdf
- https://www.trendmicro.com/en_us/research/22/c/cyclops-blink-sets-sights-on-asus-routers--.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process\
    \ = \"*[kworker/*\" Processes.parent_process_path IN (\"/home/*\", \"/tmp/*\"\
    , \"/var/log/*\") Processes.process=\"*iptables*\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `linux_kworker_process_in_writable_process_path_filter`"
