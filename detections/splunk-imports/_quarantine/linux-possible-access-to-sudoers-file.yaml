id: splunk-security-content-4479539c-71fc-11ec-b2e2-acde48001122
name: Linux Possible Access To Sudoers File
description: The following analytic detects potential access or modification of the
  /etc/sudoers file on a Linux system. It leverages data from Endpoint Detection and
  Response (EDR) agents, focusing on processes like "cat," "nano," "vim," and "vi"
  accessing the /etc/sudoers file. This activity is significant because the sudoers
  file controls user permissions for executing commands with elevated privileges.
  If confirmed malicious, an attacker could gain persistence or escalate privileges,
  compromising the security of the targeted host.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1548/003/
- https://web.archive.org/web/20210708035426/https://www.cobaltstrike.com/downloads/csmanual43.pdf
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ IN(\"cat\", \"nano*\",\"vim*\", \"vi*\")\n    AND\n    Processes.process IN(\"\
    */etc/sudoers*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_possible_access_to_sudoers_file_filter`"
