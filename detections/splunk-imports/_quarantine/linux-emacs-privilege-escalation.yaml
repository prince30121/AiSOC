id: splunk-security-content-92033cab-1871-483d-a03b-a7ce98665cfc
name: Linux Emacs Privilege Escalation
description: The following analytic detects the execution of Emacs with elevated privileges
  using the `sudo` command and the `--eval` option. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process execution logs that include
  command-line arguments. This activity is significant because it indicates a potential
  privilege escalation attempt, where a user could gain root access by running Emacs
  with elevated permissions. If confirmed malicious, this could allow an attacker
  to execute arbitrary commands as root, leading to full system compromise and unauthorized
  access to sensitive information.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/emacs/
- https://en.wikipedia.org/wiki/Emacs
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *emacs*\"\n    AND\n    Processes.process=\"*--eval*\"\n    AND\n    Processes.process=\"\
    *sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_emacs_privilege_escalation_filter`"
