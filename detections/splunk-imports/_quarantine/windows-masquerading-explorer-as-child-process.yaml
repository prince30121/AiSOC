id: splunk-security-content-61490da9-52a1-4855-a0c5-28233c88c481
name: Windows Masquerading Explorer As Child Process
description: 'The following analytic identifies instances where explorer.exe is spawned
  by unusual parent processes such as cmd.exe, powershell.exe, or regsvr32.exe.

  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process and parent process relationships.

  This activity is significant because explorer.exe is typically initiated by userinit.exe,
  and deviations from this norm can indicate code injection or process masquerading
  attempts by malware like Qakbot.

  If confirmed malicious, this behavior could allow attackers to execute arbitrary
  code, evade detection, and maintain persistence within the environment.'
severity: medium
enabled: false
tags:
  mitre:
  - T1574.001
  categories:
  - endpoint
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.qakbot
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nfrom datamodel=Endpoint.Processes where\n\n\
    Processes.parent_process_name IN (\n    \"cmd.exe\",\n    \"powershell.exe\",\n\
    \    \"pwsh.exe\",\n    \"regsvr32.exe\"\n)\nProcesses.process_name = \"explorer.exe\"\
    \nProcesses.process IN (\"*\\\\explorer.exe\")\n\nby Processes.action Processes.dest\
    \ Processes.original_file_name\n   Processes.parent_process Processes.parent_process_exec\n\
    \   Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path\n   Processes.process Processes.process_exec Processes.process_guid\n\
    \   Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \   Processes.process_name Processes.process_path Processes.user\n   Processes.user_id\
    \ Processes.vendor_product\n\n| `drop_dm_object_name(\"Processes\")`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_masquerading_explorer_as_child_process_filter`"
