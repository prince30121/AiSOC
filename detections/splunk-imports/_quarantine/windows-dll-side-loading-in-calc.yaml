id: splunk-security-content-af01f6db-26ac-440e-8d89-2793e303f137
name: Windows DLL Side-Loading In Calc
description: The following analytic detects the loading of the "WindowsCodecs.dll"
  by calc.exe from a non-standard location This could be indicative of a potential
  DLL side-loading technique. This detection leverages Sysmon EventCode 7 to identify
  the DLL side-loading activity. In previous versions of the "calc.exe" binary, namely
  on Windows 7, it was vulnerable to DLL side-loading, where an attacker is able to
  load an arbitrary DLL named "WindowsCodecs.dll". This technique has been observed
  in Qakbot malware. This activity is significant as it indicates potential malware
  execution through a trusted process, which can bypass security controls. If confirmed
  malicious, this could allow attackers to execute arbitrary code, maintain persistence,
  and escalate privileges within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1574.001
  categories:
  - endpoint
references:
- https://www.bitdefender.com/blog/hotforsecurity/new-qakbot-malware-strain-replaces-windows-calculator-dll-to-infected-pcs/
- https://www.menlosecurity.com/blog/an-anatomy-of-heat-attacks-used-by-qakbot-campaigns
logsource:
  product: splunk
detection:
  splunk_spl: "`sysmon`\nEventCode=7\nImage=\"*\\\\calc.exe\"\nImageLoaded=\"*\\\\\
    WindowsCodecs.dll\"\nNOT Image IN (\"*:\\\\Windows\\\\System32\\\\*\", \"*:\\\\\
    Windows\\\\SysWOW64\\\\*\")\nNOT ImageLoaded IN(\"*:\\\\Windows\\\\System32\\\\\
    *\", \"*:\\\\Windows\\\\SysWOW64\\\\*\", \"*:\\\\Windows\\\\WinSXS\\\\*\")\n\n\
    | fillnull\n| stats count min(_time) as firstTime max(_time) as lastTime\n\nby\
    \ Image ImageLoaded dest loaded_file loaded_file_path original_file_name\n   process_exec\
    \ process_guid process_hash process_id process_name\n   process_path service_dll_signature_exists\
    \ service_dll_signature_verified\n   signature signature_id user_id vendor_product\n\
    \n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_dll_side_loading_in_calc_filter`"
