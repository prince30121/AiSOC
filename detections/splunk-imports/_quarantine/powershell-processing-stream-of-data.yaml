id: splunk-security-content-0d718b52-c9f1-11eb-bc61-acde48001122
name: Powershell Processing Stream Of Data
description: The following analytic detects suspicious PowerShell script execution
  involving compressed stream data processing, identified via EventCode 4104. It leverages
  PowerShell Script Block Logging to flag scripts using `IO.Compression`, `IO.StreamReader`,
  or decompression methods. This activity is significant as it often indicates obfuscated
  PowerShell or embedded .NET/binary execution, which are common tactics for evading
  detection. If confirmed malicious, this behavior could allow attackers to execute
  hidden code, escalate privileges, or maintain persistence within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.001
  categories:
  - endpoint
references:
- https://medium.com/@ahmedjouini99/deobfuscating-emotets-powershell-payload-e39fb116f7b9
- https://help.splunk.com/en/security-offerings/splunk-user-behavior-analytics/get-data-in/5.4.1/add-other-data-to-splunk-uba/configure-powershell-logging-to-see-powershell-anomalies-in-splunk-uba
- https://blog.palantir.com/tampering-with-windows-event-tracing-background-offense-and-defense-4be7ac62ac63
- https://static1.squarespace.com/static/552092d5e4b0661088167e5c/t/59c1814829f18782e24f1fe2/1505853768977/Windows+PowerShell+Logging+Cheat+Sheet+ver+Sept+2017+v2.1.pdf
- https://www.crowdstrike.com/blog/investigating-powershell-command-and-script-logging/
- https://www.splunk.com/en_us/blog/security/hunting-for-malicious-powershell-using-script-block-logging.html
- https://thedfirreport.com/2023/05/22/icedid-macro-ends-in-nokoyawa-ransomware/
logsource:
  product: splunk
detection:
  splunk_spl: "`powershell` EventCode=4104 ScriptBlockText = \"*IO.Compression.*\"\
    \ OR ScriptBlockText = \"*IO.StreamReader*\" OR ScriptBlockText = \"*]::Decompress*\"\
    \n  | fillnull\n  | stats count min(_time) as firstTime max(_time) as lastTime\n\
    \    BY dest signature signature_id\n       user_id vendor_product EventID\n \
    \      Guid Opcode Name\n       Path ProcessID ScriptBlockId\n       ScriptBlockText\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `powershell_processing_stream_of_data_filter`"
