id: splunk-security-content-3a76d52f-a007-4a65-a37d-f313c2c83f31
name: Windows Suspicious Named Pipe
description: 'The following analytic detects the creation or connection to known suspicious
  named pipes.

  It leverages Sysmon EventCodes 17 and 18 to identify known default pipe names used
  by malicious or suspicious tools.

  If confirmed malicious, this could allow an attacker to abuse these to potentially
  gain privilege escalation,

  persistence, c2 communications, or further system compromise.'
severity: medium
enabled: false
tags:
  mitre:
  - T1559
  - T1021.002
  - T1055
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1218/009/
- https://docs.microsoft.com/en-us/windows/win32/ipc/named-pipes
logsource:
  product: splunk
detection:
  splunk_spl: "`sysmon`\nEventCode IN (17, 18)\nNOT process_path IN (\n    \"*:\\\\\
    Program Files \\(x86\\)\\\\Adobe*\",\n    \"*:\\\\Program Files \\(x86\\)\\\\\
    Google*\",\n    \"*:\\\\Program Files \\(x86\\)\\\\Microsoft*\",\n    \"*:\\\\\
    Program Files\\\\Adobe*\",\n    \"*:\\\\Program Files\\\\Google*\",\n    \"*:\\\
    \\Program Files\\\\Microsoft*\",\n    \"*:\\\\Windows\\\\system32\\\\SearchIndexer.exe\"\
    ,\n    \"*:\\\\Windows\\\\System32\\\\svchost.exe\",\n    \"*:\\\\Windows\\\\\
    SystemApps\\\\Microsoft*\",\n    \"*\\\\Amazon\\\\SSM\\\\Instance*\",\n    \"\
    *\\\\AppData\\\\Local\\\\Google*\",\n    \"*\\\\AppData\\\\Local\\\\Kingsoft\\\
    \\*\",\n    \"*\\\\AppData\\\\Local\\\\Microsoft*\",\n    \"System\",\n)\n\n|\
    \ stats min(_time) as firstTime max(_time) as lastTime\n  count by dest dvc process_exec\
    \ process_guid process_id process_path\n           pipe_name user_id process_name\
    \ signature signature_id vendor_product\n\n| lookup suspicious_named_pipes suspicious_pipe_name\
    \ AS pipe_name OUTPUT tool, type, description\n| where isnotnull(tool)\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_suspicious_named_pipe_filter`"
provenance:
