id: splunk-security-content-ca4e94fb-7969-4d63-8630-3625809a1f70
name: Windows Modify Registry UpdateServiceUrlAlternate
description: The following analytic detects a suspicious modification to the Windows
  Update configuration registry key, specifically targeting the UpdateServiceUrlAlternate
  setting. It leverages data from the Endpoint.Registry datamodel to identify changes
  to this registry path. This activity is significant because adversaries, including
  malware like RedLine Stealer, exploit this technique to bypass detection and deploy
  additional payloads. If confirmed malicious, this modification could allow attackers
  to redirect update services, potentially leading to the execution of malicious code,
  further system compromise, and persistent evasion of security defenses.
severity: medium
enabled: false
tags:
  mitre:
  - T1112
  categories:
  - endpoint
references:
- https://learn.microsoft.com/de-de/security-updates/windowsupdateservices/18127499
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime from datamodel=Endpoint.Registry where Registry.registry_path="*\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate\\UpdateServiceUrlAlternate"
    by Registry.action Registry.dest Registry.process_guid Registry.process_id Registry.registry_hive
    Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)` | `security_content_ctime(lastTime)`
    | `security_content_ctime(firstTime)` | `windows_modify_registry_updateserviceurlalternate_filter`'
