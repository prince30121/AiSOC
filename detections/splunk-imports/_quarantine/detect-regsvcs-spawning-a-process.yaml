id: splunk-security-content-bc477b57-5c21-4ab6-9c33-668772e7f114
name: Detect Regsvcs Spawning a Process
description: The following analytic identifies regsvcs.exe spawning a child process.
  This behavior is detected using Endpoint Detection and Response (EDR) telemetry,
  focusing on process creation events where the parent process is regsvcs.exe. This
  activity is significant because regsvcs.exe rarely spawns child processes, and such
  behavior can indicate an attempt to bypass application control mechanisms. If confirmed
  malicious, this could allow an attacker to execute arbitrary code, potentially leading
  to privilege escalation or persistent access within the environment. Immediate investigation
  is recommended to determine the legitimacy of the spawned process and any associated
  suspicious activities.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.009
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1218/009/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218.009/T1218.009.md
- https://lolbas-project.github.io/lolbas/Binaries/Regsvcs/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name=regsvcs.exe\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `detect_regsvcs_spawning_a_process_filter`"
