id: splunk-security-content-35307032-a12d-11eb-835f-acde48001122
name: Rundll32 with no Command Line Arguments with Network
description: The following analytic detects the execution of rundll32.exe without
  command line arguments, followed by a network connection. This behavior is identified
  using Endpoint Detection and Response (EDR) telemetry and network traffic data.
  It is significant because rundll32.exe typically requires arguments to function,
  and its absence is often associated with malicious activity, such as Cobalt Strike.
  If confirmed malicious, this activity could indicate an attempt to establish unauthorized
  network connections, potentially leading to data exfiltration or further compromise
  of the system.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.011
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1218/011/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218.011/T1218.011.md
- https://lolbas-project.github.io/lolbas/Binaries/Rundll32/
- https://bohops.com/2018/02/26/leveraging-inf-sct-fetch-execute-techniques-for-bypass-evasion-persistence/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime FROM datamodel=Endpoint.Processes where\n`process_rundll32`\n\
    Processes.process IN (\n  \"*rundll32\",\n  \"*rundll32.exe\",\n  \"*rundll32.exe\\\
    \"\"\n)\nby host _time span=1h Processes.action Processes.dest Processes.original_file_name\n\
    \   Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \   Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \   Processes.process Processes.process_exec Processes.process_guid Processes.process_hash\n\
    \   Processes.process_id Processes.process_integrity_level Processes.process_name\
    \ Processes.process_path\n   Processes.user Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | rename dest as src\n| join host process_id\n[\n  | tstats `security_content_summariesonly`\
    \ count\n  FROM datamodel=Network_Traffic.All_Traffic where\n  All_Traffic.dest_port\
    \ != 0\n  by host All_Traffic.action All_Traffic.app All_Traffic.bytes All_Traffic.bytes_in\
    \ All_Traffic.bytes_out\n     All_Traffic.dest  All_Traffic.dest_ip All_Traffic.dest_port\
    \ All_Traffic.dvc All_Traffic.protocol\n     All_Traffic.protocol_version All_Traffic.src\
    \ All_Traffic.src_ip All_Traffic.src_port\n     All_Traffic.transport All_Traffic.user\
    \ All_Traffic.vendor_product All_Traffic.direction\n     All_Traffic.process_id\n\
    \  | `drop_dm_object_name(All_Traffic)`\n]\n| `rundll32_with_no_command_line_arguments_with_network_filter`"
