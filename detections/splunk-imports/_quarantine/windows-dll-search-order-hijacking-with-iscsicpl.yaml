id: splunk-security-content-f39ee679-3b1e-4f47-841c-5c3c580acda2
name: Windows DLL Search Order Hijacking with iscsicpl
description: The following analytic detects DLL search order hijacking involving iscsicpl.exe.
  It identifies when iscsicpl.exe loads a malicious DLL from a new path, triggering
  the payload execution. This detection leverages data from Endpoint Detection and
  Response (EDR) agents, focusing on child processes spawned by iscsicpl.exe. This
  activity is significant as it indicates a potential attempt to execute unauthorized
  code via DLL hijacking. If confirmed malicious, this could allow an attacker to
  execute arbitrary code, escalate privileges, or maintain persistence within the
  environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1574.001
  categories:
  - endpoint
references:
- https://github.com/hackerhouse-opensource/iscsicpl_bypassUAC
- https://github.com/422926799/csplugin/tree/master/bypassUAC
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name=iscsicpl.exe\
    \ `windows_shells`\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_dll_search_order_hijacking_with_iscsicpl_filter`"
