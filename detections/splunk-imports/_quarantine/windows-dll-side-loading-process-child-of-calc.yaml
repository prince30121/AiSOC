id: splunk-security-content-295ca9ed-e97b-4520-90f7-dfb6469902e1
name: Windows DLL Side-Loading Process Child Of Calc
description: The following analytic identifies suspicious child processes spawned
  by calc.exe, indicative of a potential DLL side-loading technique. This detection
  leverages data from Endpoint Detection and Response (EDR) agents, focusing on process
  GUIDs, names, and parent processes. In previous versions of the "calc.exe" binary,
  namely on Windows 7, it was vulnerable to DLL side-loading, where an attacker is
  able to load an arbitrary DLL named "WindowsCodecs.dll". This activity was observed
  in Qakbot malware, back in 2022. If confirmed malicious, this behavior could allow
  attackers to execute arbitrary code, maintain persistence, and escalate privileges,
  posing a severe threat to the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1574.001
  categories:
  - endpoint
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.qakbot
- https://www.menlosecurity.com/blog/an-anatomy-of-heat-attacks-used-by-qakbot-campaigns
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\nfrom datamodel=Endpoint.Processes where\n   \
    \ Processes.parent_process_name = \"calc.exe\"\n    Processes.process_name !=\
    \ \"win32calc.exe\"\n\nby Processes.action Processes.dest Processes.original_file_name\
    \ Processes.parent_process\n   Processes.parent_process_exec Processes.parent_process_guid\
    \ Processes.parent_process_id\n   Processes.parent_process_name Processes.parent_process_path\
    \ Processes.process\n   Processes.process_exec Processes.process_guid Processes.process_hash\n\
    \   Processes.process_id Processes.process_integrity_level Processes.process_name\n\
    \   Processes.process_path Processes.user Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(\"Processes\")`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_dll_side_loading_process_child_of_calc_filter`"
