id: splunk-security-content-0115482a-5dcb-4bb0-bcca-5d095d224236
name: Linux Gem Privilege Escalation
description: The following analytic detects the execution of the RubyGems utility
  with elevated privileges, specifically when it is used to run system commands as
  root. This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on command-line executions that include "gem open -e" and "sudo". This
  activity is significant because it indicates a potential privilege escalation attempt,
  allowing a user to execute commands as the root user. If confirmed malicious, this
  could lead to full system compromise, enabling the attacker to gain root access
  and execute arbitrary commands with elevated privileges.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/gem/
- https://en.wikipedia.org/wiki/RubyGems
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *gem*open*-e*\"\n    AND\n    Processes.process=\"*-c*\"\n    AND\n    Processes.process=\"\
    *sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_gem_privilege_escalation_filter`"
