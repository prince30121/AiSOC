id: splunk-security-content-339155d6-34cb-4788-9d00-e67f190af93a
name: Windows Change File Association Command To Notepad
description: 'The following analytic detects attempts to change the command value
  of a file association of an extension to open with Notepad.exe.

  It leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  specific command-line patterns and registry modifications.

  This activity is significant as it can indicate an attempt to manipulate file handling
  behavior, a technique observed in APT and ransomware attacks like Prestige.

  After changing the extension of all encrypted files to a new one, Prestige ransomware
  modifies the file association for that extension to open with Notepad.exe in order
  to display a ransom note.'
severity: medium
enabled: false
tags:
  mitre:
  - T1546.001
  categories:
  - endpoint
references:
- https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \  max(_time) as lastTime\n\nfrom datamodel=Endpoint.Processes where\n\n(\n  (`process_reg`\
    \ AND Processes.process=\"* add *\")\n  OR\n  (`process_powershell` AND Processes.process\
    \ IN (\"*New-ItemProperty*\", \"*Set-ItemProperty*\", \"* sp *\"))\n)\n\nProcesses.process\
    \ IN (\"*HKCR\\\\*\", \"*HKEY_CLASSES_ROOT\\\\*\")\nProcesses.process = \"*\\\\\
    shell\\\\open\\\\command*\"\nProcesses.process = \"*Notepad.exe*\"\n\n```\nThe\
    \ exclusion below aims to filter the default notepad association as well as links\
    \ to the notepad package from the Microsoft Store.\n```\n\nNOT Processes.process\
    \ IN (\"*\\\\Applications\\\\notepad.exe\\\\*\", \"*\\\\WindowsApps\\\\Microsoft.WindowsNotepad*\"\
    )\n\nby Processes.action Processes.dest Processes.original_file_name Processes.parent_process\n\
    \   Processes.parent_process_exec Processes.parent_process_guid Processes.parent_process_id\n\
    \   Processes.parent_process_name Processes.parent_process_path Processes.process\n\
    \   Processes.process_exec Processes.process_guid Processes.process_hash Processes.process_id\n\
    \   Processes.process_integrity_level Processes.process_name Processes.process_path\
    \ Processes.user\n   Processes.user_id Processes.vendor_product\n\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_change_file_association_command_to_notepad_filter`"
