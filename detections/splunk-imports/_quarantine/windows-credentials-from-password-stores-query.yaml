id: splunk-security-content-db02d6b4-5d5b-4c33-8d8f-f0577516a8c7
name: Windows Credentials from Password Stores Query
description: The following analytic detects the execution of the Windows OS tool cmdkey.exe,
  which is often abused by post-exploitation tools like winpeas, commonly used in
  ransomware attacks to list stored usernames, passwords, or credentials. This detection
  leverages data from Endpoint Detection and Response (EDR) agents, focusing on process
  execution logs. This activity is significant as it indicates potential credential
  harvesting, which can lead to privilege escalation and persistence. If confirmed
  malicious, attackers could gain unauthorized access to sensitive information and
  maintain control over compromised systems for further exploitation.
severity: medium
enabled: false
tags:
  mitre:
  - T1555
  categories:
  - endpoint
references:
- https://ss64.com/nt/cmdkey.html
- https://github.com/carlospolop/PEASS-ng/tree/master/winPEAS
- https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=\"\
    cmdkey.exe\"\n    OR\n    Processes.original_file_name = \"cmdkey.exe\"\n    AND\n\
    \    Processes.process = \"*/list*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_credentials_from_password_stores_query_filter`"
