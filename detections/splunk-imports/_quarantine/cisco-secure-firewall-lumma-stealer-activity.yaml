id: splunk-security-content-96bce783-c22e-4e48-8cf1-3eb2794c5083
name: Cisco Secure Firewall - Lumma Stealer Activity
description: 'This analytic detects Lumma Stealer activity using Cisco Secure Firewall
  Intrusion Events.

  It leverages Cisco Secure Firewall Threat Defense IntrusionEvent logs to identify
  cases where four of the following Snort signature IDs 64793, 64794, 64797, 64798,
  64799, 64800, 64801, 62709, 64167, 64168, 64169, 64796, 62710, 62711, 62712, 62713,
  62714, 62715, 62716, 62717, 64812, 64810, 64811 occurs in the span of 15 minutes
  from the same host.

  If confirmed malicious, this behavior is highly indicative of a successful infection
  of Lumma Stealer.'
severity: medium
enabled: false
tags:
  mitre:
  - T1190
  - T1210
  - T1027
  - T1204
  categories:
  - network
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.lumma
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_secure_firewall` EventType=IntrusionEvent signature_id IN (64793,\
    \ 64794, 64797, 64798, 64799, 64800, 64801, 62709, 64167, 64168, 64169, 64796,\
    \ 62710, 62711, 62712, 62713, 62714, 62715, 62716, 62717, 64812, 64810, 64811)\n\
    | bin _time span=15m\n| fillnull\n| stats dc(signature_id) as unique_signature_count\n\
    \        values(signature_id) as signature_id\n        values(signature) as signature\n\
    \        values(class_desc) as class_desc\n        values(MitreAttackGroups) as\
    \ MitreAttackGroups\n        values(InlineResult) as InlineResult\n        values(InlineResultReason)\
    \ as InlineResultReason\n        values(dest) as dest\n        values(dest_port)\
    \ as dest_port\n        values(rule) as rule\n        values(transport) as transport\n\
    \        values(app) as app\n        min(_time) as firstTime\n        max(_time)\
    \ as lastTime\n        by src\n| where unique_signature_count >= 3\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `cisco_secure_firewall___lumma_stealer_activity_filter`"
