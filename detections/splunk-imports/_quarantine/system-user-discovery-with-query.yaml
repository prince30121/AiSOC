id: splunk-security-content-ad03bfcf-8a91-4bc2-a500-112993deba87
name: System User Discovery With Query
description: The following analytic detects the execution of `query.exe` with command-line
  arguments aimed at discovering logged-in users. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process names and command-line
  executions. This activity is significant as adversaries may use `query.exe` to gain
  situational awareness and perform Active Directory discovery on compromised endpoints.
  If confirmed malicious, this behavior could allow attackers to identify active users,
  aiding in further lateral movement and privilege escalation within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1033
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1033/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=\"query.exe\"\n        OR\n        Processes.original_file_name=\"\
    query.exe\"\n    )\n    AND Processes.process=\"*user*\" AND ((NOT Processes.process=\"\
    */server*\") OR Processes.process IN (\"*/server:localhost*\", \"*/server:127.0.0.1*\"\
    ))\n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `system_user_discovery_with_query_filter`"
