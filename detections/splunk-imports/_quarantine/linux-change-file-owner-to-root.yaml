id: splunk-security-content-c1400ea2-6257-11ec-ad49-acde48001122
name: Linux Change File Owner To Root
description: The following analytic detects the use of the 'chown' command to change
  a file owner to 'root' on a Linux system. It leverages Endpoint Detection and Response
  (EDR) telemetry, specifically monitoring command-line executions and process details.
  This activity is significant as it may indicate an attempt to escalate privileges
  by adversaries, malware, or red teamers. If confirmed malicious, this action could
  allow an attacker to gain root-level access, leading to full control over the compromised
  host and potential persistence within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1222.002
  categories:
  - endpoint
references:
- https://unix.stackexchange.com/questions/101073/how-to-change-permissions-from-root-user-to-all-users
- https://askubuntu.com/questions/617850/changing-from-user-to-superuser
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name = chown\n        OR\n        Processes.process = \"\
    *chown *\"\n    )\n    AND Processes.process = \"* root *\"\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `linux_change_file_owner_to_root_filter`"
