id: splunk-security-content-94e3ba29-6245-4f25-8d47-d5b6b34c40ac
name: Windows Outlook Dialogs Disabled from Unusual Process
description: The following analytic detects the modification of the Windows Registry
  key "PONT_STRING" under Outlook Options. This disables certain dialog popups, which
  could allow malicious scripts to run without notice. This detection leverages data
  from the Endpoint.Registry datamodel to search for this key changing from an unusual
  process. This activity is significant as it is commonly associated with some malware
  infections, indicating potential malicious intent to harvest email information.
severity: medium
enabled: false
tags:
  mitre:
  - T1112
  - T1562
  categories:
  - endpoint
references:
- https://lab52.io/blog/analyzing-notdoor-inside-apt28s-expanding-arsenal/
- https://hackread.com/russian-apt28-notdoor-backdoor-microsoft-outlook/
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count FROM datamodel=Endpoint.Registry
    WHERE Registry.registry_path="*\\Outlook\\Options\\General*" Registry.registry_value_name="PONT_STRING"
    by Registry.action Registry.dest Registry.process_guid Registry.process_id Registry.registry_hive
    Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)`| join process_guid [|
    tstats `security_content_summariesonly` count FROM datamodel=Endpoint.Processes
    WHERE NOT (Processes.process_name = "Outlook.exe") by _time span=1h Processes.action
    Processes.dest Processes.original_file_name Processes.parent_process Processes.parent_process_exec
    Processes.parent_process_guid Processes.parent_process_id Processes.parent_process_name
    Processes.parent_process_path Processes.process Processes.process_exec Processes.process_guid
    Processes.process_hash Processes.process_id Processes.process_integrity_level
    Processes.process_name Processes.process_path Processes.user Processes.user_id
    Processes.vendor_product | `drop_dm_object_name(Processes)`] | fields _time parent_process_name
    parent_process process_name process_path process process_guid registry_path registry_value_name
    registry_value_data registry_key_name action dest user | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `windows_outlook_dialogs_disabled_from_unusual_process_filter`'
provenance:
