id: splunk-security-content-80b22836-5091-4944-80ee-f733ac443f4f
name: Linux Make Privilege Escalation
description: The following analytic detects the use of the 'make' command with elevated
  privileges to execute system commands as root, potentially leading to a root shell.
  It leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  command-line executions that include 'make', '--eval', and 'sudo'. This activity
  is significant because it indicates a possible privilege escalation attempt, allowing
  a user to gain root access. If confirmed malicious, an attacker could achieve full
  control over the system, execute arbitrary commands, and compromise the entire environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/make/
- https://www.javatpoint.com/linux-make-command
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *make*-s*\"\n    AND\n    Processes.process=\"*--eval*\"\n    AND\n    Processes.process=\"\
    *sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_make_privilege_escalation_filter`"
