id: splunk-security-content-26f86252-1549-45e1-a212-eb26840e86bc
name: File Download or Read to Pipe Execution
description: 'The following analytic detects the use of download or file reading utilities
  from Windows, Linux or MacOS to download or read the contents of a file from a remote
  or local source and pipe it directly to a shell for execution.

  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on command-line executions.

  This activity is significant as it is commonly associated with malicious actions
  like coinminers and exploits such as CVE-2021-44228 in Log4j.

  If confirmed malicious, this behavior could allow attackers to execute arbitrary
  code, potentially leading to system compromise and unauthorized access to sensitive
  data.'
severity: medium
enabled: false
tags:
  mitre:
  - T1105
  categories:
  - endpoint
references:
- https://gist.github.com/nathanqthai/01808c569903f41a52e7e7b575caa890
- https://github.com/MHaggis/notes/blob/master/utilities/warp_pipe_tester.py
- https://www.huntress.com/blog/rapid-response-critical-rce-vulnerability-is-affecting-java
- https://www.lunasec.io/docs/blog/log4j-zero-day/
- https://securelist.com/bad-magic-apt/109087/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime\n\nfrom datamodel=Endpoint.Processes where\n\n``` This\
    \ aims to cover download utilities and file reading ones ```\n\nProcesses.process\
    \ IN (\n  \"*.DownloadFile(*\",\n  \"*.DownloadString(*\",\n  \"*ASCII.GetString*\"\
    ,\n  \"*bitsadmin*\",\n  \"*certutil*\",\n  \"*curl*\",\n  \"*Invoke-RestMethod*\"\
    ,\n  \"*Invoke-WebRequest*\",\n  \"*irm*\",\n  \"*iwr *\",\n  \"*mshta*\",\n \
    \ \"*wget*\"\n)\n\nProcesses.process IN (\"*|*\")\n\n(\n  ``` Linux / MacOS ```\n\
    \  Processes.process IN (\n    \"*bash*\",\n    \"*csh*\",\n    \"*dash*\",\n\
    \    \"*fish*\",\n    \"*ksh*\",\n    \"*rbash*\",\n    \"*tcsh*\",\n    \"*zsh*\"\
    \n  )\n  OR\n  ``` Because the \"sh\" string can overlap and is a short atom we\
    \ treat it in a special case ```\n  Processes.process IN (\n    \"*|sh\"\n   \
    \ \"* sh*\"\n  )\n  OR\n  ``` Windows ```\n  Processes.process IN (\"*IEX*\",\
    \ \"*Invoke-Expression*\")\n)\n\nby Processes.action Processes.dest Processes.original_file_name\
    \ Processes.parent_process\n   Processes.parent_process_exec Processes.parent_process_guid\
    \ Processes.parent_process_id\n   Processes.parent_process_name Processes.parent_process_path\
    \ Processes.process\n   Processes.process_exec Processes.process_guid Processes.process_hash\
    \ Processes.process_id\n   Processes.process_integrity_level Processes.process_name\
    \ Processes.process_path Processes.user\n   Processes.user_id Processes.vendor_product\n\
    \n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `file_download_or_read_to_pipe_execution_filter`"
