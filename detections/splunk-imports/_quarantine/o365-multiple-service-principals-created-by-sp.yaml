id: splunk-security-content-ef4c3f20-d1ad-4ad1-a3f4-d5f391c005fe
name: O365 Multiple Service Principals Created by SP
description: The following analytic identifies instances where a single service principal
  creates more than three unique OAuth applications within a 10-minute timeframe.
  It leverages O365 logs from the Unified Audit Log, focusing on the 'Add service
  principal' operation in the Office 365 Azure Active Directory environment. This
  activity is significant as it may indicate a compromised or malicious service principal
  attempting to expand control or access within the network. If confirmed malicious,
  this could lead to unauthorized access and potential lateral movement within the
  environment, posing a significant security risk.
severity: medium
enabled: false
tags:
  mitre:
  - T1136.003
  categories:
  - cloud
references:
- https://attack.mitre.org/techniques/T1136/003/
- https://www.microsoft.com/en-us/security/blog/2024/01/25/midnight-blizzard-guidance-for-responders-on-nation-state-attack/
logsource:
  product: splunk
detection:
  splunk_spl: '`o365_management_activity` Workload=AzureActiveDirectory Operation="Add
    service principal." | bucket span=10m _time | eval len=mvcount(''Actor{}.ID'')
    | eval userType = mvindex(''Actor{}.ID'',len-1) | search userType = "ServicePrincipal"
    | eval displayName = object | fillnull | stats count earliest(_time) as firstTime
    latest(_time) as lastTime values(displayName) as displayName dc(displayName) as
    unique_apps values(user) as user values(src) as src by src_user vendor_account
    vendor_product dest signature | where unique_apps > 3 | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `o365_multiple_service_principals_created_by_sp_filter`'
provenance:
  source: splunk/security_content
  source_id: ef4c3f20-d1ad-4ad1-a3f4-d5f391c005fe
