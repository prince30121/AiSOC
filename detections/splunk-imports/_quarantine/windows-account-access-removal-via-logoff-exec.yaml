id: splunk-security-content-223572ab-8768-4e20-9b39-c38707af80dc
name: Windows Account Access Removal via Logoff Exec
description: The following analytic detects the process of logging off a user through
  the use of the quser and logoff commands. By monitoring for these commands, the
  analytic identifies actions where a user session is forcibly terminated, which could
  be part of an administrative task or a potentially unauthorized access attempt.
  This detection helps identify potential misuse or malicious activity where a user’s
  access is revoked without proper authorization, providing insight into potential
  security incidents involving account management or session manipulation.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.001
  - T1531
  categories:
  - endpoint
references:
- https://devblogs.microsoft.com/scripting/automating-quser-through-powershell/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` min(_time) as firstTime max(_time)\
    \ as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = logoff.exe Processes.parent_process_name IN (\"cmd.exe\", \"powershell.exe\"\
    , \"pwsh.exe\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_account_access_removal_via_logoff_exec_filter`"
