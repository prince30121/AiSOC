id: splunk-security-content-5aaff29d-0cce-405b-9ee8-5d06b49d045e
name: Windows Sensitive Registry Hive Dump Via CommandLine
description: The following analytic detects the use of `reg.exe` to export Windows
  Registry hives, which may contain sensitive credentials. This detection leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on command-line
  executions involving `save` or `export` actions targeting the `sam`, `system`, or
  `security` hives. This activity is significant as it indicates potential offline
  credential access attacks, often executed from untrusted processes or scripts. If
  confirmed malicious, attackers could gain access to credential data, enabling further
  compromise and lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.002
  categories:
  - endpoint
references:
- https://www.mandiant.com/resources/shining-a-light-on-darkside-ransomware-operations
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.002/T1003.002.md
- https://media.defense.gov/2023/May/24/2003229517/-1/-1/0/CSA_Living_off_the_Land.PDF
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime from datamodel=Endpoint.Processes where\n(\n  (\n  \
    \  (Processes.process_name=reg.exe OR Processes.original_file_name=reg.exe)\n\
    \    Processes.process IN (\"*save*\", \"*export*\")\n  )\n  OR\n  (\n    (Processes.process_name=regedit.exe\
    \ OR Processes.original_file_name=REGEDIT.exe)\n    Processes.process IN (\"*/E\
    \ *\", \"*-E *\")\n  )\n)\nProcesses.process IN (\n  \"*HKEY_LOCAL_MACHINE\\\\\
    SAM*\",\n  \"*HKEY_LOCAL_MACHINE\\\\Security*\",\n  \"*HKEY_LOCAL_MACHINE\\\\\
    System*\",\n  \"*HKLM\\\\SAM*\",\n  \"*HKLM\\\\Security*\",\n  \"*HKLM\\\\System*\"\
    ,\n)\nby Processes.action Processes.dest Processes.original_file_name\nProcesses.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\nProcesses.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\nProcesses.process\
    \ Processes.process_exec Processes.process_guid Processes.process_hash\nProcesses.process_id\
    \ Processes.process_integrity_level Processes.process_name Processes.process_path\n\
    Processes.user Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_sensitive_registry_hive_dump_via_commandline_filter`"
