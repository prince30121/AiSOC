id: splunk-security-content-9b5e7c14-f8d2-4a3b-b1a7-e5c9f2a8d123
name: Windows AppX Deployment Unsigned Package Installation
description: The following analytic detects attempts to install unsigned MSIX/AppX
  packages using the -AllowUnsigned parameter. This detection leverages Windows event
  logs from the AppXDeployment-Server, specifically focusing on EventID 603 which
  indicates the start of a deployment operation with specific deployment flags. The
  flag value 8388608 corresponds to the -AllowUnsigned option in PowerShell's Add-AppxPackage
  cmdlet. This activity is significant as adversaries have been observed leveraging
  unsigned MSIX packages to deliver malware, bypassing signature verification that
  would normally protect users from malicious packages. If confirmed malicious, this
  could allow attackers to execute arbitrary code, establish persistence, or deliver
  malware while evading traditional detection mechanisms.
severity: medium
enabled: false
tags:
  mitre:
  - T1553.005
  - T1204.002
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/powershell/module/appx/add-appxpackage
- https://learn.microsoft.com/en-us/windows/msix/package/unsigned-package
- https://redcanary.com/blog/threat-intelligence/msix-installers/
- https://attack.mitre.org/techniques/T1553/005/
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_appxdeploymentserver` EventCode=603 Flags=\"8388608\"\n\
    \  | stats count min(_time) as firstTime max(_time) as lastTime values(Path) as\
    \ file_name values(CallingProcess) as CallingProcess\n    BY dvc EventCode Flags\n\
    \       user_id\n  | rename dvc as dest\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `windows_appx_deployment_unsigned_package_installation_filter`"
