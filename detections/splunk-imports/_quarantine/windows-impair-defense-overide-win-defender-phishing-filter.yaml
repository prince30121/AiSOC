id: splunk-security-content-10ca081c-57b1-4a78-ba56-14a40a7e116a
name: Windows Impair Defense Overide Win Defender Phishing Filter
description: The following analytic detects modifications to the Windows registry
  that disable the Windows Defender phishing filter. It leverages data from the Endpoint.Registry
  data model, focusing on changes to specific registry values related to Microsoft
  Edge's phishing filter settings. This activity is significant because disabling
  the phishing filter can allow attackers to deceive users into visiting malicious
  websites without triggering browser warnings. If confirmed malicious, this could
  lead to users unknowingly accessing harmful sites, resulting in potential security
  incidents or data compromises.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://x.com/malmoeb/status/1742604217989415386?s=20
- https://github.com/undergroundwires/privacy.sexy
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime FROM datamodel=Endpoint.Registry where Registry.registry_path
    = "*\\MicrosoftEdge\\PhishingFilter*" Registry.registry_value_name IN ("EnabledV9",
    "PreventOverride") Registry.registry_value_data="0x00000000" by Registry.action
    Registry.dest Registry.process_guid Registry.process_id Registry.registry_hive
    Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)` | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `windows_impair_defense_overide_win_defender_phishing_filter_filter`'
