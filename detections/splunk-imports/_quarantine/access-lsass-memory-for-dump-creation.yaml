id: splunk-security-content-fb4c31b0-13e8-4155-8aa5-24de4b8d6717
name: Access LSASS Memory for Dump Creation
description: The following analytic detects attempts to dump the LSASS process memory,
  a common technique in credential dumping attacks. It leverages Sysmon logs, specifically
  EventCode 10, to identify suspicious call traces to dbgcore.dll and dbghelp.dll
  associated with lsass.exe. This activity is significant as it often precedes the
  theft of sensitive login credentials, posing a high risk of unauthorized access
  to systems and data. If confirmed malicious, attackers could gain access to critical
  credentials, enabling further compromise and lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.001
  categories:
  - endpoint
references:
- https://2017.zeronights.org/wp-content/uploads/materials/ZN17_Kheirkhabarov_Hunting_for_Credentials_Dumping_in_Windows_Environment.pdf
logsource:
  product: splunk
detection:
  splunk_spl: "`sysmon` EventCode=10 TargetImage=*lsass.exe CallTrace=*dbgcore.dll*\
    \ OR CallTrace=*dbghelp.dll*\n  | stats count min(_time) as firstTime max(_time)\
    \ as lastTime\n    BY CallTrace EventID GrantedAccess\n       Guid Opcode ProcessID\n\
    \       SecurityID SourceImage SourceProcessGUID\n       SourceProcessId TargetImage\
    \ TargetProcessGUID\n       TargetProcessId UserID dest\n       granted_access\
    \ parent_process_exec parent_process_guid\n       parent_process_id parent_process_name\
    \ parent_process_path\n       process_exec process_guid process_id\n       process_name\
    \ process_path signature\n       signature_id user_id vendor_product\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `access_lsass_memory_for_dump_creation_filter`"
