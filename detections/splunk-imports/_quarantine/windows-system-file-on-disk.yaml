id: splunk-security-content-993ce99d-9cdd-42c7-a2cf-733d5954e5a6
name: Windows System File on Disk
description: The following analytic detects the creation of new .sys files on disk.
  It leverages the Endpoint.Filesystem data model to identify and log instances where
  .sys files are written to the filesystem. This activity is significant because .sys
  files are often used as kernel mode drivers, and their unauthorized creation can
  indicate malicious activity such as rootkit installation. If confirmed malicious,
  this could allow an attacker to gain kernel-level access, leading to full system
  compromise, persistent control, and the ability to bypass security mechanisms.
severity: medium
enabled: false
tags:
  mitre:
  - T1068
  categories:
  - endpoint
references:
- https://redcanary.com/blog/tracking-driver-inventory-to-expose-rootkits/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE Filesystem.file_name=\"\
    *.sys*\"\n  BY Filesystem.action Filesystem.dest Filesystem.file_access_time\n\
    \     Filesystem.file_create_time Filesystem.file_hash Filesystem.file_modify_time\n\
    \     Filesystem.file_name Filesystem.file_path Filesystem.file_acl\n     Filesystem.file_size\
    \ Filesystem.process_guid Filesystem.process_id\n     Filesystem.user Filesystem.vendor_product\n\
    | `drop_dm_object_name(Filesystem)`\n| `security_content_ctime(firstTime)`\n|\
    \ `security_content_ctime(lastTime)`\n| `windows_system_file_on_disk_filter`"
