id: splunk-security-content-0ecb40d9-492b-4a57-9f87-515dd742794c
name: Windows AutoIt3 Execution
description: 'The following analytic detects the execution of AutoIt3, a scripting

  language often used for automating Windows GUI tasks and general scripting.

  It identifies instances where AutoIt3 or its variants are executed by searching
  for process names

  or original file names matching ''autoit3.exe''.

  This activity is significant because attackers frequently use AutoIt3 to automate
  malicious actions, such as executing malware.

  If confirmed malicious, this activity could lead to unauthorized code execution,

  system compromise, or further propagation of malware within the environment.'
severity: medium
enabled: false
tags:
  mitre:
  - T1059
  categories:
  - endpoint
references:
- https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2023-10-25-IOCs-from-DarkGate-activity.txt
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \  max(_time) as lastTime\nfrom datamodel=Endpoint.Processes where\n(\n  Processes.process_name\
    \ = \"autoit*.exe\"\n  OR\n  Processes.original_file_name = \"autoit*.exe\"\n\
    )\nby Processes.action Processes.dest Processes.original_file_name\n   Processes.parent_process\
    \ Processes.parent_process_exec\n   Processes.parent_process_guid Processes.parent_process_id\n\
    \   Processes.parent_process_name Processes.parent_process_path\n   Processes.process\
    \ Processes.process_exec Processes.process_guid\n   Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n   Processes.process_name Processes.process_path\
    \ Processes.user\n   Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_autoit3_execution_filter`"
