id: splunk-security-content-abfb7cc5-c275-4a97-9029-62cd8d4ffeca
name: Windows System Network Connections Discovery Netsh
description: The following analytic detects the execution of the Windows built-in
  tool netsh.exe to display the state, configuration, and profile of the host firewall.
  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on command-line executions and process metadata. Monitoring this activity
  is crucial as netsh.exe can be used by adversaries to bypass firewall rules or discover
  firewall settings. If confirmed malicious, this activity could allow attackers to
  manipulate firewall configurations, potentially leading to unauthorized network
  access or data exfiltration.
severity: medium
enabled: false
tags:
  mitre:
  - T1049
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1049/
- https://github.com/carlospolop/PEASS-ng/tree/master/winPEAS
- https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_netsh`AND\
    \ Processes.process = \"* show *\" Processes.process IN (\"*state*\", \"*config*\"\
    , \"*wlan*\", \"*profile*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_system_network_connections_discovery_netsh_filter`"
