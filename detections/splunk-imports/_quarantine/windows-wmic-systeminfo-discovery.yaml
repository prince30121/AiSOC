id: splunk-security-content-97937ece-cb13-4dbc-9684-c0dc3afd400a
name: Windows Wmic Systeminfo Discovery
description: The following analytic detects the execution of Windows Management Instrumentation
  Command-line (WMIC) commands used for computer system discovery on a Windows system.
  Specifically, it monitors for commands such as “wmic computersystem” that retrieve
  detailed information about the computer’s model, manufacturer, name, domain, and
  other system attributes. While these commands are commonly used by administrators
  for inventory and troubleshooting, they may also be exploited by adversaries to
  gain insight into the target environment during the reconnaissance phase of an attack.
  Identifying and alerting on WMIC computer system queries helps security teams recognize
  unauthorized information gathering and take steps to mitigate potential threats.
severity: medium
enabled: false
tags:
  mitre:
  - T1082
  categories:
  - endpoint
references:
- https://cert.gov.ua/article/6284730
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_wmic`\
    \ (Processes.process=\"* computersystem*\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_wmic_systeminfo_discovery_filter`"
