id: splunk-security-content-7feb7972-7ac3-11eb-bac8-acde48001122
name: Suspicious Scheduled Task from Public Directory
description: The following analytic identifies the creation of scheduled tasks that
  execute binaries or scripts from public directories, such as users\public, \programdata\,
  or \windows\temp, using schtasks.exe with the /create command. It leverages Sysmon
  Event ID 1 data to detect this behavior. This activity is significant because it
  often indicates an attempt to maintain persistence or execute malicious scripts,
  which are common tactics in malware deployment. If confirmed as malicious, this
  could lead to data compromise, unauthorized access, and potential lateral movement
  within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1053.005
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1053/005/
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime from datamodel=Endpoint.Processes where Processes.process_name=schtasks.exe
    (Processes.process=*\\users\\public\\* OR Processes.process=*\\programdata\\*
    OR Processes.process=*windows\\temp*)  Processes.process=*/create* by Processes.action
    Processes.dest Processes.original_file_name Processes.parent_process Processes.parent_process_exec
    Processes.parent_process_guid Processes.parent_process_id Processes.parent_process_name
    Processes.parent_process_path Processes.process Processes.process_exec Processes.process_guid
    Processes.process_hash Processes.process_id Processes.process_integrity_level
    Processes.process_name Processes.process_path Processes.user Processes.user_id
    Processes.vendor_product | `drop_dm_object_name(Processes)` | `security_content_ctime(firstTime)`|
    `security_content_ctime(lastTime)`| `suspicious_scheduled_task_from_public_directory_filter`'
