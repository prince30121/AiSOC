id: splunk-security-content-41243735-89a7-4c83-bcdd-570aa78f00a1
name: Domain Controller Discovery with Nltest
description: The following analytic detects the execution of `nltest.exe` with command-line
  arguments `/dclist:` or `/dsgetdc:` to discover domain controllers. It leverages
  Endpoint Detection and Response (EDR) data, focusing on process names and command-line
  arguments. This activity is significant because both Red Teams and adversaries use
  `nltest.exe` for situational awareness and Active Directory discovery. If confirmed
  malicious, this behavior could allow attackers to map out domain controllers, facilitating
  further attacks such as privilege escalation or lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1018
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1018/
- https://learn.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2012-r2-and-2012/cc731935(v=ws.11)
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=nltest.exe\n        OR\n        Processes.original_file_name=nltestrk.exe\n\
    \    )\n    (Processes.process=\"*/dclist:*\" OR Processes.process=\"*/dsgetdc:*\"\
    )\n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `domain_controller_discovery_with_nltest_filter`"
