id: splunk-security-content-dc64d064-d346-11eb-8588-acde48001122
name: Execute Javascript With Jscript COM CLSID
description: The following analytic detects the execution of JavaScript using the
  JScript.Encode CLSID (COM Object) by cscript.exe. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process names, command-line executions,
  and parent processes. This activity is significant as it is a known technique used
  by ransomware, such as Reddot, to execute malicious scripts and potentially disable
  AMSI (Antimalware Scan Interface). If confirmed malicious, this behavior could allow
  attackers to execute arbitrary code, evade detection, and maintain persistence within
  the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.005
  categories:
  - endpoint
references:
- https://app.any.run/tasks/c0f98850-af65-4352-9746-fbebadee4f05/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = \"cscript.exe\" Processes.process=\"*-e:{F414C262-6AC0-11CF-B6D1-00AA00BBBB58}*\"\
    \n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `execute_javascript_with_jscript_com_clsid_filter`"
