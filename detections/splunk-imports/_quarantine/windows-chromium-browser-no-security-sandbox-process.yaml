id: splunk-security-content-314cb263-7eeb-4d45-b693-bb21699c73d2
name: Windows Chromium Browser No Security Sandbox Process
description: The following analytic detects instances where a Chrome or Chromium-based
  browser is launched with the --no-sandbox flag, a known indicator of potentially
  malicious or suspicious behavior. While this flag is occasionally used during software
  development or testing, it is rarely seen in normal user activity. Threat actors
  often abuse this setting to disable Chrome's built-in security sandbox, making it
  easier to execute malicious code or escape browser isolation. This behavior is commonly
  observed in malware droppers or loaders that embed Chromium components for command
  and control, credential theft, or UI spoofing. Analysts should investigate such
  events, especially if they originate from unusual parent processes (e.g., powershell.exe,
  cmd.exe, or unknown binaries), or if accompanied by other indicators such as file
  drops, process injection, or outbound network activity. Filtering by command-line
  arguments and process ancestry can help reduce false positives and surface high-fidelity
  detections.
severity: medium
enabled: false
tags:
  mitre:
  - T1497
  categories:
  - endpoint
references:
- https://unix.stackexchange.com/questions/68832/what-does-the-chromium-option-no-sandbox-mean
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` min(_time) as firstTime max(_time)

    as lastTime from datamodel=Endpoint.Processes where

    Processes.process_name IN ("Chrome.exe","Brave.exe", "Opera.exe", "Vivaldi.exe",
    "msedge.exe")

    Processes.process = "*--no-sandbox*"

    by Processes.action Processes.dest Processes.original_file_name Processes.parent_process

    Processes.parent_process_exec Processes.parent_process_guid Processes.parent_process_id

    Processes.parent_process_name Processes.parent_process_path Processes.process
    Processes.process_exec

    Processes.process_guid Processes.process_hash Processes.process_id Processes.process_integrity_level

    Processes.process_name Processes.process_path Processes.user Processes.user_id
    Processes.vendor_product

    | `drop_dm_object_name(Processes)`

    | `security_content_ctime(firstTime)`

    | `security_content_ctime(lastTime)`

    | `windows_chromium_browser_no_security_sandbox_process_filter`'
