id: splunk-security-content-8a9c1d2e-3f4b-5c6d-7e8f-9a0b1c2d3e4f
name: Cisco Secure Firewall - SSH Connection to sshd_operns
description: 'This analytic detects inbound SSH connections to the sshd_operns service
  on network devices using Cisco Secure Firewall Intrusion Events.

  APT actors have been observed enabling sshd_operns and opening it on non-standard
  ports to maintain encrypted remote access to compromised network infrastructure.

  This detection leverages Snort signature 65368 to identify connections to this service,
  which when combined with other indicators may signal persistent access mechanisms
  established by threat actors.'
severity: medium
enabled: false
tags:
  mitre:
  - T1021.004
  categories:
  - network
references:
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-239a
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_secure_firewall`\nEventType=IntrusionEvent\nsignature_id=65368\n\
    | fillnull\n| stats dc(signature_id) as unique_signature_count\n        values(signature_id)\
    \ as signature_id\n        values(signature) as signature\n        values(class_desc)\
    \ as class_desc\n        values(MitreAttackGroups) as MitreAttackGroups\n    \
    \    values(InlineResult) as InlineResult\n        values(InlineResultReason)\
    \ as InlineResultReason\n        values(src) as src\n        values(dest_port)\
    \ as dest_port\n        values(rule) as rule\n        values(transport) as transport\n\
    \        values(app) as app\n        min(_time) as firstTime\n        max(_time)\
    \ as lastTime\n        by dest\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `cisco_secure_firewall___ssh_connection_to_sshd_operns_filter`"
provenance:
  source: splunk/security_content
  source_id: 8a9c1d2e-3f4b-5c6d-7e8f-9a0b1c2d3e4f
