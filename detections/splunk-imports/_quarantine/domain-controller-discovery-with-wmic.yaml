id: splunk-security-content-64c7adaa-48ee-483c-b0d6-7175bc65e6cc
name: Domain Controller Discovery with Wmic
description: The following analytic identifies the execution of `wmic.exe` with command-line
  arguments used to discover domain controllers in a Windows domain. It leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process names
  and command-line arguments. This activity is significant because it is commonly
  used by adversaries and Red Teams for situational awareness and Active Directory
  discovery. If confirmed malicious, this behavior could allow attackers to map out
  the network, identify key systems, and plan further attacks, potentially leading
  to unauthorized access and data exfiltration.
severity: medium
enabled: false
tags:
  mitre:
  - T1018
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1018/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=\"wmic.exe\"\n    )\n    (Processes.process=\"\" OR\
    \ Processes.process=\"*DomainControllerAddress*\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `domain_controller_discovery_with_wmic_filter`"
