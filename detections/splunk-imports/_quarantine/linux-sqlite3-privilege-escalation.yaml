id: splunk-security-content-ab75dbb7-c3ba-4689-9c1b-8d2717bdcba1
name: Linux Sqlite3 Privilege Escalation
description: The following analytic detects the execution of the sqlite3 command with
  elevated privileges, which can be exploited for privilege escalation. It leverages
  Endpoint Detection and Response (EDR) telemetry to identify instances where sqlite3
  is used in conjunction with shell commands and sudo. This activity is significant
  because it indicates a potential attempt to gain root access, which could lead to
  full system compromise. If confirmed malicious, an attacker could execute arbitrary
  commands as root, leading to unauthorized access, data exfiltration, or further
  lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/sqlite3/
- https://manpages.ubuntu.com/manpages/trusty/en/man1/sqlite3.1.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *sqlite3*\"\n    AND\n    Processes.process=\"*.shell*\"\n    AND\n    Processes.process=\"\
    *sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_sqlite3_privilege_escalation_filter`"
