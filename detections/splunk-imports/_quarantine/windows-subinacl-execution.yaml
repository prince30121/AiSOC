id: splunk-security-content-12491419-1a6f-4af4-afc3-4e2052f0610e
name: Windows SubInAcl Execution
description: The following analytic detects the execution of the SubInAcl utility.
  SubInAcl is a legacy Windows Resource Kit tool from the Windows 2003 era, used to
  manipulate security descriptors of securable objects. It leverages data from Endpoint
  Detection and Response (EDR) agents, specifically searching for any process execution
  involving "SubInAcl.exe" binary. This activity can be significant because the utility
  should be rarely found on modern Windows machines, which mean any execution could
  potentially be considered suspicious. If confirmed malicious, this could allow an
  attacker to blind defenses by tampering with EventLog ACLs or modifying the access
  to a previously denied resource.
severity: medium
enabled: false
tags:
  mitre:
  - T1222.001
  categories:
  - endpoint
references:
- https://www.pwc.com/gx/en/issues/cybersecurity/cyber-threat-intelligence/cyber-year-in-retrospect/yir-cyber-threats-report-download.pdf
- https://attack.mitre.org/techniques/T1222/001/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as process min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes\n\
    \  WHERE (\n        Processes.process_name=subinacl.exe\n        OR\n        Processes.original_file_name=SubInAcl.exe\n\
    \    )\n  BY Processes.action Processes.dest Processes.original_file_name\n  \
    \   Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_subinacl_execution_filter`"
