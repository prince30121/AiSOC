id: splunk-security-content-692226f1-84e3-4f63-a747-d53e65699608
name: Windows Default RDP File Creation By Non MSTSC Process
description: This detection monitors the creation or modification of the Default.rdp
  file by non mstsc.exe process, typically found in the user's Documents folder. This
  file is automatically generated or updated by the Remote Desktop Connection client
  (mstsc.exe) when a user initiates an RDP session. It stores connection settings
  such as the last-used hostname, screen size, and other preferences. The presence
  or update of this file strongly suggests that an RDP session has been launched from
  the system. Since this file is commonly overlooked, it can serve as a valuable artifact
  in identifying remote access activity, including potential lateral movement or attacker-controlled
  sessions.
severity: medium
enabled: false
tags:
  mitre:
  - T1021.001
  categories:
  - endpoint
references:
- https://medium.com/@bonguides25/how-to-clear-rdp-connections-history-in-windows-cf0ffb67f344
- https://thelocalh0st.github.io/posts/rdp/
- https://iam0xc4t.medium.com/rogue-rdp-via-spear-phishing-initial-access-tactic-d7be328a0b13
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count FROM datamodel=Endpoint.Processes\n\
    \  WHERE Processes.process_name != mstsc.exe\n  BY _time span=1h Processes.action\n\
    \     Processes.dest Processes.original_file_name Processes.parent_process\n \
    \    Processes.parent_process_exec Processes.parent_process_guid Processes.parent_process_id\n\
    \     Processes.parent_process_name Processes.parent_process_path Processes.process\n\
    \     Processes.process_exec Processes.process_guid Processes.process_hash\n \
    \    Processes.process_id Processes.process_integrity_level Processes.process_name\n\
    \     Processes.process_path Processes.user Processes.user_id\n     Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| rename process_guid as proc_guid\n| join\
    \ proc_guid, _time [\n| tstats `security_content_summariesonly` count min(_time)\
    \ as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE\
    \ Filesystem.file_name=default.rdp\n  BY _time span=1h Filesystem.dest\n     Filesystem.file_create_time\
    \ Filesystem.file_name Filesystem.file_path\n     Filesystem.process_guid\n| `drop_dm_object_name(Filesystem)`\n\
    | rename process_guid as proc_guid\n| fields _time dest file_create_time file_name\
    \ file_path process_name process_path process proc_guid]\n| dedup file_create_time\n\
    | table dest, process_name, process, file_create_time, file_name, file_path, proc_guid\n\
    | `windows_default_rdp_file_creation_by_non_mstsc_process_filter`"
