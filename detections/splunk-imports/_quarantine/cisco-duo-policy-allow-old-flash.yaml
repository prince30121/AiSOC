id: splunk-security-content-f36c0d3f-d57f-4b88-a5d4-0a4c9a0752f6
name: Cisco Duo Policy Allow Old Flash
description: The following analytic identifies instances where a Duo administrator
  creates or updates a policy to allow the use of outdated Flash components, specifically
  by detecting policy changes with the flash_remediation=no remediation attribute.
  It leverages Duo activity logs ingested via the Cisco Security Cloud App, searching
  for policy_update or policy_create actions and parsing the policy description for
  indicators of weakened security controls. This behavior is significant for a SOC
  because permitting old Flash increases the attack surface, as Flash is widely known
  for its security vulnerabilities and is no longer supported. Attackers may exploit
  such policy changes to bypass security controls, introduce malware, or escalate
  privileges within the environment. Detecting and responding to these policy modifications
  helps prevent potential exploitation, reduces organizational risk, and ensures adherence
  to security best practices. Immediate investigation is recommended to determine
  if the change was authorized or indicative of malicious activity.
severity: medium
enabled: false
tags:
  mitre:
  - T1556
  categories:
  - application
references:
- https://splunkbase.splunk.com/app/7404
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_duo_administrator` action=policy_update OR action=policy_create\n\
    | spath input=description\n| search flash_remediation=\"no remediation\"\n| rename\
    \ object as user\n| stats count min(_time) as firstTime max(_time) as lastTime\n\
    \  BY action actionlabel description\n     user admin_email\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `cisco_duo_policy_allow_old_flash_filter`"
