id: splunk-security-content-e1c6dec5-2249-442d-a1f9-99a4bd228183
name: Linux c99 Privilege Escalation
description: The following analytic detects the execution of the c99 utility with
  sudo privileges, which can lead to privilege escalation on Linux systems. It leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process execution
  logs that include command-line details. This activity is significant because it
  indicates a potential misuse of the c99 utility to gain root access, which is critical
  for maintaining system security. If confirmed malicious, this could allow an attacker
  to execute commands as root, potentially compromising the entire system and accessing
  sensitive information.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/c99/
- https://pubs.opengroup.org/onlinepubs/009604499/utilities/c99.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *c99*\"\n    AND\n    Processes.process=\"*-wrapper*\"\n    AND\n    Processes.process=\"\
    *sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_c99_privilege_escalation_filter`"
