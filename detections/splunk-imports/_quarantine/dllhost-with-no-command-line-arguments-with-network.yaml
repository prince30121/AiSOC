id: splunk-security-content-f1c07594-a141-11eb-8407-acde48001122
name: DLLHost with no Command Line Arguments with Network
description: 'The following analytic detects instances of DLLHost.exe running without

  command line arguments while establishing a network connection.

  This behavior is identified using Endpoint Detection and Response (EDR) telemetry,

  focusing on process execution and network activity data.

  It is significant because DLLHost.exe typically runs with specific arguments,

  and its absence can indicate malicious activity, such as Cobalt Strike usage.

  If confirmed malicious, this activity could allow attackers to execute code,

  move laterally, or exfiltrate data, posing a severe threat to the network''s security.'
severity: medium
enabled: false
tags:
  mitre:
  - T1055
  categories:
  - endpoint
references:
- https://raw.githubusercontent.com/threatexpress/malleable-c2/c3385e481159a759f79b8acfe11acf240893b830/jquery-c2.4.2.profile
- https://www.cobaltstrike.com/blog/learn-pipe-fitting-for-all-of-your-offense-projects/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime FROM datamodel=Endpoint.Processes where\n(\n  Processes.process_name=dllhost.exe\n\
    \  OR\n  Processes.original_file_name=dllhost.exe\n)\nProcesses.process IN (\n\
    \  \"*dllhost\",\n  \"*dllhost.exe\",\n  \"*dllhost.exe\\\"\"\n)\nby host _time\
    \ span=1h\n   Processes.action Processes.dest Processes.original_file_name\n \
    \  Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \   Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \   Processes.process Processes.process_exec Processes.process_guid Processes.process_hash\n\
    \   Processes.process_id Processes.process_integrity_level Processes.process_name\
    \ Processes.process_path\n   Processes.user Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | rename dest as src\n| join host process_id\n[\n  | tstats `security_content_summariesonly`\n\
    \    count\n    latest(All_Traffic.dest) as dest\n    latest(All_Traffic.dest_ip)\
    \ as dest_ip\n    latest(All_Traffic.dest_port) as dest_port\n    FROM datamodel=Network_Traffic.All_Traffic\
    \ where\n      All_Traffic.dest_port != 0\n      by host All_Traffic.action All_Traffic.app\
    \ All_Traffic.bytes All_Traffic.bytes_in\n         All_Traffic.bytes_out All_Traffic.dest\
    \  All_Traffic.dest_ip All_Traffic.dest_port\n         All_Traffic.dvc All_Traffic.protocol\
    \ All_Traffic.protocol_version All_Traffic.src\n         All_Traffic.src_ip All_Traffic.src_port\
    \ All_Traffic.transport All_Traffic.user\n         All_Traffic.vendor_product\
    \ All_Traffic.direction All_Traffic.process_id\n  | `drop_dm_object_name(All_Traffic)`\n\
    ]\n| `dllhost_with_no_command_line_arguments_with_network_filter`"
