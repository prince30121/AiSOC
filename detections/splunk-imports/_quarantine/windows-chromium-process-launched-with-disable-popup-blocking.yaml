id: splunk-security-content-95f8acd6-978e-42d6-99c1-85baacdd2b46
name: Windows Chromium process Launched with Disable Popup Blocking
description: The following analytic detects instances where a Windows Chromium-based
  browser process is launched with the `--disable-popup-blocking` flag. This flag
  is typically used to bypass the browser’s built-in pop-up protections, allowing
  automatic execution of pop-ups or redirects without user interaction. While legitimate
  in some testing or automation scenarios, its presence on endpoints, particularly
  when combined with other automation or concealment flags, may indicate attempts
  by malicious actors to execute web-based content stealthily or evade user interaction
  controls, representing a potential security risk that warrants investigation.
severity: medium
enabled: false
tags:
  mitre:
  - T1497
  categories:
  - endpoint
references:
- https://www.trendmicro.com/en_us/research/26/a/analysis-of-the-evelyn-stealer-campaign.html
- https://peter.sh/experiments/chromium-command-line-switches/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` min(_time) as firstTime max(_time)\n\
    as lastTime from datamodel=Endpoint.Processes\nwhere Processes.process_name IN\
    \ (\"Chrome.exe\",\"Brave.exe\", \"Opera.exe\", \"Vivaldi.exe\", \"msedge.exe\"\
    )\nProcesses.process = \"*--disable-popup-blocking*\"\nby Processes.action Processes.dest\
    \ Processes.original_file_name Processes.parent_process\n   Processes.parent_process_exec\
    \ Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path Processes.process Processes.process_exec\n   Processes.process_guid\
    \ Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \   Processes.process_name Processes.process_path Processes.user Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`| `windows_chromium_process_launched_with_disable_popup_blocking_filter`"
