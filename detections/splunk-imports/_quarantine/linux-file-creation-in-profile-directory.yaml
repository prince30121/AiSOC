id: splunk-security-content-46ba0082-61af-11ec-9826-acde48001122
name: Linux File Creation In Profile Directory
description: The following analytic detects the creation of files in the /etc/profile.d
  directory on Linux systems. It leverages filesystem data to identify new files in
  this directory, which is often used by adversaries for persistence by executing
  scripts upon system boot. This activity is significant as it may indicate an attempt
  to maintain long-term access to the compromised host. If confirmed malicious, this
  could allow attackers to execute arbitrary code with elevated privileges each time
  the system boots, potentially leading to further compromise and data exfiltration.
severity: medium
enabled: false
tags:
  mitre:
  - T1546.004
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1546/004/
- https://www.intezer.com/blog/research/kaiji-new-chinese-linux-malware-turning-to-golang/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE Filesystem.file_path\
    \ IN (\"*/etc/profile.d/*\")\n  BY Filesystem.action Filesystem.dest Filesystem.file_access_time\n\
    \     Filesystem.file_create_time Filesystem.file_hash Filesystem.file_modify_time\n\
    \     Filesystem.file_name Filesystem.file_path Filesystem.file_acl\n     Filesystem.file_size\
    \ Filesystem.process_guid Filesystem.process_id\n     Filesystem.user Filesystem.vendor_product\n\
    | `drop_dm_object_name(Filesystem)`\n| `security_content_ctime(lastTime)`\n| `security_content_ctime(firstTime)`\n\
    | `linux_file_creation_in_profile_directory_filter`"
