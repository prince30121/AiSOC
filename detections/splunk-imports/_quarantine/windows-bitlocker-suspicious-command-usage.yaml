id: splunk-security-content-d0e6ec70-6e40-41a2-8b93-8d9ff077a746
name: Windows BitLocker Suspicious Command Usage
description: This analytic is developed to detect the usage of BitLocker commands
  used to disable or impact boot settings. The malware ShrinkLocker uses various commands
  change how BitLocker handles encryption, potentially bypassing TPM requirements,
  enabling BitLocker without TPM, and enforcing specific startup key and PIN configurations.
  Such modifications can weaken system security, making it easier for unauthorized
  access and data breaches. Detecting these changes is crucial for maintaining robust
  encryption and data protection.
severity: medium
enabled: false
tags:
  mitre:
  - T1486
  - T1490
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1486/
- https://www.nccgroup.com/us/research-blog/nameless-and-shameless-ransomware-encryption-via-bitlocker/
- https://www.bitdefender.com/en-us/blog/businessinsights/shrinklocker-decryptor-from-friend-to-foe-and-back-again
- https://www.bleepingcomputer.com/news/security/new-shrinklocker-ransomware-uses-bitlocker-to-encrypt-your-files/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` min(_time) as firstTime max(_time)\
    \ as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = manage-bde.exe\n    AND\n    Processes.process IN (\"* -protectors -disable\
    \ *\",\"* -protectors -delete *\",\"* -forcerecovery *\",\"* -lock *\")\n  BY\
    \ Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_bitlocker_suspicious_command_usage_filter`"
