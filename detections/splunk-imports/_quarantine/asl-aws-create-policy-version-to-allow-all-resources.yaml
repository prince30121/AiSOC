id: splunk-security-content-22cc7a62-3884-48c4-82da-592b8199b72f
name: ASL AWS Create Policy Version to allow all resources
description: The following analytic identifies the creation of a new AWS IAM policy
  version that allows access to all resources. It detects this activity by analyzing
  AWS CloudTrail logs for the CreatePolicyVersion event with a policy document that
  grants broad permissions. This behavior is significant because it violates the principle
  of least privilege, potentially exposing the environment to misuse or abuse. If
  confirmed malicious, an attacker could gain extensive access to AWS resources, leading
  to unauthorized actions, data exfiltration, or further compromise of the AWS environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1078.004
  categories:
  - cloud
references:
- https://bishopfox.com/blog/privilege-escalation-in-aws
- https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation-part-2/
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=CreatePolicy\n  | spath input=api.request.data\n\
    \  | spath input=policyDocument\n  | regex Statement{}.Action=\"\\*\"\n  | regex\
    \ Statement{}.Resource=\"\\*\"\n  | fillnull\n  | stats count min(_time) as firstTime\
    \ max(_time) as lastTime\n    BY actor.user.uid api.operation api.service.name\n\
    \       http_request.user_agent src_endpoint.ip actor.user.account.uid\n     \
    \  cloud.provider cloud.region api.request.data\n  | rename actor.user.uid as\
    \ user api.operation as action api.service.name as dest http_request.user_agent\
    \ as user_agent src_endpoint.ip as src actor.user.account.uid as vendor_account\
    \ cloud.provider as vendor_product cloud.region as vendor_region\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `asl_aws_create_policy_version_to_allow_all_resources_filter`"
