id: splunk-security-content-a3f8e2c9-7d4b-4e1f-9c6a-2b5d8f3e1a7c
name: Windows Local LLM Framework Execution
description: 'The following analytic detects execution of unauthorized local LLM frameworks
  (Ollama, LM Studio, GPT4All, Jan, llama.cpp, KoboldCPP, Oobabooga, NutStudio) and
  Python-based AI/ML libraries (HuggingFace Transformers, LangChain) on Windows endpoints
  by leveraging process creation events.

  It identifies cases where known LLM framework executables are launched or command-line
  arguments reference AI/ML libraries.

  This activity is significant as it may indicate shadow AI deployments, unauthorized
  model inference operations, or potential data exfiltration through local AI systems.

  If confirmed malicious, this could lead to unauthorized access to sensitive data,
  intellectual property theft, or circumvention of organizational AI governance policies.'
severity: medium
enabled: false
tags:
  mitre:
  - T1543
  categories:
  - endpoint
references:
- https://splunkbase.splunk.com/app/8024
- https://www.ibm.com/think/topics/shadow-ai
- https://www.splunk.com/en_us/blog/artificial-intelligence/splunk-technology-add-on-for-ollama.html
- https://blogs.cisco.com/security/detecting-exposed-llm-servers-shodan-case-study-on-ollama
- https://docs.microsoft.com/en-us/sysinternals/downloads/sysmon
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count\n    min(_time) as\
    \ firstTime\n    max(_time) as lastTime\nfrom datamodel=Endpoint.Processes\nwhere\n\
    \    (\n      Processes.process_name IN (\n          \"gpt4all.exe\",\n      \
    \    \"jan.exe\",\n          \"kobold.exe\",\n          \"koboldcpp.exe\",\n \
    \         \"llama-run.exe\",\n          \"llama.cpp.exe\",\n          \"lmstudio.exe\"\
    ,\n          \"nutstudio.exe\",\n          \"ollama.exe\",\n          \"oobabooga.exe\"\
    ,\n          \"text-generation-webui.exe\"\n      )\n      OR\n      Processes.original_file_name\
    \ IN (\n          \"ollama.exe\",\n          \"lmstudio.exe\",\n          \"gpt4all.exe\"\
    ,\n          \"jan.exe\",\n          \"llama-run.exe\",\n          \"koboldcpp.exe\"\
    ,\n          \"nutstudio.exe\"\n      )\n      OR\n      Processes.process IN\
    \ (\n          \"*\\\\gpt4all\\\\*\",\n          \"*\\\\jan\\\\*\",\n        \
    \  \"*\\\\koboldcpp\\\\*\",\n          \"*\\\\llama.cpp\\\\*\",\n          \"\
    *\\\\lmstudio\\\\*\",\n          \"*\\\\nutstudio\\\\*\",\n          \"*\\\\ollama\\\
    \\*\",\n          \"*\\\\oobabooga\\\\*\",\n          \"*huggingface*\",\n   \
    \       \"*langchain*\",\n          \"*llama-run*\",\n          \"*transformers*\"\
    \n      )\n      OR\n      Processes.parent_process_name IN (\n          \"gpt4all.exe\"\
    ,\n          \"jan.exe\",\n          \"kobold.exe\",\n          \"koboldcpp.exe\"\
    ,\n          \"llama-run.exe\",\n          \"llama.cpp.exe\",\n          \"lmstudio.exe\"\
    ,\n          \"nutstudio.exe\",\n          \"ollama.exe\",\n          \"oobabooga.exe\"\
    ,\n          \"text-generation-webui.exe\"\n      )\n    )\nby Processes.action\
    \ Processes.dest Processes.original_file_name Processes.parent_process\n   Processes.parent_process_exec\
    \ Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path Processes.process\n   Processes.process_exec Processes.process_guid\
    \ Processes.process_hash Processes.process_id\n   Processes.process_integrity_level\
    \ Processes.process_name Processes.process_path Processes.user\n   Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| eval Framework=case(\n\
    \    match(process_name, \"(?i)ollama\") OR match(process, \"(?i)ollama\"), \"\
    Ollama\",\n    match(process_name, \"(?i)lmstudio\") OR match(process, \"(?i)lmstudio\"\
    ) OR match(process, \"(?i)lm-studio\"), \"LM Studio\",\n    match(process_name,\
    \ \"(?i)gpt4all\") OR match(process, \"(?i)gpt4all\"), \"GPT4All\",\n    match(process_name,\
    \ \"(?i)kobold\") OR match(process, \"(?i)kobold\"), \"KoboldCPP\",\n    match(process_name,\
    \ \"(?i)jan\") OR match(process, \"(?i)jan\"), \"Jan AI\",\n    match(process_name,\
    \ \"(?i)nutstudio\") OR match(process, \"(?i)nutstudio\"), \"NutStudio\",\n  \
    \  match(process_name, \"(?i)llama\") OR match(process, \"(?i)llama\"), \"llama.cpp\"\
    ,\n    match(process_name, \"(?i)oobabooga\") OR match(process, \"(?i)oobabooga\"\
    ) OR match(process, \"(?i)text-generation-webui\"), \"Oobabooga\",\n    match(process,\
    \ \"(?i)transformers\") OR match(process, \"(?i)huggingface\"), \"HuggingFace/Transformers\"\
    ,\n    match(process, \"(?i)langchain\"), \"LangChain\",\n    1=1, \"Other\"\n\
    )\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | table action dest Framework original_file_name parent_process parent_process_exec\n\
    \        parent_process_guid parent_process_id parent_process_name parent_process_path\n\
    \        process process_exec process_guid process_hash process_id process_integrity_level\n\
    \        process_name process_path user user_id vendor_product\n| `windows_local_llm_framework_execution_filter`"
