id: splunk-security-content-c04ef40c-72da-11ec-8eac-acde48001122
name: Linux Possible Ssh Key File Creation
description: The following analytic detects the creation of SSH key files in the ~/.ssh/
  directory. It leverages filesystem data to identify new files in this specific path.
  This activity is significant because threat actors often create SSH keys to gain
  persistent access and escalate privileges on a compromised host. If confirmed malicious,
  this could allow attackers to remotely access the machine using the OpenSSH daemon
  service, leading to potential unauthorized control and data exfiltration.
severity: medium
enabled: false
tags:
  mitre:
  - T1098.004
  categories:
  - endpoint
references:
- https://www.hackingarticles.in/ssh-penetration-testing-port-22/
- https://attack.mitre.org/techniques/T1098/004/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE Filesystem.file_path\
    \ IN (\"*/.ssh*\")\n  BY Filesystem.action Filesystem.dest Filesystem.file_access_time\n\
    \     Filesystem.file_create_time Filesystem.file_hash Filesystem.file_modify_time\n\
    \     Filesystem.file_name Filesystem.file_path Filesystem.file_acl\n     Filesystem.file_size\
    \ Filesystem.process_guid Filesystem.process_id\n     Filesystem.user Filesystem.vendor_product\n\
    | `drop_dm_object_name(Filesystem)`\n| `security_content_ctime(lastTime)`\n| `security_content_ctime(firstTime)`\n\
    | `linux_possible_ssh_key_file_creation_filter`"
