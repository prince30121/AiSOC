id: splunk-security-content-6b74d578-a02e-4e94-a0d1-39440d0bf254
name: Detect Regsvcs with No Command Line Arguments
description: The following analytic detects instances of regsvcs.exe running without
  command line arguments. This behavior typically indicates process injection, where
  another process manipulates regsvcs.exe. The detection leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process names, IDs, and command-line
  executions. This activity is significant as it may signal an attempt to evade detection
  and execute malicious code. If confirmed malicious, the attacker could achieve code
  execution, potentially leading to privilege escalation, persistence, or access to
  sensitive information.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.009
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1218/009/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218.009/T1218.009.md
- https://lolbas-project.github.io/lolbas/Binaries/Regsvcs/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime FROM datamodel=Endpoint.Processes where\n(Processes.process_name=regsvcs.exe\
    \ OR Processes.original_file_name=RegSvcs.exe)\nProcesses.process IN (\"*regsvcs\"\
    ,\"*regsvcs.exe\", \"*regsvcs.exe\\\"\")\nby Processes.action Processes.dest Processes.original_file_name\
    \ Processes.parent_process Processes.parent_process_exec\n   Processes.parent_process_guid\
    \ Processes.parent_process_id Processes.parent_process_name\n   Processes.parent_process_path\
    \ Processes.process Processes.process_exec Processes.process_guid\n   Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level Processes.process_name\n\
    \   Processes.process_path Processes.user Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `detect_regsvcs_with_no_command_line_arguments_filter`"
