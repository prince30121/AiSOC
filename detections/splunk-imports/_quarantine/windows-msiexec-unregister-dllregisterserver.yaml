id: splunk-security-content-a27db3c5-1a9a-46df-a577-765d3f1a3c24
name: Windows MSIExec Unregister DLLRegisterServer
description: The following analytic detects the use of msiexec.exe with the /z switch
  parameter, which is used to unload DLLRegisterServer. This detection leverages data
  from Endpoint Detection and Response (EDR) agents, focusing on process execution
  logs, including command-line arguments. This activity is significant because unloading
  DLLRegisterServer can be indicative of an attempt to deregister a DLL, potentially
  disrupting legitimate services or hiding malicious activity. If confirmed malicious,
  this could allow an attacker to disable security controls, evade detection, or disrupt
  system functionality, leading to further compromise of the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.007
  categories:
  - endpoint
references:
- https://thedfirreport.com/2022/06/06/will-the-real-msiexec-please-stand-up-exploit-leads-to-data-exfiltration/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218.007/T1218.007.md
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_msiexec`\
    \ Processes.process IN (\"*/z*\", \"*-z*\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_msiexec_unregister_dllregisterserver_filter`"
