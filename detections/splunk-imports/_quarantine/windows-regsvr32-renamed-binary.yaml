id: splunk-security-content-7349a9e9-3cf6-4171-bb0c-75607a8dcd1a
name: Windows Regsvr32 Renamed Binary
description: The following analytic identifies instances where the regsvr32.exe binary
  has been renamed and executed. This detection leverages Endpoint Detection and Response
  (EDR) data, specifically focusing on the original filename metadata. Renaming regsvr32.exe
  is significant as it can be an evasion technique used by attackers to bypass security
  controls. If confirmed malicious, this activity could allow an attacker to execute
  arbitrary DLLs, potentially leading to code execution, privilege escalation, or
  persistence within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.010
  categories:
  - endpoint
references:
- https://twitter.com/pr0xylife/status/1585612370441031680?s=46&t=Dc3CJi4AnM-8rNoacLbScg
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ != regsvr32.exe\n    AND\n    Processes.original_file_name=regsvr32.exe\n  BY\
    \ Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_regsvr32_renamed_binary_filter`"
