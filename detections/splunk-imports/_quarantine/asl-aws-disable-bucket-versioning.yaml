id: splunk-security-content-f32598bb-fa5f-4afd-8ab3-0263cc28efbc
name: ASL AWS Disable Bucket Versioning
description: The following analytic detects when AWS S3 bucket versioning is suspended
  by a user. It leverages AWS CloudTrail logs to identify `PutBucketVersioning` events
  with the `VersioningConfiguration.Status` set to `Suspended`. This activity is significant
  because disabling versioning can prevent recovery of deleted or modified data, which
  is a common tactic in ransomware attacks. If confirmed malicious, this action could
  lead to data loss and hinder recovery efforts, severely impacting data integrity
  and availability.
severity: medium
enabled: false
tags:
  mitre:
  - T1490
  categories:
  - cloud
references:
- https://invictus-ir.medium.com/ransomware-in-the-cloud-7f14805bbe82
- https://bleemb.medium.com/data-exfiltration-with-native-aws-s3-features-c94ae4d13436
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=PutBucketVersioning\n  | spath\
    \ input=api.request.data path=VersioningConfiguration.Status output=Status\n \
    \ | spath input=api.request.data path=bucketName output=bucketName\n  | search\
    \ Status=Suspended\n  | fillnull\n  | stats count min(_time) as firstTime max(_time)\
    \ as lastTime\n    BY actor.user.uid api.operation api.service.name\n       http_request.user_agent\
    \ src_endpoint.ip actor.user.account.uid\n       cloud.provider cloud.region api.request.data\n\
    \       bucketName\n  | rename actor.user.uid as user api.operation as action\
    \ api.service.name as dest http_request.user_agent as user_agent src_endpoint.ip\
    \ as src actor.user.account.uid as vendor_account cloud.provider as vendor_product\
    \ cloud.region as vendor_region\n  | `security_content_ctime(firstTime)`\n  |\
    \ `security_content_ctime(lastTime)`\n  | `asl_aws_disable_bucket_versioning_filter`"
provenance:
