id: splunk-security-content-d4a3eb62-0f1e-11ec-a971-acde48001122
name: Add DefaultUser And Password In Registry
description: The following analytic detects suspicious registry modifications that
  implement auto admin logon by adding DefaultUserName and DefaultPassword values.
  It leverages data from the Endpoint.Registry data model, specifically monitoring
  changes to the "SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" registry
  path. This activity is significant because it is associated with BlackMatter ransomware,
  which uses this technique to automatically log on to compromised hosts and continue
  encryption after a safe mode boot. If confirmed malicious, this could allow attackers
  to maintain persistence and further encrypt the network, leading to significant
  data loss and operational disruption.
severity: medium
enabled: false
tags:
  mitre:
  - T1552.002
  categories:
  - endpoint
references:
- https://news.sophos.com/en-us/2021/08/09/blackmatter-ransomware-emerges-from-the-shadow-of-darkside/
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime FROM datamodel=Endpoint.Registry WHERE (Registry.registry_path=
    "*SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon*" AND Registry.registry_value_name=
    DefaultPassword OR Registry.registry_value_name= DefaultUserName) by Registry.action
    Registry.dest Registry.process_guid Registry.process_id Registry.registry_hive
    Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)` | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `add_defaultuser_and_password_in_registry_filter`'
