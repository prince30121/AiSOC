id: splunk-security-content-f79c5d7a-dd99-4263-93e1-49ace5634c82
name: Windows Credential Target Information Structure in Commandline
description: Detects DNS-based Kerberos coercion attacks where adversaries inject
  marshaled credential structures into DNS records to spoof SPNs and redirect authentication
  such as in CVE-2025-33073. This detection leverages process creation events looking
  for specific CREDENTIAL_TARGET_INFORMATION structures.
severity: medium
enabled: false
tags:
  mitre:
  - T1557.001
  - T1187
  - T1071.004
  categories:
  - endpoint
references:
- https://web.archive.org/web/20250617122747/https://www.synacktiv.com/publications/ntlm-reflection-is-dead-long-live-ntlm-reflection-an-in-depth-analysis-of-cve-2025
- https://www.synacktiv.com/publications/relaying-kerberos-over-smb-using-krbrelayx
- https://www.guidepointsecurity.com/blog/the-birth-and-death-of-loopyticket/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *1UWhRCA*\" Processes.process=\"*AAAAA*\" Processes.process=\"*YBAAAA*\"\n  BY\
    \ Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_credential_target_information_structure_in_commandline_filter`"
provenance:
