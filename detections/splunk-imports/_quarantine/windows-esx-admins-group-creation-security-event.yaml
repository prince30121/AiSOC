id: splunk-security-content-53b4c927-5ec4-47cd-8aed-d4b303304f87
name: Windows ESX Admins Group Creation Security Event
description: This analytic detects creation, deletion, or modification of the "ESX
  Admins" group in Active Directory. These events may indicate attempts to exploit
  the VMware ESXi Active Directory Integration Authentication Bypass vulnerability
  (CVE-2024-37085).
severity: medium
enabled: false
tags:
  mitre:
  - T1136.001
  - T1136.002
  categories:
  - endpoint
references:
- https://support.broadcom.com/web/ecx/support-content-notification/-/external/content/SecurityAdvisories/0/24505
- https://www.microsoft.com/en-us/security/blog/2024/07/29/ransomware-operators-exploit-esxi-hypervisor-vulnerability-for-mass-encryption/
- https://www.securityweek.com/microsoft-says-ransomware-gangs-exploiting-just-patched-vmware-esxi-flaw/
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_security` EventCode IN (4727, 4730, 4737) (TargetUserName=\"\
    ESX Admins\" OR TargetUserName=\"*ESX Admins*\")\n  | stats count min(_time) as\
    \ firstTime max(_time) as lastTime\n    BY EventCode TargetUserName TargetDomainName\n\
    \       SubjectUserName SubjectDomainName Computer\n  | rename Computer as dest\n\
    \  | eval EventCodeDescription=case( EventCode=4727, \"Security Enabled Global\
    \ Group Created\", EventCode=4730, \"Security Enabled Global Group Deleted\",\
    \ EventCode=4737, \"Security Enabled Global Group Modified\" )\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `windows_esx_admins_group_creation_security_event_filter`"
provenance:
  source: splunk/security_content
  source_id: 53b4c927-5ec4-47cd-8aed-d4b303304f87
