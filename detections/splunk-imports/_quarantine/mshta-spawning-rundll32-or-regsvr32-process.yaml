id: splunk-security-content-4aa5d062-e893-11eb-9eb2-acde48001122
name: Mshta spawning Rundll32 OR Regsvr32 Process
description: The following analytic detects a suspicious mshta.exe process spawning
  rundll32 or regsvr32 child processes. It leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process GUID, process name, and parent process
  fields. This activity is significant as it is a known technique used by malware
  like Trickbot to load malicious DLLs and execute payloads. If confirmed malicious,
  this behavior could allow attackers to execute arbitrary code, escalate privileges,
  or download additional malware, posing a severe threat to the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.005
  categories:
  - endpoint
references:
- https://twitter.com/cyb3rops/status/1416050325870587910?s=21
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name\
    \ = \"mshta.exe\"  `process_rundll32`\n    OR\n    `process_regsvr32`\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(\"Processes\")`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `mshta_spawning_rundll32_or_regsvr32_process_filter`"
