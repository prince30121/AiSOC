id: splunk-security-content-3e1f1568-9633-11eb-a69c-acde48001122
name: AWS IAM AccessDenied Discovery Events
description: The following analytic identifies excessive AccessDenied events within
  an hour timeframe for IAM users in AWS. It leverages AWS CloudTrail logs to detect
  multiple failed access attempts from the same source IP and user identity. This
  activity is significant as it may indicate that an access key has been compromised
  and is being misused for unauthorized discovery actions. If confirmed malicious,
  this could allow attackers to gather information about the AWS environment, potentially
  leading to further exploitation or privilege escalation.
severity: medium
enabled: false
tags:
  mitre:
  - T1580
  categories:
  - cloud
references:
- https://aws.amazon.com/premiumsupport/knowledge-center/troubleshoot-iam-permission-errors/
logsource:
  product: splunk
detection:
  splunk_spl: "`cloudtrail` (errorCode = \"AccessDenied\") user_type=IAMUser (userAgent!=*.amazonaws.com)\n\
    \  | bucket _time span=1h\n  | rename user_name as user\n  | stats count as failures\
    \ min(_time) as firstTime max(_time) as lastTime, dc(signature) as methods, dc(dest)\
    \ as sources values(signature) as signature values(dest) as dest\n    BY src,\
    \ user, vendor_account\n       vendor_region, vendor_product\n  | where failures\
    \ >= 5 and methods >= 1 and sources >= 1\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `aws_iam_accessdenied_discovery_events_filter`"
provenance:
