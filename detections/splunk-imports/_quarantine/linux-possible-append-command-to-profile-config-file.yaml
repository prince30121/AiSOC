id: splunk-security-content-9c94732a-61af-11ec-91e3-acde48001122
name: Linux Possible Append Command To Profile Config File
description: The following analytic detects suspicious command-lines that modify user
  profile files to automatically execute scripts or executables upon system reboot.
  It leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  command-line executions involving profile files like ~/.bashrc and /etc/profile.
  This activity is significant as it indicates potential persistence mechanisms used
  by adversaries to maintain access to compromised hosts. If confirmed malicious,
  this could allow attackers to execute arbitrary code upon reboot, leading to persistent
  control over the system and potential further exploitation.
severity: medium
enabled: false
tags:
  mitre:
  - T1546.004
  categories:
  - endpoint
references:
- https://unix.stackexchange.com/questions/129143/what-is-the-purpose-of-bashrc-and-how-does-it-work
- https://attack.mitre.org/techniques/T1546/004/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process\
    \ = \"*echo*\"\n    AND\n    Processes.process IN(\"*~/.bashrc\", \"*~/.bash_profile\"\
    , \"*/etc/profile\", \"~/.bash_login\", \"*~/.profile\", \"~/.bash_logout\")\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_possible_append_command_to_profile_config_file_filter`"
