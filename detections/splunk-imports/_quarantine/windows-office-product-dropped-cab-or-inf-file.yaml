id: splunk-security-content-dbdd251e-dd45-4ec9-a555-f5e151391746
name: Windows Office Product Dropped Cab or Inf File
description: The following analytic detects Office products writing .cab or .inf files,
  indicative of CVE-2021-40444 exploitation. It leverages the Endpoint.Processes and
  Endpoint.Filesystem data models to identify Office applications creating these file
  types. This activity is significant as it may signal an attempt to load malicious
  ActiveX controls and download remote payloads, a known attack vector. If confirmed
  malicious, this could lead to remote code execution, allowing attackers to gain
  control over the affected system and potentially compromise sensitive data.
severity: medium
enabled: false
tags:
  mitre:
  - T1566.001
  categories:
  - endpoint
references:
- https://twitter.com/vxunderground/status/1436326057179860992?s=20
- https://app.any.run/tasks/36c14029-9df8-439c-bba0-45f2643b0c70/
- https://msrc.microsoft.com/update-guide/vulnerability/CVE-2021-40444
- https://twitter.com/RonnyTNL/status/1436334640617373699?s=20
- https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/trojanized-onenote-document-leads-to-formbook-malware/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count FROM datamodel=Endpoint.Processes\n\
    \  WHERE `process_office_products`\n  BY _time span=1h Processes.action\n    \
    \ Processes.dest Processes.original_file_name Processes.parent_process\n     Processes.parent_process_exec\
    \ Processes.parent_process_guid Processes.parent_process_id\n     Processes.parent_process_name\
    \ Processes.parent_process_path Processes.process\n     Processes.process_exec\
    \ Processes.process_guid Processes.process_hash\n     Processes.process_id Processes.process_integrity_level\
    \ Processes.process_name\n     Processes.process_path Processes.user Processes.user_id\n\
    \     Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| rename process_guid\
    \ as proc_guid\n| join proc_guid, _time [\n| tstats `security_content_summariesonly`\
    \ count min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n\
    \  WHERE Filesystem.file_name IN (\"*.cab\", \"*.inf\")\n  BY _time span=1h Filesystem.dest\n\
    \     Filesystem.file_create_time Filesystem.file_name Filesystem.file_path\n\
    \     Filesystem.process_guid\n| `drop_dm_object_name(Filesystem)`\n| rename process_guid\
    \ as proc_guid\n| fields _time dest file_create_time file_name file_path process_name\
    \ process_path process proc_guid]\n| dedup file_create_time\n| table dest, process_name,\
    \ process, file_create_time, file_name, file_path, proc_guid\n| `windows_office_product_dropped_cab_or_inf_file_filter`"
