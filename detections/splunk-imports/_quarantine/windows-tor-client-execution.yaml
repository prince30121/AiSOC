id: splunk-security-content-f164bc6f-ecbe-45e0-aaa6-f5c4d8c84b9a
name: Windows TOR Client Execution
description: 'The following analytic detects the execution of the TOR Browser and
  related TOR components on Windows endpoints by monitoring process creation activity.

  Adversaries and insider threats leverage TOR to anonymize command-and-control traffic,
  facilitate data exfiltration, and evade network monitoring and policy enforcement.

  While TOR can be used for legitimate research and privacy purposes, its presence
  on enterprise endpoints is often unusual and should be investigated to determine
  intent, scope, and any associated malicious behavior.'
severity: medium
enabled: false
tags:
  mitre:
  - T1090.003
  categories:
  - endpoint
references:
- https://unit42.paloaltonetworks.com/tor-traffic-enterprise-networks/
- https://attack.mitre.org/software/S0183/
- https://attack.mitre.org/techniques/T1090/003/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime\n  from datamodel=Endpoint.Processes where\n  (\n   \
    \ Processes.process_name = \"tor.exe\"\n    OR\n    (\n      Processes.process_path\
    \ = \"*\\\\BraveSoftware\\\\Brave-Browser*\"\n      Processes.process_path = \"\
    *\\\\tor-*\"\n    )\n  )\n  by Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec\n     Processes.parent_process_guid\
    \ Processes.parent_process_id\n     Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_tor_client_execution_filter`"
provenance:
