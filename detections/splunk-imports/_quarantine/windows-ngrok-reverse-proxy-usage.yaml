id: splunk-security-content-e2549f2c-0aef-408a-b0c1-e0f270623436
name: Windows Ngrok Reverse Proxy Usage
description: The following analytic detects the execution of ngrok.exe on a Windows
  operating system. It leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process names and command-line arguments. This activity is significant
  because while ngrok is a legitimate tool for creating secure tunnels, it is increasingly
  used by adversaries to bypass network defenses and establish reverse proxies. If
  confirmed malicious, this could allow attackers to exfiltrate data, maintain persistence,
  or facilitate further attacks by tunneling traffic through the compromised system.
severity: medium
enabled: false
tags:
  mitre:
  - T1572
  - T1090
  - T1102
  categories:
  - endpoint
references:
- https://www.cisa.gov/uscert/sites/default/files/publications/aa22-320a_joint_csa_iranian_government-sponsored_apt_actors_compromise_federal%20network_deploy_crypto%20miner_credential_harvester.pdf
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=ngrok.exe\
    \ Processes.process IN (\"*start*\", \"*--config*\",\"*http*\",\"*authtoken*\"\
    , \"*http*\", \"*tcp*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_ngrok_reverse_proxy_usage_filter`"
