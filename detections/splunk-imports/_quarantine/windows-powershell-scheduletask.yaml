id: splunk-security-content-ddf82fcb-e9ee-40e3-8712-a50b5bf323fc
name: Windows PowerShell ScheduleTask
description: The following analytic detects potential malicious activities involving
  PowerShell's task scheduling cmdlets. It leverages PowerShell Script Block Logging
  (EventCode 4104) to identify unusual or suspicious use of cmdlets like 'New-ScheduledTask'
  and 'Set-ScheduledTask'. This activity is significant as attackers often use these
  cmdlets for persistence and remote execution of malicious code. If confirmed malicious,
  this could allow attackers to maintain access, deliver additional payloads, or execute
  ransomware, leading to data theft or other severe impacts. Immediate investigation
  and mitigation are crucial to prevent further compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1053.005
  - T1059.001
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/powershell/module/scheduledtasks/?view=windowsserver2022-ps
- https://thedfirreport.com/2023/06/12/a-truly-graceful-wipe-out/
logsource:
  product: splunk
detection:
  splunk_spl: "`powershell` EventCode=4104 ScriptBlockText IN (\"*New-ScheduledTask*\"\
    , \"*New-ScheduledTaskAction*\", \"*New-ScheduledTaskSettingsSet*\", \"*New-ScheduledTaskTrigger*\"\
    , \"*Register-ClusteredScheduledTask*\", \"*Register-ScheduledTask*\", \"*Set-ClusteredScheduledTask*\"\
    , \"*Set-ScheduledTask*\", \"*Start-ScheduledTask*\", \"*Enable-ScheduledTask*\"\
    )\n  | fillnull\n  | stats count min(_time) as firstTime max(_time) as lastTime\n\
    \    BY dest signature signature_id\n       user_id vendor_product EventID\n \
    \      Guid Opcode Name\n       Path ProcessID ScriptBlockId\n       ScriptBlockText\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `windows_powershell_scheduletask_filter`"
provenance:
