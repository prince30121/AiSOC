id: splunk-security-content-b08e69d4-b42d-494c-bd30-abaaa3571ba4
name: Cisco Secure Firewall - Bits Network Activity
description: The following analytic detects the use of the Background Intelligent
  Transfer Service (BITS) client application in allowed outbound connections. It leverages
  logs from Cisco Secure Firewall Threat Defense devices and identifies instances
  where BITS is used to initiate downloads from non-standard or unexpected domains.
  While BITS is a legitimate Windows service used for downloading updates, it is also
  commonly abused by adversaries to stealthily retrieve payloads or tools. This analytic
  filters out known Microsoft Edge update URLs and focuses on connections that may
  indicate suspicious or unauthorized file transfers. If confirmed malicious, this
  could represent a command and control (C2) channel or a download of malware or tooling
  as part of an attack chain.
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - network
references:
- https://www.cisco.com/c/en/us/td/docs/security/firepower/741/api/FQE/secure_firewall_estreamer_fqe_guide_740.pdf
logsource:
  product: splunk
detection:
  splunk_spl: '`cisco_secure_firewall` EventType=ConnectionEvent action IN ("Trust",
    "Allow", "allowed") ClientApplication="BITS" AND NOT url IN ("*://msedge.b.tlu.dl*")

    | stats count min(_time) as firstTime max(_time) as lastTime by src, dest, dest_port,
    transport, rule, url, EVE_Process, ClientApplication, ClientApplicationVersion,
    action

    | `security_content_ctime(firstTime)`

    | `security_content_ctime(lastTime)`

    | `cisco_secure_firewall___bits_network_activity_filter`'
