id: splunk-security-content-fa7ca5c6-c9d8-11eb-bce9-acde48001122
name: Permission Modification using Takeown App
description: The following analytic detects the modification of file or directory
  permissions using the takeown.exe Windows application. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process execution logs that include
  process GUID, process name, and command-line details. This activity is significant
  because it is a common technique used by ransomware to take ownership of files or
  folders for encryption or deletion. If confirmed malicious, this could lead to unauthorized
  access, data encryption, or data destruction, severely impacting the integrity and
  availability of critical data.
severity: medium
enabled: false
tags:
  mitre:
  - T1222
  categories:
  - endpoint
references:
- https://research.nccgroup.com/2020/06/23/wastedlocker-a-new-ransomware-variant-developed-by-the-evil-corp-group/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = \"takeown.exe\" Processes.process = \"*/f*\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `permission_modification_using_takeown_app_filter`"
