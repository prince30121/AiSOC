id: splunk-security-content-8148c29c-c952-11eb-9255-acde48001122
name: Detect Mimikatz With PowerShell Script Block Logging
description: The following analytic detects the execution of Mimikatz commands via
  PowerShell by leveraging PowerShell Script Block Logging (EventCode=4104). This
  method captures and logs the full command sent to PowerShell, allowing for the identification
  of suspicious activities such as Pass the Ticket, Pass the Hash, and credential
  dumping. This activity is significant as Mimikatz is a well-known tool used for
  credential theft and lateral movement. If confirmed malicious, this could lead to
  unauthorized access, privilege escalation, and potential compromise of sensitive
  information within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1003
  - T1059.001
  categories:
  - endpoint
references:
- https://help.splunk.com/en/security-offerings/splunk-user-behavior-analytics/get-data-in/5.4.1/add-other-data-to-splunk-uba/configure-powershell-logging-to-see-powershell-anomalies-in-splunk-uba.
- https://blog.palantir.com/tampering-with-windows-event-tracing-background-offense-and-defense-4be7ac62ac63
- https://static1.squarespace.com/static/552092d5e4b0661088167e5c/t/59c1814829f18782e24f1fe2/1505853768977/Windows+PowerShell+Logging+Cheat+Sheet+ver+Sept+2017+v2.1.pdf
- https://www.crowdstrike.com/blog/investigating-powershell-command-and-script-logging/
- https://www.splunk.com/en_us/blog/security/hunting-for-malicious-powershell-using-script-block-logging.html
logsource:
  product: splunk
detection:
  splunk_spl: "`powershell` EventCode=4104 ScriptBlockText IN (*mimikatz*, *-dumpcr*,\
    \ *sekurlsa::pth*, *kerberos::ptt*, *kerberos::golden*)\n  | fillnull\n  | stats\
    \ count min(_time) as firstTime max(_time) as lastTime\n    BY dest signature\
    \ signature_id\n       user_id vendor_product EventID\n       Guid Opcode Name\n\
    \       Path ProcessID ScriptBlockId\n       ScriptBlockText\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `detect_mimikatz_with_powershell_script_block_logging_filter`"
