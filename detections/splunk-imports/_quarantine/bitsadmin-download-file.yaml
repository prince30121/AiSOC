id: splunk-security-content-80630ff4-8e4c-11eb-aab5-acde48001122
name: BITSAdmin Download File
description: The following analytic detects the use of `bitsadmin.exe` with the `transfer`
  parameter to download a remote object. It leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process and command-line telemetry. This
  activity is significant because `bitsadmin.exe` can be exploited to download and
  execute malicious files without immediate detection. If confirmed malicious, an
  attacker could use this technique to download and execute payloads, potentially
  leading to code execution, privilege escalation, or persistent access within the
  environment. Review parallel and child processes, especially `svchost.exe`, for
  associated artifacts.
severity: medium
enabled: false
tags:
  mitre:
  - T1197
  - T1105
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/8eb52117b748d378325f7719554a896e37bccec7/atomics/T1105/T1105.md#atomic-test-9---windows---bitsadmin-bits-download
- https://github.com/redcanaryco/atomic-red-team/blob/bc705cb7aaa5f26f2d96585fac8e4c7052df0ff9/atomics/T1197/T1197.md
- https://docs.microsoft.com/en-us/windows/win32/bits/bitsadmin-tool
- https://thedfirreport.com/2021/03/29/sodinokibi-aka-revil-ransomware/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_bitsadmin`\
    \ Processes.process IN (\"*transfer*\", \"*addfile*\")\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `bitsadmin_download_file_filter`"
