id: splunk-security-content-b7bd83c0-92b5-4fc7-b286-23eccfa2c561
name: Windows COM Hijacking InprocServer32 Modification
description: The following analytic detects the modification of the InProcServer32
  registry key by reg.exe, indicative of potential COM hijacking. This detection leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process and
  command-line execution logs. COM hijacking is significant as it allows adversaries
  to insert malicious code that executes in place of legitimate software, providing
  a means for persistence. If confirmed malicious, this activity could enable attackers
  to execute arbitrary code, disrupt legitimate system components, and maintain long-term
  access to the compromised environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1546.015
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1546/015/
- https://blog.cluster25.duskrise.com/2022/09/23/in-the-footsteps-of-the-fancy-bear-powerpoint-graphite/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1546.015/T1546.015.md
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_reg`\
    \ Processes.process=*inprocserver32*\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_com_hijacking_inprocserver32_modification_filter`"
