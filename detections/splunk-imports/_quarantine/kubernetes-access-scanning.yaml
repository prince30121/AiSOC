id: splunk-security-content-2f4abe6d-5991-464d-8216-f90f42999764
name: Kubernetes Access Scanning
description: The following analytic detects potential scanning activities within a
  Kubernetes environment. It identifies unauthorized access attempts, probing of public
  APIs, or attempts to exploit known vulnerabilities by monitoring Kubernetes audit
  logs for repeated failed access attempts or unusual API requests. This activity
  is significant for a SOC as it may indicate an attacker's preliminary reconnaissance
  to gather information about the system. If confirmed malicious, this activity could
  lead to unauthorized access to sensitive systems or data, posing a severe security
  risk.
severity: medium
enabled: false
tags:
  mitre:
  - T1046
  categories:
  - cloud
references:
- https://kubernetes.io/docs/tasks/debug/debug-cluster/audit/
logsource:
  product: splunk
detection:
  splunk_spl: "`kube_audit` \"user.groups{}\"=\"system:unauthenticated\" \"responseStatus.code\"\
    =403\n  | iplocation sourceIPs{}\n  | stats count values(userAgent) as userAgent\
    \ values(user.username) as user.username values(user.groups{}) as user.groups{}\
    \ values(verb) as verb values(requestURI) as requestURI values(responseStatus.code)\
    \ as responseStatus.code values(responseStatus.message) as responseStatus.message\
    \ values(responseStatus.reason) as responseStatus.reason values(responseStatus.status)\
    \ as responseStatus.status\n    BY sourceIPs{} Country City\n  | where count >\
    \ 5\n  | rename sourceIPs{} as src_ip, user.username as user\n  | `kubernetes_access_scanning_filter`"
provenance:
  source: splunk/security_content
  source_id: 2f4abe6d-5991-464d-8216-f90f42999764
