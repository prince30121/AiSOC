id: splunk-security-content-5a8a2a72-8322-11eb-9ee9-acde48001122
name: Clop Common Exec Parameter
description: The following analytic identifies the execution of CLOP ransomware variants
  using specific arguments ("runrun" or "temp.dat") to trigger their malicious activities.
  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process names and command-line arguments. Monitoring this activity is
  crucial as it indicates potential ransomware behavior, which can lead to file encryption
  on network shares or local machines. If confirmed malicious, this activity could
  result in significant data loss and operational disruption due to encrypted files,
  highlighting the need for immediate investigation and response.
severity: medium
enabled: false
tags:
  mitre:
  - T1204
  categories:
  - endpoint
references:
- https://www.mandiant.com/resources/fin11-email-campaigns-precursor-for-ransomware-data-theft
- https://blog.virustotal.com/2020/11/keep-your-friends-close-keep-ransomware.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ != \"*temp.dat*\" Processes.process = \"*runrun*\"\n    OR\n    Processes.process\
    \ = \"*temp.dat*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `clop_common_exec_parameter_filter`"
