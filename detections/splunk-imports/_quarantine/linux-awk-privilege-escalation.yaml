id: splunk-security-content-4510cae0-96a2-4840-9919-91d262db210a
name: Linux AWK Privilege Escalation
description: The following analytic detects the use of the AWK command with elevated
  privileges to execute system commands. It leverages Endpoint Detection and Response
  (EDR) telemetry, specifically monitoring processes that include "sudo," "awk," and
  "BEGIN*system" in their command lines. This activity is significant because it indicates
  a potential privilege escalation attempt, where a user could gain root access by
  executing commands as the root user. If confirmed malicious, this could allow an
  attacker to fully compromise the system, execute arbitrary commands, and maintain
  persistent control over the affected endpoint.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://www.hacknos.com/awk-privilege-escalation/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *sudo*\"\n    AND\n    Processes.process=\"*awk*\"\n    AND\n    Processes.process=\"\
    *BEGIN*system*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_awk_privilege_escalation_filter`"
