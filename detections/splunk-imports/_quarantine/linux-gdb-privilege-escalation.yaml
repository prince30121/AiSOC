id: splunk-security-content-310b7da2-ab52-437f-b1bf-0bd458674308
name: Linux GDB Privilege Escalation
description: The following analytic detects the execution of the GNU Debugger (GDB)
  with specific flags that indicate an attempt to escalate privileges on a Linux system.
  It leverages Endpoint Detection and Response (EDR) telemetry to identify processes
  where GDB is run with the `-nx`, `-ex`, and `sudo` flags. This activity is significant
  because it can allow a user to execute system commands as root, potentially leading
  to a root shell. If confirmed malicious, this could result in full system compromise,
  allowing an attacker to gain complete control over the affected endpoint.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/gdb/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *gdb*\"\n    AND\n    Processes.process=\"*-nx*\"\n    AND\n    Processes.process=\"\
    *-ex*!*\"\n    AND\n    Processes.process=\"*sudo*\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `linux_gdb_privilege_escalation_filter`"
