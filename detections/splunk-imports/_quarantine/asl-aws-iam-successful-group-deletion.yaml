id: splunk-security-content-1bbe54f1-93d7-4764-8a01-ddaa12ece7ac
name: ASL AWS IAM Successful Group Deletion
description: The following analytic detects the successful deletion of a group within
  AWS IAM, leveraging CloudTrail IAM events. This action, while not inherently malicious,
  can serve as a precursor to more sinister activities, such as unauthorized access
  or privilege escalation attempts. By monitoring for such deletions, the analytic
  aids in identifying potential preparatory steps towards an attack, allowing for
  early detection and mitigation. The identification of this behavior is crucial for
  a SOC to prevent the potential impact of an attack, which could include unauthorized
  access to sensitive resources or disruption of AWS environment operations.
severity: medium
enabled: false
tags:
  mitre:
  - T1069.003
  - T1098
  categories:
  - cloud
references:
- https://awscli.amazonaws.com/v2/documentation/api/latest/reference/iam/delete-group.html
- https://docs.aws.amazon.com/IAM/latest/APIReference/API_DeleteGroup.html
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=DeleteGroup status=Success\n \
    \ | fillnull\n  | stats count min(_time) as firstTime max(_time) as lastTime\n\
    \    BY actor.user.uid api.operation api.service.name\n       http_request.user_agent\
    \ src_endpoint.ip actor.user.account.uid\n       cloud.provider cloud.region\n\
    \  | rename actor.user.uid as user api.operation as action api.service.name as\
    \ dest http_request.user_agent as user_agent src_endpoint.ip as src actor.user.account.uid\
    \ as vendor_account cloud.provider as vendor_product cloud.region as vendor_region\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `asl_aws_iam_successful_group_deletion_filter`"
