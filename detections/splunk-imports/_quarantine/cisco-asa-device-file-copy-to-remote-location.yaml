id: splunk-security-content-8a9e5f2b-6d4c-4e7f-9b3a-1c8d7f5e2a9b
name: Cisco ASA - Device File Copy to Remote Location
description: 'This analytic detects file copy operations to remote locations on Cisco
  ASA devices via CLI or ASDM.

  Adversaries may exfiltrate device files including configurations, logs, packet captures,
  or system data to remote servers using protocols like TFTP, FTP, HTTP, HTTPS, SMB,
  or SCP. While legitimate backups to centralized servers are common, copies to unexpected
  destinations may indicate data exfiltration to attacker-controlled infrastructure.

  The detection monitors for command execution events (message ID 111008 or 111010)
  containing copy commands with remote protocol indicators (tftp:, ftp:, http:, https:,
  smb:, scp:).

  Investigate copies to unexpected destinations, from non-administrative accounts,
  or outside approved maintenance windows.

  We recommend adapting the detection filters to exclude known legitimate backup activities.'
severity: medium
enabled: false
tags:
  mitre:
  - T1005
  - T1041
  - T1048.003
  categories:
  - application
references:
- https://community.cisco.com/t5/security-knowledge-base/asa-how-to-download-images-using-tftp-ftp-http-https-and-scp/ta-p/3109769
- https://blog.talosintelligence.com/arcanedoor-new-espionage-focused-campaign-found-targeting-perimeter-network-devices/
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_asa`\nmessage_id IN (111008, 111010)\ncommand = \"copy *\"\n\
    command IN (\n    \"*running-config*\",\n    \"*startup-config*\",\n    \"*/pcap\
    \ capture:*\",\n    \"* disk0:*\",\n    \"* flash:*\",\n    \"* system:*\"\n)\n\
    command IN (\n    \"*ftp:*\",\n    \"*http:*\",\n    \"*https:*\",\n    \"*smb:*\"\
    ,\n    \"*scp:*\"\n)\n\n| eval remote_protocol = mvappend(\n  if(match(command,\
    \ \"tftp:\"), \"TFTP\", null()),\n  if(match(command, \"ftp:\"), \"FTP\", null()),\n\
    \  if(match(command, \"http:\"), \"HTTP\", null()),\n  if(match(command, \"https:\"\
    ), \"HTTPS\", null()),\n  if(match(command, \"smb:\"), \"SMB\", null()),\n  if(match(command,\
    \ \"scp:\"), \"SCP\", null())\n  )\n| fillnull\n| stats earliest(_time) as firstTime\n\
    \        latest(_time) as lastTime\n        values(user) as user\n        values(action)\
    \ as action\n        values(message_id) as message_id\n        values(command)\
    \ as command\n        values(remote_protocol) as remote_protocol\n        values(src_ip)\
    \ as src_ip\n        values(dest) as dest\n        values(process_name) as process_name\n\
    \  by host\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `cisco_asa___device_file_copy_to_remote_location_filter`"
