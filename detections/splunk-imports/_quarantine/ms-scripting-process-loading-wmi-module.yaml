id: splunk-security-content-2eba3d36-14a6-11ec-a682-acde48001122
name: MS Scripting Process Loading WMI Module
description: The following analytic detects the loading of WMI modules by Microsoft
  scripting processes like wscript.exe or cscript.exe. It leverages Sysmon EventCode
  7 to identify instances where these scripting engines load specific WMI-related
  DLLs. This activity is significant because it can indicate the presence of malware,
  such as the FIN7 implant, which uses JavaScript to execute WMI queries for gathering
  host information to send to a C2 server. If confirmed malicious, this behavior could
  allow attackers to collect sensitive system information and maintain persistence
  within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.007
  categories:
  - endpoint
references:
- https://www.mandiant.com/resources/fin7-pursuing-an-enigmatic-and-evasive-global-criminal-operation
- https://attack.mitre.org/groups/G0046/
logsource:
  product: splunk
detection:
  splunk_spl: '`sysmon` EventCode =7 Image IN ("*\\wscript.exe", "*\\cscript.exe")
    ImageLoaded IN ("*\\fastprox.dll", "*\\wbemdisp.dll", "*\\wbemprox.dll", "*\\wbemsvc.dll"
    , "*\\wmiutils.dll", "*\\wbemcomn.dll") | fillnull | stats count min(_time) as
    firstTime max(_time) as lastTime by Image ImageLoaded dest loaded_file loaded_file_path
    original_file_name process_exec process_guid process_hash process_id process_name
    process_path service_dll_signature_exists service_dll_signature_verified signature
    signature_id user_id vendor_product | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
    | `ms_scripting_process_loading_wmi_module_filter`'
