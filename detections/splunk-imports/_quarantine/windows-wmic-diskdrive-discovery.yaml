id: splunk-security-content-85e88c80-e4ee-4c65-b02e-3c54d94c7a51
name: Windows Wmic DiskDrive Discovery
description: The following analytic detects the use of Windows Management Instrumentation
  Command-line (WMIC) for disk drive discovery activities on a Windows system. This
  process involves monitoring commands such as “wmic diskdrive” which are often used
  by administrators for inventory and diagnostics but can also be leveraged by attackers
  to enumerate hardware details for malicious purposes. Detecting these commands is
  essential for identifying potentially unauthorized asset reconnaissance or pre-attack
  mapping behaviors. By capturing and analyzing WMIC disk drive queries, security
  teams can gain visibility into suspicious activities, enabling them to respond promptly
  and strengthen the organization’s security posture against insider threats or lateral
  movement attempts.
severity: medium
enabled: false
tags:
  mitre:
  - T1082
  categories:
  - endpoint
references:
- https://cert.gov.ua/article/6284730
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_wmic`\
    \ (Processes.process=\"* diskdrive*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_wmic_diskdrive_discovery_filter`"
