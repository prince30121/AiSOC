id: splunk-security-content-e36de71a-6bdc-4002-98ff-e3e51b0d8f96
name: O365 Email Password and Payroll Compromise Behavior
description: The following analytic identifies when an O365 email recipient receives
  and then deletes emails for the combination of both password and banking/payroll
  changes within a short period. This behavior may indicate a compromised account
  where the threat actor is attempting to redirect the victims payroll to an attacker
  controlled bank account.
severity: medium
enabled: false
tags:
  mitre:
  - T1070.008
  - T1485
  - T1114.001
  categories:
  - cloud
references:
- https://attack.mitre.org/techniques/T1114/
- https://www.hhs.gov/sites/default/files/help-desk-social-engineering-sector-alert-tlpclear.pdf
- https://intelligence.abnormalsecurity.com/attack-library/threat-actor-convincingly-impersonates-employee-requesting-direct-deposit-update-in-likely-ai-generated-attack
logsource:
  product: splunk
detection:
  splunk_spl: "`o365_messagetrace` subject IN (\"*banking*\",\"*direct deposit*\"\
    ,\"*pay-to*\",\"*password *\",\"*passcode *\",\"*OTP *\",\"*MFA *\",\"*Account\
    \ Recovery*\")\n| eval mailtime = _time\n| bin _time span=4hr\n| eval user = lower(RecipientAddress)\n\
    | eval InternetMessageId = lower(MessageId)\n| join InternetMessageId, user max=0\n\
    \  [\n  | search `o365_management_activity` Workload=Exchange Operation IN (\"\
    SoftDelete\",\"HardDelete\")\n  | spath path=AffectedItems{}  output=AffectedItemSplit\n\
    \  | fields _time,ClientIP,ClientInfoString,UserId,Operation,ResultStatus,MailboxOwnerUPN,AffectedItemSplit\n\
    \  | mvexpand AffectedItemSplit | spath input=AffectedItemSplit\n  | search Subject\
    \ IN (\"*banking*\",\"*direct deposit*\",\"*pay-to*\",\"*password *\",\"*passcode\
    \ *\",\"*OTP *\",\"*MFA *\",\"*Account Recovery*\")\n  | eval deltime = _time\n\
    \  | bin _time span=4hr\n  | eval InternetMessageId = lower(InternetMessageId),\
    \ user = lower(UserId)\n  ]\n| stats values(ClientInfoString) as http_user_agent,\
    \ values(ClientIP) as src, values(Subject) as subject, dc(Subject) as subject_count,\
    \ values(Operation) as action, values(ResultStatus) as result, count, min(mailtime)\
    \ as firstTime, max(deltime) as lastTime by user,_time\n| search subject IN (\"\
    *banking*\",\"*direct deposit*\",\"*pay-to*\") AND subject IN (\"*password *\"\
    ,\"*passcode *\",\"*OTP *\",\"*MFA *\",\"*Account Recovery*\")\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `o365_email_password_and_payroll_compromise_behavior_filter`"
