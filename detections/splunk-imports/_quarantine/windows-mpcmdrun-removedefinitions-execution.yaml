id: splunk-security-content-b2442e49-bd3f-4685-a2dc-2bdc292563bf
name: Windows MpCmdRun RemoveDefinitions Execution
description: 'This detection identifies the execution of MpCmdRun.exe with the "-RemoveDefinitions"
  argument, which is used to remove definitions from the Windows Malware Protection
  Engine.

  This behavior can be significant as it might indicate potential malware activity
  or attempts to bypass security measures.'
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://cert.gov.ua/article/6284730
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime\n  from datamodel=Endpoint.Processes where\n  (Processes.process_name\
    \ =\"MpCmdRun.exe\" OR Processes.original_file_name = MpCmdRun.exe)\n  Processes.process\
    \ = \"*-RemoveDefinitions *\"\n  by Processes.action Processes.dest Processes.original_file_name\
    \ Processes.parent_process\n     Processes.parent_process_exec Processes.parent_process_guid\
    \ Processes.parent_process_id\n     Processes.parent_process_name Processes.parent_process_path\
    \ Processes.process Processes.process_exec\n     Processes.process_guid Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_mpcmdrun_removedefinitions_execution_filter`"
provenance:
  source: splunk/security_content
  source_id: b2442e49-bd3f-4685-a2dc-2bdc292563bf
