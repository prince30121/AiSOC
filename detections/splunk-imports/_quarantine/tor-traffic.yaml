id: splunk-security-content-ea688274-9c06-4473-b951-e4cb7a5d7a45
name: TOR Traffic
description: 'The following analytic identifies allowed network traffic to The Onion
  Router (TOR), an anonymity network often exploited for malicious activities.

  It leverages data from Next Generation Firewalls, using the Network_Traffic data
  model to detect traffic where the application is TOR and the action is allowed.

  This activity is significant as TOR can be used to bypass conventional monitoring,
  facilitating hacking, data breaches, and illicit content dissemination.

  If confirmed malicious, this could lead to unauthorized access, data exfiltration,
  and severe compliance violations, compromising the integrity and security of the
  network.'
severity: medium
enabled: false
tags:
  mitre:
  - T1090.003
  categories:
  - network
references:
- https://knowledgebase.paloaltonetworks.com/KCSArticleDetail?id=kA10g000000ClRtCAK
- https://unit42.paloaltonetworks.com/tor-traffic-enterprise-networks/#:~:text=For%20enterprises%20concerned%20about%20the,the%20most%20important%20security%20risks.
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Network_Traffic WHERE\nAll_Traffic.app=tor\n\
    All_Traffic.action IN (\"allowed\", \"allow\")\nBY All_Traffic.action All_Traffic.app\
    \ All_Traffic.bytes\n   All_Traffic.bytes_in All_Traffic.bytes_out All_Traffic.dest\n\
    \   All_Traffic.dest_ip All_Traffic.dest_port All_Traffic.dvc\n   All_Traffic.protocol\
    \ All_Traffic.protocol_version All_Traffic.src\n   All_Traffic.src_ip All_Traffic.src_port\
    \ All_Traffic.transport\n   All_Traffic.user All_Traffic.vendor_product All_Traffic.rule\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `drop_dm_object_name(\"All_Traffic\")`\n| `tor_traffic_filter`"
