id: splunk-security-content-91c79f14-5b41-11eb-ae93-0242ac130002
name: Detect Rundll32 Inline HTA Execution
description: The following analytic detects the execution of "rundll32.exe" with inline
  protocol handlers such as "JavaScript", "VBScript", and "About". This behavior is
  identified using Endpoint Detection and Response (EDR) telemetry, focusing on command-line
  arguments. This activity is significant as it is often associated with fileless
  malware or application whitelisting bypass techniques. If confirmed malicious, this
  could allow an attacker to execute arbitrary code, bypass security controls, and
  maintain persistence within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.005
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/AtomicTestHarnesses
- https://redcanary.com/blog/introducing-atomictestharnesses/
- https://docs.microsoft.com/en-us/windows/win32/search/-search-3x-wds-extidx-prot-implementing
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count values(Processes.process)\
    \ as process values(Processes.parent_process) as parent_process min(_time) as\
    \ firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE\
    \ `process_rundll32` (Processes.process=*vbscript*\n    OR\n    Processes.process=*javascript*)\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `detect_rundll32_inline_hta_execution_filter`"
