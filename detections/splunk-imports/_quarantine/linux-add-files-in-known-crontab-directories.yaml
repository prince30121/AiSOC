id: splunk-security-content-023f3452-5f27-11ec-bf00-acde48001122
name: Linux Add Files In Known Crontab Directories
description: The following analytic detects unauthorized file creation in known crontab
  directories on Unix-based systems. It leverages filesystem data to identify new
  files in directories such as /etc/cron* and /var/spool/cron/*. This activity is
  significant as it may indicate an attempt by threat actors or malware to establish
  persistence on a compromised host. If confirmed malicious, this could allow attackers
  to execute arbitrary code at scheduled intervals, potentially leading to further
  system compromise and unauthorized access to sensitive information.
severity: medium
enabled: false
tags:
  mitre:
  - T1053.003
  categories:
  - endpoint
references:
- https://www.sandflysecurity.com/blog/detecting-cronrat-malware-on-linux-instantly/
- https://www.cyberciti.biz/faq/how-do-i-add-jobs-to-cron-under-linux-or-unix-oses/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE Filesystem.file_path\
    \ IN (\"*/etc/cron*\", \"*/var/spool/cron/*\")\n  BY Filesystem.action Filesystem.dest\
    \ Filesystem.file_access_time\n     Filesystem.file_create_time Filesystem.file_hash\
    \ Filesystem.file_modify_time\n     Filesystem.file_name Filesystem.file_path\
    \ Filesystem.file_acl\n     Filesystem.file_size Filesystem.process_guid Filesystem.process_id\n\
    \     Filesystem.user Filesystem.vendor_product\n| `drop_dm_object_name(Filesystem)`\n\
    | `security_content_ctime(lastTime)`\n| `security_content_ctime(firstTime)`\n\
    | `linux_add_files_in_known_crontab_directories_filter`"
provenance:
