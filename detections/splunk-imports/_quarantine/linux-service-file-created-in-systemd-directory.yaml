id: splunk-security-content-c7495048-61b6-11ec-9a37-acde48001122
name: Linux Service File Created In Systemd Directory
description: The following analytic detects the creation of suspicious service files
  within the systemd directories on Linux platforms. It leverages logs containing
  file name, file path, and process GUID data from endpoints. This activity is significant
  for a SOC as it may indicate an adversary attempting to establish persistence on
  a compromised host. If confirmed malicious, this could lead to system compromise
  or data exfiltration, allowing attackers to maintain control over the system and
  execute further malicious activities.
severity: medium
enabled: false
tags:
  mitre:
  - T1053.006
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1053/006/
- https://www.intezer.com/blog/research/kaiji-new-chinese-linux-malware-turning-to-golang/
- https://redcanary.com/blog/attck-t1501-understanding-systemd-service-persistence/
- https://github.com/microsoft/MSTIC-Sysmon/blob/main/linux/configs/attack-based/persistence/T1053.003_Cron_Activity.xml
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE Filesystem.file_name\
    \ = *.service Filesystem.file_path IN (\"*/etc/systemd/system*\", \"*/lib/systemd/system*\"\
    , \"*/usr/lib/systemd/system*\", \"*/run/systemd/system*\", \"*~/.config/systemd/*\"\
    , \"*~/.local/share/systemd/*\",\"*/etc/systemd/user*\", \"*/lib/systemd/user*\"\
    , \"*/usr/lib/systemd/user*\", \"*/run/systemd/user*\")\n  BY Filesystem.action\
    \ Filesystem.dest Filesystem.file_access_time\n     Filesystem.file_create_time\
    \ Filesystem.file_hash Filesystem.file_modify_time\n     Filesystem.file_name\
    \ Filesystem.file_path Filesystem.file_acl\n     Filesystem.file_size Filesystem.process_guid\
    \ Filesystem.process_id\n     Filesystem.user Filesystem.vendor_product\n| `drop_dm_object_name(Filesystem)`\n\
    | `security_content_ctime(lastTime)`\n| `security_content_ctime(firstTime)`\n\
    | `linux_service_file_created_in_systemd_directory_filter`"
