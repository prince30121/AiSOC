id: splunk-security-content-acb5dc74-5324-11ec-a36d-acde48001122
name: Unusual Number of Remote Endpoint Authentication Events
description: The following analytic identifies an unusual number of remote authentication
  attempts from a single source by leveraging Windows Event ID 4624, which logs successful
  account logons. It uses statistical analysis, specifically the 3-sigma rule, to
  detect deviations from normal behavior. This activity is significant for a SOC as
  it may indicate lateral movement, malware staging, or reconnaissance. If confirmed
  malicious, this behavior could allow an attacker to move laterally within the network,
  escalate privileges, or gather information for further attacks.
severity: medium
enabled: false
tags:
  mitre:
  - T1078
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1078/
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_security` EventCode=4624 Logon_Type=3 Account_Name!=\"\
    *$\"\n  | eval Source_Account = mvindex(Account_Name, 1)\n  | bucket span=2m _time\n\
    \  | stats dc(ComputerName) AS unique_targets values(ComputerName) as target_hosts\n\
    \    BY _time, Source_Network_Address, Source_Account\n  | eventstats avg(unique_targets)\
    \ as comp_avg , stdev(unique_targets) as comp_std\n    BY Source_Network_Address,\
    \ Source_Account\n  | eval upperBound=(comp_avg+comp_std*3)\n  | eval isOutlier=if(unique_targets\
    \ >10 and unique_targets >= upperBound, 1, 0)\n  | `unusual_number_of_remote_endpoint_authentication_events_filter`"
