id: splunk-security-content-f0db4464-55d9-11eb-ae93-0242ac130002
name: Suspicious microsoft workflow compiler rename
description: The following analytic detects the renaming of microsoft.workflow.compiler.exe,
  a rarely used executable typically located in C:\Windows\Microsoft.NET\Framework64\v4.0.30319.
  This detection leverages Endpoint Detection and Response (EDR) data, focusing on
  process names and original file names. This activity is significant because renaming
  this executable can indicate an attempt to evade security controls. If confirmed
  malicious, an attacker could use this renamed executable to execute arbitrary code,
  potentially leading to privilege escalation or persistent access within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1036.003
  - T1127
  categories:
  - endpoint
references:
- https://lolbas-project.github.io/lolbas/Binaries/Microsoft.Workflow.Compiler/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218/T1218.md#atomic-test-6---microsoftworkflowcompilerexe-payload-execution
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name!=microsoft.workflow.compiler.exe\n\
    \    AND\n    Processes.original_file_name=Microsoft.Workflow.Compiler.exe\n \
    \ BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `suspicious_microsoft_workflow_compiler_rename_filter`"
