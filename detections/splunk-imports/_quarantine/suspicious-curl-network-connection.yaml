id: splunk-security-content-3f613dc0-21f2-4063-93b1-5d3c15eef22f
name: Suspicious Curl Network Connection
description: The following analytic detects the use of the curl command contacting
  suspicious remote domains, such as s3.amazonaws.com, which is indicative of Command
  and Control (C2) activity or downloading further implants. This detection leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process execution
  logs and command-line arguments. This activity is significant as it may indicate
  the presence of MacOS adware or other malicious software attempting to establish
  persistence or exfiltrate data. If confirmed malicious, this could allow attackers
  to maintain control over the compromised system and deploy additional payloads.
severity: medium
enabled: false
tags:
  mitre:
  - T1105
  categories:
  - endpoint
references:
- https://redcanary.com/blog/clipping-silver-sparrows-wings/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime from datamodel=Endpoint.Processes where Processes.process_name\
    \ IN (\"curl\", \"curl.exe\")\nProcesses.process IN (\"*s3.amazonaws.com*\")\n\
    by Processes.action Processes.dest Processes.original_file_name\n   Processes.parent_process\
    \ Processes.parent_process_exec\n   Processes.parent_process_guid Processes.parent_process_id\n\
    \   Processes.parent_process_name Processes.parent_process_path\n   Processes.process\
    \ Processes.process_exec Processes.process_guid\n   Processes.process_hash Processes.process_id\n\
    \   Processes.process_integrity_level Processes.process_name\n   Processes.process_path\
    \ Processes.user Processes.user_id\n   Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `suspicious_curl_network_connection_filter`"
