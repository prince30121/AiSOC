id: splunk-security-content-13435b55-afd8-46d4-9045-7d5457f430a5
name: Microsoft Defender Incident Alerts
description: The following analytic is to leverage alerts from Microsoft Defender
  O365 Incidents. This query aggregates and summarizes all alerts from Microsoft Defender
  O365 Incidents, providing details such as the destination, file name, severity,
  process command line, ip address, registry key, signature, description, unique id,
  and timestamps. This detection is not intended to detect new activity from raw data,
  but leverages Microsoft provided alerts to be correlated with other data as part
  of risk based alerting. The data contained in the alert is mapped not only to the
  risk object, but also the threat object. This detection filters out evidence that
  has a verdict of clean from Microsoft. It dynamically maps the MITRE technique at
  search time to auto populate the annotation field with the value provided in the
  alert. It also uses a static mapping to set the risk score based on the severity
  of the alert.
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/defender-xdr/api-list-incidents?view=o365-worldwide
- https://learn.microsoft.com/en-us/graph/api/resources/security-alert?view=graph-rest-1.0
- https://splunkbase.splunk.com/app/6207
- https://jasonconger.com/splunk-azure-gdi/
logsource:
  product: splunk
detection:
  splunk_spl: "`ms365_defender_incident_alerts`  (dest=* OR user=*)\n  | eval tmp_entities=json_extract(_raw,\
    \ \"entities\"), tmp_entitymv=json_array_to_mv(tmp_entities), tmp_filtered_mv=mvfilter(json_extract(tmp_entitymv,\
    \ \"verdict\") != \"Clean\"), entityType = mvmap(tmp_filtered_mv, spath(tmp_filtered_mv,\
    \ \"entityType\")), filePath = mvmap(tmp_filtered_mv, spath(tmp_filtered_mv, \"\
    filePath\")), processCommandLine = mvmap(tmp_filtered_mv, spath(tmp_filtered_mv,\
    \ \"processCommandLine\")), ipAddress = mvmap(tmp_filtered_mv, spath(tmp_filtered_mv,\
    \ \"ipAddress\")), registryKey = mvmap(tmp_filtered_mv, spath(tmp_filtered_mv,\
    \ \"registryKey\")), url = mvmap(tmp_filtered_mv, spath(tmp_filtered_mv, \"url\"\
    ))\n  | eval tmp_filtered_mv=mvfilter(json_extract(tmp_filtered_mv, \"entityType\"\
    ) = \"File\"), fileName = mvmap(tmp_filtered_mv, spath(tmp_filtered_mv, \"fileName\"\
    ))\n  | eval risk_score=case(severity=\"informational\", 5, severity=\"low\",\
    \ 15, severity=\"medium\", 25, severity=\"high\", 50, true(), 2)\n  | stats count\
    \  min(_time) as firstTime max(_time) as lastTime values(fileName) as file_name\
    \ values(severity) as severity values(processCommandLine) as process values(ipAddress)\
    \ as ip_address values(registryKey) as registry_key values(url) as url values(mitreTechniques{})\
    \ as annotations.mitre_attack.mitre_technique_id values(signature) as signature\
    \ values(dest) as dest values(user) as user values(risk_score) as risk_score\n\
    \    BY id description\n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `microsoft_defender_incident_alerts_filter`"
