id: splunk-security-content-5ffaa42c-acdb-11eb-9ad3-acde48001122
name: Process Kill Base On File Path
description: The following analytic detects the use of `wmic.exe` with the `delete`
  command to remove an executable path. This detection leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process names, parent processes,
  and command-line executions. This activity is significant because it often indicates
  the initial stages of an adversary setting up malicious activities, such as cryptocurrency
  mining, on an endpoint. If confirmed malicious, this behavior could allow an attacker
  to disable security tools or other critical processes, facilitating further compromise
  and persistence within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://thedfirreport.com/2020/04/20/sqlserver-or-the-miner-in-the-basement/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as process values(Processes.process_id) as process_id count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_wmic`\n\
    \    AND\n    Processes.process=\"*process*\"\n    AND\n    Processes.process=\"\
    *executablepath*\"\n    AND\n    Processes.process=\"*delete*\"\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `process_kill_base_on_file_path_filter`"
