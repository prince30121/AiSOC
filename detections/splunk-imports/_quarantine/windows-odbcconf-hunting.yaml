id: splunk-security-content-0562ad4b-fdaa-4882-b12f-7b8e0034cd72
name: Windows Odbcconf Hunting
description: The following analytic identifies the execution of Odbcconf.exe within
  the environment. It leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process creation events where the process name is Odbcconf.exe. This
  activity is significant because Odbcconf.exe can be used by attackers to execute
  arbitrary commands or load malicious DLLs, potentially leading to code execution
  or persistence. If confirmed malicious, this behavior could allow an attacker to
  maintain access to the system, execute further malicious activities, or escalate
  privileges, posing a significant threat to the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.008
  categories:
  - endpoint
references:
- https://strontic.github.io/xcyclopedia/library/odbcconf.exe-07FBA12552331355C103999806627314.html
- https://twitter.com/redcanary/status/1541838407894171650?s=20&t=kp3WBPtfnyA3xW7D7wx0uw
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=odbcconf.exe\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_odbcconf_hunting_filter`"
