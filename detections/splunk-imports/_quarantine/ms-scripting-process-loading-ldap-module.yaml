id: splunk-security-content-0b0c40dc-14a6-11ec-b267-acde48001122
name: MS Scripting Process Loading Ldap Module
description: The following analytic detects the execution of MS scripting processes
  (wscript.exe or cscript.exe) loading LDAP-related modules (Wldap32.dll, adsldp.dll,
  adsldpc.dll). It leverages Sysmon EventCode 7 to identify these specific DLL loads.
  This activity is significant as it may indicate an attempt to query LDAP for host
  information, a behavior observed in FIN7 implants. If confirmed malicious, this
  could allow attackers to gather detailed Active Directory information, potentially
  leading to further exploitation or data exfiltration.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.007
  categories:
  - endpoint
references:
- https://www.mandiant.com/resources/fin7-pursuing-an-enigmatic-and-evasive-global-criminal-operation
- https://attack.mitre.org/groups/G0046/
logsource:
  product: splunk
detection:
  splunk_spl: '`sysmon` EventCode =7 Image IN ("*\\wscript.exe", "*\\cscript.exe")
    ImageLoaded IN ("*\\Wldap32.dll", "*\\adsldp.dll", "*\\adsldpc.dll") | fillnull
    | stats count min(_time) as firstTime max(_time) as lastTime by Image ImageLoaded
    dest loaded_file loaded_file_path original_file_name process_exec process_guid
    process_hash process_id process_name process_path service_dll_signature_exists
    service_dll_signature_verified signature signature_id user_id vendor_product |
    `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `ms_scripting_process_loading_ldap_module_filter`'
provenance:
