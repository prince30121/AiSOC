id: splunk-security-content-3c49e5ed-625c-408c-a2c7-8e2b524efb2c
name: Microsoft Intune DeviceManagementConfigurationPolicies
description: Microsoft Intune device management configuration policies are a tool
  administrators can use to remotely manage policies and settings on intune managed
  devices. This functionality can also be abused to disable defences & evade detection.
  This detection identifies when a new device management configuration policy has
  been created.
severity: medium
enabled: false
tags:
  mitre:
  - T1072
  - T1484
  - T1021.007
  - T1562.001
  - T1562.004
  categories:
  - cloud
references:
- https://posts.specterops.io/death-from-above-lateral-movement-from-azure-to-on-prem-ad-d18cb3959d4d
- https://securityintelligence.com/x-force/detecting-intune-lateral-movement/
- https://posts.specterops.io/maestro-9ed71d38d546
logsource:
  product: splunk
detection:
  splunk_spl: '`azure_monitor_activity` operationName="* DeviceManagementConfigurationPolicy*"
    | rename identity as user, properties.TargetObjectIds{} as TargetObjectId, properties.TargetDisplayNames{}
    as TargetDisplayName, properties.Actor.IsDelegatedAdmin as user_isDelegatedAdmin
    | eval details=mvzip(''properties.Targets{}.ModifiedProperties{}.Name'',''properties.Targets{}.ModifiedProperties{}.New'',":
    ") | rex field="operationName" "^(?P<action>\w+)\s" | replace "Patch" with "updated",
    "Create" with "created", "Delete", with "deleted", "assign", with "assigned" IN
    action | eval action=if(match(operationName ,"Assignment$"),"assigned",''action'')
    | table _time operationName action user user_type user_isDelegatedAdmin TargetDisplayName
    TargetObjectId details status tenantId correlationId | `microsoft_intune_devicemanagementconfigurationpolicies_filter`'
provenance:
  source: splunk/security_content
  source_id: 3c49e5ed-625c-408c-a2c7-8e2b524efb2c
