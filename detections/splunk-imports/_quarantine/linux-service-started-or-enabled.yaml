id: splunk-security-content-e0428212-61b7-11ec-88a3-acde48001122
name: Linux Service Started Or Enabled
description: The following analytic detects the creation or enabling of services on
  Linux platforms using the systemctl or service tools. It leverages Endpoint Detection
  and Response (EDR) logs, focusing on process names, parent processes, and command-line
  executions. This activity is significant as adversaries may create or modify services
  to maintain persistence or execute malicious payloads. If confirmed malicious, this
  behavior could lead to persistent access, data theft, ransomware deployment, or
  other damaging outcomes. Monitoring and investigating such activities are crucial
  for maintaining the security and integrity of the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1053.006
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1543/003/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name IN (\"systemctl\", \"service\")\n        OR\n      \
    \  Processes.process IN (\"*systemctl *\", \"*service *\")\n    )\n    Processes.process\
    \ IN (\"* start *\", \"* enable *\") AND NOT (Processes.os=\"Microsoft Windows\"\
    \ OR Processes.vendor_product=\"Microsoft Windows\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `linux_service_started_or_enabled_filter`"
