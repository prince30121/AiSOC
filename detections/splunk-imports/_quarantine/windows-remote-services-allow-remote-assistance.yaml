id: splunk-security-content-9bce3a97-bc97-4e89-a1aa-ead151c82fbb
name: Windows Remote Services Allow Remote Assistance
description: The following analytic detects modifications in the Windows registry
  to enable remote desktop assistance on a targeted machine. It leverages data from
  the Endpoint.Registry datamodel, specifically monitoring changes to the "Control\\Terminal
  Server\\fAllowToGetHelp" registry path. This activity is significant because enabling
  remote assistance via registry is uncommon and often associated with adversaries
  or malware like Azorult. If confirmed malicious, this could allow an attacker to
  remotely access and control the compromised host, leading to potential data exfiltration
  or further system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1021.001
  categories:
  - endpoint
references:
- https://docs.microsoft.com/en-us/windows-hardware/customize/desktop/unattend/microsoft-windows-remoteassistance-exe-fallowtogethelp
- https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime FROM datamodel=Endpoint.Registry where Registry.registry_path=
    "*\\Control\\Terminal Server\\fAllowToGetHelp*" Registry.registry_value_data="0x00000001"
    by Registry.action Registry.dest Registry.process_guid Registry.process_id Registry.registry_hive
    Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)` | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `windows_remote_services_allow_remote_assistance_filter`'
