id: splunk-security-content-9b3af1e6-5b68-11eb-ae93-0242ac130002
name: Detect MSHTA Url in Command Line
description: The following analytic detects the use of Microsoft HTML Application
  Host (mshta.exe) to make remote HTTP or HTTPS connections. It leverages data from
  Endpoint Detection and Response (EDR) agents, focusing on command-line arguments
  containing URLs. This activity is significant because adversaries often use mshta.exe
  to download and execute remote .hta files, bypassing security controls. If confirmed
  malicious, this behavior could allow attackers to execute arbitrary code, potentially
  leading to system compromise, data exfiltration, or further network infiltration.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.005
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/AtomicTestHarnesses
- https://redcanary.com/blog/introducing-atomictestharnesses/
- https://docs.microsoft.com/en-us/windows/win32/search/-search-3x-wds-extidx-prot-implementing
- https://denwp.com/dissecting-lumma-malware/
- https://www.mcafee.com/blogs/other-blogs/mcafee-labs/behind-the-captcha-a-clever-gateway-of-malware/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count values(Processes.process)\
    \ as process values(Processes.parent_process) as parent_process min(_time) as\
    \ firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE\
    \ `process_mshta` (Processes.process=\"*http://*\"\n    OR\n    Processes.process=\"\
    *https://*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `detect_mshta_url_in_command_line_filter`"
