id: splunk-security-content-88103f56-8f5c-411f-a87f-71bee776f140
name: Windows Chromium Browser Launched with Small Window Size
description: The following analytic detects instances where a Chromium-based browser
  process, including Chrome, Edge, Brave, Opera, or Vivaldi, is launched with an unusually
  small window size, typically less than 100 pixels in width or height. Such configurations
  render the browser effectively invisible to the user and are uncommon in normal
  user activity. When observed on endpoints, especially in combination with automation,
  off-screen positioning, or suppression flags, this behavior may indicate attempts
  to execute web content or automated actions stealthily, bypassing user interaction
  and security controls. This analytic highlights potential malicious automation or
  covert browser-based activity.
severity: medium
enabled: false
tags:
  mitre:
  - T1497
  categories:
  - endpoint
references:
- https://www.trendmicro.com/en_us/research/26/a/analysis-of-the-evelyn-stealer-campaign.html
- https://peter.sh/experiments/chromium-command-line-switches/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` min(_time) as firstTime max(_time)\
    \ as lastTime from datamodel=Endpoint.Processes\nwhere Processes.process_name\
    \ IN (\"Chrome.exe\",\"Brave.exe\", \"Opera.exe\", \"Vivaldi.exe\", \"msedge.exe\"\
    )\nProcesses.process = \"*--window-size*\"\nby Processes.action Processes.dest\
    \ Processes.original_file_name Processes.parent_process\n   Processes.parent_process_exec\
    \ Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path Processes.process Processes.process_exec\n   Processes.process_guid\
    \ Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \   Processes.process_name Processes.process_path Processes.user Processes.user_id\
    \ Processes.vendor_product\n| rex field=Processes.process \"--window-size=(?<window_width>\\\
    d+)\\s*,\\s*(?<window_height>\\d+)\"\n| eval window_width=tonumber(window_width),\
    \ window_height=tonumber(window_height)\n| where window_height < 100 AND window_width\
    \ < 100\n| `drop_dm_object_name(Processes)`\n| fields * window_width window_height\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_chromium_browser_launched_with_small_window_size_filter`"
