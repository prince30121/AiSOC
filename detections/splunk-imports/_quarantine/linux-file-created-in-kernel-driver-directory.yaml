id: splunk-security-content-b85bbeec-6326-11ec-9311-acde48001122
name: Linux File Created In Kernel Driver Directory
description: The following analytic detects the creation of files in the Linux kernel/driver
  directory. It leverages filesystem data to identify new files in this critical directory.
  This activity is significant because the kernel/driver directory is typically reserved
  for kernel modules, and unauthorized file creation here can indicate a rootkit installation.
  If confirmed malicious, this could allow an attacker to gain high-level privileges,
  potentially compromising the entire system by executing code at the kernel level.
severity: medium
enabled: false
tags:
  mitre:
  - T1547.006
  categories:
  - endpoint
references:
- https://docs.fedoraproject.org/en-US/fedora/rawhide/system-administrators-guide/kernel-module-driver-configuration/Working_with_Kernel_Modules/
- https://security.stackexchange.com/questions/175953/how-to-load-a-malicious-lkm-at-startup
- https://0x00sec.org/t/kernel-rootkits-getting-your-hands-dirty/1485
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE Filesystem.file_path\
    \ IN (\"*/kernel/drivers/*\")\n  BY Filesystem.action Filesystem.dest Filesystem.file_access_time\n\
    \     Filesystem.file_create_time Filesystem.file_hash Filesystem.file_modify_time\n\
    \     Filesystem.file_name Filesystem.file_path Filesystem.file_acl\n     Filesystem.file_size\
    \ Filesystem.process_guid Filesystem.process_id\n     Filesystem.user Filesystem.vendor_product\n\
    | `drop_dm_object_name(Filesystem)`\n| `security_content_ctime(lastTime)`\n| `security_content_ctime(firstTime)`\n\
    | `linux_file_created_in_kernel_driver_directory_filter`"
