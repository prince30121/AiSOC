id: splunk-security-content-00af8f7f-e004-446b-9bba-2732f717ae27
name: ASL AWS EC2 Snapshot Shared Externally
description: The following analytic detects when an EC2 snapshot is shared publicly
  by analyzing AWS CloudTrail events. This detection method leverages CloudTrail logs
  to identify modifications in snapshot permissions, specifically when the snapshot
  is shared outside the originating AWS account. This activity is significant as it
  may indicate an attempt to exfiltrate sensitive data stored in the snapshot. If
  confirmed malicious, an attacker could gain unauthorized access to the snapshot's
  data, potentially leading to data breaches or further exploitation of the compromised
  information.
severity: medium
enabled: false
tags:
  mitre:
  - T1537
  categories:
  - cloud
references:
- https://labs.nettitude.com/blog/how-to-exfiltrate-aws-ec2-data/
- https://stratus-red-team.cloud/attack-techniques/AWS/aws.exfiltration.ec2-share-ebs-snapshot/
- https://hackingthe.cloud/aws/enumeration/loot_public_ebs_snapshots/
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=ModifySnapshotAttribute\n  | spath\
    \ input=api.request.data path=createVolumePermission.add.items{}.group output=group\n\
    \  | search group=all\n  | fillnull\n  | stats count min(_time) as firstTime max(_time)\
    \ as lastTime\n    BY actor.user.uid api.operation api.service.name\n       http_request.user_agent\
    \ src_endpoint.ip actor.user.account.uid\n       cloud.provider cloud.region api.request.data\n\
    \  | rename actor.user.uid as user api.operation as action api.service.name as\
    \ dest http_request.user_agent as user_agent src_endpoint.ip as src actor.user.account.uid\
    \ as vendor_account cloud.provider as vendor_product cloud.region as vendor_region\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `asl_aws_ec2_snapshot_shared_externally_filter`"
