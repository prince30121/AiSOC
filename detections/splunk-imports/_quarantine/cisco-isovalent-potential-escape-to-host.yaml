id: splunk-security-content-2b8a7a21-bec6-4e1f-84c4-7b319f45d2ab
name: Cisco Isovalent - Potential Escape to Host
description: This analytic detects potential container escape or reconnaissance attempts
  by monitoring for the rapid execution of multiple suspicious Linux commands (nsenter,
  mount, ps aux, and ls) within a short time window. The search aggregates process
  execution logs into 5-minute buckets and identifies when two or more distinct commands
  occur in quick succession. This behavior is noteworthy because attackers often chain
  these commands together to pivot from a container into the host, enumerate processes,
  or browse filesystems. For a SOC, catching these clustered command executions is
  important because it highlights possible adversary activity attempting to break
  isolation and escalate privileges inside a Kubernetes environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1611
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1611/
- https://unit42.paloaltonetworks.com/hildegard-malware-teamtnt/
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_isovalent_process_exec`\n\n(\n    process_name IN (\"nsenter\"\
    ,\"mount\",\"ps\",\"ls\")\n    OR\n    process IN (\"*nsenter*\", \"*mount*\"\
    , \"*ps aux*\", \"*ps -ef*\")\n)\n| bin _time span=5m\n| stats\n    count AS total_events\n\
    \    dc(process_name) AS distinct_cmds\n    min(_time) AS firstTime\n    max(_time)\
    \ AS lastTime\n    values(process) AS process\n    values(process_name) AS process_name\n\
    \  BY cluster_name node_name pod_name _time\n| eval duration_s = round(lastTime\
    \ - firstTime, 0)\n| where distinct_cmds >= 2 AND duration_s <= 120\n| table _time\
    \ cluster_name node_name pod_name total_events distinct_cmds duration_s firstTime\
    \ lastTime process process_name\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `cisco_isovalent___potential_escape_to_host_filter`"
