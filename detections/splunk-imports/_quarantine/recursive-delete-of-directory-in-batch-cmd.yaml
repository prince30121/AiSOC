id: splunk-security-content-ba570b3a-d356-11eb-8358-acde48001122
name: Recursive Delete of Directory In Batch CMD
description: The following analytic detects the execution of a batch command designed
  to recursively delete files or directories, a technique often used by ransomware
  like Reddot to delete files in the recycle bin and prevent recovery. It leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on command-line
  executions that include specific flags for recursive and quiet deletions. This activity
  is significant as it indicates potential ransomware behavior aimed at data destruction.
  If confirmed malicious, it could lead to significant data loss and hinder recovery
  efforts, severely impacting business operations.
severity: medium
enabled: false
tags:
  mitre:
  - T1070.004
  categories:
  - endpoint
references:
- https://app.any.run/tasks/c0f98850-af65-4352-9746-fbebadee4f05/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_cmd`\
    \ Processes.process=*/c*  Processes.process=\"* rd *\" Processes.process=\"*/s*\"\
    \ Processes.process=\"*/q*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `recursive_delete_of_directory_in_batch_cmd_filter`"
