id: splunk-security-content-13bbd574-83ac-11ec-99d4-acde48001122
name: Mimikatz PassTheTicket CommandLine Parameters
description: The following analytic detects the use of Mimikatz command line parameters
  associated with pass-the-ticket attacks. It leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on specific command-line patterns related to
  Kerberos ticket manipulation. This activity is significant because pass-the-ticket
  attacks allow adversaries to move laterally within an environment using stolen Kerberos
  tickets, bypassing normal access controls. If confirmed malicious, this could enable
  attackers to escalate privileges, access sensitive information, and maintain persistence
  within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1550.003
  categories:
  - endpoint
references:
- https://github.com/gentilkiwi/mimikatz
- https://attack.mitre.org/techniques/T1550/003/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process = \"*sekurlsa::tickets /export*\"\n        OR\n        Processes.process\
    \ = \"*kerberos::ptt*\"\n    )\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `mimikatz_passtheticket_commandline_parameters_filter`"
