id: splunk-security-content-467ed9d9-8035-470e-ad5e-ae5189283033
name: Windows Impair Defense Add Xml Applocker Rules
description: The following analytic detects the use of a PowerShell commandlet to
  import an AppLocker XML policy. This behavior is identified by monitoring processes
  that execute the "Import-Module Applocker" and "Set-AppLockerPolicy" commands with
  the "-XMLPolicy" parameter. This activity is significant because it can indicate
  an attempt to disable or bypass security controls, as seen in the Azorult malware.
  If confirmed malicious, this could allow an attacker to disable antivirus products,
  leading to further compromise and persistence within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as process min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes\n\
    \  WHERE `process_powershell`\n    AND\n    Processes.process=\"*Import-Module\
    \ Applocker*\"\n    AND\n    Processes.process=\"*Set-AppLockerPolicy *\"\n  \
    \  AND\n    Processes.process=\"* -XMLPolicy *\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_impair_defense_add_xml_applocker_rules_filter`"
