id: splunk-security-content-bff0e7a0-317f-11ec-ab4e-acde48001122
name: Wmic NonInteractive App Uninstallation
description: The following analytic identifies the use of the WMIC command-line tool
  attempting to uninstall applications non-interactively. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on specific command-line patterns
  associated with WMIC. This activity is significant because it is uncommon and may
  indicate an attempt to evade detection by uninstalling security software, as seen
  in IcedID malware campaigns. If confirmed malicious, this behavior could allow an
  attacker to disable security defenses, facilitating further compromise and persistence
  within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://thedfirreport.com/2021/10/18/icedid-to-xinglocker-ransomware-in-24-hours/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=wmic.exe\
    \ Processes.process=\"* product *\" Processes.process=\"*where name*\" Processes.process=\"\
    *call uninstall*\" Processes.process=\"*/nointeractive*\"\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `wmic_noninteractive_app_uninstallation_filter`"
