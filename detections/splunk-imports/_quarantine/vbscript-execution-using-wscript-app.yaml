id: splunk-security-content-35159940-228f-11ec-8a49-acde48001122
name: Vbscript Execution Using Wscript App
description: The following analytic detects the execution of VBScript using the wscript.exe
  application. It leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process and command-line telemetry. This activity is significant because
  wscript.exe is typically not used to execute VBScript, which is usually associated
  with cscript.exe. This deviation can indicate an attempt to evade traditional process
  monitoring and antivirus defenses. If confirmed malicious, this technique could
  allow attackers to execute arbitrary code, potentially leading to system compromise,
  data exfiltration, or further lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.005
  categories:
  - endpoint
references:
- https://www.joesandbox.com/analysis/369332/0/html
- https://malpedia.caad.fkie.fraunhofer.de/details/win.asyncrat
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.parent_process_name = \"wscript.exe\"\n        AND\n        Processes.parent_process\
    \ = \"*//e:vbscript*\"\n    )\n    OR (Processes.process_name = \"wscript.exe\"\
    \ AND Processes.process = \"*//e:vbscript*\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `vbscript_execution_using_wscript_app_filter`"
