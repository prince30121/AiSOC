id: splunk-security-content-5029b681-0462-47b7-82e7-f7e3d37f5a2d
name: ASL AWS Defense Evasion Impair Security Services
description: The following analytic detects the deletion of critical AWS Security
  Services configurations, such as CloudWatch alarms, GuardDuty detectors, and Web
  Application Firewall rules. It leverages Amazon Security Lake logs to identify specific
  API calls like "DeleteLogStream" and "DeleteDetector." This activity is significant
  because adversaries often use these actions to disable security monitoring and evade
  detection. If confirmed malicious, this could allow attackers to operate undetected,
  leading to potential data breaches, unauthorized access, and prolonged persistence
  within the AWS environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.008
  categories:
  - cloud
references:
- https://docs.aws.amazon.com/cli/latest/reference/guardduty/index.html
- https://docs.aws.amazon.com/cli/latest/reference/waf/index.html
- https://www.elastic.co/guide/en/security/current/prebuilt-rules.html
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation IN (\"DeleteLogStream\",\"DeleteDetector\"\
    ,\"DeleteIPSet\",\"DeleteWebACL\",\"DeleteRule\",\"DeleteRuleGroup\",\"DeleteLoggingConfiguration\"\
    ,\"DeleteAlarms\")\n  | fillnull\n  | stats count min(_time) as firstTime max(_time)\
    \ as lastTime\n    BY actor.user.uid api.operation api.service.name\n       http_request.user_agent\
    \ src_endpoint.ip actor.user.account.uid\n       cloud.provider cloud.region\n\
    \  | rename actor.user.uid as user api.operation as action api.service.name as\
    \ dest http_request.user_agent as user_agent src_endpoint.ip as src actor.user.account.uid\
    \ as vendor_account cloud.provider as vendor_product cloud.region as vendor_region\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `asl_aws_defense_evasion_impair_security_services_filter`"
