id: splunk-security-content-4d33a488-5b5f-11eb-ae93-0242ac130002
name: Suspicious mshta spawn
description: The following analytic detects the spawning of mshta.exe by wmiprvse.exe
  or svchost.exe. This behavior is identified using Endpoint Detection and Response
  (EDR) data, focusing on process creation events where the parent process is either
  wmiprvse.exe or svchost.exe. This activity is significant as it may indicate the
  use of a DCOM object to execute malicious scripts via mshta.exe, a common tactic
  in sophisticated attacks. If confirmed malicious, this could allow an attacker to
  execute arbitrary code, potentially leading to system compromise and further malicious
  activities.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.005
  categories:
  - endpoint
references:
- https://codewhitesec.blogspot.com/2018/07/lethalhta.html
- https://github.com/redcanaryco/AtomicTestHarnesses
- https://redcanary.com/blog/introducing-atomictestharnesses/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count values(Processes.process_name)\
    \ as process_name values(Processes.process) as process min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.parent_process_name=svchost.exe\n        OR\n        Processes.parent_process_name=wmiprvse.exe\n\
    \    )\n    AND `process_mshta`\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `suspicious_mshta_spawn_filter`"
