id: splunk-security-content-99d157cb-923f-4a00-aee9-1f385412146f
name: Windows Boot or Logon Autostart Execution In Startup Folder
description: The following analytic detects the creation of files in the Windows %startup%
  folder, a common persistence technique. It leverages the Endpoint.Filesystem data
  model to identify file creation events in this specific directory. This activity
  is significant because adversaries often use the startup folder to ensure their
  malicious code executes automatically upon system boot or user logon. If confirmed
  malicious, this could allow attackers to maintain persistence on the host, potentially
  leading to further system compromise and unauthorized access to sensitive information.
severity: medium
enabled: false
tags:
  mitre:
  - T1547.001
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1204/002/
- https://www.fortinet.com/blog/threat-research/chaos-ransomware-variant-sides-with-russia
logsource:
  product: splunk
detection:
  splunk_spl: '|tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime from datamodel=Endpoint.Filesystem where Filesystem.file_path
    = "*\\Microsoft\\Windows\\Start Menu\\Programs\\Startup\\*" by Filesystem.action
    Filesystem.dest Filesystem.file_access_time Filesystem.file_create_time Filesystem.file_hash
    Filesystem.file_modify_time Filesystem.file_name Filesystem.file_path Filesystem.file_acl
    Filesystem.file_size Filesystem.process_guid Filesystem.process_id Filesystem.user
    Filesystem.vendor_product | `drop_dm_object_name(Filesystem)` | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `windows_boot_or_logon_autostart_execution_in_startup_folder_filter`'
