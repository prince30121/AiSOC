id: splunk-security-content-e39dc429-c2a5-4f1f-9c3c-6b211af6b332
name: Windows Steal Authentication Certificates Export Certificate
description: The following analytic detects the use of the PowerShell cmdlet 'export-certificate'
  executed via the command line, indicating an attempt to export a certificate from
  the local Windows Certificate Store. This detection leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process execution logs and command-line
  arguments. Exporting certificates is significant as it may indicate credential theft
  or preparation for man-in-the-middle attacks. If confirmed malicious, this activity
  could allow an attacker to impersonate users, decrypt sensitive communications,
  or gain unauthorized access to systems and data.
severity: medium
enabled: false
tags:
  mitre:
  - T1649
  categories:
  - endpoint
references:
- https://dev.to/iamthecarisma/managing-windows-pfx-certificates-through-powershell-3pj
- https://learn.microsoft.com/en-us/powershell/module/pki/export-certificate?view=windowsserver2022-ps
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *export-certificate*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_steal_authentication_certificates_export_certificate_filter`"
provenance:
