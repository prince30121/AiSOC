id: splunk-security-content-6e0913d4-5461-487c-9dce-6d22ef2c0f03
name: Linux Telnet Authentication Bypass
description: Detects an authentication bypass in telnet tracked as CVE-2026-24061.
  An attacker can supply a specifically crafted USER environment variable (-f root)
  that is passed to /usr/bin/login. Because this input isn't sanitized an attacker
  can force the system to skip authentication and login directly as root.
severity: medium
enabled: false
tags:
  mitre:
  - T1548
  categories:
  - endpoint
references:
- https://www.safebreach.com/blog/safebreach-labs-root-cause-analysis-and-poc-exploit-for-cve-2026-24061/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = \"login\" Processes.parent_process_name = \"telnetd\" Processes.process =\
    \ \"* -p *\" Processes.process = \"* -f root*\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `linux_telnet_authentication_bypass_filter`"
