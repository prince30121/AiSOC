id: splunk-security-content-e61918fa-9ca4-11eb-836c-acde48001122
name: Windows Multiple Users Fail To Authenticate Wth ExplicitCredentials
description: The following analytic identifies a source user failing to authenticate
  with 30 unique users using explicit credentials on a host. It leverages Windows
  Event 4648, which is generated when a process attempts an account logon by explicitly
  specifying account credentials. This detection is significant as it may indicate
  a Password Spraying attack, where an adversary attempts to gain initial access or
  elevate privileges within an Active Directory environment. If confirmed malicious,
  this activity could lead to unauthorized access, privilege escalation, and potential
  compromise of sensitive information.
severity: medium
enabled: false
tags:
  mitre:
  - T1110.003
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1110/003/
- https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4648
- https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/basic-audit-logon-events
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_security` EventCode=4648 Caller_User_Name!=*$ Target_User_Name!=*$\n\
    \  | bucket span=5m _time\n  | stats dc(Target_User_Name) AS unique_accounts values(Target_User_Name)\
    \ as tried_account values(dest) as dest values(src_ip) as src_ip values(user)\
    \ as user\n    BY _time, Computer, Caller_User_Name\n  | where unique_accounts\
    \ > 30\n  | `windows_multiple_users_fail_to_authenticate_wth_explicitcredentials_filter`"
provenance:
