id: splunk-security-content-360ae6b0-38b5-4328-9e2b-bc9436cddb17
name: Windows Process Injection Wermgr Child Process
description: The following analytic identifies a suspicious instance of wermgr.exe
  spawning a child process unrelated to error or fault handling. This detection leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process relationships
  and command-line executions. This activity is significant as it can indicate Qakbot
  malware, which injects malicious code into wermgr.exe to evade detection and execute
  malicious actions. If confirmed malicious, this behavior could allow an attacker
  to conduct reconnaissance, execute arbitrary code, and persist within the network,
  posing a severe security risk.
severity: medium
enabled: false
tags:
  mitre:
  - T1055
  categories:
  - endpoint
references:
- https://twitter.com/pr0xylife/status/1585612370441031680?s=46&t=Dc3CJi4AnM-8rNoacLbScg
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name\
    \ = \"wermgr.exe\"\n    AND\n    NOT (Processes.process_name IN (\"WerFaultSecure.exe\"\
    , \"wermgr.exe\", \"WerFault.exe\"))\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_process_injection_wermgr_child_process_filter`"
