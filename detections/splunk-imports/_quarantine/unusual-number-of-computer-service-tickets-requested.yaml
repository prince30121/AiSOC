id: splunk-security-content-ac3b81c0-52f4-11ec-ac44-acde48001122
name: Unusual Number of Computer Service Tickets Requested
description: The following analytic identifies an unusual number of computer service
  ticket requests from a single source, leveraging Event ID 4769, "A Kerberos service
  ticket was requested." It uses statistical analysis, including standard deviation
  and the 3-sigma rule, to detect anomalies in service ticket requests. This activity
  is significant as it may indicate malicious behavior such as lateral movement, malware
  staging, or reconnaissance. If confirmed malicious, an attacker could gain unauthorized
  access to multiple endpoints, facilitating further compromise and potential data
  exfiltration.
severity: medium
enabled: false
tags:
  mitre:
  - T1078
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1078/
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_security` EventCode=4769 Service_Name=\"*$\" Account_Name!=\"\
    *$*\"\n  | bucket span=2m _time\n  | stats dc(Service_Name) AS unique_targets\
    \ values(Service_Name) as host_targets\n    BY _time, Client_Address, Account_Name\n\
    \  | eventstats avg(unique_targets) as comp_avg , stdev(unique_targets) as comp_std\n\
    \    BY Client_Address, Account_Name\n  | eval upperBound=(comp_avg+comp_std*3)\n\
    \  | eval isOutlier=if(unique_targets >10 and unique_targets >= upperBound, 1,\
    \ 0)\n  | `unusual_number_of_computer_service_tickets_requested_filter`"
