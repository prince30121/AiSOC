id: splunk-security-content-14f414cf-3080-4b9b-aaf6-55a4ce947b93
name: Windows Unusual Count Of Users Fail To Auth Wth ExplicitCredentials
description: The following analytic identifies a source user failing to authenticate
  with multiple users using explicit credentials on a host. It leverages Windows Event
  Code 4648 and calculates the standard deviation for each host, using the 3-sigma
  rule to detect anomalies. This behavior is significant as it may indicate a Password
  Spraying attack, where an adversary attempts to gain initial access or elevate privileges.
  If confirmed malicious, this activity could lead to unauthorized access, privilege
  escalation, or further compromise of the Active Directory environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1110.003
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1110/003/
- https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4648
- https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/basic-audit-logon-events
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_security` EventCode=4648 Caller_User_Name!=*$ Target_User_Name!=*$\n\
    \  | bucket span=5m _time\n  | stats dc(Target_User_Name) AS unique_accounts values(Target_User_Name)\
    \ as user values(dest) as dest values(src_ip) as src_ip\n    BY _time, Computer,\
    \ Caller_User_Name\n  | eventstats avg(unique_accounts) as comp_avg , stdev(unique_accounts)\
    \ as comp_std\n    BY Computer\n  | eval upperBound=(comp_avg+comp_std*3)\n  |\
    \ eval isOutlier=if(unique_accounts > 10 and unique_accounts >= upperBound, 1,\
    \ 0)\n  | search isOutlier=1\n  | `windows_unusual_count_of_users_fail_to_auth_wth_explicitcredentials_filter`"
