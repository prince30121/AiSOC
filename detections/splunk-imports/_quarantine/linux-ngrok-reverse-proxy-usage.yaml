id: splunk-security-content-bc84d574-708c-467d-b78a-4c1e20171f97
name: Linux Ngrok Reverse Proxy Usage
description: The following analytic detects the use of Ngrok on a Linux operating
  system. It leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process names and command-line arguments associated with Ngrok. This activity
  is significant because Ngrok can be used by adversaries to establish reverse proxies,
  potentially bypassing network defenses. If confirmed malicious, this could allow
  attackers to create persistent, unauthorized access channels, facilitating data
  exfiltration or further exploitation of the compromised system.
severity: medium
enabled: false
tags:
  mitre:
  - T1572
  - T1090
  - T1102
  categories:
  - endpoint
references:
- https://ngrok.com
- https://www.cisa.gov/uscert/sites/default/files/publications/aa22-320a_joint_csa_iranian_government-sponsored_apt_actors_compromise_federal%20network_deploy_crypto%20miner_credential_harvester.pdf
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=ngrok\
    \ Processes.process IN (\"*start*\", \"*--config*\",\"*http*\",\"*authtoken*\"\
    , \"*http*\", \"*tcp*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_ngrok_reverse_proxy_usage_filter`"
