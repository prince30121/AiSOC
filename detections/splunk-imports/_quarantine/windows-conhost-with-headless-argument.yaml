id: splunk-security-content-d5039508-998d-4cfc-8b5e-9dcd679d9a62
name: Windows ConHost with Headless Argument
description: The following analytic detects the unusual invocation of the Windows
  Console Host process (conhost.exe) with the undocumented --headless parameter. This
  detection leverages Endpoint Detection and Response (EDR) telemetry, specifically
  monitoring for command-line executions where conhost.exe is executed with the --headless
  argument. This activity is significant for a SOC as it is not commonly used in legitimate
  operations and may indicate an attacker's attempt to execute commands stealthily.
  If confirmed malicious, this behavior could lead to persistence, lateral movement,
  or other malicious activities, potentially resulting in data exfiltration or system
  compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1564.003
  - T1564.006
  categories:
  - endpoint
references:
- https://x.com/embee_research/status/1559410767564181504?s=20
- https://x.com/GroupIB_TI/status/1719675754886131959?s=20
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=conhost.exe\
    \ Processes.process=\"*--headless *\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_conhost_with_headless_argument_filter`"
