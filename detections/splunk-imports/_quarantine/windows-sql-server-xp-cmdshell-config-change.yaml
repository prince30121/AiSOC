id: splunk-security-content-5eb76fe2-a869-4865-8c4c-8cff424b18b1
name: Windows SQL Server xp_cmdshell Config Change
description: This detection identifies when the xp_cmdshell configuration is modified
  in SQL Server. The xp_cmdshell extended stored procedure allows execution of operating
  system commands and programs from SQL Server, making it a high-risk feature commonly
  abused by attackers for privilege escalation and lateral movement.
severity: medium
enabled: false
tags:
  mitre:
  - T1505.001
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/xp-cmdshell-transact-sql
- https://attack.mitre.org/techniques/T1505/003/
- https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/xp-cmdshell-server-configuration-option
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_application` EventCode=15457\n  | rex field=EventData_Xml\
    \ \"<Data>(?<config_name>[^<]+)</Data><Data>(?<old_value>[^<]+)</Data><Data>(?<new_value>[^<]+)</Data>\"\
    \n  | rename host as dest\n  | where config_name=\"xp_cmdshell\"\n  | eval change_type=case(\
    \ old_value=\"0\" AND new_value=\"1\", \"enabled\", old_value=\"1\" AND new_value=\"\
    0\", \"disabled\", true(), \"modified\" )\n  | eval risk_score=case( change_type=\"\
    enabled\", 90, change_type=\"disabled\", 60, true(), 70 )\n  | eval risk_message=\"\
    SQL Server xp_cmdshell was \".change_type.\" on host \".dest\n  | stats count\
    \ min(_time) as firstTime max(_time) as lastTime\n    BY dest EventCode config_name\n\
    \       change_type risk_message risk_score\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `windows_sql_server_xp_cmdshell_config_change_filter`"
provenance:
  source: splunk/security_content
  source_id: 5eb76fe2-a869-4865-8c4c-8cff424b18b1
