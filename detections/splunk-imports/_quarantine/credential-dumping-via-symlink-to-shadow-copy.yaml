id: splunk-security-content-c5eac648-fae0-4263-91a6-773df1f4c903
name: Credential Dumping via Symlink to Shadow Copy
description: The following analytic detects the creation of a symlink to a shadow
  copy, which may indicate credential dumping attempts. It leverages the Endpoint.Processes
  data model in Splunk to identify processes executing commands containing "mklink"
  and "HarddiskVolumeShadowCopy". This activity is significant because attackers often
  use this technique to manipulate or delete shadow copies, hindering system backup
  and recovery efforts. If confirmed malicious, this could prevent data restoration,
  complicate incident response, and lead to data loss or compromise. Analysts should
  review the process details, user, parent process, and any related artifacts to identify
  the attack source.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.003
  categories:
  - endpoint
references:
- https://2017.zeronights.org/wp-content/uploads/materials/ZN17_Kheirkhabarov_Hunting_for_Credentials_Dumping_in_Windows_Environment.pdf
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_cmd`\
    \ Processes.process=*mklink* Processes.process=*HarddiskVolumeShadowCopy*\n  BY\
    \ Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `credential_dumping_via_symlink_to_shadow_copy_filter`"
