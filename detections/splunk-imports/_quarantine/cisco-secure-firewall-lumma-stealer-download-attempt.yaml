id: splunk-security-content-66f22f52-fbae-4be7-a263-561dacb63613
name: Cisco Secure Firewall - Lumma Stealer Download Attempt
description: 'This analytic detects Lumma Stealer download attempts using Cisco Secure
  Firewall Intrusion Events.

  It leverages Cisco Secure Firewall Threat Defense IntrusionEvent logs to identify
  cases where Snort signatures with IDs 64797, 64798, 64799, 64800, 64801, 64167,
  64168, 64169 have been triggered. If confirmed malicious, this behavior could indicate
  an active infection of Lumma Stealer.'
severity: medium
enabled: false
tags:
  mitre:
  - T1041
  - T1573.002
  categories:
  - network
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.lumma
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_secure_firewall` EventType=IntrusionEvent signature_id IN (62710,\
    \ 62711, 62712, 62713, 62714, 62715, 62716, 62717, 64810, 64811)\n| fillnull\n\
    | stats min(_time) as firstTime max(_time) as lastTime\n        by src dest dest_port\
    \ transport signature_id signature class_desc MitreAttackGroups rule InlineResult\
    \ InlineResultReason app\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `cisco_secure_firewall___lumma_stealer_download_attempt_filter`"
