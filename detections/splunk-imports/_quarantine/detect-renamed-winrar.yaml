id: splunk-security-content-1b7bfb2c-b8e6-11eb-99ac-acde48001122
name: Detect Renamed WinRAR
description: The following analytic identifies instances where `WinRAR.exe` has been
  renamed and executed. It leverages data from Endpoint Detection and Response (EDR)
  agents, focusing on process names and original file names within the Endpoint data
  model. This activity is significant because renaming executables is a common tactic
  used by attackers to evade detection. If confirmed malicious, this could indicate
  an attempt to bypass security controls, potentially leading to unauthorized data
  extraction or further system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1560.001
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1560.001/T1560.001.md
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.original_file_name=WinRAR.exe\
    \ (Processes.process_name!=rar.exe\n    AND\n    Processes.process_name!=winrar.exe)\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `detect_renamed_winrar_filter`"
