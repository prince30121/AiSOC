id: splunk-security-content-46d676aa-40c6-4fe6-b917-d23b621f0f89
name: Windows Credentials from Password Stores Deletion
description: The following analytic detects the execution of the Windows OS tool cmdkey.exe
  with the /delete parameter. This detection leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process execution logs and command-line arguments.
  The activity is significant because cmdkey.exe can be used by attackers to delete
  stored credentials, potentially leading to privilege escalation and persistence.
  If confirmed malicious, this behavior could allow attackers to remove stored user
  credentials, hindering incident response efforts and enabling further unauthorized
  access to the compromised system.
severity: medium
enabled: false
tags:
  mitre:
  - T1555
  categories:
  - endpoint
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.darkgate
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (Processes.process_name=\"\
    cmdkey.exe\"\n    OR\n    Processes.original_file_name = \"cmdkey.exe\")\n   \
    \ AND\n    Processes.process = \"*/delete*\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_credentials_from_password_stores_deletion_filter`"
