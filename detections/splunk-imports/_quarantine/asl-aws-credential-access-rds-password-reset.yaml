id: splunk-security-content-d15e9bd9-ef64-4d84-bc04-f62955a9fee8
name: ASL AWS Credential Access RDS Password reset
description: The following analytic detects the resetting of the master user password
  for an Amazon RDS DB instance. It leverages AWS CloudTrail logs from Amazon Security
  Lake to identify events where the `ModifyDBInstance` API call includes a new `masterUserPassword`
  parameter. This activity is significant because unauthorized password resets can
  grant attackers access to sensitive data stored in production databases, such as
  credit card information, PII, and healthcare data. If confirmed malicious, this
  could lead to data breaches, regulatory non-compliance, and significant reputational
  damage. Immediate investigation is required to determine the legitimacy of the password
  reset.
severity: medium
enabled: false
tags:
  mitre:
  - T1110
  - T1586.003
  categories:
  - cloud
references:
- https://aws.amazon.com/premiumsupport/knowledge-center/reset-master-user-password-rds
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=ModifyDBInstance OR api.operation=ModifyDBCluster\n\
    \  | spath input=api.request.data\n  | search masterUserPassword=*\n  | fillnull\n\
    \  | stats count min(_time) as firstTime max(_time) as lastTime\n    BY actor.user.uid\
    \ api.operation api.service.name\n       http_request.user_agent src_endpoint.ip\
    \ actor.user.account.uid\n       cloud.provider cloud.region api.request.data\n\
    \  | rename actor.user.uid as user api.operation as action api.service.name as\
    \ dest http_request.user_agent as user_agent src_endpoint.ip as src actor.user.account.uid\
    \ as vendor_account cloud.provider as vendor_product cloud.region as vendor_region\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `asl_aws_credential_access_rds_password_reset_filter`"
