id: splunk-security-content-0cdf318b-a0dd-47d7-b257-c621c0247de8
name: User Discovery With Env Vars PowerShell
description: The following analytic detects the execution of `powershell.exe` with
  command-line arguments that use PowerShell environment variables to identify the
  current logged user. It leverages data from Endpoint Detection and Response (EDR)
  agents, focusing on process names and command-line executions. This activity is
  significant as adversaries may use it for situational awareness and Active Directory
  discovery on compromised endpoints. If confirmed malicious, this behavior could
  allow attackers to gather critical user information, aiding in further exploitation
  and lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1033
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1033/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=\"powershell.exe\"\n    )\n    (Processes.process=\"\
    *$env:UserName*\" OR Processes.process=\"*[System.Environment]::UserName*\")\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `user_discovery_with_env_vars_powershell_filter`"
