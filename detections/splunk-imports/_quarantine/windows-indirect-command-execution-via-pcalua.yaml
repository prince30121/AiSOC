id: splunk-security-content-3428ac18-a410-4823-816c-ce697d26f7a8
name: Windows Indirect Command Execution Via pcalua
description: The following analytic detects programs initiated by pcalua.exe, the
  Microsoft Windows Program Compatibility Assistant. This detection leverages data
  from Endpoint Detection and Response (EDR) agents, focusing on process and parent
  process information. While pcalua.exe can start legitimate programs, it is significant
  because attackers may use it to bypass command line execution protections. If confirmed
  malicious, this activity could allow attackers to execute arbitrary commands, potentially
  leading to unauthorized actions, privilege escalation, or persistence within the
  environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1202
  categories:
  - endpoint
references:
- https://twitter.com/KyleHanslovan/status/912659279806640128
- https://lolbas-project.github.io/lolbas/Binaries/Pcalua/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process=\"\
    *pcalua* -a*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_indirect_command_execution_via_pcalua_filter`"
