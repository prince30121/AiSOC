id: splunk-security-content-9a5a41d6-04e7-11ec-923c-acde48001122
name: Get DomainUser with PowerShell
description: The following analytic detects the execution of `powershell.exe` with
  command-line arguments used to enumerate domain users via the `Get-DomainUser` command.
  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process names and command-line executions mapped to the `Processes`
  node of the `Endpoint` data model. This activity is significant as it indicates
  potential reconnaissance efforts by adversaries or Red Teams using PowerView for
  Active Directory discovery. If confirmed malicious, this could allow attackers to
  gain situational awareness and identify valuable targets within the domain, potentially
  leading to further exploitation.
severity: medium
enabled: false
tags:
  mitre:
  - T1087.002
  categories:
  - endpoint
references:
- https://powersploit.readthedocs.io/en/latest/Recon/Get-DomainUser/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=\"cmd.exe\"\n        OR\n        Processes.process_name=\"\
    powershell*\"\n    )\n    AND Processes.process = \"*Get-DomainUser*\"\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `get_domainuser_with_powershell_filter`"
