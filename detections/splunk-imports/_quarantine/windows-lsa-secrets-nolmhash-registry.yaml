id: splunk-security-content-48cc1605-538c-4223-8382-e36bee5b540d
name: Windows LSA Secrets NoLMhash Registry
description: The following analytic detects modifications to the Windows registry
  related to the Local Security Authority (LSA) NoLMHash setting. It identifies when
  the registry value is set to 0, indicating that the system will store passwords
  in the weaker Lan Manager (LM) hash format. This detection leverages registry activity
  logs from endpoint data sources like Sysmon or EDR tools. Monitoring this activity
  is crucial as it can indicate attempts to weaken password storage security. If confirmed
  malicious, this could allow attackers to exploit weaker LM hashes, potentially leading
  to unauthorized access and credential theft.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.004
  categories:
  - endpoint
references:
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-347a
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime FROM datamodel=Endpoint.Registry WHERE (Registry.registry_path=
    "*\\System\\CurrentControlSet\\Control\\Lsa\\NoLMHash" Registry.registry_value_data
    = 0x00000000) by Registry.action Registry.dest Registry.process_guid Registry.process_id
    Registry.registry_hive Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)` | where isnotnull(registry_value_data)
    | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `windows_lsa_secrets_nolmhash_registry_filter`'
