id: splunk-security-content-773b66fe-4dd9-11ec-8289-acde48001122
name: Add or Set Windows Defender Exclusion
description: 'The following analytic detects the use of commands to add or set exclusions

  in Windows Defender. It leverages data from Endpoint Detection and Response (EDR)

  agents, focusing on command-line executions involving "Add-MpPreference" or "Set-MpPreference"

  with exclusion parameters. This activity is significant because adversaries often

  use it to bypass Windows Defender, allowing malicious code to execute undetected.

  If confirmed malicious, this behavior could enable attackers to evade antivirus

  detection, maintain persistence, and execute further malicious activities without

  interference from Windows Defender.'
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://tccontre.blogspot.com/2020/01/remcos-rat-evading-windows-defender-av.html
- https://app.any.run/tasks/cf1245de-06a7-4366-8209-8e3006f2bfe5/
- https://www.microsoft.com/security/blog/2022/01/15/destructive-malware-targeting-ukrainian-organizations/
- https://learn.microsoft.com/en-us/powershell/module/defender/add-mppreference?view=windowsserver2025-ps
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime from datamodel=Endpoint.Processes where\n(\n  Processes.process\
    \ = \"*Add-MpPreference *\"\n  OR\n  Processes.process = \"*Set-MpPreference *\"\
    \n)\nProcesses.process IN (\n      \"*-Exclusion*\",\n      \"*-ControlledFolderAccessAllowedApplications*\"\
    ,\n      \"*-AttackSurfaceReductionOnlyExclusions*\"\n      )\nby Processes.action\
    \ Processes.dest Processes.original_file_name Processes.parent_process\n   Processes.parent_process_exec\
    \ Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path Processes.process Processes.process_exec\n   Processes.process_guid\
    \ Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \   Processes.process_name Processes.process_path Processes.user Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `add_or_set_windows_defender_exclusion_filter`"
