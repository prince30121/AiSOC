id: splunk-security-content-dc7a8004-0f18-11ec-8c54-acde48001122
name: Bcdedit Command Back To Normal Mode Boot
description: The following analytic detects the execution of a suspicious `bcdedit`
  command that reconfigures a host from safe mode back to normal boot. This detection
  leverages Endpoint Detection and Response (EDR) data, focusing on command-line executions
  involving `bcdedit.exe` with specific parameters. This activity is significant as
  it may indicate the presence of ransomware, such as BlackMatter, which manipulates
  boot configurations to facilitate encryption processes. If confirmed malicious,
  this behavior could allow attackers to maintain control over the boot process, potentially
  leading to further system compromise and data encryption.
severity: medium
enabled: false
tags:
  mitre:
  - T1490
  categories:
  - endpoint
references:
- https://news.sophos.com/en-us/2021/08/09/blackmatter-ransomware-emerges-from-the-shadow-of-darkside/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = bcdedit.exe Processes.process=\"*/deletevalue*\" Processes.process=\"*{current}*\"\
    \  Processes.process=\"*safeboot*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `bcdedit_command_back_to_normal_mode_boot_filter`"
