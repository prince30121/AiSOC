id: splunk-security-content-df275a44-4527-443b-b884-7600e066e3eb
name: GetWmiObject Ds Group with PowerShell
description: 'The following analytic identifies the execution of `powershell.exe`
  with command-line arguments used to query domain groups via the `Get-WmiObject`
  cmdlet and the `-class ds_group` parameter.

  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process names and command-line executions.

  This activity is significant as it indicates potential reconnaissance efforts by
  adversaries to enumerate domain groups, which is a common step in Active Directory
  Discovery.

  If confirmed malicious, this could allow attackers to gain insights into the domain
  structure, aiding in further attacks and privilege escalation.'
severity: medium
enabled: false
tags:
  mitre:
  - T1069.002
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1069/002/
- https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.management/get-wmiobject?view=powershell-5.1
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nfrom datamodel=Endpoint.Processes where\n\n\
    (\n    `process_powershell`\n    OR\n    `process_cmd`\n)\nAND\nProcesses.process\
    \ = \"*Get-WmiObject*\"\nProcesses.process = \"*namespace *\"\nProcesses.process\
    \ = \"* root\\\\directory\\\\ldap*\"\nProcesses.process = \"* ds_group*\"\nProcesses.process\
    \ = \"*class *\"\n\nby Processes.action Processes.dest Processes.original_file_name\n\
    \   Processes.parent_process Processes.parent_process_exec\n   Processes.parent_process_guid\
    \ Processes.parent_process_id\n   Processes.parent_process_name Processes.parent_process_path\n\
    \   Processes.process Processes.process_exec Processes.process_guid\n   Processes.process_hash\
    \ Processes.process_id\n   Processes.process_integrity_level Processes.process_name\n\
    \   Processes.process_path Processes.user\n   Processes.user_id Processes.vendor_product\n\
    \n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `getwmiobject_ds_group_with_powershell_filter`"
