id: splunk-security-content-593854c5-2182-49dd-9f31-18ef697445b9
name: Windows Explorer.exe Spawning PowerShell or Cmd
description: This detection identifies instances where Windows Explorer.exe spawns
  PowerShell or cmd.exe processes, particularly focusing on executions initiated by
  LNK files. This behavior is associated with the ZDI-CAN-25373 Windows shortcut zero-day
  vulnerability, where specially crafted LNK files are used to trigger malicious code
  execution through cmd.exe or powershell.exe. This technique has been actively exploited
  by multiple APT groups in targeted attacks through both HTTP and SMB delivery methods.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.001
  - T1204.002
  categories:
  - endpoint
references:
- https://www.zerodayinitiative.com/advisories/ZDI-CAN-25373/
- https://www.trendmicro.com/en_us/research/25/c/windows-shortcut-zero-day-exploit.html
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime from datamodel=Endpoint.Processes where Processes.parent_process_path="*\\explorer.exe"
    `process_powershell` OR `process_cmd`  by  Processes.dest Processes.process_current_directory
    Processes.process_path Processes.process Processes.original_file_name Processes.parent_process
    Processes.parent_process_name Processes.parent_process_path Processes.parent_process_guid
    Processes.parent_process_id Processes.process_guid Processes.process_id Processes.user
    | `drop_dm_object_name(Processes)` | `security_content_ctime(firstTime)`| `security_content_ctime(lastTime)`
    | `windows_explorer_exe_spawning_powershell_or_cmd_filter`'
