id: splunk-security-content-60023bb6-5500-11eb-ae93-0242ac130002
name: Suspicious mshta child process
description: The following analytic identifies child processes spawned from "mshta.exe".
  It leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  specific child processes like "powershell.exe" and "cmd.exe". This activity is significant
  because "mshta.exe" is often exploited by attackers to execute malicious scripts
  or commands. If confirmed malicious, this behavior could allow an attacker to execute
  arbitrary code, escalate privileges, or maintain persistence within the environment.
  Monitoring this activity helps in early detection of potential threats leveraging
  "mshta.exe" for malicious purposes.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.005
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/AtomicTestHarnesses
- https://redcanary.com/blog/introducing-atomictestharnesses/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name=mshta.exe\n\
    \    AND\n    Processes.process_name IN (\"powershell.exe\",\"colorcpl.exe\",\
    \ \"msbuild.exe\", \"microsoft.workflow.compiler.exe\", \"searchprotocolhost.exe\"\
    , \"scrcons.exe\", \"cscript.exe\", \"wscript.exe\", \"cmd.exe\", \"bitsadmin.exe\"\
    )\n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `suspicious_mshta_child_process_filter`"
