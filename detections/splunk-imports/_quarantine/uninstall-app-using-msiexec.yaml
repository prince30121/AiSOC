id: splunk-security-content-1fca2b28-f922-11eb-b2dd-acde48001122
name: Uninstall App Using MsiExec
description: The following analytic detects the uninstallation of applications using
  msiexec with specific command-line arguments. It leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process execution logs that include command-line
  details. This activity is significant because it is an uncommon practice in enterprise
  environments and has been associated with malicious behavior, such as disabling
  antivirus software. If confirmed malicious, this could allow an attacker to remove
  security software, potentially leading to further compromise and persistence within
  the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.007
  categories:
  - endpoint
references:
- https://threadreaderapp.com/thread/1423361119926816776.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=msiexec.exe\
    \ Processes.process= \"* /qn *\" Processes.process= \"*/X*\" Processes.process=\
    \ \"*REBOOT=*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `uninstall_app_using_msiexec_filter`"
