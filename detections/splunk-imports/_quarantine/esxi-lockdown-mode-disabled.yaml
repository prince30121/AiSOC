id: splunk-security-content-07c0d28a-9a9b-409f-8d4b-65355bd19ead
name: ESXi Lockdown Mode Disabled
description: This detection identifies when Lockdown Mode is disabled on an ESXi host,
  which can indicate that a threat actor is attempting to weaken host security controls.
  Disabling Lockdown Mode allows broader remote access via SSH or the host client
  and may precede further malicious actions such as data exfiltration, lateral movement,
  or VM tampering.
severity: medium
enabled: false
tags:
  mitre:
  - T1562
  categories:
  - application
references: []
logsource:
  product: splunk
detection:
  splunk_spl: '`esxi_syslog` Message IN ("*lockdownmode.disabled*", "*Administrator
    access to the host has been enabled*") | rex field=_raw "Z (?<dest>[\w\.]+)\s"
    | stats min(_time) as firstTime max(_time) as lastTime count by dest Message |
    `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `esxi_lockdown_mode_disabled_filter`'
