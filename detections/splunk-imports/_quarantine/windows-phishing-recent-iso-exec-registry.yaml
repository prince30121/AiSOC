id: splunk-security-content-cb38ee66-8ae5-47de-bd66-231c7bbc0b2c
name: Windows Phishing Recent ISO Exec Registry
description: The following analytic detects the creation of registry artifacts when
  an ISO container is opened, clicked, or mounted on a Windows operating system. It
  leverages data from the Endpoint.Registry data model, specifically monitoring registry
  keys related to recent ISO or IMG file executions. This activity is significant
  as adversaries increasingly use container-based phishing campaigns to bypass macro-based
  document execution controls. If confirmed malicious, this behavior could indicate
  an initial access attempt, potentially leading to further exploitation, persistence,
  or data exfiltration within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1566.001
  categories:
  - endpoint
references:
- https://www.microsoft.com/security/blog/2021/05/27/new-sophisticated-email-based-attack-from-nobelium/
- https://unit42.paloaltonetworks.com/brute-ratel-c4-tool/
- https://isc.sans.edu/diary/Recent+AZORult+activity/25120
- https://tccontre.blogspot.com/2020/01/remcos-rat-evading-windows-defender-av.html
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime FROM datamodel=Endpoint.Registry where Registry.registry_path=
    "*\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\RecentDocs\\.iso*"
    OR Registry.registry_path= "*\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\RecentDocs\\.img*"
    by Registry.action Registry.dest Registry.process_guid Registry.process_id Registry.registry_hive
    Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)` | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `windows_phishing_recent_iso_exec_registry_filter`'
