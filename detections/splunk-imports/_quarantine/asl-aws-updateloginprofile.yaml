id: splunk-security-content-5b3f63a3-865b-4637-9941-f98bd1a50c0d
name: ASL AWS UpdateLoginProfile
description: The following analytic detects an AWS CloudTrail event where a user with
  permissions updates the login profile of another user. It leverages CloudTrail logs
  to identify instances where the user making the change is different from the user
  whose profile is being updated. This activity is significant because it can indicate
  privilege escalation attempts, where an attacker uses a compromised account to gain
  higher privileges. If confirmed malicious, this could allow the attacker to escalate
  their privileges, potentially leading to unauthorized access and control over sensitive
  resources within the AWS environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1136.003
  categories:
  - cloud
references:
- https://bishopfox.com/blog/privilege-escalation-in-aws
- https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation-part-2/
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=UpdateLoginProfile\n  | fillnull\n\
    \  | stats count min(_time) as firstTime max(_time) as lastTime\n    BY actor.user.uid\
    \ api.operation api.service.name\n       http_request.user_agent src_endpoint.ip\
    \ actor.user.account.uid\n       cloud.provider cloud.region\n  | rename actor.user.uid\
    \ as user api.operation as action api.service.name as dest http_request.user_agent\
    \ as user_agent src_endpoint.ip as src actor.user.account.uid as vendor_account\
    \ cloud.provider as vendor_product cloud.region as vendor_region\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `asl_aws_updateloginprofile_filter`"
