id: splunk-security-content-c3e05466-5f22-11eb-ae93-0242ac130002
name: NLTest Domain Trust Discovery
description: The following analytic identifies the execution of `nltest.exe` with
  command-line arguments `/domain_trusts` or `/all_trusts` to query Domain Trust information.
  It leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  process execution logs and command-line arguments. This activity is significant
  as it indicates potential reconnaissance efforts by adversaries to understand domain
  trust relationships, which can inform their lateral movement strategies. If confirmed
  malicious, this activity could enable attackers to map out trusted domains, facilitating
  further compromise and pivoting within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1482
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1482/T1482.md
- https://malware.news/t/lets-learn-trickbot-implements-network-collector-module-leveraging-cmd-wmi-ldap/19104
- https://attack.mitre.org/techniques/T1482/
- https://owasp.org/www-pdf-archive/Red_Team_Operating_in_a_Modern_Environment.pdf
- https://ss64.com/nt/nltest.html
- https://redcanary.com/threat-detection-report/techniques/domain-trust-discovery/
- https://thedfirreport.com/2020/10/08/ryuks-return/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=nltest.exe\n        OR\n        Processes.original_file_name=nltestrk.exe\n\
    \    )\n    (Processes.process=*/domain_trusts* OR Processes.process=*/all_trusts*)\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `nltest_domain_trust_discovery_filter`"
