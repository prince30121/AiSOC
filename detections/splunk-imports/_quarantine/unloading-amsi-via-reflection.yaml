id: splunk-security-content-a21e3484-c94d-11eb-b55b-acde48001122
name: Unloading AMSI via Reflection
description: The following analytic detects the tampering of AMSI (Antimalware Scan
  Interface) via PowerShell reflection. It leverages PowerShell Script Block Logging
  (EventCode=4104) to capture and analyze suspicious PowerShell commands, specifically
  those involving `system.management.automation.amsi`. This activity is significant
  as it indicates an attempt to bypass AMSI, a critical security feature that helps
  detect and block malicious scripts. If confirmed malicious, this could allow an
  attacker to execute harmful code undetected, leading to potential system compromise
  and data exfiltration.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.001
  - T1562
  categories:
  - endpoint
references:
- https://help.splunk.com/en/security-offerings/splunk-user-behavior-analytics/get-data-in/5.4.1/add-other-data-to-splunk-uba/configure-powershell-logging-to-see-powershell-anomalies-in-splunk-uba.
- https://blog.palantir.com/tampering-with-windows-event-tracing-background-offense-and-defense-4be7ac62ac63
- https://static1.squarespace.com/static/552092d5e4b0661088167e5c/t/59c1814829f18782e24f1fe2/1505853768977/Windows+PowerShell+Logging+Cheat+Sheet+ver+Sept+2017+v2.1.pdf
- https://www.crowdstrike.com/blog/investigating-powershell-command-and-script-logging/
logsource:
  product: splunk
detection:
  splunk_spl: "`powershell` EventCode=4104 ScriptBlockText = *system.management.automation.amsi*\n\
    \  | fillnull\n  | stats count min(_time) as firstTime max(_time) as lastTime\n\
    \    BY dest signature signature_id\n       user_id vendor_product EventID\n \
    \      Guid Opcode Name\n       Path ProcessID ScriptBlockId\n       ScriptBlockText\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `unloading_amsi_via_reflection_filter`"
