id: splunk-security-content-4890cd6b-0112-4974-a272-c5c153aee551
name: Kubernetes Scanner Image Pulling
description: The following analytic detects the pulling of known Kubernetes security
  scanner images such as kube-hunter, kube-bench, and kube-recon. It leverages Kubernetes
  logs ingested through Splunk Connect for Kubernetes, specifically monitoring for
  messages indicating the pulling of these images. This activity is significant because
  the use of security scanners can indicate an attempt to identify vulnerabilities
  within the Kubernetes environment. If confirmed malicious, this could lead to the
  discovery and exploitation of security weaknesses, potentially compromising the
  entire Kubernetes cluster.
severity: medium
enabled: false
tags:
  mitre:
  - T1526
  categories:
  - cloud
references:
- https://github.com/splunk/splunk-connect-for-kubernetes
logsource:
  product: splunk
detection:
  splunk_spl: "`kube_objects_events` object.message IN (\"Pulling image *kube-hunter*\"\
    , \"Pulling image *kube-bench*\", \"Pulling image *kube-recon*\", \"Pulling image\
    \ *kube-recon*\")\n  | rename object.* AS *\n  | rename involvedObject.* AS *\n\
    \  | rename source.host AS host\n  | eval phase=\"operate\"\n  | eval severity=\"\
    high\"\n  | stats min(_time) as firstTime max(_time) as lastTime count\n    BY\
    \ host, name, namespace,\n       kind, reason, message,\n       phase, severity\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `kubernetes_scanner_image_pulling_filter`"
provenance:
