id: splunk-security-content-db435700-4ddc-4c23-892e-49e7525d7d39
name: O365 Privileged Role Assigned
description: The following analytic identifies the assignment of sensitive and privileged
  Azure Active Directory roles to an Azure AD user. Adversaries and red teams alike
  may assign these roles to a compromised account to establish Persistence in an Azure
  AD environment. This detection leverages the O365 Universal Audit Log data source.
severity: medium
enabled: false
tags:
  mitre:
  - T1098.003
  categories:
  - cloud
references:
- https://attack.mitre.org/techniques/T1098/003/
- https://learn.microsoft.com/en-us/azure/active-directory/roles/permissions-reference
- https://learn.microsoft.com/en-us/microsoft-365/admin/add-users/about-exchange-online-admin-role?view=o365-worldwide
logsource:
  product: splunk
detection:
  splunk_spl: '`o365_management_activity` Workload=AzureActiveDirectory Operation
    IN ("Add member to role.","Add eligible member to role.") | eval user = ObjectId,
    src_user = case(match(mvindex(''Actor{}.ID'',-1),"User"),mvindex(''Actor{}.ID'',0),match(mvindex(''Actor{}.ID'',-1),"ServicePrincipal"),mvindex(''Actor{}.ID'',3),true(),mvindex(''Actor{}.ID'',0)),
    object_name = mvindex(''ModifiedProperties{}.NewValue'', mvfind(''ModifiedProperties{}.Name'',"Role\.DisplayName")),
    object_id = mvindex(''ModifiedProperties{}.NewValue'', mvfind(''ModifiedProperties{}.Name'',"Role\.TemplateId")),
    signature = Operation, result = ResultStatus, category = mvindex(''Target{}.ID'',2)
    | fillnull | stats count, min(_time) as firstTime, max(_time) as lastTime by src_user,
    src, user, category, result, object_name, object_id, signature, vendor_account,
    vendor_product, dest | lookup privileged_azure_ad_roles azuretemplateid as object_id
    OUTPUT isprvilegedadrole | search isprvilegedadrole="TRUE" category="User" | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `o365_privileged_role_assigned_filter`'
provenance:
  source: splunk/security_content
  source_id: db435700-4ddc-4c23-892e-49e7525d7d39
