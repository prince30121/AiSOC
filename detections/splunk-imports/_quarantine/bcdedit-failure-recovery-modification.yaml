id: splunk-security-content-809b31d2-5462-11eb-ae93-0242ac130002
name: BCDEdit Failure Recovery Modification
description: The following analytic detects modifications to the Windows error recovery
  boot configurations using bcdedit.exe with flags such as "recoveryenabled" and "no".
  It leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  process names, parent processes, and command-line executions. This activity is significant
  because ransomware often disables recovery options to prevent system restoration,
  making it crucial for SOC analysts to investigate. If confirmed malicious, this
  could hinder recovery efforts, allowing ransomware to cause extensive damage and
  complicate remediation.
severity: medium
enabled: false
tags:
  mitre:
  - T1490
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1490/T1490.md#atomic-test-4---windows---disable-windows-recovery-console-repair
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = bcdedit.exe Processes.process=\"*recoveryenabled*\" (Processes.process=\"\
    * no*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `bcdedit_failure_recovery_modification_filter`"
