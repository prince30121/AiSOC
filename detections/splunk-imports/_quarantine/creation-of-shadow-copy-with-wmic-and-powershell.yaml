id: splunk-security-content-2ed8b538-d284-449a-be1d-82ad1dbd186b
name: Creation of Shadow Copy with wmic and powershell
description: The following analytic detects the creation of shadow copies using "wmic"
  or "Powershell" commands. It leverages the Endpoint.Processes data model in Splunk
  to identify processes where the command includes "shadowcopy" and "create". This
  activity is significant because it may indicate an attacker attempting to manipulate
  or access data in an unauthorized manner, potentially leading to data theft or manipulation.
  If confirmed malicious, this behavior could allow attackers to backup and exfiltrate
  sensitive data or hide their tracks by restoring files to a previous state after
  an attack.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.003
  categories:
  - endpoint
references:
- https://2017.zeronights.org/wp-content/uploads/materials/ZN17_Kheirkhabarov_Hunting_for_Credentials_Dumping_in_Windows_Environment.pdf
- https://media.defense.gov/2023/May/24/2003229517/-1/-1/0/CSA_Living_off_the_Land.PDF
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_wmic`\n\
    \    OR\n    `process_powershell` Processes.process=*shadowcopy* Processes.process=*create*\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `creation_of_shadow_copy_with_wmic_and_powershell_filter`"
