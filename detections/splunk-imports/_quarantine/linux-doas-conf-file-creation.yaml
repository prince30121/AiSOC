id: splunk-security-content-f6343e86-6e09-11ec-9376-acde48001122
name: Linux Doas Conf File Creation
description: The following analytic detects the creation of the doas.conf file on
  a Linux host. This file is used by the doas utility to allow standard users to perform
  tasks as root, similar to sudo. The detection leverages filesystem data from the
  Endpoint data model, focusing on the creation of the doas.conf file. This activity
  is significant because it can indicate an attempt to gain elevated privileges, potentially
  by an adversary. If confirmed malicious, this could allow an attacker to execute
  commands with root privileges, leading to full system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://wiki.gentoo.org/wiki/Doas
- https://www.makeuseof.com/how-to-install-and-use-doas/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE Filesystem.file_path\
    \ IN (\"*/etc/doas.conf\")\n  BY Filesystem.action Filesystem.dest Filesystem.file_access_time\n\
    \     Filesystem.file_create_time Filesystem.file_hash Filesystem.file_modify_time\n\
    \     Filesystem.file_name Filesystem.file_path Filesystem.file_acl\n     Filesystem.file_size\
    \ Filesystem.process_guid Filesystem.process_id\n     Filesystem.user Filesystem.vendor_product\n\
    | `drop_dm_object_name(Filesystem)`\n| `security_content_ctime(lastTime)`\n| `security_content_ctime(firstTime)`\n\
    | `linux_doas_conf_file_creation_filter`"
