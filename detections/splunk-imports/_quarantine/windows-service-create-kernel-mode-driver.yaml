id: splunk-security-content-0b4e3b06-1b2b-4885-b752-cf06d12a90cb
name: Windows Service Create Kernel Mode Driver
description: The following analytic identifies the creation of a new kernel mode driver
  using the sc.exe command. This detection leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process execution logs that include command-line
  details. The activity is significant because adding a kernel driver is uncommon
  in regular operations and can indicate an attempt to gain low-level access to the
  system. If confirmed malicious, this could allow an attacker to execute code with
  high privileges, potentially compromising the entire system and evading traditional
  security measures.
severity: medium
enabled: false
tags:
  mitre:
  - T1068
  - T1543.003
  categories:
  - endpoint
references:
- https://www.aon.com/cyber-solutions/aon_cyber_labs/yours-truly-signed-av-driver-weaponizing-an-antivirus-driver/
- https://whiteknightlabs.com/2025/11/25/discreet-driver-loading-in-windows/
- https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/sc-config
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime from datamodel=Endpoint.Processes\n  where (Processes.process_name=sc.exe\
    \ OR Processes.original_file_name=sc.exe) Processes.process=\"*create*\" Processes.process\
    \ IN (\"*kernel*\", \"*filesys*\") Processes.process=\"*type*\"\nby Processes.action\
    \ Processes.dest Processes.original_file_name\nProcesses.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\nProcesses.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\nProcesses.process Processes.process_exec Processes.process_guid\
    \ Processes.process_hash\nProcesses.process_id Processes.process_integrity_level\
    \ Processes.process_name Processes.process_path\nProcesses.user Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_service_create_kernel_mode_driver_filter`"
