id: splunk-security-content-7173b2ad-6146-418f-85ae-c3479e4515fc
name: Linux Clipboard Data Copy
description: The following analytic detects the use of the Linux 'xclip' command to
  copy data from the clipboard. It leverages Endpoint Detection and Response (EDR)
  telemetry, focusing on process names and command-line arguments related to clipboard
  operations. This activity is significant because adversaries can exploit clipboard
  data to capture sensitive information such as passwords or IP addresses. If confirmed
  malicious, this technique could lead to unauthorized data exfiltration, compromising
  sensitive information and potentially aiding further attacks within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1115
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1115/
- https://linux.die.net/man/1/xclip
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=xclip\
    \ Processes.process IN (\"*-o *\", \"*-sel *\", \"*-selection *\", \"*clip *\"\
    ,\"*clipboard*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_clipboard_data_copy_filter`"
