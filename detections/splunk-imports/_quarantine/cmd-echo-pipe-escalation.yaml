id: splunk-security-content-eb277ba0-b96b-11eb-b00e-acde48001122
name: CMD Echo Pipe - Escalation
description: The following analytic identifies the use of named-pipe impersonation
  for privilege escalation, commonly associated with Cobalt Strike and similar frameworks.
  It detects command-line executions where `cmd.exe` uses `echo` to write to a named
  pipe, such as `cmd.exe /c echo 4sgryt3436 > \\.\Pipe\5erg53`. This detection leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process and
  command-line telemetry. This activity is significant as it indicates potential privilege
  escalation attempts. If confirmed malicious, attackers could gain elevated privileges,
  enabling further compromise and persistence within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.003
  - T1543.003
  categories:
  - endpoint
references:
- https://redcanary.com/threat-detection-report/threats/cobalt-strike/
- https://github.com/rapid7/meterpreter/blob/master/source/extensions/priv/server/elevate/namedpipe.c
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_cmd`\n\
    \    OR\n    Processes.process=*%comspec%* (Processes.process=*echo*\n    AND\n\
    \    Processes.process=*pipe*)\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `cmd_echo_pipe___escalation_filter`"
