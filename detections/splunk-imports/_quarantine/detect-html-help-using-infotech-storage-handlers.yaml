id: splunk-security-content-0b2eefa5-5508-450d-b970-3dd2fb761aec
name: Detect HTML Help Using InfoTech Storage Handlers
description: The following analytic detects the execution of hh.exe (HTML Help) using
  InfoTech Storage Handlers to load Windows script code from a Compiled HTML Help
  (CHM) file. This detection leverages data from Endpoint Detection and Response (EDR)
  agents, focusing on process names and command-line executions. This activity is
  significant because it can be used to execute malicious scripts embedded within
  CHM files, potentially leading to code execution. If confirmed malicious, this technique
  could allow an attacker to execute arbitrary code, escalate privileges, or persist
  within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.001
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1218/001/
- https://www.kb.cert.org/vuls/id/851869
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218.001/T1218.001.md
- https://lolbas-project.github.io/lolbas/Binaries/Hh/
- https://gist.github.com/mgeeky/cce31c8602a144d8f2172a73d510e0e7
- https://web.archive.org/web/20220119133748/https://cyberforensicator.com/2019/01/20/silence-dissecting-malicious-chm-files-and-performing-forensic-analysis/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_hh`\
    \ Processes.process IN (\"*its:*\", \"*mk:@MSITStore:*\")\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `detect_html_help_using_infotech_storage_handlers_filter`"
