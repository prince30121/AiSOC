id: splunk-security-content-e1912b58-ed9c-422c-bbb0-2dbc70398345
name: Linux System Reboot Via System Request Key
description: The following analytic detects the execution of the SysReq hack to reboot
  a Linux system host. It leverages Endpoint Detection and Response (EDR) data to
  identify processes executing the command to pipe 'b' to /proc/sysrq-trigger. This
  activity is significant as it is an uncommon method to reboot a system and was observed
  in the Awfulshred malware wiper. If confirmed malicious, this technique could indicate
  the presence of suspicious processes and potential system compromise, leading to
  unauthorized reboots and disruption of services.
severity: medium
enabled: false
tags:
  mitre:
  - T1529
  categories:
  - endpoint
references:
- https://www.kernel.org/doc/html/latest/admin-guide/sysrq.html
- https://cert.gov.ua/article/3718487
- https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/overview-of-the-cyber-weapons-used-in-the-ukraine-russia-war/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ IN (\"dash\", \"sudo\", \"bash\")  Processes.process =  \"* echo b &gt; *\"\
    \ Processes.process = \"*/proc/sysrq-trigger\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `linux_system_reboot_via_system_request_key_filter`"
