id: splunk-security-content-cce82b81-c716-4b6c-bac9-33e6a6925cc2
name: Windows Wmic Network Discovery
description: The following analytic detects the execution of Windows Management Instrumentation
  Command-line (WMIC) commands used for network interface discovery on a Windows system.
  Specifically, it identifies commands such as “wmic nic” that retrieve detailed information
  about the network adapters installed on the device. While these commands are commonly
  used by IT administrators for legitimate network inventory and diagnostics, they
  can also be leveraged by malicious actors for reconnaissance, enabling them to map
  network configurations and identify potential targets. Monitoring WMIC network interface
  queries allows security teams to detect suspicious or unauthorized enumeration activities,
  supporting early threat identification and response.ß
severity: medium
enabled: false
tags:
  mitre:
  - T1082
  categories:
  - endpoint
references:
- https://cert.gov.ua/article/6284730
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_wmic`\
    \ (Processes.process=\"* nic*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_wmic_network_discovery_filter`"
