id: splunk-security-content-93db24a0-fd21-45d7-9daf-84afd5a8cca2
name: Cisco Secure Firewall - Citrix NetScaler Memory Overread Attempt
description: 'This analytic detects exploitation activity of CVE-2025-5777 using Cisco
  Secure Firewall Intrusion Events.

  It leverages Cisco Secure Firewall Threat Defense IntrusionEvent logs to identify
  cases where Snort signature 65118 (Citrix NetScaler memory overread attempt) is
  triggered

  If confirmed malicious, this behavior is highly indicative of a potential exploitation
  of CVE-2025-5777.'
severity: medium
enabled: false
tags:
  mitre:
  - T1203
  - T1059
  categories:
  - network
references:
- https://support.citrix.com/support-home/kbsearch/article?articleNumber=CTX693420
- https://support.citrix.com/support-home/kbsearch/article?articleNumber=CTX693420
- https://www.netscaler.com/blog/news/critical-security-updates-for-netscaler-netscaler-gateway-and-netscaler-console/
- https://github.com/mingshenhk/CitrixBleed-2-CVE-2025-5777-PoC-
- https://horizon3.ai/attack-research/attack-blogs/cve-2025-5777-citrixbleed-2-write-up-maybe/
- https://labs.watchtowr.com/how-much-more-must-we-bleed-citrix-netscaler-memory-disclosure-citrixbleed-2-cve-2025-5777/
- https://github.com/projectdiscovery/nuclei-templates/blob/main/http/cves/2025/CVE-2025-5777.yaml
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_secure_firewall`\nEventType=IntrusionEvent\nsignature_id = 65118\n\
    | fillnull\n| stats min(_time) as firstTime\n        max(_time) as lastTime\n\
    \        values(signature_id) as signature_id\n        values(signature) as signature\n\
    \        values(class_desc) as class_desc\n        values(MitreAttackGroups) as\
    \ MitreAttackGroups\n        values(InlineResult) as InlineResult\n        values(InlineResultReason)\
    \ as InlineResultReason\n        values(src) as src\n        values(dest_port)\
    \ as dest_port\n        values(rule) as rule\n        values(transport) as transport\n\
    \        values(app) as app\n        by dest\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `cisco_secure_firewall___citrix_netscaler_memory_overread_attempt_filter`"
