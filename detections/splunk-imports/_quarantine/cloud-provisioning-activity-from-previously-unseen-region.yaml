id: splunk-security-content-5aba1860-9617-4af9-b19d-aecac16fe4f2
name: Cloud Provisioning Activity From Previously Unseen Region
description: The following analytic detects cloud provisioning activities originating
  from previously unseen regions. It leverages cloud infrastructure logs to identify
  events where resources are started or created, and cross-references these with a
  baseline of known regions. This activity is significant as it may indicate unauthorized
  access or misuse of cloud resources from unfamiliar locations. If confirmed malicious,
  this could lead to unauthorized resource creation, potential data exfiltration,
  or further compromise of cloud infrastructure.
severity: medium
enabled: false
tags:
  mitre:
  - T1078
  categories:
  - cloud
references: []
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats earliest(_time) as firstTime, latest(_time) as lastTime FROM\
    \ datamodel=Change\n  WHERE (\n        All_Changes.action=started\n        OR\n\
    \        All_Changes.action=created\n    )\n    All_Changes.status=success\n \
    \ BY All_Changes.src, All_Changes.user, All_Changes.object,\n     All_Changes.command\n\
    | `drop_dm_object_name(\"All_Changes\")`\n| iplocation src\n| where isnotnull(Region)\n\
    | lookup previously_seen_cloud_provisioning_activity_sources Region as Region\
    \ OUTPUT firstTimeSeen, enough_data\n| eventstats max(enough_data) as enough_data\n\
    | where enough_data=1\n| eval firstTimeSeenRegion=min(firstTimeSeen)\n| where\
    \ isnull(firstTimeSeenRegion) OR firstTimeSeenRegion > relative_time(now(), `previously_unseen_cloud_provisioning_activity_window`)\n\
    | `security_content_ctime(firstTime)`\n| table firstTime, src, Region, user, object,\
    \ command\n| `cloud_provisioning_activity_from_previously_unseen_region_filter`"
