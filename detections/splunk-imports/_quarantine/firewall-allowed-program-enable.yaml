id: splunk-security-content-9a8f63a8-43ac-11ec-904c-acde48001122
name: Firewall Allowed Program Enable
description: The following analytic detects the modification of a firewall rule to
  allow the execution of a specific application. This detection leverages data from
  Endpoint Detection and Response (EDR) agents, focusing on process creation events
  with command-line arguments related to firewall rule changes. This activity is significant
  as it may indicate an attempt to bypass firewall restrictions, potentially allowing
  unauthorized applications to communicate over the network. If confirmed malicious,
  this could enable an attacker to execute arbitrary code, escalate privileges, or
  maintain persistence within the target environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.004
  categories:
  - endpoint
references:
- https://app.any.run/tasks/ad4c3cda-41f2-4401-8dba-56cc2d245488/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process\
    \ = \"*firewall*\" Processes.process = \"*allow*\" Processes.process = \"*add*\"\
    \ Processes.process = \"*ENABLE*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `firewall_allowed_program_enable_filter`"
