id: splunk-security-content-2ed89ba9-c6c7-46aa-9f08-a2a1c2955aa3
name: Windows SqlWriter SQLDumper DLL Sideload
description: The following analytic detects the abuse of SqlWriter and SQLDumper executables
  to sideload the vcruntime140.dll library. It leverages Sysmon EventCode 7 logs,
  focusing on instances where SQLDumper.exe or SQLWriter.exe load vcruntime140.dll,
  excluding legitimate loads from the System32 directory. This activity is significant
  as it indicates potential DLL sideloading, a technique used by adversaries to execute
  malicious code within trusted processes. If confirmed malicious, this could allow
  attackers to execute arbitrary code, maintain persistence, and evade detection by
  blending with legitimate processes.
severity: medium
enabled: false
tags:
  mitre:
  - T1574.001
  categories:
  - endpoint
references:
- https://www.mandiant.com/resources/blog/apt29-wineloader-german-political-parties
- https://www.zscaler.com/blogs/security-research/european-diplomats-targeted-spikedwine-wineloader
logsource:
  product: splunk
detection:
  splunk_spl: '`sysmon` EventCode=7 (Image="*\\SQLDumper.exe" OR Image="*\\SQLWriter.exe")
    ImageLoaded="*\\vcruntime140.dll" NOT ImageLoaded="C:\\Windows\\System32\\*" |
    fillnull | stats count min(_time) as firstTime max(_time) as lastTime by Image
    ImageLoaded dest loaded_file loaded_file_path original_file_name process_exec
    process_guid process_hash process_id process_name process_path service_dll_signature_exists
    service_dll_signature_verified signature signature_id user_id vendor_product |
    `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`| `windows_sqlwriter_sqldumper_dll_sideload_filter`'
