id: splunk-security-content-d0f6a5e5-dbfd-46e1-8bd5-2e2905947c33
name: Windows New Deny Permission Set On Service SD Via Sc.EXE
description: 'The following analytic detects changes in a service security descriptor
  where a new deny ace has been added.

  It leverages data from Endpoint Detection and Response (EDR) agents, specifically
  searching for any process execution involving the "sc.exe" binary with the "sdset"
  flag targeting any service and adding a dedicated deny ace to specific groups.

  If confirmed malicious, this could allow an attacker to escalate their privileges,
  blind defenses and more.

  Investigate appropariate services and groups to determine if the behavior is malicious.'
severity: medium
enabled: false
tags:
  mitre:
  - T1564
  categories:
  - endpoint
references:
- https://www.sans.org/blog/red-team-tactics-hiding-windows-services/
- https://news.sophos.com/wp-content/uploads/2020/06/glupteba_final-1.pdf
- https://attack.mitre.org/techniques/T1564/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n        values(Processes.process) as process\n\
    FROM datamodel=Endpoint.Processes WHERE\n(\n    Processes.process_name=sc.exe\n\
    \    OR\n    Processes.original_file_name=sc.exe\n)\nProcesses.process=\"*sdset\
    \ *\"\nProcesses.process=\"*(D;*\"\nProcesses.process IN (\n    \"*;IU*\",\n \
    \   \"*;S-1-5-4*\",\n    \"*;SU*\",\n    \"*;S-1-5-6*\",\n    \"*;BA*\",\n   \
    \ \"*;S-1-5-32-544*\",\n    \"*;SY*\",\n    \"*;S-1-5-18*\",\n    \"*;WD*\",\n\
    \    \"*;S-1-1-0*\",\n    \"*;AU*\",\n    \"*;S-1-5-11*\",\n    \"*;LS*\",\n \
    \   \"*;S-1-5-19*\"\n)\nNOT Processes.process IN (\n    \"*macmnsvc*\",\n    \"\
    *masvc*\",\n    \"*McAfeeFramework*\",\n    \"*mfefire*\",\n    \"*mfemms*\",\n\
    \    \"*mfevtp*\",\n)\nBY Processes.action Processes.dest Processes.original_file_name\n\
    \   Processes.parent_process Processes.parent_process_exec\n   Processes.parent_process_guid\
    \ Processes.parent_process_id\n   Processes.parent_process_name Processes.parent_process_path\n\
    \   Processes.process Processes.process_exec Processes.process_guid\n   Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n   Processes.process_name\
    \ Processes.process_path Processes.user\n   Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_new_deny_permission_set_on_service_sd_via_sc_exe_filter`"
