id: splunk-security-content-d8120352-3b62-4e3c-8cb6-7b47584dd5e8
name: Windows Scheduled Task Service Spawned Shell
description: 'The following analytic detects when the Task Scheduler service ("svchost.exe
  -k netsvcs -p -s Schedule") spawns common command line, scripting, or shell execution
  binaries such as "powershell.exe" or "cmd.exe".

  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process and parent process relationships.

  This activity is significant as attackers often abuse the Task Scheduler for execution
  and persistence, blending in with legitimate Windows operations.

  If confirmed malicious, this could allow attackers to execute arbitrary code, maintain
  persistence, or escalate privileges within the environment.'
severity: medium
enabled: false
tags:
  mitre:
  - T1053.005
  - T1059
  categories:
  - endpoint
references:
- https://www.mandiant.com/resources/blog/tracking-evolution-gootloader-operations
- https://nasbench.medium.com/a-deep-dive-into-windows-scheduled-tasks-and-the-processes-running-them-218d1eed4cce
- https://attack.mitre.org/techniques/T1053/005/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\ncount min(_time) as firstTime\n\
    \      max(_time) as lastTime\n\nfrom datamodel=Endpoint.Processes where\n\nProcesses.parent_process_name=\"\
    svchost.exe\"\nProcesses.parent_process=\"*-k*\"\nProcesses.parent_process= \"\
    *netsvcs*\"\nProcesses.parent_process=\"*-p*\"\nProcesses.parent_process=\"*-s*\"\
    \nProcesses.parent_process=\"*Schedule*\"\nProcesses.process_name IN(\n    \"\
    bash.exe\",\n    \"cmd.exe\",\n    \"cscript.exe\",\n    \"ksh.exe\",\n    \"\
    powershell.exe\",\n    \"pwsh.exe\",\n    \"scrcons.exe\",\n    \"sh.exe\",\n\
    \    \"wscript.exe\",\n    \"zsh.exe\"\n)\n\nby Processes.action Processes.dest\
    \ Processes.original_file_name\n   Processes.parent_process Processes.parent_process_exec\n\
    \   Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path\n   Processes.process Processes.process_exec Processes.process_guid\n\
    \   Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \   Processes.process_name Processes.process_path Processes.user\n   Processes.user_id\
    \ Processes.vendor_product\n\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_scheduled_task_service_spawned_shell_filter`"
