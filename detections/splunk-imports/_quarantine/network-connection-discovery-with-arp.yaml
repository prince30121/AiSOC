id: splunk-security-content-ae008c0f-83bd-4ed4-9350-98d4328e15d2
name: Network Connection Discovery With Arp
description: The following analytic detects the execution of `arp.exe` with the `-a`
  flag, which is used to list network connections on a compromised system. This detection
  leverages data from Endpoint Detection and Response (EDR) agents, focusing on process
  names, command-line executions, and related telemetry. Monitoring this activity
  is significant because both Red Teams and adversaries use `arp.exe` for situational
  awareness and Active Directory discovery. If confirmed malicious, this activity
  could allow attackers to map the network, identify active devices, and plan further
  lateral movement or attacks.
severity: medium
enabled: false
tags:
  mitre:
  - T1049
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1049/
- https://www.microsoft.com/en-us/security/blog/2023/05/24/volt-typhoon-targets-us-critical-infrastructure-with-living-off-the-land-techniques/
- https://thedfirreport.com/2023/05/22/icedid-macro-ends-in-nokoyawa-ransomware/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nFROM datamodel=Endpoint.Processes WHERE\n\n\
    (\n    Processes.process_name=\"arp.exe\"\n    OR\n    Processes.process_original_file_name=\"\
    arp.exe\"\n)\nProcesses.process IN (\n    \"* -a*\",\n    \"* -g *\",\n    \"\
    * /a *\",\n    \"* /g *\"\n)\nBY Processes.action Processes.dest Processes.original_file_name\n\
    \   Processes.parent_process Processes.parent_process_exec\n   Processes.parent_process_guid\
    \ Processes.parent_process_id\n   Processes.parent_process_name Processes.parent_process_path\n\
    \   Processes.process Processes.process_exec Processes.process_guid\n   Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n   Processes.process_name\
    \ Processes.process_path Processes.user\n   Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `network_connection_discovery_with_arp_filter`"
