id: splunk-security-content-787e9dd0-4328-11ec-a029-acde48001122
name: WMIC XSL Execution via URL
description: 'The following analytic detects `wmic.exe` loading a remote XSL script

  via a URL. This detection leverages Endpoint Detection and Response (EDR) data,

  focusing on command-line executions that include HTTP/HTTPS URLs and the /FORMAT

  switch. This activity is significant as it indicates a potential application control

  bypass, allowing adversaries to execute JScript or VBScript within an XSL file.

  If confirmed malicious, this technique can enable attackers to execute arbitrary

  code, escalate privileges, or maintain persistence using a trusted Windows tool,

  posing a severe threat to the environment.'
severity: medium
enabled: false
tags:
  mitre:
  - T1220
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1220/T1220.md
- https://web.archive.org/web/20190814201250/https://subt0x11.blogspot.com/2018/04/wmicexe-whitelisting-bypass-hacking.html
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1220/T1220.md#atomic-test-4---wmic-bypass-using-remote-xsl-file
- https://securitydatasets.com/notebooks/atomic/windows/defense_evasion/SDWIN-201017061100.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime from datamodel=Endpoint.Processes where\n`process_wmic`\n\
    Processes.process IN (\"*http://*\", \"*https://*\")\nProcesses.process=\"*/format:*\"\
    \nby Processes.action Processes.dest Processes.original_file_name Processes.parent_process\n\
    \   Processes.parent_process_exec Processes.parent_process_guid Processes.parent_process_id\n\
    \   Processes.parent_process_name Processes.parent_process_path Processes.process\n\
    \   Processes.process_exec Processes.process_guid Processes.process_hash Processes.process_id\n\
    \   Processes.process_integrity_level Processes.process_name Processes.process_path\
    \ Processes.user\n   Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `wmic_xsl_execution_via_url_filter`"
