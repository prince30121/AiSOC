id: splunk-security-content-bfe94226-8c10-11eb-a4b3-acde48001122
name: CertUtil With Decode Argument
description: The following analytic detects the use of CertUtil.exe with the 'decode'
  argument, which may indicate an attempt to decode a previously encoded file, potentially
  containing malicious payloads. This detection leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on command-line executions involving CertUtil.exe.
  This activity is significant because attackers often use CertUtil to decode malicious
  files downloaded from the internet, which are then executed to compromise the system.
  If confirmed malicious, this activity could lead to unauthorized code execution,
  further system compromise, and potential data exfiltration.
severity: medium
enabled: false
tags:
  mitre:
  - T1140
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1140/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1140/T1140.md
- https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/certutil
- https://www.bleepingcomputer.com/news/security/certutilexe-could-allow-attackers-to-download-malware-while-bypassing-av/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_certutil`\
    \ Processes.process=*decode*\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `certutil_with_decode_argument_filter`"
provenance:
