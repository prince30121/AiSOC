id: splunk-security-content-cb909b3e-512b-11ec-aa31-3e22fbd008af
name: Possible Lateral Movement PowerShell Spawn
description: 'The following analytic detects the spawning of a PowerShell process
  as a child or grandchild of commonly abused processes like services.exe, wmiprvse.exe,
  svchost.exe, wsmprovhost.exe, and mmc.exe.

  It leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  process and parent process names, as well as command-line executions.

  This activity is significant as it could indicates lateral movement or remote code
  execution attempts by adversaries.

  If confirmed malicious, this behavior could allow attackers to execute code remotely,
  escalate privileges, or persist within the environment.'
severity: medium
enabled: false
tags:
