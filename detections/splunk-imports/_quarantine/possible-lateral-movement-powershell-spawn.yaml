logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\ncount min(_time) as firstTime\n\
    \      max(_time) as lastTime\nfrom datamodel=Endpoint.Processes where\n\n(\n\
    \    Processes.parent_process_name IN (\n        \"mmc.exe\",\n        \"services.exe\"\
    ,\n        \"wmiprvse.exe\",\n        \"wsmprovhost.exe\"\n    )\n    OR\n   \
    \ (\n        Processes.parent_process_name=\"svchost.exe\"\n        ```\n    \
    \    We exclude the \"Schedule\" service from the svchost.exe process. But since\
    \ there are instances where its not hosted in a dedicated svchost process, we\
    \ need to the hosting group \"netsvcs\" too\n        ```\n        NOT Processes.parent_process\
    \ IN (\n            \"*-k netsvcs*\",\n            \"*-s Schedule*\",\n      \
    \  )\n    )\n)\nAND\n(\n    Processes.process_name IN (\"powershell.exe\", \"\
    pwsh.exe\")\n    OR\n    (\n        Processes.process_name=cmd.exe\n        Processes.process\
    \ IN (\n            \"*powershell*\",\n            \"*pwsh*\"\n        )\n   \
    \ )\n)\nNOT Processes.process IN (\"*C:\\\\Windows\\\\CCM\\\\*\")\n\nby Processes.action\
    \ Processes.dest Processes.original_file_name\n   Processes.parent_process Processes.parent_process_exec\n\
    \   Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path\n   Processes.process Processes.process_exec Processes.process_guid\n\
    \   Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \   Processes.process_name Processes.process_path Processes.user\n   Processes.user_id\
    \ Processes.vendor_product\n\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `possible_lateral_movement_powershell_spawn_filter`"
