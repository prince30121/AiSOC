id: splunk-security-content-455da527-0047-4610-a3ca-b4a005c2d346
name: Windows Remote Host Computer Management Access
description: The following analytic detects the use of mmc.exe to launch Computer
  Management (compmgmt.msc) and connect to a remote machine. This technique allows
  administrators to access system management tools, including Event Viewer, Services,
  Shared Folders, and Local Users & Groups, without initiating a full remote desktop
  session. While commonly used for legitimate administrative purposes, adversaries
  may leverage this method for remote reconnaissance, privilege escalation, or persistence.
  Monitoring the execution of mmc.exe with the /computer:{hostname/ip} argument can
  help detect unauthorized system administration attempts or lateral movement within
  a network.
severity: medium
enabled: false
tags:
  mitre:
  - T1021.006
  categories:
  - endpoint
references:
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-071a
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` min(_time) as firstTime max(_time)\
    \ as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=\"\
    mmc.exe\"\n    AND\n    Processes.process = \"*compmgmt.msc *\"\n    AND\n   \
    \ Processes.process = \"*/computer:*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_remote_host_computer_management_access_filter`"
