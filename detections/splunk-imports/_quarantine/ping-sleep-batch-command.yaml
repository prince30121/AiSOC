id: splunk-security-content-ce058d6c-79f2-11ec-b476-acde48001122
name: Ping Sleep Batch Command
description: 'The following analytic identifies the execution of ping sleep batch
  commands.

  It leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  process and parent process command-line details.

  This activity is significant as it indicates an attempt to delay malicious code
  execution, potentially evading detection or sandbox analysis.

  If confirmed malicious, this technique allows attackers to bypass security measures,
  making it harder to detect and analyze their activities, thereby increasing the
  risk of prolonged unauthorized access and potential data exfiltration.'
severity: medium
enabled: false
tags:
  mitre:
  - T1497.003
  categories:
  - endpoint
references:
- https://www.microsoft.com/security/blog/2022/01/15/destructive-malware-targeting-ukrainian-organizations/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nFROM datamodel=Endpoint.Processes WHERE\n(\n\
    \    Processes.parent_process= \"*ping*\"\n    Processes.parent_process = *-n*\n\
    \    Processes.parent_process IN (\n        \"*& *\",\n        \"*&amp;*\",\n\
    \        \"*&C:*\",\n        \"*&gt;*\",\n        \"*>*\"\n    )\n)\nOR\n(\n \
    \   (\n        Processes.process_name= \"ping.exe\"\n        OR\n        Processes.original_file_name=\
    \ \"ping.exe\"\n    )\n    Processes.process = *-n*\n    Processes.process IN\
    \ (\n        \"*& *\",\n        \"*&amp;*\",\n        \"*&C:*\",\n        \"*&gt;*\"\
    ,\n        \"*>*\"\n    )\n)\n\nBY Processes.action Processes.dest Processes.original_file_name\n\
    \   Processes.parent_process Processes.parent_process_exec\n   Processes.parent_process_guid\
    \ Processes.parent_process_id\n   Processes.parent_process_name Processes.parent_process_path\n\
    \   Processes.process Processes.process_exec Processes.process_guid\n   Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n   Processes.process_name\
    \ Processes.process_path Processes.user\n   Processes.user_id Processes.vendor_product\n\
    \n| `drop_dm_object_name(\"Processes\")`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `ping_sleep_batch_command_filter`"
