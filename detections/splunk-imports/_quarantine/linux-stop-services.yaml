id: splunk-security-content-d05204a5-9f1c-4946-a7f3-4fa58d76d5fd
name: Linux Stop Services
description: The following analytic detects attempts to stop or clear a service on
  Linux systems. It leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on processes like "systemctl," "service," and "svcadm" executing stop commands.
  This activity is significant as adversaries often terminate security or critical
  services to disable defenses or disrupt operations, as seen in malware like Industroyer2.
  If confirmed malicious, this could lead to the disabling of security mechanisms,
  allowing attackers to persist, escalate privileges, or deploy destructive payloads,
  severely impacting system integrity and availability.
severity: medium
enabled: false
tags:
  mitre:
  - T1489
  categories:
  - endpoint
references:
- https://www.welivesecurity.com/2022/04/12/industroyer2-industroyer-reloaded/
- https://cert.gov.ua/article/39518
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ IN (\"systemctl\", \"service\", \"svcadm\")  Processes.process =\"*stop*\"\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_stop_services_filter`"
