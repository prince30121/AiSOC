id: splunk-security-content-f52d2db8-31f9-4aa7-a176-25779effe55c
name: Suspicious SearchProtocolHost no Command Line Arguments
description: 'The following analytic detects instances of searchprotocolhost.exe running
  without command line arguments.

  This behavior is unusual and often associated with malicious activities, such as
  those performed by Cobalt Strike.

  The detection leverages Endpoint Detection and Response (EDR) telemetry, focusing
  on process execution data.

  This activity is significant because searchprotocolhost.exe typically runs with
  specific arguments, and its absence may indicate an attempt to evade detection.

  If confirmed malicious, this could lead to unauthorized code execution, potential
  credential dumping, or other malicious actions within the environment.'
severity: medium
enabled: false
tags:
  mitre:
  - T1055
  categories:
  - endpoint
references:
- https://github.com/mandiant/red_team_tool_countermeasures/blob/master/rules/PGF/supplemental/hxioc/SUSPICIOUS%20EXECUTION%20OF%20SEARCHPROTOCOLHOST%20(METHODOLOGY).ioc
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nFROM datamodel=Endpoint.Processes WHERE\n\n\
    (\n    Processes.process_name=searchprotocolhost.exe\n    OR\n    Processes.original_file_name=searchprotocolhost.exe\n\
    )\nProcesses.process IN (\"*searchprotocolhost\",\"*searchprotocolhost.exe\",\
    \ \"*searchprotocolhost.exe\\\"\")\n\nBY Processes.action Processes.dest Processes.original_file_name\n\
    \   Processes.parent_process Processes.parent_process_exec\n   Processes.parent_process_guid\
    \ Processes.parent_process_id\n   Processes.parent_process_name Processes.parent_process_path\n\
    \   Processes.process Processes.process_exec Processes.process_guid\n   Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n   Processes.process_name\
    \ Processes.process_path Processes.user\n   Processes.user_id Processes.vendor_product\n\
    \n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `suspicious_searchprotocolhost_no_command_line_arguments_filter`"
