id: splunk-security-content-adbff89c-c1f2-4a2e-88a4-b5e645856510
name: Windows Process With NetExec Command Line Parameters
description: The following analytic detects the use of NetExec (formally CrackmapExec)
  a toolset used for post-exploitation enumeration and attack within Active Directory
  environments through command line parameters. It leverages Endpoint Detection and
  Response (EDR) data to identify specific command-line arguments associated with
  actions like ticket manipulation, kerberoasting, and password spraying. This activity
  is significant as NetExec is used by adversaries to exploit Kerberos for privilege
  escalation and lateral movement. If confirmed malicious, this could lead to unauthorized
  access, persistence, and potential compromise of sensitive information within the
  network.
severity: medium
enabled: false
tags:
  mitre:
  - T1550.003
  - T1558.003
  - T1558.004
  categories:
  - endpoint
references:
- https://www.netexec.wiki/
- https://www.johnvictorwolfe.com/2024/07/21/the-successor-to-crackmapexec/
- https://attack.mitre.org/software/S0488/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) AS firstTime,\
    \ max(_time) AS lastTime FROM datamodel=Endpoint.Processes\n  WHERE NOT Processes.os=\"\
    Linux\" Processes.process_name IN (\"nxc.exe\")\n    OR\n    Processes.original_file_name\
    \ IN (\"nxc.exe\")\n    OR\n    (Processes.process IN (\"* smb *\",\"* ssh *\"\
    ,\"* ldap *\",\"* ftp *\",\"* wmi *\",\"* winrm *\",\"* rdp *\",\"* vnc *\",\"\
    * mssql *\",\"* nfs *\")\n    AND\n    ((Processes.process = \"* -p *\"\n    AND\n\
    \    Processes.process = \"* -u *\")\n    OR\n    Processes.process IN (\"* -x\
    \ *\",\"* -M *\",\"* --*\")))\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_process_with_netexec_command_line_parameters_filter`"
