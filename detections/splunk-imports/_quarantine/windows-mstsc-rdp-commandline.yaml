id: splunk-security-content-3718549b-867e-4084-b770-790e8dab6ab8
name: Windows MSTSC RDP Commandline
description: The following analytic detects the use of the mstsc.exe command-line,
  which is commonly used to initiate Remote Desktop Protocol (RDP) connections. This
  detection focuses on instances where mstsc.exe is executed with specific parameters
  that may indicate suspicious or unauthorized remote access attempts. Monitoring
  command-line arguments such as /v:<target> for direct connections or /admin for
  administrative sessions can help identify potential misuse or lateral movement within
  a network.
severity: medium
enabled: false
tags:
  mitre:
  - T1021.001
  categories:
  - endpoint
references:
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-071a
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = \"mstsc.exe\" Processes.process = \"*/v:*\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_mstsc_rdp_commandline_filter`"
