id: splunk-security-content-e40a40a1-9fea-4554-abdf-b164422f0627
name: Windows Rdp AutomaticDestinations Deletion
description: This detection identifies the deletion of files within the AutomaticDestinations
  folder, located under a user’s AppData\Roaming\Microsoft\Windows\Recent directory.
  These files are part of the Windows Jump List feature, which records recently accessed
  files and folders tied to specific applications. Each .automaticDestinations-ms
  file corresponds to a program (e.g., Explorer, Word, Notepad) and can be valuable
  for forensic analysis of user activity. Adversaries may target this folder to erase
  evidence of their actions, such as which documents or directories were accessed
  during a session. This type of deletion is rarely seen during normal user activity
  and may indicate deliberate anti-forensic behavior. When correlated with suspicious
  logon events, RDP usage, or script execution, this activity may represent an attempt
  to cover tracks after data access, lateral movement, or staging for exfiltration.
  Detecting removal of these artifacts can highlight post-compromise cleanup efforts
  and help analysts reconstruct attacker behavior.
severity: medium
enabled: false
tags:
  mitre:
  - T1070.004
  categories:
  - endpoint
references:
- https://medium.com/@bonguides25/how-to-clear-rdp-connections-history-in-windows-cf0ffb67f344
- https://thelocalh0st.github.io/posts/rdp/
logsource:
  product: splunk
detection:
  splunk_spl: '`sysmon` EventCode=23 TargetFilename IN ("*\\Recent\\AutomaticDestinations*")
    | stats count min(_time) as firstTime, max(_time) as lastTime by action dest dvc
    file_path file_hash file_name file_modify_time process_exec process_guid process_id
    process_name process_path signature signature_id user user_id vendor_product |
    `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `windows_rdp_automaticdestinations_deletion_filter`'
