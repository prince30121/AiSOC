id: splunk-security-content-e010ddf5-e9a5-44e5-bdd6-0c919ba8fc8b
name: ASL AWS Network Access Control List Deleted
description: The following analytic detects the deletion of AWS Network Access Control
  Lists (ACLs). It leverages AWS CloudTrail logs to identify events where a user deletes
  a network ACL entry. This activity is significant because deleting a network ACL
  can remove critical access restrictions, potentially allowing unauthorized access
  to cloud instances. If confirmed malicious, this action could enable attackers to
  bypass network security controls, leading to unauthorized access, data exfiltration,
  or further compromise of the cloud environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.007
  categories:
  - cloud
references: []
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=DeleteNetworkAclEntry status=Success\n\
    \  | spath input=api.request.data path=egress output=egress\n  | spath input=api.request.data\
    \ path=networkAclId output=networkAclId\n  | search egress=false\n  | fillnull\n\
    \  | stats count min(_time) as firstTime max(_time) as lastTime\n    BY actor.user.uid\
    \ api.operation api.service.name\n       http_request.user_agent src_endpoint.ip\
    \ actor.user.account.uid\n       cloud.provider cloud.region networkAclId\n  |\
    \ rename actor.user.uid as user api.operation as action api.service.name as dest\
    \ http_request.user_agent as user_agent src_endpoint.ip as src actor.user.account.uid\
    \ as vendor_account cloud.provider as vendor_product cloud.region as vendor_region\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `asl_aws_network_access_control_list_deleted_filter`"
