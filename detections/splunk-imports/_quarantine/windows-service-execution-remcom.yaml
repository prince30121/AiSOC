id: splunk-security-content-7e3d68db-ea4d-419b-adbd-e14a525ecf09
name: Windows Service Execution RemCom
description: The following analytic identifies the execution of RemCom.exe, an open-source
  alternative to PsExec, used for lateral movement and remote command execution. It
  leverages data from Endpoint Detection and Response (EDR) agents, focusing on process
  names, original file names, and command-line arguments. This activity is significant
  as it indicates potential lateral movement within the network. If confirmed malicious,
  this could allow an attacker to execute commands remotely, potentially leading to
  further compromise and control over additional systems within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1569.002
  categories:
  - endpoint
references:
- https://www.crowdstrike.com/blog/bears-midst-intrusion-democratic-national-committee/
- https://github.com/kavika13/RemCom
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime from datamodel=Endpoint.Processes where (Processes.process_name=remcom.exe
    OR Processes.original_file_name=RemCom.exe) Processes.process="*\\*" Processes.process
    IN ("*/user:*", "*/pwd:*") by Processes.action Processes.dest Processes.original_file_name
    Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid
    Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path
    Processes.process Processes.process_exec Processes.process_guid Processes.process_hash
    Processes.process_id Processes.process_integrity_level Processes.process_name
    Processes.process_path Processes.user Processes.user_id Processes.vendor_product
    | `drop_dm_object_name(Processes)` | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
    | `windows_service_execution_remcom_filter`'
provenance:
