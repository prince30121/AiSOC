id: splunk-security-content-8f45fcf0-5b68-11eb-ae93-0242ac130002
name: Detect mshta renamed
description: The following analytic identifies instances where mshta.exe has been
  renamed and executed. It leverages Endpoint Detection and Response (EDR) data, specifically
  focusing on the original file name field to detect discrepancies. This activity
  is significant because renaming mshta.exe is a common tactic used by attackers to
  evade detection and execute malicious scripts. If confirmed malicious, this could
  allow an attacker to execute arbitrary code, potentially leading to system compromise,
  data exfiltration, or further lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.005
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/AtomicTestHarnesses
- https://redcanary.com/blog/introducing-atomictestharnesses/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name!=mshta.exe\n\
    \    AND\n    Processes.original_file_name=MSHTA.EXE\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `detect_mshta_renamed_filter`"
provenance:
