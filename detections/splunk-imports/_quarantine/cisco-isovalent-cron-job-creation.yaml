id: splunk-security-content-94531a31-a041-4777-909f-cd92ed3b71ad
name: Cisco Isovalent - Cron Job Creation
description: The following analytic detects the creation of a cron job within the
  Cisco Isovalent environment. It identifies this activity by monitoring process execution
  logs for cron job creation events. This behavior is significant for a SOC as it
  could allow an attacker to execute malicious tasks repeatedly and automatically,
  posing a threat to the Kubernetes infrastructure. If confirmed malicious, this activity
  could lead to persistent attacks, service disruptions, or unauthorized access to
  sensitive information.
severity: medium
enabled: false
tags:
  mitre:
  - T1053.003
  - T1053.007
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1053/003/
- https://medium.com/@bag0zathev2/cronjobs-for-hackers-bugbounty-article-7d51588d0fd5
- https://kubernetes.io/docs/concepts/workloads/controllers/cron-jobs/
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_isovalent_process_exec` process_name IN (\"crond\",\"cron\"\
    ,\"crontab\")\n| search pod_name!=\"\"\n| stats count\n        min(_time) as firstTime\n\
    \        max(_time) as lastTime\n        values(process) as process\n    by cluster_name\
    \ pod_name parent_process_name process_name process_exec process_id node_name\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `cisco_isovalent___cron_job_creation_filter`"
