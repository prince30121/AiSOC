id: splunk-security-content-2fa9dec8-9d8e-46d3-96c1-202c06f0e6e1
name: Windows Phishing PDF File Executes URL Link
description: The following analytic detects suspicious PDF viewer processes spawning
  browser application child processes. It leverages data from Endpoint Detection and
  Response (EDR) agents, focusing on process and parent process names. This activity
  is significant as it may indicate a PDF spear-phishing attempt where a malicious
  URL link is executed, leading to potential payload download. If confirmed malicious,
  this could allow attackers to execute code, escalate privileges, or persist in the
  environment by exploiting the user's browser to connect to a malicious site.
severity: medium
enabled: false
tags:
  mitre:
  - T1566.001
  categories:
  - endpoint
references:
- https://twitter.com/pr0xylife/status/1615382907446767616?s=20
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name\
    \  IN (\"AcroRd32.exe\", \"FoxitPDFReader.exe\") Processes.process_name IN (\"\
    firefox.exe\", \"chrome.exe\", \"iexplore.exe\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_phishing_pdf_file_executes_url_link_filter`"
