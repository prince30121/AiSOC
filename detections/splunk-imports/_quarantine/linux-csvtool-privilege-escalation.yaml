id: splunk-security-content-f8384f9e-1a5c-4c3a-96d6-8a7e5a38a8b8
name: Linux Csvtool Privilege Escalation
description: The following analytic detects the execution of the 'csvtool' command
  with 'sudo' privileges, which can allow a user to run system commands as root. This
  detection leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process execution logs that include command-line details. This activity is significant
  because it indicates a potential privilege escalation attempt, where a user could
  gain unauthorized root access. If confirmed malicious, this could lead to full system
  compromise, allowing an attacker to execute arbitrary commands, escalate privileges,
  and maintain persistent access.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/csvtool/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *csvtool*\"\n    AND\n    Processes.process=\"*call*\"\n    AND\n    Processes.process=\"\
    *sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_csvtool_privilege_escalation_filter`"
