id: splunk-security-content-5e38bd3e-5da7-483d-aa61-27f7e8c27ad1
name: Windows WMI Reconnaissance Class Query
description: 'The following analytic detects the use of WMIC (Windows Management Instrumentation
  Command-line) for reconnaissance and system information discovery on Windows endpoints.

  It identifies command-line queries targeting common Win32 WMI classes such as Win32_OperatingSystem,
  Win32_Processor, csproduct, Win32_DiskDrive, and Win32_PhysicalMemory, which are
  frequently leveraged to enumerate hardware, operating system details, and system
  configuration. Adversaries often use these queries during post-exploitation to fingerprint
  hosts, assess virtualization, and tailor follow-on activity. While WMIC usage can
  be legitimate for administrative and inventory tasks, suspicious or unexpected execution—particularly
  by non-administrative users or uncommon parent processes—may indicate malicious
  reconnaissance aligned with system discovery techniques.'
severity: medium
enabled: false
tags:
  mitre:
  - T1047
  categories:
  - endpoint
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/py.blankgrabber
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\n  as lastTime from datamodel=Endpoint.Processes where\n  (\n   \
    \ NOT Processes.parent_process_path  IN (\n        \"*:\\\\Program Files (x86)\\\
    \\*\",\n        \"*:\\\\Program Files\\\\*\",\n        \"*:\\\\Windows\\\\System32\\\
    \\*\",\n        \"*:\\\\Windows\\\\SysWOW64\\\\*\"\n    )\n    OR\n    Processes.parent_process_name\
    \ IN(\n        \"cmd.exe\",\n        \"powershell*\",\n        \"pwsh.exe\"\n\
    \    )\n  )\n  AND\n  (\n    Processes.process_name = \"wmic.exe\"\n    OR\n \
    \   Processes.original_file_name = \"wmic.exe\"\n  )\n  Processes.process IN (\n\
    \    \"*csproduct*\",\n    \"*Win32_BaseBoard*\",\n    \"*Win32_Bios*\",\n   \
    \ \"*Win32_DiskDrive*\",\n    \"*Win32_DisplayConfiguration*\",\n    \"*Win32_OperatingSystem*\"\
    ,\n    \"*Win32_PhysicalMemory*\",\n    \"*Win32_PnPEntity*\",\n    \"*Win32_Processor*\"\
    ,\n    \"*Win32_ShadowCopy*\",\n    \"*win32_ShortcutFile*\",\n    \"*win32_VideoController*\"\
    \n  )\n  by Processes.action Processes.dest Processes.original_file_name Processes.parent_process\n\
    \  Processes.parent_process_exec Processes.parent_process_guid Processes.parent_process_id\n\
    \  Processes.parent_process_name Processes.parent_process_path Processes.process\
    \ Processes.process_exec\n  Processes.process_guid Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n  Processes.process_name Processes.process_path\
    \ Processes.user Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_wmi_reconnaissance_class_query_filter`"
