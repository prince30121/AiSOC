id: splunk-security-content-c5a31f80-5888-4d81-9f78-1cc65026316e
name: GetAdComputer with PowerShell
description: The following analytic detects the execution of `powershell.exe` with
  the `Get-AdComputer` commandlet, which is used to discover remote systems within
  a domain. This detection leverages data from Endpoint Detection and Response (EDR)
  agents, focusing on process names and command-line arguments. This activity is significant
  because it indicates potential reconnaissance efforts by adversaries to map out
  domain computers, which is a common step in the attack lifecycle. If confirmed malicious,
  this behavior could allow attackers to gain situational awareness and plan further
  attacks, potentially leading to unauthorized access and data exfiltration.
severity: medium
enabled: false
tags:
  mitre:
  - T1018
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1018/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=\"powershell.exe\"\n    )\n    (Processes.process=*Get-AdComputer*)\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `getadcomputer_with_powershell_filter`"
