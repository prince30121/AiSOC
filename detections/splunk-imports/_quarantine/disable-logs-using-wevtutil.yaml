id: splunk-security-content-236e7c8e-c9d9-11eb-a824-acde48001122
name: Disable Logs Using WevtUtil
description: The following analytic detects the execution of "wevtutil.exe" with parameters
  to disable event logs. It leverages data from Endpoint Detection and Response (EDR)
  agents, focusing on process names and command-line arguments. This activity is significant
  because disabling event logs is a common tactic used by ransomware to evade detection
  and hinder forensic investigations. If confirmed malicious, this action could allow
  attackers to operate undetected, making it difficult to trace their activities and
  respond effectively to the incident.
severity: medium
enabled: false
tags:
  mitre:
  - T1070.001
  categories:
  - endpoint
references:
- https://www.bleepingcomputer.com/news/security/new-ransom-x-ransomware-used-in-texas-txdot-cyberattack/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = \"wevtutil.exe\"\n    AND\n    (Processes.process = \"*sl*\"\n    OR\n   \
    \ Processes.process = \"*set-log*\" ) Processes.process IN (\"*/e:false*\", \"\
    */enabled:false*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `disable_logs_using_wevtutil_filter`"
