id: splunk-security-content-3f519894-4276-11ec-ab02-3e22fbd008af
name: Windows Service Initiation on Remote Endpoint
description: The following analytic detects the execution of `sc.exe` with command-line
  arguments used to start a Windows Service on a remote endpoint. It leverages data
  from Endpoint Detection and Response (EDR) agents, focusing on process names and
  command-line executions. This activity is significant because adversaries may exploit
  the Service Control Manager for lateral movement and remote code execution. If confirmed
  malicious, this could allow attackers to execute arbitrary code on remote systems,
  potentially leading to further compromise and persistence within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1543.003
  categories:
  - endpoint
references:
- https://docs.microsoft.com/en-us/windows/win32/services/controlling-a-service-using-sc
- https://attack.mitre.org/techniques/T1543/003/
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime from datamodel=Endpoint.Processes where (Processes.process_name=sc.exe
    OR Processes.original_file_name=sc.exe) (Processes.process=*\\\\* AND Processes.process=*start*)
    by Processes.action Processes.dest Processes.original_file_name Processes.parent_process
    Processes.parent_process_exec Processes.parent_process_guid Processes.parent_process_id
    Processes.parent_process_name Processes.parent_process_path Processes.process
    Processes.process_exec Processes.process_guid Processes.process_hash Processes.process_id
    Processes.process_integrity_level Processes.process_name Processes.process_path
    Processes.user Processes.user_id Processes.vendor_product | `drop_dm_object_name(Processes)`
    | `security_content_ctime(firstTime)`| `security_content_ctime(lastTime)` | `windows_service_initiation_on_remote_endpoint_filter`'
provenance:
