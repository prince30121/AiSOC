id: splunk-security-content-018c1972-ca07-11eb-9473-acde48001122
name: Recon Using WMI Class
description: The following analytic detects suspicious PowerShell activity via EventCode
  4104, where WMI performs event queries to gather information on running processes
  or services. This detection leverages PowerShell Script Block Logging to identify
  specific WMI queries targeting system information classes like Win32_Bios and Win32_OperatingSystem.
  This activity is significant as it often indicates reconnaissance efforts by an
  adversary to profile the compromised machine. If confirmed malicious, the attacker
  could gain detailed system information, aiding in further exploitation or lateral
  movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1592
  - T1059.001
  categories:
  - endpoint
references:
- https://news.sophos.com/en-us/2020/05/12/maze-ransomware-1-year-counting/
- https://help.splunk.com/en/security-offerings/splunk-user-behavior-analytics/get-data-in/5.4.1/add-other-data-to-splunk-uba/configure-powershell-logging-to-see-powershell-anomalies-in-splunk-uba.
- https://blog.palantir.com/tampering-with-windows-event-tracing-background-offense-and-defense-4be7ac62ac63
- https://static1.squarespace.com/static/552092d5e4b0661088167e5c/t/59c1814829f18782e24f1fe2/1505853768977/Windows+PowerShell+Logging+Cheat+Sheet+ver+Sept+2017+v2.1.pdf
- https://www.crowdstrike.com/blog/investigating-powershell-command-and-script-logging/
- https://www.splunk.com/en_us/blog/security/hunting-for-malicious-powershell-using-script-block-logging.html
- https://www.welivesecurity.com/2022/04/12/industroyer2-industroyer-reloaded/
- https://blogs.vmware.com/security/2022/10/lockbit-3-0-also-known-as-lockbit-black.html
logsource:
  product: splunk
detection:
  splunk_spl: "`powershell` EventCode=4104 AND ScriptBlockText IN (\"*SELECT*\", \"\
    *Get-WmiObject*\") AND ScriptBlockText IN (\"*Win32_Bios*\", \"*Win32_OperatingSystem*\"\
    , \"*Win32_Processor*\", \"*Win32_ComputerSystem*\", \"*Win32_PnPEntity*\", \"\
    *Win32_ShadowCopy*\", \"*Win32_DiskDrive*\", \"*Win32_PhysicalMemory*\", \"*Win32_BaseBoard*\"\
    , \"*Win32_DisplayConfiguration*\")\n  | fillnull\n  | stats count min(_time)\
    \ as firstTime max(_time) as lastTime\n    BY dest signature signature_id\n  \
    \     user_id vendor_product EventID\n       Guid Opcode Name\n       Path ProcessID\
    \ ScriptBlockId\n       ScriptBlockText\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `recon_using_wmi_class_filter`"
