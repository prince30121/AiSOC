id: splunk-security-content-15d905f6-da6b-11eb-ab82-acde48001122
name: Spoolsv Spawning Rundll32
description: The following analytic detects the spawning of `rundll32.exe` without
  command-line arguments by `spoolsv.exe`, which is unusual and potentially indicative
  of exploitation attempts like CVE-2021-34527 (PrintNightmare). This detection leverages
  Endpoint Detection and Response (EDR) telemetry, focusing on process creation events
  where `spoolsv.exe` is the parent process. This activity is significant as `spoolsv.exe`
  typically does not spawn other processes, and such behavior could indicate an active
  exploitation attempt. If confirmed malicious, this could allow an attacker to execute
  arbitrary code, escalate privileges, or maintain persistence on the compromised
  endpoint.
severity: medium
enabled: false
tags:
  mitre:
  - T1547.012
  categories:
  - endpoint
references:
- https://www.truesec.com/hub/blog/fix-for-printnightmare-cve-2021-1675-exploit-to-keep-your-print-servers-running-while-a-patch-is-not-available
- https://www.truesec.com/hub/blog/exploitable-critical-rce-vulnerability-allows-regular-users-to-fully-compromise-active-directory-printnightmare-cve-2021-1675
- https://www.reddit.com/r/msp/comments/ob6y02/critical_vulnerability_printnightmare_exposes
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name=spoolsv.exe\
    \ `process_rundll32`\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `spoolsv_spawning_rundll32_filter`"
