id: splunk-security-content-7ab3c319-a4e7-4211-9e8c-40a049d0dba6
name: Windows Terminating Lsass Process
description: The following analytic detects a suspicious process attempting to terminate
  the Lsass.exe process. It leverages Sysmon EventCode 10 logs to identify processes
  granted PROCESS_TERMINATE access to Lsass.exe. This activity is significant because
  Lsass.exe is a critical process responsible for enforcing security policies and
  handling user credentials. If confirmed malicious, this behavior could indicate
  an attempt to perform credential dumping, privilege escalation, or evasion of security
  policies, potentially leading to unauthorized access and persistence within the
  environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://blog.talosintelligence.com/2022/03/threat-advisory-doublezero.html
logsource:
  product: splunk
detection:
  splunk_spl: "`sysmon` EventCode=10 TargetImage=*lsass.exe GrantedAccess = 0x1\n\
    \  | stats count min(_time) as firstTime max(_time) as lastTime\n    BY CallTrace\
    \ EventID GrantedAccess\n       Guid Opcode ProcessID\n       SecurityID SourceImage\
    \ SourceProcessGUID\n       SourceProcessId TargetImage TargetProcessGUID\n  \
    \     TargetProcessId UserID dest\n       granted_access parent_process_exec parent_process_guid\n\
    \       parent_process_id parent_process_name parent_process_path\n       process_exec\
    \ process_guid process_id\n       process_name process_path signature\n      \
    \ signature_id user_id vendor_product\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `windows_terminating_lsass_process_filter`"
