id: splunk-security-content-c137bfe8-6036-4cff-b77b-4e327dd0a1cf
name: Windows Proxy Via Netsh
description: The following analytic identifies the use of netsh.exe to configure a
  connection proxy, which can be leveraged for persistence by executing a helper DLL.
  It detects this activity by analyzing process creation events from Endpoint Detection
  and Response (EDR) agents, focusing on command-line executions involving "portproxy"
  and "v4tov4" parameters. This activity is significant because it indicates potential
  unauthorized network configuration changes, which could be used to maintain persistence
  or redirect network traffic. If confirmed malicious, this could allow an attacker
  to maintain covert access or manipulate network communications, posing a significant
  security risk.
severity: medium
enabled: false
tags:
  mitre:
  - T1090.001
  categories:
  - endpoint
references:
- https://www.microsoft.com/en-us/security/blog/2023/05/24/volt-typhoon-targets-us-critical-infrastructure-with-living-off-the-land-techniques/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_netsh`\
    \ Processes.process = \"* portproxy *\" Processes.process = \"* v4tov4 *\"\n \
    \ BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(\"\
    Processes\")`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_proxy_via_netsh_filter`"
