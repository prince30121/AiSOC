id: splunk-security-content-b509bbd3-0331-4aaa-8e4a-d2affe100af6
name: Linux Deletion Of Services
description: The following analytic detects the deletion of services on a Linux machine.
  It leverages filesystem event logs to identify when service files within system
  directories (e.g., /etc/systemd/, /lib/systemd/, /run/systemd/) are deleted. This
  activity is significant because attackers may delete or modify services to disable
  security features or evade defenses. If confirmed malicious, this behavior could
  indicate an attempt to impair system functionality or execute a destructive payload,
  potentially leading to system instability or data loss. Immediate investigation
  is required to determine the responsible process and user.
severity: medium
enabled: false
tags:
  mitre:
  - T1070.004
  - T1485
  categories:
  - endpoint
references:
- https://www.sentinelone.com/labs/acidrain-a-modem-wiper-rains-down-on-europe/
- https://unix.stackexchange.com/questions/224992/where-do-i-put-my-systemd-unit-file
- https://cert.gov.ua/article/3718487
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE Filesystem.action=deleted\
    \ Filesystem.file_path IN ( \"/etc/systemd/*\", \"*/lib/systemd/*\", \"*/run/systemd/*\"\
    ) Filesystem.file_path = \"*.service\"\n  BY Filesystem.action Filesystem.dest\
    \ Filesystem.file_access_time\n     Filesystem.file_create_time Filesystem.file_hash\
    \ Filesystem.file_modify_time\n     Filesystem.file_name Filesystem.file_path\
    \ Filesystem.file_acl\n     Filesystem.file_size Filesystem.process_guid Filesystem.process_id\n\
    \     Filesystem.user Filesystem.vendor_product\n| `drop_dm_object_name(Filesystem)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_deletion_of_services_filter`"
