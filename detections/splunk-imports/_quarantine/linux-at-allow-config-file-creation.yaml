id: splunk-security-content-977b3082-5f3d-11ec-b954-acde48001122
name: Linux At Allow Config File Creation
description: The following analytic detects the creation of the /etc/at.allow or /etc/at.deny
  configuration files in Linux. It leverages file creation events from the Endpoint
  datamodel to identify when these files are created. This activity is significant
  as these files control user permissions for the "at" scheduling application and
  can be abused by attackers to establish persistence. If confirmed malicious, this
  could allow unauthorized execution of malicious code, leading to potential data
  theft or further system compromise. Analysts should review the file path, creation
  time, and associated processes to assess the threat.
severity: medium
enabled: false
tags:
  mitre:
  - T1053.003
  categories:
  - endpoint
references:
- https://linuxize.com/post/at-command-in-linux/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE Filesystem.file_path\
    \ IN (\"*/etc/at.allow\", \"*/etc/at.deny\")\n  BY Filesystem.action Filesystem.dest\
    \ Filesystem.file_access_time\n     Filesystem.file_create_time Filesystem.file_hash\
    \ Filesystem.file_modify_time\n     Filesystem.file_name Filesystem.file_path\
    \ Filesystem.file_acl\n     Filesystem.file_size Filesystem.process_guid Filesystem.process_id\n\
    \     Filesystem.user Filesystem.vendor_product\n| `drop_dm_object_name(Filesystem)`\n\
    | `security_content_ctime(lastTime)`\n| `security_content_ctime(firstTime)`\n\
    | `linux_at_allow_config_file_creation_filter`"
