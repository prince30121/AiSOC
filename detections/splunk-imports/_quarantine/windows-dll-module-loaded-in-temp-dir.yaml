id: splunk-security-content-c2998141-235a-4e31-83cf-46afb5208a87
name: Windows DLL Module Loaded in Temp Dir
description: The following analytic detects instances where a Dynamic Link Library
  (DLL) is loaded from a temporary directory on a Windows system. Loading DLLs from
  non-standard paths such as %TEMP% is uncommon for legitimate applications and is
  often associated with adversary tradecraft, including DLL search order hijacking,
  side-loading, or execution of malicious payloads staged in temporary folders. Adversaries
  frequently leverage these directories because they are writable by standard users
  and often overlooked by security controls, making them convenient locations to drop
  and execute malicious files. This behavior may indicate attempts to evade detection,
  execute unauthorized code, or maintain persistence through hijacked execution flows.
  Detection of DLL loads from %TEMP% can help surface early signs of compromise and
  should be investigated in the context of the originating process, user account,
  and potential file creation or modification activity within the same directory.
severity: medium
enabled: false
tags:
  mitre:
  - T1105
  categories:
  - endpoint
references:
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-203a
- https://blog.sekoia.io/interlock-ransomware-evolving-under-the-radar/
logsource:
  product: splunk
detection:
  splunk_spl: '`sysmon` EventCode=7 NOT (ImageLoaded IN("C:\\Program Files*")) AND
    ImageLoaded="*\\temp\\*" AND ImageLoaded="*.dll" | fillnull | stats count min(_time)
    as firstTime max(_time) as lastTime by Image ImageLoaded dest loaded_file loaded_file_path
    original_file_name process_exec process_guid process_hash process_id process_name
    process_path service_dll_signature_exists service_dll_signature_verified signature
    signature_id user_id vendor_product | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
    | `windows_dll_module_loaded_in_temp_dir_filter`'
