id: splunk-security-content-47872bb4-9987-4c33-a897-4d2d1ac7d4c2
name: Windows Outlook Macro Security Modified
description: The following analytic detects the modification of the Windows Registry
  key "Level" under Outlook Security. This allows macros to execute without warning,
  which could allow malicious scripts to run without notice. This detection leverages
  data from the Endpoint.Registry datamodel, specifically looking for the registry
  value name "Level" with a value of "0x00000001". This activity is significant as
  it is commonly associated with some malware infections, indicating potential malicious
  intent to harvest email information.
severity: medium
enabled: false
tags:
  mitre:
  - T1137
  - T1008
  categories:
  - endpoint
references:
- https://lab52.io/blog/analyzing-notdoor-inside-apt28s-expanding-arsenal/
- https://hackread.com/russian-apt28-notdoor-backdoor-microsoft-outlook/
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count FROM datamodel=Endpoint.Registry
    WHERE Registry.registry_path="*\\Outlook\\Security*" Registry.registry_value_name="Level"
    Registry.registry_value_data="0x00000001" by Registry.action Registry.dest Registry.process_guid
    Registry.process_id Registry.registry_hive Registry.registry_path Registry.registry_key_name
    Registry.registry_value_data Registry.registry_value_name Registry.registry_value_type
    Registry.status Registry.user Registry.vendor_product | `drop_dm_object_name(Registry)`
    | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `windows_outlook_macro_security_modified_filter`'
provenance:
