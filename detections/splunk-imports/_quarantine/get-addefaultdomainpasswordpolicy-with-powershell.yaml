id: splunk-security-content-36e46ebe-065a-11ec-b4c7-acde48001122
name: Get ADDefaultDomainPasswordPolicy with Powershell
description: 'The following analytic detects the execution of `powershell.exe` running
  the `Get-ADDefaultDomainPasswordPolicy` cmdlet, which is used to retrieve the password
  policy in a Windows domain.

  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process names and command-line executions.

  Monitoring this activity is crucial as it can indicate attempts by adversaries to
  gather information about domain policies for situational awareness and Active Directory
  discovery.

  If confirmed malicious, this activity could lead to further reconnaissance and potential
  exploitation of domain security settings.'
severity: medium
enabled: false
tags:
  mitre:
  - T1201
  categories:
  - endpoint
references:
- https://github.com/S1ckB0y1337/Active-Directory-Exploitation-Cheat-Sheet
- https://attack.mitre.org/techniques/T1201/
- https://docs.microsoft.com/en-us/powershell/module/activedirectory/get-addefaultdomainpasswordpolicy?view=windowsserver2019-ps
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nFROM datamodel=Endpoint.Processes WHERE\n\n\
    (\n    `process_powershell`\n    OR\n    `process_cmd`\n)\nProcesses.process =\
    \ \"*Get-ADDefaultDomainPasswordPolicy*\"\n\nby Processes.action Processes.dest\
    \ Processes.original_file_name\n   Processes.parent_process Processes.parent_process_exec\n\
    \   Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path\n   Processes.process Processes.process_exec Processes.process_guid\n\
    \   Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \   Processes.process_name Processes.process_path Processes.user\n   Processes.user_id\
    \ Processes.vendor_product\n\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `get_addefaultdomainpasswordpolicy_with_powershell_filter`"
