id: splunk-security-content-0f701b38-a0fb-43fd-a83d-d12265f71f33
name: ASL AWS Defense Evasion Delete CloudWatch Log Group
description: The following analytic detects the deletion of CloudWatch log groups
  in AWS, identified through `DeleteLogGroup` events in CloudTrail logs. This method
  leverages Amazon Security Lake logs parsed in the OCSF format. The activity is significant
  because attackers may delete log groups to evade detection and disrupt logging capabilities,
  hindering incident response efforts. If confirmed malicious, this action could allow
  attackers to cover their tracks, making it difficult to trace their activities and
  potentially leading to undetected data breaches or further malicious actions within
  the compromised AWS environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.008
  categories:
  - cloud
references:
- https://attack.mitre.org/techniques/T1562/008/
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=DeleteLogGroup\n  | fillnull\n\
    \  | stats count min(_time) as firstTime max(_time) as lastTime\n    BY actor.user.uid\
    \ api.operation api.service.name\n       http_request.user_agent src_endpoint.ip\
    \ actor.user.account.uid\n       cloud.provider cloud.region\n  | rename actor.user.uid\
    \ as user api.operation as action api.service.name as dest http_request.user_agent\
    \ as user_agent src_endpoint.ip as src actor.user.account.uid as vendor_account\
    \ cloud.provider as vendor_product cloud.region as vendor_region\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `asl_aws_defense_evasion_delete_cloudwatch_log_group_filter`"
