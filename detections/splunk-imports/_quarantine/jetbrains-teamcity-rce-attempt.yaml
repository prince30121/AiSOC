id: splunk-security-content-89a58e5f-1365-4793-b45c-770abbb32b6c
name: JetBrains TeamCity RCE Attempt
description: 'The following analytic detects attempts to exploit the CVE-2023-42793
  vulnerability in JetBrains TeamCity On-Premises.

  It identifies suspicious POST requests to /app/rest/users/id:1/tokens/RPC2, leveraging
  the Web datamodel to monitor specific URL patterns and HTTP methods.

  This activity is significant as it may indicate an unauthenticated attacker attempting
  to gain administrative access via Remote Code Execution (RCE).

  If confirmed malicious, this could allow the attacker to execute arbitrary code,
  potentially compromising the entire TeamCity environment and leading to further
  unauthorized access and data breaches.'
severity: medium
enabled: false
tags:
  mitre:
  - T1190
  categories:
  - application
references:
- https://blog.jetbrains.com/teamcity/2023/09/critical-security-issue-affecting-teamcity-on-premises-update-to-2023-05-4-now/
- https://www.sonarsource.com/blog/teamcity-vulnerability/
- https://github.com/rapid7/metasploit-framework/pull/18408
- https://attackerkb.com/topics/1XEEEkGHzt/cve-2023-42793/rapid7-analysis
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nFROM datamodel=Web WHERE\n\nWeb.url=\"*/app/rest/users/id:1/tokens/RPC2*\"\
    \nWeb.status=200\nWeb.http_method=\"POST\"\n\nBY Web.http_user_agent Web.status\
    \ Web.http_method\n   Web.url Web.url_length Web.src Web.dest\n\n| `drop_dm_object_name(\"\
    Web\")`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `jetbrains_teamcity_rce_attempt_filter`"
