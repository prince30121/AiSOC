id: splunk-security-content-387c4e78-f4a4-413d-ad44-e9f7bc4642c9
name: Linux Busybox Privilege Escalation
description: The following analytic detects the execution of BusyBox with sudo privileges,
  which can lead to privilege escalation on Linux systems. It leverages data from
  Endpoint Detection and Response (EDR) agents, focusing on process creation events
  where BusyBox is executed with both 'sh' and 'sudo' commands. This activity is significant
  because it indicates a user may be attempting to gain root access, bypassing standard
  security controls. If confirmed malicious, this could allow an attacker to execute
  arbitrary commands as root, leading to full system compromise and potential persistence
  within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/busybox/
- https://man.archlinux.org/man/busybox.1.en
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *busybox*\"\n    AND\n    Processes.process=\"*sh*\"\n    AND\n    Processes.process=\"\
    *sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_busybox_privilege_escalation_filter`"
