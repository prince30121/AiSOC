id: splunk-security-content-2a9b80d3-6340-4345-11ad-212bf444d111
name: AWS CreateLoginProfile
description: The following analytic identifies the creation of a login profile for
  one AWS user by another, followed by a console login from the same source IP. It
  uses AWS CloudTrail logs to correlate the `CreateLoginProfile` and `ConsoleLogin`
  events based on the source IP and user identity. This activity is significant as
  it may indicate privilege escalation, where an attacker creates a new login profile
  to gain unauthorized access. If confirmed malicious, this could allow the attacker
  to escalate privileges and maintain persistent access to the AWS environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1136.003
  categories:
  - cloud
references:
- https://bishopfox.com/blog/privilege-escalation-in-aws
- https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation-part-2/
logsource:
  product: splunk
detection:
  splunk_spl: "`cloudtrail` eventName = CreateLoginProfile\n  | rename requestParameters.userName\
    \ as new_login_profile\n  | table src_ip eventName new_login_profile userIdentity.userName\n\
    \  | join new_login_profile src_ip [\n  | search `cloudtrail` eventName = ConsoleLogin\n\
    \  | rename userIdentity.userName  as new_login_profile\n  | stats count values(eventName)\
    \ min(_time) as firstTime max(_time) as lastTime\n    BY eventSource aws_account_id\
    \ errorCode\n       user_agent eventID awsRegion\n       userIdentity.principalId\
    \ user_arn new_login_profile\n       src_ip dest vendor_account\n       vendor_region\
    \ vendor_product\n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`]\n\
    \  | rename user_arn as user\n  | `aws_createloginprofile_filter`"
provenance:
  source: splunk/security_content
  source_id: 2a9b80d3-6340-4345-11ad-212bf444d111
