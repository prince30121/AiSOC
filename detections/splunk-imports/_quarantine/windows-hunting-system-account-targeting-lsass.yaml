id: splunk-security-content-1c6abb08-73d1-11ec-9ca0-acde48001122
name: Windows Hunting System Account Targeting Lsass
description: The following analytic identifies processes attempting to access Lsass.exe,
  which may indicate credential dumping or applications needing credential access.
  It leverages Sysmon EventCode 10 to detect such activities by analyzing fields like
  TargetImage, GrantedAccess, and SourceImage. This behavior is significant as unauthorized
  access to Lsass.exe can lead to credential theft, posing a severe security risk.
  If confirmed malicious, attackers could gain access to sensitive credentials, potentially
  leading to privilege escalation and further compromise of the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.001
  categories:
  - endpoint
references:
- https://en.wikipedia.org/wiki/Local_Security_Authority_Subsystem_Service
- https://docs.microsoft.com/en-us/windows/win32/api/minidumpapiset/nf-minidumpapiset-minidumpwritedump
- https://cyberwardog.blogspot.com/2017/03/chronicles-of-threat-hunter-hunting-for_22.html
- https://raw.githubusercontent.com/PowerShellMafia/PowerSploit/master/Exfiltration/Invoke-Mimikatz.ps1
- https://docs.microsoft.com/en-us/windows/win32/procthread/process-security-and-access-rights?redirectedfrom=MSDN
logsource:
  product: splunk
detection:
  splunk_spl: "`sysmon` EventCode=10 TargetImage=*lsass.exe\n  | stats count min(_time)\
    \ as firstTime max(_time) as lastTime\n    BY CallTrace EventID GrantedAccess\n\
    \       Guid Opcode ProcessID\n       SecurityID SourceImage SourceProcessGUID\n\
    \       SourceProcessId TargetImage TargetProcessGUID\n       TargetProcessId\
    \ UserID dest\n       granted_access parent_process_exec parent_process_guid\n\
    \       parent_process_id parent_process_name parent_process_path\n       process_exec\
    \ process_guid process_id\n       process_name process_path signature\n      \
    \ signature_id user_id vendor_product\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `windows_hunting_system_account_targeting_lsass_filter`"
