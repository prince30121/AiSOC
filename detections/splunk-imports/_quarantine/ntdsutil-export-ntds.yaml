id: splunk-security-content-da63bc76-61ae-11eb-ae93-0242ac130002
name: Ntdsutil Export NTDS
description: The following analytic detects the use of Ntdsutil to export the Active
  Directory database (NTDS.dit). It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process names and command-line arguments. This activity
  is significant because exporting NTDS.dit can be a precursor to offline password
  cracking, posing a severe security risk. If confirmed malicious, an attacker could
  gain access to sensitive credentials, potentially leading to unauthorized access
  and privilege escalation within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.003
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.003/T1003.003.md#atomic-test-3---dump-active-directory-database-with-ntdsutil
- https://docs.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2012-R2-and-2012/cc753343(v=ws.11)
- https://2017.zeronights.org/wp-content/uploads/materials/ZN17_Kheirkhabarov_Hunting_for_Credentials_Dumping_in_Windows_Environment.pdf
- https://strontic.github.io/xcyclopedia/library/vss_ps.dll-97B15BDAE9777F454C9A6BA25E938DB3.html
- https://www.microsoft.com/en-us/security/blog/2023/05/24/volt-typhoon-targets-us-critical-infrastructure-with-living-off-the-land-techniques/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=ntdsutil.exe Processes.process=*ntds* Processes.process=*create*\n\
    \    )\n  BY Processes.action Processes.dest Processes.original_file_name\n  \
    \   Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `ntdsutil_export_ntds_filter`"
