id: splunk-security-content-1e1dedc6-f6f3-41a0-9dd7-a1245904fe75
name: Windows Process Injection into Commonly Abused Processes
description: The following analytic detects process injection into executables that
  are commonly abused using Sysmon EventCode 10. It identifies suspicious GrantedAccess
  requests (0x40 and 0x1fffff) to processes such as notepad.exe, wordpad.exe and calc.exe,
  excluding common system paths like System32, Syswow64, and Program Files. This behavior
  is often associated with the SliverC2 framework by BishopFox. Monitoring this activity
  is crucial as it may indicate an initial payload attempting to execute malicious
  code. If confirmed malicious, this could allow attackers to execute arbitrary code,
  potentially leading to privilege escalation or persistent access within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1055.002
  categories:
  - endpoint
references:
- https://dominicbreuker.com/post/learning_sliver_c2_08_implant_basics/
- https://www.cybereason.com/blog/sliver-c2-leveraged-by-many-threat-actors
- https://redcanary.com/threat-detection-report/techniques/process-injection/
logsource:
  product: splunk
detection:
  splunk_spl: "`sysmon`\nEventCode=10\nTargetImage IN (\n    \"*\\\\backgroundtaskhost.exe\"\
    ,\n    \"*\\\\calc.exe\",\n    \"*\\\\CalculatorApp.exe\",\n    \"*\\\\chrome.exe\"\
    ,\n    \"*\\\\dllhost.exe\",\n    \"*\\\\edge.exe\",\n    \"*\\\\firefox.exe\"\
    ,\n    \"*\\\\lsass.exe\",\n    \"*\\\\mspaint.exe\",\n    \"*\\\\notepad.exe\"\
    ,\n    \"*\\\\regsvr32.exe\",\n    \"*\\\\searchprotocolhost.exe\",\n    \"*\\\
    \\spoolsv.exe\",\n    \"*\\\\svchost.exe\",\n    \"*\\\\werfault.exe\",\n    \"\
    *\\\\win32calc.exe\",\n    \"*\\\\wordpad.exe\",\n    \"*\\\\wuauclt.exe\"\n)\n\
    \nNOT SourceImage IN (\n    \"*:\\\\Windows\\\\Program Files (x86)\\\\*\",\n \
    \   \"*:\\\\Windows\\\\Program Files\\\\*\",\n    \"*:\\\\Windows\\\\System32\\\
    \\*\",\n    \"*:\\\\Windows\\\\SysWOW64\\\\*\"\n)\n\nGrantedAccess IN (\n    \"\
    0x1f3fff\",\n    \"0x1fffff\",\n    \"0x40\"\n)\n\n| stats values(user) as user\n\
    \        min(_time) as firstTime\n        max(_time) as lastTime count\nby dest\
    \ user_id parent_process_name parent_process_guid\n   process_name process_guid\
    \ process_id signature SourceImage\n   TargetImage GrantedAccess CallTrace\n\n\
    | eval CallTrace=split(CallTrace, \"|\")\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| table firstTime lastTime dest user_id\
    \ parent_process_name parent_process_guid process_name process_guid process_id\
    \ signature SourceImage TargetImage GrantedAccess CallTrace\n| `windows_process_injection_into_commonly_abused_processes_filter`"
