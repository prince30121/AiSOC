id: splunk-security-content-584f4884-0bf1-11ec-a5ec-acde48001122
name: Get-ForestTrust with PowerShell
description: The following analytic detects the execution of the Get-ForestTrust command
  via PowerShell, commonly used by adversaries to gather domain trust information.
  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process names and command-line executions. Identifying this activity
  is crucial as it indicates potential reconnaissance efforts to map out domain trusts,
  which can inform further attacks. If confirmed malicious, this activity could allow
  attackers to understand domain relationships, aiding in lateral movement and privilege
  escalation within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1482
  categories:
  - endpoint
references:
- https://powersploit.readthedocs.io/en/latest/Recon/Get-ForestTrust/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=powershell.exe\n\
    \    OR\n    Processes.process_name=cmd.exe Processes.process=*get-foresttrust*\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `get_foresttrust_with_powershell_filter`"
