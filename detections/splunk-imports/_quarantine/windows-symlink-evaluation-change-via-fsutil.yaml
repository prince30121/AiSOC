id: splunk-security-content-9777e7e3-2499-4a16-a519-ebe33630c1e8
name: Windows Symlink Evaluation Change via Fsutil
description: 'This analytic detects the execution of the Windows built-in tool Fsutil.exe
  with

  the "behavior", "set" and "SymlinkEvaluation" parameters.

  Attackers can abuse this to alter symlink evaluation behavior on Windows, potentially
  enabling remote traversal over SMB shares or evading defenses.

  Such changes should be uncommon or even rare in enterprise environments and should
  be investigated.'
severity: medium
enabled: false
tags:
  mitre:
  - T1222.001
  categories:
  - endpoint
references:
- https://learn.microsoft.com/windows-server/administration/windows-commands/fsutil-behavior
- https://www.group-ib.com/blog/blackcat/
- https://www.intrinsec.com/alphv-ransomware-gang-analysis/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n    count min(_time) as\
    \ firstTime max(_time) as lastTime\n  from datamodel=Endpoint.Processes where\n\
    \n  (\n    Processes.process_name=\"fsutil.exe\"\n    OR Processes.original_file_name=\"\
    fsutil.exe\"\n  )\n\n  Processes.process=\"*behavior*\"\n  Processes.process=\"\
    *set*\"\n  Processes.process=\"*SymlinkEvaluation*\"\n\n  by Processes.action\
    \ Processes.dest Processes.original_file_name Processes.parent_process\n  Processes.parent_process_exec\
    \ Processes.parent_process_guid Processes.parent_process_id\n  Processes.parent_process_name\
    \ Processes.parent_process_path Processes.process Processes.process_exec\n  Processes.process_guid\
    \ Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \  Processes.process_name Processes.process_path Processes.user Processes.user_id\
    \ Processes.vendor_product\n\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_symlink_evaluation_change_via_fsutil_filter`"
provenance:
  source: splunk/security_content
  source_id: 9777e7e3-2499-4a16-a519-ebe33630c1e8
