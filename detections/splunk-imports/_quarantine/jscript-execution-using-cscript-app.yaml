id: splunk-security-content-002f1e24-146e-11ec-a470-acde48001122
name: Jscript Execution Using Cscript App
description: The following analytic detects the execution of JScript using the cscript.exe
  process. It leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process and command-line telemetry. This behavior is significant because JScript
  files are typically executed by wscript.exe, making cscript.exe execution unusual
  and potentially indicative of malicious activity, such as the FIN7 group's tactics.
  If confirmed malicious, this activity could allow attackers to execute arbitrary
  scripts, leading to code execution, data exfiltration, or further system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.007
  categories:
  - endpoint
references:
- https://www.mandiant.com/resources/fin7-pursuing-an-enigmatic-and-evasive-global-criminal-operation
- https://attack.mitre.org/groups/G0046/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.parent_process_name = \"cscript.exe\"\n        AND\n        Processes.parent_process\
    \ = \"*//e:jscript*\"\n    )\n    OR (Processes.process_name = \"cscript.exe\"\
    \ AND Processes.process = \"*//e:jscript*\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `jscript_execution_using_cscript_app_filter`"
