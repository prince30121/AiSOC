id: splunk-security-content-57ad5a64-9df7-11eb-a290-acde48001122
name: Windows Multiple Invalid Users Failed To Authenticate Using NTLM
description: The following analytic detects a single source endpoint failing to authenticate
  with 30 unique invalid users using the NTLM protocol. It leverages EventCode 4776
  from Domain Controller logs, focusing on error code 0xC0000064, which indicates
  non-existent usernames. This behavior is significant as it may indicate a Password
  Spraying attack, where an adversary attempts to gain initial access or elevate privileges.
  If confirmed malicious, this activity could lead to unauthorized access, privilege
  escalation, and potential compromise of sensitive information within the Active
  Directory environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1110.003
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1110/003/
- https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/audit-credential-validation
- https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4776
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_security` EventCode=4776 TargetUserName!=*$ Status=0xc0000064\n\
    \  | bucket span=5m _time\n  | stats dc(TargetUserName) AS unique_accounts values(TargetUserName)\
    \ as tried_accounts values(dest) as dest\n    BY _time, Workstation\n  | where\
    \ unique_accounts > 30\n  | `windows_multiple_invalid_users_failed_to_authenticate_using_ntlm_filter`"
