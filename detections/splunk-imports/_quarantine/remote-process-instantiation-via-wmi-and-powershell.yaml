id: splunk-security-content-112638b4-4634-11ec-b9ab-3e22fbd008af
name: Remote Process Instantiation via WMI and PowerShell
description: The following analytic detects the execution of `powershell.exe` using
  the `Invoke-WmiMethod` cmdlet to start a process on a remote endpoint via WMI. It
  leverages data from Endpoint Detection and Response (EDR) agents, focusing on command-line
  executions and process telemetry. This activity is significant as it indicates potential
  lateral movement or remote code execution attempts by adversaries. If confirmed
  malicious, this could allow attackers to execute arbitrary code on remote systems,
  leading to further compromise and persistence within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1047
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1047/
- https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.management/invoke-wmimethod?view=powershell-5.1
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_powershell`\
    \ (Processes.process=\"*Invoke-WmiMethod*\"\n    AND\n    Processes.process=\"\
    *-CN*\"\n    AND\n    Processes.process=\"*-Class Win32_Process*\"\n    AND\n\
    \    Processes.process=\"*-Name create*\")\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `remote_process_instantiation_via_wmi_and_powershell_filter`"
