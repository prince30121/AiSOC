id: splunk-security-content-ba24cda8-4716-11ec-8009-3e22fbd008af
name: Remote Process Instantiation via WinRM and PowerShell
description: The following analytic detects the execution of `powershell.exe` with
  arguments used to start a process on a remote endpoint via the WinRM protocol, specifically
  targeting the `Invoke-Command` cmdlet. It leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on command-line executions and process telemetry.
  This activity is significant as it may indicate lateral movement or remote code
  execution attempts by adversaries. If confirmed malicious, this could allow attackers
  to execute arbitrary code on remote systems, potentially leading to further compromise
  and lateral spread within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1021.006
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1021/006/
- https://pentestlab.blog/2018/05/15/lateral-movement-winrm/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_powershell`\
    \ (Processes.process=\"*Invoke-Command*\"\n    AND\n    Processes.process=\"*-ComputerName*\"\
    )\n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `remote_process_instantiation_via_winrm_and_powershell_filter`"
