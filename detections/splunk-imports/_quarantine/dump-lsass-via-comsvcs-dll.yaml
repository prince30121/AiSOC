id: splunk-security-content-8943b567-f14d-4ee8-a0bb-2121d4ce3184
name: Dump LSASS via comsvcs DLL
description: The following analytic detects the behavior of dumping credentials from
  memory by exploiting the Local Security Authority Subsystem Service (LSASS) using
  the comsvcs.dll and MiniDump via rundll32. This detection leverages process information
  from Endpoint Detection and Response (EDR) logs, focusing on specific command-line
  executions. This activity is significant because it indicates potential credential
  theft, which can lead to broader system compromise, persistence, lateral movement,
  and privilege escalation. If confirmed malicious, attackers could gain unauthorized
  access to sensitive information, leading to data theft, ransomware attacks, or other
  damaging outcomes.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.001
  categories:
  - endpoint
references:
- https://modexp.wordpress.com/2019/08/30/minidumpwritedump-via-com-services-dll/
- https://twitter.com/SBousseaden/status/1167417096374050817
- https://www.microsoft.com/en-us/security/blog/2023/05/24/volt-typhoon-targets-us-critical-infrastructure-with-living-off-the-land-techniques/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_rundll32`\
    \ Processes.process=*comsvcs.dll* Processes.process IN (\"*MiniDump*\", \"*#24*\"\
    )\n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `dump_lsass_via_comsvcs_dll_filter`"
