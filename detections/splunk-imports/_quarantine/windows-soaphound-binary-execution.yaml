id: splunk-security-content-8e53f839-e127-4d6d-a54d-a2f67044a57f
name: Windows SOAPHound Binary Execution
description: The following analytic detects the execution of the SOAPHound binary
  (`soaphound.exe`) with specific command-line arguments. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process names, command-line arguments,
  and other process-related metadata. This activity is significant because SOAPHound
  is a known tool used for credential dumping and other malicious activities. If confirmed
  malicious, this behavior could allow an attacker to extract sensitive information,
  escalate privileges, or persist within the environment, posing a severe threat to
  organizational security.
severity: medium
enabled: false
tags:
  mitre:
  - T1069.001
  - T1069.002
  - T1087.001
  - T1087.002
  - T1482
  categories:
  - endpoint
references:
- https://github.com/FalconForceTeam/SOAPHound
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=\"\
    soaphound.exe\"\n    OR\n    Processes.original_file_name=\"soaphound.exe\"\n\
    \    AND\n    Processes.process IN (\"*--buildcache *\", \"*--bhdump *\", \"*--certdump\
    \ *\", \"*--dnsdump *\", \"*-c *\", \"*--cachefilename *\", \"*-o *\", \"*--outputdirectory\
    \ *\")\n  BY Processes.action Processes.dest Processes.original_file_name\n  \
    \   Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_soaphound_binary_execution_filter`"
