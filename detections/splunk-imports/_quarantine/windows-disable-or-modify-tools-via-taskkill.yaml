id: splunk-security-content-a43ae66f-c410-4b3d-8741-9ce1ad17ddb0
name: Windows Disable or Modify Tools Via Taskkill
description: The following analytic identifies the use of taskkill.exe to forcibly
  terminate processes. It leverages data from Endpoint Detection and Response (EDR)
  agents, focusing on command-line executions that include specific taskkill parameters.
  This activity is significant because it can indicate attempts to disable security
  tools or disrupt legitimate applications, a common tactic in malware operations.
  If confirmed malicious, this behavior could allow attackers to evade detection,
  disrupt system stability, and potentially gain further control over the compromised
  system.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.njrat
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = \"taskkill.exe\" Processes.process IN (\"* /f*\", \"* /t*\") Processes.process\
    \ IN (\"* /im*\", \"* /pid*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(\"Processes\")`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_disable_or_modify_tools_via_taskkill_filter`"
