id: splunk-security-content-e234970c-dcf5-4f80-b6a9-3a562544ca5b
name: Windows Impair Defense Disable Web Evaluation
description: The following analytic detects modifications to the Windows registry
  entry "EnableWebContentEvaluation" to disable Windows Defender web content evaluation.
  It leverages data from the Endpoint.Registry datamodel, specifically monitoring
  changes where the registry value is set to "0x00000000". This activity is significant
  as it indicates an attempt to impair browser security features, potentially allowing
  malicious web content to bypass security checks. If confirmed malicious, this could
  lead to users interacting with harmful scripts or unsafe web elements, increasing
  the risk of system exploitation and security breaches.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  categories:
  - endpoint
references:
- https://x.com/malmoeb/status/1742604217989415386?s=20
- https://github.com/undergroundwires/privacy.sexy
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime FROM datamodel=Endpoint.Registry WHERE Registry.registry_path=
    "*\\Windows\\CurrentVersion\\AppHost\\EnableWebContentEvaluation"  Registry.registry_value_data=
    "0x00000000" by Registry.action Registry.dest Registry.process_guid Registry.process_id
    Registry.registry_hive Registry.registry_path Registry.registry_key_name Registry.registry_value_data
    Registry.registry_value_name Registry.registry_value_type Registry.status Registry.user
    Registry.vendor_product | `drop_dm_object_name(Registry)` | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `windows_impair_defense_disable_web_evaluation_filter`'
