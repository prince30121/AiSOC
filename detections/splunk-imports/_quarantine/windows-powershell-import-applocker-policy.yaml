id: splunk-security-content-102af98d-0ca3-4aa4-98d6-7ab2b98b955a
name: Windows Powershell Import Applocker Policy
description: The following analytic detects the import of Windows PowerShell Applocker
  cmdlets, specifically identifying the use of "Import-Module Applocker" and "Set-AppLockerPolicy"
  with an XML policy. It leverages PowerShell Script Block Logging (EventCode 4104)
  to capture and analyze script block text. This activity is significant as it may
  indicate an attempt to enforce restrictive Applocker policies, potentially used
  by malware like Azorult to disable antivirus products. If confirmed malicious, this
  could allow an attacker to bypass security controls, leading to further system compromise
  and persistence.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.001
  - T1562.001
  categories:
  - endpoint
references:
- https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/
logsource:
  product: splunk
detection:
  splunk_spl: "`powershell` EventCode=4104 ScriptBlockText=\"*Import-Module Applocker*\"\
    \ ScriptBlockText=\"*Set-AppLockerPolicy*\" ScriptBlockText=\"* -XMLPolicy *\"\
    \n  | fillnull\n  | stats count min(_time) as firstTime max(_time) as lastTime\n\
    \    BY dest signature signature_id\n       user_id vendor_product EventID\n \
    \      Guid Opcode Name\n       Path ProcessID ScriptBlockId\n       ScriptBlockText\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `windows_powershell_import_applocker_policy_filter`"
