id: splunk-security-content-40ccb8e0-1785-466e-901e-6a8b75c04ecd
name: Windows Cached Domain Credentials Reg Query
description: The following analytic identifies a process command line querying the
  CachedLogonsCount registry value in the Winlogon registry. This detection leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on command-line
  executions and registry queries. Monitoring this activity is significant as it can
  indicate the use of post-exploitation tools like Winpeas, which gather information
  about login caching settings. If confirmed malicious, this activity could help attackers
  understand login caching configurations, potentially aiding in credential theft
  or lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.005
  categories:
  - endpoint
references:
- https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
- https://learn.microsoft.com/de-de/troubleshoot/windows-server/user-profiles-and-logon/cached-domain-logon-information
- https://github.com/carlospolop/PEASS-ng/tree/master/winPEAS
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime from datamodel=Endpoint.Processes where  `process_reg`
    AND Processes.process = "* query *" AND Processes.process = "*\\SOFTWARE\\Microsoft\\Windows
    NT\\CurrentVersion\\Winlogon*" AND Processes.process = "*CACHEDLOGONSCOUNT*" by
    Processes.action Processes.dest Processes.original_file_name Processes.parent_process
    Processes.parent_process_exec Processes.parent_process_guid Processes.parent_process_id
    Processes.parent_process_name Processes.parent_process_path Processes.process
    Processes.process_exec Processes.process_guid Processes.process_hash Processes.process_id
    Processes.process_integrity_level Processes.process_name Processes.process_path
    Processes.user Processes.user_id Processes.vendor_product | `drop_dm_object_name(Processes)`
    | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `windows_cached_domain_credentials_reg_query_filter`'
provenance:
