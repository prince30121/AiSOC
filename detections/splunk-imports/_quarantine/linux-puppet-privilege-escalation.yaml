id: splunk-security-content-1d19037f-466e-4d56-8d87-36fafd9aa3ce
name: Linux Puppet Privilege Escalation
description: The following analytic detects the execution of Puppet commands with
  elevated privileges, specifically when Puppet is used to apply configurations with
  sudo rights. This detection leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process execution logs that include command-line details.
  This activity is significant because it indicates a potential privilege escalation
  attempt, where a user could gain root access and execute system commands as the
  root user. If confirmed malicious, this could allow an attacker to fully compromise
  the system, execute arbitrary commands, and maintain persistent control.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/puppet/
- https://en.wikipedia.org/wiki/Puppet_(software)
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *puppet*\"\n    AND\n    Processes.process=\"*apply*\"\n    AND\n    Processes.process=\"\
    *-e*\"\n    AND\n    Processes.process=\"*exec*\"\n    AND\n    Processes.process=\"\
    *sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_puppet_privilege_escalation_filter`"
