id: splunk-security-content-dd7da098-83b8-4c48-b09d-e51aeb621e81
name: Windows Net System Service Discovery
description: The following analytic detects the enumeration of Windows services using
  the net start command, which is a built-in utility that lists all running services
  on a system. Adversaries, system administrators, or automated tools may use this
  command to gain situational awareness of what services are active, identify potential
  security software, or discover opportunities for privilege escalation and lateral
  movement. The execution of net start is often associated with reconnaissance activity
  during the early stages of an intrusion, as attackers attempt to map out the system’s
  defense mechanisms and operational services. By monitoring process execution for
  instances of cmd.exe /c net start or similar command-line usage, defenders can detect
  potentially suspicious activity. Correlating this behavior with other reconnaissance
  commands, such as tasklist or sc query, strengthens detection fidelity. While net
  start is not inherently malicious, unusual or repeated use in non-administrative
  contexts should be flagged for further investigation.
severity: medium
enabled: false
tags:
  mitre:
  - T1007
  categories:
  - endpoint
references:
- https://cert.gov.ua/article/6284730
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_net`\n\
    \    AND\n    Processes.process=\"* start*\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_net_system_service_discovery_filter`"
