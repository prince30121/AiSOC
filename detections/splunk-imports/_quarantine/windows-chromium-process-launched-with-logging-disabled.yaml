id: splunk-security-content-d31de944-4e61-468f-9154-e50690f0e99e
name: Windows Chromium Process Launched with Logging Disabled
description: 'The following analytic detects instances of Chromium-based browser processes
  on Windows launched with logging disabled via command-line arguments such as --disable-logging
  and --disable-logging-redirect.

  The --disable-logging flag forces browser logging to be disabled, while --disable-logging-redirect
  disables log redirection and is commonly used for testing or debugging scenarios.

  Logging is enabled by default in Chromium debug builds, making these flags more
  likely to appear in debug or development environments.

  While these options may be legitimately used by automation frameworks, debugging
  workflows, or isolated testing environments, they are also leveraged by malware
  and malicious scripts to evade security monitoring.

  Analysts should review the parent process, full command-line parameters, and execution
  context to determine whether the behavior is expected or potentially suspicious.'
severity: medium
enabled: false
tags:
  mitre:
  - T1497
  categories:
  - endpoint
references:
- https://www.trendmicro.com/en_us/research/26/a/analysis-of-the-evelyn-stealer-campaign.html
- https://peter.sh/experiments/chromium-command-line-switches/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` min(_time) as firstTime max(_time)\n\
    as lastTime from datamodel=Endpoint.Processes\nwhere Processes.process_name IN\
    \ (\"Chrome.exe\",\"Brave.exe\", \"Opera.exe\", \"Vivaldi.exe\", \"msedge.exe\"\
    )\nProcesses.process = \"*--disable-logging*\"\nby Processes.action Processes.dest\
    \ Processes.original_file_name Processes.parent_process\n   Processes.parent_process_exec\
    \ Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path Processes.process Processes.process_exec\n   Processes.process_guid\
    \ Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \   Processes.process_name Processes.process_path Processes.user Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_chromium_process_launched_with_logging_disabled_filter`"
