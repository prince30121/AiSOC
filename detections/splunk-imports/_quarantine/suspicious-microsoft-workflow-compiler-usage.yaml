id: splunk-security-content-9bbc62e8-55d8-11eb-ae93-0242ac130002
name: Suspicious microsoft workflow compiler usage
description: The following analytic identifies the usage of microsoft.workflow.compiler.exe,
  a rarely utilized executable typically found in C:\Windows\Microsoft.NET\Framework64\v4.0.30319.
  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process execution telemetry. The significance of this activity lies
  in its uncommon usage, which may indicate malicious intent such as code execution
  or persistence mechanisms. If confirmed malicious, an attacker could leverage this
  process to execute arbitrary code, potentially leading to unauthorized access or
  further compromise of the system.
severity: medium
enabled: false
tags:
  mitre:
  - T1127
  categories:
  - endpoint
references:
- https://lolbas-project.github.io/lolbas/Binaries/Msbuild/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218/T1218.md#atomic-test-6---microsoftworkflowcompilerexe-payload-execution
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=microsoft.workflow.compiler.exe\n        OR\n      \
    \  Processes.original_file_name=Microsoft.Workflow.Compiler.exe\n    )\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `suspicious_microsoft_workflow_compiler_usage_filter`"
