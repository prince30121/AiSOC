id: splunk-security-content-1acafff9-1347-4b40-abae-f35aa4ba85c1
name: Windows Odbcconf Load Response File
description: The following analytic detects the execution of odbcconf.exe with a response
  file, which may contain commands to load a DLL (REGSVR) or other instructions. This
  detection leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process names and command-line arguments. This activity is significant as it
  may indicate an attempt to execute arbitrary code or load malicious DLLs, potentially
  leading to unauthorized actions. If confirmed malicious, this could allow an attacker
  to gain code execution, escalate privileges, or establish persistence within the
  environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.008
  categories:
  - endpoint
references:
- https://strontic.github.io/xcyclopedia/library/odbcconf.exe-07FBA12552331355C103999806627314.html
- https://twitter.com/redcanary/status/1541838407894171650?s=20&t=kp3WBPtfnyA3xW7D7wx0uw
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=odbcconf.exe\
    \ Processes.process IN (\"*-f *\",\"*/f *\") Processes.process=\"*.rsp*\"\n  BY\
    \ Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_odbcconf_load_response_file_filter`"
