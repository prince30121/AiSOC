id: splunk-security-content-5c1c2877-06c0-40ee-a1a2-db71f1372b5b
name: Windows Private Keys Discovery
description: The following analytic identifies processes that retrieve information
  related to private key files, often used by post-exploitation tools like winpeas.
  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on command-line executions that search for private key certificates. This
  activity is significant as it indicates potential attempts to locate insecurely
  stored credentials, which adversaries can exploit for privilege escalation, persistence,
  or remote service authentication. If confirmed malicious, this behavior could allow
  attackers to access sensitive information, escalate privileges, or maintain persistence
  within the compromised environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1552.004
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1552/004/
- https://github.com/carlospolop/PEASS-ng/tree/master/winPEAS
- https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process\
    \ = \"*dir *\"\n    OR\n    Processes.process = \"*findstr*\"\n    AND\n    Processes.process\
    \ IN ( \"*.rdg*\", \"*.gpg*\", \"*.pgp*\", \"*.p12*\", \"*.der*\", \"*.csr*\"\
    , \"*.cer*\", \"*.ovpn*\", \"*.key*\",  \"*.ppk*\", \"*.p12*\", \"*.pem*\", \"\
    *.pfx*\", \"*.p7b*\", \"*.asc*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_private_keys_discovery_filter`"
