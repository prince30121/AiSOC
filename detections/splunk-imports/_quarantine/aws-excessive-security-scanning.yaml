id: splunk-security-content-1fdd164a-def8-4762-83a9-9ffe24e74d5a
name: AWS Excessive Security Scanning
description: The following analytic identifies excessive security scanning activities
  in AWS by detecting a high number of Describe, List, or Get API calls from a single
  user. It leverages AWS CloudTrail logs to count distinct event names and flags users
  with more than 50 such events. This behavior is significant as it may indicate reconnaissance
  activities by an attacker attempting to map out your AWS environment. If confirmed
  malicious, this could lead to unauthorized access, data exfiltration, or further
  exploitation of your cloud infrastructure.
severity: medium
enabled: false
tags:
  mitre:
  - T1526
  categories:
  - cloud
references:
- https://github.com/aquasecurity/cloudsploit
logsource:
  product: splunk
detection:
  splunk_spl: "`cloudtrail` eventName=Describe* OR eventName=List* OR eventName=Get*\n\
    \  | fillnull\n  | rename user_name as user\n  | stats dc(signature) as dc_events\
    \ min(_time) as firstTime max(_time) as lastTime values(signature) as signature\
    \ values(dest) as dest values(user_agent) as user_agent values(src) as src values(vendor_account)\
    \ as vendor_account values(vendor_region) as vendor_region\n    BY user\n  | where\
    \ dc_events > 50\n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `aws_excessive_security_scanning_filter`"
