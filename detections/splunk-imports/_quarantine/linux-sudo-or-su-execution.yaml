id: splunk-security-content-4b00f134-6d6a-11ec-a90c-acde48001122
name: Linux Sudo OR Su Execution
description: The following analytic detects the execution of the "sudo" or "su" command
  on a Linux operating system. It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process names and parent process names. This activity
  is significant because "sudo" and "su" commands are commonly used by adversaries
  to elevate privileges, potentially leading to unauthorized access or control over
  the system. If confirmed malicious, this activity could allow attackers to execute
  commands with root privileges, leading to severe security breaches, data exfiltration,
  or further system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1548/003/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ IN (\"sudo\", \"su\")\n    OR\n    Processes.parent_process_name IN (\"sudo\"\
    , \"su\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_sudo_or_su_execution_filter`"
