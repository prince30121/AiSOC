id: splunk-security-content-d131673f-ede1-47f2-93a1-0108d3e7fafd
name: Windows Process Injection In Non-Service SearchIndexer
description: The following analytic identifies instances of the searchindexer.exe
  process that are not spawned by services.exe, indicating potential process injection.
  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process names and parent processes. This activity is significant because
  QakBot malware often uses a fake searchindexer.exe to evade detection and perform
  malicious actions such as data exfiltration and keystroke logging. If confirmed
  malicious, this activity could allow attackers to maintain persistence, steal sensitive
  information, and communicate with command and control servers.
severity: medium
enabled: false
tags:
  mitre:
  - T1055
  categories:
  - endpoint
references:
- https://twitter.com/Max_Mal_/status/1736392741758611607
- https://twitter.com/1ZRR4H/status/1735944522075386332
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name\
    \ != services.exe Processes.process_name=searchindexer.exe\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_process_injection_in_non_service_searchindexer_filter`"
