id: splunk-security-content-c0c5a479-bf57-4ca0-af3a-4c7081e5ba05
name: Windows Credentials from Password Stores Creation
description: The following analytic detects the execution of the Windows OS tool cmdkey.exe,
  which is used to create stored usernames, passwords, or credentials. This detection
  leverages data from Endpoint Detection and Response (EDR) agents, focusing on process
  execution logs and command-line arguments. This activity is significant because
  cmdkey.exe is often abused by post-exploitation tools and malware, such as Darkgate,
  to gain unauthorized access. If confirmed malicious, this behavior could allow attackers
  to escalate privileges and maintain persistence on the targeted host, facilitating
  further attacks and potential data breaches.
severity: medium
enabled: false
tags:
  mitre:
  - T1555
  categories:
  - endpoint
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.darkgate
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=\"\
    cmdkey.exe\"\n    OR\n    Processes.original_file_name = \"cmdkey.exe\"\n    AND\n\
    \    Processes.process = \"*/generic*\" Processes.process IN (\"*/user*\", \"\
    */password*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_credentials_from_password_stores_creation_filter`"
