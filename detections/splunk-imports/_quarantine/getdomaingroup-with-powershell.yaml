id: splunk-security-content-93c94be3-bead-4a60-860f-77ca3fe59903
name: GetDomainGroup with PowerShell
description: The following analytic detects the execution of `powershell.exe` with
  command-line arguments that query for domain groups using `Get-DomainGroup`. This
  detection leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process names and command-line executions mapped to the `Processes` node of the
  `Endpoint` data model. Monitoring this activity is crucial as `Get-DomainGroup`
  is part of PowerView, a tool often used by adversaries for domain enumeration and
  situational awareness. If confirmed malicious, this activity could allow attackers
  to gain insights into domain group structures, aiding in further exploitation and
  privilege escalation.
severity: medium
enabled: false
tags:
  mitre:
  - T1069.002
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1069/002/
- https://powersploit.readthedocs.io/en/latest/Recon/Get-DomainGroup/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=\"powershell.exe\"\n    )\n    (Processes.process=*Get-DomainGroup*)\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `getdomaingroup_with_powershell_filter`"
