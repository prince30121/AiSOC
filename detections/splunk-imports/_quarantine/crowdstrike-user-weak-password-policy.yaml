id: splunk-security-content-b49b6ef4-57cd-4d42-bd7e-64e00f11cc87
name: Crowdstrike User Weak Password Policy
description: The following analytic detects CrowdStrike alerts for weak password policy
  violations, identifying instances where passwords do not meet the required security
  standards. These alerts highlight potential vulnerabilities that could be exploited
  by attackers, emphasizing the need for stronger password practices. Addressing these
  alerts promptly helps to enhance overall security and protect sensitive information
  from unauthorized access.
severity: medium
enabled: false
tags:
  mitre:
  - T1110
  categories:
  - endpoint
references:
- https://www.crowdstrike.com/wp-content/uploads/2022/12/CrowdStrike-Falcon-Event-Streams-Add-on-Guide-v3.pdf
logsource:
  product: splunk
detection:
  splunk_spl: "`crowdstrike_identities`  primaryDisplayName != \"*admin*\"\n  | rename\
    \ riskFactors{}.severity as severity, riskFactors{}.type as risk_type, roles{}.type\
    \ as role_type, accounts{}.domain as domain, accounts{}.dn as dn, accounts{}.samAccountName\
    \ as user\n  | stats count min(_time) as firstTime max(_time) as lastTime\n  \
    \  BY domain dn primaryDisplayName\n       risk_type severity riskScore\n    \
    \   riskScoreSeverity user role_type\n  | where risk_type = \"WEAK_PASSWORD_POLICY\"\
    \n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `crowdstrike_user_weak_password_policy_filter`"
provenance:
  source: splunk/security_content
  source_id: b49b6ef4-57cd-4d42-bd7e-64e00f11cc87
