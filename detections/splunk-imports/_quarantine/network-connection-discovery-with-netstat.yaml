id: splunk-security-content-2cf5cc25-f39a-436d-a790-4857e5995ede
name: Network Connection Discovery With Netstat
description: The following analytic detects the execution of `netstat.exe` with command-line
  arguments to list network connections on a system. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process names, command-line executions,
  and parent processes. This activity is significant as both Red Teams and adversaries
  use `netstat.exe` for situational awareness and Active Directory discovery. If confirmed
  malicious, this behavior could allow attackers to map network connections, identify
  critical systems, and plan further lateral movement or data exfiltration.
severity: medium
enabled: false
tags:
  mitre:
  - T1049
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1049/
- https://www.microsoft.com/en-us/security/blog/2023/05/24/volt-typhoon-targets-us-critical-infrastructure-with-living-off-the-land-techniques/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=\"netstat.exe\"\n    )\n    (Processes.process=*-a*)\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `network_connection_discovery_with_netstat_filter`"
