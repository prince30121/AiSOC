id: splunk-security-content-535cb214-8b47-11ec-a2c7-acde48001122
name: Linux System Network Discovery
description: 'The following analytic identifies potential enumeration of local network
  configuration on Linux systems.

  It detects this activity by monitoring processes such as "arp," "ifconfig," "ip,"
  "netstat," "firewall-cmd," "ufw," "iptables," "ss," and "route" within a 30-minute
  window.

  This behavior is significant as it often indicates reconnaissance efforts by adversaries
  to gather network information for subsequent attacks.

  If confirmed malicious, this activity could enable attackers to map the network,
  identify vulnerabilities, and plan further exploitation or lateral movement within
  the environment.'
severity: medium
enabled: false
tags:
  mitre:
  - T1016
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1016/T1016.md
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n        values(Processes.action) as action\n\
    \        values(Processes.original_file_name) as original_file_name\n        values(Processes.parent_process_exec)\
    \ as parent_process_exec\n        values(Processes.parent_process_guid) as parent_process_guid\n\
    \        values(Processes.parent_process_id) as parent_process_id\n        values(Processes.parent_process_name)\
    \ as parent_process_name\n        values(Processes.parent_process_path) as parent_process_path\n\
    \        values(Processes.parent_process) as parent_process\n        values(Processes.process_exec)\
    \ as process_exec\n        values(Processes.process_guid) as process_guid\n  \
    \      values(Processes.process_hash) as process_hash\n        values(Processes.process_id)\
    \ as process_id\n        values(Processes.process_integrity_level) as process_integrity_level\n\
    \        values(Processes.process_name) as process_name\n        values(Processes.process_path)\
    \ as process_path\n        values(Processes.process) as process\n        values(Processes.user_id)\
    \ as user_id\n        values(Processes.vendor_product) as vendor_product\n   \
    \     dc(Processes.process_name) as process_name_count\nFROM datamodel=Endpoint.Processes\
    \ WHERE\n\nProcesses.process_name IN (\n    \"arp\",\n    \"firewall-cmd\",\n\
    \    \"ifconfig\",\n    \"ip\",\n    \"iptables\",\n    \"netstat\",\n    \"route\"\
    ,\n    \"ss\",\n    \"ufw\"\n)\n\nBY _time span=30m Processes.dest Processes.user\n\
    \n| where process_name_count>=4\n\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `linux_system_network_discovery_filter`"
