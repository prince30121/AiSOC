id: splunk-security-content-32e0baea-b3f1-11eb-a2ce-acde48001122
name: Detect RClone Command-Line Usage
description: The following analytic detects the usage of `rclone.exe` with specific
  command-line arguments indicative of file transfer activities. It leverages data
  from Endpoint Detection and Response (EDR) agents, focusing on command-line executions
  and process details. This activity is significant as `rclone.exe` is often used
  by adversaries for data exfiltration, especially during ransomware attacks. If confirmed
  malicious, this behavior could lead to unauthorized data transfer, resulting in
  data breaches and potential loss of sensitive information. Immediate isolation of
  the affected endpoint and further investigation are recommended.
severity: medium
enabled: false
tags:
  mitre:
  - T1020
  categories:
  - endpoint
references:
- https://redcanary.com/blog/rclone-mega-extortion/
- https://www.mandiant.com/resources/shining-a-light-on-darkside-ransomware-operations
- https://thedfirreport.com/2021/03/29/sodinokibi-aka-revil-ransomware/
- https://thedfirreport.com/2021/11/29/continuing-the-bazar-ransomware-story/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime from datamodel=Endpoint.Processes where\n(Processes.original_file_name=\"\
    rclone.exe\" OR Processes.process_name=\"rclone.exe\")\nProcesses.process IN (\n\
    \        \"*copy*\", \"*mega*\", \"*pcloud*\", \"*ftp*\",\n        \"*--config*\"\
    , \"*--progress*\", \"*--no-check-certificate*\",\n        \"*--ignore-existing*\"\
    , \"*--auto-confirm*\", \"*--transfers*\",\n        \"*--multi-thread-streams*\"\
    \n        )\nby Processes.action Processes.dest Processes.original_file_name Processes.parent_process\n\
    Processes.parent_process_exec Processes.parent_process_guid Processes.parent_process_id\n\
    Processes.parent_process_name Processes.parent_process_path Processes.process\
    \ Processes.process_exec\nProcesses.process_guid Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\nProcesses.process_name Processes.process_path\
    \ Processes.user Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n|  `security_content_ctime(lastTime)`\n\
    | `detect_rclone_command_line_usage_filter`"
