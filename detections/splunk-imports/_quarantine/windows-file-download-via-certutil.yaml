id: splunk-security-content-7fac8d40-e370-45ea-a4a3-031bbcc18b02
name: Windows File Download Via CertUtil
description: The following analytic detects the use of `certutil.exe` to download
  files using the `-URL`, `-urlcache` or '-verifyctl' arguments. This behavior is
  identified by monitoring command-line executions for these specific arguments via
  Endpoint Detection and Response (EDR) telemetry. This activity is significant because
  `certutil.exe` is a legitimate tool often abused by attackers to download and execute
  malicious payloads. If confirmed malicious, this could allow an attacker to download
  and execute arbitrary files, potentially leading to code execution, data exfiltration,
  or further compromise of the system.
severity: medium
enabled: false
tags:
  mitre:
  - T1105
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1105/
- https://www.hexacorn.com/blog/2020/08/23/certutil-one-more-gui-lolbin/
- https://www.avira.com/en/blog/certutil-abused-by-attackers-to-spread-threats
- https://web.archive.org/web/20210921110637/https://www.fireeye.com/blog/threat-research/2019/10/certutil-qualms-they-came-to-drop-fombs.html
- https://lolbas-project.github.io/lolbas/Binaries/Certutil/
- https://docs.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2012-R2-and-2012/cc732443(v=ws.11)#-verifyctl
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_certutil`\n\
    \    AND\n    ((Processes.process IN (\"*-URL *\", \"*/URL *\"))\n    OR\n   \
    \ (Processes.process IN (\"*urlcache*\", \"*verifyctl*\")\n    AND\n    Processes.process\
    \ IN (\"*/f *\", \"*-f *\")))\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_file_download_via_certutil_filter`"
