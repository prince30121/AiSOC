id: splunk-security-content-004e32e2-146d-11ec-a83f-acde48001122
name: XSL Script Execution With WMIC
description: The following analytic detects the execution of an XSL script using the
  WMIC process, which is often indicative of malicious activity. It leverages data
  from Endpoint Detection and Response (EDR) agents, focusing on command-line executions
  involving WMIC and XSL files. This behavior is significant as it has been associated
  with the FIN7 group, known for using this technique to execute malicious scripts.
  If confirmed malicious, this activity could allow attackers to execute arbitrary
  code, potentially leading to system compromise and further malicious actions within
  the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1220
  categories:
  - endpoint
references:
- https://www.mandiant.com/resources/fin7-pursuing-an-enigmatic-and-evasive-global-criminal-operation
- https://attack.mitre.org/groups/G0046/
- https://web.archive.org/web/20190814201250/https://subt0x11.blogspot.com/2018/04/wmicexe-whitelisting-bypass-hacking.html
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1220/T1220.md#atomic-test-3---wmic-bypass-using-local-xsl-file
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_wmic`\
    \ Processes.process = \"*os get*\" Processes.process=\"*/format:*\" Processes.process\
    \ = \"*.xsl*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `xsl_script_execution_with_wmic_filter`"
