id: splunk-security-content-bb1481fd-23c0-4195-b6a0-94d746c9637c
name: Crowdstrike Admin Weak Password Policy
description: The following analytic detects CrowdStrike alerts for admin weak password
  policy violations, identifying instances where administrative passwords do not meet
  security standards. These alerts highlight significant vulnerabilities that could
  be exploited by attackers to gain unauthorized access. Promptly addressing these
  alerts is crucial for maintaining robust security and protecting critical systems
  and data from potential threats.
severity: medium
enabled: false
tags:
  mitre:
  - T1110
  categories:
  - endpoint
references:
- https://www.crowdstrike.com/wp-content/uploads/2022/12/CrowdStrike-Falcon-Event-Streams-Add-on-Guide-v3.pdf
logsource:
  product: splunk
detection:
  splunk_spl: "`crowdstrike_identities` primaryDisplayName = \"*admin*\"\n  | rename\
    \ riskFactors{}.severity as severity, riskFactors{}.type as risk_type, roles{}.type\
    \ as role_type, accounts{}.domain as domain, accounts{}.dn as dn, accounts{}.samAccountName\
    \ as user\n  | stats count min(_time) as firstTime max(_time) as lastTime\n  \
    \  BY domain dn primaryDisplayName\n       risk_type severity riskScore\n    \
    \   riskScoreSeverity user role_type\n  | where risk_type = \"WEAK_PASSWORD_POLICY\"\
    \n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `crowdstrike_admin_weak_password_policy_filter`"
provenance:
  source: splunk/security_content
  source_id: bb1481fd-23c0-4195-b6a0-94d746c9637c
