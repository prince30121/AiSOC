id: splunk-security-content-3ed0d6ba-4791-4fa8-a1ef-403e438c7033
name: GitHub Organizations Disable 2FA Requirement
description: The following analytic detects when two-factor authentication (2FA) requirements
  are disabled in GitHub Organizations. The detection monitors GitHub Organizations
  audit logs for 2FA requirement changes by tracking actor details, organization information,
  and associated metadata. For a SOC, identifying disabled 2FA requirements is critical
  as it could indicate attempts to weaken account security controls. Two-factor authentication
  is a fundamental security control that helps prevent unauthorized access even if
  passwords are compromised. Disabling 2FA requirements could allow attackers to more
  easily compromise accounts through password-based attacks. The impact of disabled
  2FA includes increased risk of account takeover, potential access to sensitive code
  and intellectual property, and compromise of the software supply chain. This activity
  could be part of a larger attack chain where an adversary first disables security
  controls before attempting broader account compromises.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.001
  - T1195
  categories:
  - cloud
references:
- https://splunk.github.io/splunk-add-on-for-github-audit-log-monitoring/Install/
- https://www.googlecloudcommunity.com/gc/Community-Blog/Monitoring-for-Suspicious-GitHub-Activity-with-Google-Security/ba-p/763610
logsource:
  product: splunk
detection:
  splunk_spl: "`github_organizations` vendor_action=org.disable_two_factor_requirement\n\
    \  | fillnull\n  | stats count min(_time) as firstTime max(_time) as lastTime\n\
    \    BY actor, actor_id, actor_ip,\n       actor_is_bot, actor_location.country_code,\
    \ business,\n       business_id, org, org_id,\n       user_agent, vendor_action\n\
    \  | eval user=actor\n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `github_organizations_disable_2fa_requirement_filter`"
