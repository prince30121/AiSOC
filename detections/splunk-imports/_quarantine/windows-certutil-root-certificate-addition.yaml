logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \  max(_time) as lastTime\n  values(Processes.process) as process\nfrom datamodel=Endpoint.Processes\
    \ where\n`process_certutil`\nProcesses.process=*-addstore*\nProcesses.process=*root*\n\
    Processes.process IN (\n      \"*:\\\\PerfLogs\\\\*\",\n      \"*:\\\\Windows\\\
    \\Temp\\\\*\",\n      \"*\\\\AppData\\\\Local\\\\Temp\\\\*\",\n      \"*\\\\ProgramData\\\
    \\*\",\n      \"*\\\\Users\\\\Public\\\\*\",\n      \"*%AppData%*\",\n      \"\
    *%Public%*\",\n      \"*%Temp%*\",\n      \"*%tmp%*\"\n      )\nby Processes.action\
    \ Processes.dest Processes.original_file_name\n   Processes.parent_process Processes.parent_process_exec\n\
    \   Processes.parent_process_guid Processes.parent_process_id\n   Processes.parent_process_name\
    \ Processes.parent_process_path\n   Processes.process Processes.process_exec Processes.process_guid\n\
    \   Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \   Processes.process_name Processes.process_path Processes.user\n   Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(\"Processes\")`\n| `security_content_ctime(firstTime)`\n\
    |`security_content_ctime(lastTime)`\n| `windows_certutil_root_certificate_addition_filter`"
