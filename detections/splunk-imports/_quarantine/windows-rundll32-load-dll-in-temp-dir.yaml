id: splunk-security-content-520da6fa-7d5d-4a3b-9c61-1087517b8d0f
name: Windows Rundll32 Load DLL in Temp Dir
description: This detection identifies instances where rundll32.exe is used to load
  a DLL from a temporary directory, such as C:\Users\<User>\AppData\Local\Temp\ or
  C:\Windows\Temp\. While rundll32.exe is a legitimate Windows utility used to execute
  functions exported from DLLs, its use to load libraries from temporary locations
  is highly suspicious. These directories are commonly used by malware and red team
  tools to stage payloads or execute code in-memory without writing it to more persistent
  locations. This behavior often indicates defense evasion, initial access, or privilege
  escalation, especially when the DLL is unsigned, recently written, or executed shortly
  after download. In normal user workflows, DLLs are not typically loaded from Temp
  paths, making this a high-fidelity indicator of potentially malicious activity.
  Monitoring this pattern is essential for detecting threats that attempt to blend
  in with native system processes while bypassing traditional application controls.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.011
  categories:
  - endpoint
references:
- https://blog.sekoia.io/interlock-ransomware-evolving-under-the-radar/
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` min(_time) as firstTime max(_time)
    as lastTime from datamodel=Endpoint.Processes where `process_rundll32` AND Processes.process
    IN ("*temp\\*", "*\\tmp\\*") by Processes.action Processes.dest Processes.original_file_name
    Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid
    Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path
    Processes.process Processes.process_exec Processes.process_guid Processes.process_hash
    Processes.process_id Processes.process_integrity_level Processes.process_name
    Processes.process_path Processes.user Processes.user_id Processes.vendor_product
    | `drop_dm_object_name(Processes)` | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
    | `windows_rundll32_load_dll_in_temp_dir_filter`'
