id: splunk-security-content-c53a8e62-f741-11ee-9f6e-acde48001122
name: AWS Bedrock Invoke Model Access Denied
description: The following analytic identifies access denied error when attempting
  to invoke AWS Bedrock models. It leverages AWS CloudTrail logs to detect when a
  user or service receives an AccessDenied error when calling the InvokeModel API.
  This activity is significant as it may indicate an adversary attempting to access
  Bedrock models with insufficient permissions after compromising credentials. If
  confirmed malicious, this could suggest reconnaissance activities or privilege escalation
  attempts targeting generative AI resources, potentially leading to data exfiltration
  or manipulation of model outputs.
severity: medium
enabled: false
tags:
  mitre:
  - T1078
  - T1550
  categories:
  - cloud
references:
- https://docs.aws.amazon.com/bedrock/latest/APIReference/API_ListFoundationModels.html
- https://trustoncloud.com/blog/exposing-the-weakness-how-we-identified-a-flaw-in-bedrocks-foundation-model-access-control/
- https://attack.mitre.org/techniques/T1595/
logsource:
  product: splunk
detection:
  splunk_spl: '`cloudtrail` eventSource=bedrock.amazonaws.com eventName=InvokeModel
    errorCode=AccessDenied | rename user_name as user | stats count min(_time) as
    firstTime max(_time) as lastTime values(requestParameters.modelId) as modelIds
    by src user user_agent vendor_account vendor_product dest signature vendor_region
    result result_id | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
    | `aws_bedrock_invoke_model_access_denied_filter`'
