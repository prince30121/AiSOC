id: splunk-security-content-4d2df5e0-1092-4817-88a8-79c7fa054668
name: ASL AWS Multi-Factor Authentication Disabled
description: The following analytic detects attempts to disable multi-factor authentication
  (MFA) for an AWS IAM user. It leverages Amazon Security Lake logs, specifically
  monitoring for `DeleteVirtualMFADevice` or `DeactivateMFADevice` API operations.
  This activity is significant as disabling MFA can indicate an adversary attempting
  to weaken account security to maintain persistence using a compromised account.
  If confirmed malicious, this action could allow attackers to retain access to the
  AWS environment without detection, potentially leading to unauthorized access to
  sensitive resources and prolonged compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1556.006
  - T1586.003
  - T1621
  categories:
  - cloud
references:
- https://attack.mitre.org/techniques/T1621/
- https://aws.amazon.com/what-is/mfa/
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` (api.operation=DeleteVirtualMFADevice OR api.operation=DeactivateMFADevice)\n\
    \  | fillnull\n  | stats count min(_time) as firstTime max(_time) as lastTime\n\
    \    BY actor.user.uid api.operation api.service.name\n       http_request.user_agent\
    \ src_endpoint.ip actor.user.account.uid\n       cloud.provider cloud.region\n\
    \  | rename actor.user.uid as user api.operation as action api.service.name as\
    \ dest http_request.user_agent as user_agent src_endpoint.ip as src actor.user.account.uid\
    \ as vendor_account cloud.provider as vendor_product cloud.region as vendor_region\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `asl_aws_multi_factor_authentication_disabled_filter`"
