id: splunk-security-content-7f8e2b4c-9a3d-4e1f-8c5b-6d7e8f9a0b1c
name: Cisco Privileged Account Creation with Suspicious SSH Activity
description: 'This analytic detects a correlation between privileged account creation
  on Cisco IOS devices and subsequent inbound SSH connections to non-standard ports
  or sshd_operns by correlating risk events

  This correlation identifies when both "Cisco IOS Suspicious Privileged Account Creation"
  and SSH-related Snort detections ("SSH Connection to sshd_operns" or "SSH Connection
  to Non-Standard Port") fire for the same network device.

  This behavior is highly indicative of persistence establishment following initial
  compromise.'
severity: medium
enabled: false
tags:
  mitre:
  - T1021.004
  - T1136
  - T1078
  categories:
  - network
references:
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-239a
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  min(_time) as firstTime\n\
    \  max(_time) as lastTime\n\n  sum(All_Risk.calculated_risk_score) as risk_score\n\
    \  count(All_Risk.calculated_risk_score) as risk_event_count\n\n  values(All_Risk.annotations.mitre_attack.mitre_tactic_id)\
    \ as annotations.mitre_attack.mitre_tactic_id\n  dc(All_Risk.annotations.mitre_attack.mitre_tactic_id)\
    \ as mitre_tactic_id_count\n\n  values(All_Risk.annotations.mitre_attack.mitre_technique_id)\
    \ as annotations.mitre_attack.mitre_technique_id\n  dc(All_Risk.annotations.mitre_attack.mitre_technique_id)\
    \ as mitre_technique_id_count\n\n  values(All_Risk.tag) as tag\n  values(source)\
    \ as source\n  dc(source) as source_count\n\n  values(contributing_events_search)\n\
    \n  values(All_Risk.threat_object)\n\n  from datamodel=Risk.All_Risk where\n\n\
    \  source IN (\n    \"*Cisco IOS Suspicious Privileged Account Creation*\",\n\
    \    \"*Cisco Secure Firewall - SSH Connection to sshd_operns*\",\n    \"*Cisco\
    \ Secure Firewall - SSH Connection to Non-Standard Port*\"\n  )\n  by All_Risk.normalized_risk_object\n\
    | `drop_dm_object_name(All_Risk)`\n| eval has_account_creation=if(\n         \
    \                       match(source, \"Cisco IOS Suspicious Privileged Account\
    \ Creation\"),\n                                1, 0\n                       \
    \       )\n| eval has_ssh_detection=if(\n                              match(source,\
    \ \"SSH Connection to sshd_operns\")\n                              OR\n     \
    \                         match(source, \"SSH Connection to Non-Standard Port\"\
    ),\n                              1, 0\n                            )\n| where\
    \ has_account_creation=1\n        AND\n        has_ssh_detection=1\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `cisco_privileged_account_creation_with_suspicious_ssh_activity_filter`"
