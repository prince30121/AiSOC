id: splunk-security-content-9216ef3d-066a-4958-8f27-c84589465e62
name: Windows Driver Load Non-Standard Path
description: The following analytic detects the loading of new Kernel Mode Drivers
  from non-standard paths using Windows EventCode 7045. It identifies drivers not
  located in typical directories like Windows, Program Files, or SystemRoot. This
  activity is significant because adversaries may use these non-standard paths to
  load malicious or vulnerable drivers, potentially bypassing security controls. If
  confirmed malicious, this could allow attackers to execute code at the kernel level,
  escalate privileges, or maintain persistence within the environment, posing a severe
  threat to system integrity and security.
severity: medium
enabled: false
tags:
  mitre:
  - T1014
  - T1068
  categories:
  - endpoint
references:
- https://redcanary.com/blog/tracking-driver-inventory-to-expose-rootkits/
- https://attack.mitre.org/techniques/T1014/
- https://www.fuzzysecurity.com/tutorials/28.html
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_system` EventCode = 7045 ServiceType = \"kernel mode driver\"\
    \ | regex ImagePath != \"(?i)^(\\w:\\\\\\\\Program Files\\\\\\\\|\\w:\\\\\\\\\
    Program Files \\(x86\\)\\\\\\\\|\\w:\\\\\\\\Windows\\\\\\\\System32\\\\\\\\|\\\
    w:\\\\\\\\Windows\\\\\\\\SysWOW64\\\\\\\\|\\w:\\\\\\\\ProgramData\\\\\\\\Microsoft\\\
    \\\\\\Windows Defender\\\\\\\\Definition Updates\\\\\\\\|\\w:\\\\\\\\ProgramData\\\
    \\\\\\Microsoft\\\\\\\\Windows Defender\\\\\\\\Platform\\\\\\\\|%SystemRoot%|\\\
    \\\\\\SystemRoot\\\\\\\\|SystemRoot\\\\\\\\)\" | stats count min(_time) as firstTime\
    \ max(_time) as lastTime by\n  Computer EventCode ImagePath ServiceName ServiceType\n\
    | rename Computer as dest | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`\
    \ | `windows_driver_load_non_standard_path_filter`"
