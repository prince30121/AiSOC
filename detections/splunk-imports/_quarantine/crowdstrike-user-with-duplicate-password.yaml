id: splunk-security-content-386dd914-16e5-400b-9bf6-25572cc4415a
name: Crowdstrike User with Duplicate Password
description: The following analytic detects CrowdStrike alerts for non-admin accounts
  with duplicate password risk, identifying instances where multiple non-admin users
  share the same password. This practice weakens security and increases the potential
  for unauthorized access. Addressing these alerts is essential to ensure each user
  account has a unique, strong password, thereby enhancing overall security and protecting
  sensitive information.
severity: medium
enabled: false
tags:
  mitre:
  - T1110
  categories:
  - endpoint
references:
- https://www.crowdstrike.com/wp-content/uploads/2022/12/CrowdStrike-Falcon-Event-Streams-Add-on-Guide-v3.pdf
logsource:
  product: splunk
detection:
  splunk_spl: "`crowdstrike_identities` primaryDisplayName != \"*admin*\"\n  | rename\
    \ riskFactors{}.severity as severity, riskFactors{}.type as risk_type, roles{}.type\
    \ as role_type, accounts{}.domain as domain, accounts{}.dn as dn, accounts{}.samAccountName\
    \ as user\n  | stats count min(_time) as firstTime max(_time) as lastTime\n  \
    \  BY domain dn primaryDisplayName\n       risk_type severity riskScore\n    \
    \   riskScoreSeverity user role_type\n  | where risk_type = \"DUPLICATE_PASSWORD\"\
    \n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `crowdstrike_user_with_duplicate_password_filter`"
provenance:
  source: splunk/security_content
