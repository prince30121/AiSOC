id: splunk-security-content-1c34549e-c31b-11eb-996b-acde48001122
name: Detect AzureHound File Modifications
description: The following analytic detects the creation of specific AzureHound-related
  files, such as `*-azurecollection.zip` and various `.json` files, on disk. It leverages
  data from the Endpoint.Filesystem datamodel, focusing on file creation events with
  specific filenames. This activity is significant because AzureHound is a tool used
  to gather information about Azure environments, similar to SharpHound for on-premises
  Active Directory. If confirmed malicious, this activity could indicate an attacker
  is collecting sensitive Azure environment data, potentially leading to further exploitation
  or privilege escalation within the cloud infrastructure.
severity: medium
enabled: false
tags:
  mitre:
  - T1069.001
  - T1069.002
  - T1087.001
  - T1087.002
  - T1482
  categories:
  - endpoint
references:
- https://posts.specterops.io/introducing-bloodhound-4-0-the-azure-update-9b2b26c5e350
- https://github.com/BloodHoundAD/Legacy-AzureHound.ps1/blob/master/AzureHound.ps1
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE Filesystem.file_name\
    \ IN (\"*-azurecollection.zip\", \"*-azprivroleadminrights.json\", \"*-azglobaladminrights.json\"\
    , \"*-azcloudappadmins.json\", \"*-azapplicationadmins.json\")\n  BY Filesystem.action\
    \ Filesystem.dest Filesystem.file_access_time\n     Filesystem.file_create_time\
    \ Filesystem.file_hash Filesystem.file_modify_time\n     Filesystem.file_name\
    \ Filesystem.file_path Filesystem.file_acl\n     Filesystem.file_size Filesystem.process_guid\
    \ Filesystem.process_id\n     Filesystem.user Filesystem.vendor_product\n| `drop_dm_object_name(Filesystem)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `detect_azurehound_file_modifications_filter`"
provenance:
