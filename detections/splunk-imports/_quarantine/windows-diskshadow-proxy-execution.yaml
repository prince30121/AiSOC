id: splunk-security-content-58adae9e-8ea3-11ec-90f6-acde48001122
name: Windows Diskshadow Proxy Execution
description: The following analytic detects the use of DiskShadow.exe in scripting
  mode, which can execute arbitrary unsigned code. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on command-line executions with scripting
  mode flags. This activity is significant because DiskShadow.exe is typically used
  for legitimate backup operations, but its misuse can indicate an attempt to execute
  unauthorized code. If confirmed malicious, this could lead to unauthorized code
  execution, potentially compromising the system and allowing further malicious activities.
severity: medium
enabled: false
tags:
  mitre:
  - T1218
  categories:
  - endpoint
references:
- https://bohops.com/2018/03/26/diskshadow-the-return-of-vss-evasion-persistence-and-active-directory-database-extraction/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime from datamodel=Endpoint.Processes where\n(Processes.process_name=diskshadow.exe\
    \ OR Processes.original_file_name=diskshadow.exe)\nProcesses.process IN (*-s*,\
    \ */s*)\nby Processes.action Processes.dest Processes.original_file_name\n   Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n   Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n   Processes.process\
    \ Processes.process_exec Processes.process_guid Processes.process_hash\n   Processes.process_id\
    \ Processes.process_integrity_level Processes.process_name Processes.process_path\n\
    \   Processes.user Processes.user_id Processes.vendor_product | `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_diskshadow_proxy_execution_filter`"
provenance:
