id: splunk-security-content-39c61d09-8b30-4154-922b-2d0a694ecc22
name: Detect New Open S3 Buckets over AWS CLI
description: The following analytic detects the creation of open/public S3 buckets
  via the AWS CLI. It leverages AWS CloudTrail logs to identify events where a user
  has set bucket permissions to allow access to "AuthenticatedUsers" or "AllUsers."
  This activity is significant because open S3 buckets can expose sensitive data to
  unauthorized users, leading to data breaches. If confirmed malicious, an attacker
  could gain unauthorized access to potentially sensitive information stored in the
  S3 bucket, posing a significant security risk.
severity: medium
enabled: false
tags:
  mitre:
  - T1530
  categories:
  - cloud
references: []
logsource:
  product: splunk
detection:
  splunk_spl: "`cloudtrail` eventSource=\"s3.amazonaws.com\" (userAgent=\"[aws-cli*\"\
    \ OR userAgent=aws-cli* ) eventName=PutBucketAcl OR requestParameters.accessControlList.x-amz-grant-read-acp\
    \ IN (\"*AuthenticatedUsers\",\"*AllUsers\") OR requestParameters.accessControlList.x-amz-grant-write\
    \ IN (\"*AuthenticatedUsers\",\"*AllUsers\") OR requestParameters.accessControlList.x-amz-grant-write-acp\
    \ IN (\"*AuthenticatedUsers\",\"*AllUsers\") OR requestParameters.accessControlList.x-amz-grant-full-control\
    \ IN (\"*AuthenticatedUsers\",\"*AllUsers\")\n  | rename requestParameters.bucketName\
    \ AS bucketName\n  | fillnull\n  | stats count min(_time) as firstTime max(_time)\
    \ as lastTime\n    BY userIdentity.userName userIdentity.principalId userAgent\n\
    \       bucketName requestParameters.accessControlList.x-amz-grant-read requestParameters.accessControlList.x-amz-grant-read-acp\n\
    \       requestParameters.accessControlList.x-amz-grant-write requestParameters.accessControlList.x-amz-grant-write-acp\
    \ requestParameters.accessControlList.x-amz-grant-full-control\n  | rename userIdentity.userName\
    \ as user\n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `detect_new_open_s3_buckets_over_aws_cli_filter`"
