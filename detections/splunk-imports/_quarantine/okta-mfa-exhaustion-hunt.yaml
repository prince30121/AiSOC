id: splunk-security-content-97e2fe57-3740-402c-988a-76b64ce04b8d
name: Okta MFA Exhaustion Hunt
description: The following analytic detects patterns of successful and failed Okta
  MFA push attempts to identify potential MFA exhaustion attacks. It leverages Okta
  event logs, specifically focusing on push verification events, and uses statistical
  evaluations to determine suspicious activity. This activity is significant as it
  may indicate an attacker attempting to bypass MFA by overwhelming the user with
  push notifications. If confirmed malicious, this could lead to unauthorized access,
  compromising the security of the affected accounts and potentially the entire environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1110
  categories:
  - application
references:
- https://developer.okta.com/docs/reference/api/event-types/?q=user.acount.lock
- https://sec.okta.com/everythingisyes
- https://splunkbase.splunk.com/app/6553
logsource:
  product: splunk
detection:
  splunk_spl: "`okta` eventType=system.push.send_factor_verify_push OR ((legacyEventType=core.user.factor.attempt_success)\
    \ AND (debugContext.debugData.factor=OKTA_VERIFY_PUSH)) OR ((legacyEventType=core.user.factor.attempt_fail)\
    \ AND (debugContext.debugData.factor=OKTA_VERIFY_PUSH))\n  | stats count(eval(legacyEventType=\"\
    core.user.factor.attempt_success\"))  as successes count(eval(legacyEventType=\"\
    core.user.factor.attempt_fail\")) as failures count(eval(eventType=\"system.push.send_factor_verify_push\"\
    )) as pushes\n    BY user,_time\n  | stats latest(_time) as lasttime earliest(_time)\
    \ as firsttime sum(successes) as successes sum(failures) as failures sum(pushes)\
    \ as pushes\n    BY user\n  | eval seconds=lasttime-firsttime\n  | eval lasttime=strftime(lasttime,\
    \ \"%c\")\n  | search (pushes>1)\n  | eval totalattempts=successes+failures\n\
    \  | eval finding=\"Normal authentication pattern\"\n  | eval finding=if(failures==pushes\
    \ AND pushes>1,\"Authentication attempts not successful because multiple pushes\
    \ denied\",finding)\n  | eval finding=if(totalattempts==0,\"Multiple pushes sent\
    \ and ignored\",finding)\n  | eval finding=if(successes>0 AND pushes>3,\"Probably\
    \ should investigate. Multiple pushes sent, eventual successful authentication!\"\
    ,finding)\n  | `okta_mfa_exhaustion_hunt_filter`"
