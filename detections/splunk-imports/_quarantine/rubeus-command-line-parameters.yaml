id: splunk-security-content-cca37478-8377-11ec-b59a-acde48001122
name: Rubeus Command Line Parameters
description: The following analytic detects the use of Rubeus command line parameters,
  a toolset for Kerberos attacks within Active Directory environments. It leverages
  Endpoint Detection and Response (EDR) data to identify specific command-line arguments
  associated with actions like ticket manipulation, kerberoasting, and password spraying.
  This activity is significant as Rubeus is commonly used by adversaries to exploit
  Kerberos for privilege escalation and lateral movement. If confirmed malicious,
  this could lead to unauthorized access, persistence, and potential compromise of
  sensitive information within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1550.003
  - T1558.003
  - T1558.004
  categories:
  - endpoint
references:
- https://github.com/GhostPack/Rubeus
- https://web.archive.org/web/20210725005734/http://www.harmj0y.net/blog/redteaming/from-kekeo-to-rubeus/
- https://attack.mitre.org/techniques/T1550/003/
- https://en.hackndo.com/kerberos-silver-golden-tickets/
logsource:
  product: splunk
detection:
  splunk_spl: '| tstats `security_content_summariesonly` count min(_time) as firstTime
    max(_time) as lastTime from datamodel=Endpoint.Processes where (Processes.process
    = "*ptt /ticket*" OR Processes.process = "* monitor /interval*" OR Processes.process
    ="* asktgt* /user:*" OR Processes.process ="* asktgs* /service:*" OR Processes.process
    ="* golden* /user:*" OR Processes.process ="* silver* /service:*" OR Processes.process
    ="* kerberoast*" OR Processes.process ="* asreproast*" OR Processes.process =
    "* renew* /ticket:*" OR Processes.process = "* brute* /password:*" OR Processes.process
    = "* brute* /passwords:*" OR Processes.process ="* harvest*") by Processes.action
    Processes.dest Processes.original_file_name Processes.parent_process Processes.parent_process_exec
    Processes.parent_process_guid Processes.parent_process_id Processes.parent_process_name
    Processes.parent_process_path Processes.process Processes.process_exec Processes.process_guid
    Processes.process_hash Processes.process_id Processes.process_integrity_level
    Processes.process_name Processes.process_path Processes.user Processes.user_id
    Processes.vendor_product | `drop_dm_object_name(Processes)` | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `rubeus_command_line_parameters_filter`'
provenance:
