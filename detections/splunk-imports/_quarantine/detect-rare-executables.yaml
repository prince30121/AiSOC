id: splunk-security-content-44fddcb2-8d3b-454c-874e-7c6de5a4f7ac
name: Detect Rare Executables
description: 'The following analytic detects the execution of rare processes that
  appear only once across the network within a specified timeframe.

  It leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  process execution logs.

  This activity is significant for a SOC as it helps identify potentially malicious
  activities or unauthorized software, which could indicate a security breach or ongoing
  attack.

  If confirmed malicious, such rare processes could lead to data theft, privilege
  escalation, or complete system compromise, making early detection crucial for minimizing
  impact.

  The search currently identifies processes executed on fewer than 10 hosts, but this
  threshold can be adjusted based on the organization''s environment and risk tolerance.

  The search groups results by process name which can lead to blind spots if a malicious
  process uses a common name. To mitigate this, consider enhancing the detection logic
  to group by additional attributes such as process hash.'
severity: medium
enabled: false
tags:
  mitre:
  - T1204
  categories:
  - endpoint
references: []
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  dc(Processes.dest) as\
    \ dc_dest\n  values(Processes.dest) as dest\n  values(Processes.user) as user\n\
    \  min(_time) as firstTime\n  max(_time) as lastTime\n  latest(Processes.action)\
    \ as action\n  values(Processes.original_file_name) as original_file_name\n  values(Processes.parent_process)\
    \ as parent_process\n  values(Processes.parent_process_exec) as parent_process_exec\n\
    \  latest(Processes.parent_process_guid) as parent_process_guid\n  latest(Processes.parent_process_id)\
    \ as parent_process_id\n  values(Processes.parent_process_name) as parent_process_name\n\
    \  values(Processes.parent_process_path) as parent_process_path\n  values(Processes.process)\
    \ as process\n  values(Processes.process_exec) as process_exec\n  latest(Processes.process_guid)\
    \ as process_guid\n  values(Processes.process_hash) as process_hash\n  values(Processes.process_path)\
    \ as process_path\n  latest(Processes.process_id) as process_id\n  latest(Processes.process_integrity_level)\
    \ as process_integrity_level\n  latest(Processes.user_id) as user_id\n  latest(Processes.vendor_product)\
    \ as vendor_product\nfrom datamodel=Endpoint.Processes\nby Processes.process_name\n\
    | `drop_dm_object_name(Processes)`\n| search dc_dest < 10\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `detect_rare_executables_filter`"
