id: splunk-security-content-b84e8f39-4e7b-4d4f-9e7c-fcd29a227845
name: WS FTP Remote Code Execution
description: 'The following analytic detects potential Remote Code Execution (RCE)
  attempts exploiting CVE-2023-40044 in WS_FTP software.

  It identifies HTTP POST requests to the "/AHT/AhtApiService.asmx/AuthUser" URL with
  a status code of 200.

  This detection leverages the Web datamodel to monitor specific URL patterns and
  HTTP status codes. This activity is significant as it may indicate an exploitation
  attempt, potentially allowing an attacker to execute arbitrary code on the server.

  If confirmed malicious, this could lead to unauthorized access, data exfiltration,
  or further compromise of the affected system.'
severity: medium
enabled: false
tags:
  mitre:
  - T1190
  categories:
  - application
references:
- https://github.com/projectdiscovery/nuclei-templates/pull/8296/files
- https://www.assetnote.io/resources/research/rce-in-progress-ws-ftp-ad-hoc-via-iis-http-modules-cve-2023-40044
- https://github.com/rapid7/metasploit-framework/pull/18414
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nFROM datamodel=Web WHERE\n\nWeb.url=\"*/AHT/AhtApiService.asmx/AuthUser\"\
    \nWeb.status=200\nWeb.http_method=\"POST\"\n\nBY Web.http_user_agent Web.status\
    \ Web.http_method\n   Web.url Web.url_length Web.src Web.dest\n\n| `drop_dm_object_name(\"\
    Web\")`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `ws_ftp_remote_code_execution_filter`"
