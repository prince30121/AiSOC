logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as process\n  min(_time) as firstTime max(_time) as lastTime\n  from datamodel=Endpoint.Processes\n\
    \  where (\n    (\n      (\n        Processes.process_name IN (\"powershell.exe\"\
    , \"pwsh.exe\", \"powershell_ise.exe\")\n        OR\n        Processes.original_file_name\
    \ IN (\"PowerShell.EXE\", \"pwsh.dll\", \"powershell_ise.EXE\")\n      )\n   \
    \   Processes.process IN (\"*Get-WinEvent*\", \"*Get-EventLog*\", \"*EventLogQuery*\"\
    , \"*.ReadEvent(*\")\n    )\n    OR\n    (\n      (\n        Processes.process_name\
    \ = wevtutil.exe\n        OR\n        Processes.original_file_name = wevtutil.exe\n\
    \      )\n      Processes.process IN (\"* qe *\", \"* query-events *\")\n    )\n\
    \    OR\n    (\n      (\n        Processes.process_name = wmic.exe\n        OR\n\
    \        Processes.original_file_name = wmic.exe\n      )\n      Processes.process\
    \ IN (\"*ntevent*\")\n    )\n    OR\n    (\n      Processes.process=\"*Win32_NTLogEvent*\"\
    \n      Processes.process=\"*EventCode*\"\n    )\n    OR\n    (\n      Processes.process\
    \ IN (\"*PsLogList*\", \"*Eventquery*\")\n    )\n  )\n  by\n    Processes.action\
    \ Processes.dest Processes.original_file_name Processes.parent_process Processes.parent_process_exec\n\
    \    Processes.parent_process_guid Processes.parent_process_id Processes.parent_process_name\n\
    \    Processes.parent_process_path Processes.process Processes.process_exec Processes.process_guid\n\
    \    Processes.process_hash Processes.process_id Processes.process_integrity_level\
    \ Processes.process_name\n    Processes.process_path Processes.user Processes.user_id\
    \ Processes.vendor_product\n\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_eventlog_recon_activity_using_log_query_utilities_filter`"
