id: splunk-security-content-dc167f8b-3f9d-4460-9c98-8b6e703fd628
name: Windows EventLog Recon Activity Using Log Query Utilities
description: This analytic detects EventLog reconnaissance activity using utilities
  such as `wevtutil.exe`, `wmic.exe`, PowerShell cmdlets like `Get-WinEvent`, or WMI
  queries targeting `Win32_NTLogEvent`. It leverages data from Endpoint Detection
  and Response (EDR) agents, focusing on process names and command-line arguments.
  These tools are often used by adversaries to extract usernames, IP addresses, session
  data, and event information for credential access or situational awareness during
  lateral movement. While these utilities are legitimate, execution with specific
  arguments or targeting sensitive logs like `Security`, `PowerShell`, or specific
  EventIDs (e.g., 4624, 4778) can indicate malicious intent. If confirmed malicious,
  this behavior could allow an attacker to extract sensitive info and potentially
  have leveraged access or move laterally.
severity: medium
enabled: false
tags:
  mitre:
  - T1654
  categories:
  - endpoint
references:
- http://blog.talosintelligence.com/2022/09/lazarus-three-rats.html
- https://thedfirreport.com/2023/10/30/netsupport-intrusion-results-in-domain-compromise/
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-144a
- https://www.group-ib.com/blog/apt41-world-tour-2021/
