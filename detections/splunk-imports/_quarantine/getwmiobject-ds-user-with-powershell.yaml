id: splunk-security-content-22d3b118-04df-11ec-8fa3-acde48001122
name: GetWmiObject DS User with PowerShell
description: 'The following analytic detects the execution of `powershell.exe` with
  command-line arguments used to query domain users via the `Get-WmiObject` cmdlet
  and `-class ds_user` parameter.

  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process names and command-line executions.

  This activity is significant as it indicates potential reconnaissance efforts by
  adversaries to enumerate domain users, which is a common step in Active Directory
  Discovery.

  If confirmed malicious, this could lead to further attacks, including privilege
  escalation and lateral movement within the network.'
severity: medium
enabled: false
tags:
  mitre:
  - T1087.002
  categories:
  - endpoint
references:
- https://jpcertcc.github.io/ToolAnalysisResultSheet/details/dsquery.htm
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nfrom datamodel=Endpoint.Processes where\n\n\
    (\n    `process_powershell`\n    OR\n    `process_cmd`\n)\nAND\nProcesses.process\
    \ = \"*get-wmiobject*\"\nProcesses.process = \"*ds_user*\"\nProcesses.process\
    \ = \"*root\\\\directory\\\\ldap*\"\nProcesses.process = \"*-namespace*\"\n\n\
    by Processes.action Processes.dest Processes.original_file_name\n   Processes.parent_process\
    \ Processes.parent_process_exec\n   Processes.parent_process_guid Processes.parent_process_id\n\
    \   Processes.parent_process_name Processes.parent_process_path\n   Processes.process\
    \ Processes.process_exec Processes.process_guid\n   Processes.process_hash Processes.process_id\n\
    \   Processes.process_integrity_level Processes.process_name\n   Processes.process_path\
    \ Processes.user\n   Processes.user_id Processes.vendor_product\n\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `getwmiobject_ds_user_with_powershell_filter`"
