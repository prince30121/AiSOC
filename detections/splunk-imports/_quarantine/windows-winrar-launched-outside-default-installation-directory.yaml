id: splunk-security-content-3b711292-9793-4a88-8e89-6e016cfbc09c
name: Windows WinRAR Launched Outside Default Installation Directory
description: 'This Analytics detects the execution of WinRAR or RAR outside the default
  installation directory.

  This behavior can be significant as it could indicate attempts to archive collected
  sensitive data from the endpoint for exfiltration.

  We recommend reviewing the process path and the parent process path to determine
  if the execution is legitimate and if possible validate the data being archived.'
severity: medium
enabled: false
tags:
  mitre:
  - T1047
  categories:
  - endpoint
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/py.blankgrabber
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime\n  from datamodel=Endpoint.Processes where\n  Processes.process_name\
    \ IN (\"Winrar.exe\", \"rar.exe\")\n  NOT Processes.process_path IN (\n    \"\
    *:\\\\Program Files (x86)\\\\WinRAR\\\\*\",\n    \"*:\\\\Program Files\\\\WinRAR\\\
    \\*\"\n  )\n  by Processes.action Processes.dest Processes.original_file_name\
    \ Processes.parent_process\n  Processes.parent_process_exec Processes.parent_process_guid\
    \ Processes.parent_process_id\n  Processes.parent_process_name Processes.parent_process_path\
    \ Processes.process Processes.process_exec\n  Processes.process_guid Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n  Processes.process_name\
    \ Processes.process_path Processes.user Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_winrar_launched_outside_default_installation_directory_filter`"
provenance:
