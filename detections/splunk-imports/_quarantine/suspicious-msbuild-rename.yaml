id: splunk-security-content-4006adac-5937-11eb-ae93-0242ac130002
name: Suspicious MSBuild Rename
description: The following analytic detects the execution of renamed instances of
  msbuild.exe. It leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process names and original file names within the Endpoint data model.
  This activity is significant because msbuild.exe is a legitimate tool often abused
  by attackers to execute malicious code while evading detection. If confirmed malicious,
  this behavior could allow an attacker to execute arbitrary code, potentially leading
  to system compromise, data exfiltration, or further lateral movement within the
  network.
severity: medium
enabled: false
tags:
  mitre:
  - T1036.003
  - T1127.001
  categories:
  - endpoint
references:
- https://lolbas-project.github.io/lolbas/Binaries/Msbuild/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1127.001/T1127.001.md
- https://github.com/infosecn1nja/MaliciousMacroMSBuild/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name!=msbuild.exe\n\
    \    AND\n    Processes.original_file_name=MSBuild.exe\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `suspicious_msbuild_rename_filter`"
