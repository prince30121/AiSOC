id: splunk-security-content-dd0f07ea-f08f-4d88-96e5-cb58156e82b6
name: Windows Service Stop Attempt
description: The following analytic identifies attempts to stop services on a system
  using `net.exe`, `sc.exe` or the "Stop-Service" cmdlet. It leverages Endpoint Detection
  and Response (EDR) telemetry. This activity can be significant as adversaries often
  terminate security or critical services to evade detection and further their objectives.
  If confirmed malicious, this behavior could allow attackers to disable security
  defenses, facilitate ransomware encryption, or disrupt essential services, leading
  to potential data loss or system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1489
  categories:
  - endpoint
references:
- https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  (`process_net`\n        OR\n        `process_sc`) Processes.process=\"* stop\
    \ *\"\n    )\n    OR Processes.process=\"*Stop-Service *\"\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_service_stop_attempt_filter`"
