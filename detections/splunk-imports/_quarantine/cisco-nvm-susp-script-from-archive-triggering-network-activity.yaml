id: splunk-security-content-8b07c2c9-0cde-4c44-9fa6-59dcf2b25777
name: Cisco NVM - Susp Script From Archive Triggering Network Activity
description: 'This analytic detects script execution (`wscript.exe` or `cscript.exe`)
  triggered from compressed files opened directly using

  `explorer.exe`, `winrar.exe`, or `7zFM.exe`.

  When a user double clicks on a ".js" file from within one of these compressed files.
  Its extracted temporally in the temp directory in folder with certain markers.

  It leverages Cisco Network Visibility Module (NVM) flow data, in order to look for
  a specific parent/child relationship and an initiated network connection.

  This behavior is exploited by threat actors such as Scarlet Goldfinch to deliver
  and run malicious scripts as an initial access technique.'
severity: medium
enabled: false
tags:
  mitre:
  - T1059.005
  - T1204.002
  categories:
  - endpoint
references:
- https://redcanary.com/threat-detection-report/threats/scarlet-goldfinch/
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_network_visibility_module_flowdata`\nparent_process_name IN\
    \ (\"explorer.exe\", \"winrar.exe\", \"7zFM.exe\")\nprocess_name IN (\"wscript.exe\"\
    , \"cscript.exe\")\nprocess_arguments = \"*\\\\AppData\\\\Local\\\\Temp\\\\*\"\
    \nprocess_arguments IN (\"*\\\\rar*\", \"*\\\\7z*\", \"*.zip*\")\n| stats count\
    \ min(_time) as firstTime max(_time) as lastTime\n        values(parent_process_arguments)\
    \ as parent_process_arguments\n        values(process_arguments) as process_arguments\n\
    \        values(parent_process_hash) as parent_process_hash\n        values(process_hash)\
    \ as process_hash\n        values(module_name_list) as module_name_list\n    \
    \    values(module_hash_list) as module_hash_list\n        values(dest_port) as\
    \ dest_port\n        values(aliul) as additional_logged_in_users_list\n      \
    \  values(dest_hostname) as dest_hostname\n        by src dest parent_process_path\
    \ parent_process_name parent_process_integrity_level process_path process_name\
    \ process_integrity_level process_id transport\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| table\n  parent_process_integrity_level\
    \ parent_process_name parent_process_path parent_process_arguments parent_process_hash\n\
    \  process_integrity_level process_path process_name process_arguments process_hash\
    \ process_id\n  additional_logged_in_users_list module_name_list module_hash_list\n\
    \  src dest_hostname dest dest_port transport firstTime lastTime\n| `cisco_nvm___susp_script_from_archive_triggering_network_activity_filter`"
