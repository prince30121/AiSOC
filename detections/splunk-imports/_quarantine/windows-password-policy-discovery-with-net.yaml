id: splunk-security-content-e52f7865-be78-46bf-b7ed-150fbe447613
name: Windows Password Policy Discovery with Net
description: The following analytic identifies the execution of `net.exe` with command
  line arguments aimed at obtaining the computer or domain password policy. It leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process names
  and command-line executions. This activity is significant as it indicates potential
  reconnaissance efforts by adversaries to gather information about Active Directory
  password policies. If confirmed malicious, this behavior could allow attackers to
  understand password complexity requirements, aiding in brute-force or password-guessing
  attacks, ultimately compromising user accounts and gaining unauthorized access to
  the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1201
  categories:
  - endpoint
references:
- https://github.com/S1ckB0y1337/Active-Directory-Exploitation-Cheat-Sheet
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_net`\n\
    \    AND\n    Processes.process = \"*accounts*\"\n    AND\n    NOT Processes.process\
    \ IN (\"*/FORCELOGOFF*\", \"*/MINPWLEN*\", \"*/MAXPWAGE*\", \"*/MINPWAGE*\", \"\
    */UNIQUEPW*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_password_policy_discovery_with_net_filter`"
