id: splunk-security-content-8ef3971e-00f2-11ec-b54f-acde48001122
name: Gsuite Email Suspicious Subject With Attachment
description: The following analytic identifies Gsuite emails with suspicious subjects
  and attachments commonly used in spear phishing attacks. It leverages Gsuite email
  logs, focusing on specific keywords in the subject line and known malicious file
  types in attachments. This activity is significant for a SOC as spear phishing is
  a prevalent method for initial compromise, often leading to further malicious actions.
  If confirmed malicious, this activity could result in unauthorized access, data
  exfiltration, or further malware deployment, posing a significant risk to the organization's
  security.
severity: medium
enabled: false
tags:
  mitre:
  - T1566.001
  categories:
  - cloud
references:
- https://www.redhat.com/en/topics/devops/what-is-devsecops
- https://www.mandiant.com/resources/top-words-used-in-spear-phishing-attacks
logsource:
  product: splunk
detection:
  splunk_spl: "`gsuite_gmail` num_message_attachments > 0 subject IN (\"*dhl*\", \"\
    * ups *\", \"*delivery*\", \"*parcel*\", \"*label*\", \"*invoice*\", \"*postal*\"\
    , \"* fedex *\", \"* usps *\", \"* express *\", \"*shipment*\", \"*Banking/Tax*\"\
    ,\"*shipment*\", \"*new order*\") attachment{}.file_extension_type IN (\"doc\"\
    , \"docx\", \"xls\", \"xlsx\", \"ppt\", \"pptx\", \"pdf\", \"zip\", \"rar\", \"\
    html\",\"htm\",\"hta\")\n  | rex field=source.from_header_address \"[^@]+@(?<source_domain>[^@]+)\"\
    \n  | rex field=destination{}.address \"[^@]+@(?<dest_domain>[^@]+)\"\n  | where\
    \ not source_domain=\"internal_test_email.com\" and dest_domain=\"internal_test_email.com\"\
    \n  | eval phase=\"plan\"\n  | eval severity=\"medium\"\n  | stats count min(_time)\
    \ as firstTime max(_time) as lastTime values(attachment{}.file_extension_type)\
    \ as email_attachments, values(attachment{}.sha256) as attachment_sha256, values(payload_size)\
    \ as payload_size\n    BY destination{}.service num_message_attachments subject\n\
    \       destination{}.address source.address phase\n       severity\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `gsuite_email_suspicious_subject_with_attachment_filter`"
provenance:
