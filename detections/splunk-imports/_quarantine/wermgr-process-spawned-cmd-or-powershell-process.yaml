id: splunk-security-content-e8fc95bc-a107-11eb-a978-acde48001122
name: Wermgr Process Spawned CMD Or Powershell Process
description: The following analytic detects the spawning of cmd or PowerShell processes
  by the wermgr.exe process. It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process telemetry, including parent-child process relationships
  and command-line executions. This behavior is significant as it is commonly associated
  with code injection techniques used by malware like TrickBot to execute shellcode
  or malicious DLL modules. If confirmed malicious, this activity could allow attackers
  to execute arbitrary code, escalate privileges, or maintain persistence within the
  environment, posing a severe threat to system security.
severity: medium
enabled: false
tags:
  mitre:
  - T1059
  categories:
  - endpoint
references:
- https://labs.vipre.com/trickbot-and-its-modules/
- https://whitehat.eu/incident-response-case-study-featuring-ryuk-and-trickbot-part-2/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as cmdline min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes\n\
    \  WHERE Processes.parent_process_name = \"wermgr.exe\" `process_cmd`\n    OR\n\
    \    `process_powershell`\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `wermgr_process_spawned_cmd_or_powershell_process_filter`"
