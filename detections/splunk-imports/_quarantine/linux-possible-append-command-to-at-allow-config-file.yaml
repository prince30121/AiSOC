id: splunk-security-content-7bc20606-5f40-11ec-a586-acde48001122
name: Linux Possible Append Command To At Allow Config File
description: The following analytic detects suspicious command lines that append user
  entries to /etc/at.allow or /etc/at.deny files. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on command-line executions involving
  these files. This activity is significant because altering these configuration files
  can allow attackers to schedule tasks with elevated permissions, facilitating persistence
  on a compromised Linux host. If confirmed malicious, this could enable attackers
  to execute arbitrary code at scheduled intervals, potentially leading to further
  system compromise and unauthorized access to sensitive information.
severity: medium
enabled: false
tags:
  mitre:
  - T1053.002
  categories:
  - endpoint
references:
- https://linuxize.com/post/at-command-in-linux/
- https://attack.mitre.org/techniques/T1053/001/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count FROM datamodel=Endpoint.Processes\n\
    \  WHERE Processes.process = \"*echo*\"\n    AND\n    Processes.process IN(\"\
    */etc/at.allow\", \"*/etc/at.deny\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_possible_append_command_to_at_allow_config_file_filter`"
