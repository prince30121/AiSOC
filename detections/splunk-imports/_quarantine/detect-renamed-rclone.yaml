id: splunk-security-content-6dca1124-b3ec-11eb-9328-acde48001122
name: Detect Renamed RClone
description: The following analytic detects the execution of a renamed `rclone.exe`
  process, which is commonly used for data exfiltration to remote destinations. This
  detection leverages Endpoint Detection and Response (EDR) telemetry, focusing on
  process names and original file names that do not match. This activity is significant
  because ransomware groups often use RClone to exfiltrate sensitive data. If confirmed
  malicious, this behavior could indicate an ongoing data exfiltration attempt, potentially
  leading to significant data loss and further compromise of the affected systems.
severity: medium
enabled: false
tags:
  mitre:
  - T1020
  categories:
  - endpoint
references:
- https://redcanary.com/blog/rclone-mega-extortion/
- https://www.mandiant.com/resources/shining-a-light-on-darkside-ransomware-operations
- https://thedfirreport.com/2021/03/29/sodinokibi-aka-revil-ransomware/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.original_file_name=rclone.exe\n        AND\n        Processes.process_name!=rclone.exe\n\
    \    )\n  BY Processes.action Processes.dest Processes.original_file_name\n  \
    \   Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `detect_renamed_rclone_filter`"
provenance:
