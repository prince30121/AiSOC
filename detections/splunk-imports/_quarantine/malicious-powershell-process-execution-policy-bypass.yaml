id: splunk-security-content-9be56c82-b1cc-4318-87eb-d138afaaca39
name: Malicious PowerShell Process - Execution Policy Bypass
description: The following analytic detects PowerShell processes initiated with parameters
  that bypass the local execution policy for scripts. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on command-line executions containing
  specific flags like "-ex" or "bypass." This activity is significant because bypassing
  execution policies is a common tactic used by attackers to run malicious scripts
  undetected. If confirmed malicious, this could allow an attacker to execute arbitrary
  code, potentially leading to further system compromise, data exfiltration, or persistent
  access within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.001
  categories:
  - endpoint
references:
- https://www.microsoft.com/en-us/security/blog/2023/05/24/volt-typhoon-targets-us-critical-infrastructure-with-living-off-the-land-techniques/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process_id)\
    \ as process_id, values(Processes.parent_process_id) as parent_process_id values(Processes.process)\
    \ as process min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes\n\
    \  WHERE `process_powershell` (Processes.process=\"* -ex*\"\n    AND\n    Processes.process=\"\
    * bypass *\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `malicious_powershell_process___execution_policy_bypass_filter`"
