id: splunk-security-content-e20564ca-c86c-4e30-acdb-a8486673426f
name: Ivanti EPM SQL Injection Remote Code Execution
description: 'This detection identifies potential exploitation of a critical SQL injection
  vulnerability in Ivanti Endpoint Manager (EPM), identified as CVE-2024-29824.

  The vulnerability, which has a CVSS score of 9.8, allows for remote code execution
  through the `RecordGoodApp` function in the `PatchBiz.dll` file.

  An attacker can exploit this vulnerability by manipulating the `goodApp.md5` value
  in an HTTP POST request to the `/WSStatusEvents/EventHandler.asmx` endpoint, leading
  to unauthorized command execution on the server.

  Monitoring for unusual SQL commands and HTTP requests to this endpoint can help
  identify exploitation attempts.

  Note that, the detection is focused on the URI path, HTTP method and status code
  of 200, indicating potential exploitation.

  To properly identify if this was successful, TLS inspection and additional network
  traffic analysis is required as the xp_cmdshell comes in via the request body.'
severity: medium
enabled: false
tags:
  mitre:
  - T1190
  categories:
  - application
references:
- https://www.horizon3.ai/attack-research/attack-blogs/cve-2024-29824-deep-dive-ivanti-epm-sql-injection-remote-code-execution-vulnerability/
- https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2024-29824
- https://github.com/projectdiscovery/nuclei-templates/pull/10020/files
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nFROM datamodel=Web WHERE\n\nWeb.url=\"*/WSStatusEvents/EventHandler.asmx\"\
    \nWeb.http_method=POST\nWeb.status=200\n\nBY Web.http_user_agent Web.status Web.http_method\n\
    \   Web.url Web.url_length Web.src Web.dest\n\n| `drop_dm_object_name(\"Web\"\
    )`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `ivanti_epm_sql_injection_remote_code_execution_filter`"
