id: splunk-security-content-701a8740-e8db-40df-9190-5516d3819787
name: Sunburst Correlation DLL and Network Event
description: The following analytic identifies the loading of the malicious SolarWinds.Orion.Core.BusinessLayer.dll
  by SolarWinds.BusinessLayerHost.exe and subsequent DNS queries to avsvmcloud.com.
  It uses Sysmon EventID 7 for DLL loading and Event ID 22 for DNS queries, correlating
  these events within a 12-14 day period. This activity is significant as it indicates
  potential Sunburst malware infection, a known supply chain attack. If confirmed
  malicious, this could lead to unauthorized network access, data exfiltration, and
  further compromise of the affected systems.
severity: medium
enabled: false
tags:
  mitre:
  - T1203
  categories:
  - endpoint
references:
- https://www.mandiant.com/resources/evasive-attacker-leverages-solarwinds-supply-chain-compromises-with-sunburst-backdoor
logsource:
  product: splunk
detection:
  splunk_spl: "`sysmon`\n(\n    EventCode=7\n    ImageLoaded=*SolarWinds.Orion.Core.BusinessLayer.dll\n\
    )\nOR\n(\n    EventCode=22\n    QueryName=*avsvmcloud.com\n)\n| eventstats dc(EventCode)\
    \ AS dc_events\n| where dc_events=2\n| stats count min(_time) as firstTime\n \
    \             max(_time) as lastTime\n    by Image ImageLoaded dest\n       loaded_file\
    \ loaded_file_path original_file_name\n       process_exec process_guid process_hash\n\
    \       process_id process_name process_path\n       service_dll_signature_exists\
    \ service_dll_signature_verified signature\n       signature_id user_id vendor_product\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `sunburst_correlation_dll_and_network_event_filter`"
