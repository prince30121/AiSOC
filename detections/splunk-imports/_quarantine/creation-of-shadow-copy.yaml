id: splunk-security-content-eb120f5f-b879-4a63-97c1-93352b5df844
name: Creation of Shadow Copy
description: The following analytic detects the creation of shadow copies using Vssadmin
  or Wmic. It leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process execution logs that include command-line details. This activity is significant
  because creating shadow copies can be a precursor to ransomware attacks or data
  exfiltration, allowing attackers to bypass file locks and access sensitive data.
  If confirmed malicious, this behavior could enable attackers to maintain persistence,
  recover deleted files, or prepare for further malicious activities, posing a significant
  risk to the integrity and confidentiality of the system.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.003
  categories:
  - endpoint
references:
- https://2017.zeronights.org/wp-content/uploads/materials/ZN17_Kheirkhabarov_Hunting_for_Credentials_Dumping_in_Windows_Environment.pdf
- https://media.defense.gov/2023/May/24/2003229517/-1/-1/0/CSA_Living_off_the_Land.PDF
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=vssadmin.exe Processes.process=*create* Processes.process=*shadow*\n\
    \    )\n    OR (Processes.process_name=wmic.exe Processes.process=*shadowcopy*\
    \ Processes.process=*create*)\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `creation_of_shadow_copy_filter`"
