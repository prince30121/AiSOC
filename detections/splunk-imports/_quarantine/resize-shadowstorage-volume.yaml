id: splunk-security-content-bc760ca6-8336-11eb-bcbb-acde48001122
name: Resize ShadowStorage volume
description: The following analytic identifies the resizing of shadow storage volumes,
  a technique used by ransomware like CLOP to prevent the recreation of shadow volumes.
  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on command-line executions involving "vssadmin.exe" with parameters related
  to resizing shadow storage. This activity is significant as it indicates an attempt
  to hinder recovery efforts by manipulating shadow copies. If confirmed malicious,
  this could lead to successful ransomware deployment, making data recovery difficult
  and increasing the potential for data loss.
severity: medium
enabled: false
tags:
  mitre:
  - T1490
  categories:
  - endpoint
references:
- https://www.mandiant.com/resources/fin11-email-campaigns-precursor-for-ransomware-data-theft
- https://blog.virustotal.com/2020/11/keep-your-friends-close-keep-ransomware.html
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1490/T1490.md
- https://redcanary.com/blog/blackbyte-ransomware/
- https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/vssadmin-resize-shadowstorage
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` values(Processes.process)\
    \ as cmdline values(Processes.parent_process_name) as parent_process values(Processes.process_name)\
    \ as process_name min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes\n\
    \  WHERE Processes.parent_process_name = \"cmd.exe\"\n    OR\n    Processes.parent_process_name\
    \ = \"powershell.exe\"\n    OR\n    Processes.parent_process_name = \"powershell_ise.exe\"\
    \n    OR\n    Processes.parent_process_name =  \"wmic.exe\" Processes.process_name\
    \ = \"vssadmin.exe\" Processes.process=\"*resize*\" Processes.process=\"*shadowstorage*\"\
    \ Processes.process=\"*/maxsize*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `resize_shadowstorage_volume_filter`"
