id: splunk-security-content-e24f0a0e-41a9-419f-9999-eacab15efc36
name: Windows System Network Config Discovery Display DNS
description: The following analytic identifies the execution of the "ipconfig /displaydns"
  command, which retrieves DNS reply information using the built-in Windows tool IPConfig.
  This detection leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process command-line executions. Monitoring this activity is significant
  as threat actors and post-exploitation tools like WINPEAS often abuse this command
  to gather network information. If confirmed malicious, this activity could allow
  attackers to map the network, identify DNS servers, and potentially facilitate further
  network-based attacks or lateral movement.
severity: medium
enabled: false
tags:
  mitre:
  - T1016
  categories:
  - endpoint
references:
- https://superuser.com/questions/230308/explain-output-of-ipconfig-displaydns
- https://github.com/carlospolop/PEASS-ng/tree/master/winPEAS
- https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=\"\
    ipconfig.exe\"\n    OR\n    Processes.original_file_name = \"ipconfig.exe\"\n\
    \    AND\n    Processes.process = \"*/displaydns*\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_system_network_config_discovery_display_dns_filter`"
