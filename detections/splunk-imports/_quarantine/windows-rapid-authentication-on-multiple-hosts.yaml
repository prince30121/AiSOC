id: splunk-security-content-62606c77-d53d-4182-9371-b02cdbbbcef7
name: Windows Rapid Authentication On Multiple Hosts
description: The following analytic detects a source computer authenticating to 30
  or more remote endpoints within a 5-minute timespan using Event ID 4624. This behavior
  is identified by analyzing Windows Event Logs for LogonType 3 events and counting
  unique target computers. Such activity is significant as it may indicate lateral
  movement or network share enumeration by an adversary. If confirmed malicious, this
  could lead to unauthorized access to multiple systems, potentially compromising
  sensitive data and escalating privileges within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.002
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1135/
- https://thedfirreport.com/2023/01/23/sharefinder-how-threat-actors-discover-file-shares/
- https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4624
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_security` EventCode=4624 LogonType=3 TargetUserName!=\"\
    ANONYMOUS LOGON\" TargetUserName!=\"*$\"\n  | bucket span=5m _time\n  | stats\
    \ dc(Computer) AS unique_targets values(Computer) as host_targets values(dest)\
    \ as dest values(src) as src values(user) as user\n    BY _time, IpAddress, TargetUserName,\n\
    \       action, app, authentication_method,\n       signature, signature_id\n\
    \  | where unique_targets > 30\n  | `windows_rapid_authentication_on_multiple_hosts_filter`"
