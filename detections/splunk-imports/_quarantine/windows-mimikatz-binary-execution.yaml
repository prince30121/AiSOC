id: splunk-security-content-a9e0d6d3-9676-4e26-994d-4e0406bb4467
name: Windows Mimikatz Binary Execution
description: The following analytic identifies the execution of the native mimikatz.exe
  binary on Windows systems, including instances where the binary is renamed. It leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process names
  and original file names. This activity is significant because Mimikatz is a widely
  used tool for extracting authentication credentials, posing a severe security risk.
  If confirmed malicious, this activity could allow attackers to obtain sensitive
  credentials, escalate privileges, and move laterally within the network, leading
  to potential data breaches and system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1003
  categories:
  - endpoint
references:
- https://www.cisa.gov/uscert/sites/default/files/publications/aa22-320a_joint_csa_iranian_government-sponsored_apt_actors_compromise_federal%20network_deploy_crypto%20miner_credential_harvester.pdf
- https://www.varonis.com/blog/what-is-mimikatz
- https://media.defense.gov/2023/May/24/2003229517/-1/-1/0/CSA_Living_off_the_Land.PDF
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=mimikatz.exe\n        OR\n        Processes.original_file_name=mimikatz.exe\n\
    \    )\n  BY Processes.action Processes.dest Processes.original_file_name\n  \
    \   Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_mimikatz_binary_execution_filter`"
