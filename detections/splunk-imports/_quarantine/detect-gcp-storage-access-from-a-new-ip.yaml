id: splunk-security-content-ccc3246a-daa1-11ea-87d0-0242ac130022
name: Detect GCP Storage access from a new IP
description: The following analytic identifies access to GCP Storage buckets from
  new or previously unseen remote IP addresses. It leverages GCP Storage bucket-access
  logs ingested via Cloud Pub/Sub and compares current access events against a lookup
  table of previously seen IP addresses. This activity is significant as it may indicate
  unauthorized access or potential reconnaissance by an attacker. If confirmed malicious,
  this could lead to data exfiltration, unauthorized data manipulation, or further
  compromise of the GCP environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1530
  categories:
  - cloud
references: []
logsource:
  product: splunk
detection:
  splunk_spl: "`google_gcp_pubsub_message`\n  | multikv\n  | rename sc_status_ as\
    \ status\n  | rename cs_object_ as bucket_name\n  | rename c_ip_ as remote_ip\n\
    \  | rename cs_uri_ as request_uri\n  | rename cs_method_ as operation\n  | search\
    \ status=\"\\\"200\\\"\"\n  | stats earliest(_time) as firstTime latest(_time)\
    \ as lastTime\n    BY bucket_name remote_ip operation\n       request_uri\n  |\
    \ table firstTime, lastTime, bucket_name, remote_ip, operation, request_uri\n\
    \  | inputlookup append=t previously_seen_gcp_storage_access_from_remote_ip\n\
    \  | stats min(firstTime) as firstTime, max(lastTime) as lastTime\n    BY bucket_name\
    \ remote_ip operation\n       request_uri\n  | outputlookup previously_seen_gcp_storage_access_from_remote_ip\n\
    \  | eval newIP=if(firstTime >= relative_time(now(),\"-70m@m\"), 1, 0)\n  | where\
    \ newIP=1\n  | eval first_time=strftime(firstTime,\"%m/%d/%y %H:%M:%S\")\n  |\
    \ eval last_time=strftime(lastTime,\"%m/%d/%y %H:%M:%S\")\n  | table  first_time\
    \ last_time bucket_name remote_ip operation request_uri\n  | `detect_gcp_storage_access_from_a_new_ip_filter`"
provenance:
