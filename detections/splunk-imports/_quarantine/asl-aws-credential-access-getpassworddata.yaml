id: splunk-security-content-a79b607a-50cc-4704-bb9d-eff280cb78c2
name: ASL AWS Credential Access GetPasswordData
description: The following analytic identifiesGetPasswordData API calls in your AWS
  account. It leverages  CloudTrail logs from Amazon Security Lake to detect this
  activity by counting the distinct instance IDs accessed. This behavior is significant
  as it may indicate an attempt to retrieve encrypted administrator passwords for
  running Windows instances, which is a critical security concern. If confirmed malicious,
  attackers could gain unauthorized access to administrative credentials, potentially
  leading to full control over the affected instances and further compromise of the
  AWS environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1110.001
  - T1586.003
  categories:
  - cloud
references:
- https://attack.mitre.org/techniques/T1552/
- https://stratus-red-team.cloud/attack-techniques/AWS/aws.credential-access.ec2-get-password-data/
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=GetPasswordData\n  | spath input=api.request.data\n\
    \  | fillnull\n  | stats count min(_time) as firstTime max(_time) as lastTime\n\
    \    BY actor.user.uid api.operation api.service.name\n       http_request.user_agent\
    \ src_endpoint.ip actor.user.account.uid\n       cloud.provider cloud.region instanceId\n\
    \  | rename actor.user.uid as user api.operation as action api.service.name as\
    \ dest http_request.user_agent as user_agent src_endpoint.ip as src actor.user.account.uid\
    \ as vendor_account cloud.provider as vendor_product cloud.region as vendor_region\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `asl_aws_credential_access_getpassworddata_filter`"
