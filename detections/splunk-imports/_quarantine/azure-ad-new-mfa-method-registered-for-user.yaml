id: splunk-security-content-2628b087-4189-403f-9044-87403f777a1b
name: Azure AD New MFA Method Registered For User
description: The following analytic detects the registration of a new Multi-Factor
  Authentication (MFA) method for an Azure AD account. It leverages Azure AD AuditLogs
  to identify when a user registers new security information. This activity is significant
  because adversaries who gain unauthorized access to an account may add their own
  MFA method to maintain persistence. If confirmed malicious, this could allow attackers
  to bypass existing security controls, maintain long-term access, and potentially
  escalate their privileges within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1556.006
  categories:
  - cloud
references:
- https://docs.microsoft.com/en-us/azure/active-directory/authentication/concept-mfa-howitworks
- https://attack.mitre.org/techniques/T1556/
- https://attack.mitre.org/techniques/T1556/006/
- https://twitter.com/jhencinski/status/1618660062352007174
logsource:
  product: splunk
detection:
  splunk_spl: "`azure_monitor_aad` category=AuditLogs operationName=\"User registered\
    \ security info\" properties.operationType=Add\n  | rename properties.* as *\n\
    \  | rename targetResources{}.* as *\n  | rename userAgent as user_agent\n  |\
    \ fillnull\n  | stats count min(_time) as firstTime max(_time) as lastTime\n \
    \   BY action dest user\n       src vendor_account vendor_product\n       user_agent\
    \ result resultDescription\n       signature\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `azure_ad_new_mfa_method_registered_for_user_filter`"
