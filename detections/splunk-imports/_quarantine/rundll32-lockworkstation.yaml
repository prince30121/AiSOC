id: splunk-security-content-fa90f372-f91d-11eb-816c-acde48001122
name: Rundll32 LockWorkStation
description: The following analytic detects the execution of the rundll32.exe command
  with the user32.dll,LockWorkStation parameter, which is used to lock the workstation
  via command line. This detection leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process names and command-line executions. This activity
  is significant as it is an uncommon method to lock a screen and has been observed
  in CONTI ransomware tooling for defense evasion. If confirmed malicious, this technique
  could indicate an attempt to evade detection and hinder incident response efforts.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.011
  categories:
  - endpoint
references:
- https://threadreaderapp.com/thread/1423361119926816776.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=rundll32.exe\
    \ Processes.process= \"*user32.dll,LockWorkStation*\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `rundll32_lockworkstation_filter`"
