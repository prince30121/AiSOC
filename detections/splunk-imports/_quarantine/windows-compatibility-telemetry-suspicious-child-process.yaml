id: splunk-security-content-56fe46ca-ffef-46fe-8f0e-5cd4b7b4cc0c
name: Windows Compatibility Telemetry Suspicious Child Process
description: The following analytic detects the execution of CompatTelRunner.exe with
  parameters indicative of a process not part of the normal "Microsoft Compatibility
  Appraiser" telemetry collection. It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process names, parent processes, and command-line arguments.
  This activity is significant because CompatTelRunner.exe and the "Microsoft Compatibility
  Appraiser" task always run as System and can be used to elevate privileges or establish
  a highly privileged persistence mechanism. If confirmed malicious, this could enable
  unauthorized code execution, privilege escalation, or persistent access to the compromised
  system.
severity: medium
enabled: false
tags:
  mitre:
  - T1546
  - T1053.005
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1546/
- https://scythe.io/threat-thursday/windows-telemetry-persistence
- https://www.trustedsec.com/blog/abusing-windows-telemetry-for-persistence
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) AS firstTime,\
    \ max(_time) AS lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name\
    \ = \"CompatTelRunner.exe\"\n    AND\n    Processes.process=\"* -cv:*\" NOT Processes.process\
    \ IN (\"* -m:*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_compatibility_telemetry_suspicious_child_process_filter`"
