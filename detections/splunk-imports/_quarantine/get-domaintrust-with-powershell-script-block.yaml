id: splunk-security-content-89275e7e-0548-11ec-bf75-acde48001122
name: Get-DomainTrust with PowerShell Script Block
description: The following analytic detects the execution of the Get-DomainTrust command
  from PowerView using PowerShell Script Block Logging (EventCode=4104). This method
  captures the full command sent to PowerShell, allowing for detailed inspection.
  Identifying this activity is significant because it may indicate an attempt to gather
  domain trust information, which is often a precursor to lateral movement or privilege
  escalation. If confirmed malicious, this activity could enable an attacker to map
  trust relationships within the domain, potentially leading to further exploitation
  and compromise of additional systems.
severity: medium
enabled: false
tags:
  mitre:
  - T1482
  categories:
  - endpoint
references:
- https://blog.harmj0y.net/redteaming/a-guide-to-attacking-domain-trusts/
- https://help.splunk.com/en/security-offerings/splunk-user-behavior-analytics/get-data-in/5.4.1/add-other-data-to-splunk-uba/configure-powershell-logging-to-see-powershell-anomalies-in-splunk-uba.
- https://blog.palantir.com/tampering-with-windows-event-tracing-background-offense-and-defense-4be7ac62ac63
- https://static1.squarespace.com/static/552092d5e4b0661088167e5c/t/59c1814829f18782e24f1fe2/1505853768977/Windows+PowerShell+Logging+Cheat+Sheet+ver+Sept+2017+v2.1.pdf
- https://www.crowdstrike.com/blog/investigating-powershell-command-and-script-logging/
logsource:
  product: splunk
detection:
  splunk_spl: "`powershell` EventCode=4104 ScriptBlockText = \"*get-domaintrust*\"\
    \n  | fillnull\n  | stats count min(_time) as firstTime max(_time) as lastTime\n\
    \    BY dest signature signature_id\n       user_id vendor_product EventID\n \
    \      Guid Opcode Name\n       Path ProcessID ScriptBlockId\n       ScriptBlockText\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `get_domaintrust_with_powershell_script_block_filter`"
