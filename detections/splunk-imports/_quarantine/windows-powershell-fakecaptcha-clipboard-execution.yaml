id: splunk-security-content-d81d4d3d-76b5-4f21-ab51-b17d5164c106
name: Windows PowerShell FakeCAPTCHA Clipboard Execution
description: This detection identifies potential FakeCAPTCHA/ClickFix clipboard hijacking
  campaigns by looking for PowerShell execution with hidden window parameters and
  distinctive strings related to fake CAPTCHA verification. These campaigns use social
  engineering to trick users into pasting malicious PowerShell commands from their
  clipboard, typically delivering information stealers or remote access trojans.
severity: medium
enabled: false
tags:
  mitre:
  - T1059.001
  - T1204.001
  - T1059.003
  categories:
  - endpoint
references:
- https://urlhaus.abuse.ch/
- https://www.proofpoint.com/us/blog/threat-insight/security-brief-clickfix-social-engineering-technique-floods-threat-landscape
- https://reliaquest.com/blog/using-captcha-for-compromise/
- https://attack.mitre.org/techniques/T1204/001/
- https://github.com/MHaggis/ClickGrab
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_powershell`\n\
    \    AND\n    Processes.process=\"*-w*h*\"\n    AND\n    ( (Processes.process\
    \ IN (\"*robot*\", \"*captcha*\", \"*verify*\", \"*security check*\", \"*complete\
    \ verification*\"))\n    OR\n    ( (Processes.process IN (\"*iwr *\", \"*Invoke-WebRequest*\"\
    , \"*wget *\", \"*curl *\", \"*Net.WebClient*\", \"*DownloadString*\", \"*[Convert]::FromBase64String*\"\
    ))\n    AND\n    (Processes.process IN (\"*iex*\", \"*Invoke-Expression*\"))\n\
    \    AND\n    (Processes.process IN (\"*click*\", \"*verify*\", \"*check*\", \"\
    *human*\", \"*bot*\", \"*token*\", \"*challenge*\")) )\n    OR\n    ( Processes.process=\"\
    *clipboard*\"\n    AND\n    Processes.process=\"*iex*\"\n    AND\n    (Processes.process=\"\
    *FromBase64String*\"\n    OR\n    Processes.process=\"*decode*\") ) )\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_powershell_fakecaptcha_clipboard_execution_filter`"
