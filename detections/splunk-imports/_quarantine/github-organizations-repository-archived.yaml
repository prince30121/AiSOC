id: splunk-security-content-4f568a0e-896f-4d94-a2f7-fa6d82ab1f77
name: GitHub Organizations Repository Archived
description: The following analytic detects when a repository is archived in GitHub
  Organizations. The detection monitors GitHub Organizations audit logs for repository
  archival events by tracking actor details, repository information, and associated
  metadata. For a SOC, identifying repository archival is important as it could indicate
  attempts to make critical code inaccessible or preparation for repository deletion.
  While archiving is a legitimate feature, unauthorized archival of active repositories
  could signal account compromise, insider threats, or attempts to disrupt development
  operations. The impact of unauthorized repository archival includes loss of active
  development access, disruption to workflows and CI/CD pipelines, and potential business
  delays if critical repositories are affected. Additionally, archived repositories
  may be targeted for subsequent deletion, potentially resulting in permanent loss
  of intellectual property if proper backups are not maintained.
severity: medium
enabled: false
tags:
  mitre:
  - T1485
  - T1195
  categories:
  - cloud
references:
- https://splunk.github.io/splunk-add-on-for-github-audit-log-monitoring/Install/
- https://www.googlecloudcommunity.com/gc/Community-Blog/Monitoring-for-Suspicious-GitHub-Activity-with-Google-Security/ba-p/763610
logsource:
  product: splunk
detection:
  splunk_spl: "`github_organizations` vendor_action=repo.archived\n  | fillnull\n\
    \  | stats count min(_time) as firstTime max(_time) as lastTime\n    BY actor,\
    \ actor_id, actor_is_bot,\n       actor_location.country_code, business, business_id,\n\
    \       org, org_id, repo,\n       repo_id, user_agent, visibility,\n       vendor_action\n\
    \  | eval user=actor\n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `github_organizations_repository_archived_filter`"
