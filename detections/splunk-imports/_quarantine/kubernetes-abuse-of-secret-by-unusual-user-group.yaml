id: splunk-security-content-b6f45bbc-4ea9-4068-b3bc-0477f6997ae2
name: Kubernetes Abuse of Secret by Unusual User Group
description: The following analytic detects unauthorized access or misuse of Kubernetes
  Secrets by unusual user groups. It leverages Kubernetes Audit logs to identify anomalies
  in access patterns by analyzing the source of requests and user groups. This activity
  is significant for a SOC as Kubernetes Secrets store sensitive information like
  passwords, OAuth tokens, and SSH keys. If confirmed malicious, this behavior could
  indicate an attacker attempting to exfiltrate or misuse these secrets, potentially
  leading to unauthorized access to sensitive systems or data.
severity: medium
enabled: false
tags:
  mitre:
  - T1552.007
  categories:
  - cloud
references:
- https://kubernetes.io/docs/tasks/debug/debug-cluster/audit/
logsource:
  product: splunk
detection:
  splunk_spl: "`kube_audit` objectRef.resource=secrets verb=get\n  | search NOT `kube_allowed_user_groups`\n\
    \  | fillnull\n  | stats count\n    BY objectRef.name objectRef.namespace objectRef.resource\n\
    \       requestReceivedTimestamp requestURI responseStatus.code\n       sourceIPs{}\
    \ stage user.groups{}\n       user.uid user.username userAgent\n       verb\n\
    \  | rename sourceIPs{} as src_ip, user.username as user\n  | `kubernetes_abuse_of_secret_by_unusual_user_group_filter`"
