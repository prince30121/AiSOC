id: splunk-security-content-d372f928-ce4f-11eb-a762-acde48001122
name: Esentutl SAM Copy
description: The following analytic detects the use of `esentutl.exe` to access credentials
  stored in the ntds.dit or SAM file. This detection leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process execution logs that include
  command-line details. This activity is significant because it may indicate an attempt
  to extract sensitive credential information, which is a common tactic in lateral
  movement and privilege escalation. If confirmed malicious, this could allow an attacker
  to gain unauthorized access to user credentials, potentially compromising the entire
  network.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.002
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/6a570c2a4630cf0c2bd41a2e8375b5d5ab92f700/atomics/T1003.002/T1003.002.md
- https://attack.mitre.org/software/S0404/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime from datamodel=Endpoint.Processes where\n(Processes.process_name=esentutl.exe\
    \ OR Processes.original_file_name=esentutl.exe)\nProcesses.process IN (\"*ntds*\"\
    , \"*SAM*\")\nby Processes.action Processes.dest Processes.original_file_name\n\
    \   Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \   Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \   Processes.process Processes.process_exec Processes.process_guid Processes.process_hash\n\
    \   Processes.process_id Processes.process_integrity_level Processes.process_name\
    \ Processes.process_path\n   Processes.user Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `esentutl_sam_copy_filter`"
