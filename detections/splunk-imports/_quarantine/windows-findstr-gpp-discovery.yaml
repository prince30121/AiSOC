id: splunk-security-content-1631ac2d-f2a9-42fa-8a59-d6e210d472f5
name: Windows Findstr GPP Discovery
description: The following analytic detects the use of the findstr command to search
  for unsecured credentials in Group Policy Preferences (GPP). It leverages data from
  Endpoint Detection and Response (EDR) agents, focusing on command-line executions
  involving findstr.exe with references to SYSVOL and cpassword. This activity is
  significant because it indicates an attempt to locate and potentially decrypt embedded
  credentials in GPP, which could lead to unauthorized access. If confirmed malicious,
  this could allow an attacker to escalate privileges or gain access to sensitive
  systems and data within the domain.
severity: medium
enabled: false
tags:
  mitre:
  - T1552.006
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1552/006/
- https://pentestlab.blog/2017/03/20/group-policy-preferences/
- https://adsecurity.org/?p=2288
- https://www.hackingarticles.in/credential-dumping-group-policy-preferences-gpp/
- https://support.microsoft.com/en-us/topic/ms14-025-vulnerability-in-group-policy-preferences-could-allow-elevation-of-privilege-may-13-2014-60734e15-af79-26ca-ea53-8cd617073c30
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=findstr.exe\n        AND\n        Processes.process=*sysvol*\n\
    \        AND\n        Processes.process=*cpassword*\n    )\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_findstr_gpp_discovery_filter`"
