id: splunk-security-content-16ae9076-d1d5-411c-8fdd-457504b33dac
name: ASL AWS Detect Users creating keys with encrypt policy without MFA
description: The following analytic detects the creation of AWS KMS keys with an encryption
  policy accessible to everyone, including external entities. It leverages AWS CloudTrail
  logs from Amazon Security Lake to identify `CreateKey` or `PutKeyPolicy` events
  where the `kms:Encrypt` action is granted to all principals. This activity is significant
  as it may indicate a compromised account, allowing an attacker to misuse the encryption
  key to target other organizations. If confirmed malicious, this could lead to unauthorized
  data encryption, potentially disrupting operations and compromising sensitive information
  across multiple entities.
severity: medium
enabled: false
tags:
  mitre:
  - T1486
  categories:
  - cloud
references:
- https://rhinosecuritylabs.com/aws/s3-ransomware-part-1-attack-vector/
- https://github.com/d1vious/git-wild-hunt
- https://www.youtube.com/watch?v=PgzNib37g0M
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=PutKeyPolicy OR api.operation=CreateKey\n\
    \  | spath input=api.request.data path=policy output=policy\n  | spath input=policy\n\
    \  | rename Statement{}.Action as Action, Statement{}.Principal as Principal\n\
    \  | eval Statement=mvzip(Action,Principal,\"\n  | \")\n  | mvexpand Statement\n\
    \  | eval action=mvindex(split(Statement, \"\n  | \"), 0)\n  | eval principal=mvindex(split(Statement,\
    \ \"\n  | \"), 1)\n  | search action=kms*\n  | regex principal=\"\\*\"\n  | fillnull\n\
    \  | stats count min(_time) as firstTime max(_time) as lastTime\n    BY actor.user.uid\
    \ api.operation api.service.name\n       http_request.user_agent src_endpoint.ip\
    \ actor.user.account.uid\n       cloud.provider cloud.region api.request.data\n\
    \  | rename actor.user.uid as user api.operation as action api.service.name as\
    \ dest http_request.user_agent as user_agent src_endpoint.ip as src actor.user.account.uid\
    \ as vendor_account cloud.provider as vendor_product cloud.region as vendor_region\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `asl_aws_detect_users_creating_keys_with_encrypt_policy_without_mfa_filter`"
