id: splunk-security-content-16107e0e-71fc-11ec-b862-acde48001122
name: Linux Possible Access To Credential Files
description: The following analytic detects attempts to access or dump the contents
  of /etc/passwd and /etc/shadow files on Linux systems. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on processes like 'cat', 'nano', 'vim',
  and 'vi' accessing these files. This activity is significant as it may indicate
  credential dumping, a technique used by adversaries to gain persistence or escalate
  privileges. If confirmed malicious, attackers could obtain hashed passwords for
  offline cracking, leading to unauthorized access and potential system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1003.008
  categories:
  - endpoint
references:
- https://askubuntu.com/questions/445361/what-is-difference-between-etc-shadow-and-etc-passwd
- https://attack.mitre.org/techniques/T1003/008/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ IN(\"cat\", \"nano*\",\"vim*\", \"vi*\")\n    AND\n    Processes.process IN(\"\
    */etc/shadow*\", \"*/etc/passwd*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_possible_access_to_credential_files_filter`"
