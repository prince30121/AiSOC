id: splunk-security-content-18b5a1a0-6326-11ec-943a-acde48001122
name: Linux Insert Kernel Module Using Insmod Utility
description: The following analytic detects the insertion of a Linux kernel module
  using the insmod utility. It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process execution logs that include process names and
  command-line details. This activity is significant as it may indicate the installation
  of a rootkit or malicious kernel module, potentially allowing an attacker to gain
  elevated privileges and bypass security detections. If confirmed malicious, this
  could lead to unauthorized code execution, persistent access, and severe compromise
  of the affected system.
severity: medium
enabled: false
tags:
  mitre:
  - T1547.006
  categories:
  - endpoint
references:
- https://docs.fedoraproject.org/en-US/fedora/rawhide/system-administrators-guide/kernel-module-driver-configuration/Working_with_Kernel_Modules/
- https://security.stackexchange.com/questions/175953/how-to-load-a-malicious-lkm-at-startup
- https://0x00sec.org/t/kernel-rootkits-getting-your-hands-dirty/1485
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ IN(\"kmod\", \"sudo\")\n    AND\n    Processes.process = *insmod*\n  BY Processes.action\
    \ Processes.dest Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `linux_insert_kernel_module_using_insmod_utility_filter`"
