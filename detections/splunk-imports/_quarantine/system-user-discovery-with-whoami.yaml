id: splunk-security-content-894fc43e-6f50-47d5-a68b-ee9ee23e18f4
name: System User Discovery With Whoami
description: The following analytic detects the execution of `whoami.exe` without
  any arguments. It leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process execution logs. This activity is significant because both Red
  Teams and adversaries use `whoami.exe` to identify the current logged-in user, aiding
  in situational awareness and Active Directory discovery. If confirmed malicious,
  this behavior could indicate an attacker is gathering information to further compromise
  the system, potentially leading to privilege escalation or lateral movement within
  the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1033
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1033/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=\"whoami.exe\"\n        OR\n        Processes.process_original_file_name=\"\
    whoami.exe\"\n    )\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `system_user_discovery_with_whoami_filter`"
