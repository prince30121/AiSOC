id: splunk-security-content-4902d7aa-0134-11ec-9d65-acde48001122
name: Local Account Discovery With Wmic
description: The following analytic detects the execution of `wmic.exe` with command-line
  arguments used to query local user accounts, specifically the `useraccount` argument.
  It leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  process execution logs that include command-line details. This activity is significant
  as it indicates potential reconnaissance efforts by adversaries to enumerate local
  users, which is a common step in situational awareness and Active Directory discovery.
  If confirmed malicious, this behavior could lead to further targeted attacks, privilege
  escalation, or lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1087.001
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1087/001/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_wmic`\
    \ (Processes.process=*useraccount*)\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `local_account_discovery_with_wmic_filter`"
