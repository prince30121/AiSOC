id: splunk-security-content-cf192860-2d94-40db-9a51-c04a2e8a8f8b
name: Windows WMI Impersonate Token
description: The following analytic detects potential WMI token impersonation activities
  in a process or command. It leverages Sysmon EventCode 10 to identify instances
  where `wmiprvse.exe` has a duplicate handle or full granted access in a target process.
  This behavior is significant as it is commonly used by malware like Qakbot for privilege
  escalation or defense evasion. If confirmed malicious, this activity could allow
  an attacker to gain elevated privileges, evade defenses, and maintain persistence
  within the environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1047
  categories:
  - endpoint
references:
- https://github.com/trustedsec/SysmonCommunityGuide/blob/master/chapters/process-access.md
- https://www.joesandbox.com/analysis/278341/0/html
logsource:
  product: splunk
detection:
  splunk_spl: '`sysmon` EventCode=10 SourceImage = "*\\wmiprvse.exe"  GrantedAccess
    IN ("0x1478", "0x1fffff") | stats count min(_time) as firstTime max(_time) as
    lastTime by CallTrace EventID GrantedAccess Guid Opcode ProcessID SecurityID SourceImage
    SourceProcessGUID SourceProcessId TargetImage TargetProcessGUID TargetProcessId
    UserID dest granted_access parent_process_exec parent_process_guid parent_process_id
    parent_process_name parent_process_path process_exec process_guid process_id process_name
    process_path signature signature_id user_id vendor_product | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `windows_wmi_impersonate_token_filter`'
