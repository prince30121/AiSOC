id: splunk-security-content-30a0e9f8-f1dd-4f9d-8fc2-c622461d781c
name: AWS ECR Container Scanning Findings High
description: The following analytic identifies high-severity findings from AWS Elastic
  Container Registry (ECR) image scans. It detects these activities by analyzing AWS
  CloudTrail logs for the DescribeImageScanFindings event, specifically filtering
  for findings with a high severity level. This activity is significant for a SOC
  because high-severity vulnerabilities in container images can lead to potential
  exploitation if not addressed. If confirmed malicious, attackers could exploit these
  vulnerabilities to gain unauthorized access, execute arbitrary code, or escalate
  privileges within the container environment, posing a significant risk to the overall
  security posture.
severity: medium
enabled: false
tags:
  mitre:
  - T1204.003
  categories:
  - cloud
references:
- https://docs.aws.amazon.com/AmazonECR/latest/userguide/image-scanning.html
logsource:
  product: splunk
detection:
  splunk_spl: "`cloudtrail` eventSource=ecr.amazonaws.com eventName=DescribeImageScanFindings\n\
    \  | spath path=responseElements.imageScanFindings.findings{} output=findings\n\
    \  | mvexpand findings\n  | spath input=findings\n  | search severity=HIGH\n \
    \ | rename name as finding_name, description as finding_description, requestParameters.imageId.imageDigest\
    \ as imageDigest, requestParameters.repositoryName as repository\n  | rename user_name\
    \ as user\n  | stats count min(_time) as firstTime max(_time) as lastTime\n  \
    \  BY signature dest user\n       user_agent src vendor_account\n       vendor_region\
    \ vendor_product finding_name\n       finding_description imageDigest repository\n\
    \  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `aws_ecr_container_scanning_findings_high_filter`"
provenance:
