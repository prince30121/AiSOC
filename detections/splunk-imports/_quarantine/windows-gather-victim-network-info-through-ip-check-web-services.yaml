id: splunk-security-content-70f7c952-0758-46d6-9148-d8969c4481d1
name: Windows Gather Victim Network Info Through Ip Check Web Services
description: The following analytic detects processes attempting to connect to known
  IP check web services. This behavior is identified using Sysmon EventCode 22 logs,
  specifically monitoring DNS queries to services like "wtfismyip.com" and "ipinfo.io".
  This activity is significant as it is commonly used by malware, such as Trickbot,
  for reconnaissance to determine the infected machine's IP address. If confirmed
  malicious, this could allow attackers to gather network information, aiding in further
  attacks or lateral movement within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1590.005
  categories:
  - network
references:
- https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/
logsource:
  product: splunk
detection:
  splunk_spl: "`sysmon` EventCode=22  QueryName IN (\"*wtfismyip.com\", \"*checkip.*\"\
    , \"*ipecho.net\", \"*ipinfo.io\", \"*api.ipify.org\", \"*icanhazip.com\", \"\
    *ip.anysrc.com\",\"*api.ip.sb\", \"ident.me\", \"www.myexternalip.com\", \"*zen.spamhaus.org\"\
    , \"*cbl.abuseat.org\", \"*b.barracudacentral.org\", \"*dnsbl-1.uceprotect.net\"\
    , \"*spam.dnsbl.sorbs.net\", \"*iplogger.org*\", \"*ip-api.com*\", \"*geoip.*\"\
    , \"*icanhazip.*\", \"*ipwho.is*\", \"*ifconfig.me*\", \"*myip.com*\", \"*ipstack.com*\"\
    , \"*myexternalip.com*\", \"*ip-api.io*\", \"*trackip.net*\", \"*ipgeolocation.io*\"\
    , \"*ipfind.io*\", \"*freegeoip.app*\", \"*ipv4bot.whatismyipaddress.com*\")\n\
    \  | stats  min(_time) as firstTime max(_time) as lastTime count\n    BY answer\
    \ answer_count dvc\n       process_exec process_guid process_name\n       query\
    \ query_count reply_code_id\n       signature signature_id src\n       user_id\
    \ vendor_product QueryName\n       QueryResults QueryStatus\n  | `security_content_ctime(firstTime)`\n\
    \  | `security_content_ctime(lastTime)`\n  | `windows_gather_victim_network_info_through_ip_check_web_services_filter`"
