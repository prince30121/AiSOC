id: splunk-security-content-cda04e9c-1950-43ab-87d6-e333a3d7f107
name: Linux Suspicious React or Next.js Child Process
description: 'This analytic detects Linux processes such as sh, bash, and common Linux
  LOLBINs being spawned by React or Next.js application servers.

  In the context of CVE-2025-55182 / React2Shell / CVE-2025-66478 for Next.js, successful
  exploitation can lead to arbitrary JavaScript execution on the server, which in
  turn is commonly used to invoke Node''s child_process APIs (for example child_process.execSync)
  to run OS-level commands.

  Public proof-of-concept payloads and observed in-the-wild exploit traffic show patterns
  where the vulnerable React Server Components handler triggers process.mainModule.require(''child_process'').execSync()
  to execute binaries such as ping, curl, or arbitrary shells on the underlying host.

  This detection focuses on suspicious child processes where a Next/React server process
  spawns an uncommon process.

  Such activity might be a strong indicator of exploitation of the aforementioned
  vulnerability.'
severity: medium
enabled: false
tags:
  mitre:
  - T1190
  - T1059.004
  categories:
  - endpoint
references:
- https://react.dev/blog/2025/12/03/critical-security-vulnerability-in-react-server-components
- https://nextjs.org/blog/CVE-2025-66478
- https://nvd.nist.gov/vuln/detail/CVE-2025-55182
- https://gist.github.com/maple3142/48bc9393f45e068cf8c90ab865c0f5f3
- https://www.wiz.io/blog/critical-vulnerability-in-react-cve-2025-55182
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime\n  from datamodel=Endpoint.Processes\n  where\n    Processes.parent_process_name\
    \ = \"node\"\n    Processes.parent_process IN (\n      \"*--experimental-https*\"\
    ,\n      \"*--experimental-next-config-strip-types*\",\n      \"*/node_modules/next*\"\
    ,\n      \"*next dev*\",\n      \"*next start*\",\n      \"*node_modules/.bin*\"\
    ,\n      \"*react-scripts start*\",\n      \"*start-server.js*\"\n    )\n    AND\
    \ (\n      Processes.process_name IN (\n        \"awk\",\n        \"gawk\",\n\
    \        \"ifconfig\",\n        \"lua\",\n        \"nc\",\n        \"ncat\",\n\
    \        \"netcat\",\n        \"openssl\",\n        \"perl\",\n        \"php\"\
    ,\n        \"python\",\n        \"python2\",\n        \"python3\",\n        \"\
    ruby\",\n        \"socat\",\n        \"telnet\"\n      )\n      OR (\n       \
    \ Processes.process_name IN (\"curl\", \"wget\")\n        Processes.process =\
    \ \"*|*\"\n      )\n      OR (\n        Processes.process_name IN (\n        \
    \  \"bash\",\n          \"dash\",\n          \"sh\"\n        )\n        NOT Processes.process\
    \ = \"*-c*\"\n      )\n      OR (\n        Processes.process_name IN (\n     \
    \     \"bash\",\n          \"dash\",\n          \"ksh\",\n          \"sh\",\n\
    \          \"zsh\"\n        )\n        Processes.process IN (\n          \"*/dev/tcp/*\"\
    ,\n          \"*/dev/udp/*\",\n          \"*0>&1*\",\n          \"*curl*\",\n\
    \          \"*exec *>&*\",\n          \"*fsockopen*\",\n          \"*ifconfig*\"\
    ,\n          \"*mkfifo*\",\n          \"*nc *\",\n          \"*ncat*\",\n    \
    \      \"*netcat*\",\n          \"*proc_open*\",\n          \"*s_client*\",\n\
    \          \"*socat*\",\n          \"*socket*\",\n          \"*subprocess*\",\n\
    \          \"*TCPSocket*\",\n          \"*wget*\"\n        )\n      )\n    )\n\
    \nby Processes.action Processes.dest Processes.original_file_name Processes.parent_process\n\
    \   Processes.parent_process_exec Processes.parent_process_guid Processes.parent_process_id\n\
    \   Processes.parent_process_name Processes.parent_process_path Processes.process\n\
    \   Processes.process_exec Processes.process_guid Processes.process_hash Processes.process_id\n\
    \   Processes.process_integrity_level Processes.process_name Processes.process_path\n\
    \   Processes.user Processes.user_id Processes.vendor_product\n\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_suspicious_react_or_next_js_child_process_filter`"
