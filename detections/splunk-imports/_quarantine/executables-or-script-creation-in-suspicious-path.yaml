id: splunk-security-content-a7e3f0f0-ae42-11eb-b245-acde48001122
name: Executables Or Script Creation In Suspicious Path
description: The following analytic identifies the creation of executables or scripts
  in suspicious file paths on Windows systems. It leverages the Endpoint.Filesystem
  dataset to detect files with specific extensions (e.g., .exe, .dll, .ps1) created
  in uncommon directories (e.g., \windows\fonts\, \users\public\). This activity can
  be significant as adversaries often use these paths to evade detection and maintain
  persistence. If confirmed malicious, this behavior could allow attackers to execute
  unauthorized code, escalate privileges, or persist within the environment, posing
  a significant security threat.
severity: medium
enabled: false
tags:
  mitre:
  - T1036
  categories:
  - endpoint
references:
- https://thedfirreport.com/2020/04/20/sqlserver-or-the-miner-in-the-basement/
- https://www.microsoft.com/security/blog/2022/01/15/destructive-malware-targeting-ukrainian-organizations/
- https://twitter.com/pr0xylife/status/1590394227758104576
- https://www.microsoft.com/en-us/security/blog/2023/05/24/volt-typhoon-targets-us-critical-infrastructure-with-living-off-the-land-techniques/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\nfrom datamodel=Endpoint.Filesystem where\nFilesystem.file_name\
    \ IN (\n    \"*.bat\",\n    \"*.cmd\",\n    \"*.com\",\n    \"*.dll\",\n    \"\
    *.exe\",\n    \"*.js\",\n    \"*.msc\",\n    \"*.pif\",\n    \"*.ps1\",\n    \"\
    *.sys\",\n    \"*.vbe\",\n    \"*.vbs\"\n)\nFilesystem.file_path IN (\n    \"\
    *:\\\\PerfLogs\\\\*\",\n    \"*:\\\\Users\\\\Administrator\\\\Music\\\\*\",\n\
    \    \"*:\\\\Users\\\\Default\\\\*\",\n    \"*:\\\\Users\\\\Public\\\\*\",\n \
    \   \"*:\\\\Windows\\\\debug\\\\*\",\n    \"*:\\\\Windows\\\\fonts\\\\*\",\n \
    \   \"*:\\\\Windows\\\\Media\\\\*\",\n    \"*:\\\\Windows\\\\repair\\\\*\",\n\
    \    \"*:\\\\Windows\\\\servicing\\\\*\",\n    \"*\\\\inetpub\\\\*\",\n    \"\
    *\\\\Microsoft\\\\Windows\\\\Libraries\\\\*\",\n    \"*Recycle.bin*\"\n)\nby Filesystem.action\
    \ Filesystem.dest Filesystem.file_access_time\n   Filesystem.file_create_time\
    \ Filesystem.file_hash\n   Filesystem.file_modify_time Filesystem.file_name\n\
    \   Filesystem.file_path Filesystem.file_acl Filesystem.file_size\n   Filesystem.process_guid\
    \ Filesystem.process_id Filesystem.user\n   Filesystem.vendor_product\n| `drop_dm_object_name(Filesystem)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `executables_or_script_creation_in_suspicious_path_filter`"
