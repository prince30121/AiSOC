id: splunk-security-content-4fc4c031-e5be-4cc0-8cf9-49f9f507bcb5
name: Linux PHP Privilege Escalation
description: The following analytic detects the execution of PHP commands with elevated
  privileges on a Linux system. It identifies instances where PHP is used in conjunction
  with 'sudo' and 'system' commands, indicating an attempt to run system commands
  as the root user. This detection leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process command-line arguments. This activity is significant
  because it can indicate an attempt to escalate privileges, potentially leading to
  full root access. If confirmed malicious, this could allow an attacker to execute
  arbitrary commands with root privileges, compromising the entire system.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/php/
- https://en.wikipedia.org/wiki/PHP
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process=\"\
    *php*-r*\"\n    AND\n    Processes.process=\"*system*\"\n    AND\n    Processes.process=\"\
    *sudo*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_php_privilege_escalation_filter`"
