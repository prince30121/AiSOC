id: splunk-security-content-ced50492-8849-11ec-9f68-acde48001122
name: Windows Remote Assistance Spawning Process
description: The following analytic detects Microsoft Remote Assistance (msra.exe)
  spawning PowerShell.exe or cmd.exe as a child process. This detection leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process creation
  events where msra.exe is the parent process. This activity is significant because
  msra.exe typically does not spawn command-line interfaces, indicating potential
  process injection or misuse. If confirmed malicious, an attacker could use this
  technique to execute arbitrary commands, escalate privileges, or maintain persistence
  on the compromised system.
severity: medium
enabled: false
tags:
  mitre:
  - T1055
  categories:
  - endpoint
references:
- https://thedfirreport.com/2022/02/07/qbot-likes-to-move-it-move-it/
- https://app.any.run/tasks/ca1616de-89a1-4afc-a3e4-09d428df2420/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name=msra.exe\
    \ `windows_shells`\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_remote_assistance_spawning_process_filter`"
