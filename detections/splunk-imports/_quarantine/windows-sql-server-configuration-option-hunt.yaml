id: splunk-security-content-8dc9efd5-805a-460e-889e-bc79e5477af9
name: Windows SQL Server Configuration Option Hunt
description: This detection helps hunt for changes to SQL Server configuration options
  that could indicate malicious activity. It monitors for modifications to any SQL
  Server configuration settings, allowing analysts to identify potentially suspicious
  changes that may be part of an attack, such as enabling dangerous features or modifying
  security-relevant settings.
severity: medium
enabled: false
tags:
  mitre:
  - T1505.001
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/server-configuration-options-sql-server
- https://attack.mitre.org/techniques/T1505/001/
- https://www.netspi.com/blog/technical/network-penetration-testing/sql-server-persistence-part-1-startup-stored-procedures/
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_application` EventCode=15457\n  | rex field=EventData_Xml\
    \ \"<Data>(?<config_name>[^<]+)</Data><Data>(?<old_value>[^<]+)</Data><Data>(?<new_value>[^<]+)</Data>\"\
    \n  | rename host as dest\n  | eval change_type=case( old_value=\"0\" AND new_value=\"\
    1\", \"enabled\", old_value=\"1\" AND new_value=\"0\", \"disabled\", true(), \"\
    modified\" )\n  | eval risk_score=case( change_type=\"enabled\", 90, change_type=\"\
    disabled\", 60, true(), 70 )\n  | eval risk_message=\"SQL Server \".config_name.\"\
    \ was \".change_type.\" on host \".dest\n  | stats count min(_time) as firstTime\
    \ max(_time) as lastTime\n    BY dest EventCode config_name\n       change_type\
    \ risk_message risk_score\n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `windows_sql_server_configuration_option_hunt_filter`"
provenance:
  source: splunk/security_content
  source_id: 8dc9efd5-805a-460e-889e-bc79e5477af9
