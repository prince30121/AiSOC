id: splunk-security-content-ee8b16a4-118e-4dd7-af4b-835530415610
name: ESXi Reverse Shell Patterns
description: This detection looks for reverse shell string patterns on an ESXi host,
  which may indicate that a threat actor is attempting to establish remote control
  over the system.
severity: medium
enabled: false
tags:
  mitre:
  - T1059
  categories:
  - application
references: []
logsource:
  product: splunk
detection:
  splunk_spl: '`esxi_syslog` Message IN ("*bash -i >&*","*/dev/tcp/*","*/dev/udp/*",
    "*/socat exec:*","*socket(S,PF_INET*") OR (Message="*python -c*" AND Message="*import
    socket*") | rex field=_raw "Z (?<dest>[\w\.]+)\s" | stats min(_time) as firstTime
    max(_time) as lastTime count by dest Message | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)` | `esxi_reverse_shell_patterns_filter`'
provenance:
  source: splunk/security_content
  source_id: ee8b16a4-118e-4dd7-af4b-835530415610
  source_commit: 4d4c7ee
  license: Apache-2.0
  license_url: https://github.com/splunk/security_content/blob/develop/LICENSE
  imported_at: '2026-05-04'
  imported_by: splunk_importer
  upstream_path: detections/application/esxi_reverse_shell_patterns.yml
notes:
  splunk_status: production
  splunk_data_source: []
  quarantine_reason: raw SPL — needs translation to AiSOC detection schema
