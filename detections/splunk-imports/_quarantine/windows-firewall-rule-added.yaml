id: splunk-security-content-efc25501-4e75-4075-8cc5-ac80f2847d80
name: Windows Firewall Rule Added
description: This detection identifies instances where a Windows Firewall rule is
  added by monitoring Event ID 4946 in the Windows Security Event Log. Firewall rule
  modifications can indicate legitimate administrative actions, but they may also
  signal unauthorized changes, misconfigurations, or malicious activity such as attackers
  allowing traffic for backdoors or persistence mechanisms. By analyzing fields like
  RuleName, RuleId, Computer, and ProfileChanged, security teams can determine whether
  the change aligns with expected behavior. Correlating with user activity and process
  execution can help distinguish false positives from real threats, ensuring better
  visibility into potential security risks.
severity: medium
enabled: false
tags:
  mitre:
  - T1562.004
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/previous-versions/windows/it-pro/windows-10/security/threat-protection/auditing/event-4946
logsource:
  product: splunk
detection:
  splunk_spl: "`wineventlog_security` EventCode=4946\n  | stats count min(_time) as\
    \ firstTime max(_time) as lastTime\n    BY RuleName signature subject\n      \
    \ status dest ProcessID\n  | `security_content_ctime(firstTime)`\n  | `security_content_ctime(lastTime)`\n\
    \  | `windows_firewall_rule_added_filter`"
