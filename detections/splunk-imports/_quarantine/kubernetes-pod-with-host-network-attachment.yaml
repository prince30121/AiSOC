id: splunk-security-content-cce357cf-43a4-494a-814b-67cea90fe990
name: Kubernetes Pod With Host Network Attachment
description: The following analytic detects the creation or update of a Kubernetes
  pod with host network attachment. It leverages Kubernetes Audit logs to identify
  pods configured with host network settings. This activity is significant for a SOC
  as it could allow an attacker to monitor all network traffic on the node, potentially
  capturing sensitive information and escalating privileges. If confirmed malicious,
  this could lead to unauthorized access, data breaches, and service disruptions,
  severely impacting the security and integrity of the Kubernetes environment.
severity: medium
enabled: false
tags:
  mitre:
  - T1204
  categories:
  - cloud
references:
- https://kubernetes.io/docs/tasks/debug/debug-cluster/audit/
logsource:
  product: splunk
detection:
  splunk_spl: "`kube_audit` objectRef.resource=pods verb=create OR verb=update requestObject.metadata.annotations.kubectl.kubernetes.io/last-applied-configuration=*\\\
    \"hostNetwork\\\":true*\n  | fillnull\n  | stats count values(user.groups{}) as\
    \ user_groups\n    BY kind objectRef.name objectRef.namespace\n       objectRef.resource\
    \ requestObject.kind responseStatus.code\n       sourceIPs{} stage user.username\n\
    \       userAgent verb requestObject.metadata.annotations.kubectl.kubernetes.io/last-applied-configuration\n\
    \  | rename sourceIPs{} as src_ip, user.username as user\n  | `kubernetes_pod_with_host_network_attachment_filter`"
