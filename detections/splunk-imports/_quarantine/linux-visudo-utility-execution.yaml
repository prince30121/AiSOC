id: splunk-security-content-08c41040-624c-11ec-a71f-acde48001122
name: Linux Visudo Utility Execution
description: The following analytic detects the execution of the 'visudo' utility
  to modify the /etc/sudoers file on a Linux system. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process execution logs. This activity
  is significant because unauthorized changes to the /etc/sudoers file can grant elevated
  privileges to users, potentially allowing adversaries to execute commands as root.
  If confirmed malicious, this could lead to full system compromise, privilege escalation,
  and persistent unauthorized access, severely impacting the security posture of the
  affected host.
severity: medium
enabled: false
tags:
  mitre:
  - T1548.003
  categories:
  - endpoint
references:
- https://askubuntu.com/questions/334318/sudoers-file-enable-nopasswd-for-user-all-commands
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ = visudo\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_visudo_utility_execution_filter`"
provenance:
