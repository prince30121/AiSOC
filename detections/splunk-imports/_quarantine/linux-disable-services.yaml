id: splunk-security-content-f2e08a38-6689-4df4-ad8c-b51c16262316
name: Linux Disable Services
description: The following analytic detects attempts to disable a service on a Linux
  system. It leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on processes like "systemctl," "service," and "svcadm" with commands containing
  "disable." This activity is significant as adversaries may disable security or critical
  services to evade detection and facilitate further malicious actions, such as deploying
  destructive payloads. If confirmed malicious, this could lead to the termination
  of essential security services, allowing attackers to persist undetected and potentially
  cause significant damage to the system.
severity: medium
enabled: false
tags:
  mitre:
  - T1489
  categories:
  - endpoint
references:
- https://www.welivesecurity.com/2022/04/12/industroyer2-industroyer-reloaded/
- https://cert.gov.ua/article/39518
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name\
    \ IN (\"systemctl\", \"service\", \"svcadm\")  Processes.process = \"* disable*\"\
    \n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_disable_services_filter`"
