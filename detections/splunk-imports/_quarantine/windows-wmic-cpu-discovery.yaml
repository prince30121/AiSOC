id: splunk-security-content-6fc46cae-a8c0-4296-b07a-8e52d4322587
name: Windows Wmic CPU Discovery
description: The following analytic detects the use of WMIC (Windows Management Instrumentation
  Command-line) for CPU discovery, often executed with commands such as “wmic cpu
  get name” This behavior is commonly associated with reconnaissance, where adversaries
  seek to gather details about system hardware, assess processing power, or determine
  if the environment is virtualized. While WMIC is a legitimate administrative tool,
  its use for CPU queries outside of normal inventory or management scripts can indicate
  malicious intent. Monitoring command-line executions of WMIC with CPU-related arguments
  and correlating with other discovery activity can help identify attacker reconnaissance.
severity: medium
enabled: false
tags:
  mitre:
  - T1082
  categories:
  - endpoint
references:
- https://cert.gov.ua/article/6284730
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE `process_wmic`\
    \ (Processes.process=\"* cpu*\")\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_wmic_cpu_discovery_filter`"
