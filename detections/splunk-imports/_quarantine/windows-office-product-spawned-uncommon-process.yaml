logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime from datamodel=Endpoint.Processes where\n`process_office_products_parent`\n\
    AND\n(\n  Processes.process_name IN (\n    bitsadmin.exe,\n    certutil.exe,\n\
    \    cmd.exe,\n    cscript.exe,\n    mshta.exe,\n    powershell.exe,\n    pwsh.exe,\n\
    \    regsvr32.exe,\n    rundll32.exe,\n    wmic.exe,\n    wscript.exe\n  )\n \
    \ OR\n  Processes.original_file_name IN (\n    bitsadmin.exe,\n    CertUtil.exe,\n\
    \    Cmd.Exe,\n    cscript.exe,\n    MSHTA.EXE,\n    PowerShell.EXE,\n    pwsh.dll,\n\
    \    REGSVR32.EXE,\n    RUNDLL32.EXE,\n    wmic.exe,\n    wscript.exe\n  )\n)\n\
    by Processes.action Processes.dest Processes.original_file_name\n   Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n   Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n   Processes.process\
    \ Processes.process_exec Processes.process_guid Processes.process_hash\n   Processes.process_id\
    \ Processes.process_integrity_level Processes.process_name Processes.process_path\n\
    \   Processes.user Processes.user_id Processes.vendor_product | `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_office_product_spawned_uncommon_process_filter`"
