id: splunk-security-content-86a5b949-679b-4197-8d4c-9c180a818c45
name: Windows Network Connection Discovery Via Net
description: The following analytic identifies the execution of `net.exe` with command-line
  arguments used to list or display information about computer connections. It leverages
  data from Endpoint Detection and Response (EDR) agents, focusing on process names
  and command-line executions. This activity can be significant as it indicates potential
  network reconnaissance by adversaries or Red Teams, aiming to gather situational
  awareness and Active Directory information. If confirmed malicious, this behavior
  could allow attackers to map the network, identify critical assets, and plan further
  attacks, potentially leading to data exfiltration or lateral movement.
severity: medium
enabled: false
tags:
  mitre:
  - T1049
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1049/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  `process_net`\n        OR\n        (Processes.process_name=\"net.exe\"\n  \
    \      OR\n        Processes.original_file_name=\"net.exe\")\n    )\n    AND (Processes.process=*use)\n\
    \  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_network_connection_discovery_via_net_filter`"
