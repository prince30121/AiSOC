id: splunk-security-content-9683271d-92e4-43b5-a907-1983bfb9f7fd
name: Windows MsiExec HideWindow Rundll32 Execution
description: The following analytic detects the execution of the msiexec.exe process
  with the /HideWindow and rundll32 command-line parameters. It leverages data from
  Endpoint Detection and Response (EDR) agents, focusing on process creation events
  and command-line arguments. This activity is significant because it is a known tactic
  used by malware like QakBot to mask malicious operations under legitimate system
  processes. If confirmed malicious, this behavior could allow an attacker to download
  additional payloads, execute malicious code, or establish communication with remote
  servers, thereby evading detection and maintaining persistence.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.007
  categories:
  - endpoint
references:
- https://twitter.com/Max_Mal_/status/1736392741758611607
- https://twitter.com/1ZRR4H/status/1735944522075386332
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.parent_process_name\
    \ = msiexec.exe  Processes.process = \"* /HideWindow *\" Processes.process = \"\
    * rundll32*\"\n  BY Processes.action Processes.dest Processes.original_file_name\n\
    \     Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid\n\
    \     Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path\n\
    \     Processes.process Processes.process_exec Processes.process_guid\n     Processes.process_hash\
    \ Processes.process_id Processes.process_integrity_level\n     Processes.process_name\
    \ Processes.process_path Processes.user\n     Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_msiexec_hidewindow_rundll32_execution_filter`"
