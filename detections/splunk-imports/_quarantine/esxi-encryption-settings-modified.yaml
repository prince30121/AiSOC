id: splunk-security-content-dbbbe26f-83fe-4ee3-8b77-ccf7fbd416c8
name: ESXi Encryption Settings Modified
description: Detects the disabling of critical encryption enforcement settings on
  an ESXi host, such as secure boot or executable verification requirements, which
  may indicate an attempt to weaken hypervisor integrity or allow unauthorized code
  execution.
severity: medium
enabled: false
tags:
  mitre:
  - T1562
  categories:
  - application
references: []
logsource:
  product: splunk
detection:
  splunk_spl: '`esxi_syslog` Message="*system settings encryption set*" NOT Message="*shell.*"
    Message IN ("* -s *", "* -e *","*--require-secure-boot*", "*require-exec-installed-only*",
    "execInstalledOnly") | rex field=_raw "Z (?<dest>[\w\.]*)\s.*\]: \[(?<user>\w+)\]:(?<command>.+)"
    | stats min(_time) as firstTime max(_time) as lastTime count by dest user command
    | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | `esxi_encryption_settings_modified_filter`'
provenance:
  source: splunk/security_content
  source_id: dbbbe26f-83fe-4ee3-8b77-ccf7fbd416c8
  source_commit: 4d4c7ee
  license: Apache-2.0
  license_url: https://github.com/splunk/security_content/blob/develop/LICENSE
  imported_at: '2026-05-04'
  imported_by: splunk_importer
  upstream_path: detections/application/esxi_encryption_settings_modified.yml
notes:
  splunk_status: production
  splunk_data_source: []
  quarantine_reason: raw SPL — needs translation to AiSOC detection schema
