id: splunk-security-content-839ab790-a60a-4f81-bfb3-02567063f615
name: Linux Deletion of SSL Certificate
description: The following analytic detects the deletion of SSL certificates on a
  Linux machine. It leverages filesystem event logs to identify when files with extensions
  .pem or .crt are deleted from the /etc/ssl/certs/ directory. This activity is significant
  because attackers may delete or modify SSL certificates to disable security features
  or evade defenses on a compromised system. If confirmed malicious, this behavior
  could indicate an attempt to disrupt secure communications, evade detection, or
  execute a destructive payload, potentially leading to significant security breaches
  and data loss.
severity: medium
enabled: false
tags:
  mitre:
  - T1070.004
  - T1485
  categories:
  - endpoint
references:
- https://www.sentinelone.com/labs/acidrain-a-modem-wiper-rains-down-on-europe/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Filesystem\n  WHERE Filesystem.action=deleted\
    \ Filesystem.file_path = \"/etc/ssl/certs/*\" Filesystem.file_path IN (\"*.pem\"\
    , \"*.crt\")\n  BY Filesystem.action Filesystem.dest Filesystem.file_access_time\n\
    \     Filesystem.file_create_time Filesystem.file_hash Filesystem.file_modify_time\n\
    \     Filesystem.file_name Filesystem.file_path Filesystem.file_acl\n     Filesystem.file_size\
    \ Filesystem.process_guid Filesystem.process_id\n     Filesystem.user Filesystem.vendor_product\n\
    | `drop_dm_object_name(Filesystem)`\n| `security_content_ctime(firstTime)`\n|\
    \ `security_content_ctime(lastTime)`\n| `linux_deletion_of_ssl_certificate_filter`"
provenance:
