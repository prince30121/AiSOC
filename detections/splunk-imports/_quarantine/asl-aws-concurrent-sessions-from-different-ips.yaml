id: splunk-security-content-b3424bbe-3204-4469-887b-ec144483a336
name: ASL AWS Concurrent Sessions From Different Ips
description: The following analytic identifies an AWS IAM account with concurrent
  sessions originating from more than one unique IP address within a 5-minute span.
  This detection leverages AWS CloudTrail logs, specifically the `DescribeEventAggregates`
  API call, to identify multiple IP addresses associated with the same user session.
  This behavior is significant as it may indicate a session hijacking attack, where
  an adversary uses stolen session cookies to access AWS resources from a different
  location. If confirmed malicious, this activity could allow unauthorized access
  to sensitive corporate resources, leading to potential data breaches or further
  exploitation.
severity: medium
enabled: false
tags:
  mitre:
  - T1185
  categories:
  - cloud
references:
- https://attack.mitre.org/techniques/T1185/
- https://breakdev.org/evilginx-2-next-generation-of-phishing-2fa-tokens/
- https://github.com/kgretzky/evilginx2
logsource:
  product: splunk
detection:
  splunk_spl: "`amazon_security_lake` api.operation=DescribeEventAggregates src_endpoint.domain!=\"\
    AWS Internal\"\n  | bin span=5m _time\n  | stats min(_time) as firstTime max(_time)\
    \ as lastTime values(api.operation) as api.operation values(api.service.name)\
    \ as api.service.name values(http_request.user_agent) as http_request.user_agent\
    \ values(src_endpoint.ip) as src_ip values(actor.user.account.uid) as actor.user.account.uid\
    \ values(cloud.provider) as cloud.provider values(cloud.region) as cloud.region\
    \ dc(src_endpoint.ip) as distinct_ip_count\n    BY _time actor.user.uid\n  | where\
    \ distinct_ip_count > 1\n  | rename actor.user.uid as user api.operation as action\
    \ api.service.name as dest http_request.user_agent as user_agent src_endpoint.ip\
    \ as src actor.user.account.uid as vendor_account cloud.provider as vendor_product\
    \ cloud.region as vendor_region\n  | `security_content_ctime(firstTime)`\n  |\
    \ `security_content_ctime(lastTime)`\n  | `asl_aws_concurrent_sessions_from_different_ips_filter`"
