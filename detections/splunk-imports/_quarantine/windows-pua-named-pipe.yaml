id: splunk-security-content-95b11d20-e2c6-46a5-b526-8629f5f0860a
name: Windows PUA Named Pipe
description: 'The following analytic detects the creation or connection to named pipes  used
  by potentially unwanted applications (PUAs) like VPNs or utilities like PsExec.

  It leverages Sysmon EventCodes 17 and 18.

  If confirmed malicious, this could allow an attacker to abuse these to potentially
  gain persistence, command and control, or further system compromise.'
severity: medium
enabled: false
tags:
  mitre:
  - T1559
  - T1021.002
  - T1055
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1218/009/
- https://docs.microsoft.com/en-us/windows/win32/ipc/named-pipes
logsource:
  product: splunk
detection:
  splunk_spl: "`sysmon`\n(EventCode=17 OR EventCode=18)\nNOT process_path IN (\n \
    \ \"*:\\\\Program Files \\(x86\\)\\\\Adobe*\",\n  \"*:\\\\Program Files \\(x86\\\
    )\\\\Google*\",\n  \"*:\\\\Program Files \\(x86\\)\\\\Microsoft*\",\n  \"*:\\\\\
    Program Files\\\\Adobe*\",\n  \"*:\\\\Program Files\\\\dotnet\\\\dotnet.exe\"\
    ,\n  \"*:\\\\Program Files\\\\Google*\",\n  \"*:\\\\Program Files\\\\Microsoft*\"\
    ,\n  \"*:\\\\Windows\\\\system32\\\\SearchIndexer.exe\",\n  \"*:\\\\Windows\\\\\
    System32\\\\svchost.exe\",\n  \"*:\\\\Windows\\\\SystemApps\\\\Microsoft*\",\n\
    \  \"*\\\\Amazon\\\\SSM\\\\Instance*\",\n  \"*\\\\AppData\\\\Local\\\\Google*\"\
    ,\n  \"*\\\\AppData\\\\Local\\\\Kingsoft\\\\*\",\n  \"*\\\\AppData\\\\Local\\\\\
    Microsoft*\",\n  \"System\"\n)\n\n| stats  min(_time) as firstTime max(_time)\
    \ as lastTime\ncount by dest dvc process_exec process_guid process_id process_path\
    \ signature signature_id\nvendor_product pipe_name user_id Image process_name\n\
    \n| lookup pua_named_pipes pua_pipe_name AS pipe_name OUTPUT tool, description\n\
    | where isnotnull(tool)\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `windows_pua_named_pipe_filter`"
provenance:
