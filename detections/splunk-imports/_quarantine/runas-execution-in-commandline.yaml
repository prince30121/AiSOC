id: splunk-security-content-4807e716-43a4-11ec-a0e7-acde48001122
name: Runas Execution in CommandLine
description: The following analytic detects the execution of the runas.exe process
  with administrator user options. It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on command-line executions and process details. This activity
  is significant as it may indicate an attempt to gain elevated privileges, a common
  tactic in privilege escalation and lateral movement. If confirmed malicious, this
  could allow an attacker to execute commands with higher privileges, potentially
  leading to unauthorized access, data exfiltration, or further compromise of the
  target host.
severity: medium
enabled: false
tags:
  mitre:
  - T1134.001
  categories:
  - endpoint
references:
- https://app.any.run/tasks/ad4c3cda-41f2-4401-8dba-56cc2d245488/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time)\nas lastTime from datamodel=Endpoint.Processes where\n(Processes.process_name=\"\
    runas.exe\" OR Processes.original_file_name=\"runas.exe\")\nProcesses.process\
    \ =\"*/user:*\"\nProcesses.process = \"*admin*\"\nby Processes.action Processes.dest\n\
    \   Processes.original_file_name Processes.parent_process Processes.parent_process_exec\n\
    \   Processes.parent_process_guid Processes.parent_process_id Processes.parent_process_name\n\
    \   Processes.parent_process_path Processes.process Processes.process_exec Processes.process_guid\n\
    \   Processes.process_hash Processes.process_id Processes.process_integrity_level\
    \ Processes.process_name\n   Processes.process_path Processes.user Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `runas_execution_in_commandline_filter`"
