id: splunk-security-content-9fb562f4-42f8-4139-8e11-a82edf7ed718
name: Remote System Discovery with Dsquery
description: The following analytic detects the execution of `dsquery.exe` with the
  `computer` argument, which is used to discover remote systems within a domain. This
  detection leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on process names and command-line arguments. Remote system discovery is significant
  as it indicates potential reconnaissance activities by adversaries or Red Teams
  to map out network resources and Active Directory structures. If confirmed malicious,
  this activity could lead to further exploitation, lateral movement, and unauthorized
  access to critical systems within the network.
severity: medium
enabled: false
tags:
  mitre:
  - T1018
  categories:
  - endpoint
references:
- https://attack.mitre.org/techniques/T1018/
- https://docs.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2012-r2-and-2012/cc732952(v=ws.11)
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE (\n      \
    \  Processes.process_name=\"dsquery.exe\"\n    )\n    (Processes.process=\"*computer*\"\
    )\n  BY Processes.action Processes.dest Processes.original_file_name\n     Processes.parent_process\
    \ Processes.parent_process_exec Processes.parent_process_guid\n     Processes.parent_process_id\
    \ Processes.parent_process_name Processes.parent_process_path\n     Processes.process\
    \ Processes.process_exec Processes.process_guid\n     Processes.process_hash Processes.process_id\
    \ Processes.process_integrity_level\n     Processes.process_name Processes.process_path\
    \ Processes.user\n     Processes.user_id Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `remote_system_discovery_with_dsquery_filter`"
