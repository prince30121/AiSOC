id: splunk-security-content-aa049566-f76a-43b9-908c-3c27e079fd43
name: Linux Docker Root Directory Mount
description: 'This detection identifies Docker containers that mount the host''s root
  directory into the container filesystem.

  Mounting the entire host root directory into a container effectively grants the
  container visibility and potential write access to all files on the host system.

  If the container is running as root or with elevated capabilities (e.g., --privileged),
  the risk is significantly increased.'
severity: medium
enabled: false
tags:
  mitre:
  - T1611
  categories:
  - endpoint
references:
- https://docs.docker.com/engine/storage/volumes/
- https://gtfobins.github.io/gtfobins/docker/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\nfrom datamodel=Endpoint.Processes where\nProcesses.process_name=docker*\n\
    Processes.process IN (\n  \"* -v *\",\n  \"* --volume *\"\n)\nProcesses.process=\"\
    * /:/*\"\nby Processes.action Processes.dest Processes.original_file_name\n  \
    \ Processes.parent_process Processes.parent_process_exec\n   Processes.parent_process_guid\
    \ Processes.parent_process_id\n   Processes.parent_process_name Processes.parent_process_path\n\
    \   Processes.process Processes.process_exec Processes.process_guid\n   Processes.process_hash\
    \ Processes.process_id\n   Processes.process_integrity_level Processes.process_name\n\
    \   Processes.process_path Processes.user Processes.user_id Processes.vendor_product\n\
    | `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `linux_docker_root_directory_mount_filter`"
