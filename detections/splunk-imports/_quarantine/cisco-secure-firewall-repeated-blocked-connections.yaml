id: splunk-security-content-1f57f10e-1dc5-47ea-852c-2e85b2503d79
name: Cisco Secure Firewall - Repeated Blocked Connections
description: The following analytic detects repeated blocked connection attempts from
  the same initiator to the same responder within a short time window. It leverages
  Cisco Secure Firewall Threat Defense logs and identifies connections where the action
  is set to Block, and the number of occurrences reaches or exceeds a threshold of
  ten within a one-minute span. This pattern may indicate a misconfigured application,
  unauthorized access attempts, or early stages of a brute-force or scanning operation.
  If confirmed malicious, this behavior may represent an attacker probing the network,
  attempting lateral movement, or testing firewall rules for weaknesses.
severity: medium
enabled: false
tags:
  mitre:
  - T1018
  - T1046
  - T1110
  - T1203
  - T1595.002
  categories:
  - network
references:
- https://www.cisco.com/c/en/us/td/docs/security/firepower/741/api/FQE/secure_firewall_estreamer_fqe_guide_740.pdf
logsource:
  product: splunk
detection:
  splunk_spl: "`cisco_secure_firewall` EventType=ConnectionEvent action IN (\"Block\
    \ with reset\", \"Block\", \"blocked\")\n| bin _time span=1m\n| stats count min(_time)\
    \ as firstTime max(_time) as lastTime\n    Values(dest_port) as dest_port\n  \
    \  Values(url) as url\n    by src, dest, transport, rule, action\n| where count\
    \ >= 10\n| `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `cisco_secure_firewall___repeated_blocked_connections_filter`"
