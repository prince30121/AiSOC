id: splunk-security-content-e7ecc5e0-88df-48b9-91af-51104c68f02f
name: Cloud Provisioning Activity From Previously Unseen City
description: The following analytic detects cloud provisioning activities originating
  from previously unseen cities. It leverages cloud infrastructure logs and compares
  the geographic location of the source IP address against a baseline of known locations.
  This activity is significant as it may indicate unauthorized access or misuse of
  cloud resources from an unexpected location. If confirmed malicious, this could
  lead to unauthorized resource creation, potential data exfiltration, or further
  compromise of cloud infrastructure.
severity: medium
enabled: false
tags:
  mitre:
  - T1078
  categories:
  - cloud
references: []
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats earliest(_time) as firstTime, latest(_time) as lastTime FROM\
    \ datamodel=Change\n  WHERE (\n        All_Changes.action=started\n        OR\n\
    \        All_Changes.action=created\n    )\n    All_Changes.status=success\n \
    \ BY All_Changes.src, All_Changes.user, All_Changes.object,\n     All_Changes.command\n\
    | `drop_dm_object_name(\"All_Changes\")`\n| iplocation src\n| where isnotnull(City)\n\
    | lookup previously_seen_cloud_provisioning_activity_sources City as City OUTPUT\
    \ firstTimeSeen, enough_data\n| eventstats max(enough_data) as enough_data\n|\
    \ where enough_data=1\n| eval firstTimeSeenCity=min(firstTimeSeen)\n| where isnull(firstTimeSeenCity)\
    \ OR firstTimeSeenCity > relative_time(now(), `previously_unseen_cloud_provisioning_activity_window`)\n\
    | `security_content_ctime(firstTime)`\n| table firstTime, src, City, user, object,\
    \ command\n| `cloud_provisioning_activity_from_previously_unseen_city_filter`"
