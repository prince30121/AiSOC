id: splunk-security-content-c13b3d74-6b63-4db5-a841-4206f0370077
name: Windows Service Create with Tscon
description: The following analytic detects potential RDP Hijacking attempts by identifying
  the creation of a Windows service using sc.exe with a binary path that includes
  tscon.exe. This detection leverages data from Endpoint Detection and Response (EDR)
  agents, focusing on process creation events and command-line arguments. This activity
  is significant as it indicates an attacker may be trying to hijack a disconnected
  RDP session, posing a risk of unauthorized access. If confirmed malicious, the attacker
  could gain control over an existing user session, leading to potential data theft
  or further system compromise.
severity: medium
enabled: false
tags:
  mitre:
  - T1543.003
  - T1563.002
  categories:
  - endpoint
references:
- https://doublepulsar.com/rdp-hijacking-how-to-hijack-rds-and-remoteapp-sessions-transparently-to-move-through-an-da2a1e73a5f6
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1563.002/T1563.002.md
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly` count min(_time) as firstTime\
    \ max(_time) as lastTime FROM datamodel=Endpoint.Processes\n  WHERE Processes.process_name=sc.exe\
    \ Processes.process=\"*/dest:rdp-tcp*\"\n  BY Processes.action Processes.dest\
    \ Processes.original_file_name\n     Processes.parent_process Processes.parent_process_exec\
    \ Processes.parent_process_guid\n     Processes.parent_process_id Processes.parent_process_name\
    \ Processes.parent_process_path\n     Processes.process Processes.process_exec\
    \ Processes.process_guid\n     Processes.process_hash Processes.process_id Processes.process_integrity_level\n\
    \     Processes.process_name Processes.process_path Processes.user\n     Processes.user_id\
    \ Processes.vendor_product\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `windows_service_create_with_tscon_filter`"
