id: splunk-security-content-a7f2e891-3c4d-4a1b-9e6f-2b8d0c5a1f3e
name: MacOS Log Removal
description: 'Detects the deletion or modification of logs on MacOS systems by identifying
  execution of the rm command with command-line arguments referencing system.log or
  audit-related paths.

  Adversaries may remove or alter log files to cover their tracks and hinder detection
  and forensic analysis. This behavior commonly occurs during post-exploitation cleanup.'
severity: medium
enabled: false
tags:
  mitre:
  - T1070
  categories:
  - endpoint
references:
- https://osquery.readthedocs.io/en/stable/deployment/process-auditing/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nfrom datamodel=Endpoint.Processes where\n\n\
    Processes.process = \"*system.log*\"\nAND\n(\n    (Processes.process = \"*rm *\"\
    )\n    OR\n    (\n        Processes.process = \"*audit*\"\n        Processes.process\
    \ = \"* -s *\"\n    )\n)\n\nby Processes.dest Processes.original_file_name Processes.parent_process_id\n\
    \   Processes.process Processes.process_exec Processes.process_guid\n   Processes.process_hash\
    \ Processes.process_id\n   Processes.process_current_directory Processes.process_name\n\
    \   Processes.process_path Processes.user\n   Processes.user_id Processes.vendor_product\n\
    \n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `macos_log_removal_filter`"
provenance:
  source: splunk/security_content
  source_id: a7f2e891-3c4d-4a1b-9e6f-2b8d0c5a1f3e
  source_commit: 4d4c7ee
