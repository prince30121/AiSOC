id: splunk-security-content-7f1c8bed-9bd4-40b0-a1df-c262cbade0fc
name: MacOS Data Chunking
description: 'The following analytic detects suspicious data chunking activities that
  involve the use of split or dd, potentially indicating an attempt to evade detection
  by breaking large files into smaller parts.

  Attackers may use this technique to bypass size-based security controls, facilitating
  the covert exfiltration of sensitive data.

  By monitoring for unusual or unauthorized use of these commands, this analytic helps
  identify potential data exfiltration attempts, allowing security teams to intervene
  and prevent the unauthorized transfer of critical information from the network.'
severity: medium
enabled: false
tags:
  mitre:
  - T1030
  categories:
  - endpoint
references:
- https://osquery.readthedocs.io/en/stable/deployment/process-auditing/
- https://ss64.com/mac/dd.html
- https://ss64.com/mac/split.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nfrom datamodel=Endpoint.Processes where\n\n\
    (\n    Processes.process = \"dd *\"\n     Processes.process = \"* if=*\"\n)\n\
    OR\n(\n    Processes.process = \"*split *\"\n    Processes.process=\"* -b *\"\n\
    )\n\nby Processes.dest Processes.original_file_name Processes.parent_process_id\n\
    \   Processes.process Processes.process_exec Processes.process_guid\n   Processes.process_hash\
    \ Processes.process_id\n   Processes.process_current_directory Processes.process_name\n\
    \   Processes.process_path Processes.user\n   Processes.user_id Processes.vendor_product\n\
    \n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `macos_data_chunking_filter`"
provenance:
