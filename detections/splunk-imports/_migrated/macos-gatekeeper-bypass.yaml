id: splunk-security-content-2c9346f3-bbeb-48ce-8411-fc13d09d83a5
name: MacOS Gatekeeper Bypass
description: 'Detects known MacOS security bypass techniques that may be used to enable
  malicious code execution.

  Specifically monitors for attempts to remove the com.apple.quarantine attribute
  using xattr, or to disable Gatekeeper protections via spctl --master-disable, both
  of which can allow untrusted or malicious applications to execute without standard
  system safeguards.'
severity: medium
enabled: false
tags:
  mitre:
  - T1553.001
  categories:
  - endpoint
references:
- https://osquery.readthedocs.io/en/stable/deployment/process-auditing/
- https://ss64.com/mac/xattr.html
- https://ss64.com/mac/spctl.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nfrom datamodel=Endpoint.Processes where\n\n\
    (\n    Processes.process = \"*xattr*\"\n    Processes.process = \"*com.apple.quarantine*\"\
    \n)\nOR\n(\n    Processes.process = \"*spctl*\"\n    Processes.process = \"*master-disable*\"\
    \n)\n\nby Processes.dest Processes.original_file_name Processes.parent_process_id\n\
    \   Processes.process Processes.process_exec Processes.process_guid\n   Processes.process_hash\
    \ Processes.process_id\n   Processes.process_current_directory Processes.process_name\n\
    \   Processes.process_path Processes.user\n   Processes.user_id Processes.vendor_product\n\
    \n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `macos_gatekeeper_bypass_filter`"
provenance:
  source: splunk/security_content
  source_id: 2c9346f3-bbeb-48ce-8411-fc13d09d83a5
