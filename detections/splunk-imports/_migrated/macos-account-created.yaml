id: splunk-security-content-491004ae-694f-453e-b1e0-fc1e65daeea1
name: MacOS Account Created
description: 'The following analytic detects the creation of a new local user account
  on a MacOS system. It leverages osquery logs to identify this activity.

  Monitoring the creation of local accounts is crucial for a SOC as it can indicate
  unauthorized access or lateral movement within the network.

  If confirmed malicious, this activity could allow an attacker to establish persistence,
  escalate privileges, or gain unauthorized access to sensitive systems and data.'
severity: medium
enabled: false
tags:
  mitre:
  - T1136
  categories:
  - endpoint
references:
- https://osquery.readthedocs.io/en/stable/deployment/process-auditing/
- https://ss64.com/mac/sysadminctl.html
- https://ss64.com/mac/dseditgroup.html
- https://ss64.com/mac/dscl.html
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\nfrom datamodel=Endpoint.Processes where\n\n(\n\
    \    Processes.process = \"*sysadminctl\"\n    Processes.process = \"*-addUser*\"\
    \n)\nOR\n(\n    Processes.process = \"*createhomedir*\"\n    Processes.process\
    \ = \"*-u*\"\n)\nOR\n(\n    Processes.process = \"*dseditgroup*\"\n    Processes.process\
    \ IN (\n        \"*edit*\",\n        \"*-a*\"\n        )\n)\nOR\n(\n    Processes.process\
    \ = \"*dscl*\"\n    Processes.process = \"*-create*\"\n)\n\nby Processes.dest\
    \ Processes.original_file_name Processes.parent_process_id\n   Processes.process\
    \ Processes.process_exec Processes.process_guid\n   Processes.process_hash Processes.process_id\n\
    \   Processes.process_current_directory Processes.process_name\n   Processes.process_path\
    \ Processes.user Processes.user_id\n   Processes.vendor_product\n\n| `drop_dm_object_name(Processes)`\n\
    | `security_content_ctime(firstTime)`\n| `security_content_ctime(lastTime)`\n\
    | `macos_account_created_filter`"
provenance:
