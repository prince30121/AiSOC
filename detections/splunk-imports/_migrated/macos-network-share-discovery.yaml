id: splunk-security-content-a5f5fe52-8e50-4fb0-ad1b-780be6c0d857
name: MacOS Network Share Discovery
description: Identifies execution of network share enumeration commands (smbutil,
  showmount) that can be leveraged by adversaries to discover accessible SMB and NFS
  resources, supporting internal reconnaissance and potential lateral movement.
severity: medium
enabled: false
tags:
  mitre:
  - T1135
  categories:
  - endpoint
references:
- https://osquery.readthedocs.io/en/stable/deployment/process-auditing/
- https://leopard-adc.pepas.com/documentation/Darwin/Reference/ManPages/man8/showmount.8.html
- https://www.unix.com/man_page/osx/1/smbutil/
logsource:
  product: splunk
detection:
  splunk_spl: "| tstats `security_content_summariesonly`\n  count min(_time) as firstTime\n\
    \        max(_time) as lastTime\n\nfrom datamodel=Endpoint.Processes where\n\n\
    Processes.process IN (\"*showmount *\", \"*smbutil *\")\n\nby Processes.dest Processes.original_file_name\
    \ Processes.parent_process_id\n   Processes.process Processes.process_exec Processes.process_guid\n\
    \   Processes.process_hash Processes.process_id\n   Processes.process_current_directory\
    \ Processes.process_name\n   Processes.process_path Processes.user\n   Processes.user_id\
    \ Processes.vendor_product\n\n| `drop_dm_object_name(Processes)`\n| `security_content_ctime(firstTime)`\n\
    | `security_content_ctime(lastTime)`\n| `macos_network_share_discovery_filter`"
provenance:
  source: splunk/security_content
  source_id: a5f5fe52-8e50-4fb0-ad1b-780be6c0d857
  source_commit: 4d4c7ee
