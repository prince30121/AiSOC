detection:
  chronicle_yaral: "rule t1214__credentials_in_registry {\n meta:\n    author = \"\
    Ariel Millahuel\"\n    description = \"This rule detects an attempt to scanning\
    \ registry hives for the value password  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/kkLA28FoTXeC\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"T1214, credential_access\"\n\n  events:\n\
    ($selection1.target.process.file.full_path = \"reg.exe\" and ($selection1.target.process.command_line\
    \ = \"reg query HKLM /f password /t REG_SZ /s\" or $selection1.target.process.command_line\
    \ = \"reg query HKCU /f password /t REG_SZ /s\") and ($selection1.metadata.product_event_type\
    \ = \"4688\" or $selection1.metadata.product_event_type = \"1\"))\n\n  condition:\n\
    \    $selection1\n}"
  chronicle_rule_name: t1214__credentials_in_registry
