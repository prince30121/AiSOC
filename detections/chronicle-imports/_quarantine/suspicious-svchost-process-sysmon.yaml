detection:
  chronicle_yaral: "rule suspicious_svchost_process_sysmon {\n meta:\n    author =\
    \ \"Florian Roth, Alexandr Yampolskyi\"\n    description = \"Detects a suspicious\
    \ svchost process start.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/ATfcTbGr3AcM\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"Execution, t1059\"\n\n  events:\n(($selection.metadata.product_event_type\
    \ = \"1\" and $selection.target.process.file.full_path = \"svchost.exe\") and\
    \ not ($selection.metadata.product_event_type = \"1\" and (re.regex($selection.target.process.command_line,\
    \ `.*\\\\services\\.exe`) or re.regex($selection.target.process.command_line,\
    \ `.*\\\\MsMpEng\\.exe`))))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: suspicious_svchost_process_sysmon
