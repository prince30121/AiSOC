    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule sap_change_documents_sensitive_role_assignment {\n\n    meta:\n       \
    \ author = \"Google Cloud Security\"\n        description = \"Detects the assignment\
    \ of highly privileged SAP roles via Change Documents.\"\n        severity = \"\
    Critical\"\n        tactic = \"TA0004\"\n        technique = \"T1098\"\n\n   \
    \ events:\n        $e.metadata.log_type = \"SAP_CHANGE_DOCUMENT\"\n        $e.target.resource.product_object_id\
    \ in %sap_sensitive_roles.role\n\n        $principal_user = $e.principal.user.userid\n\
    \n\n    match:\n        $principal_user over 30m\n\n    outcome:\n        $target_user\
    \ = array_distinct($e.target.resource.product_object_id)\n        $tcode = array_distinct($e.target.application)\n\
    \        $tabname = array_distinct($e.target.resource.attribute.labels[\"TABNAME\"\
    ])\n        $sensitive_role_assigned = array_distinct($e.target.resource.attribute.labels[\"\
    TABKEY\"])\n\n    condition:\n        $e\n\n}"
  chronicle_rule_name: sap_change_documents_sensitive_role_assignment
