    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule mitre_attack_T1564_001_macos_hidden_files_and_directories\n{\n  meta:\n\
    \    author = \"Google Cloud Security\"\n    description = \"Manually setting\
    \ a file or a directory to be hidden on macOS\"\n    reference = \"https://attack.mitre.org/techniques/T1564/001/\"\
    \n    yara_version = \"YL2.0\"\n    rule_version = \"1.0\"\n\n  events:\n    (\n\
    \      $e1.metadata.event_type = \"PROCESS_LAUNCH\" and\n      (\n        re.regex($e1.principal.process.command_line,\
    \ `setfile -a V`) or\n        re.regex($e1.principal.process.command_line, `chflags\
    \ hidden`)\n      )\n    )\n    or\n    (\n      $e1.metadata.event_type = \"\
    FILE_MODIFICATION\" and\n      re.regex($e1.target.file.full_path, `^\\.`)\n \
    \   )\n\n  condition:\n    $e1\n}"
  chronicle_rule_name: mitre_attack_T1564_001_macos_hidden_files_and_directories
