detection:
  chronicle_yaral: "rule netexe_execution {\n meta:\n    author = \"Michael Haag,\
    \ Mark Woan (improvements)\"\n    description = \"Detects execution of Net.exe,\
    \ whether suspicious or benign.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/hjvQrbDaxQZN\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"s0039, lateral_movement, discovery\"\
    \n\n  events:\n((re.regex($selection.target.process.file.full_path, `.*\\\\net\\\
    .exe`) or re.regex($selection.target.process.file.full_path, `.*\\\\net1\\.exe`))\
    \ and (re.regex($selection.target.process.command_line, `.* group.*`) or re.regex($selection.target.process.command_line,\
    \ `.* localgroup.*`) or re.regex($selection.target.process.command_line, `.* user.*`)\
    \ or re.regex($selection.target.process.command_line, `.* view.*`) or re.regex($selection.target.process.command_line,\
    \ `.* share`) or re.regex($selection.target.process.command_line, `.* accounts.*`)\
    \ or re.regex($selection.target.process.command_line, `.* use.*`) or re.regex($selection.target.process.command_line,\
    \ `.* stop .*`)) and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: netexe_execution
