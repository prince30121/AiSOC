detection:
  chronicle_yaral: "rule uac_bypass_via_event_viewer {\n meta:\n    author = \"Florian\
    \ Roth\"\n    description = \"Detects UAC bypass method using Windows event viewer\
    \  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/EIBSd85RV69M\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"defense_evasion, privilege_escalation, t1088\"\n\
    \n  events:\n(($methregistry.metadata.product_event_type = \"13\" and re.regex($methregistry.target.registry.registry_key,\
    \ `HKEY_USERS\\\\.*\\\\mscfile\\\\shell\\\\open\\\\command`)) or (($methregistry.metadata.product_event_type\
    \ = \"1\" and re.regex($methregistry.principal.process.file.full_path, `.*\\\\\
    eventvwr\\.exe`)) and not (re.regex($methregistry.target.process.file.full_path,\
    \ `.*\\\\mmc\\.exe`))))\n\n  condition:\n    $methregistry\n}"
  chronicle_rule_name: uac_bypass_via_event_viewer
