detection:
  chronicle_yaral: "rule logon_scripts_userinitmprlogonscript {\n meta:\n    author\
    \ = \"Tom Ueltschi (@c_APT_ure)\"\n    description = \"Detects creation or execution\
    \ of UserInitMprLogonScript persistence method  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/QLazxYxAo1Y1\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"t1037, persistence, lateral_movement\"\n\n  events:\n\
    (((($exec_selection.metadata.product_event_type = \"1\" and re.regex($exec_selection.principal.process.file.full_path,\
    \ `.*\\\\userinit\\.exe`)) and not (re.regex($exec_selection.target.process.file.full_path,\
    \ `.*\\\\explorer\\.exe`) and re.regex($exec_selection.target.process.command_line,\
    \ `.*\\\\netlogon\\.bat`))) or (($exec_selection.metadata.product_event_type =\
    \ \"11\" or $exec_selection.metadata.product_event_type = \"12\" or $exec_selection.metadata.product_event_type\
    \ = \"13\" or $exec_selection.metadata.product_event_type = \"14\") and re.regex($exec_selection.target.registry.registry_key,\
    \ `.*UserInitMprLogonScript.*`))) or ($exec_selection.metadata.product_event_type\
    \ = \"1\" and re.regex($exec_selection.target.process.command_line, `.*UserInitMprLogonScript.*`)))\n\
    \n  condition:\n    $exec_selection\n}"
