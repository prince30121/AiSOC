    \nrule win_repeatedAuthFailure_thenSuccess_T1110_001 {\n\n  meta:\n    author\
    \ = \"Google Cloud Security\"\n    description = \"Detect Multiple Failed Login\
    \ Attempts followed by Successful Login\"\n    rule_id = \"mr_16893c0e-2563-44ed-84c9-57ab326eb1c2\"\
    \n    rule_name = \"MITRE ATT&CK T1110.001 Windows Repeated Authentication Failures\
    \ Before Successful One\"\n    type = \"alert\"\n    data_source = \"microsoft\
    \ windows events\"\n    platform = \"Windows\"\n    severity = \"Medium\"\n  \
    \  priority = \"Medium\"\n    tactic = \"TA0006\"\n    technique = \"T1110.001\"\
    \n\n  events:\n    $fail.metadata.event_type = \"USER_LOGIN\"\n    $fail.metadata.vendor_name\
    \ = \"Microsoft\"\n    $fail.principal.hostname = $hostname\n    $fail.target.user.userid\
    \ = $user\n    $fail.security_result.action = \"BLOCK\"\n    $fail.metadata.product_event_type\
    \ = \"4625\"\n\n    $fail.metadata.event_timestamp.seconds < $success.metadata.event_timestamp.seconds\n\
    \n    $success.metadata.event_type = \"USER_LOGIN\"\n    $success.metadata.vendor_name\
    \ = \"Microsoft\"\n    $success.target.user.userid = $user\n    $success.principal.hostname\
    \ = $hostname\n    $success.security_result.action = \"ALLOW\"\n    $success.metadata.product_event_type\
    \ = \"4624\"\n\n  match:\n    $user, $hostname over 15m\n\n  outcome:\n    //\
    \ increment risk score if the system targeted is active directory server, can\
    \ modify as you see fit, using this as an example\n    $risk_score = max(if($hostname\
    \ = /activedir/, 75, 50))\n    $failed_login_threshold = 5\n    $impacted_systems\
    \ = array_distinct($hostname)\n    $impacted_users = array_distinct($user)\n \
    \   $alert_type = \"Successful Brute Force Attack\"\n    $tlp = \"red\"\n    //\
    \ added to populate alert graph with additional context\n    // Commented out\
    \ principal.hostname because it is already represented in graph as match variable.\
    \ If match changes, can uncomment to add to results\n    //$principal_hostname\
    \ = array_distinct($success.principal.hostname)\n    $principal_ip = array_distinct($success.principal.ip)\n\
    \    $target_hostname = array_distinct($success.target.hostname)\n    $src_hostname\
    \ = array_distinct($success.src.hostname)\n    $target_ip = array_distinct($success.target.ip)\n\
    \    $principal_user_userid = array_distinct($success.principal.user.userid)\n\
    \    // Commented out target.user.userid because it is already represented in\
    \ graph as match variable. If match changes, can uncomment to add to results\n\
    \    //$target_user_userid = array_distinct($success.target.user.userid)\n   \
    \ $principal_resource_name = array_distinct($success.principal.resource.name)\n\
    \    $target_resource_name = array_distinct($success.target.resource.name)\n \
    \   $target_url = array_distinct($success.target.url)\n\n  condition:\n    #fail\
    \ > 4 and $success\n}"
