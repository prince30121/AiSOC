detection:
  chronicle_yaral: "rule possible_flash_0day_execute_embedded_in_word_document_sysmon\
    \ {\n meta:\n    author = \"Roman Ranskyi\"\n    description = \"An active exploitation\
    \ of a zero-day vulnerability in Adobe Flash via a Microsoft Office document.\
    \  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/q7MAkDhbW5Bb\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, t1203, t1059.003\"\n\n \
    \ events:\n(re.regex($selection.principal.process.file.full_path, `.*WINWORD\\\
    .exe`) and re.regex($selection.target.process.command_line, `.*&&.*`) and re.regex($selection.target.process.command_line,\
    \ `.*%~dp0.*`) and re.regex($selection.target.process.command_line, `.*-inul.*`)\
    \ and re.regex($selection.target.process.command_line, `.*rar.*`) and re.regex($selection.target.process.command_line,\
    \ `.*-o\\+.*`) and re.regex($selection.target.process.command_line, `.* e .*`)\
    \ and re.regex($selection.target.process.command_line, `.*\\.jpg.*`) and ($selection.metadata.product_event_type\
    \ = \"4688\" or $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: possible_flash_0day_execute_embedded_in_word_document_sysmon
