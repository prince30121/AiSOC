detection:
  chronicle_yaral: "rule attempts_to_stop_windows_defender_and_windows_updates {\n\
    \ meta:\n    author = \"Joseph Kamau\"\n    description = \"This rule detects\
    \ attempts to stop the windows defender and windows update components  License:\
    \ https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\n\
    \    reference = \"https://tdm.socprime.com/tdm/info/UMRS8yOinXhm\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"Windows\"\n    category\
    \ = \"process_creation\"\n    mitre = \"defense_evasion, t1089\"\n\n  events:\n\
    ((re.regex($selection.target.process.command_line, `.* stop wuauserv`) or re.regex($selection.target.process.command_line,\
    \ `.* stop WinDefend`) or re.regex($selection.target.process.command_line, `.*\
    \ stop wscsvc`) or re.regex($selection.target.process.command_line, `.* stop mpssvc`)\
    \ or re.regex($selection.target.process.command_line, `.* delete WinDefend`) or\
    \ re.regex($selection.target.process.command_line, `.*SOFTWARE\\\\Policies\\\\\
    Microsoft\\\\Windows Defender\\\\Real-Time Protection\\\\Disable.*`)) and ($selection.metadata.product_event_type\
    \ = \"4688\" or $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: attempts_to_stop_windows_defender_and_windows_updates
