id: chronicle-detection-rules-google-workspace-malicious-file-downloaded
name: google_workspace_malicious_file_downloaded
description: google_workspace_malicious_file_downloaded
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule google_workspace_malicious_file_downloaded {\n\n  meta:\n    author = \"\
    Google Cloud Security\"\n    description = \"Identifies when a user downloads\
    \ a potentially malicious file from Google Drive.\"\n    rule_id = \"mr_72af4504-955b-4c61-9071-bb767c9bae88\"\
    \n    rule_name = \"Google Workspace Malicious File Downloaded\"\n    mitre_attack_tactic\
    \ = \"Execution\"\n    mitre_attack_technique = \"User Execution: Malicious File\"\
    \n    mitre_attack_url = \"https://attack.mitre.org/techniques/T1204/002/\"\n\
    \    mitre_attack_version = \"v13.1\"\n    type = \"Alert\"\n    data_source =\
    \ \"Workspace Activity\"\n    severity = \"Medium\"\n    priority = \"Medium\"\
    \n\n  events:\n    $ws.metadata.vendor_name = \"Google Workspace\"\n    $ws.metadata.product_name\
    \ = \"drive\"\n    ($ws.metadata.product_event_type = \"download\" or\n    $ws.metadata.product_event_type\
    \ = \"view\" or\n    $ws.metadata.product_event_type = \"copy\")\n\n    ($ws.target.resource.attribute.labels[\"\
    visibility\"] = \"people_with_link\" or\n    $ws.target.resource.attribute.labels[\"\
    visibility\"] = \"public_on_the_web\")\n    $ws.target.resource.name = /.*\\.dll|.*\\\
    .exe|.*\\.scr|.*\\.jar|.*\\.pif|.*\\.app|.*\\.dmg|.*\\.pkg|.*\\.elf|.*\\.so|.*\\\
    .bin|.*\\.deb|.*\\.rpm|.*\\.sh|.*\\.hta|.*\\.lnk/\n\n  outcome:\n    $risk_score\
    \ = max(35)\n    $mitre_attack_tactic = \"Execution\"\n    $mitre_attack_technique\
    \ = \"User Execution: Malicious File\"\n    $mitre_attack_technique_id = \"T1204.002\"\
    \n    $event_count = count_distinct($ws.metadata.id)\n    $product_event_type\
    \ = $ws.metadata.product_event_type\n    $userid = $ws.principal.user.userid\n\
    \    $doc_type = $ws.src.resource.attribute.labels[\"doc_type\"]\n    $owner =\
    \ $ws.target.resource.attribute.labels[\"owner\"]\n    $doc_name = $ws.target.resource.name\n\
    \    //$doc_id = $ws.target.resource.product_object_id\n\n  condition:\n    $ws\n\
    }"
  chronicle_rule_name: google_workspace_malicious_file_downloaded
provenance:
