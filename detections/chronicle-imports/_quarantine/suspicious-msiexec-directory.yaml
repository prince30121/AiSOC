detection:
  chronicle_yaral: "rule suspicious_msiexec_directory {\n meta:\n    author = \"Florian\
    \ Roth\"\n    description = \"Detects suspicious msiexec process starts in an\
    \ uncommon directory  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/sPtJr5zlR7VX\"\n    version\
    \ = \"0.01\"\n    created = \"2019/11/14\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"defense_evasion, t1036\"\n\n  events:\n\
    ((re.regex($selection.target.process.file.full_path, `.*\\\\msiexec\\.exe`) and\
    \ ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\")) and not ((re.regex($selection.target.process.file.full_path, `C:\\\
    \\Windows\\\\System32\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\Windows\\\\SysWOW64\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\Windows\\\\WinSxS\\\\.*`))))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: suspicious_msiexec_directory
