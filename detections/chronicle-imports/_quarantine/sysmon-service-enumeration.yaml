detection:
  chronicle_yaral: "rule sysmon_service_enumeration {\n meta:\n    author = \"Osman\
    \ Demir\"\n    description = \"Detects Sysmon Enumeration Activity  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/DnN9qhks24Tp\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"powershell\"\n    mitre = \"discovery, t1063\"\n\n  events:\n(re.regex($selection.target.process.command_line,\
    \ `ls HKLM:\\\\SOFTWARE\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\WINEVT\\\\\
    Channels | Where-Object \\\\{$_\\.name -like \\\".*sysmon.*\\\"\\\\}`) or $selection.target.process.command_line\
    \ = \"ls HKCU:\\\\Software\\\\Sysinternals  | Select-Object name\" or $selection.target.process.command_line\
    \ = \"Get-CimInstance win32_service -Filter \\\"Description = 'System Monitor\
    \ service'\\\"\")\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: sysmon_service_enumeration
