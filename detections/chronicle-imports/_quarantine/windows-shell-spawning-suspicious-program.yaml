detection:
  chronicle_yaral: "rule windows_shell_spawning_suspicious_program {\n meta:\n   \
    \ author = \"Florian Roth\"\n    description = \"Detects a suspicious child process\
    \ of a Windows shell  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/pRcHVajnlNI4\"\n    version\
    \ = \"0.01\"\n    created = \"2018/04/06\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, defense_evasion, t1064\"\
    \n\n  events:\n(((re.regex($selection.principal.process.file.full_path, `.*\\\\\
    mshta\\.exe`) or re.regex($selection.principal.process.file.full_path, `.*\\\\\
    powershell\\.exe`) or re.regex($selection.principal.process.file.full_path, `.*\\\
    \\rundll32\\.exe`) or re.regex($selection.principal.process.file.full_path, `.*\\\
    \\cscript\\.exe`) or re.regex($selection.principal.process.file.full_path, `.*\\\
    \\wscript\\.exe`) or re.regex($selection.principal.process.file.full_path, `.*\\\
    \\wmiprvse\\.exe`)) and (re.regex($selection.target.process.file.full_path, `.*\\\
    \\schtasks\\.exe`) or re.regex($selection.target.process.file.full_path, `.*\\\
    \\nslookup\\.exe`) or re.regex($selection.target.process.file.full_path, `.*\\\
    \\certutil\\.exe`) or re.regex($selection.target.process.file.full_path, `.*\\\
    \\bitsadmin\\.exe`) or re.regex($selection.target.process.file.full_path, `.*\\\
    \\mshta\\.exe`)) and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\")) and not (re.regex($selection.principal.file.full_path, `.*\\\\ccmcache\\\
    \\.*`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: windows_shell_spawning_suspicious_program
