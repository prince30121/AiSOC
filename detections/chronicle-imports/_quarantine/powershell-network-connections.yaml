detection:
  chronicle_yaral: "rule powershell_network_connections {\n meta:\n    author = \"\
    Florian Roth\"\n    description = \"Detetcs a Powershell process that opens network\
    \ connections - check for suspicious target ports and target systems - adjust\
    \ to your environment (e.g. extend filters with company's ip range')  License:\
    \ https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\n\
    \    reference = \"https://tdm.socprime.com/tdm/info/rSdOQZRfGOI7\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n\n  events:\n(($selection.metadata.product_event_type = \"3\"\
    \ and re.regex($selection.target.process.file.full_path, `.*\\\\powershell\\.exe`))\
    \ and not ((re.regex($selection.target.ip, `10\\..*`) or re.regex($selection.target.ip,\
    \ `192\\.168\\..*`) or re.regex($selection.target.ip, `172\\..*`) or $selection.target.ip\
    \ = \"127.0.0.1\") and $selection.target.ip = \"false\" and $selection.principal.user.user_display_name\
    \ = \"NT AUTHORITY\\\\SYSTEM\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: powershell_network_connections
