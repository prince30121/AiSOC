    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule ms_graph_application_endpoint_requests {\n\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Identify the use of the application API\
    \ call to collect a listing of applications in Entra ID. This can be chatty due\
    \ to other commands calling this single API.\"\n    rule_id = \"mr_0936c89c-4579-4e7c-a081-3129dd93a726\"\
    \n    rule_name = \"Hunt for application API calls in the Microsoft Graph\"\n\
    \    assumption = \"Focus on PowerShell as part of the User agent or adding IP\
    \ addresses or applications who call this endpoint should be added to focus this\
    \ detection.\"\n    type = \"Hunt\"\n    data_source = \"MS Graph Activity Logs\"\
    \n    platform = \"Azure\"\n    severity = \"Low\"\n    priority = \"Low\"\n\n\
    \  events:\n    $api.metadata.event_type = \"NETWORK_HTTP\"\n    $api.metadata.product_event_type\
    \ = \"Microsoft Graph Activity\"\n    $api.target.url = \"https://graph.microsoft.com/v1.0/applications\"\
    \ nocase\n    //Can be tuned for specific User Agent strings being used\n    //$api.network.http.user_agent\
    \ = /PowerShell/ nocase\n    //May want to filter out IP addresses of admin consoles\n\
    \    //$api.principal.ip != \"10.10.10.10\"\n    $api.network.http.method = \"\
    GET\"\n    $api.network.http.response_code = 200\n    $api.principal.ip = $ip\n\
    \    $api.network.session_id = $session\n\n  match:\n    $ip, $session over 5m\n\
    \n  outcome:\n    $risk_score = 35\n    $event_count = count_distinct($api.metadata.id)\n\
    \    $requesting_user_guid = array_distinct($api.principal.user.userid)\n    $requesting_ip\
    \ = array_distinct($api.principal.ip)\n    $user_agent = array_distinct($api.network.http.user_agent)\n\
    \    $location = array_distinct($api.principal.location.name)\n    $target_application_id_guid\
    \ = array_distinct($api.target.resource.product_object_id)\n    $session_id =\
    \ array_distinct($api.network.session_id)\n    $target_url = array_distinct($api.target.url)\n\
    \n  condition:\n    $api\n}"
  chronicle_rule_name: ms_graph_application_endpoint_requests
