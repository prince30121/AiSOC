    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule google_workspace_multiple_files_copied_from_google_drive {\n\n  meta:\n\
    \    author = \"Google Cloud Security\"\n    description = \"Identifies when a\
    \ user copies multiple files from Google Drive, which may indicate data exfiltration.\"\
    \n    rule_id = \"mr_dc187a73-9ea0-47bf-9a78-9a6f915de0f0\"\n    rule_name = \"\
    Google Workspace Multiple Files Copied From Google Drive\"\n    mitre_attack_tactic\
    \ = \"Exfiltration\"\n    mitre_attack_technique = \"Exfiltration Over Web Service\"\
    \n    mitre_attack_url = \"https://attack.mitre.org/techniques/T1567/\"\n    mitre_attack_version\
    \ = \"v13.1\"\n    type = \"Alert\"\n    data_source = \"Workspace Activity\"\n\
    \    severity = \"High\"\n    priority = \"High\"\n\n  events:\n    $ws.metadata.vendor_name\
    \ = \"Google Workspace\"\n    $ws.metadata.product_name = \"drive\"\n    (\n \
    \       $ws.metadata.product_event_type = \"copy\" or\n        $ws.metadata.product_event_type\
    \ = \"source_copy\"\n    )\n    $ws.principal.user.userid = $user_id\n\n  match:\n\
    \    $user_id over 1h\n\n  outcome:\n    $risk_score = max(75)\n    $mitre_attack_tactic\
    \ = \"Exfiltration\"\n    $mitre_attack_technique = \"Exfiltration Over Web Service\"\
    \n    $mitre_attack_technique_id = \"T1567\"\n    $event_count = count_distinct($ws.metadata.id)\n\
    \    $product_event_type = array_distinct($ws.metadata.product_event_type)\n \
    \   $userid = array_distinct($ws.principal.user.userid)\n    $doc_type = array_distinct($ws.src.resource.attribute.labels[\"\
    doc_type\"])\n    $owner = array_distinct($ws.target.resource.attribute.labels[\"\
    owner\"])\n    $doc_name = array_distinct($ws.target.resource.name)\n    $doc_id\
    \ = array_distinct($ws.target.resource.product_object_id)\n    $count_docs = count_distinct($ws.target.resource.product_object_id)\n\
    \n  condition:\n    // Customize the value of $count_docs to set the alerting\
    \ threshold for your environment\n    $ws and $count_docs > 10\n}"
  chronicle_rule_name: google_workspace_multiple_files_copied_from_google_drive
