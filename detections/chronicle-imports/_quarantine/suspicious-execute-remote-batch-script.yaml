    \nrule suspicious_execute_remote_batch_script\n{\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"One-liner execution of a Windows batch\
    \ script from a network share\"\n    reference = \"https://github.com/swisskyrepo/PayloadsAllTheThings/blob/master/Methodology%20and%20Resources/Windows%20-%20Download%20and%20Execute.md\"\
    \n    yara_version = \"YL2.0\"\n    rule_version = \"1.0\"\n\n  events:\n    re.regex($e1.principal.process.command_line,\
    \ `\\bcmd(\\.exe)?\\s+.*/k.*<.*\\\\`) nocase\n\n  condition:\n    $e1\n}"
  chronicle_rule_name: suspicious_execute_remote_batch_script
