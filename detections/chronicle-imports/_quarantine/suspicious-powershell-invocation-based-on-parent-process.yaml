    \ {\n meta:\n    author = \"Florian Roth\"\n    description = \"Detects suspicious\
    \ powershell invocations from interpreters or unusual programs  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/8bKj8RKQidUa\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, t1086\"\n\n  events:\n(((re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\wscript\\.exe`) or re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\cscript\\.exe`)) and re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\powershell\\.exe`) and ($selection.metadata.product_event_type = \"4688\"\
    \ or $selection.metadata.product_event_type = \"1\")) and not (re.regex($selection.principal.file.full_path,\
    \ `.*\\\\Health Service State\\\\.*`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: suspicious_powershell_invocation_based_on_parent_process
