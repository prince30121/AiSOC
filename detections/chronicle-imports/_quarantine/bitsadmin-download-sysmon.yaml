  chronicle_yaral: "rule bitsadmin_download_sysmon {\n meta:\n    author = \"Michael\
    \ Haag\"\n    description = \"Detects usage of bitsadmin downloading a file. \
    \ License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/NkFX55P1CZVt\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"Execution, t1204, t1059\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"1\" and re.regex($selection.target.process.file.full_path, `.*\\\\bitsadmin\\\
    .exe`) and (re.regex($selection.target.process.command_line, `.*/transfer`) or\
    \ re.regex($selection.target.process.command_line, `.*/download`)))\n\n  condition:\n\
    \    $selection\n}"
