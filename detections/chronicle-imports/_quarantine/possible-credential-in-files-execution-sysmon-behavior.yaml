detection:
  chronicle_yaral: "rule possible_credential_in_files_execution_sysmon_behavior {\n\
    \ meta:\n    author = \"Lee Archinal (content) Aric Gady (threat emulator)\"\n\
    \    description = \"This content detects powershell users trying to discover\
    \ credentials in Files (Based off of SOCPrime Red Tests)  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/VCZitSJT19zz\"\n    version\
    \ = \"0.01\"\n    created = \"2019/06/30\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"credential_access, t1081\"\n\n  events:\n($selection1.metadata.product_event_type\
    \ = \"1\" and $selection1.target.process.file.full_path = \"C:\\\\Windows\\\\\
    System32\\\\findstr.exe\" and (re.regex($selection1.target.process.command_line,\
    \ `C:\\\\Windows\\\\System32\\\\findstr\\.exe -si pass.*`) or re.regex($selection1.target.process.command_line,\
    \ `C:\\\\Windows\\\\System32\\\\findstr\\.exe -si user.*`)) and $selection1.principal.process.file.full_path\
    \ = \"C:\\\\Windows\\\\System32\\\\WindowsPowerShell\\\\v1.0\\\\powershell.exe\"\
    )\n\n  condition:\n    $selection1\n}"
  chronicle_rule_name: possible_credential_in_files_execution_sysmon_behavior
