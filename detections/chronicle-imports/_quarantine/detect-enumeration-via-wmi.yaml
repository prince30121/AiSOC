detection:
  chronicle_yaral: "rule detect_enumeration_via_wmi {\n meta:\n    author = \"Joseph\
    \ Kamau\"\n    description = \"This rule detects when wmic is used to conduct\
    \ discovery activity on windows operating system.Adversaries use this technique\
    \ to gather information of the host they have compromised  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/DbuPvE09LpJq\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"Windows\"\n    category\
    \ = \"process_creation\"\n    mitre = \"discovery, t1087, t1135, t1518\"\n\n \
    \ events:\n((re.regex($selection.target.process.command_line, `.* wmic useraccount\
    \ get /ALL.*`) or re.regex($selection.target.process.command_line, `.* wmic useraccount\
    \ list.*`) or re.regex($selection.target.process.command_line, `.* wmic startup\
    \ list brief.*`) or re.regex($selection.target.process.command_line, `.* wmic\
    \ share list.*`) or re.regex($selection.target.process.command_line, `.* wmic\
    \ service get.*`) or re.regex($selection.target.process.command_line, `.* wmic\
    \ qfe get description,installedOn /format:csv.*`)) and ($selection.metadata.product_event_type\
    \ = \"4688\" or $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: detect_enumeration_via_wmi
