  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "rule office_starup_folder_persistance {\n meta:\n    author =\
    \ \"Den Iuzvyk\"\n    description = \"Detects persistance  via saving dll with\
    \ extension .wll to office startup folder. Used by Chinese APT in recent COVID\
    \ campaign.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/IWLTK2UCu9Sk\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"persistence, t1137\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"11\" and re.regex($selection.target.process.file.full_path, `.*EQNEDT32\\\
    .EXE`) and re.regex($selection.target.file.full_path, `.*\\\\AppData\\\\Roaming\\\
    \\Microsoft\\\\Word\\\\STARTUP\\\\.*\\.wll`))\n\n  condition:\n    $selection\n\
    }"
  chronicle_rule_name: office_starup_folder_persistance
