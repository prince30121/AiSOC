    \nrule entra_id_group_deletion_success {\n\n  meta:\n    author = \"Google Cloud\
    \ Security\"\n    description = \"Detects when a group is deleted.\"\n    rule_id\
    \ = \"mr_d6a3162a-3ec5-45c1-a7cd-ff2988582924\"\n    rule_name = \"Entra ID Successful\
    \ Group Deletion\"\n    type = \"alert\"\n    platform = \"azure\"\n    data_source\
    \ = \"azure ad audit\"\n    severity = \"Low\"\n    priority = \"Low\"\n\n  events:\n\
    \    $group.metadata.event_type = \"GROUP_DELETION\"\n    $group.metadata.product_event_type\
    \ = \"Delete group\"\n    $group.metadata.product_name = \"Azure AD Directory\
    \ Audit\"\n    $group.metadata.vendor_name = \"Microsoft\"\n    $group.security_result.action\
    \ = \"ALLOW\"\n    $group.principal.user.userid = $user\n\n  match:\n    $user\
    \ over 5m\n\n  outcome:\n    $risk_score = 35\n    $event_count = count_distinct($group.metadata.id)\n\
    \    $user_agent = array_distinct($group.network.http.user_agent)\n    $principal_ip\
    \ = array_distinct($group.principal.ip)\n    $principal_user_userid = array_distinct($group.principal.user.email_addresses)\n\
    \    $group_name = array_distinct($group.target.resource.name)\n    $group_guid\
    \ = array_distinct($group.target.resource.product_object_id)\n\n  condition:\n\
    \    $group\n}"
