id: chronicle-detection-rules-suspicious-gup-usage
name: suspicious_gup_usage
description: suspicious_gup_usage
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "rule suspicious_gup_usage {\n meta:\n    author = \"Florian Roth\"\
    \n    description = \"Detects execution of the Notepad++ updater in a suspicious\
    \ directory, which is often used in DLL side-loading attacks  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/2NmEHPwIziCI\"\n    version\
    \ = \"0.01\"\n    created = \"2019/02/06\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"defense_evasion, t1073\"\n\n  events:\n\
    ((re.regex($selection.target.process.file.full_path, `.*\\\\GUP\\.exe`) and ($selection.metadata.product_event_type\
    \ = \"4688\" or $selection.metadata.product_event_type = \"1\")) and not ((re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\Users\\\\.*\\\\AppData\\\\Local\\\\Notepad\\+\\+\\\\updater\\\\gup\\\
    .exe`) or re.regex($selection.target.process.file.full_path, `C:\\\\Users\\\\\
    .*\\\\AppData\\\\Roaming\\\\Notepad\\+\\+\\\\updater\\\\gup\\.exe`) or $selection.target.process.file.full_path\
    \ = \"C:\\\\Program Files\\\\Notepad++\\\\updater\\\\gup.exe\" or $selection.target.process.file.full_path\
    \ = \"C:\\\\Program Files (x86)\\\\Notepad++\\\\updater\\\\gup.exe\")))\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: suspicious_gup_usage
provenance:
