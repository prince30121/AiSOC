  chronicle_yaral: "/*\n * Copyright 2025 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule lsass_memory_access_by_tool_dump_keyword_name {\n\n  meta:\n    author\
    \ = \"Florian Roth (Nextron Systems)\"\n    description = \"Detects LSASS process\
    \ access requests from a source process with the dump keyword in its image name\"\
    \n    reference = \"https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_access/proc_access_win_lsass_dump_keyword_image.yml\"\
    \n    license = \"https://github.com/SigmaHQ/Detection-Rule-License/blob/main/LICENSE.Detection.Rules.md\"\
    \n    rule_name = \"LSASS Memory Access by Tool With Dump Keyword In Name\"\n\
    \    sigma_uuid = \"9bd012ee-0dff-44d7-84a0-aa698cfd87a3\"\n    sigma_status =\
    \ \"test\"\n    rule_id = \"mr_98164cc1-0051-49c1-b915-421b3c119bfe\"\n    tactic\
    \ = \"TA0006\"\n    technique = \"T1003.001\"\n    type = \"Detection\"\n    data_source\
    \ = \"Sysmon\"\n    platform = \"Windows\"\n    severity = \"High\"\n    priority\
    \ = \"High\"\n    false_positives = \"Rare programs that contain the word dump\
    \ in their name and access lsass\"\n\n  events:\n    $process.metadata.event_type\
    \ = \"PROCESS_OPEN\"\n    re.regex($process.target.process.file.full_path, `\\\
    \\lsass.exe$`) nocase\n    strings.contains(strings.to_lower($process.principal.process.file.full_path),\
    \ \"dump\")\n    re.regex($process.target.resource.name, `(10|30|50|70|90|B0|D0|F0|18|38|58|78|98|B8|D8|F8|1A|3A|5A|7A|9A|BA|DA|FA|0x14C2|FF)$`)\
    \ nocase\n\n    $process.principal.hostname = $hostname\n\n  match:\n    $hostname\
    \ over 5m\n\n  outcome:\n    //example usage of specifying test hostname to adjust\
    \ risk score\n    $risk_score = max(if($process.principal.hostname = \"hostname\"\
    , 0, 15))\n    $principal_process_pid = array_distinct($process.principal.process.pid)\n\
    \    $principal_process_command_line = array_distinct($process.principal.process.command_line)\n\
    \    $principal_process_file_sha256 = array_distinct($process.principal.process.file.sha256)\n\
    \    $principal_process_file_full_path = array_distinct($process.principal.process.file.full_path)\n\
    \    $principal_process_product_specfic_process_id = array_distinct($process.principal.process.product_specific_process_id)\n\
    \    $principal_process_parent_process_product_specfic_process_id = array_distinct($process.principal.process.parent_process.product_specific_process_id)\n\
    \    $target_process_pid = array_distinct($process.target.process.pid)\n    $target_process_command_line\
    \ = array_distinct($process.target.process.command_line)\n    $target_process_file_sha256\
    \ = array_distinct($process.target.process.file.sha256)\n    $target_process_file_full_path\
    \ = array_distinct($process.target.process.file.full_path)\n    $target_process_product_specfic_process_id\
    \ = array_distinct($process.target.process.product_specific_process_id)\n    $log_type\
    \ = array_distinct(strings.concat($process.metadata.log_type,\"/\",$process.metadata.product_event_type))\n\
    \n  condition:\n    $process\n}"
  chronicle_rule_name: lsass_memory_access_by_tool_dump_keyword_name
