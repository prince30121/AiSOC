    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule sap_hanadb_audit_trail_policy_changes {\n\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Detects changes to SAP HANA audit policies\
    \ (Create, Alter, Drop) which could indicate an attempt to evade logging.\"\n\
    \    severity = \"High\"\n    tactic = \"TA0005\"\n    technique = \"T1562\"\n\
    \n  events:\n    $e.metadata.product_name = \"SAP_HANA_AUDIT\"\n\n    $statement\
    \ = $e.additional.fields[\"executed_statement\"]\n    $statement = /AUDIT\\s+POLICY/\
    \ nocase\n\n    $user = $e.principal.user.user_display_name\n\n  match:\n    $user\
    \ over 30m\n\n  outcome:\n    $risk_score = max(85)\n    $principal_user = array_distinct($user)\n\
    \    $statements = array_distinct($statement)\n    $system_id = array_distinct($e.target.resource.attribute.labels[\"\
    system_id\"])\n    $policy_name = array_distinct($e.security_result.rule_name)\n\
    \n  condition:\n    $e\n}"
  chronicle_rule_name: sap_hanadb_audit_trail_policy_changes
provenance:
