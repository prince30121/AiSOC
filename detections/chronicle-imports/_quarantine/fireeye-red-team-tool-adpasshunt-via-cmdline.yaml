    \n    product = \"windows\"\n    mitre = \"credential_access, t1003.003, t1552.006\"\
    \n\n  events:\n(re.regex($selection_image.target.process.file.full_path, `.*\\\
    \\adpasshunt\\.exe`) or (re.regex($selection_image.target.process.command_line,\
