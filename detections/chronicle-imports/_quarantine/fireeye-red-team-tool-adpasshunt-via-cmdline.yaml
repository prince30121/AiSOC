    \ and re.regex($selection_image.target.process.command_line, `.*action.*`) and\
    \ ($selection_image.metadata.product_event_type = \"4688\" or $selection_image.metadata.product_event_type\
    \ = \"1\") and (re.regex($selection_image.target.process.command_line, `.*gpp.*`)\
    \ or re.regex($selection_image.target.process.command_line, `.*ad.*`))))\n\n \
    \ condition:\n    $selection_image\n}"
