    Omer Faruk Celik\"\n    description = \"Detects the use of smbexec.py tool by\
    \ detecting a specific service installation  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/9pBTcmTTsThC\"\n    version\
    \ = \"0.01\"\n    created = \"2018/03/20\"\n    product = \"windows\"\n    mitre\
    \ = \"lateral_movement, execution, t1077, t1035\"\n\n  events:\n($service_installation.metadata.product_event_type\
    \ = \"7045\" and $service_installation.target.process.command_line = \"BTOBTO\"\
    \ and re.regex($service_installation.target.process.command_line, `.*\\\\execute\\\
    .bat`))\n\n  condition:\n    $service_installation\n}"
