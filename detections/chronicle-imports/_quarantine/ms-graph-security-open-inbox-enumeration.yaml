detection:
  chronicle_yaral: "/*\n * Copyright 2025 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule ms_graph_security_open_inbox_enumeration {\n\n  meta:\n    author = \"\
    Google Cloud Security\"\n    description = \"Identify enumeration of inboxes across\
    \ the Entra ID tenant. This detection is based on the Invoke-GraphOpenInboxFinder\
    \ in GraphRunner but the concepts are applicable to other tools that scan for\
    \ accessible inboxes.\"\n    rule_id = \"mr_94dbfeae-2a20-472d-b359-9784b66213e7\"\
    \n    rule_name = \"Enumeration of inboxes accessible by a user in the Microsoft\
    \ Graph API\"\n    assumption = \"User agent and IP address of the admin consoles\
    \ that normally interact with the application listing can be filtered out to reduce\
    \ detections.\"\n    reference = \"https://github.com/dafthack/GraphRunner/blob/main/GraphRunner.ps1\"\
    \n    type = \"Alert\"\n    data_source = \"MS Graph Activity Logs\"\n    platform\
    \ = \"Azure\"\n    severity = \"Medium\"\n    priority = \"Medium\"\n\n  events:\n\
    \    $api.metadata.event_type = \"NETWORK_HTTP\"\n    $api.metadata.product_event_type\
    \ = \"Microsoft Graph Activity\"\n    re.regex($api.target.url, `^https://graph.microsoft.com/v1.0/users/.*/mailFolders/Inbox/messages$`)\
    \ nocase\n    //Can be tuned for specific User Agent strings being used\n    //$api.network.http.user_agent\
    \ = /PowerShell/ nocase\n    $api.network.http.method = \"GET\"\n    $api.principal.ip[0]\
    \ = $ip\n    $api.network.session_id = $session\n    re.capture($api.target.url,\
    \ `^https://graph.microsoft.com/v1.0/users/(.*)/mailFolders/Inbox/messages$`)\
    \ = $scanned_user\n\n  match:\n    $ip, $session over 5m\n\n  outcome:\n    $risk_score\
    \ = 65\n    $event_count = count_distinct($api.metadata.id)\n    $requesting_user_guid\
    \ = array_distinct($api.principal.user.userid)\n    //Using $ip placeholder variable\
    \ since we specify first value in repeated field only, if repeated field is used,\
    \ it can cause duplicate counts in sums below\n    $requesting_ip = array_distinct($ip)\n\
    \    $user_agent = array_distinct($api.network.http.user_agent)\n    $location\
    \ = array_distinct($api.principal.location.name)\n    $target_application_id_guid\
    \ = array_distinct($api.target.resource.product_object_id)\n    $session_id =\
    \ array_distinct($api.network.session_id)\n    $total_scanned_users = count($scanned_user)\n\
    \    $successfully_scanned_users = array_distinct(if($api.network.http.response_code\
    \ = 200, $scanned_user,\"\"))\n    //Provide breakdown of inboxes that the user\
    \ scanning can access, can't find and are unauthorized based on http response\
    \ code\n    $successful_access = sum(if($api.network.http.response_code = 200,\
    \ 1,0))\n    $forbidden_access = sum(if($api.network.http.response_code = 403,\
    \ 1,0))\n    $inbox_not_found = sum(if($api.network.http.response_code = 404,\
    \ 1,0))\n    $inbox_other = sum(if($api.network.http.response_code != 404\n  \
    \      and $api.network.http.response_code != 403\n        and $api.network.http.response_code\
    \ != 200, 1,0))\n\n  condition:\n    //Can remove the total_scanned_users to detect\
    \ everytime this endpoint is called or use this as a threshold to eliminate stray\
    \ calls\n    $api and $total_scanned_users > 10\n    //Another option is to trigger\
    \ based on the number of successful inboxes enumerated instead of the total number\
    \ of inboxes scanned\n    //$api and $successful_access > 2\n}"
  chronicle_rule_name: ms_graph_security_open_inbox_enumeration
