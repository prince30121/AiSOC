    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule ms_graph_delete_method {\n\n  meta:\n    author = \"Google Cloud Security\"\
    \n    description = \"Identify when the http delete method is being called within\
    \ the Microsoft Graph API.\"\n    rule_id = \"mr_9e5f6adc-84f9-46f3-bf9e-abe38e14a77b\"\
    \n    rule_name = \"Hunt for the delete method in Microsoft Graph API calls\"\n\
    \    assumption = \"Tuning is needed to identify administrative activities as\
    \ general maintenance that may be logged\"\n    type = \"Hunt\"\n    data_source\
    \ = \"MS Graph Activity Logs\"\n    platform = \"Azure\"\n    severity = \"Low\"\
    \n    priority = \"Low\"\n\n  events:\n    $api.metadata.event_type = \"NETWORK_HTTP\"\
    \n    $api.metadata.product_event_type = \"Microsoft Graph Activity\"\n    $api.network.http.method\
    \ = \"DELETE\"\n    //Can be tuned for specific APIs being used in delete operations\
    \ if desired\n    //$api.target.url = /https:\\/\\/graph.microsoft.com\\/v1.0\\\
    /groups\\/.*\\/members/ nocase\n    //Can be tuned for specific User Agent strings\
    \ being used\n    //$api.network.http.user_agent = /PowerShell/ nocase\n    //Can\
    \ be tuned to eliminate Azure IP ranges or other IP addresses\n    NOT net.ip_in_range_cidr($api.principal.ip,\
    \ \"20.151.0.0/16\")\n    $api.principal.ip = $ip\n    $api.network.session_id\
    \ = $session\n\n  match:\n    $ip, $session over 5m\n\n  outcome:\n    $risk_score\
    \ = 15\n    $event_count = count($api.metadata.id)\n    $requesting_user_guid\
    \ = array_distinct($api.principal.user.userid)\n    $requesting_ip = array_distinct($api.principal.ip)\n\
    \    $user_agent = array_distinct($api.network.http.user_agent)\n    $location\
    \ = array_distinct($api.principal.location.name)\n    $target_application_id_guid\
    \ = array_distinct($api.target.resource.product_object_id)\n    $session_id =\
    \ array_distinct($api.network.session_id)\n    $target_url = array_distinct($api.target.url)\n\
    \n  condition:\n    $api\n}"
  chronicle_rule_name: ms_graph_delete_method
