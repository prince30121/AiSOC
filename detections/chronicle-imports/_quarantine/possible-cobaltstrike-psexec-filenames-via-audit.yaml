  chronicle_yaral: "rule possible_cobaltstrike_psexec_filenames_via_audit {\n meta:\n\
    \    author = \"SOC Prime Team\"\n    description = \"CobaltStrike uses a executables\
    \ with 7 random alphanumeric characters by default (i.e. 28a3fe2.exe)  License:\
    \ https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\n\
    \    reference = \"https://tdm.socprime.com/tdm/info/1aX2L06wVHuN\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"security\"\n    mitre = \"t1035, t1077, lateral_movement, execution\"\n\n\
    \  events:\n((re.regex($logsource.target.process.command_line, `\\..*\\\\\\\\\
    [A-Za-z0-9]{7}\\\\\\.[Ee][Xx][Ee]`) and re.regex($logsource.target.process.command_line,\
    \ `\\..*\\\\\\\\\\..*[0-9]\\..*\\\\\\.[Ee][Xx][Ee]`) and $logsource.metadata.product_event_type\
    \ = \"4697\") and not (re.regex($logsource.target.process.command_line, `\\..*64\\\
    \\\\.[Ee][Xx][Ee]`)))\n\n  condition:\n    $logsource\n}"
  chronicle_rule_name: possible_cobaltstrike_psexec_filenames_via_audit
