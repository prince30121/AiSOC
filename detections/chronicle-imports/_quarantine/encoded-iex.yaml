detection:
  chronicle_yaral: "rule encoded_iex {\n meta:\n    author = \"Florian Roth\"\n  \
    \  description = \"Detects a base64 encoded IEX command string in a process command\
    \ line  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/5sp2AU3LTPOL\"\n    version\
    \ = \"0.01\"\n    created = \"2019/08/23\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"t1086, t1140, execution\"\n\n  events:\n\
    ((re.regex($selection.target.process.command_line, `.*SUVYIChb.*`) or re.regex($selection.target.process.command_line,\
    \ `.*lFWCAoW.*`) or re.regex($selection.target.process.command_line, `.*JRVggKF.*`)\
    \ or re.regex($selection.target.process.command_line, `.*aWV4IChb.*`) or re.regex($selection.target.process.command_line,\
    \ `.*lleCAoW.*`) or re.regex($selection.target.process.command_line, `.*pZXggKF.*`)\
    \ or re.regex($selection.target.process.command_line, `.*aWV4IChOZX.*`) or re.regex($selection.target.process.command_line,\
    \ `.*lleCAoTmV3.*`) or re.regex($selection.target.process.command_line, `.*pZXggKE5ld.*`)\
    \ or re.regex($selection.target.process.command_line, `.*SUVYIChOZX.*`) or re.regex($selection.target.process.command_line,\
    \ `.*lFWCAoTmV3.*`) or re.regex($selection.target.process.command_line, `.*JRVggKE5ld.*`))\
    \ and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: encoded_iex
