detection:
  chronicle_yaral: "rule suspicious_parent_of_cscexe {\n meta:\n    author = \"Florian\
    \ Roth\"\n    description = \"Detects a suspicious parent of csc.exe, which could\
    \ by a sign of payload delivery  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/efntgVsfnge6\"\n    version\
    \ = \"0.01\"\n    created = \"2019/02/11\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"defense_evasion, t1036\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"1\" and re.regex($selection.target.process.file.full_path, `.*\\\\csc\\\
    .exe.*`) and (re.regex($selection.principal.process.file.full_path, `.*\\\\wscript\\\
    .exe`) or re.regex($selection.principal.process.file.full_path, `.*\\\\cscript\\\
    .exe`) or re.regex($selection.principal.process.file.full_path, `.*\\\\mshta\\\
    .exe`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: suspicious_parent_of_cscexe
