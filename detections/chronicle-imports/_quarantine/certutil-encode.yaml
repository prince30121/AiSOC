detection:
  chronicle_yaral: "rule certutil_encode {\n meta:\n    author = \"Florian Roth\"\n\
    \    description = \"Detects suspicious a certutil command that used to encode\
    \ files, which is sometimes used for data exfiltration  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/3xvaWdoC0q2R\"\n    version\
    \ = \"0.01\"\n    created = \"2019/02/24\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n\n  events:\n((re.regex($selection.target.process.command_line,\
    \ `certutil -f -encode .*`) or re.regex($selection.target.process.command_line,\
    \ `certutil\\.exe -f -encode .*`) or re.regex($selection.target.process.command_line,\
    \ `certutil -encode -f .*`) or re.regex($selection.target.process.command_line,\
    \ `certutil\\.exe -encode -f .*`)) and ($selection.metadata.product_event_type\
    \ = \"4688\" or $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: certutil_encode
