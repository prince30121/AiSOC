detection:
  chronicle_yaral: "rule execution_in_nonexecutable_folder {\n meta:\n    author =\
    \ \"Florian Roth\"\n    description = \"Detects a suspicious exection from an\
    \ uncommon folder  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/RVIFEay7irsd\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"defense_evasion, t1036\"\n\n  events:\n\
    ((re.regex($selection.target.process.file.full_path, `.*\\\\$Recycle\\.bin`) or\
    \ re.regex($selection.target.process.file.full_path, `.*\\\\Users\\\\All Users\\\
    \\.*`) or re.regex($selection.target.process.file.full_path, `.*\\\\Users\\\\\
    Default\\\\.*`) or re.regex($selection.target.process.file.full_path, `.*\\\\\
    Users\\\\Public\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\Perflogs\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\config\\\\systemprofile\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\Windows\\\\Fonts\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\Windows\\\\IME\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\Windows\\\\addins\\\\.*`)) and ($selection.metadata.product_event_type\
    \ = \"4688\" or $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: execution_in_nonexecutable_folder
