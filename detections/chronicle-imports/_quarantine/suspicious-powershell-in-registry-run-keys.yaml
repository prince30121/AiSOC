detection:
  chronicle_yaral: "/*\n * Copyright 2025 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule suspicious_powershell_in_registry_run_keys {\n\n  meta:\n    author = \"\
    frack113, Florian Roth (Nextron Systems)\"\n    description = \"Detects potential\
    \ PowerShell commands or code within registry run keys\"\n    reference = \"https://github.com/SigmaHQ/sigma/blob/master/rules/windows/registry/registry_set/registry_set_powershell_in_run_keys.yml\"\
    \n    license = \"https://github.com/SigmaHQ/Detection-Rule-License/blob/main/LICENSE.Detection.Rules.md\"\
    \n    rule_name = \"Suspicious Powershell In Registry Run Keys\"\n    rule_id\
    \ = \"mr_ad75681b-474a-4022-9e35-d6beffcf9a4a\"\n    sigma_uuid = \"8d85cf08-bf97-4260-ba49-986a2a65129c\"\
    \n    sigma_status = \"test\"\n    tactic = \"TA0003\"\n    technique = \"T1547.001\"\
    \n    data_source = \"Sysmon\"\n    platform = \"Windows\"\n    severity = \"\
    Medium\"\n    priority = \"Medium\"\n    false_positives = \"Legitimate admin\
    \ or third party scripts\"\n\n  events:\n    $reg.metadata.event_type = \"REGISTRY_MODIFICATION\"\
    \n    (\n        (\n            strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\software\\\\microsoft\\\\windows\\\\currentversion\\\\run\") or\n    \
    \        strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\software\\\\wow6432node\\\\microsoft\\\\windows\\\\currentversion\\\\\
    run\") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\software\\\\microsoft\\\\windows\\\\currentversion\\\\policies\\\\explorer\\\
    \\run\")\n        )\n        and\n        (\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \"powershell\") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \"pwsh \") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \"frombase64string\") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \".downloadfile(\") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \".downloadstring(\") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \" -w hidden \") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \" -w 1 \") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \"-windowstyle hidden\") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \"-window hidden\") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \" -nop \") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \" -encodedcommand \") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \"-executionpolicy bypass\") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \"invoke-expression\") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \"iex (\") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \"invoke-command\") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \"icm -\") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \"invoke-webrequest\") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \"iwr \") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \" -noni \") or\n            strings.contains(strings.to_lower($reg.target.registry.registry_value_data),\
    \ \" -noninteractive \")\n        )\n    )\n\n    $reg.principal.hostname = $hostname\n\
    \n  match:\n    $hostname over 5m\n\n  outcome:\n    //example usage of specifying\
    \ test user and hostname to adjust risk score\n    $risk_score = max(if($reg.principal.user.userid\
    \ = \"user\" and $reg.principal.hostname = \"hostname\", 0, 15))\n    $principal_hostname\
    \ = array_distinct($reg.principal.hostname)\n    $principal_process_pid = array_distinct($reg.principal.process.pid)\n\
    \    $principal_process_file_full_path = array_distinct($reg.principal.process.file.full_path)\n\
    \    $principal_process_product_specific_process_id = array_distinct($reg.principal.process.product_specific_process_id)\n\
    \    $principal_user_userid = array_distinct($reg.principal.user.userid)\n   \
    \ $target_registry_key = array_distinct($reg.target.registry.registry_key)\n \
    \   $target_registry_value_data = array_distinct($reg.target.registry.registry_value_data)\n\
    \    $log_type = array_distinct(strings.concat($reg.metadata.log_type,\"/\",$reg.metadata.product_event_type))\n\
    \n  condition:\n    $reg\n}"
  chronicle_rule_name: suspicious_powershell_in_registry_run_keys
