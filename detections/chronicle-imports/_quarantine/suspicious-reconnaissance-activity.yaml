    \n    product = \"windows\"\n\n  events:\n(($selection.target.process.command_line\
    \ = \"net group \\\"domain admins\\\" /domain\" or $selection.target.process.command_line\
    \ = \"net localgroup administrators\") and ($selection.metadata.product_event_type\
    \ = \"4688\" or $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n\
    \    $selection\n}"
