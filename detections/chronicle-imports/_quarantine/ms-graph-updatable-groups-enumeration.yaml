    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule ms_graph_updatable_groups_enumeration {\n\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"This detects actions intended to identify\
    \ updatable groups in Entra ID. GraphRunner contains a function called Get-UpdatableGroups\
    \ but other tools may as well.\"\n    rule_id = \"mr_e1deedad-14f9-4718-9e0b-4f58aae38fdc\"\
    \n    rule_name = \"Enumeration of updatable groups in the Microsoft Graph API\"\
    \n    reference = \"https://github.com/dafthack/GraphRunner/blob/main/GraphRunner.ps1\"\
    \n    type = \"alert\"\n    data_source = \"MS Graph Activity Logs\"\n    platform\
    \ = \"Azure\"\n    severity = \"Low\"\n    priority = \"Low\"\n\n  events:\n \
    \   $group.metadata.event_type = \"NETWORK_HTTP\"\n    $group.metadata.product_event_type\
    \ = \"Microsoft Graph Activity\"\n    $group.target.url = \"https://graph.microsoft.com/v1.0/groups\"\
    \ nocase\n    //Can be tuned for specific User Agent strings being used - by default\
    \ GraphRunner does not forge the UA for this action\n    //$group.network.http.user_agent\
    \ = /PowerShell/ nocase\n    $group.network.http.method = \"GET\"\n    $group.network.http.response_code\
    \ = 200\n    $group.principal.ip = $ip\n    $group.network.session_id = $session\n\
    \n    $api.metadata.event_type = \"NETWORK_HTTP\"\n    $api.metadata.product_event_type\
    \ = \"Microsoft Graph Activity\"\n    $api.target.url = \"https://graph.microsoft.com/beta/roleManagement/directory/estimateAccess\"\
    \ nocase\n    //Can be tuned for specific User Agent strings being used - by default\
    \ GraphRunner does not forge the UA for this action\n    //$api.network.http.user_agent\
    \ = /PowerShell/ nocase\n    $api.network.http.method = \"POST\"\n    $api.network.http.response_code\
    \ = 200\n    $api.principal.ip = $ip\n    $api.network.session_id = $session\n\
    \n  match:\n    $ip, $session over 5m\n\n  outcome:\n    $risk_score = 35\n  \
    \  $event_count = count_distinct($group.metadata.id) + count_distinct($api.metadata.id)\n\
    \    $requesting_user_guid = array_distinct($api.principal.user.userid)\n    $requesting_ip\
    \ = array_distinct($api.principal.ip)\n    $user_agent = array_distinct($api.network.http.user_agent)\n\
    \    $location = array_distinct($api.principal.location.name)\n    $target_application_id_guid\
    \ = array_distinct($api.target.resource.product_object_id)\n    $session_id =\
    \ array_distinct($api.network.session_id)\n\n  condition:\n    $group and $api\n\
    }"
  chronicle_rule_name: ms_graph_updatable_groups_enumeration
