    \nrule mitre_attack_T1037_001_windows_logon_script\n{\n  meta:\n    author = \"\
    Google Cloud Security\"\n    description = \"Registry modification related to\
    \ installation of a custom logon script\"\n    reference = \"https://attack.mitre.org/techniques/T1037/001/\"\
    \n    yara_version = \"YL2.0\"\n    rule_version = \"1.0\"\n\n  events:\n    (\n\
    \      $e1.metadata.event_type = \"REGISTRY_CREATION\" or\n      $e1.metadata.event_type\
    \ = \"REGISTRY_MODIFICATION\"\n    )\n    and\n    re.regex($e1.target.registry.registry_key,\
    \ `(HKCU|HKEY_CURRENT_USER)\\\\Environment\\\\UserInitMprLogonScript`) nocase\n\
    \n  condition:\n    $e1\n}"
