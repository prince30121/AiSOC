detection:
  chronicle_yaral: "rule modification_of_windows_defender_service_settings_sysmon\
    \ {\n meta:\n    author = \"Ariel Millahuel\"\n    description = \"Detects modifications\
    \ on Windows Defender Settings via Registry keys/values  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/EVsw1o6LJTlk\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"defense_evasion, t1036\"\n\n  events:\n(($selection1.metadata.product_event_type\
    \ = \"13\" and (re.regex($selection1.target.registry.registry_key, `.*\\\\SYSTEM\\\
    \\ControlSet001\\\\services\\\\WinDefend`) or re.regex($selection1.target.registry.registry_key,\
    \ `.*SOFTWARE\\\\Policies\\\\Microsoft\\\\Windows Defender`)) and $selection1.metadata.event_type\
    \ = \"SetValue\") or ($selection1.target.process.file.full_path = \"powershell.exe\"\
    \ and re.regex($selection1.target.process.command_line, `.* .*/c powershell Set-MpPreference\
    \ -DisableRealtimeMonitoring $true  .*`)))\n\n  condition:\n    $selection1\n}"
  chronicle_rule_name: modification_of_windows_defender_service_settings_sysmon
