    \nrule google_workspace_ownership_transferred_on_google_drive {\n\n  meta:\n \
    \   author = \"Google Cloud Security\"\n    description = \"Identifies when a\
    \ Google Workspace user transfers the ownership of a file.\"\n    rule_id = \"\
    mr_05cddcc9-abf6-4c4c-9518-e2218a1f5c84\"\n    rule_name = \"Google Workspace\
    \ Ownership Transferred On Google Drive\"\n    mitre_attack_tactic = \"Collection\"\
    \n    mitre_attack_technique = \"Data Staged: Remote Data Staging\"\n    mitre_attack_url\
    \ = \"https://attack.mitre.org/techniques/T1074/002/\"\n    mitre_attack_version\
    \ = \"v13.1\"\n    type = \"Alert\"\n    data_source = \"Workspace Activity\"\n\
    \    severity = \"High\"\n    priority = \"High\"\n\n  events:\n    $ws.metadata.vendor_name\
    \ = \"Google Workspace\"\n    $ws.metadata.product_name = \"admin\"\n    $ws.metadata.product_event_type\
    \ = \"CREATE_DATA_TRANSFER_REQUEST\"\n    $ws.security_result.category_details\
    \ = \"USER_SETTINGS\"\n\n  outcome:\n    $risk_score = max(70)\n    $mitre_attack_tactic\
    \ = \"Collection\"\n    $mitre_attack_technique = \"Data Staged: Remote Data Staging\"\
    \n    $mitre_attack_technique_id = \"T1074.002\"\n    $event_count = count_distinct($ws.metadata.id)\n\
    \    $principal_ip = array_distinct($ws.principal.ip)\n    $principal_country\
    \ = array_distinct($ws.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_state = array_distinct($ws.principal.ip_geo_artifact.location.state)\n\
    \    $principal_user_emails = array_distinct($ws.principal.user.email_addresses)\n\
    \    $target_user_emails = array_distinct($ws.target.user.email_addresses)\n \
    \   $principal_user_id = $ws.principal.user.userid\n    $target_application =\
    \ $ws.target.application\n    $src_user_emails = array_distinct($ws.src.user.email_addresses)\n\
    \n  condition:\n    $ws\n}"
