id: chronicle-detection-rules-github-high-number-of-non-public-github-repositories-cloned
name: github_high_number_of_non_public_github_repositories_cloned
description: github_high_number_of_non_public_github_repositories_cloned
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "/*\n * Copyright 2024 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule github_high_number_of_non_public_github_repositories_cloned {\n\n  meta:\n\
    \    author = \"Google Cloud Security\"\n    description = \"Detects when a user\
    \ clones a high number of non-public GitHub repositories. An adversary may attempt\
    \ to steal the contents of several GitHub repositories after compromising a user\
    \ account.\"\n    rule_id = \"mr_9063e681-ac7b-4fad-8bcf-08ed1ae367da\"\n    rule_name\
    \ = \"GitHub High Number Of Non Public GitHub Repositories Cloned\"\n    assumption\
    \ = \"Your GitHub enterprise audit log settings are configured to log the source\
    \ IP address for events. Reference: https://docs.github.com/en/organizations/keeping-your-organization-secure/managing-security-settings-for-your-organization/displaying-ip-addresses-in-the-audit-log-for-your-organization\"\
    \n    type = \"alert\"\n    severity = \"High\"\n    priority = \"High\"\n   \
    \ platform = \"GitHub\"\n    data_source = \"github\"\n    mitre_attack_tactic\
    \ = \"Collection\"\n    mitre_attack_technique = \"Data from Information Repositories:\
    \ Code Repositories\"\n    mitre_attack_url = \"https://attack.mitre.org/versions/v14/techniques/T1213/003/\"\
    \n    mitre_attack_version = \"v14\"\n    reference = \"https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/audit-log-events-for-your-enterprise\"\
    \n\n  events:\n    $github.metadata.vendor_name = \"GITHUB\" nocase\n    $github.metadata.product_name\
    \ = \"GITHUB\"\n    $github.metadata.product_event_type = \"git.clone\"\n    $github.extracted.fields[\"\
    repository_public\"] = \"false\"\n    $github.principal.user.userid = $user_id\n\
    \    $github.target.resource.name = $github_repo_name\n\n  match:\n    $user_id\
    \ over 30m\n\n  outcome:\n    $github_repo_name_distinct_count = count_distinct($github_repo_name)\n\
    \    $risk_score = max(85)\n    $mitre_attack_tactic = \"Collection\"\n    $mitre_attack_technique\
    \ = \"Data from Information Repositories: Code Repositories\"\n    $mitre_attack_technique_id\
    \ = \"T1213.003\"\n    $event_count = count_distinct($github.metadata.id)\n  \
    \  $principal_ip = array_distinct($github.principal.ip)\n    $principal_user_userid\
    \ = array_distinct($github.principal.user.userid)\n    $principal_ip_country =\
    \ array_distinct($github.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($github.principal.ip_geo_artifact.location.state)\n\
    \    $principal_ip_city = array_distinct($github.principal.location.city)\n  \
    \  $security_result_summary = array_distinct($github.security_result.summary)\n\
    \n  condition:\n    // Customize GitHub repo count to fit your environment\n \
    \   $github and $github_repo_name_distinct_count > 5\n}"
  chronicle_rule_name: github_high_number_of_non_public_github_repositories_cloned
