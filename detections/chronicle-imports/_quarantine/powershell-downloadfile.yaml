detection:
  chronicle_yaral: "rule powershell_downloadfile {\n meta:\n    author = \"Florian\
    \ Roth\"\n    description = \"Detects the execution of powershell, a WebClient\
    \ object creation and the invocation of DownloadFile in a single command line\
    \  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/hV0W6QPlXWli\"\n    version\
    \ = \"0.01\"\n    created = \"2020/03/25\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, t1086\"\n\n  events:\n(re.regex($selection.target.process.command_line,\
    \ `.*powershell.*`) and re.regex($selection.target.process.command_line, `.*\\\
    .DownloadFile.*`) and re.regex($selection.target.process.command_line, `.*System\\\
    .Net\\.WebClient.*`) and ($selection.metadata.product_event_type = \"4688\" or\
    \ $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n    $selection\n\
    }"
  chronicle_rule_name: powershell_downloadfile
