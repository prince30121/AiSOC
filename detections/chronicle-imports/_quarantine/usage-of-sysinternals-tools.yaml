detection:
  chronicle_yaral: "rule usage_of_sysinternals_tools {\n meta:\n    author = \"Markus\
    \ Neis\"\n    description = \"Detects the usage of Sysinternals Tools due to accepteula\
    \ key beeing added to Registry  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/fUvy5yjtefoK\"\n    version\
    \ = \"0.01\"\n    created = \"2017/08/28\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n\n  events:\n(($selection1.metadata.product_event_type = \"13\"\
    \ and re.regex($selection1.target.registry.registry_key, `.*\\\\EulaAccepted`))\
    \ or ($selection1.metadata.product_event_type = \"1\" and re.regex($selection1.target.process.command_line,\
    \ `.* -accepteula.*`)))\n\n  condition:\n    $selection1\n}"
  chronicle_rule_name: usage_of_sysinternals_tools
