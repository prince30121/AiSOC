detection:
  chronicle_yaral: "rule psexe_renamed_sysinternals_tool {\n meta:\n    author = \"\
    Florian Roth\"\n    description = \"Detects renamed SysInternals tool execution\
    \ with a binary named ps.exe as used by Dragonfly APT group and documented in\
    \ TA17-293A report  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/OyqeW0U5pwZB\"\n    version\
    \ = \"0.01\"\n    created = \"2017/10/22\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"defense_evasion, g0035, t1036, car.2013-05-009\"\
    \n\n  events:\n($selection.target.process.command_line = \"ps.exe -accepteula\"\
    \ and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: psexe_renamed_sysinternals_tool
