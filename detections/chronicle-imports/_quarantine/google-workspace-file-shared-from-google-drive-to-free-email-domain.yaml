  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule google_workspace_file_shared_from_google_drive_to_free_email_domain {\n\
    \n    meta:\n      author = \"Google Cloud Security\"\n      description = \"\
    Identifies when a user shares a file on Google Drive with a free email domain,\
    \ which may indicate data exfiltration.\"\n      rule_id = \"mr_054c422b-2a42-4dde-b937-e80d063f65e7\"\
    \n      rule_name = \"Google Workspace File Shared From Google Drive To Free Email\
    \ Domain\"\n      mitre_attack_tactic = \"Exfiltration\"\n      mitre_attack_technique\
    \ = \"Exfiltration Over Web Service\"\n      mitre_attack_url = \"https://attack.mitre.org/techniques/T1567/\"\
    \n      mitre_attack_version = \"v13.1\"\n      type = \"Alert\"\n      data_source\
    \ = \"Workspace Activity\"\n      severity = \"High\"\n      priority = \"High\"\
    \n\n    events:\n      $ws.metadata.vendor_name = \"Google Workspace\"\n     \
    \ $ws.metadata.product_name = \"drive\"\n\n      (\n          $ws.metadata.product_event_type\
    \ = \"change_user_access\" or\n          $ws.metadata.product_event_type = \"\
    change_document_visibility\" or\n          $ws.metadata.product_event_type = \"\
    change_document_access_scope\" or\n          $ws.metadata.product_event_type =\
    \ \"change_acl_editors\"\n      )\n\n      // File shared externally with free\
    \ email domains\n      $ws.target.resource.attribute.labels[\"visibility\"] =\
    \ \"shared_externally\"\n      $ws.target.user.email_addresses = /.*@gmail\\.com|.*@aol\\\
    .com|.*@ymail\\.com|.*@ymail\\.com|.*@hotmail\\.com|.*@outlook\\.com|.*@icloud\\\
    .com/\n\n    outcome:\n      $risk_score = max(75)\n      $mitre_attack_tactic\
    \ = \"Exfiltration\"\n      $mitre_attack_technique = \"Exfiltration Over Web\
    \ Service\"\n      $mitre_attack_technique_id = \"T1567\"\n      $event_count\
    \ = count_distinct($ws.metadata.id)\n      $product_event_type = array_distinct($ws.metadata.product_event_type)\n\
    \      $userid = array_distinct($ws.principal.user.userid)\n      $doc_type =\
    \ array_distinct($ws.src.resource.attribute.labels[\"doc_type\"])\n      $owner\
    \ = array_distinct($ws.target.resource.attribute.labels[\"owner\"])\n      $target_emails\
    \ = array_distinct($ws.target.user.email_addresses)\n      $doc_name = array_distinct($ws.target.resource.name)\n\
    \      $doc_id = array_distinct($ws.target.resource.product_object_id)\n\n   \
    \ condition:\n      $ws\n  }"
  chronicle_rule_name: google_workspace_file_shared_from_google_drive_to_free_email_domain
