id: chronicle-detection-rules-github-personal-access-token-created-from-tor-ip-address
name: github_personal_access_token_created_from_tor_ip_address
description: github_personal_access_token_created_from_tor_ip_address
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "/*\n * Copyright 2024 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule github_personal_access_token_created_from_tor_ip_address {\n\n  meta:\n\
    \    author = \"Google Cloud Security\"\n    description = \"Detects when a GitHub\
    \ Personal Access Token is created from a known Tor exit node IP address. An adversary\
    \ may create a Personal Access Token before carrying out follow up actions such\
    \ as cloning GitHub repositories to steal data.\"\n    rule_id = \"mr_39b42a3c-6b7a-4fa7-a6ca-df084ca92da4\"\
    \n    rule_name = \"GitHub Personal Access Token Created from Tor IP Address\"\
    \n    assumption = \"Your GitHub enterprise audit log settings are configured\
    \ to log the source IP address for events. Reference: https://docs.github.com/en/organizations/keeping-your-organization-secure/managing-security-settings-for-your-organization/displaying-ip-addresses-in-the-audit-log-for-your-organization\"\
    \n    type = \"alert\"\n    severity = \"High\"\n    priority = \"High\"\n   \
    \ platform = \"GitHub\"\n    data_source = \"github\"\n    mitre_attack_tactic\
    \ = \"Persistence, Privilege Escalation\"\n    mitre_attack_technique = \"Account\
    \ Manipulation: Additional Cloud Credentials\"\n    mitre_attack_url = \"https://attack.mitre.org/versions/v14/techniques/T1098/001/\"\
    \n    mitre_attack_version = \"v14\"\n    reference = \"https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/audit-log-events-for-your-enterprise\"\
    \n    tags = \"tor\"\n\n  events:\n    $github.metadata.vendor_name = \"GITHUB\"\
    \ nocase\n    $github.metadata.product_name = \"GITHUB\"\n    $github.metadata.product_event_type\
    \ = \"personal_access_token.request_created\"\n    $github.principal.ip = $ip\n\
    \n    // Tor IP address list is provided by Google Cloud Threat Intelligence (GCTI)\
    \ feed\n    $gcti_feed.graph.entity.artifact.ip = $ip\n    $gcti_feed.graph.metadata.entity_type\
    \ = \"IP_ADDRESS\"\n    $gcti_feed.graph.metadata.threat.threat_feed_name = \"\
    Tor Exit Nodes\"\n    $gcti_feed.graph.metadata.product_name = \"GCTI Feed\"\n\
    \    $gcti_feed.graph.metadata.source_type = \"GLOBAL_CONTEXT\"\n\n  match:\n\
    \    $ip over 30m\n\n  outcome:\n    $risk_score = max(85)\n    $mitre_attack_tactic\
    \ = \"Persistence, Privilege Escalation\"\n    $mitre_attack_technique = \"Account\
    \ Manipulation: Additional Cloud Credentials\"\n    $mitre_attack_technique_id\
    \ = \"T1098.001\"\n    $event_count = count_distinct($github.metadata.id)\n  \
    \  $principal_ip = array_distinct($github.principal.ip)\n    $principal_user_userid\
    \ = array_distinct($github.principal.user.userid)\n    $principal_ip_country =\
    \ array_distinct($github.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($github.principal.ip_geo_artifact.location.state)\n\
    \    $principal_ip_city = array_distinct($github.principal.location.city)\n  \
    \  $security_result_summary = array_distinct($github.security_result.summary)\n\
    \n  condition:\n    $github and $gcti_feed\n}"
  chronicle_rule_name: github_personal_access_token_created_from_tor_ip_address
