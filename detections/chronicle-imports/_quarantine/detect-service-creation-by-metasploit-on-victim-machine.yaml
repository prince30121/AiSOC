detection:
  chronicle_yaral: "rule detect_service_creation_by_metasploit_on_victim_machine {\n\
    \ meta:\n    author = \"Joseph Kamau\"\n    description = \"This rule detects\
    \ when a service is created by metasploit(e.g psexec) via powershell on a victim\
    \ endpoint  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/nHv2Sd3eaLs2\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"Windows\"\n    service\
    \ = \"security\"\n    mitre = \"execution, powershell, t1086\"\n\n  events:\n\
    ($selection.metadata.product_event_type = \"7045\" and re.regex($selection.target.process.command_line,\
    \ `%COMSPEC% /b /c start /b /min powershell\\.exe -nop -w hidden -noni -c.*`))\n\
    \n  condition:\n    $selection\n}"
  chronicle_rule_name: detect_service_creation_by_metasploit_on_victim_machine
