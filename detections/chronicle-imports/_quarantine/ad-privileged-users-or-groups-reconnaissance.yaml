    \ = \"security\"\n    mitre = \"discovery, t1087\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"4661\" and ($selection.principal.user.user_display_name = \"SAM_USER\" or\
    \ $selection.principal.user.user_display_name = \"SAM_GROUP\") and ((re.regex($selection.target.registry.registry_value_data,\
    \ `.*-512`) or re.regex($selection.target.registry.registry_value_data, `.*-502`)\
    \ or re.regex($selection.target.registry.registry_value_data, `.*-500`) or re.regex($selection.target.registry.registry_value_data,\
