    \nrule okta_user_failed_number_challenge_during_push_notification {\n\n  meta:\n\
    \    author = \"Google Cloud Security\"\n    description = \"Detects when an Okta\
    \ user failed a number challenge during push notification.\"\n    rule_id = \"\
    mr_c5542a92-03d7-463a-bab8-ad10a6cd42f0\"\n    rule_name = \"Okta User Failed\
    \ Number Challenge During Push Notification\"\n    reference = \"https://support.okta.com/help/s/article/Number-Challenge-for-Okta-Verify\"\
    \n    mitre_attack_tactic = \"Credential Access\"\n    mitre_attack_technique\
    \ = \"Multi-Factor Authentication Request Generation\"\n    mitre_attack_url =\
    \ \"https://attack.mitre.org/techniques/T1621/\"\n    mitre_attack_version = \"\
    v13.1\"\n    type = \"Alert\"\n    data_source = \"Okta\"\n    severity = \"Medium\"\
    \n    priority = \"Medium\"\n\n  events:\n    $login.metadata.product_name = \"\
    Okta\"\n    $login.metadata.vendor_name = \"Okta\"\n    $login.metadata.event_type\
    \ = \"USER_LOGIN\"\n    $login.metadata.product_event_type = \"user.authentication.auth_via_mfa\"\
    \n    $login.security_result.detection_fields[\"pushWithNumberChallengeResponseType\"\
    ] = \"OV_WITH_CHALLENGE_RESPONSE_INVALID\"\n    $login.security_result.action\
    \ = \"BLOCK\"\n    $login.target.user.userid = $userid\n\n  match:\n    $userid\
    \ over 1h\n\n  outcome:\n    $risk_score = max(35)\n    $mitre_attack_tactic =\
    \ \"Credential Access\"\n    $mitre_attack_technique = \"Multi-Factor Authentication\
    \ Request Generation\"\n    $target_user_agent = array_distinct($login.network.http.user_agent)\n\
    \    $principal_ip = array_distinct($login.principal.ip)\n    $principal_ip_country\
    \ = array_distinct($login.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($login.principal.ip_geo_artifact.location.state)\n\
    \    $principal_ip_city = array_distinct($login.principal.location.city)\n   \
    \ $principal_user_email_addresses = array_distinct ($login.principal.user.email_addresses)\n\
    \    $security_result_summary = array_distinct($login.security_result.summary)\n\
    \    $target_user_email_addresses = array_distinct($login.target.user.email_addresses)\n\
    \    $target_user_userid = array_distinct($login.target.user.userid)\n\n  condition:\n\
    \    $login\n}"
