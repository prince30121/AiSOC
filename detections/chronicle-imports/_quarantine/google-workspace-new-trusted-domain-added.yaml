    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule google_workspace_new_trusted_domain_added {\n\n    meta:\n      author\
    \ = \"Google Cloud Security\"\n      description = \"Identifies when a domain\
    \ is added to the list of trusted domains in Google Workspace. An adversary may\
    \ attempt to manipulate sharing settings for trusted domains to gain unauthorized\
    \ access to sensitive files and folders within an organization.\"\n      rule_id\
    \ = \"mr_319d97c3-6f63-4a6c-9fab-e70cc3f03aaf\"\n      rule_name = \"Google Workspace\
    \ New Trusted Domain Added\"\n      mitre_attack_tactic = \"Defense Evasion\"\n\
    \      mitre_attack_technique = \"Impair Defenses: Disable or Modify Cloud Firewall\"\
    \n      mitre_attack_url = \"https://attack.mitre.org/techniques/T1562/007/\"\n\
    \      mitre_attack_version = \"v13.1\"\n      type = \"Alert\"\n      data_source\
    \ = \"Workspace Activity\"\n      severity = \"High\"\n      priority = \"High\"\
    \n\n    events:\n      $ws.metadata.vendor_name = \"Google Workspace\"\n     \
    \ $ws.metadata.product_name = \"admin\"\n      $ws.metadata.product_event_type\
    \ = \"ADD_TRUSTED_DOMAINS\"\n\n    outcome:\n      $risk_score = max(75)\n   \
    \   $mitre_attack_tactic = \"Defense Evasion\"\n      $mitre_attack_technique\
    \ = \"Impair Defenses: Disable or Modify Cloud Firewall\"\n      $mitre_attack_technique_id\
    \ = \"T1562.007\"\n      $event_count = count_distinct($ws.metadata.id)\n    \
    \  $principal_ip = array_distinct($ws.principal.ip)\n      $principal_country\
    \ = array_distinct($ws.principal.ip_geo_artifact.location.country_or_region)\n\
    \      $principal_state = array_distinct($ws.principal.ip_geo_artifact.location.state)\n\
    \      $principal_user_emails = array_distinct($ws.principal.user.email_addresses)\n\
    \      $principal_user_id = array_distinct($ws.principal.user.userid)\n      $target_domain\
    \ = $ws.target.domain.name\n\n\n    condition:\n      $ws\n  }"
  chronicle_rule_name: google_workspace_new_trusted_domain_added
