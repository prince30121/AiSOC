    \n    product = \"windows\"\n    mitre = \"execution, t1056, t1082\"\n\n  events:\n\
    ((re.regex($selection.target.process.file.full_path, `.*\\\\wscript\\.exe`) and\
    \ (re.regex($selection.target.process.command_line, `.* C:\\\\Users\\\\.*\\.vbs\
    \ .*`) or re.regex($selection.target.process.command_line, `.* C:\\\\Users\\\\\
    admin\\\\AppData\\\\.*\\.vbs .*`) or re.regex($selection.target.process.command_line,\
    \ `.* C:\\\\Users\\\\admin\\\\AppData\\\\OneDrive\\.vbs .*`)) and ($selection.metadata.product_event_type\
    \ = \"4688\" or $selection.metadata.product_event_type = \"1\")) and not (re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\winrar.*`)))\n\n  condition:\n    $selection\n}"
