detection:
  chronicle_yaral: "rule office_macro_starts_cmd {\n meta:\n    author = \"Florian\
    \ Roth\"\n    description = \"Detects a Windows command line executable started\
    \ from Microsoft Word or Excel  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/G1MCKmrJFFAl\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n\n  events:\n($selection.metadata.product_event_type = \"1\" and\
    \ (re.regex($selection.principal.process.file.full_path, `.*\\\\WINWORD\\.EXE`)\
    \ or re.regex($selection.principal.process.file.full_path, `.*\\\\EXCEL\\.EXE`))\
    \ and re.regex($selection.target.process.file.full_path, `.*\\\\cmd\\.exe`))\n\
    \n  condition:\n    $selection\n}"
  chronicle_rule_name: office_macro_starts_cmd
