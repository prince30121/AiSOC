detection:
  chronicle_yaral: "rule detect_cmdexe_obfuscation {\n meta:\n    author = \"Joseph\
    \ Kamau\"\n    description = \"This rule detects when cmd.exe has been obfuscated\
    \ this could indicate possible malicious activity, tools like cobalt strike and\
    \ metasploit also use the environment variable COMSPEC.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/tJrqTgxJlPrb\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"Windows\"\n    mitre\
    \ = \"defense_evasion, t1027\"\n\n  events:\n((re.regex($selection_commandline.target.process.command_line,\
    \ `%COMSPEC:.*`) or re.regex($selection_commandline.target.process.command_line,\
    \ `%comspec:.*`) or re.regex($selection_commandline.target.process.command_line,\
    \ `.* %comspec:.*`) or re.regex($selection_commandline.target.process.command_line,\
    \ `%COMSPEC%.*`) or re.regex($selection_commandline.target.process.command_line,\
    \ ` .*%COMSPEC%.*`) or re.regex($selection_commandline.target.process.command_line,\
    \ `%COMSPEC%.*`) or re.regex($selection_commandline.target.process.command_line,\
    \ `%COMSPEC:.*`) or re.regex($selection_commandline.target.process.command_line,\
    \ `%comspec:.*`) or re.regex($selection_commandline.target.process.command_line,\
    \ `%Co^m^S^p^Ec^%.*`) or re.regex($selection_commandline.target.process.command_line,\
    \ `.* %Co^m^S^p^Ec^%.*`)) or (re.regex($selection_commandline.target.process.command_line,\
    \ `%Co^m^S^p^Ec^%.*`) or re.regex($selection_commandline.target.process.command_line,\
    \ `%COMSPEC:.*`) or re.regex($selection_commandline.target.process.command_line,\
    \ `%comspec:.*`) or re.regex($selection_commandline.target.process.command_line,\
    \ `%COMSPEC%.*`)))\n\n  condition:\n    $selection_commandline\n}"
  chronicle_rule_name: detect_cmdexe_obfuscation
