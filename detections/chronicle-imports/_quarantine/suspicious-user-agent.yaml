detection:
  chronicle_yaral: "rule suspicious_user_agent {\n meta:\n    author = \"Florian Roth\"\
    \n    description = \"Detects suspicious malformed user agent strings in proxy\
    \ logs  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/7VITpjdzQOEH\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"proxy\"\n\n  events:\n\
    (($selection.principal.application = \"user-agent\" or re.regex($selection.principal.application,\
    \ `.* \\(compatible;MSIE .*`) or re.regex($selection.principal.application, `.*\\\
    .0;Windows NT .*`) or re.regex($selection.principal.application, `Mozilla/3\\\
    .0 .*`) or re.regex($selection.principal.application, `Mozilla/2\\.0 .*`) or re.regex($selection.principal.application,\
    \ `Mozilla/1\\.0 .*`) or re.regex($selection.principal.application, `Mozilla .*`)\
    \ or re.regex($selection.principal.application, ` Mozilla/.*`) or re.regex($selection.principal.application,\
    \ `Mozila/.*`) or $selection.principal.application = \"_\" or $selection.principal.application\
    \ = \"CertUtil URL Agent\" or $selection.principal.application = \"Mozilla/5.0\
    \ (Windows NT 10.0; Win64; x64; rv:60.0)\" or $selection.principal.application\
    \ = \"Mozilla/5.0 (Windows NT 6.3; WOW64; rv:28.0) Gecko/20100101 Firefox/28.0\"\
    ) and not (re.regex($selection.principal.application, `Mozilla/3\\.0 .* Acrobat\
    \ .*`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: suspicious_user_agent
