    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule suspicious_asn {\n\n  meta:\n    author = \"Google Cloud Security\"\n \
    \   description = \"Identify network traffic based on a specific ASN\"\n    rule_id\
    \ = \"mr_da77bdeb-38fc-43c8-8be4-b6c6baa8e92a\"\n    rule_name = \"Suspicious\
    \ ASN\"\n    type = \"alert\"\n    tags = \"geoip enrichment\"\n    data_source\
    \ = \"microsoft windows events\"\n    severity = \"Low\"\n    priority = \"Low\"\
    \n\n  events:\n    $network.metadata.event_type = \"NETWORK_CONNECTION\"\n   \
    \ //Specify an autonomoous system number to monitor or add additional ASNs using\
    \ an or statement\n    $network.target.ip_geo_artifact.network.asn = \"12741\"\
    \n    $network.target.ip = $ip\n\n  match:\n    $ip over 30m\n\n  outcome:\n \
    \   $risk_score = max(35)\n    $event_count = count_distinct($network.metadata.id)\n\
    \    // added to populate alert graph with additional context\n    $principal_ip\
    \ = array_distinct($network.principal.ip)\n    // Commented out target.ip because\
    \ it is already represented in graph as match variable. If match changes, can\
    \ uncomment to add to results\n    //$target_ip = array_distinct($network.target.ip)\n\
    \    $principal_process_pid = array_distinct($network.principal.process.pid)\n\
    \    $principal_process_command_line = array_distinct($network.principal.process.command_line)\n\
    \    $principal_process_file_sha256 = array_distinct($network.principal.process.file.sha256)\n\
    \    $principal_process_file_full_path = array_distinct($network.principal.process.file.full_path)\n\
    \    $principal_process_product_specific_process_id = array_distinct($network.principal.process.product_specific_process_id)\n\
    \    $principal_process_parent_process_product_specific_process_id = array_distinct($network.principal.process.parent_process.product_specific_process_id)\n\
    \    $target_process_pid = array_distinct($network.target.process.pid)\n    $target_process_command_line\
    \ = array_distinct($network.target.process.command_line)\n    $target_process_file_sha256\
    \ = array_distinct($network.target.process.file.sha256)\n    $target_process_file_full_path\
    \ = array_distinct($network.target.process.file.full_path)\n    $target_process_product_specific_process_id\
    \ = array_distinct($network.target.process.product_specific_process_id)\n    $target_process_parent_process_product_specific_process_id\
    \ = array_distinct($network.target.process.parent_process.product_specific_process_id)\n\
    \    $principal_user_userid = array_distinct($network.principal.user.userid)\n\
    \    $target_user_userid = array_distinct($network.target.user.userid)\n\n  condition:\n\
    \    $network\n}"
  chronicle_rule_name: suspicious_asn
