detection:
  chronicle_yaral: "rule possible_shim_database_persistence_via_sdbinstexe {\n meta:\n\
    \    author = \"Markus Neis, Den Iuzvyk\"\n    description = \"Detects installation\
    \ of a new shim using sdbinst.exe. A shim can be used to load malicious DLLs into\
    \ applications.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/BUTmMgSdr90c\"\n    version\
    \ = \"0.01\"\n    created = \"2019/01/16\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"persistence, t1138\"\n\n  events:\n\
    (re.regex($selection.target.process.file.full_path, `.*\\\\sdbinst\\.exe`) and\
    \ ($selection.target.process.command_line = \"-q\" or $selection.target.process.command_line\
    \ = \"-p\") and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: possible_shim_database_persistence_via_sdbinstexe
