    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule sap_hanadb_user_admin_actions {\n\n  meta:\n    author = \"Google Cloud\
    \ Security\"\n    description = \"Detects administrative user management (Create/Alter/Drop)\
    \ and schema deletion within SAP HANA DB.\"\n    severity = \"Medium\"\n    tactic\
    \ = \"TA0003\"\n    technique = \"T1136\"\n\n  events:\n    $e.metadata.log_type\
    \ = \"SAP_HANA_AUDIT\"\n\n    $statement = $e.additional.fields[\"executed_statement\"\
    ]\n\n    (\n        $statement = /CREATE USER/ nocase or\n        $statement =\
    \ /ALTER USER/ nocase or\n        $statement = /DROP USER/ nocase or\n       \
    \ $statement = /DROP SCHEMA/ nocase\n    )\n\n    $user = $e.principal.user.userid\n\
    \n  match:\n    $user over 30m\n\n  outcome:\n    $risk_score = max(70)\n    $principal_user\
    \ = array_distinct($user)\n    $target_user = array_distinct($e.target.user.userid)\n\
    \    $executed_statements = array_distinct($statement)\n    $system_id = array_distinct($e.target.resource.attribute.labels[\"\
    system_id\"])\n    $db_name = array_distinct($e.target.resource.name)\n\n  condition:\n\
    \    $e\n}"
  chronicle_rule_name: sap_hanadb_user_admin_actions
