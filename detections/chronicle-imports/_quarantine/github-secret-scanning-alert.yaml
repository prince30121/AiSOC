id: chronicle-detection-rules-github-secret-scanning-alert
name: github_secret_scanning_alert
description: github_secret_scanning_alert
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "/*\n * Copyright 2024 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule github_secret_scanning_alert {\n\n  meta:\n    author = \"Google Cloud\
    \ Security\"\n    description = \"Detects when a secret is found in a GitHub repository.\
    \ Adversaries may attempt to harvest leaked/exposed secrets to further infiltrate\
    \ their target's environment, maintain access, or steal data.\"\n    rule_id =\
    \ \"mr_7cd99259-68ef-4b09-96a5-3130f44664b5\"\n    rule_name = \"GitHub Secret\
    \ Scanning Alert\"\n    assumption = \"Your GitHub enterprise audit log settings\
    \ are configured to log the source IP address for events. Reference: https://docs.github.com/en/organizations/keeping-your-organization-secure/managing-security-settings-for-your-organization/displaying-ip-addresses-in-the-audit-log-for-your-organization\"\
    \n    type = \"alert\"\n    severity = \"High\"\n    priority = \"High\"\n   \
    \ platform = \"GitHub\"\n    data_source = \"github\"\n    mitre_attack_tactic\
    \ = \"Credential Access\"\n    mitre_attack_technique = \"Unsecured Credentials\"\
    \n    mitre_attack_url = \"https://attack.mitre.org/versions/v14/techniques/T1552/\"\
    \n    mitre_attack_version = \"v14\"\n    reference = \"https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/audit-log-events-for-your-enterprise\"\
    \n\n  events:\n    $github.metadata.vendor_name = \"GITHUB\" nocase\n    $github.metadata.product_name\
    \ = \"GITHUB\"\n    $github.metadata.product_event_type = \"secret_scanning_alert.create\"\
    \n\n  outcome:\n    $risk_score = max(85)\n    $mitre_attack_tactic = \"Credential\
    \ Access\"\n    $mitre_attack_technique = \"Unsecured Credentials\"\n    $mitre_attack_technique_id\
    \ = \"T1552\"\n    $principal_ip = array_distinct($github.principal.ip)\n    $principal_user_userid\
    \ = array_distinct($github.principal.user.userid)\n    $principal_ip_country =\
    \ array_distinct($github.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($github.principal.ip_geo_artifact.location.state)\n\
    \    $principal_ip_city = array_distinct($github.principal.location.city)\n  \
    \  $security_result_summary = array_distinct($github.security_result.summary)\n\
    \n  condition:\n    $github\n}"
  chronicle_rule_name: github_secret_scanning_alert
