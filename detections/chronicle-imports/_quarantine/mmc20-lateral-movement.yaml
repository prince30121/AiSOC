logsource:
  product: chronicle
detection:
  chronicle_yaral: "rule mmc20_lateral_movement {\n meta:\n    author = \"@2xxeformyshirt\
    \ (Security Risk Advisors)\"\n    description = \"Detects MMC20.Application Lateral\
    \ Movement; specifically looks for the spawning of the parent MMC.exe with a command\
    \ line of \\\"-Embedding\\\" as a child of svchost.exe  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/k6oB87Gh50fB\"\n    version\
    \ = \"0.01\"\n    created = \"2020/03/04\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, t1175\"\n\n  events:\n(re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\svchost\\.exe`) and re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\mmc\\.exe`) and re.regex($selection.target.process.command_line, `.*-Embedding.*`)\
    \ and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: mmc20_lateral_movement
