    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule sap_function_module_testing_detected {\n\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Detects direct execution and testing of\
    \ SAP Function Modules via SE37 test frame. This identifies correlation between\
    \ a transaction start (AU7) and a function module call (BU4) in close succession\"\
    \n    severity = \"Medium\"\n    tactic = \"TA0002\"\n    technique = \"T1129\"\
    \n\n  events:\n    $e.security_result.detection_fields[\"slgtc_1\"] = /^SE37$|^SE80$|^SEU_INT$/\n\
    \    $e.principal.process.file.names = \"RS_TESTFRAME_CALL\"\n\n    $user = $e.principal.user.userid\n\
    \n  match:\n    $user over 1h\n\n  outcome:\n    $resource_accessed = array_distinct($e.additional.fields[\"\
    param1_1\"])\n    $event_name = array_distinct($e.security_result.summary)\n \
    \   $description = array_distinct($e.metadata.description)\n    $msg = array_distinct($e.additional.fields[\"\
    msg_1\"])\n    $src_ip = array_distinct($e.principal.ip)\n\n  condition:\n   \
    \ $e\n}"
  chronicle_rule_name: sap_function_module_testing_detected
provenance:
