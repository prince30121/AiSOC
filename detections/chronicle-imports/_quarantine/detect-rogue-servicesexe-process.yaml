severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "rule detect_rogue_servicesexe_process {\n meta:\n    author =\
    \ \"Joseph Kamau\"\n    description = \"This rule detects an anomaly whereby services.exe\
    \ is not a child process of wininit.exe this could be indicative of a rogue services.exe\
    \ process.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/o0fZpHsb5w5B\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"process_creation\"\n    mitre = \"defense_evasion, t1036\"\n\n  events:\n\
    (re.regex($selection.target.process.file.full_path, `.*\\\\services\\.exe`) and\
    \ not ($selection.principal.process.file.full_path = \"C:\\\\Windows\\\\System32\\\
    \\wininit.exe\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: detect_rogue_servicesexe_process
