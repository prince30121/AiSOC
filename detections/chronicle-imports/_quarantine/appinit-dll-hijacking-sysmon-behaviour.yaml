detection:
  chronicle_yaral: "rule appinit_dll_hijacking_sysmon_behaviour {\n meta:\n    author\
    \ = \"Emir Erdogan\"\n    description = \"it can be used the AppInit_DLL functionality\
    \ to achieve persistence by ensuring that every user mode process that is spawned\
    \ will load its malicious DLL  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/DwmH4mVgWexR\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"T1103, T1055\"\n\n  events:\n($selection.principal.process.file.full_path\
    \ = \"C:\\\\Windows\\\\System32\\\\cmd.exe\" and $selection.target.process.file.full_path\
    \ = \"C:\\\\Windows\\\\System32\\\\reg.exe\" and (re.regex($selection.target.process.command_line,\
    \ `.*HKLM\\\\Software\\\\Microsoft\\\\Windows NT\\\\CurrentVersion\\\\Windows\\\
    \\LoadAppInit_DLLs.*`) or re.regex($selection.target.process.command_line, `.*HKEY_LOCAL_MACHINE\\\
    \\Software\\\\Wow6432Node\\\\Microsoft\\\\Windows NT\\\\CurrentVersion\\\\Windows\\\
    \\LoadAppInit_DLLs.*`) or re.regex($selection.target.process.command_line, `.*HKEY_LOCAL_MACHINE\\\
    \\Software\\\\Microsoft\\\\Windows NT\\\\CurrentVersion\\\\WindowsAppInit_DLLs.*`)\
    \ or re.regex($selection.target.process.command_line, `.*HKEY_LOCAL_MACHINE\\\\\
    Software\\\\Wow6432Node\\\\Microsoft\\\\Windows NT\\\\CurrentVersion\\\\Windows\\\
    \\AppInit_DLLs.*`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: appinit_dll_hijacking_sysmon_behaviour
