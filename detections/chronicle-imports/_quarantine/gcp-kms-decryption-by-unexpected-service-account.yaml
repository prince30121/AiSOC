  chronicle_yaral: "/*\n * Copyright 2025 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by law or agreed to in writing, software\n * distributed under the License is\
    \ distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS OF ANY\
    \ KIND, either express or implied.\n * See the License for the specific language\
    \ governing permissions and\n * limitations under the License.\n */\n\nrule gcp_kms_decryption_by_unexpected_service_account\
    \ {\n  meta:\n    author = \"Drew Pilarski - Tempus AI\"\n    description = \"\
    Detects when a Key Management Service (KMS) decryption operation is carried out\
    \ by a service account that's not in the allowlist. This behavior may indicate\
    \ unauthorized access to information.\"\n    rule_id = \"mr_90cd5b0d-60a7-4028-bc41-dce0947fbafd\"\
    \n    rule_name = \"Unauthorized KMS Decryption\"\n    reference = \"Internal\
    \ Security Policy\" // Include link to your organization's internal documentation\
    \ if available\n    mitre_attack_tactic = \"Persistence\"\n    mitre_attack_technique\
    \ = \"Valid Accounts: Cloud Accounts\"\n    type = \"Alert\"\n    platform = \"\
    GCP\"\n    data_source = \"Cloud Audit Logs\"\n    severity = \"Medium\"  // Adjust\
    \ based on your risk assessment\n    priority = \"Medium\"  // Adjust based on\
    \ your incident response process\n\n  events:\n    $decrypt.metadata.product_name\
    \ = \"Google Cloud Platform\"\n    $decrypt.metadata.vendor_name = \"Google Cloud\
    \ Platform\"\n\n    // Generic KMS Key Pattern - Pick the relevant one to your\
    \ environment\n    re.regex($decrypt.target.resource.name, `^projects/[^/]+/locations/[^/]+/keyRings/[^/]+/cryptoKeys/[^/]+$`)\n\
    \    $decrypt.metadata.product_event_type = \"Decrypt\"\n    not $decrypt.principal.user.email_addresses\
    \ in %kms_decryption_service_account_allowlist\n\n  outcome:\n    $action = $decrypt.metadata.product_event_type\n\
    \    $account_name = array_distinct($decrypt.principal.user.email_addresses)\n\
    \    $mitre_attack_tactic = array_distinct(\"Persistence\")\n    $mitre_attack_technique\
    \ = array_distinct(\"Valid Accounts: Cloud Accounts\")\n    $mitre_attack_technique_id\
    \ = array_distinct(\"T1078.004\")\n\n  condition:\n    $decrypt\n}"
  chronicle_rule_name: gcp_kms_decryption_by_unexpected_service_account
