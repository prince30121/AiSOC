detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule aws_guardduty_penetration_testing_activity_detected {\n\n  meta:\n    author\
    \ = \"Google Cloud Security\"\n    description = \"Amazon GuardDuty detects penetration\
    \ testing activity from known offensive security distros such as KaliLinux, ParrotLinux\
    \ or PentooLinux.\"\n    rule_id = \"mr_7dac6e7c-9d35-4093-9b85-4b0175e8bee7\"\
    \n    rule_name = \"AWS GuardDuty Penetration Testing Activity Detected\"\n  \
    \  mitre_attack_tactic = \"Resource Development\"\n    mitre_attack_technique\
    \ = \"Obtain Capabilities\"\n    mitre_attack_url = \"https://attack.mitre.org/techniques/T1588/\"\
    \n    mitre_attack_version = \"v13.1\"\n    type = \"Alert\"\n    data_source\
    \ = \"AWS GuardDuty\"\n    platform = \"AWS\"\n    severity = \"High\"\n    priority\
    \ = \"High\"\n\n  events:\n    $guardduty.metadata.vendor_name = \"AMAZON\"\n\
    \    $guardduty.metadata.product_name = \"AWS GuardDuty\"\n    $guardduty.metadata.product_event_type\
    \ = /PenTest/\n    //Filter out sample findings\n    $guardduty.security_result.about.labels[\"\
    Sample\"] != \"true\"\n\n  outcome:\n    $risk_score = max(35)\n    $mitre_attack_tactic\
    \ = \"Resource Development\"\n    $mitre_attack_technique = \"Obtain Capabilities\"\
    \n    $mitre_attack_technique_id = \"T1588\"\n    $event_count = count_distinct($guardduty.metadata.id)\n\
    \    $principal_ip = array_distinct($guardduty.principal.ip)\n    $principal_ip_country\
    \ = array_distinct($guardduty.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($guardduty.principal.ip_geo_artifact.location.state)\n\
    \    $principal_user_display_name = $guardduty.principal.user.user_display_name\n\
    \    $aws_region = $guardduty.target.location.name\n    $target_resource_name\
    \ = $guardduty.target.resource.name\n    $target_resource_product_object_id =\
    \ $guardduty.target.resource.product_object_id\n    $security_result_summary =\
    \ array_distinct($guardduty.security_result.summary)\n    $security_result_description\
    \ = array_distinct($guardduty.security_result.description)\n    $security_result_severity\
    \ = array_distinct($guardduty.security_result.severity)\n    $security_result_severity_details\
    \ = array_distinct($guardduty.security_result.severity_details)\n    $metadata_product_event_type\
    \ = array_distinct($guardduty.metadata.product_event_type)\n\n  condition:\n \
    \   $guardduty\n}"
  chronicle_rule_name: aws_guardduty_penetration_testing_activity_detected
