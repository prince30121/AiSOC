    \nrule suspicious_access_to_windows_setup_files\n{\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Reading artifacts from Windows setup -\
    \ commonly used to profile a system by malware\"\n    reference = \"https://blogs.technet.microsoft.com/tip_of_the_day/2018/05/02/tip-of-the-day-the-panther-folder-mystery/\"\
    \n    yara_version = \"YL2.0\"\n    rule_version = \"1.0\"\n\n  events:\n    $e1.metadata.event_type\
    \ = \"FILE_READ\"\n    re.regex($e1.target.file.full_path, `\\\\Windows\\\\Panther\\\
    \\`) nocase\n\n  condition:\n    $e1\n}"
