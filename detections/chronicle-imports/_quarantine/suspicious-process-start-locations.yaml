detection:
  chronicle_yaral: "rule suspicious_process_start_locations {\n meta:\n    author\
    \ = \"juju4\"\n    description = \"Detects suspicious process run from unusual\
    \ locations  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/n8xWUUuUJ3Ev\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"defense_evasion, t1036, car.2013-05-002\"\
    \n\n  events:\n((re.regex($selection.target.process.file.full_path, `.*:\\\\RECYCLER\\\
    \\.*`) or re.regex($selection.target.process.file.full_path, `.*:\\\\SystemVolumeInformation\\\
    \\.*`) or re.regex($selection.target.process.file.full_path, `C:\\\\\\\\Windows\\\
    \\\\\\Tasks\\\\.*`) or re.regex($selection.target.process.file.full_path, `C:\\\
    \\\\\\Windows\\\\\\\\debug\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\\\\\Windows\\\\\\\\fonts\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\\\\\Windows\\\\\\\\help\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\\\\\Windows\\\\\\\\drivers\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\\\\\Windows\\\\\\\\addins\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\\\\\Windows\\\\\\\\cursors\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\\\\\Windows\\\\\\\\system32\\\\tasks\\\\.*`)) and ($selection.metadata.product_event_type\
    \ = \"4688\" or $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: suspicious_process_start_locations
