    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule o365_group_creation_failure {\n\n  meta:\n    author = \"Google Cloud Security\"\
    \n    description = \"Detects when a group is attempted to be created but fails\
    \ in Office 365. This could be due to insufficient permissions or other errors\"\
    \n    rule_id = \"mr_964c36cd-cf07-446d-bc85-68a937d4441a\"\n    rule_name = \"\
    Hunt for Office 365 group creation failures\"\n    type = \"hunt\"\n    platform\
    \ = \"azure\"\n    data_source = \"o365\"\n    severity = \"Low\"\n    priority\
    \ = \"Low\"\n\n  events:\n    $group.metadata.event_type = \"GROUP_CREATION\"\n\
    \    $group.metadata.product_event_type = \"Add group.\"\n    $group.metadata.product_name\
    \ = \"Office 365\"\n    $group.metadata.vendor_name = \"Microsoft\"\n    $group.security_result.action\
    \ = \"BLOCK\"\n    $group.principal.user.userid = $user\n\n  match:\n    $user\
    \ over 5m\n\n  outcome:\n    $risk_score = 35\n    $event_count = count_distinct($group.metadata.id)\n\
    \    $security_summary = array_distinct($group.security_result.summary)\n    $user_agent\
    \ = array_distinct($group.network.http.user_agent)\n    $target_application =\
    \ array_distinct($group.target.application)\n    //$principal_user_userid = array_distinct($group.principal.user.userid)\n\
    \    $proposed_group_name = array_distinct($group.target.group.group_display_name)\n\
    \    $reason = array_distinct($group.target.labels[\"MethodExecutionResult.\"\
    ])\n\n  condition:\n    $group\n}"
  chronicle_rule_name: o365_group_creation_failure
