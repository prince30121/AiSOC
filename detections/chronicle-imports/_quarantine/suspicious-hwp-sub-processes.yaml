detection:
  chronicle_yaral: "rule suspicious_hwp_sub_processes {\n meta:\n    author = \"Florian\
    \ Roth\"\n    description = \"Detects suspicious Hangul Word Processor (Hanword)\
    \ sub processes that could indicate an exploitation  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/llsLDpuL96E6\"\n    version\
    \ = \"0.01\"\n    created = \"2019/10/24\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, defense_evasion, initial_access,\
    \ t1059, t1202, t1193, g0032\"\n\n  events:\n(re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\Hwp\\.exe`) and re.regex($selection.target.process.file.full_path, `.*\\\
    \\gbb\\.exe`) and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: suspicious_hwp_sub_processes
