id: chronicle-detection-rules-github-repository-deploy-key-created-or-modified
name: github_repository_deploy_key_created_or_modified
description: github_repository_deploy_key_created_or_modified
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
