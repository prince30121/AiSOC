detection:
  chronicle_yaral: "rule fireeye_red_team_tool__modified_impacket_smbexec_via_cmdline\
    \ {\n meta:\n    author = \"SOC Prime Team, FireEye\"\n    description = \"This\
    \ rule has been ported from Fireeye's HXIOC format to SIGMA. It detects a modified\
    \ implmentation of SMBEXEC by FireEye.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/s9SkiVROFfIJ\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"lateral_movement, execution, t1021.002,\
    \ t1543.003, t1036.004\"\n\n  events:\n((re.regex($selection1.principal.process.file.full_path,\
    \ `.*services\\.exe`) and re.regex($selection1.target.process.file.full_path,\
    \ `.*cmd\\.exe`) and re.regex($selection1.target.process.command_line, `.*/q /K\
    \ echo.*`) and re.regex($selection1.target.process.command_line, `.*2>1.*`) and\
    \ re.regex($selection1.target.process.command_line, `.*& del .*`) and ($selection1.metadata.product_event_type\
    \ = \"4688\" or $selection1.metadata.product_event_type = \"1\")) and (re.regex($selection1.target.process.command_line,\
    \ `.*setupapi\\.dev\\.log.*`) or re.regex($selection1.target.process.command_line,\
    \ `.*install\\.bat.*`)))\n\n  condition:\n    $selection1\n}"
  chronicle_rule_name: fireeye_red_team_tool__modified_impacket_smbexec_via_cmdline
