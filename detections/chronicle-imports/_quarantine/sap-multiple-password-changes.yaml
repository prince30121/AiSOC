    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule sap_multiple_password_changes {\n\n  meta:\n    author = \"Google Cloud\
    \ Security\"\n    description = \"Detects multiple password changes (BU2) by a\
    \ single actor or targeting a single user across systems.\"\n    severity = \"\
    Medium\"\n    tactic = \"TA0004\"\n    technique = \"T1098\"\n\n  events:\n  \
    \  $e.metadata.product_name = \"SAP security audit\"\n\n    $e.additional.fields[\"\
    msg_1\"] = \"BU2\"\n\n    $source_user = $e.principal.user.userid\n    $target_user\
    \ = $e.additional.fields[\"param2_1\"]\n    $client = $e.target.resource.attribute.labels[\"\
    slgmand_1\"]\n\n  match:\n    $source_user over 3h\n\n  outcome:\n    $total_changes\
    \ = count($e.metadata.product_log_id)\n    $distinct_targets = count_distinct($target_user)\n\
    \    $distinct_clients = count_distinct($client)\n    $admin_email = array_distinct($e.principal.user.email_addresses)\n\
    \    $target_users = array_distinct($target_user)\n    $terminal_ips = array_distinct($e.principal.ip)\n\
    \n  condition:\n    #e >= 3 or #target_user >= 3\n}"
  chronicle_rule_name: sap_multiple_password_changes
