id: chronicle-detection-rules-suspicious-program-location-with-network-connections
name: suspicious_program_location_with_network_connections
description: suspicious_program_location_with_network_connections
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "rule suspicious_program_location_with_network_connections {\n\
    \ meta:\n    author = \"Florian Roth\"\n    description = \"Detects programs with\
    \ network connections running in suspicious files system locations  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/V8bXzAfIswMu\"\n    version\
    \ = \"0.01\"\n    created = \"2017/03/19\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n\n  events:\n($selection.metadata.product_event_type = \"3\" and\
    \ (re.regex($selection.target.process.file.full_path, `.*\\\\$Recycle\\.bin`)\
    \ or re.regex($selection.target.process.file.full_path, `.*\\\\Users\\\\All Users\\\
    \\.*`) or re.regex($selection.target.process.file.full_path, `.*\\\\Users\\\\\
    Default\\\\.*`) or re.regex($selection.target.process.file.full_path, `.*\\\\\
    Users\\\\Public\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\Perflogs\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\config\\\\systemprofile\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\Windows\\\\Fonts\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\Windows\\\\IME\\\\.*`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\Windows\\\\addins\\\\.*`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: suspicious_program_location_with_network_connections
