detection:
  chronicle_yaral: "rule scheduled_task_creation {\n meta:\n    author = \"Florian\
    \ Roth\"\n    description = \"Detects the creation of scheduled tasks in user\
    \ session  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/6zEBdnZizrDb\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, persistence, privilege_escalation,\
    \ t1053, s0111\"\n\n  events:\n((re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\schtasks\\.exe`) and re.regex($selection.target.process.command_line,\
    \ `.* /create .*`) and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\")) and not ($selection.principal.user.user_display_name = \"NT AUTHORITY\\\
    \\SYSTEM\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: scheduled_task_creation
