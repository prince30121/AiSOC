detection:
  chronicle_yaral: "rule cmdkey_cached_credentials_recon {\n meta:\n    author = \"\
    jmallette\"\n    description = \"Detects usage of cmdkey to look for cached credentials\
    \  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/ooypBwJEkaPE\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"credential_access, t1003\"\n\n  events:\n\
    (re.regex($selection.target.process.file.full_path, `.*\\\\cmdkey\\.exe`) and\
    \ re.regex($selection.target.process.command_line, `.* /list .*`) and ($selection.metadata.product_event_type\
    \ = \"4688\" or $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: cmdkey_cached_credentials_recon
