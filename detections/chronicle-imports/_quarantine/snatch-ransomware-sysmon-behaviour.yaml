detection:
  chronicle_yaral: "rule snatch_ransomware_sysmon_behaviour {\n meta:\n    author\
    \ = \"Emir Erdogan\"\n    description = \"Snatch ransomware reboots PCs into Safe\
    \ Mode to bypass protection  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/sG12jPLP3NJF\"\n    version\
    \ = \"0.01\"\n    created = \"2019/12/10\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"T1486, T1022, T1313\"\n\n  events:\n(($selection1.target.process.command_line\
    \ = \"net stop SuperBackupMan\" or $selection1.target.process.command_line = \"\
    vssadmin delete shadows /all /quiet\" or $selection1.target.process.command_line\
    \ = \"sc  start SuperBackupMan\" or $selection1.target.process.command_line =\
    \ \"bcdedit.exe /set {current} safeboot minimal\" or $selection1.target.process.command_line\
    \ = \"shutdown /r /f /t 00\") or ($selection1.metadata.product_event_type = \"\
    11\" and (re.regex($selection1.target.file.full_path, `.*\\.snatch.*`) or re.regex($selection1.target.file.full_path,\
    \ `.*\\.jimm.*`) or re.regex($selection1.target.file.full_path, `.*\\.googl.*`)\
    \ or re.regex($selection1.target.file.full_path, `.*\\.dglnl.*`) or re.regex($selection1.target.file.full_path,\
    \ `.*\\.ohwqg.*`) or re.regex($selection1.target.file.full_path, `.*\\.wvtr0.*`)\
    \ or re.regex($selection1.target.file.full_path, `.*\\.hceem.*`))))\n\n  condition:\n\
    \    $selection1\n}"
  chronicle_rule_name: snatch_ransomware_sysmon_behaviour
