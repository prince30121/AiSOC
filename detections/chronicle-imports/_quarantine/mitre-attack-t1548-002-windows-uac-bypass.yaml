    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule mitre_attack_T1548_002_windows_uac_bypass\n{\n  meta:\n    author = \"\
    Google Cloud Security\"\n    description = \"Net use commands for SMB/Windows\
    \ admin shares\"\n    reference = \"https://attack.mitre.org/techniques/T1021/002/\"\
    \n    yara_version = \"YL2.0\"\n    rule_version = \"1.0\"\n\n  events:\n    (\n\
    \      $e1.metadata.event_type = \"PROCESS_LAUNCH\" and\n      re.regex($e1.principal.process.command_line,\
    \ `reg\\.exe add hkcu\\\\software\\\\classes\\\\mscfile\\\\shell\\\\open\\\\command\
    \ /ve /d.* /f`) nocase\n    )\n    or\n    (\n      re.regex($e1.principal.process.command_line,\
    \ `powershell.exe`) nocase and\n      re.regex($e1.target.registry.registry_key,\
    \ `\\\\software\\\\classes\\\\mscfile\\\\shell\\\\open\\\\command`) nocase\n \
    \   )\n\n  condition:\n    $e1\n}"
  chronicle_rule_name: mitre_attack_T1548_002_windows_uac_bypass
