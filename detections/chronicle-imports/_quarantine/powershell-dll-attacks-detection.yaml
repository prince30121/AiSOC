id: chronicle-detection-rules-powershell-dll-attacks-detection
name: powershell_dll_attacks_detection
description: powershell_dll_attacks_detection
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "rule powershell_dll_attacks_detection {\n meta:\n    author =\
    \ \"Furkan Celik\"\n    description = \"Powershell does not equal powershell.exe.\
    \ Adversaries may use powershell dlls to perform their malicious powershell activities.\
    \ ou can detect and monitor binaries that use Powershell dlls.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/Lodp4fCSb8o9\"\n    version\
    \ = \"0.01\"\n    created = \"2020/04/24\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"execution, T1086\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"7\" and (re.regex($selection.target.process.file.full_path, `.*\\\\system\\\
    .reflection\\.dll`) or re.regex($selection.target.process.file.full_path, `.*\\\
    \\system\\.managment\\.automation\\.ni\\.dll`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\system\\.managment\\.automation\\.dll`)))\n\n  condition:\n    $selection\n\
    }"
  chronicle_rule_name: powershell_dll_attacks_detection
