detection:
  chronicle_yaral: "rule detection_of_winrs_usage {\n meta:\n    author = \"Sreeman\"\
    \n    description = \"Windows Remote Shell (WinRS) is a command line tool that\
    \ is part of Windows 2008 and later. If WinRM is enabled this utility can be used\
    \ to execute commands on a host remotely.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/anp657rEE5hG\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"lateral movement, execution, t1028\"\
    \n\n  events:\n(($selection.target.process.command_line = \"winrs -r\" or $selection.target.process.command_line\
    \ = \"winrs /r\") and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: detection_of_winrs_usage
