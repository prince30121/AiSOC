detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule aws_multi_factor_authentication_disabled {\n\n  meta:\n    author = \"\
    Google Cloud Security\"\n    description = \"Detects attempts to disable multi-factor\
    \ authentication for an AWS IAM user.\"\n    rule_id = \"mr_0d6bd993-c80b-4367-a921-5a542ab826b3\"\
    \n    rule_name = \"AWS MultiFactor Authentication Disabled\"\n    mitre_attack_tactic\
    \ = \"Credential Access, Defense Evasion, Persistence\"\n    mitre_attack_technique\
    \ = \"Modify Authentication Process: Multi-Factor Authentication\"\n    mitre_attack_url\
    \ = \"https://attack.mitre.org/techniques/T1556/006/\"\n    mitre_attack_version\
    \ = \"v13.1\"\n    type = \"Alert\"\n    data_source = \"AWS CloudTrail\"\n  \
    \  platform = \"AWS\"\n    severity = \"Medium\"\n    priority = \"Medium\"\n\n\
    \  events:\n    $cloudtrail.metadata.vendor_name = \"AMAZON\"\n    $cloudtrail.metadata.product_name\
    \ = \"AWS CloudTrail\"\n    (\n      $cloudtrail.metadata.product_event_type =\
    \ \"DeleteVirtualMFADevice\" or\n      $cloudtrail.metadata.product_event_type\
    \ = \"DeactivateMFADevice\"\n    )\n    $cloudtrail.security_result.action = \"\
    ALLOW\"\n    $cloudtrail.principal.user.user_display_name = $user_id\n\n  match:\n\
    \    $user_id over 1h\n\n  outcome:\n    $risk_score = max(\n        //Baseline\n\
    \        35 +\n        // High Risk for AWS Root User\n        if($cloudtrail.src.user.user_display_name\
    \ = \"AWS Root User\", 50)\n    )\n    $mitre_attack_tactic = \"Credential Access,\
    \ Defense Evasion, Persistence\"\n    $mitre_attack_technique = \"Modify Authentication\
    \ Process: Multi-Factor Authentication\"\n    $mitre_attack_technique_id = \"\
    T1556.006\"\n    $event_count = count_distinct($cloudtrail.metadata.id)\n    $network_http_user_agent\
    \ = array_distinct($cloudtrail.network.http.user_agent)\n    $principal_ip = array_distinct($cloudtrail.principal.ip)\n\
    \    $principal_ip_country = array_distinct($cloudtrail.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($cloudtrail.principal.ip_geo_artifact.location.state)\n\
    \    $principal_user_display_name = array_distinct($cloudtrail.principal.user.user_display_name)\n\
    \    $recipient_aws_account_id = array_distinct($cloudtrail.additional.fields[\"\
    recipientAccountId\"])\n    $aws_region = array_distinct($cloudtrail.principal.location.name)\n\
    \    $target_resource_name = array_distinct($cloudtrail.target.resource.name)\n\
    \    $target_resource_product_object_id = array_distinct($cloudtrail.target.resource.product_object_id)\n\
    \n  condition:\n    $cloudtrail\n}"
  chronicle_rule_name: aws_multi_factor_authentication_disabled
