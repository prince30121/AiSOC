id: chronicle-detection-rules-gcti-benign-binaries-contacts-tor-exit-node
name: gcti_benign_binaries_contacts_tor_exit_node
description: gcti_benign_binaries_contacts_tor_exit_node
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
