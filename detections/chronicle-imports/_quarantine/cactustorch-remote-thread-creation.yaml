detection:
  chronicle_yaral: "rule cactustorch_remote_thread_creation {\n meta:\n    author\
    \ = \"@SBousseaden (detection), Thomas Patzke (rule)\"\n    description = \"Detects\
    \ remote thread creation from CACTUSTORCH as described in references.  License:\
    \ https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\n\
    \    reference = \"https://tdm.socprime.com/tdm/info/fwqVBGQnSxxk\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"execution, t1055, t1064\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"8\" and (re.regex($selection.principal.process.file.full_path, `.*\\\\System32\\\
    \\cscript\\.exe`) or re.regex($selection.principal.process.file.full_path, `.*\\\
    \\System32\\\\wscript\\.exe`) or re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\System32\\\\mshta\\.exe`) or re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\winword\\.exe`) or re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\excel\\.exe`)) and re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\SysWOW64\\\\.*`) and $selection.principal.application = \"\")\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: cactustorch_remote_thread_creation
