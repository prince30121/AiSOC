detection:
  chronicle_yaral: "rule apt29_part_1 {\n meta:\n    author = \"Florian Roth\"\n \
    \   description = \"This method detects a suspicious powershell command line combination\
    \ as used by APT29 in a campaign against US think tanks  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/EID3KC4B5JxZ\"\n    version\
    \ = \"0.01\"\n    created = \"2018/12/04\"\n    product = \"windows\"\n    service\
    \ = \"security\"\n    mitre = \"Execution, t1086\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"4688\" and re.regex($selection.target.process.command_line, `.*-noni -ep\
    \ bypass $.*`))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: apt29_part_1
