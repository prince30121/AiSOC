    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule sap_gateway_acl_bypass_attempt {\n\n  meta:\n    author = \"Google Cloud\
    \ Security\"\n    description = \"Detects rejected connections by Gateway ACLs\
    \ (secinfo/reginfo), indicating an attempt to bypass network-layer security.\"\
    \n    severity = \"Low\"\n    tactic = \"TA0001\"\n    technique = \"T1190\"\n\
    \n  events:\n    $e.metadata.product_name = \"SAP_GATEWAY\"\n\n    $e.additional.fields[\"\
    event_action\"] = /secinfo|reginfo/ nocase\n\n    $e.security_result.action =\
    \ \"BLOCK\"\n\n    $source_ip = $e.principal.ip\n\n  match:\n    $source_ip over\
    \ 30m\n\n  outcome:\n    $risk_score = 5\n    $acl_type = array_distinct($e.additional.fields[\"\
    event_action\"])\n    $attempted_programs = array_distinct($e.target.process.file.full_path)\n\
    \    $error_details = array_distinct($e.security_result.description)\n    $user_context\
    \ = array_distinct($e.principal.user.userid)\n    $total_denials = count($e.metadata.product_log_id)\n\
    \n  condition:\n    $e\n}"
  chronicle_rule_name: sap_gateway_acl_bypass_attempt
