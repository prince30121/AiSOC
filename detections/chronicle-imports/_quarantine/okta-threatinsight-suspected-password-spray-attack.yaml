  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule okta_threatinsight_suspected_password_spray_attack {\n\n  meta:\n    author\
    \ = \"Google Cloud Security\"\n    description = \"Okta's ThreatInsight can identify\
    \ Password Spray attacks.\"\n    rule_id = \"mr_4d081db5-7ea3-4300-8e0f-d7c7fcc1f662\"\
    \n    rule_name = \"Okta ThreatInsight Suspected Password Spray Attack\"\n   \
    \ reference = \"https://help.okta.com/en-us/Content/Topics/Security/threat-insight/configure-threatinsight-system-log.htm\"\
    \n    mitre_attack_tactic = \"Credential Access\"\n    mitre_attack_technique\
    \ = \"Brute Force: Password Spraying\"\n    mitre_attack_url = \"https://attack.mitre.org/techniques/T1110/003/\"\
    \n    mitre_attack_version = \"v13.1\"\n    type = \"Alert\"\n    data_source\
    \ = \"Okta\"\n    severity = \"Medium\"\n    priority = \"Medium\"\n\n  events:\n\
    \    $login.metadata.product_name = \"Okta\"\n    $login.metadata.vendor_name\
    \ = \"Okta\"\n    $login.metadata.event_type = \"USER_UNCATEGORIZED\"\n    $login.metadata.product_event_type\
    \ = \"security.threat.detected\"\n    $login.security_result.category_details\
    \ = \"Password Spray\"\n\n  outcome:\n    $risk_score = max(\n        // Baseline\n\
    \        35 +\n        // If the IP Address is marked as suspicious IP address\
    \ by Okta ThreatInsight\n        if($login.security_result.detection_fields[\"\
    threatSuspected\"] = \"true\", 30) +\n        // Unauthorized target geographies\n\
    \        if($login.principal.ip_geo_artifact.location.country_or_region = \"Cuba\"\
    , 20) +\n        if($login.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Iran\", 20) +\n        if($login.principal.ip_geo_artifact.location.country_or_region\
    \ = \"North Korea\", 20) +\n        if($login.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Russia\", 20) +\n        if($login.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Syria\", 20)\n    )\n    $mitre_attack_tactic = \"Credential Access\"\n\
    \    $mitre_attack_technique = \"Brute Force: Password Spraying\"\n    $target_user_agent\
    \ = $login.network.http.user_agent\n    $principal_ip = array_distinct($login.principal.ip)\n\
    \    $principal_ip_country = array_distinct($login.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($login.principal.ip_geo_artifact.location.state)\n\
    \    $principal_ip_city = $login.principal.location.city\n    $security_result_summary\
    \ = array_distinct($login.security_result.summary)\n\n  condition:\n    $login\n\
    }"
  chronicle_rule_name: okta_threatinsight_suspected_password_spray_attack
