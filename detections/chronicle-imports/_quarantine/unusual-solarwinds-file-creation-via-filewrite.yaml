detection:
  chronicle_yaral: "rule unusual_solarwinds_file_creation_via_filewrite {\n meta:\n\
    \    author = \"SOC Prime Team, Fireeye\"\n    description = \"This rule was converted\
    \ from the FireEye hxioc rule. This rule identifies unusual file write events\
    \ by a Solar Winds executable.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/19EQlEAuOgoe\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"file_event\"\n  \
    \  product = \"windows\"\n    mitre = \"initial_access, t1195.002\"\n\n  events:\n\
    ((re.regex($selection.target.process.file.full_path, `.*\\\\solarwinds\\.businesslayerhost\\\
    .exe`) or re.regex($selection.target.process.file.full_path, `.*\\\\SolarWindws\\\
    .BusinessLayerHostx64\\.exe`)) and (re.regex($selection.target.file.full_path,\
    \ `.*\\.exe`) or re.regex($selection.target.file.full_path, `.*\\.jpg`) or re.regex($selection.target.file.full_path,\
    \ `.*\\.ps1`) or re.regex($selection.target.file.full_path, `.*\\.png`) or re.regex($selection.target.file.full_path,\
    \ `.*\\.dll`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: unusual_solarwinds_file_creation_via_filewrite
