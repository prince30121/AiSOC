  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule okta_new_api_token_created {\n\n  meta:\n    author = \"Google Cloud Security\"\
    \n    description = \"Detects when a new API token is created.\"\n    rule_id\
    \ = \"mr_beca4f13-9526-4095-ab77-f0fc0610200c\"\n    rule_name = \"Okta New API\
    \ Token Created\"\n    reference = \"https://developer.okta.com/docs/guides/tokens/\"\
    \n    mitre_attack_tactic = \"Defense Evasion, Persistence, Privilege Escalation,\
    \ Initial Access\"\n    mitre_attack_technique = \"Valid Accounts\"\n    mitre_attack_url\
    \ = \"https://attack.mitre.org/techniques/T1078/\"\n    mitre_attack_version =\
    \ \"v13.1\"\n    type = \"Alert\"\n    data_source = \"Okta\"\n    severity =\
    \ \"Medium\"\n    priority = \"Medium\"\n\n  events:\n    $token.metadata.product_name\
    \ = \"Okta\"\n    $token.metadata.vendor_name = \"Okta\"\n    $token.metadata.product_event_type\
    \ = \"system.api_token.create\"\n    $token.security_result.summary = \"Create\
    \ API token\"\n    $token.security_result.action = \"ALLOW\"\n    $token.principal.user.userid\
    \ = $userid\n\n  match:\n    $userid over 1h\n\n  outcome:\n    $risk_score =\
    \ max(35)\n    $mitre_attack_tactic = \"Defense Evasion, Persistence, Privilege\
    \ Escalation, Initial Access\"\n    $mitre_attack_technique = \"Valid Accounts\"\
    \n    $target_user_agent = array_distinct($token.network.http.user_agent)\n  \
    \  $principal_ip = array_distinct($token.principal.ip)\n    $principal_ip_country\
    \ = array_distinct($token.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($token.principal.ip_geo_artifact.location.state)\n\
    \    $principal_ip_city = array_distinct($token.principal.location.city)\n   \
    \ $principal_user_email_addresses = array_distinct ($token.principal.user.email_addresses)\n\
    \    $security_result_summary = array_distinct($token.security_result.summary)\n\
    \n  condition:\n    $token\n}"
  chronicle_rule_name: okta_new_api_token_created
