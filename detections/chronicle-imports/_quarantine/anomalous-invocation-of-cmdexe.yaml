detection:
  chronicle_yaral: "rule anomalous_invocation_of_cmdexe {\n meta:\n    author = \"\
    Joseph Kamau\"\n    description = \"This rule detects when the cmd.exe is launched\
    \ in a suspicious manner   License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/mOAjyJi9nUPK\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    category\
    \ = \"process_creation\"\n    mitre = \"defense_evasion\"\n\n  events:\n(re.regex($selection1.target.process.file.full_path,\
    \ `.*cmd\\.exe`) and ($selection1.metadata.product_event_type = \"4688\" or $selection1.metadata.product_event_type\
    \ = \"1\") and (re.regex($selection1.principal.process.file.full_path, `.*rundll32\\\
    .exe`) or re.regex($selection1.principal.process.file.full_path, `.*httpd\\.exe`)\
    \ or re.regex($selection1.principal.process.file.full_path, `.*svchost\\.exe`)\
    \ or re.regex($selection1.principal.process.file.full_path, `.*w3wp\\.exe`)))\n\
    \n  condition:\n    $selection1\n}"
