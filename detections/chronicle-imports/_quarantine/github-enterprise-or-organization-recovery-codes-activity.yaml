detection:
  chronicle_yaral: "/*\n * Copyright 2024 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule github_enterprise_or_organization_recovery_codes_activity {\n\n  meta:\n\
    \    author = \"Google Cloud Security\"\n    description = \"Detects when the\
    \ Single Sign-On (SSO) recovery codes are accessed for a GitHub enterprise or\
    \ organization. An adversary may attempt to access or steal SSO recovery codes\
    \ in order to maintain access to their target's GitHub environment.\"\n    rule_id\
    \ = \"mr_2bb0bc58-b799-4b8f-96c3-f1cfd7cea201\"\n    rule_name = \"GitHub Enterprise\
    \ Or Organization Recovery Codes Activity\"\n    assumption = \"Your GitHub enterprise\
    \ audit log settings are configured to log the source IP address for events. Reference:\
    \ https://docs.github.com/en/organizations/keeping-your-organization-secure/managing-security-settings-for-your-organization/displaying-ip-addresses-in-the-audit-log-for-your-organization\"\
    \n    type = \"alert\"\n    severity = \"Medium\"\n    priority = \"Medium\"\n\
    \    platform = \"GitHub\"\n    data_source = \"github\"\n    reference = \"https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/audit-log-events-for-your-enterprise\"\
    \n\n  events:\n    $github.metadata.vendor_name = \"GITHUB\" nocase\n    $github.metadata.product_name\
    \ = \"GITHUB\"\n    (\n        // GitHub enterprise events\n        $github.metadata.product_event_type\
    \ = \"business.recovery_codes_downloaded\" or\n        $github.metadata.product_event_type\
    \ = \"business.recovery_codes_generated\" or\n        $github.metadata.product_event_type\
    \ = \"business.recovery_codes_printed\" or\n        $github.metadata.product_event_type\
    \ = \"business.recovery_codes_viewed\" or\n        // GitHub organization events\n\
    \        $github.metadata.product_event_type = \"org.recovery_codes_downloaded\"\
    \ or\n        $github.metadata.product_event_type = \"org.recovery_codes_generated\"\
    \ or\n        $github.metadata.product_event_type = \"org.recovery_codes_printed\"\
    \ or\n        $github.metadata.product_event_type = \"org.recovery_codes_viewed\"\
    \n    )\n    $github.principal.user.userid = $user_id\n\n  match:\n    $user_id\
    \ over 30m\n\n  outcome:\n    $risk_score = max(65)\n    $event_count = count_distinct($github.metadata.id)\n\
    \    $principal_ip = array_distinct($github.principal.ip)\n    $principal_user_userid\
    \ = array_distinct($github.principal.user.userid)\n    $principal_ip_country =\
    \ array_distinct($github.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($github.principal.ip_geo_artifact.location.state)\n\
    \    $principal_ip_city = array_distinct($github.principal.location.city)\n  \
    \  $security_result_summary = array_distinct($github.security_result.summary)\n\
    \n  condition:\n    $github\n}"
  chronicle_rule_name: github_enterprise_or_organization_recovery_codes_activity
