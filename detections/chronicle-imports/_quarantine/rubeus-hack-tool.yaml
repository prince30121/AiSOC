detection:
  chronicle_yaral: "rule rubeus_hack_tool {\n meta:\n    author = \"Florian Roth\"\
    \n    description = \"Detects command line parameters used by Rubeus hack tool\
    \  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/tW6hpj6cabMx\"\n    version\
    \ = \"0.01\"\n    created = \"2018/12/19\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"credential_access, t1003, s0005\"\n\
    \n  events:\n((re.regex($selection.target.process.command_line, `.* asreproast\
    \ .*`) or re.regex($selection.target.process.command_line, `.* dump /service:krbtgt\
    \ .*`) or re.regex($selection.target.process.command_line, `.* kerberoast .*`)\
    \ or re.regex($selection.target.process.command_line, `.* createnetonly /program:.*`)\
    \ or re.regex($selection.target.process.command_line, `.* ptt /ticket:.*`) or\
    \ re.regex($selection.target.process.command_line, `.* /impersonateuser:.*`) or\
    \ re.regex($selection.target.process.command_line, `.* renew /ticket:.*`) or re.regex($selection.target.process.command_line,\
    \ `.* asktgt /user:.*`) or re.regex($selection.target.process.command_line, `.*\
    \ harvest /interval:.*`)) and ($selection.metadata.product_event_type = \"4688\"\
    \ or $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n    $selection\n\
    }"
  chronicle_rule_name: rubeus_hack_tool
