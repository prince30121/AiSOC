    \ {\n meta:\n    author = \"Joseph Kamau\"\n    description = \"This rule detects\
    \ when a process tries to access the Windows attachment manager, this could be\
    \ an attempt to allow the execution of malicious files types in email attachments\
    \   License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/qBNzmWxZbugs\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"process_creation\"\n    mitre = \"defense_evasion, attck.t1112\"\n\n  events:\n\
    re.regex($selection.target.process.command_line, `.*\\\\Software\\\\Microsoft\\\
    \\Windows\\\\CurrentVersion\\\\Policies\\\\Attachments`)\n\n  condition:\n   \
    \ $selection\n}"
