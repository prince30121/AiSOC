detection:
  chronicle_yaral: "rule shells_spawned_by_web_servers {\n meta:\n    author = \"\
    Thomas Patzke\"\n    description = \"Web servers that spawn shell processes could\
    \ be the result of a successfully placed web shell or an other attack  License:\
    \ https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\n\
    \    reference = \"https://tdm.socprime.com/tdm/info/DMh5UZGcjb2L\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"privilege_escalation, persistence,\
    \ t1100\"\n\n  events:\n((re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\w3wp\\.exe`) or re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\httpd\\.exe`) or re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\nginx\\.exe`) or re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\php-cgi\\.exe`)) and (re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\cmd\\.exe`) or re.regex($selection.target.process.file.full_path, `.*\\\
    \\sh\\.exe`) or re.regex($selection.target.process.file.full_path, `.*\\\\bash\\\
    .exe`) or re.regex($selection.target.process.file.full_path, `.*\\\\powershell\\\
    .exe`)) and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: shells_spawned_by_web_servers
