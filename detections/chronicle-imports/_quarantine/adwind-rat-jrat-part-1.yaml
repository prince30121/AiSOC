detection:
  chronicle_yaral: "rule adwind_rat__jrat_part_1 {\n meta:\n    author = \"Florian\
    \ Roth, Tom Ueltschi\"\n    description = \"Detects javaw.exe in AppData folder\
    \ as used by Adwind / JRAT  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/4VPNvKK4SGiZ\"\n    version\
    \ = \"0.01\"\n    created = \"2017/11/10\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"execution, t1064\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"11\" and (re.regex($selection.target.file.full_path, `.*\\\\AppData\\\\\
    Roaming\\\\Oracle\\\\bin\\\\java.*\\.exe`) or re.regex($selection.target.file.full_path,\
    \ `.*\\\\Retrive.*\\.vbs`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: adwind_rat__jrat_part_1
