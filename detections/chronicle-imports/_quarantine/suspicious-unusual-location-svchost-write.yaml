    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule suspicious_unusual_location_svchost_write\n{\n  meta:\n    author = \"\
    Google Cloud Security\"\n    description = \"Re/creating the Windows 'svchost'\
    \ in an unusual location\"\n    yara_version = \"YL2.0\"\n    rule_version = \"\
    1.0\"\n\n  events:\n    (\n      $e1.metadata.event_type = \"FILE_CREATION\" or\n\
    \      $e1.metadata.event_type = \"FILE_COPY\"\n    )\n    and\n    re.regex($e1.target.file.full_path,\
    \ `\\bsvchost(\\.exe)?\\b`) nocase and\n    not re.regex($e1.principal.process.command_line,\
    \ `\\\\Windows\\\\System32\\\\`) nocase\n\n  condition:\n    $e1\n}"
  chronicle_rule_name: suspicious_unusual_location_svchost_write
