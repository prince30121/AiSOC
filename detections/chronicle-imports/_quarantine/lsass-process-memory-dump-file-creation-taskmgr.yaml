detection:
  chronicle_yaral: "/*\n * Copyright 2025 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule lsass_process_memory_dump_file_creation_taskmgr {\n\n  meta:\n    author\
    \ = \"Swachchhanda Shrawan Poudel\"\n    description = \"Detects the creation\
    \ of an lsass.dmp file by the taskmgr process. This indicates a manual dumping\
    \ of the LSASS.exe process memory using Windows Task Manager\"\n    reference\
    \ = \"https://github.com/SigmaHQ/sigma/blob/master/rules/windows/file/file_event/file_event_win_taskmgr_lsass_dump.yml\"\
    \n    license = \"https://github.com/SigmaHQ/Detection-Rule-License/blob/main/LICENSE.Detection.Rules.md\"\
    \n    rule_name = \"LSASS Process Memory Dump Creation Via Taskmgr.exe\"\n   \
    \ sigma_uuid = \"69ca12af-119d-44ed-b50f-a47af0ebc364\"\n    sigma_status = \"\
    test\"\n    rule_id = \"mr_d35a4d98-60fb-49bd-bb40-04d985c4e35b\"\n    tactic\
    \ = \"TA0006\"\n    technique = \"T1003.001\"\n    type = \"Detection\"\n    data_source\
    \ = \"Sysmon\"\n    platform = \"Windows\"\n    severity = \"High\"\n    priority\
    \ = \"High\"\n    false_positives = \"Rare case of troubleshooting by an administrator\
    \ or support that has to be investigated regardless\"\n\n  events:\n    $file.metadata.event_type\
    \ = \"FILE_CREATION\"\n    re.regex($file.principal.process.file.full_path, `:\\\
    \\Windows\\\\(system32|SysWOW64)\\\\taskmgr\\.exe$`) nocase\n    (\n        strings.contains(strings.to_lower($file.target.file.full_path),\
    \ \"\\\\appdata\\\\local\\\\temp\\\\\") and\n        strings.contains(strings.to_lower($file.target.file.full_path),\
    \ \"\\\\lsass\") and\n        re.regex($file.target.file.full_path, `\\.dmp$`)\
    \ nocase\n    )\n    $file.principal.hostname = $hostname\n\n  match:\n    $hostname\
    \ over 5m\n\n  outcome:\n    //example usage of specifying test user and hostname\
    \ to adjust risk score\n    $risk_score = max(if($file.principal.user.userid =\
    \ \"user\" and $file.principal.hostname = \"hostname\", 0, 15))\n    $principal_hostname\
    \ = array_distinct($file.principal.hostname)\n    $principal_process_pid = array_distinct($file.principal.process.pid)\n\
    \    $principal_process_command_line = array_distinct($file.principal.process.command_line)\n\
    \    $principal_process_file_sha256 = array_distinct($file.principal.process.file.sha256)\n\
    \    $principal_process_file_full_path = array_distinct($file.principal.process.file.full_path)\n\
    \    $principal_process_product_specific_process_id = array_distinct($file.principal.process.product_specific_process_id)\n\
    \    $principal_process_parent_process_product_specific_process_id = array_distinct($file.principal.process.parent_process.product_specific_process_id)\n\
    \    $principal_user_userid = array_distinct($file.principal.user.userid)\n  \
    \  $target_file_sha256 = array_distinct($file.target.file.sha256)\n    $target_file_full_path\
    \ = array_distinct($file.target.file.full_path)\n\n  condition:\n    $file\n}"
  chronicle_rule_name: lsass_process_memory_dump_file_creation_taskmgr
