detection:
  chronicle_yaral: "rule terminal_service_process_spawn {\n meta:\n    author = \"\
    Florian Roth\"\n    description = \"Detects a process spawned by the terminal\
    \ service server process (this could be an indicator for an exploitation of CVE-2019-0708)\
    \  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/FKzDvmj7GHii\"\n    version\
    \ = \"0.01\"\n    created = \"2019/05/22\"\n    product = \"windows\"\n    category\
    \ = \"process_creation\"\n    mitre = \"car.2013-07-002\"\n\n  events:\n((re.regex($selection.principal.process.command_line,\
    \ `.*\\\\svchost\\.exe.*termsvcs`) and ($selection.metadata.product_event_type\
    \ = \"4688\" or $selection.metadata.product_event_type = \"1\")) and not (re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\rdpclip\\.exe`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: terminal_service_process_spawn
