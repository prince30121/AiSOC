detection:
  chronicle_yaral: "rule lsassexe_detected_running_from_a_suspicious_location {\n\
    \ meta:\n    author = \"Lee Archinal\"\n    description = \"This detects Lsass.exe\
    \ not running from C:\\\\Windows\\\\System32\\\\lsass.exe  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/KlCGqOlBfkoe\"\n    version\
    \ = \"0.01\"\n    created = \"2019/07/08\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n\n  events:\n(($selection1.metadata.product_event_type = \"1\"\
    \ and re.regex($selection1.target.process.file.full_path, `.*lsass\\.exe`)) and\
    \ not ($selection1.target.process.file.full_path = \"C:\\\\Windows\\\\System32\\\
    \\lsass.exe\"))\n\n  condition:\n    $selection1\n}"
  chronicle_rule_name: lsassexe_detected_running_from_a_suspicious_location
