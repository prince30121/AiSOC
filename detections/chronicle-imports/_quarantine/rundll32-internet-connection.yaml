detection:
  chronicle_yaral: "rule rundll32_internet_connection {\n meta:\n    author = \"Florian\
    \ Roth\"\n    description = \"Detects a rundll32 that communicates with public\
    \ IP addresses  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/0Zg55ZhTC6ZE\"\n    version\
    \ = \"0.01\"\n    created = \"2017/11/04\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"t1085, defense_evasion, execution\"\n\n  events:\n\
    (($selection.metadata.product_event_type = \"3\" and re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\rundll32\\.exe`)) and not ((re.regex($selection.target.ip, `10\\..*`)\
    \ or re.regex($selection.target.ip, `192\\.168\\..*`) or re.regex($selection.target.ip,\
    \ `172\\..*`))))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: rundll32_internet_connection
