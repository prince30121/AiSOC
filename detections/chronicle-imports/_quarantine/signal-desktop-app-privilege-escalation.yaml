detection:
  chronicle_yaral: "rule signal_desktop_app_privilege_escalation {\n meta:\n    author\
    \ = \"Halil Ibrahim Cosgun\"\n    description = \"Detects Signal Desktop v1.29\
    \ app privilege escalation vulnerability. During the startup the application will\
    \ execute the c:\\\\node_modules\\\\.bin\\\\wmic.exe binary if it exists. By default\
    \ on Windows, low privileged users have the privilege to create folders under\
    \ root level drives.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/JxHcCHvtyUEG\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"Execution, Defense_Evasion, Persistence, Privilege_Escalation,\
    \ T1218, T1036, T1044\"\n\n  events:\n(($selection1.metadata.product_event_type\
    \ = \"1\" and re.regex($selection1.principal.process.file.full_path, `.*\\\\\\\
    \\Signal\\.exe`) and re.regex($selection1.target.process.command_line, `.*\\\\\
    \\\\node_modules\\\\\\\\\\.bin\\\\\\\\wmic\\.exe`)) or ($selection1.metadata.product_event_type\
    \ = \"11\" and re.regex($selection1.target.file.full_path, `.*\\\\\\\\node_modules\\\
    \\\\\\\\.bin\\\\\\\\wmic\\.exe`)))\n\n  condition:\n    $selection1\n}"
  chronicle_rule_name: signal_desktop_app_privilege_escalation
