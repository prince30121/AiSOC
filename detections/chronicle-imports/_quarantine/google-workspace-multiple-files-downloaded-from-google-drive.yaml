id: chronicle-detection-rules-google-workspace-multiple-files-downloaded-from-google-drive
name: google_workspace_multiple_files_downloaded_from_google_drive
description: google_workspace_multiple_files_downloaded_from_google_drive
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule google_workspace_multiple_files_downloaded_from_google_drive {\n\n    meta:\n\
    \      author = \"Google Cloud Security\"\n      description = \"Identifies when\
    \ a user downloads multiple files from Google Drive, which may indicate data exfiltration.\"\
    \n      rule_id = \"mr_72855af9-fba4-4424-b879-4de733374e8b\"\n      rule_name\
    \ = \"Google Workspace Multiple Files Downloaded From Google Drive\"\n      mitre_attack_tactic\
    \ = \"Exfiltration\"\n      mitre_attack_technique = \"Exfiltration Over Web Service\"\
    \n      mitre_attack_url = \"https://attack.mitre.org/techniques/T1567/\"\n  \
    \    mitre_attack_version = \"v13.1\"\n      type = \"Alert\"\n      data_source\
    \ = \"Workspace Activity\"\n      severity = \"High\"\n      priority = \"High\"\
    \n\n    events:\n      // Document downloaded from Google Drive\n      $download.metadata.vendor_name\
    \ = \"Google Workspace\"\n      $download.metadata.product_name = \"drive\"\n\
    \      $download.metadata.product_event_type = \"download\"\n      $download.principal.user.userid\
    \ = $user_id\n\n    match:\n      $user_id over 1h\n\n    outcome:\n      $risk_score\
    \ = max(75)\n      $mitre_attack_tactic = \"Exfiltration\"\n      $mitre_attack_technique\
    \ = \"Exfiltration Over Web Service\"\n      $mitre_attack_technique_id = \"T1567\"\
    \n      $event_count = count_distinct($download.metadata.id)\n      $product_event_type\
    \ = array_distinct($download.metadata.product_event_type)\n      $userid = array_distinct($download.principal.user.userid)\n\
    \      $doc_type = array_distinct($download.src.resource.attribute.labels[\"doc_type\"\
    ])\n      $owner = array_distinct($download.target.resource.attribute.labels[\"\
    owner\"])\n      $doc_name = array_distinct($download.target.resource.name)\n\
    \      $doc_id = array_distinct($download.target.resource.product_object_id)\n\
    \      $count_docs = count_distinct($download.target.resource.product_object_id)\n\
    \n    condition:\n      // Customize the value of $count_docs to set the alerting\
    \ threshold for your environment\n      $download and $count_docs > 10\n  }"
  chronicle_rule_name: google_workspace_multiple_files_downloaded_from_google_drive
