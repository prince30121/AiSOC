detection:
  chronicle_yaral: "rule docker_user_agent {\n meta:\n    author = \"Simon Lavigne\"\
    \n    description = \"Detects docker user agent strings in proxy logs when a user\
    \ runs the 'docker push' command.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/QUznqcdWU6GP\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"proxy\"\n\n  events:\n\
    (re.regex($selection.principal.application, `docker/.*`) and $selection.network.http.method\
    \ = \"PUT\")\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: docker_user_agent
