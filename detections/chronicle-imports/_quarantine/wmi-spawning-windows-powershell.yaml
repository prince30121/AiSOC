detection:
  chronicle_yaral: "rule wmi_spawning_windows_powershell {\n meta:\n    author = \"\
    Markus Neis / @Karneades\"\n    description = \"Detects WMI spawning PowerShell\
    \  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/RALI6fJ1G8mm\"\n    version\
    \ = \"0.01\"\n    created = \"2019/04/03\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, defense_evasion, t1064\"\
    \n\n  events:\n((re.regex($selection.principal.process.file.full_path, `.*\\\\\
    wmiprvse\\.exe`) and re.regex($selection.target.process.file.full_path, `.*\\\\\
    powershell\\.exe`) and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\")) and not (re.regex($selection.target.process.command_line, `.*&amp;.*`)))\n\
    \n  condition:\n    $selection\n}"
