    \ `.*incomeupdate\\.com`) or re.regex($selection.network.dns.questions.name, `.*zupertech\\\
    .com`) or re.regex($selection.network.dns.questions.name, `.*digitalcollege\\\
    .org`) or re.regex($selection.network.dns.questions.name, `.*virtualdataserver\\\
    .com`))\n\n  condition:\n    $selection\n}"
