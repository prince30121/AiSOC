detection:
  chronicle_yaral: "rule amadey_botnet_detection_ta505_part_1 {\n meta:\n    author\
    \ = \"Ariel Millahuel\"\n    description = \"This rule detects a bot called Amadey.\
    \ This one is used in order to collect information victim's environment, though\
    \ it can also deliver other malware. The threat actor is considered TA505  License:\
    \ https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\n\
    \    reference = \"https://tdm.socprime.com/tdm/info/oETtTqqsUAmk\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, T1059\"\n\n  events:\n(($selection2.target.process.command_line\
    \ = \"rundll32.exe C:\\\\Users\\\\admin\\\\AppData\\\\Local\\\\Temp\\\\cred.dll,\
    \ Main\" or re.regex($selection2.target.process.command_line, `msiexec\\.exe STOP=1\
    \ /i http://.*\\..*\\..*\\..*/dom.* /q ksw=%TEMP%`) or re.regex($selection2.target.process.command_line,\
    \ `msiexec\\.exe STOP=1 /i https://.*\\..*\\..*\\..*/dom.* /q ksw=%TEMP%`) or\
    \ $selection2.target.process.command_line = \"REG ADD \\\"HKCU\\\\Software\\\\\
    Microsoft\\\\Windows\\\\CurrentVersion\\\\Explorer\\\\User Shell Folders\\\" /f\
    \ /v Startup /t REG_SZ /d C:\\\\ProgramData\\\\87e4c89e95\" or re.regex($selection2.target.process.command_line,\
    \ `REG ADD \\\"HKCU\\\\Software\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\\
    Explorer\\\\User Shell Folders\\\" /f /v Startup /t REG_SZ /d C:\\\\ProgramData\\\
    \\87.*`)) and ($selection2.metadata.product_event_type = \"4688\" or $selection2.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection2\n}"
  chronicle_rule_name: amadey_botnet_detection_ta505_part_1
