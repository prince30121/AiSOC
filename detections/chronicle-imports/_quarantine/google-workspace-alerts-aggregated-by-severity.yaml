id: chronicle-detection-rules-google-workspace-alerts-aggregated-by-severity
name: google_workspace_alerts_aggregated_by_severity
description: google_workspace_alerts_aggregated_by_severity
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule google_workspace_alerts_aggregated_by_severity {\n\n  meta:\n    author\
    \ = \"Google Cloud Security\"\n    description = \"Generates alerts based on Google\
    \ Workspace alerts center and aggregates them based on severity.\"\n    rule_id\
    \ = \"mr_311cc4ab-627b-43a1-a744-8d7aa5e44fbf\"\n    rule_name = \"Google Workspace\
    \ Alerts Aggregated By Severity\"\n    type = \"Alert\"\n    data_source = \"\
    Workspace Alerts\"\n\n  events:\n    $ws.metadata.vendor_name = \"Google Workspace\"\
    \n    $ws.metadata.product_name = \"Google Workspace Alerts\"\n    $ws.security_result.severity\
    \ = $severity\n\n  match:\n    $severity over 1h\n\n  outcome:\n    $risk_score\
    \ = max(30 +\n        if($ws.security_result.severity = \"LOW\", 10)+\n      \
    \  if($ws.security_result.severity = \"MEDIUM\", 30)+\n        if($ws.security_result.severity\
    \ = \"HIGH\", 50)\n    )\n    $event_count = count_distinct($ws.metadata.id)\n\
    \    $event_type = array_distinct($ws.metadata.event_type)\n    $product_event_type\
    \ = array_distinct($ws.metadata.product_event_type)\n    $security_category_details\
    \ = array_distinct($ws.security_result.category_details)\n    $security_category\
    \ = array_distinct($ws.security_result.category)\n    $security_investigation_tool_link\
    \ = array_distinct($ws.security_result.detection_fields[\"security_investigation_tool_link\"\
    ])\n    $security_summary = array_distinct($ws.security_result.summary)\n    $alert_severity\
    \ = array_distinct($ws.security_result.severity)\n\n  condition:\n    $ws\n}"
  chronicle_rule_name: google_workspace_alerts_aggregated_by_severity
provenance:
  source: chronicle/detection-rules
  source_id: google_workspace_alerts_aggregated_by_severity
