detection:
  chronicle_yaral: "rule suspicious_execution_from_outlook {\n meta:\n    author =\
    \ \"Markus Neis\"\n    description = \"Detects EnableUnsafeClientMailRules used\
    \ for Script Execution from Outlook  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/MWUcNxv3VHwN\"\n    version\
    \ = \"0.01\"\n    created = \"2018/12/27\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, t1059, t1202\"\n\n  events:\n\
    (re.regex($clientMailRules.target.process.command_line, `.*EnableUnsafeClientMailRules.*`)\
    \ or (re.regex($clientMailRules.principal.process.file.full_path, `.*\\\\outlook\\\
    .exe`) and re.regex($clientMailRules.target.process.command_line, `.*\\\\.*\\\
    .exe`)))\n\n  condition:\n    $clientMailRules\n}"
  chronicle_rule_name: suspicious_execution_from_outlook
