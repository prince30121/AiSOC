detection:
  chronicle_yaral: "rule detect_search_for_credentials_on_windows_operating_system\
    \ {\n meta:\n    author = \"Joseph Kamau\"\n    description = \"This rule detects\
    \ the search for keywords that define passwords or administrative accounts using\
    \ the findstr command in Windows Operating system  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/ATGdH5m2dRcC\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"Windows\"\n    category\
    \ = \"process_creation\"\n    mitre = \"discovery, t1083, collection, t1119\"\n\
    \n  events:\n((re.regex($selection_1.target.process.command_line, ` .*password.*`)\
    \ or re.regex($selection_1.target.process.command_line, ` .*admin.*`) or re.regex($selection_1.target.process.command_line,\
    \ ` .*passwd.*`) or re.regex($selection_1.target.process.command_line, ` .*pass.*`))\
    \ and re.regex($selection_1.target.process.file.full_path, `.*\\\\findstr\\.exe`))\n\
    \n  condition:\n    $selection_1\n}"
  chronicle_rule_name: detect_search_for_credentials_on_windows_operating_system
