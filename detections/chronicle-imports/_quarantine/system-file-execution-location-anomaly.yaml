detection:
  chronicle_yaral: "rule system_file_execution_location_anomaly {\n meta:\n    author\
    \ = \"Florian Roth\"\n    description = \"Detects a Windows program executable\
    \ started in a suspicious folder  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/CM8o7YQwzMny\"\n    version\
    \ = \"0.01\"\n    created = \"2017/11/27\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"defense_evasion\"\n\n  events:\n(((re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\svchost\\.exe`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\rundll32\\.exe`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\services\\.exe`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\powershell\\.exe`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\regsvr32\\.exe`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\spoolsv\\.exe`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\lsass\\.exe`) or re.regex($selection.target.process.file.full_path, `.*\\\
    \\smss\\.exe`) or re.regex($selection.target.process.file.full_path, `.*\\\\csrss\\\
    .exe`) or re.regex($selection.target.process.file.full_path, `.*\\\\conhost\\\
    .exe`)) and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\")) and not ((re.regex($selection.target.process.file.full_path, `.*\\\
    \\System32\\\\.*`) or re.regex($selection.target.process.file.full_path, `.*\\\
    \\SysWow64\\\\.*`))))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: system_file_execution_location_anomaly
