    \  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/PYGGqXXI8HiF\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"T1486, Impact\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"1\" and (($selection.target.process.command_line = \"C:\\\\Windows\\\\system32\\\
    \\WindowsPowershell\\\\v1.0\\\\powershell.exe Set-MpPreference -DisableBehaviorMonitoring\
    \ $true ; Set-MpPreference -MAPSReporting 0 ; Set-MpPreference -ExclusionProcess\
    \ rundll32.exe ; Set-MpPreference -ExclusionExtension dll\" or $selection.target.process.command_line\
    \ = \"C:\\\\Windows\\\\System32\\\\netsh.exe advfirewall firewall add rule name=\\\
    \"Rundll32\\\" dir=out action=allow protocol=any program=\\\"C:\\\\Windows\\\\\
    system32\\\\rundll32.exe\") or (($selection.target.process.file.full_path = \"\
    vssadmin.exe\" or $selection.target.process.file.full_path = \"sc.exe\" or $selection.target.process.file.full_path\
    \ = \"net.exe\" or $selection.target.process.file.full_path = \"net1.exe\" or\
