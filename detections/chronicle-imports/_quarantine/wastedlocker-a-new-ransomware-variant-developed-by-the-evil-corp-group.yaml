    \ = \"cscript.exe\" or $selection.target.process.file.full_path = \"wscript.exe\"\
    ) and (re.regex($selection.target.process.command_line, `.*Delete Shadows /all\
    \ /quiet.*`) or re.regex($selection.target.process.command_line, `.*resize shadowstorage.*`)\
    \ or re.regex($selection.target.process.command_line, `.*stop NetBackup BMR MTFTP\
    \ Service /y.*`) or re.regex($selection.target.process.command_line, `.*\\.jse.*`)\
    \ or re.regex($selection.target.process.command_line, `.*\\.js.*`) or re.regex($selection.target.process.command_line,\
    \ `.*\\.zip.*`) or re.regex($selection.target.process.command_line, `.*stop BMR\
    \ Boot Service /y.*`) or re.regex($selection.target.process.command_line, `.*stop\
    \ avpsus /y.*`) or re.regex($selection.target.process.command_line, `.*sc stop\
    \ WinDefend/y.*`) or re.regex($selection.target.process.command_line, `.*sc config\
    \ WinDefend start= disabled /y.*`) or re.regex($selection.target.process.command_line,\
    \ `.*config SQLTELEMETRY start= disabled.*`) or re.regex($selection.target.process.command_line,\
    \ `.*config SQLWriter start= disabled.*`) or re.regex($selection.target.process.command_line,\
    \ `.*config SstpSvc start= disabled.*`)))))\n\n  condition:\n    $selection\n}"
