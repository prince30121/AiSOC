    \ meta:\n    author = \"Den Iuzvyk\"\n    description = \"Detects abusing of CompatTelRunner.exe\
    \ for persistance.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/0ZXi5CE8Zkwb\"\n    version\
    \ = \"0.01\"\n    created = \"2020/04/09\"\n    category = \"sysmon\"\n    product\
    \ = \"windows\"\n    mitre = \"persistence, t1053\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"4657\" and (re.regex($selection.target.registry.registry_value_data, `.*SOFTWARE\\\
    \\Microsoft\\\\Windows NT\\\\CurrentVersion\\\\AppCompatFlags\\\\TelemetryController.*\\\
    \\Command.*`) or re.regex($selection.target.file.full_path, `.*SOFTWARE\\\\Microsoft\\\
    \\Windows NT\\\\CurrentVersion\\\\AppCompatFlags\\\\TelemetryController.*\\\\\
    Command.*`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: abusing_windows_telemetry_compattelrunnerexeaudit_rule
