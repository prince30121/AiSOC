detection:
  chronicle_yaral: "rule process_dump_via_comsvcs_dll {\n meta:\n    author = \"Modexp\
    \ (idea)\"\n    description = \"Detects process memory dump via comsvcs.dll and\
    \ rundll32  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/BnuWbd1VgHGv\"\n    version\
    \ = \"0.01\"\n    created = \"2019/09/02\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"credential_access, t1003\"\n\n  events:\n\
    ((re.regex($rundll_image.target.process.file.full_path, `.*\\\\rundll32\\.exe`)\
    \ or $rundll_image.target.file.full_path = \"RUNDLL32.EXE\") and ((re.regex($rundll_image.target.process.command_line,\
    \ `.*comsvcs.*MiniDump.*full.*`) or re.regex($rundll_image.target.process.command_line,\
    \ `.*comsvcs.*MiniDumpW.*full.*`)) and ($rundll_image.metadata.product_event_type\
    \ = \"4688\" or $rundll_image.metadata.product_event_type = \"1\")))\n\n  condition:\n\
    \    $rundll_image\n}"
  chronicle_rule_name: process_dump_via_comsvcs_dll
