detection:
  chronicle_yaral: "rule microsoft_binary_github_communication {\n meta:\n    author\
    \ = \"Michael Haag (idea), Florian Roth (rule)\"\n    description = \"Detects\
    \ an executable in the Windows folder accessing github.com  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/cEQSqcboHsqH\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"lateral_movement, t1105\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"3\" and (re.regex($selection.target.hostname, `.*\\.github\\.com`) or re.regex($selection.target.hostname,\
    \ `.*\\.githubusercontent\\.com`)) and re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\Windows\\\\.*`))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: microsoft_binary_github_communication
