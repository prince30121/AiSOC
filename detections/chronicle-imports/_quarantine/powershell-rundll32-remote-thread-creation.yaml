detection:
  chronicle_yaral: "rule powershell_rundll32_remote_thread_creation {\n meta:\n  \
    \  author = \"Florian Roth\"\n    description = \"Detects PowerShell remote thread\
    \ creation in Rundll32.exe  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/JRTpas1oMjDJ\"\n    version\
    \ = \"0.01\"\n    created = \"2018/06/25\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"defense_evasion, execution, t1085, t1086\"\n\n \
    \ events:\n($selection.metadata.product_event_type = \"8\" and re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\powershell\\.exe`) and re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\rundll32\\.exe`))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: powershell_rundll32_remote_thread_creation
