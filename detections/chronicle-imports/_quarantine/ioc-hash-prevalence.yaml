id: chronicle-detection-rules-ioc-hash-prevalence
name: ioc_hash_prevalence
description: ioc_hash_prevalence
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule ioc_hash_prevalence {\n\n  meta:\n    author = \"Google Cloud Security\"\
    \n    description = \"Detect process/file events that match hashes found in our\
    \ MISP instance and have low rolling max prevalence\"\n    rule_id = \"mr_58c661e3-e609-4df8-ae36-e85480e62a50\"\
    \n    rule_name = \"IOC Hash Prevalence\"\n    type = \"alert\"\n    tags = \"\
    prevalence, threat indicators\"\n    assumption = \"Assumes MISP data has been\
    \ ingested into entity graph; this rule can be modified to utilize other TI indicators\"\
    \n    data_source = \"microsoft sysmon\"\n    severity = \"High\"\n    priority\
    \ = \"High\"\n\n  events:\n    $process.metadata.event_type = \"FILE_CREATION\"\
    \ or $process.metadata.event_type = \"PROCESS_LAUNCH\"\n    $process.target.process.file.sha256\
    \ = $sha256\n\n    // derived from events ingested by Google SecOps\n    $prevalence.graph.metadata.entity_type\
    \ = \"FILE\"\n    $prevalence.graph.metadata.source_type = \"DERIVED_CONTEXT\"\
    \n    $prevalence.graph.entity.file.prevalence.day_count = 10\n    $prevalence.graph.entity.file.prevalence.rolling_max\
    \ <= 3\n    $prevalence.graph.entity.file.prevalence.rolling_max > 0\n    $prevalence.graph.entity.file.sha256\
    \ = $sha256\n\n    // Correlates with MISP data; can be modified based on your\
    \ MISP parser or other TI\n    $ioc.graph.metadata.entity_type = \"FILE\"\n  \
    \  $ioc.graph.metadata.source_type = \"ENTITY_CONTEXT\"\n    $ioc.graph.metadata.product_name\
    \ = \"MISP\"\n    $ioc.graph.entity.file.sha256 = $sha256\n\n  match:\n    $sha256\
    \ over 5m\n\n  outcome:\n    $risk_score = 85\n    $event_count = count_distinct($process.metadata.id)\n\
    \    // added to populate alert graph with additional context\n    $principal_hostname\
    \ = array_distinct($process.principal.hostname)\n    $principal_process_pid =\
    \ array_distinct($process.principal.process.pid)\n    $principal_process_command_line\
    \ = array_distinct($process.principal.process.command_line)\n    $principal_process_file_sha256\
    \ = array_distinct($process.principal.process.file.sha256)\n    $principal_process_file_full_path\
    \ = array_distinct($process.principal.process.file.full_path)\n    $principal_process_product_specific_process_id\
    \ = array_distinct($process.principal.process.product_specific_process_id)\n \
    \   $principal_process_parent_process_product_specific_process_id = array_distinct($process.principal.process.parent_process.product_specific_process_id)\n\
    \    $target_process_pid = array_distinct($process.target.process.pid)\n    $target_process_command_line\
    \ = array_distinct($process.target.process.command_line)\n    // Commented out\
    \ target.process.file.sha256 because it is already represented in graph as match\
    \ variable. If match changes, can uncomment to add to results\n    $target_process_file_sha256\
    \ = array_distinct($process.target.process.file.sha256)\n    $target_process_file_full_path\
    \ = array_distinct($process.target.process.file.full_path)\n    $target_process_product_specific_process_id\
    \ = array_distinct($process.target.process.product_specific_process_id)\n    $principal_user_userid\
    \ = array_distinct($process.principal.user.userid)\n    $target_file_sha256 =\
    \ array_distinct($process.target.file.sha256)\n    $target_file_full_path = array_distinct($process.target.file.full_path)\n\
    \n  condition:\n    $process and $ioc and $prevalence\n}"
  chronicle_rule_name: ioc_hash_prevalence
