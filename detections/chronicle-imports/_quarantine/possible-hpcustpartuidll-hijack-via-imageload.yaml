detection:
  chronicle_yaral: "rule possible_hpcustpartuidll_hijack_via_imageload {\n meta:\n\
    \    author = \"SOC Prime Team, FireEye\"\n    description = \"This rule has been\
    \ ported from Fireeye's HXIOC format to SIGMA. It detects hpcustpartui.dll being\
    \ loaded from unusual locations.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/rkyIZhC9HQ6B\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"image_load\"\n  \
    \  product = \"windows\"\n    mitre = \"persistence, privilege_escalation, defense_evasion,\
    \ t1574.001\"\n\n  events:\n(re.regex($selection_image.target.process.file.full_path,\
    \ `.*\\\\hpcustpartui\\.dll`) and not ((re.regex($selection_image.target.process.file.full_path,\
    \ `.*Program Files\\\\HP\\\\.*`) or re.regex($selection_image.target.process.file.full_path,\
    \ `.*Program Files \\(x86\\)\\\\HP\\\\.*`) or re.regex($selection_image.target.process.file.full_path,\
    \ `.*PROGRA~.*`) or re.regex($selection_image.target.process.file.full_path, `.*Program\
    \ Files \\(x86\\)\\\\Trend Micro\\\\.*`) or re.regex($selection_image.target.process.file.full_path,\
    \ `.*Program Files\\\\Trend Micro\\\\.*`))))\n\n  condition:\n    $selection_image\n\
    }"
  chronicle_rule_name: possible_hpcustpartuidll_hijack_via_imageload
