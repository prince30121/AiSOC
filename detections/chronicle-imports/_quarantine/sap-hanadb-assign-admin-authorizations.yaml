    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule sap_hanadb_assign_admin_authorizations {\n\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Detects the assignment of administrative\
    \ privileges or roles within SAP HANA DB.\"\n    severity = \"High\"\n    tactic\
    \ = \"TA0003\"\n    technique = \"T1098\"\n\n  events:\n    $e.metadata.log_type\
    \ = \"SAP_HANA_AUDIT\"\n\n    $statement = $e.additional.fields[\"executed_statement\"\
    ]\n\n    $statement = /ADMIN/ nocase\n    (\n        $statement = /GRANT PRIVILEGE/\
    \ nocase or\n        $statement = /GRANT ROLE/ nocase\n    )\n\n    $user = $e.principal.user.userid\n\
    \n  match:\n    $user over 30m\n\n  outcome:\n    $risk_score = max(80)\n    $principal_user\
    \ = array_distinct($user)\n    $target_user = array_distinct($e.target.user.userid)\n\
    \    $statements = array_distinct($statement)\n    $system_id = array_distinct($e.target.resource.attribute.labels[\"\
    system_id\"])\n\n  condition:\n    $e\n}"
  chronicle_rule_name: sap_hanadb_assign_admin_authorizations
