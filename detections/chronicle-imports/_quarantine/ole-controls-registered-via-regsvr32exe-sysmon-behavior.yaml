detection:
  chronicle_yaral: "rule ole_controls_registered_via_regsvr32exe_sysmon_behavior {\n\
    \ meta:\n    author = \"Lee Archinal\"\n    description = \"Regsvr32.exe is a\
    \ command-line program used to register and unregister OLE controls  License:\
    \ https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\n\
    \    reference = \"https://tdm.socprime.com/tdm/info/1Vp34ZDBjRJ0\"\n    version\
    \ = \"0.01\"\n    created = \"2019/07/06\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"defense_evasion, execution, t1117\"\n\n  events:\n\
    ($selection1.metadata.product_event_type = \"1\" and $selection1.target.process.file.full_path\
    \ = \"C:\\\\Windows\\\\system32\\\\regsvr32.exe\" and re.regex($selection1.target.process.command_line,\
    \ `regsvr32\\.exe /s /u /i:.* .*\\.dll`) and $selection1.principal.process.file.full_path\
    \ = \"C:\\\\Windows\\\\System32\\\\cmd.exe\")\n\n  condition:\n    $selection1\n\
    }"
  chronicle_rule_name: ole_controls_registered_via_regsvr32exe_sysmon_behavior
