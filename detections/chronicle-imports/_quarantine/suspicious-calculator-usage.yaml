detection:
  chronicle_yaral: "rule suspicious_calculator_usage {\n meta:\n    author = \"Florian\
    \ Roth\"\n    description = \"Detects suspicious use of calc.exe with command\
    \ line parameters or in a suspicious directory, which is likely caused by some\
    \ PoC or detection evasion  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/OBZnYuU21qdX\"\n    version\
    \ = \"0.01\"\n    created = \"2019/02/09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"defense_evasion, t1036\"\n\n  events:\n\
    ((re.regex($selection1.target.process.command_line, `.*\\\\calc\\.exe .*`) and\
    \ ($selection1.metadata.product_event_type = \"4688\" or $selection1.metadata.product_event_type\
    \ = \"1\")) or ((re.regex($selection1.target.process.file.full_path, `.*\\\\calc\\\
    .exe`) and ($selection1.metadata.product_event_type = \"4688\" or $selection1.metadata.product_event_type\
    \ = \"1\")) and not (re.regex($selection1.target.process.file.full_path, `.*\\\
    \\Windows\\\\Sys.*`))))\n\n  condition:\n    $selection1\n}"
  chronicle_rule_name: suspicious_calculator_usage
