detection:
  chronicle_yaral: "rule renamed_psexec {\n meta:\n    author = \"Florian Roth\"\n\
    \    description = \"Detects the execution of a renamed PsExec often used by attackers\
    \ or malware  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/QOSajcAZW9Ds\"\n    version\
    \ = \"0.01\"\n    created = \"2019/05/21\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"car.2013-05-009\"\n\n  events:\n(($selection.metadata.description\
    \ = \"Execute processes remotely\" and $selection.metadata.product_name = \"Sysinternals\
    \ PsExec\") and not ((re.regex($selection.target.process.file.full_path, `.*\\\
    \\PsExec\\.exe`) or re.regex($selection.target.process.file.full_path, `.*\\\\\
    PsExec64\\.exe`))))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: renamed_psexec
