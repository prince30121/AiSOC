detection:
  chronicle_yaral: "rule cmstpexe_execution_detector_sysmon_behavior {\n meta:\n \
    \   author = \"Lee Archinal\"\n    description = \"This content detects usage\
    \ of the Microsoft Connection Manager Profile as detected by Sysmon.  License:\
    \ https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\n\
    \    reference = \"https://tdm.socprime.com/tdm/info/Ix6E5rYxh3Jj\"\n    version\
    \ = \"0.01\"\n    created = \"2019/09/16\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"execution, t1191\"\n\n  events:\n(($selection1.target.process.file.full_path\
    \ = \"C:\\\\Windows\\\\System32\\\\cmstp.exe\" and (($selection1.metadata.product_event_type\
    \ = \"1\" and re.regex($selection1.target.process.command_line, `cmstp\\.exe /s\
    \ .*\\.inf`)) or ($selection1.metadata.product_event_type = \"13\" and re.regex($selection1.target.registry.registry_key,\
    \ `.*\\\\cmstp\\.exe`)))) or ($selection1.metadata.product_event_type = \"11\"\
    \ and $selection1.target.process.file.full_path = \"C:\\\\WINDOWS\\\\ssytem32\\\
    \\cmstp.exe\"))\n\n  condition:\n    $selection1\n}"
  chronicle_rule_name: cmstpexe_execution_detector_sysmon_behavior
