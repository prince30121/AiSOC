  chronicle_yaral: "rule remote_execution_via_sql_extended_stored_procedure_xp_cmdshell\
    \ {\n meta:\n    author = \"Den Iuzvyk\"\n    description = \"Detects remote execution\
    \ via sql extended stored procedure xp_cmdshell. Check events 15457, 18454, 33205\
    \ in MSSQLSERVER log for correlation.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/necXED4R7vR3\"\n    version\
    \ = \"0.01\"\n    created = \"2019/12/18\"\n    product = \"windows\"\n    service\
    \ = \"process_creation\"\n    mitre = \"defense_evasion, execution, t1218, t1204,\
    \ t1059\"\n\n  events:\n((re.regex($selection.target.process.file.full_path, `.*\\\
    \\cmd\\.exe`) or re.regex($selection.target.process.file.full_path, `.*\\\\powershell\\\
    .exe`) or re.regex($selection.target.process.file.full_path, `.*\\\\pwsh\\.exe`))\
    \ and re.regex($selection.principal.process.file.full_path, `.*\\\\sqlservr\\\
    .exe`))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: remote_execution_via_sql_extended_stored_procedure_xp_cmdshell
