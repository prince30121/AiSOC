detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule dns_query_to_recently_created_domain {\n\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"DNS query to a recently created domain\"\
    \n    rule_id = \"mr_a5cff3f1-8092-48a0-b4a3-f3f856299474\"\n    rule_name = \"\
    DNS Query To Recently Created Domain\"\n    type = \"alert\"\n    tags = \"whois\"\
    \n    data_source = \"microsoft sysmon\"\n    severity = \"Low\"\n    priority\
    \ = \"Low\"\n\n  events:\n    $dns.metadata.event_type = \"NETWORK_DNS\"\n   \
    \ $dns.network.dns.questions.name = $dns_query\n    $dns.principal.user.userid\
    \ = $user\n\n    // whois data provided by GCTI\n    $whois.graph.entity.hostname\
    \ = $dns_query\n    $whois.graph.metadata.entity_type = \"DOMAIN_NAME\"\n    $whois.graph.metadata.vendor_name\
    \ = \"WHOIS\"\n    $whois.graph.entity.domain.creation_time.seconds > 0\n    //\
    \ domain was created in the last 30 days\n    2592000 > timestamp.current_seconds()\
    \ - $whois.graph.entity.domain.creation_time.seconds\n\n  match:\n    $user over\
    \ 1h\n\n  outcome:\n   $risk_score = max(35)\n   $event_count = count_distinct($dns.metadata.id)\n\
    \   $network_dns_questions_name = array_distinct($dns.network.dns.questions.name)\n\
    \   $network_dns_answers_data = array_distinct($dns.network.dns.answers.data)\n\
    \   // added to populate alert graph with additional context\n   $principal_ip\
    \ = array_distinct($dns.principal.ip)\n   $target_ip = array_distinct($dns.target.ip)\n\
    \   $principal_process_pid = array_distinct($dns.principal.process.pid)\n   $principal_process_file_full_path\
    \ = array_distinct($dns.principal.process.file.full_path)\n   $principal_process_product_specific_process_id\
    \ = array_distinct($dns.principal.process.product_specific_process_id)\n   $principal_process_command_line\
    \ = array_distinct($dns.principal.process.command_line)\n   $principal_process_file_sha256\
    \ = array_distinct($dns.principal.process.file.sha256)\n   $principal_process_parent_process_product_specific_process_id\
    \ = array_distinct($dns.principal.process.parent_process.product_specific_process_id)\n\
    \   // Commented out principal.user.userid because it is already represented in\
    \ graph as match variable. If match changes, can uncomment to add to results\n\
    \   //$principal_user_userid = array_distinct($dns.principal.user.userid)\n\n\
    \  condition:\n    $dns and $whois\n}"
  chronicle_rule_name: dns_query_to_recently_created_domain
