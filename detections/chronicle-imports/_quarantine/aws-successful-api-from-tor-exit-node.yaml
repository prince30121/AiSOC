detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule aws_successful_api_from_tor_exit_node {\n\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Detects successful API executions from\
    \ a Tor exit node.\"\n    rule_id = \"mr_17232c2a-188e-4d6e-85b6-836cdc779655\"\
    \n    rule_name = \"AWS Successful API From Tor Exit Node\"\n    mitre_attack_tactic\
    \ = \"Execution\"\n    mitre_attack_technique = \"User Execution\"\n    mitre_attack_url\
    \ = \"https://attack.mitre.org/techniques/T1204/\"\n    mitre_attack_version =\
    \ \"v13.1\"\n    type = \"Alert\"\n    data_source = \"AWS CloudTrail\"\n    platform\
    \ = \"AWS\"\n    severity = \"High\"\n    priority = \"High\"\n\n  events:\n \
    \   $api.metadata.vendor_name = \"AMAZON\"\n    $api.metadata.product_name = \"\
    AWS CloudTrail\"\n    $api.security_result.action = \"ALLOW\"\n    $api.principal.ip\
    \ = $ip\n\n    // Tor IP listing provided by GCTI Feed\n    $gcti_feed.graph.entity.artifact.ip\
    \ = $ip\n    $gcti_feed.graph.metadata.entity_type = \"IP_ADDRESS\"\n    $gcti_feed.graph.metadata.threat.threat_feed_name\
    \ = \"Tor Exit Nodes\"\n    $gcti_feed.graph.metadata.product_name = \"GCTI Feed\"\
    \n    $gcti_feed.graph.metadata.source_type = \"GLOBAL_CONTEXT\"\n\n  match:\n\
    \    $ip over 5m\n\n  outcome:\n    $risk_score = max(\n        //Baseline\n \
    \       35 +\n        // Unauthorized geographies\n        if($api.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Cuba\", 40) +\n        if($api.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Iran\", 40) +\n        if($api.principal.ip_geo_artifact.location.country_or_region\
    \ = \"North Korea\" , 40) +\n        if($api.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Russia\", 40) +\n        if($api.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Syria\", 40)\n    )\n    $mitre_attack_tactic = \"Execution\"\n    $mitre_attack_technique\
    \ = \"User Execution\"\n    $mitre_attack_technique_id = \"T1204\"\n    $event_count\
    \ = count_distinct($api.metadata.id)\n    $network_http_user_agent = array_distinct($api.network.http.user_agent)\n\
    \    $principal_ip = array_distinct($api.principal.ip)\n    $principal_ip_country\
    \ = array_distinct($api.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($api.principal.ip_geo_artifact.location.state)\n\
    \    $principal_user_display_name = array_distinct($api.principal.user.user_display_name)\n\
    \    $dc_principal_user_display_name = count_distinct($api.principal.user.user_display_name)\n\
    \    $is_mfa_used = array_distinct($api.extensions.auth.auth_details)\n    $target_resource_name\
    \ = array_distinct($api.target.resource.name)\n    $target_resource_product_object_id\
    \ = array_distinct($api.target.resource.product_object_id)\n\n  condition:\n \
    \   $api and $gcti_feed\n}"
  chronicle_rule_name: aws_successful_api_from_tor_exit_node
