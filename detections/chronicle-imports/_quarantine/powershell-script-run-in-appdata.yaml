detection:
  chronicle_yaral: "rule powershell_script_run_in_appdata {\n meta:\n    author =\
    \ \"Florian Roth\"\n    description = \"Detects a suspicious command line execution\
    \ that invokes PowerShell with reference to an AppData folder  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/k6QPeHUNnhRg\"\n    version\
    \ = \"0.01\"\n    created = \"2019/01/09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n\n  events:\n((re.regex($selection.target.process.command_line,\
    \ `.* /c powershell.*\\\\AppData\\\\Local\\\\.*`) or re.regex($selection.target.process.command_line,\
    \ `.* /c powershell.*\\\\AppData\\\\Roaming\\\\.*`)) and ($selection.metadata.product_event_type\
    \ = \"4688\" or $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: powershell_script_run_in_appdata
