detection:
  chronicle_yaral: "/*\n * Copyright 2025 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule o365_onedrive_anonymous_link_created_updated {\n\n  meta:\n    author =\
    \ \"Google Cloud Security\"\n    description = \"Anonymous links can be used to\
    \ export files from OneDrive. While this isn't always a sign of malicious activity,\
    \ some organizations do not support the creation of anonymous links because of\
    \ the risk of data leakage. This rule detects the creation or modification of\
    \ anonymous links in OneDrive.\"\n    rule_id = \"mr_3e2572c1-cc14-4c2b-b60b-434db1b0f4ae\"\
    \n    rule_name = \"O365 OneDrive Anonymous Link Created or Updated\"\n    type\
    \ = \"hunt\"\n    platform = \"azure\"\n    data_source = \"o365\"\n    severity\
    \ = \"Medium\"\n    priority = \"Medium\"\n\n  events:\n    (\n        (\n   \
    \         $file.metadata.event_type = \"USER_RESOURCE_CREATION\" and\n       \
    \     $file.metadata.product_event_type = \"AnonymousLinkCreated\"\n        )\n\
    \    or\n        (\n            $file.metadata.event_type = \"STATUS_UPDATE\"\
    \ and\n            $file.metadata.product_event_type = \"AnonymousLinkUpdated\"\
    \n        )\n    )\n    $file.metadata.product_name = \"Office 365\"\n    $file.metadata.vendor_name\
    \ = \"Microsoft\"\n    $file.principal.user.userid = $user\n\n  match:\n    $user\
    \ over 5m\n\n  outcome:\n    $risk_score = 35\n    $event_count = count_distinct($file.metadata.id)\n\
    \    $referral_url = array_distinct($file.network.http.referral_url)\n    $user_agent\
    \ = array_distinct($file.network.http.user_agent)\n    $principal_application\
    \ = array_distinct($file.principal.application)\n    //The IP address for creation\
    \ is a Microsoft IP address while update is the system making the change\n   \
    \ $principal_ip = array_distinct($file.principal.ip)\n    $target_application\
    \ = array_distinct($file.target.application)\n    $principal_user_userid = array_distinct($file.principal.user.userid)\n\
    \    $target_file_full_path = array_distinct($file.target.file.full_path)\n  \
    \  $target_url = array_distinct($file.target.url)\n\n  condition:\n    $file\n\
    }"
  chronicle_rule_name: o365_onedrive_anonymous_link_created_updated
