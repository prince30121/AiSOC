detection:
  chronicle_yaral: "rule renamed_powershell {\n meta:\n    author = \"Florian Roth\"\
    \n    description = \"Detects the execution of a renamed PowerShell often used\
    \ by attackers or malware  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/VUM6x3MrZB0F\"\n    version\
    \ = \"0.01\"\n    created = \"2019/08/22\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"car.2013-05-009\"\n\n  events:\n(($selection.metadata.description\
    \ = \"Windows PowerShell\" and $selection.metadata.description = \"Microsoft Corporation\"\
    ) and not (re.regex($selection.target.process.file.full_path, `.*\\\\powershell\\\
    .exe`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: renamed_powershell
