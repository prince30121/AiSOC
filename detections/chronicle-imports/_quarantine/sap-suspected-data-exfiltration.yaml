detection:
  chronicle_yaral: "/*\n * Copyright 2026 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule sap_suspected_data_exfiltration {\n\n  meta:\n    author = \"Google Cloud\
    \ Security\"\n    description = \"Detects high-volume data downloads (AUY) from\
    \ SAP to a local frontend file, potentially indicating exfiltration.\"\n    severity\
    \ = \"Medium\"\n    tactic = \"TA0010\"\n    technique = \"T1041\"\n\n  events:\n\
    \    $e.metadata.product_name = \"SAP security audit\"\n\n    $e.additional.fields[\"\
    msg_1\"] = \"AUY\"\n\n    $user = $e.principal.user.userid\n\n  match:\n    $user\
    \ over 5m\n\n  outcome:\n    $event_count = count($e.metadata.product_log_id)\n\
    \    $report_used = array_distinct($e.principal.process.file.names)\n    $file_paths\
    \ = array_distinct($e.additional.fields[\"param3_1\"])\n    $total_bytes_approx\
    \ = array_distinct($e.additional.fields[\"param1_1\"])\n    $terminal_ip = array_distinct($e.principal.ip)\n\
    \    $system_id = array_distinct($e.target.application)\n\n  condition:\n    $e\
    \ and $event_count >= 10\n}"
  chronicle_rule_name: sap_suspected_data_exfiltration
provenance:
