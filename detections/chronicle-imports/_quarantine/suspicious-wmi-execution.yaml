logsource:
  product: chronicle
detection:
  chronicle_yaral: "rule suspicious_wmi_execution {\n meta:\n    author = \"Michael\
    \ Haag, Florian Roth\"\n    description = \"Detects WMI executing suspicious commands\
    \  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/LXzbbikhFDmX\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, t1047\"\n\n  events:\n(re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\wmic\\.exe`) and (re.regex($selection.target.process.command_line, `.*/NODE:.*process\
    \ call create .*`) or re.regex($selection.target.process.command_line, `.* path\
    \ AntiVirusProduct get .*`) or re.regex($selection.target.process.command_line,\
    \ `.* path FirewallProduct get .*`) or re.regex($selection.target.process.command_line,\
    \ `.* shadowcopy delete .*`)) and ($selection.metadata.product_event_type = \"\
    4688\" or $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n \
    \   $selection\n}"
  chronicle_rule_name: suspicious_wmi_execution
provenance:
