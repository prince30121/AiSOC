    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule potential_cred_dumping_via_lsass_silentprocessexit_technique {\n\n  meta:\n\
    \    author = \"Florian Roth (Nextron Systems)\"\n    description = \"Detects\
    \ changes to the Registry in which a monitor program gets registered to dump the\
    \ memory of the lsass.exe process\"\n    reference = \"https://github.com/SigmaHQ/sigma/blob/master/rules/windows/registry/registry_event/registry_event_silentprocessexit_lsass.yml\"\
    \n    license = \"https://github.com/SigmaHQ/Detection-Rule-License/blob/main/LICENSE.Detection.Rules.md\"\
    \n    rule_name = \"Potential Credential Dumping Via LSASS SilentProcessExit Technique\"\
    \n    sigma_uuid = \"55e29995-75e7-451a-bef0-6225e2f13597\"\n    sigma_status\
    \ = \"test\"\n    rule_id = \"mr_bc2279f0-9b27-485d-b392-ff6f13ae68df\"\n    tactic\
    \ = \"TA0006\"\n    technique = \"T1003.001\"\n    type = \"Detection\"\n    data_source\
    \ = \"Sysmon\"\n    platform = \"Windows\"\n    severity = \"Critical\"\n    priority\
    \ = \"Critical\"\n    false_positives = \"Unlikely\"\n\n  events:\n    $registry.metadata.event_type\
    \ = \"REGISTRY_MODIFICATION\"\n    //$registry.metadata.product_event_type = \"\
    13\"\n    strings.contains(strings.to_lower($registry.target.registry.registry_key),\
    \ \"microsoft\\\\windows nt\\\\currentversion\\\\silentprocessexit\\\\lsass.exe\"\
    )\n\n    $registry.principal.hostname = $hostname\n\n  match:\n    $hostname over\
    \ 5m\n\n  outcome:\n    //example usage of specifying test user and hostname to\
    \ adjust risk score\n    $risk_score = max(if($registry.principal.user.userid\
    \ = \"user\" and $registry.principal.hostname = \"hostname\", 0, 15))\n    $principal_hostname\
    \ = array_distinct($registry.principal.hostname)\n    $principal_process_pid =\
    \ array_distinct($registry.principal.process.pid)\n    $principal_process_file_full_path\
    \ = array_distinct($registry.principal.process.file.full_path)\n    $principal_process_product_specific_process_id\
    \ = array_distinct($registry.principal.process.product_specific_process_id)\n\
    \    $principal_user_userid = array_distinct($registry.principal.user.userid)\n\
    \    $target_registry_key = array_distinct($registry.target.registry.registry_key)\n\
    \    $target_registry_value = array_distinct($registry.target.registry.registry_value_data)\n\
    \n  condition:\n    $registry\n}"
