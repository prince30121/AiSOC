detection:
  chronicle_yaral: "rule file_deletion_via_cmd_via_cmdline {\n meta:\n    author =\
    \ \"Ariel Millahuel\"\n    description = \"Detects \\\"cmd\\\" utilization to\
    \ self-delete files in some critical Windows destinations.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/qCfuC2GC1Se7\"\n    version\
    \ = \"0.01\"\n    created = \"2019/11/20\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"defense_evasion, t1070, t1070.004\"\
    \n\n  events:\n(re.regex($selection.target.process.command_line, `.*cmd.*`) and\
    \ ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\") and (re.regex($selection.target.process.command_line, `.*/c.*`) or\
    \ re.regex($selection.target.process.command_line, `.*ping 127\\.0\\.0\\.1.*`)\
    \ or re.regex($selection.target.process.command_line, `.*&.*`) or re.regex($selection.target.process.command_line,\
    \ `.*del.*`) or re.regex($selection.target.process.command_line, `.*/f.*`) or\
    \ re.regex($selection.target.process.command_line, `.*/q.*`)) and (re.regex($selection.target.process.command_line,\
    \ `.*\\\\Windows\\\\Temp.*`) or re.regex($selection.target.process.command_line,\
    \ `.*\\\\AppData\\\\Roaming\\\\Microsoft.*`)))\n\n  condition:\n    $selection\n\
    }"
  chronicle_rule_name: file_deletion_via_cmd_via_cmdline
