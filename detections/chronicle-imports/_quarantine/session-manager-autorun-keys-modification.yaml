    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule session_manager_autorun_keys_modification {\n\n  meta:\n    author = \"\
    Victor Sergeev, Daniil Yugoslavskiy, Gleb Sukhodolskiy, Timur Zinniatullin, oscd.community,\
    \ Tim Shelton, frack113 (split)\"\n    description = \"Detects modification of\
    \ autostart extensibility point (ASEP) in registry\"\n    reference = \"https://github.com/SigmaHQ/sigma/blob/master/rules/windows/registry/registry_set/registry_set_asep_reg_keys_modification_session_manager.yml\"\
    \n    license = \"https://github.com/SigmaHQ/Detection-Rule-License/blob/main/LICENSE.Detection.Rules.md\"\
    \n    rule_name = \"Session Manager Autorun Keys Modification\"\n    rule_id =\
    \ \"mr_4ec3053f-3617-4262-93ae-838dc542610c\"\n    sigma_uuid = \"046218bd-e0d8-4113-a3c3-895a12b2b298\"\
    \n    sigma_status = \"test\"\n    tactic = \"TA0003\"\n    //tactic = \"TA0004\"\
    \n    technique = \"T1547.001\"\n    //technique = \"T1546.009\"\n    type = \"\
    Detection\"\n    data_source = \"Sysmon\"\n    platform = \"Windows\"\n    severity\
    \ = \"Medium\"\n    priority = \"Medium\"\n    false_positives = \"Legitimate\
    \ software automatically sets up autorun keys for legitimate reason\"\n\n  events:\n\
    \    $reg.metadata.event_type = \"REGISTRY_MODIFICATION\"\n    strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"system\\\\currentcontrolset\\\\control\\\\session manager\")\n    (\n    \
    \  strings.contains(strings.to_lower($reg.target.registry.registry_key), \"\\\\\
    setupexecute\") or\n      strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\s0initialcommand\") or\n      strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\knowndlls\") or\n      strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\execute\") or\n      strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\bootexecute\") or\n      strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\appcertdlls\")\n    )\n    NOT $reg.target.registry.registry_value_data\
    \ = \"(Empty)\" nocase\n\n    $reg.principal.hostname = $hostname\n\n  match:\n\
    \    $hostname over 5m\n\n  outcome:\n    //example usage of specifying test user\
    \ and hostname to adjust risk score\n    $risk_score = max(if($reg.principal.user.userid\
    \ = \"user\" and $reg.principal.hostname = \"hostname\", 0, 15))\n    $principal_hostname\
    \ = array_distinct($reg.principal.hostname)\n    $principal_process_pid = array_distinct($reg.principal.process.pid)\n\
    \    $principal_process_file_full_path = array_distinct($reg.principal.process.file.full_path)\n\
    \    $principal_process_product_specific_process_id = array_distinct($reg.principal.process.product_specific_process_id)\n\
    \    $principal_user_userid = array_distinct($reg.principal.user.userid)\n   \
    \ $target_registry_key = array_distinct($reg.target.registry.registry_key)\n \
    \   $target_registry_value_data = array_distinct($reg.target.registry.registry_value_data)\n\
    \    $log_type = array_distinct(strings.concat($reg.metadata.log_type,\"/\",$reg.metadata.product_event_type))\n\
    \n  condition:\n    $reg\n}"
  chronicle_rule_name: session_manager_autorun_keys_modification
