detection:
  chronicle_yaral: "rule ursnif_trojan_detection_cmd_obfuscation {\n meta:\n    author\
    \ = \"Emir Erdogan\"\n    description = \"Most popular banking trojan which is\
    \ called as ursnif uses obfuscated command prompt  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/phnp9PkFC7Zm\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"T1047, T1497, T1080, T1007, T1082, T1071, T1064,\
    \ T1113, T1091, T1105, T1060, T1012, T1093, T1027, T1036\"\n\n  events:\n($selection.target.process.file.full_path\
    \ = \"C:\\\\Windows\\\\System32\\\\Rundll32.exe\" and re.regex($selection.principal.process.file.full_path,\
    \ `C:\\\\Windows\\\\System32\\\\cmd\\.exe.*`) and re.regex($selection.target.process.command_line,\
    \ `.*C:\\\\ProgramData\\\\ZyGHisczAWv\\.dll,Dl^lRegi^sterSe^rver.*`))\n\n  condition:\n\
    \    $selection\n}"
