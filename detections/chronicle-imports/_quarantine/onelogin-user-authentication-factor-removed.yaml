    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule onelogin_user_authentication_factor_removed {\n\n  meta:\n    author =\
    \ \"Google Cloud Security\"\n    description = \"Detects when a user removes an\
    \ authentication factor or otp device.\"\n    rule_id = \"mr_1b251f11-1699-4707-9027-a279dea7d47e\"\
    \n    rule_name = \"OneLogin User Authentication Factor Removed\"\n    reference\
    \ = \"https://onelogin.service-now.com/kb_view_customer.do?sysparm_article=KB0010426\"\
    \n    mitre_attack_tactic = \"Defense Evasion\"\n    mitre_attack_technique =\
    \ \"Modify Authentication Process: Multi-Factor Authentication\"\n    mitre_attack_url\
    \ = \"https://attack.mitre.org/techniques/T1556/006/\"\n    mitre_attack_version\
    \ = \"v15.1\"\n    type = \"Alert\"\n    data_source = \"OneLogin\"\n    severity\
    \ = \"High\"\n    priority = \"High\"\n\n  events:\n     $user.metadata.event_type\
    \ = \"USER_RESOURCE_ACCESS\"\n     $user.metadata.product_name = \"ONELOGIN_SSO\"\
    \n     $user.metadata.vendor_name = \"ONELOGIN\"\n     $user.metadata.product_event_type\
    \ = \"24\" //otp_device deregistered for user\n\n  outcome:\n    $risk_score =\
    \ max(75)\n    $mitre_attack_tactic = \"Defense Evasion\"\n    $mitre_attack_technique\
    \ = \"Modify Authentication Process: Multi-Factor Authentication\"\n    $principal_user_userid\
    \ = array_distinct($user.principal.user.userid)\n    $principal_user_user_display_name\
    \ = array_distinct($user.principal.user.user_display_name)\n    $principal_user_email_addresses\
    \ = array_distinct($user.principal.user.email_addresses)\n    $principal_ip =\
    \ array_distinct($user.principal.ip)\n    $principal_ip_country = array_distinct($user.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($user.principal.ip_geo_artifact.location.state)\n\
    \    $target_user_userid = array_distinct($user.target.user.userid)\n    $otp_device_name\
    \ = array_distinct($user.additional.fields[\"otp_device_name\"])\n\n  condition:\n\
    \    $user\n}"
  chronicle_rule_name: onelogin_user_authentication_factor_removed
