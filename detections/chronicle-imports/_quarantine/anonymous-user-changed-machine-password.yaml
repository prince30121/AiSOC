detection:
  chronicle_yaral: "rule anonymous_user_changed_machine_password {\n meta:\n    author\
    \ = \"SOC Prime Team\"\n    description = \"Detects Anonymous Users Changing Machine\
    \ Password. This is the behavior of many zerologon POCs. This behavior must be\
    \ correlated with windows events - 4624/5829 or IDS events, like Zeek.  License:\
    \ https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\n\
    \    reference = \"https://tdm.socprime.com/tdm/info/EPl2OKBmxbJ6\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"security\"\n    mitre = \"lateral_movement, t1210\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"4742\" and re.regex($selection.target.user.user_display_name, `.*$`) and\
    \ (re.regex($selection.principal.user.user_display_name, `.*anonymous.*`) or re.regex($selection.principal.user.userid,\
    \ `.*S-1-0.*`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: anonymous_user_changed_machine_password
