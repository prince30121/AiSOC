id: chronicle-detection-rules-aws-unusual-number-of-failed-authentications-from-the-same-ip
name: aws_unusual_number_of_failed_authentications_from_the_same_ip
description: aws_unusual_number_of_failed_authentications_from_the_same_ip
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
