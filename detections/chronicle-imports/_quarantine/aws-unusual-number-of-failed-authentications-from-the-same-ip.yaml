detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule aws_unusual_number_of_failed_authentications_from_the_same_ip {\n\n  meta:\n\
    \    author = \"Google Cloud Security\"\n    description = \"Detects unusual number\
    \ of failed authentications from the same IP for valid users.\"\n    rule_id =\
    \ \"mr_cf1787a4-0145-4093-ad35-2de17f1980ce\"\n    rule_name = \"AWS Unusual Number\
    \ Of Failed Authentication Attempts From The Same IP\"\n    mitre_attack_tactic\
    \ = \"Credential Access\"\n    mitre_attack_technique = \"Brute Force: Credential\
    \ Stuffing\"\n    mitre_attack_url = \"https://attack.mitre.org/techniques/T1110/004/\"\
    \n    mitre_attack_version = \"v13.1\"\n    type = \"Alert\"\n    data_source\
    \ = \"AWS CloudTrail\"\n    platform = \"AWS\"\n    severity = \"Medium\"\n  \
    \  priority = \"Medium\"\n\n  events:\n    $fail.metadata.vendor_name = \"AMAZON\"\
    \n    $fail.metadata.product_name = \"AWS CloudTrail\"\n    $fail.metadata.event_type\
    \ = \"USER_LOGIN\"\n    $fail.metadata.product_event_type = \"ConsoleLogin\"\n\
    \    $fail.security_result.action = \"BLOCK\"\n    $fail.security_result.description\
    \ = \"Reason: Failed authentication\"\n    $fail.principal.ip = $ip\n\n  match:\n\
    \    $ip over 5m\n\n  outcome:\n    $risk_score = max(\n        // Unauthorized\
    \ geographies\n        if($fail.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Cuba\", 40) +\n        if($fail.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Iran\", 40) +\n        if($fail.principal.ip_geo_artifact.location.country_or_region\
    \ = \"North Korea\" , 40) +\n        if($fail.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Russia\", 40) +\n        if($fail.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Syria\", 40)\n    )\n    $mitre_attack_tactic = \"Credential Access\"\n\
    \    $mitre_attack_technique = \"Brute Force: Credential Stuffing\"\n    $mitre_attack_technique_id\
    \ = \"T1110.004\"\n    $event_count = count_distinct($fail.metadata.id)\n    $network_http_user_agent\
    \ = array_distinct($fail.network.http.user_agent)\n    $principal_ip = array_distinct($fail.principal.ip)\n\
    \    $principal_ip_country = array_distinct($fail.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($fail.principal.ip_geo_artifact.location.state)\n\
    \    $principal_user_display_name = array_distinct($fail.principal.user.user_display_name)\n\
    \    $dc_target_user_display_name = count_distinct($fail.target.user.user_display_name)\n\
    \    $is_mfa_used = array_distinct($fail.extensions.auth.auth_details)\n    $target_resource_name\
    \ = array_distinct($fail.target.resource.name)\n    $target_resource_product_object_id\
    \ = array_distinct($fail.target.resource.product_object_id)\n\n  condition:\n\
    \    $fail and $dc_target_user_display_name > 5\n}"
  chronicle_rule_name: aws_unusual_number_of_failed_authentications_from_the_same_ip
