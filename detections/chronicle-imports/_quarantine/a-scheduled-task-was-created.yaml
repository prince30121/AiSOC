detection:
  chronicle_yaral: "rule a_scheduled_task_was_created {\n meta:\n    author = \"Florian\
    \ Roth(original) Lee Archinal(Updated)\"\n    description = \"This detectes when\
    \ a registry key is set under \\\\SOFTWARE\\\\Microsoft\\\\Windows NT\\\\CurrentVersion\\\
    \\Schedule\\\\TaskCache\\\\Tasks\\\\  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/nnJBPo7RT9Rh\"\n    version\
    \ = \"0.01\"\n    created = \"2019/04/30\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"execution, persistence, privelege_escalation, t1053,\
    \ s0111\"\n\n  events:\n((($selection1.metadata.product_event_type = \"1\" and\
    \ re.regex($selection1.target.process.file.full_path, `.*\\\\schtasks\\.exe`)\
    \ and re.regex($selection1.target.process.command_line, `.* /create .*`)) or ($selection1.metadata.product_event_type\
    \ = \"12\" and $selection1.target.process.file.full_path = \"C:\\\\Windows\\\\\
    System32\\\\schtasks.exe\")) or ($selection1.metadata.product_event_type = \"\
    13\" and re.regex($selection1.target.registry.registry_key, `.*\\\\Schedule\\\\\
    TaskCache\\\\Tasks\\\\`)))\n\n  condition:\n    $selection1\n}"
