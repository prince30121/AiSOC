detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule google_workspace_external_user_added_to_group {\n\n  meta:\n    author\
    \ = \"Google Cloud Security\"\n    description = \"Identifies when an external\
    \ user account is added to a group in Google Workspace. Security teams can monitor\
    \ for unexpected user accounts being added to Google Workspace groups to prevent\
    \ unauthorized access to data.\"\n    rule_id = \"mr_c64af222-e029-4add-ac9c-b9285c5eb135\"\
    \n    rule_name = \"Google Workspace External User Added To Group\"\n    mitre_attack_tactic\
    \ = \"Initial Access\"\n    mitre_attack_technique = \"Valid Accounts: Cloud Accounts\"\
    \n    mitre_attack_url = \"https://attack.mitre.org/techniques/T1078/004/\"\n\
    \    mitre_attack_version = \"v13.1\"\n    type = \"Alert\"\n    data_source =\
    \ \"Workspace Activity\"\n    severity = \"Medium\"\n    priority = \"Medium\"\
    \n\n  events:\n    $ws.metadata.vendor_name = \"Google Workspace\"\n    $ws.metadata.product_name\
    \ = \"admin\"\n    $ws.metadata.event_type = \"GROUP_MODIFICATION\"\n    $ws.metadata.product_event_type\
    \ = \"ADD_GROUP_MEMBER\"\n\n    $group_domain = re.capture($ws.target.group.email_addresses,\
    \ `@[a-zA-Z0-9\\.]*`)\n    $user_domain = re.capture($ws.src.user.email_addresses,\
    \ `@[a-zA-Z0-9\\.]*`)\n\n    $group_domain != $user_domain\n\n  outcome:\n   \
    \ $risk_score = max(35)\n    $mitre_attack_tactic = \"Initial Access\"\n    $mitre_attack_technique\
    \ = \"Valid Accounts: Cloud Accounts\"\n    $mitre_attack_technique_id = \"T1078.004\"\
    \n    $event_count = count_distinct($ws.metadata.id)\n    $target_group_domain\
    \ = $group_domain\n    $src_user_domain = $user_domain\n    $target_group_emails\
    \ = array_distinct($ws.target.group.email_addresses)\n    $src_user_emails = array_distinct($ws.src.user.email_addresses)\n\
    \    $principal_ip = array_distinct($ws.principal.ip)\n    $principal_country\
    \ = array_distinct($ws.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_state = array_distinct($ws.principal.ip_geo_artifact.location.state)\n\
    \    $principal_user_emails = array_distinct($ws.principal.user.email_addresses)\n\
    \    $principal_user_id = $ws.principal.user.userid\n\n  condition:\n    $ws\n\
    }"
  chronicle_rule_name: google_workspace_external_user_added_to_group
