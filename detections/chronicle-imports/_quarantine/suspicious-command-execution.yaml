detection:
  chronicle_yaral: "rule suspicious_command_execution {\n meta:\n    author = \"Den\
    \ Iuzvyk\"\n    description = \"Detects suspicious command execution  License:\
    \ https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\n\
    \    reference = \"https://tdm.socprime.com/tdm/info/HkEeVAuNeql1\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, t1204, t1059\"\n\n  events:\n\
    (re.regex($selection.target.process.file.full_path, `.*\\\\cmd\\.exe`) and re.regex($selection.target.process.command_line,\
    \ `.*rd.*`) and re.regex($selection.target.process.command_line, `.*/s.*`) and\
    \ re.regex($selection.target.process.command_line, `.*/q.*`) and re.regex($selection.target.process.command_line,\
    \ `.*timeout.*`) and re.regex($selection.target.process.command_line, `.* del\
    \ .*`) and re.regex($selection.target.process.command_line, `.*\\.exe.*`) and\
    \ ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: suspicious_command_execution
