detection:
  chronicle_yaral: "rule detection_of_powershell_execution_via_dll {\n meta:\n   \
    \ author = \"Markus Neis\"\n    description = \"Detects PowerShell Strings applied\
    \ to rundllas seen in PowerShdll.dll  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/YGMicuRcvEJn\"\n    version\
    \ = \"0.01\"\n    created = \"2018/08/25\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, t1086\"\n\n  events:\n(($selection1.metadata.product_event_type\
    \ = \"4688\" or $selection1.metadata.product_event_type = \"1\") and (re.regex($selection1.target.process.file.full_path,\
    \ `.*\\\\rundll32\\.exe`) or re.regex($selection1.metadata.description, `.*Windows-Hostprozess\
    \ \\(Rundll32\\).*`)) and (re.regex($selection1.target.process.command_line, `.*Default\\\
    .GetString.*`) or re.regex($selection1.target.process.command_line, `.*FromBase64String.*`)))\n\
    \n  condition:\n    $selection1\n}"
  chronicle_rule_name: detection_of_powershell_execution_via_dll
