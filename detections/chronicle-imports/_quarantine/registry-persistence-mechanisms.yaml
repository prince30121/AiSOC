detection:
  chronicle_yaral: "rule registry_persistence_mechanisms {\n meta:\n    author = \"\
    Karneades\"\n    description = \"Detects persistence registry keys  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/Z4YGSHNopjyZ\"\n    version\
    \ = \"0.01\"\n    created = \"2018/04/11\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"privilege_escalation, persistence, defense_evasion,\
    \ t1183, car.2013-01-002\"\n\n  events:\n($selection_reg1.metadata.product_event_type\
    \ = \"13\" and (re.regex($selection_reg1.target.registry.registry_key, `.*\\\\\
    SOFTWARE\\\\Microsoft\\\\Windows NT\\\\CurrentVersion\\\\Image File Execution\
    \ Options.*\\\\GlobalFlag`) or re.regex($selection_reg1.target.registry.registry_key,\
    \ `.*\\\\SOFTWARE\\\\Microsoft\\\\Windows NT\\\\CurrentVersion\\\\SilentProcessExit.*\\\
    \\ReportingMode`) or re.regex($selection_reg1.target.registry.registry_key, `.*\\\
    \\SOFTWARE\\\\Microsoft\\\\Windows NT\\\\CurrentVersion\\\\SilentProcessExit.*\\\
    \\MonitorProcess`)) and $selection_reg1.metadata.event_type = \"SetValue\")\n\n\
    \  condition:\n    $selection_reg1\n}"
  chronicle_rule_name: registry_persistence_mechanisms
