id: chronicle-detection-rules-hostdomain-enumeration-with-wmic
name: hostdomain_enumeration_with_wmic
description: hostdomain_enumeration_with_wmic
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "rule hostdomain_enumeration_with_wmic {\n meta:\n    author =\
    \ \"Osman Demir\"\n    description = \"Detects the Host/Domain Enumeration Attempts.\
    \  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/tZIBjTZedRxS\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"discovery, T1082, T1083, T1087\"\n\n  events:\n\
    (($selection.target.process.file.full_path = \"cmd.exe\" or $selection.target.process.file.full_path\
    \ = \"powershell.exe\") and ($selection.target.process.command_line = \"wmic os\
    \ LIST Full\" or $selection.target.process.command_line = \"wmic computersystem\
    \ LIST full\" or $selection.target.process.command_line = \"wmic /namespace:\\\
    \\\\\\root\\\\securitycenter2 path antivirusproduct\" or $selection.target.process.command_line\
    \ = \"wmic path Win32_PnPdevice\" or $selection.target.process.command_line =\
    \ \"wmic qfe list brief\" or re.regex($selection.target.process.command_line,\
    \ `wmic DATAFILE where \\\"path='\\\\\\\\Users\\\\\\\\test\\\\\\\\Documents\\\\\
    \\\\'\\\" GET .*`) or re.regex($selection.target.process.command_line, `wmic DATAFILE\
    \ where \\\"drive='C:' AND Name like '%password%'\\\" GET .*`) or re.regex($selection.target.process.command_line,\
    \ `wmic USERACCOUNT Get .*`) or $selection.target.process.command_line = \"wmic\
    \ NTDOMAIN GET DomainControllerAddress,DomainName,Roles /VALUE\" or re.regex($selection.target.process.command_line,\
    \ `wmic /NAMESPACE:\\\\\\\\root\\\\directory\\\\ldap PATH ds_user where .*`) or\
    \ $selection.target.process.command_line = \"wmic /NAMESPACE:\\\\\\\\root\\\\\
    directory\\\\ldap PATH ds_user GET ds_samaccountname\" or $selection.target.process.command_line\
    \ = \"wmic /NAMESPACE:\\\\\\\\root\\\\directory\\\\ldap PATH ds_group GET ds_samaccountname\"\
    \ or $selection.target.process.command_line = \"wmic /NAMESPACE:\\\\\\\\root\\\
    \\directory\\\\ldap PATH ds_group where \\\"ds_samaccountname='Domain Admins'\\\
    \" Get     ds_member /Value\" or re.regex($selection.target.process.command_line,\
    \ `wmic path win32_groupuser where \\(groupcomponent=\\\"win32_group\\.name=\\\
    \"domain admins\\\",domain .*\\\"\\)`) or $selection.target.process.command_line\
    \ = \"wmic /NAMESPACE:\\\\\\\\root\\\\directory\\\\ldap PATH ds_computer GET ds_samaccountname\"\
    \ or $selection.target.process.command_line = \"wmic /NAMESPACE:\\\\\\\\root\\\
    \\directory\\\\ldap PATH ds_computer GET ds_dnshostname\"))\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: hostdomain_enumeration_with_wmic
