detection:
  chronicle_yaral: "rule nemty_ransomware_lolbins_abuse {\n meta:\n    author = \"\
    Ariel Millahuel\"\n    description = \"Detects an attempt of Nemty Ransmoware\
    \ in order to abuse LOLBins via command-line parameters  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/U4PcKi5sLUuE\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, T1197, S0190\"\n\n  events:\n\
    (($selection1.metadata.product_event_type = \"4688\" or $selection1.metadata.product_event_type\
    \ = \"1\") and (($selection1.target.process.file.full_path = \"cmd.exe\" and (re.regex($selection1.target.process.command_line,\
    \ ` /c bitsadmin /transfer getitman /download /priority high http.*://.*\\..*\\\
    ..*\\..*/jp\\.exe %temp%.*\\.exe&start %temp%.*\\.exe,0,.*`) or re.regex($selection1.target.process.command_line,\
    \ ` /c bitsadmin /transfer getitman /download /priority high https://.*\\..*\\\
    ..*\\..*/.*\\.exe %temp%.*\\.exe&start %temp%.*\\.exe,0,.*`))) or ($selection1.target.process.file.full_path\
    \ = \"bitsadmin.exe\" and (re.regex($selection1.target.process.command_line, `\
    \ bitsadmin /transfer getitman /download /priority high http://.*\\..*\\..*\\\
    ..*/jp\\.exe %temp%.*\\.exe&start %temp%.*\\.exe,0,.*`) or re.regex($selection1.target.process.command_line,\
    \ ` bitsadmin /transfer getitman /download /priority high https://.*\\..*\\..*\\\
    ..*/.*\\.exe %temp%.*\\.exe&start %temp%.*\\.exe,0,.*`)))))\n\n  condition:\n\
    \    $selection1\n}"
