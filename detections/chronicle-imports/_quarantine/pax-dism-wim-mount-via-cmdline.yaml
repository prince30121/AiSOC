    \n    reference = \"https://tdm.socprime.com/tdm/info/6jghgqKDHRlA\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"credential_access, t1552, t1552.001\"\
    \n\n  events:\n(re.regex($selection.target.process.command_line, `.*WimFile.*`)\
