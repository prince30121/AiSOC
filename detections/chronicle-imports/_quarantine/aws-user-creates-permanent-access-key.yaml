    \nrule aws_user_creates_permanent_access_key {\n\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Detects when an AWS IAM user creates an\
    \ AWS Access Key for programmatic calls.\"\n    rule_id = \"mr_ebe72ce0-1e54-4251-afca-ed3fc403cd1f\"\
    \n    rule_name = \"AWS User Creates Permanent Access Key\"\n    mitre_attack_tactic\
    \ = \"Defense Evasion, Persistence, Privilege Escalation, Initial Access\"\n \
    \   mitre_attack_technique = \"Valid Accounts: Cloud Accounts\"\n    mitre_attack_url\
    \ = \"https://attack.mitre.org/techniques/T1078/004/\"\n    mitre_attack_version\
    \ = \"v13.1\"\n    type = \"Alert\"\n    data_source = \"AWS CloudTrail\"\n  \
    \  platform = \"AWS\"\n    severity = \"Medium\"\n    priority = \"Medium\"\n\n\
    \  events:\n    $cloudtrail.metadata.vendor_name = \"AMAZON\"\n    $cloudtrail.metadata.product_name\
    \ = \"AWS CloudTrail\"\n    $cloudtrail.metadata.product_event_type = \"CreateAccessKey\"\
    \n    $cloudtrail.security_result.action = \"ALLOW\"\n\n  outcome:\n    $risk_score\
    \ = max(50)\n    $mitre_attack_tactic = \"Defense Evasion, Persistence, Privilege\
    \ Escalation, Initial Access\"\n    $mitre_attack_technique = \"Valid Accounts:\
    \ Cloud Accounts\"\n    $mitre_attack_technique_id = \"T1078.004\"\n    $event_count\
    \ = count_distinct($cloudtrail.metadata.id)\n    $network_http_user_agent = $cloudtrail.network.http.user_agent\n\
    \    $principal_ip = array_distinct($cloudtrail.principal.ip)\n    $principal_ip_country\
    \ = array_distinct($cloudtrail.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($cloudtrail.principal.ip_geo_artifact.location.state)\n\
    \    $principal_user_display_name = $cloudtrail.principal.user.user_display_name\n\
    \    $recipient_aws_account_id = $cloudtrail.additional.fields[\"recipientAccountId\"\
    ]\n    $aws_region = $cloudtrail.principal.location.name\n    $target_resource_name\
    \ = $cloudtrail.target.resource.name\n    $target_resource_product_object_id =\
    \ $cloudtrail.target.resource.product_object_id\n\n  condition:\n    $cloudtrail\n\
    }"
