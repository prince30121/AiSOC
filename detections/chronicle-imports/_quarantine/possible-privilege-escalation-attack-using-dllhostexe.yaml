detection:
  chronicle_yaral: "rule possible_privilege_escalation_attack_using_dllhostexe {\n\
    \ meta:\n    author = \"Ariel Millahuel\"\n    description = \"Detects two processes\
    \ that uses dllhost after an UAC Bypass was done. If you detect this activity\
    \ in your environment you probably was victim of attackrs and potentially of the\
    \ LockBit Ransomware  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/85JVc4DzNZV7\"\n    version\
    \ = \"0.01\"\n    created = \"2019/12/11\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"t1218, t1218.003, defense_evasion\"\
    \n\n  events:\n(re.regex($selection.target.process.file.full_path, `.*dllhost\\\
    .exe`) and (re.regex($selection.target.process.command_line, `.*Windows\\\\.*\\\
    \\DllHost\\.exe /Processid:{3E5FC7F9-9A51-4367-9063-A120244FBEC7}.*`) or re.regex($selection.target.process.command_line,\
    \ `.*Windows\\\\.*\\\\DllHost\\.exe /Processid:{D2E7041B-2927-42fb-8E9F-7CE93B6DC937}.*`))\
    \ and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: possible_privilege_escalation_attack_using_dllhostexe
