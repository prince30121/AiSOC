    \ {\n meta:\n    author = \"Thomas Patzke\"\n    description = \"Detects execution\
    \ of ntdsutil.exe, which can be used for various attacks against the NTDS database\
    \ (NTDS.DIT)  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/WeCGGZ763x50\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"credential_access, t1003\"\n\n  events:\n\
    (re.regex($selection.target.process.command_line, `.*\\\\ntdsutil.*`) and ($selection.metadata.product_event_type\
    \ = \"4688\" or $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n\
    \    $selection\n}"
