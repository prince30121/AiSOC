detection:
  chronicle_yaral: "rule antivirus_password_dumper_detection {\n meta:\n    author\
    \ = \"Florian Roth\"\n    description = \"Detects a highly relevant Antivirus\
    \ alert that reports a password dumper  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/19PqnATdEYMc\"\n    version\
    \ = \"0.01\"\n    created = \"2018/09/09\"\n    product = \"antivirus\"\n    mitre\
    \ = \"credential_access, t1003\"\n\n  events:\n(re.regex($selection.target.registry.registry_value_data,\
    \ `.*DumpCreds.*`) or re.regex($selection.target.registry.registry_value_data,\
    \ `.*Mimikatz.*`) or re.regex($selection.target.registry.registry_value_data,\
    \ `.*PWCrack.*`) or $selection.target.registry.registry_value_data = \"HTool/WCE\"\
    \ or re.regex($selection.target.registry.registry_value_data, `.*PSWtool.*`) or\
    \ re.regex($selection.target.registry.registry_value_data, `.*PWDump.*`))\n\n\
    \  condition:\n    $selection\n}"
  chronicle_rule_name: antivirus_password_dumper_detection
