id: chronicle-detection-rules-github-application-installed
name: github_application_installed
description: github_application_installed
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "/*\n * Copyright 2024 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule github_application_installed {\n\n  meta:\n    author = \"Google Cloud\
    \ Security\"\n    description = \"Detects when a GitHub application is installed\
    \ within an organization. An untrusted application can be installed and granted\
    \ permissions to access data within a GitHub organization.\"\n    rule_id = \"\
    mr_d1c8d420-774f-4fab-af11-2e5cac2023b2\"\n    rule_name = \"GitHub Application\
    \ Installed\"\n    assumption = \"Your GitHub enterprise audit log settings are\
    \ configured to log the source IP address for events. Reference: https://docs.github.com/en/organizations/keeping-your-organization-secure/managing-security-settings-for-your-organization/displaying-ip-addresses-in-the-audit-log-for-your-organization\"\
    \n    type = \"alert\"\n    severity = \"Low\"\n    priority = \"Low\"\n    platform\
    \ = \"GitHub\"\n    data_source = \"github\"\n    reference = \"https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/audit-log-events-for-your-enterprise\"\
    \n\n  events:\n    $github.metadata.vendor_name = \"GITHUB\" nocase\n    $github.metadata.product_name\
    \ = \"GITHUB\"\n    $github.metadata.product_event_type = \"integration_installation.create\"\
    \n\n  outcome:\n    $risk_score = max(35)\n    $principal_ip = array_distinct($github.principal.ip)\n\
    \    $principal_user_userid = array_distinct($github.principal.user.userid)\n\
    \    $principal_ip_country = array_distinct($github.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($github.principal.ip_geo_artifact.location.state)\n\
    \    $principal_ip_city = array_distinct($github.principal.location.city)\n  \
    \  $security_result_summary = array_distinct($github.security_result.summary)\n\
    \n  condition:\n    $github\n}"
  chronicle_rule_name: github_application_installed
provenance:
  source: chronicle/detection-rules
  source_id: github_application_installed
  source_commit: 74dd490
  license: Apache-2.0
  license_url: https://github.com/chronicle/detection-rules/blob/main/LICENSE
  imported_at: '2026-05-04'
  imported_by: chronicle_importer
  upstream_path: rules/community/github/github_application_installed.yaral
notes:
