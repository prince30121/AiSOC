detection:
  chronicle_yaral: "/*\n * Copyright 2026 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule sap_deactivation_of_security_audit_log {\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Detects the deactivation of the SAP Security\
    \ Audit Log (AUJ). This is a critical event as it stops further security logging.\"\
    \n    severity = \"Critical\"\n    tactic = \"TA0005\"\n    technique = \"T1562\"\
    \n\n  events:\n    $e.metadata.log_type = \"SAP_SECURITY_AUDIT\"\n\n    $e.additional.fields[\"\
    msg_1\"] = \"AUJ\"\n\n    $e.additional.fields[\"param1_1\"] = \"0\"\n\n    $sid\
    \ = $e.target.application\n    $user = $e.principal.user.userid\n\n  match:\n\
    \    $sid over 1h\n\n  outcome:\n    $risk_score = 95\n    $source_user = array_distinct($user)\n\
    \    $terminal_ip = array_distinct($e.principal.ip)\n    $target_sid = array_distinct($sid)\n\
    \    $client = array_distinct($e.target.resource.attribute.labels[\"slgmand_1\"\
    ])\n    $instance = array_distinct($e.target.resource.name)\n    $report_name\
    \ = array_distinct($e.principal.process.file.names)\n    $log_description = array_distinct($e.metadata.description)\n\
    \n  condition:\n    $e\n}"
  chronicle_rule_name: sap_deactivation_of_security_audit_log
