  chronicle_yaral: "rule netsh_rdp_port_forwarding {\n meta:\n    author = \"Florian\
    \ Roth\"\n    description = \"Detects netsh commands that configure a port forwarding\
    \ of port 3389 used for RDP.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/YIsKEJkoUCKj\"\n    version\
    \ = \"0.01\"\n    created = \"2019/01/29\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"lateral_movement\"\n\n  events:\n(re.regex($selection.target.process.command_line,\
    \ `netsh i.* p.*=3389 c.*`) and ($selection.metadata.product_event_type = \"4688\"\
    \ or $selection.metadata.product_event_type = \"1\"))\n\n  condition:\n    $selection\n\
    }"
