severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "rule suspicious_certutil_command {\n meta:\n    author = \"Florian\
    \ Roth, juju4, keepwatch\"\n    description = \"Detects a suspicious Microsoft\
    \ certutil execution with sub commands like 'decode' sub command, which is sometimes\
    \ used to decode malicious code with the built-in certutil utility  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/U9NlSjqYrWvZ\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"defense_evasion, t1140, t1105, s0189,\
    \ g0007\"\n\n  events:\n((re.regex($selection.target.process.command_line, `.*\
    \ -decode .*`) or re.regex($selection.target.process.command_line, `.* /decode\
    \ .*`) or re.regex($selection.target.process.command_line, `.* -decodehex .*`)\
    \ or re.regex($selection.target.process.command_line, `.* /decodehex .*`) or re.regex($selection.target.process.command_line,\
    \ `.* -urlcache .*`) or re.regex($selection.target.process.command_line, `.* /urlcache\
    \ .*`) or re.regex($selection.target.process.command_line, `.* -verifyctl .*`)\
    \ or re.regex($selection.target.process.command_line, `.* /verifyctl .*`) or re.regex($selection.target.process.command_line,\
    \ `.* -encode .*`) or re.regex($selection.target.process.command_line, `.* /encode\
    \ .*`) or re.regex($selection.target.process.command_line, `.*certutil.* -URL.*`)\
    \ or re.regex($selection.target.process.command_line, `.*certutil.* /URL.*`) or\
    \ re.regex($selection.target.process.command_line, `.*certutil.* -ping.*`) or\
    \ re.regex($selection.target.process.command_line, `.*certutil.* /ping.*`)) and\
    \ ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: suspicious_certutil_command
