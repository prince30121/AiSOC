    \  product = \"windows\"\n    mitre = \"persistence, privilege_escalation, defense_evasion,\
    \ t1574, t1574.001\"\n\n  events:\n(re.regex($selection.target.process.file.full_path,\
    \ `.*LIBVLC\\.dll.*`) and re.regex($selection.target.process.file.full_path, `.*videolan.*`))\n\
    \n  condition:\n    $selection\n}"
