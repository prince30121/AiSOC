    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule o365_entra_id_client_secret_add_update_delete_in_app {\n\n  meta:\n   \
    \ author = \"Google Cloud Security\"\n    description = \"Secrets added to applications\
    \ have legitimate purposes, but can also be a method of persistence. This alert\
    \ will trigger on creation, modification or delete of a client secret\"\n    rule_id\
    \ = \"mr_24ac7907-9d86-4089-901c-61f8ff1e7730\"\n    rule_name = \"O365 Entra\
    \ ID App Client Secret Added, Updated or Deleted\"\n    tactic = \"TA0003\"\n\
    \    technique = \"T1098.001\"\n    type = \"alert\"\n    platform = \"azure\"\
    \n    data_source = \"o365\"\n    severity = \"Medium\"\n    priority = \"Medium\"\
    \n\n  events:\n    $app.metadata.event_type = \"USER_RESOURCE_UPDATE_CONTENT\"\
    \n    $app.metadata.product_name = \"Office 365\"\n    $app.metadata.product_event_type\
    \ = /Update application.*Certificates and secrets management/\n    $app.metadata.vendor_name\
    \ = \"Microsoft\"\n    $app.security_result.action = \"ALLOW\"\n    $app.principal.user.userid\
    \ = $userid\n\n  match:\n    $userid over 5m\n\n  outcome:\n    $risk_score =\
    \ 65\n    $event_count = count_distinct($app.metadata.id)\n    $security_summary\
    \ = array_distinct($app.security_result.summary)\n    $user_agent = array_distinct($app.network.http.user_agent)\n\
    \    $target_entra_id_application = array_distinct(re.capture($app.network.http.user_agent,`\\\
    \"AppId\\\":\\\"(.*)`))\n    //added to populate alert graph with additional context\n\
    \    $principal_user_userid = array_distinct($app.principal.user.userid)\n\n \
    \ condition:\n    $app\n}"
