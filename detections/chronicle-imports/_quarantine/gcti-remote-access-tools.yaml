id: chronicle-detection-rules-gcti-remote-access-tools
name: gcti_remote_access_tools
description: gcti_remote_access_tools
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule gcti_remote_access_tools {\n\n  meta:\n    author = \"Google Cloud Security\"\
    \n    description = \"Alert process and file create events that are associated\
    \ with hashes from the GCTI Remote Access Tool list\"\n    rule_id = \"mr_d838d64d-4a6f-4999-a895-0b5771d02aa6\"\
    \n    rule_name = \"GCTI Remote Access Tools\"\n    tactic = \"TA0011\"\n    technique\
    \ = \"T1219\"\n    type = \"alert\"\n    tags = \"rat\"\n    data_source = \"\
    crowdstrike, microsoft sysmon, microsoft defender atp\"\n    severity = \"High\"\
    \n    priority = \"High\"\n\n    events:\n    // find a process launch event\n\
    \    ($process.metadata.event_type = \"PROCESS_LAUNCH\" or $process.metadata.event_type\
    \ = \"PROCESS_MODULE_LOAD\" or $process.metadata.event_type = \"PROCESS_UNCATEGORIZED\"\
    \ or $process.metadata.event_type = \"FILE_CREATION\")\n    $process.target.process.file.sha256\
    \ != \"\"\n    $process.target.process.file.sha256 = $rat_hash\n    $process.principal.hostname\
    \ = $hostname\n\n    // join graph and event hashes\n    $gcti.graph.entity.file.sha256\
    \ = $rat_hash\n\n    // look for files identified as likely remote access tools\n\
    \    $gcti.graph.metadata.entity_type = \"FILE\"\n    $gcti.graph.metadata.vendor_name\
    \ = \"Google Cloud Threat Intelligence\"\n    $gcti.graph.metadata.product_name\
    \ = \"GCTI Feed\"\n    $gcti.graph.metadata.source_type = \"GLOBAL_CONTEXT\"\n\
    \    $gcti.graph.metadata.threat.threat_feed_name = \"Remote Access Tools\"\n\n\
    \  match:\n    $hostname over 5m\n\n  outcome:\n    $risk_score = 65\n    $event_count\
    \ = count_distinct($process.metadata.id)\n    // added to populate alert graph\
    \ with additional context\n    // Commented out principal.hostname because it\
    \ is already represented in graph as match variable. If match changes, can uncomment\
    \ to add to results\n    //$principal_hostname = array_distinct($process.principal.hostname)\n\
    \    $principal_process_pid = array_distinct($process.principal.process.pid)\n\
    \    $principal_process_command_line = array_distinct($process.principal.process.command_line)\n\
    \    $principal_process_file_sha256 = array_distinct($process.principal.process.file.sha256)\n\
    \    $principal_process_file_full_path = array_distinct($process.principal.process.file.full_path)\n\
    \    $principal_process_product_specific_process_id = array_distinct($process.principal.process.product_specific_process_id)\n\
    \    $principal_process_parent_process_product_specific_process_id = array_distinct($process.principal.process.parent_process.product_specific_process_id)\n\
    \    $target_process_pid = array_distinct($process.target.process.pid)\n    $target_process_command_line\
    \ = array_distinct($process.target.process.command_line)\n    $target_process_file_sha256\
    \ = array_distinct($process.target.process.file.sha256)\n    $target_process_file_full_path\
    \ = array_distinct($process.target.process.file.full_path)\n    $target_process_product_specific_process_id\
    \ = array_distinct($process.target.process.product_specific_process_id)\n    $target_process_parent_process_product_specific_process_id\
    \ = array_distinct($process.target.process.parent_process.product_specific_process_id)\n\
    \    $target_file_full_path = array_distinct($process.target.file.full_path)\n\
    \    $principal_user_userid = array_distinct($process.principal.user.userid)\n\
    \    $target_resource_name = array_distinct($process.target.resource.name)\n\n\
    \  condition:\n    $process and $gcti\n}"
  chronicle_rule_name: gcti_remote_access_tools
