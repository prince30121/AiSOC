id: chronicle-detection-rules-hacktool-ironsharp-pack-execution
name: hacktool_ironsharp_pack_execution
description: hacktool_ironsharp_pack_execution
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
