detection:
  chronicle_yaral: "/*\n * Copyright 2025 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule hacktool_ironsharp_pack_execution {\n\n    meta:\n      author = \"Georg\
    \ Lauenstein - suresecure GmbH\"\n      description = \"Detects the execution\
    \ of known attacker tools, including but not limited to those in the IronSharpPack\
    \ toolset. These tools are commonly used for offensive security operations and\
    \ may indicate malicious activity if observed in unauthorized environments.\"\n\
    \      rule_id = \"mr_34f2ecef-cd3e-4dee-9c83-b7a9ec34becc\"\n      rule_name\
    \ = \"Hacktool - IronSharpPack Execution\"\n      tactic = \"TA0002\"\n      technique\
    \ = \"T1059\"\n      references = \"https://github.com/BC-SECURITY/IronSharpPack\"\
    \n      type = \"alert\"\n      platform = \"Linux, Windows, EDR\"\n      data_source\
    \ = \"Sysmon for Linux, Microsoft Sysmon, Windows Event Logs\"\n      severity\
    \ = \"Medium\"  // Adjust based on your risk assessment\n      priority = \"Medium\"\
    \  // Adjust based on your incident response process\n\n    events:\n      $ironsharp_execution.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n      $ironsharp_execution.target.process.file.full_path\
    \ = /cmd\\.exe|python.*\\.exe|ipy\\.exe|powershell\\.exe|pwsh\\.exe|wsl\\.exe/\
    \ nocase and\n      $ironsharp_execution.target.process.command_line = /IronADCSPwn\\\
    .py|IronADFSDump\\.py|IronBetterSafetyKatz\\.py|IronCertify\\.py|IronDeployPrinterNightmare\\\
    .py|IronEmbed\\.py|IronEDD\\.py|IronGrouper2\\.py|IronInveigh\\.py|IronLockLess\\\
    .py|IronPassTheCert\\.py|IronRubeus\\.py|IronSafetyKatz\\.py|IronSearchOutlook\\\
    .py|IronSeatbelt\\.py|IronSharPersist\\.py|IronSharp-SMBExec\\.py|IronSharpAllowedToAct\\\
    .py|IronSharpBypassUAC\\.py|IronSharpCOM\\.py|IronSharpChisel\\.py|IronSharpChrome\\\
    .py|IronSharpChromium\\.py|IronSharpCloud\\.py|IronSharpCookieMonster\\.py|IronSharpCrashEventLog\\\
    .py|IronSharpDPAPI\\.py|IronSharpDir\\.py|IronSharpDoor\\.py|IronSharpDump\\.py|IronSharpEDRChecker\\\
    .py|IronSharpExec\\.py|IronSharpGPOAbuse\\.py|IronSharpHandler\\.py|IronSharpKatz\\\
    .py|IronSharpLAPS\\.py|IronSharpMapExec\\.py|IronSharpMiniDump\\.py|IronSharpMove\\\
    .py|IronSharpNamedPipePTH\\.py|IronSharpReg\\.py|IronSharpSQLPwn\\.py|IronSharpSearch\\\
    .py|IronSharpSecDump\\.py|IronSharpSniper\\.py|IronSharpSpray\\.py|IronSharpStay\\\
    .py|IronSharpTask\\.py|IronSharpUp\\.py|IronSharpWMI\\.py|IronSharpWebServer\\\
    .py|IronSharpWifiGrabber\\.py|IronSharpZeroLogon\\.py|IronShhmon\\.py|IronSqlClient\\\
    .py|IronStandIn\\.py|IronStickyNotesExtract\\.py|IronThunderFox\\.py|IronTokenStomp\\\
    .py|IronWMIReg\\.py|IronWatson\\.py|Iron_RunasCs\\.py|Ironscout\\.py|Ironsharpfiles\\\
    .py|Ironsharpshares\\.py/ nocase\n\n      // Capture the hostname where the event\
    \ occurred\n      $ironsharp_execution.principal.hostname = $hostname\n\n    match:\n\
    \      $hostname over 15m\n\n    outcome:\n      $risk_score = max(65)\n     \
    \ $event_count = count_distinct($ironsharp_execution.metadata.id)\n      $principal_process_pid\
    \ = array_distinct($ironsharp_execution.principal.process.pid)\n      $principal_process_command_line\
    \ = array_distinct($ironsharp_execution.principal.process.command_line)\n    \
    \  $principal_process_file_sha256 = array_distinct($ironsharp_execution.principal.process.file.sha256)\n\
    \      $principal_process_file_full_path = array_distinct($ironsharp_execution.principal.process.file.full_path)\n\
    \      $principal_process_product_specific_process_id = array_distinct($ironsharp_execution.principal.process.product_specific_process_id)\n\
    \      $principal_process_parent_process_product_specific_process_id = array_distinct($ironsharp_execution.principal.process.parent_process.product_specific_process_id)\n\
    \      $target_process_pid = array_distinct($ironsharp_execution.target.process.pid)\n\
    \      $target_process_command_line = array_distinct($ironsharp_execution.target.process.command_line)\n\
    \      $target_process_file_sha256 = array_distinct($ironsharp_execution.target.process.file.sha256)\n\
    \      $target_process_file_full_path = array_distinct($ironsharp_execution.target.process.file.full_path)\n\
    \      $target_process_product_specific_process_id = array_distinct($ironsharp_execution.target.process.product_specific_process_id)\n\
    \      $principal_user_userid = array_distinct($ironsharp_execution.principal.user.userid)\n\
    \n    condition:\n      $ironsharp_execution\n}"
  chronicle_rule_name: hacktool_ironsharp_pack_execution
