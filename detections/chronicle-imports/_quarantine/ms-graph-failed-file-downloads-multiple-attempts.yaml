id: chronicle-detection-rules-ms-graph-failed-file-downloads-multiple-attempts
name: ms_graph_failed_file_downloads_multiple_attempts
description: ms_graph_failed_file_downloads_multiple_attempts
severity: medium
enabled: false
tags:
  mitre: []
