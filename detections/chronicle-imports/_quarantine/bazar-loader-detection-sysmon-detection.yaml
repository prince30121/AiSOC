detection:
  chronicle_yaral: "rule bazar_loader_detection_sysmon_detection {\n meta:\n    author\
    \ = \"Ariel Millahuel\"\n    description = \"BazarLoader (also known as Bazar\
    \ Loader, Bazar Backdoor or Team9 Backdoor) is a module of the dreaded TrickBot\
    \ Trojan. It is mostly used to gain a foothold in compromised enterprise networks\
    \  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/QDvyH85txiBA\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"execution, T1059\"\n\n  events:\n($selection1.metadata.product_event_type\
    \ = \"11\" and (re.regex($selection1.target.file.full_path, `.*DD45\\.exe.*`)\
    \ or re.regex($selection1.target.file.full_path, `.*BthCxn\\.exe.*`) or re.regex($selection1.target.file.full_path,\
    \ `.*v86\\.exe_.*`)))\n\n  condition:\n    $selection1\n}"
  chronicle_rule_name: bazar_loader_detection_sysmon_detection
