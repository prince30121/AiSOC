logsource:
  product: chronicle
detection:
  chronicle_yaral: "rule powershell_loaded_via_dll {\n meta:\n    author = \"Joseph\
    \ Kamau\"\n    description = \"This rule detects when powershell is launched using\
    \ a dll and not through powershell.exe  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/OSXPA8ylDozt\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"execution, t1086\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"7\" and (re.regex($selection.target.process.file.full_path, `.*System\\\
    .Management\\.Automation\\.Dll.*`) or re.regex($selection.target.process.file.full_path,\
    \ `.*System\\.Management\\.Automation\\.ni\\.Dll.*`) or re.regex($selection.target.process.file.full_path,\
    \ `.*System\\.Reflection\\.Dll.*`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: powershell_loaded_via_dll
