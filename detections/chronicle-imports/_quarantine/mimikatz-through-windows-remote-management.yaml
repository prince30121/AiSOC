detection:
  chronicle_yaral: "rule mimikatz_through_windows_remote_management {\n meta:\n  \
    \  author = \"Patryk Prauze - ING Tech\"\n    description = \"Detects usage of\
    \ mimikatz through WinRM protocol by monitoring access to lsass process by wsmprovhost.exe.\
    \  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/mV7fqMpJNxlu\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"credential_access, execution, t1003, t1028, s0005\"\
    \n\n  events:\n($selection.metadata.product_event_type = \"10\" and $selection.target.process.file.full_path\
    \ = \"C:\\\\windows\\\\system32\\\\lsass.exe\" and $selection.principal.process.file.full_path\
    \ = \"C:\\\\Windows\\\\system32\\\\wsmprovhost.exe\")\n\n  condition:\n    $selection\n\
    }"
  chronicle_rule_name: mimikatz_through_windows_remote_management
