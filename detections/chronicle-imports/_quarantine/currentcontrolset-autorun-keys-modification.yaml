detection:
  chronicle_yaral: "/*\n * Copyright 2025 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule currentcontrolset_autorun_keys_modification {\n\n  meta:\n    author =\
    \ \"Victor Sergeev, Daniil Yugoslavskiy, Gleb Sukhodolskiy, Timur Zinniatullin,\
    \ oscd.community, Tim Shelton, frack113 (split)\"\n    description = \"Detects\
    \ modification of autostart extensibility point (ASEP) in registry\"\n    reference\
    \ = \"https://github.com/SigmaHQ/sigma/blob/master/rules/windows/registry/registry_set/registry_set_asep_reg_keys_modification_currentcontrolset.yml\"\
    \n    license = \"https://github.com/SigmaHQ/Detection-Rule-License/blob/main/LICENSE.Detection.Rules.md\"\
    \n    rule_name = \"CurrentControlSet Autorun Keys Modification\"\n    rule_id\
    \ = \"mr_701ab297-b615-4441-a78b-941c9737d117\"\n    sigma_uuid = \"f674e36a-4b91-431e-8aef-f8a96c2aca35\"\
    \n    sigma_status = \"test\"\n    tactic = \"TA0003\"\n    technique = \"T1547.001\"\
    \n    data_source = \"Sysmon Windows Registry\"\n    platform = \"Windows\"\n\
    \    severity = \"Medium\"\n    priority = \"Medium\"\n    false_positives = \"\
    Legitimate software automatically (mostly, during installation) sets up autorun\
    \ keys for legitimate reason\"\n\n  events:\n    $reg.metadata.event_type = \"\
    REGISTRY_MODIFICATION\"\n    strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\system\\\\currentcontrolset\\\\control\") and\n    (\n        strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\terminal server\\\\winstations\\\\rdp-tcp\\\\initialprogram\") or\n  \
    \      strings.contains(strings.to_lower($reg.target.registry.registry_key), \"\
    \\\\terminal server\\\\wds\\\\rdpwd\\\\startupprograms\") or\n        strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\securityproviders\\\\securityproviders\") or\n        strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\safeboot\\\\alternateshell\") or\n        strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\print\\\\providers\") or\n        strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\print\\\\monitors\") or\n        strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\networkprovider\\\\order\") or\n        strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\lsa\\\\notification packages\") or\n        strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\lsa\\\\authentication packages\") or\n        strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\bootverificationprogram\\\\imagepath\")\n    )\n    not (\n          \
    \  $reg.target.registry.registry_value_data = \"(Empty)\" or\n            (\n\
    \                $reg.principal.process.file.full_path = \"c:\\\\windows\\\\system32\\\
    \\spoolsv.exe\" nocase and\n                strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"\\\\print\\\\monitors\\\\cutepdf writer monitor\") and\n                (\n\
    \                    $reg.target.registry.registry_value_data = \"cpwmon64_v40.dll\"\
    \ nocase or\n                    $reg.target.registry.registry_value_data = \"\
    CutePDF Writer\" nocase\n                )\n            ) or\n            (\n\
    \                $reg.principal.process.file.full_path = \"c:\\\\windows\\\\system32\\\
    \\spoolsv.exe\" nocase and\n                strings.contains(strings.to_lower($reg.target.registry.registry_key),\
    \ \"print\\\\monitors\\\\appmon\\\\ports\\\\microsoft.office.onenote_\") and\n\
    \                (\n                    strings.contains(strings.to_upper($reg.principal.user.userid),\
    \ \"AUTHORI\") or\n                    strings.contains(strings.to_upper($reg.principal.user.userid),\
    \ \"AUTORI\")\n                )\n            ) or\n            (\n          \
    \      $reg.principal.process.file.full_path = \"c:\\\\windows\\\\system32\\\\\
    poqexec.exe\" nocase and\n                re.regex($reg.target.registry.registry_key,\
    \ `\\\\networkprovider\\\\order\\\\providerorder$`) nocase\n            ) or\n\
    \            (\n                $reg.principal.process.file.full_path = \"c:\\\
    \\windows\\\\system32\\\\spoolsv.exe\" nocase and\n                re.regex($reg.target.registry.registry_key,\
    \ `\\\\print\\\\monitors\\\\monvnc\\\\driver$`) nocase and\n                $reg.target.registry.registry_value_data\
    \ = \"VNCpm.dll\" nocase\n            )\n    )\n\n    $reg.principal.hostname\
    \ = $hostname\n\n  match:\n    $hostname over 5m\n\n  outcome:\n    //example\
    \ usage of specifying test user and hostname to adjust risk score\n    $risk_score\
    \ = max(if($reg.principal.user.userid = \"user\" and $reg.principal.hostname =\
    \ \"hostname\", 0, 15))\n    $principal_hostname = array_distinct($reg.principal.hostname)\n\
    \    $principal_process_pid = array_distinct($reg.principal.process.pid)\n   \
    \ $principal_process_file_full_path = array_distinct($reg.principal.process.file.full_path)\n\
    \    $principal_process_product_specific_process_id = array_distinct($reg.principal.process.product_specific_process_id)\n\
    \    $principal_user_userid = array_distinct($reg.principal.user.userid)\n   \
    \ $target_registry_key = array_distinct($reg.target.registry.registry_key)\n \
    \   $target_registry_value_data = array_distinct($reg.target.registry.registry_value_data)\n\
    \    $log_type = array_distinct(strings.concat($reg.metadata.log_type,\"/\",$reg.metadata.product_event_type))\n\
    \n  condition:\n    $reg\n}"
