    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule rdp_sensitive_settings_changed_to_zero {\n\n  meta:\n    author = \"Samir\
    \ Bousseaden, David ANDRE, Roberto Rodriguez @Cyb3rWard0g, Nasreddine Bencherchali\"\
    \n    description = \"Detects tampering of RDP Terminal Service/Server sensitive\
    \ settings. Such as allowing unauthorized users access to a system via the 'fAllowUnsolicited'\
    \ or enabling RDP via 'fDenyTSConnections', etc.\"\n    reference = \"https://github.com/SigmaHQ/sigma/blob/master/rules/windows/registry/registry_set/registry_set_terminal_server_suspicious.yml\"\
    \n    license = \"https://github.com/SigmaHQ/Detection-Rule-License/blob/main/LICENSE.Detection.Rules.md\"\
    \n    rule_name = \"RDP Sensitive Settings Changed to Zero\"\n    rule_id = \"\
    mr_553a08a3-f1b6-4962-9393-151b0fecdf55\"\n    sigma_uuid = \"a2863fbc-d5cb-48d5-83fb-d976d4b1743b\"\
    \n    sigma_status = \"test\"\n    tactic = \"TA0005\"\n    //tactic = \"TA0003\"\
    \n    technique = \"T1112\"\n    type = \"Detection\"\n    data_source = \"Sysmon\"\
    \n    platform = \"Windows\"\n    severity = \"Medium\"\n    priority = \"Medium\"\
    \n    false_positives = \"Some of the keys mentioned here could be modified by\
    \ an administrator while setting group policy\"\n\n  events:\n    $reg.metadata.event_type\
    \ = \"REGISTRY_MODIFICATION\"\n    (\n        re.regex($reg.target.registry.registry_key,\
    \ `\\\\fDenyTSConnections$`) nocase or\n        re.regex($reg.target.registry.registry_key,\
    \ `\\\\fSingleSessionPerUser$`) nocase or\n        re.regex($reg.target.registry.registry_key,\
    \ `\\\\UserAuthentication$`) nocase\n    )\n    $reg.target.registry.registry_value_data\
    \ = \"DWORD (0x00000000)\" nocase\n\n    $reg.principal.hostname = $hostname\n\
    \n  match:\n    $hostname over 5m\n\n  outcome:\n    //example usage of specifying\
    \ test user and hostname to adjust risk score\n    $risk_score = max(if($reg.principal.user.userid\
    \ = \"user\" and $reg.principal.hostname = \"hostname\", 0, 15))\n    $principal_hostname\
    \ = array_distinct($reg.principal.hostname)\n    $principal_process_pid = array_distinct($reg.principal.process.pid)\n\
    \    $principal_process_file_full_path = array_distinct($reg.principal.process.file.full_path)\n\
    \    $principal_process_product_specific_process_id = array_distinct($reg.principal.process.product_specific_process_id)\n\
    \    $principal_user_userid = array_distinct($reg.principal.user.userid)\n   \
    \ $target_registry_key = array_distinct($reg.target.registry.registry_key)\n \
    \   $target_registry_value_data = array_distinct($reg.target.registry.registry_value_data)\n\
    \    $log_type = array_distinct(strings.concat($reg.metadata.log_type,\"/\",$reg.metadata.product_event_type))\n\
    \n  condition:\n    $reg\n}"
  chronicle_rule_name: rdp_sensitive_settings_changed_to_zero
