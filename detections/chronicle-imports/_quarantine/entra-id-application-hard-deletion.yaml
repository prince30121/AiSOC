    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule entra_id_application_hard_deletion {\n\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Deletion of Entra ID application with\
    \ no recovery of the application.\"\n    rule_id = \"mr_b4b8a401-4803-498a-b601-d984cf5042fa\"\
    \n    rule_name = \"Entra ID Application Hard Deletion\"\n    type = \"alert\"\
    \n    platform = \"azure\"\n    data_source = \"azure ad audit\"\n    severity\
    \ = \"Medium\"\n    priority = \"Medium\"\n\n  events:\n    $app.metadata.event_type\
    \ = \"SETTING_DELETION\"\n    $app.metadata.product_event_type = \"Hard Delete\
    \ application\"\n    $app.metadata.product_name = \"Azure AD Directory Audit\"\
    \n    $app.metadata.vendor_name = \"Microsoft\"\n    $app.security_result.action\
    \ = \"ALLOW\"\n    $app.principal.user.userid = $user\n\n  match:\n    $user over\
    \ 5m\n\n  outcome:\n    $risk_score = 65\n    $event_count = count_distinct($app.metadata.id)\n\
    \    $principal_ip = array_distinct($app.principal.ip)\n    $principal_email =\
    \ array_distinct($app.principal.user.email_addresses)\n    $principal_county_region\
    \ = array_distinct($app.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $user_agent = array_distinct($app.network.http.user_agent)\n    $network_session\
    \ = array_distinct($app.network.session_id)\n    $target_application = array_distinct($app.target.resource.name)\n\
    \    $target_application_id = array_distinct($app.target.resource.product_object_id)\n\
    \n  condition:\n    $app\n}"
