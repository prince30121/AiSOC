    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule mitre_attack_T1021_002_windows_admin_share_basic {\n\n  meta:\n    author\
    \ = \"Google Cloud Security\"\n    description = \"Detect the use of net use for\
    \ SMB/Windows admin shares\"\n    rule_id = \"mr_ceadd402-7315-4462-9716-8b41a6329bdd\"\
    \n    rule_name = \"MITRE ATT&CK T1021.002 Windows Admin Share Basic\"\n    tactic\
    \ = \"TA0008\"\n    technique = \"T1021.002\"\n    type = \"alert\"\n    platform\
    \ = \"Windows\"\n    data_source = \"microsoft sysmon, microsoft windows events\"\
    \n    severity = \"Low\"\n    priority = \"Low\"\n\n  events:\n    $process.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $process.target.process.command_line = /net.*use.*(C|ADMIN|IPC)\\\
    $/ nocase\n\n  outcome:\n    $risk_score = 35\n    // added to populate alert\
    \ graph with additional context\n    $principal_hostname = $process.principal.hostname\n\
    \    $principal_process_pid = $process.principal.process.pid\n    $principal_process_command_line\
    \ = $process.principal.process.command_line\n    $principal_process_file_sha256\
    \ = $process.principal.process.file.sha256\n    $principal_process_file_full_path\
    \ = $process.principal.process.file.full_path\n    $principal_process_product_specific_process_id\
    \ = $process.principal.process.product_specific_process_id\n    $principal_process_parent_process_product_specific_process_id\
    \ = $process.principal.process.parent_process.product_specific_process_id\n  \
    \  $target_process_pid = $process.target.process.pid\n    $target_process_command_line\
    \ = $process.target.process.command_line\n    $target_process_file_sha256 = $process.target.process.file.sha256\n\
    \    $target_process_file_full_path = $process.target.process.file.full_path\n\
    \    $target_process_product_specific_process_id = $process.target.process.product_specific_process_id\n\
    \    $principal_user_userid = $process.principal.user.userid\n\n  condition:\n\
    \    $process\n}"
  chronicle_rule_name: mitre_attack_T1021_002_windows_admin_share_basic
