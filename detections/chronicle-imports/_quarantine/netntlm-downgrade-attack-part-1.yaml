detection:
  chronicle_yaral: "rule netntlm_downgrade_attack_part_1 {\n meta:\n    author = \"\
    Florian Roth\"\n    description = \"Detects post exploitation using NetNTLM downgrade\
    \ attacks  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/XzZiURQ3EeoE\"\n    version\
    \ = \"0.01\"\n    created = \"2018/03/20\"\n    product = \"windows\"\n    service\
    \ = \"security\"\n    mitre = \"credential_access, t1212\"\n\n  events:\n($selection2.metadata.product_event_type\
    \ = \"4657\" and (re.regex($selection2.target.registry.registry_value_data, `REGISTRY\\\
    \\MACHINE\\\\SYSTEM\\\\.*ControlSet.*\\\\Control\\\\Lsa`) or re.regex($selection2.target.file.full_path,\
    \ `REGISTRY\\\\MACHINE\\\\SYSTEM\\\\.*ControlSet.*\\\\Control\\\\Lsa`)) and ($selection2.target.registry.registry_value_name\
    \ = \"LmCompatibilityLevel\" or $selection2.target.registry.registry_value_name\
    \ = \"NtlmMinClientSec\" or $selection2.target.registry.registry_value_name =\
    \ \"RestrictSendingNTLMTraffic\"))\n\n  condition:\n    $selection2\n}"
  chronicle_rule_name: netntlm_downgrade_attack_part_1
