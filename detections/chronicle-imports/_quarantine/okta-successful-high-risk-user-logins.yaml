id: chronicle-detection-rules-okta-successful-high-risk-user-logins
name: okta_successful_high_risk_user_logins
description: okta_successful_high_risk_user_logins
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule okta_successful_high_risk_user_logins {\n\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Detects successfully authenticated user\
    \ logins based on Okta's Behavior Detection pattern analysis.\"\n    rule_id =\
    \ \"mr_ef123f09-f2ae-4d29-bb69-896d708f6a27\"\n    rule_name = \"Okta Successful\
    \ High Risk User Logins\"\n    reference = \"https://help.okta.com/en-us/Content/Topics/Security/behavior-detection/logs-behavior-detection.htm\"\
    \n    mitre_attack_tactic = \"Defense Evasion, Persistence, Privilege Escalation,\
    \ Initial Access\"\n    mitre_attack_technique = \"Valid Accounts\"\n    mitre_attack_url\
    \ = \"https://attack.mitre.org/techniques/T1078/\"\n    mitre_attack_version =\
    \ \"v13.1\"\n    type = \"Hunt\"\n    false_positives = \"This rule causes False\
    \ Positives if the user is a net new user.\"\n    data_source = \"Okta\"\n   \
    \ severity = \"Medium\"\n    priority = \"Medium\"\n\n  events:\n    $login.metadata.product_name\
    \ = \"Okta\"\n    $login.metadata.vendor_name = \"Okta\"\n    $login.metadata.event_type\
    \ = \"USER_LOGIN\"\n    $login.metadata.product_event_type = \"user.session.start\"\
    \n    $login.security_result.summary = \"User login to Okta\"\n    $login.security_result.action\
    \ = \"ALLOW\"\n    $login.principal.user.userid = $userid\n\n    // Detect only\
    \ for existing users and not net new users\n    $first_seen.graph.metadata.entity_type\
    \ = \"USER\"\n    $first_seen.graph.entity.user.first_seen_time.seconds < $login.metadata.event_timestamp.seconds\n\
    \    $first_seen.graph.entity.user.userid = $userid\n\n  match:\n    $userid over\
    \ 5m\n\n  outcome:\n    $risk_score = max(\n        // Based on Okta's Behavior\
    \ Detection pattern analysis\n        if($login.security_result.description =\
    \ /New Geo-Location=POSITIVE/, 10) +\n        if($login.security_result.description\
    \ = /New Device=POSITIVE/, 20) +\n        if($login.security_result.description\
    \ = /New IP=POSITIVE/, 5) +\n        if($login.security_result.description = /New\
    \ City=POSITIVE/, 5) +\n        if($login.security_result.description = /New State=POSITIVE/,\
    \ 10) +\n        if($login.security_result.description = /New Country=POSITIVE/,\
    \ 10) +\n        if($login.security_result.description = /Velocity=POSITIVE/,\
    \ 10) +\n        // Unauthorized target geographies\n        if($login.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Cuba\", 20) +\n        if($login.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Iran\", 20) +\n        if($login.principal.ip_geo_artifact.location.country_or_region\
    \ = \"North Korea\", 20) +\n        if($login.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Russia\", 20) +\n        if($login.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Syria\", 20)\n    )\n    $mitre_attack_tactic = \"Defense Evasion, Persistence,\
    \ Privilege Escalation, Initial Access\"\n    $mitre_attack_technique = \"Valid\
    \ Accounts\"\n    $target_user_agent = array_distinct($login.network.http.user_agent)\n\
    \    $principal_ip = array_distinct($login.principal.ip)\n    $principal_ip_country\
    \ = array_distinct($login.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($login.principal.ip_geo_artifact.location.state)\n\
    \    $principal_ip_city = array_distinct($login.principal.location.city)\n   \
    \ $security_result_summary = array_distinct($login.security_result.summary)\n\
    \    $principal_user_managers_email_addresses = array_distinct($login.principal.user.managers.email_addresses)\n\
    \    $principal_user_userid = array_distinct($login.principal.user.userid)\n \
    \   $target_user_email_addresses = array_distinct($login.target.user.email_addresses)\n\
    \    $target_user_userid = array_distinct($login.target.user.userid)\n    $security_result_description\
    \ = array_distinct($login.security_result.description)\n\n  condition:\n    $login\
    \ and $first_seen and $risk_score >= 50\n}"
  chronicle_rule_name: okta_successful_high_risk_user_logins
