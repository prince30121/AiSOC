  chronicle_yaral: "/*\n * Copyright 2025 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule restrictedadminmode_registry_value_tampering {\n\n  meta:\n    author =\
    \ \"frack113\"\n    description = \"Detects changes to the \\\"DisableRestrictedAdmin\\\
    \" registry value in order to disable or enable RestrictedAdmin mode.\\nRestrictedAdmin\
    \ mode prevents the transmission of reusable credentials to the remote system\
    \ to which you connect using Remote Desktop.\\nThis prevents your credentials\
    \ from being harvested during the initial connection process if the remote server\
    \ has been compromise\"\n    reference = \"https://github.com/SigmaHQ/sigma/blob/master/rules/windows/registry/registry_set/registry_set_lsa_disablerestrictedadmin.yml\"\
    \n    license = \"https://github.com/SigmaHQ/Detection-Rule-License/blob/main/LICENSE.Detection.Rules.md\"\
    \n    rule_name = \"RestrictedAdminMode Registry Value Tampering\"\n    rule_id\
    \ = \"mr_c996dba7-ebc0-4472-849c-d6ddebffa601\"\n    sigma_uuid = \"d6ce7ebd-260b-4323-9768-a9631c8d4db2\"\
    \n    sigma_status = \"test\"\n    tactic = \"TA0005\"\n    technique = \"T1112\"\
    \n    type = \"Detection\"\n    data_source = \"Sysmon Windows Registry\"\n  \
    \  platform = \"Windows\"\n    severity = \"High\"\n    priority = \"High\"\n\
    \    false_positives = \"Unknown\"\n\n  events:\n    $reg.metadata.event_type\
    \ = \"REGISTRY_MODIFICATION\"\n    re.regex($reg.target.registry.registry_key,\
    \ `System\\\\CurrentControlSet\\\\Control\\\\Lsa\\\\DisableRestrictedAdmin$`)\
    \ nocase\n\n    $reg.principal.hostname = $hostname\n\n  match:\n    $hostname\
    \ over 5m\n\n  outcome:\n    //example usage of specifying test user and hostname\
    \ to adjust risk score\n    $risk_score = max(if($reg.principal.user.userid =\
    \ \"user\" and $reg.principal.hostname = \"hostname\", 0, 15))\n    $principal_hostname\
    \ = array_distinct($reg.principal.hostname)\n    $principal_process_pid = array_distinct($reg.principal.process.pid)\n\
    \    $principal_process_file_full_path = array_distinct($reg.principal.process.file.full_path)\n\
    \    $principal_process_product_specific_process_id = array_distinct($reg.principal.process.product_specific_process_id)\n\
    \    $principal_user_userid = array_distinct($reg.principal.user.userid)\n   \
    \ $target_registry_key = array_distinct($reg.target.registry.registry_key)\n \
    \   $target_registry_value_data = array_distinct($reg.target.registry.registry_value_data)\n\
    \    $log_type = array_distinct(strings.concat($reg.metadata.log_type,\"/\",$reg.metadata.product_event_type))\n\
    \n  condition:\n    $reg\n}"
  chronicle_rule_name: restrictedadminmode_registry_value_tampering
