detection:
  chronicle_yaral: "rule possible_bind_or_reverse_shell_via_netcat_auditbeat_for_linux\
    \ {\n meta:\n    author = \"Roman Ranskyi\"\n    description = \"Detects possible\
    \ bind or reverse shell via \\\"classic\\\" netcat tool. For rule usage, you must\
    \ be install auditbeat.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/4pqSLAxPuT7R\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"linux\"\n    service\
    \ = \"auditbeat\"\n    mitre = \"Command And Control, t1008, Execution, t1059,\
    \ t1072\"\n\n  events:\n(($netcat_shell.target.process.command_line = \"netcat\"\
    \ or $netcat_shell.target.process.command_line = \"nc\") and (($netcat_shell.network.direction\
    \ = \"listening\" or $netcat_shell.network.direction = \"outbound\" or $netcat_shell.network.direction\
    \ = \"outgoing\") or ($netcat_shell.target.process.command_line = \"-e\" or $netcat_shell.target.process.command_line\
    \ = \"/bin/bash\" or $netcat_shell.target.process.command_line = \"/bin/sh\" or\
    \ $netcat_shell.target.process.command_line = \"-nv\")))\n\n  condition:\n   \
    \ $netcat_shell\n}"
  chronicle_rule_name: possible_bind_or_reverse_shell_via_netcat_auditbeat_for_linux
