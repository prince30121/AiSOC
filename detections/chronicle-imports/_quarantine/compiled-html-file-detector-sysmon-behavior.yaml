detection:
  chronicle_yaral: "rule compiled_html_file_detector_sysmon_behavior {\n meta:\n \
    \   author = \"Lee Archinal\"\n    description = \"This content detects the distribution\
    \ of a compiled html file as detected by Sysmon.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/zNL0GdeTL6kt\"\n    version\
    \ = \"0.01\"\n    created = \"2019/09/16\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"execution, t1223\"\n\n  events:\n(($selection1.metadata.product_event_type\
    \ = \"1\" and $selection1.target.process.file.full_path = \"C:\\\\Windows\\\\\
    hh.exe\" and re.regex($selection1.target.process.command_line, `.*.*\\.chm`))\
    \ or ($selection1.metadata.product_event_type = \"13\" and $selection1.target.process.file.full_path\
    \ = \"C:\\\\WINDOWS\\\\hh.exe\"))\n\n  condition:\n    $selection1\n}"
  chronicle_rule_name: compiled_html_file_detector_sysmon_behavior
