detection:
  chronicle_yaral: "rule ryuk_ransomware_persistence_mechanism_detection {\n meta:\n\
    \    author = \"Furkan Celik\"\n    description = \"Ryuk adds the following registry\
    \ key so it will execute at every login. It uses the command below to create a\
    \ registry key  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/vQwDMgA92Or3\"\n    version\
    \ = \"0.01\"\n    created = \"2020/03/30\"\n    product = \"windows\"\n    service\
    \ = \"security\"\n    mitre = \"persistence, T1183\"\n\n  events:\n($selection.target.process.command_line\
    \ = \"C:\\\\Windows\\\\System32\\\\cmd.exe\\\" /C REG ADD \\\"HKEY_CURRENT_USER\\\
    \\SOFTWARE\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\Run\\\"\" or re.regex($selection.target.process.command_line,\
    \ `/v \\\"svchos\\\" /t REG_SZ /d \\\"C:\\\\Users\\\\Public.*\\.exe\\\" /f`))\n\
    \n  condition:\n    $selection\n}"
  chronicle_rule_name: ryuk_ransomware_persistence_mechanism_detection
