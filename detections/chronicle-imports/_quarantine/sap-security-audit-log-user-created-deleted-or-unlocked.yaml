    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule sap_security_audit_log_user_created_deleted_or_unlocked {\n\n  meta:\n\
    \    author = \"Google Cloud Security\"\n    description = \"Detects when an SAP\
    \ user is created, deleted, or unlocked\"\n    severity = \"Medium\"\n    tactic\
    \ = \"TA0003\"\n    technique = \"T1136\"\n\n  events:\n    $e.metadata.log_type\
    \ = \"SAP_SECURITY_AUDIT\"\n\n    $e.additional.fields[\"msg_1\"] = /^AU7$|^AU8$|^AU9$|^AUA$/\
    \ nocase\n\n    $user = $e.principal.user.userid\n    $sid = $e.target.application\n\
    \n    //exclusions\n    not $user in %sap_admin_users.user\n\n  match:\n    $user,\
    \ $sid over 59m\n\n  outcome:\n    $risk_score = 75\n    $target_sid = array_distinct($sid)\n\
    \    $description = array_distinct($e.metadata.description)\n    $terminal = array_distinct($e.principal.hostname)\n\
    \    $message_ids = array_distinct($e.additional.fields[\"msg_1\"])\n    $target_user\
    \ = array_distinct($e.additional.fields[\"param1_1\"])\n    $t_code = array_distinct($e.security_result.detection_fields[\"\
    slgtc_1\"])\n    $TXSUBCLSID = array_distinct($e.security_result.summary)\n  \
    \  $system = array_distinct($e.target.application)\n    $instance = array_distinct($e.target.resource.name)\n\
    \n  condition:\n    $e\n}"
  chronicle_rule_name: sap_security_audit_log_user_created_deleted_or_unlocked
