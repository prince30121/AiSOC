detection:
  chronicle_yaral: "rule mshta_spwaned_by_svchost_as_seen_in_lethalhta_sysmon {\n\
    \ meta:\n    author = \"Markus Neis, Alexandr Yampolskyi\"\n    description =\
    \ \"Detects MSHTA.EXE spwaned by SVCHOST described in report.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/mc8FTcVMHIm7\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"Execution, t1204, t1059\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"1\" and re.regex($selection.principal.process.file.full_path, `.*\\\\svchost\\\
    .exe`) and re.regex($selection.target.process.command_line, `.*/mshta\\.exe`))\n\
    \n  condition:\n    $selection\n}"
