detection:
  chronicle_yaral: "rule suspicious_process_created_on_unusual_directories {\n meta:\n\
    \    author = \"Erdem Kucukmustafa\"\n    description = \"Detect Suspicious Process\
    \ on Unusual Directories  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/lVgFe7QyLrys\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"Defense_Evasion, T1036\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"1\" and (re.regex($selection.target.process.file.full_path, `C:\\\\Windows\\\
    \\Fonts.*`) or re.regex($selection.target.process.file.full_path, `.*\\\\htdocs.*`)\
    \ or re.regex($selection.target.process.file.full_path, `C:\\\\Windows\\\\Media.*`)\
    \ or re.regex($selection.target.process.file.full_path, `C:\\\\Users\\\\Public.*`)\
    \ or re.regex($selection.target.process.file.full_path, `C:\\\\Windows\\\\system32\\\
    \\config\\\\systemprofile.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\Windows\\\\addins.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\Windows\\\\Debug.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\Users\\\\NetworkService.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\Users\\\\Default.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\Windows\\\\Help.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\Intel\\\\Logs.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\Windows\\\\repair.*`) or re.regex($selection.target.process.file.full_path,\
    \ `C:\\\\PerfLogs.*`) or re.regex($selection.target.process.file.full_path, `C:\\\
    \\$Recycle\\.bin.*`) or re.regex($selection.target.process.file.full_path, `C:\\\
    \\Windows\\\\security.*`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\wwwroot.*`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: suspicious_process_created_on_unusual_directories
