    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule o365_add_user_to_admin_role {\n\n  meta:\n    author = \"Google Cloud Security\"\
    \n    description = \"Adding users to administrative roles is not malicious, but\
    \ due to the sensitivity of certain roles, validation should occur when this occurs\"\
    \n    rule_id = \"mr_ee28c257-d2c7-490c-addf-aef35d07f29d\"\n    rule_name = \"\
    O365 Add User To Admin Role\"\n    assumption = \"The list msgraph_watchlist_roles\
    \ is populated with role names, example: Application Administrator\"\n    mitre_attack_tactic\
    \ = \"TA0003\"\n    mitre_attack_technique = \"T1098.003\"\n    type = \"alert\"\
    \n    platform = \"azure\"\n    data_source = \"o365\"\n    severity = \"Medium\"\
    \n    priority = \"Medium\"\n\n  events:\n    $app.metadata.event_type = \"USER_UNCATEGORIZED\"\
    \n    $app.metadata.product_event_type = \"Add member to role.\"\n    $app.metadata.product_name\
    \ = \"Office 365\"\n    $app.metadata.vendor_name = \"Microsoft\"\n    $app.security_result.action\
    \ = \"ALLOW\"\n    $app.target.resource.attribute.roles.name in %msgraph_watchlist_roles\n\
    \    $app.principal.user.userid = $userid\n\n  match:\n    $userid over 5m\n\n\
    \  outcome:\n    $risk_score = 65\n    $event_count = count_distinct($app.metadata.id)\n\
    \    $security_summary = array_distinct($app.security_result.summary)\n    $user_agent\
    \ = array_distinct($app.network.http.user_agent)\n    $assigned_role = array_distinct($app.target.resource.attribute.roles.name)\n\
    \    //added to populate alert graph with additional context\n    //$principal_user_userid\
    \ = array_distinct($app.principal.user.userid)\n    $target_user_userid = array_distinct($app.target.user.userid)\n\
    \n  condition:\n    $app\n}"
  chronicle_rule_name: o365_add_user_to_admin_role
