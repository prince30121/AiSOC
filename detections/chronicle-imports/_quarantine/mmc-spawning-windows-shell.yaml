id: chronicle-detection-rules-mmc-spawning-windows-shell
name: mmc_spawning_windows_shell
description: mmc_spawning_windows_shell
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "rule mmc_spawning_windows_shell {\n meta:\n    author = \"Karneades,\
    \ Swisscom CSIRT\"\n    description = \"Detects a Windows command line executable\
    \ started from MMC.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/sfP4jVTwSxrt\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"lateral_movement, t1175\"\n\n  events:\n\
    (re.regex($selection.principal.process.file.full_path, `.*\\\\mmc\\.exe`) and\
    \ (re.regex($selection.target.process.file.full_path, `.*\\\\cmd\\.exe`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\powershell\\.exe`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\wscript\\.exe`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\cscript\\.exe`) or re.regex($selection.target.process.file.full_path,\
    \ `.*\\\\sh\\.exe`) or re.regex($selection.target.process.file.full_path, `.*\\\
    \\bash\\.exe`) or re.regex($selection.target.process.file.full_path, `.*\\\\reg\\\
    .exe`) or re.regex($selection.target.process.file.full_path, `.*\\\\regsvr32\\\
    .exe`) or re.regex($selection.target.process.file.full_path, `.*\\\\BITSADMIN.*`))\
    \ and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: mmc_spawning_windows_shell
