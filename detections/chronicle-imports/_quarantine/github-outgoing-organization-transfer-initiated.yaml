detection:
  chronicle_yaral: "/*\n * Copyright 2024 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule github_outgoing_organization_transfer_initiated {\n\n  meta:\n    author\
    \ = \"Google Cloud Security\"\n    description = \"Detects when a GitHub organization\
    \ is transferred to another enterprise account. An adversary may attempt to transfer\
    \ a GitHub organization to an enterprise account they control in order to steal\
    \ data.\"\n    rule_id = \"mr_052eb23f-84de-43a3-b9cb-736f8770cd8d\"\n    rule_name\
    \ = \"GitHub Outgoing Organization Transfer Initiated\"\n    assumption = \"Your\
    \ GitHub enterprise audit log settings are configured to log the source IP address\
    \ for events. Reference: https://docs.github.com/en/organizations/keeping-your-organization-secure/managing-security-settings-for-your-organization/displaying-ip-addresses-in-the-audit-log-for-your-organization\"\
    \n    type = \"alert\"\n    severity = \"Low\"\n    priority = \"Low\"\n    platform\
    \ = \"GitHub\"\n    data_source = \"github\"\n    mitre_attack_tactic = \"Exfiltration\"\
    \n    mitre_attack_technique = \"Transfer Data to Cloud Account\"\n    mitre_attack_url\
    \ = \"https://attack.mitre.org/versions/v14/techniques/T1537/\"\n    mitre_attack_version\
    \ = \"v14\"\n    reference = \"https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/audit-log-events-for-your-enterprise\"\
    \n\n  events:\n    $github.metadata.vendor_name = \"GITHUB\" nocase\n    $github.metadata.product_name\
    \ = \"GITHUB\"\n    $github.metadata.product_event_type = \"org.transfer_outgoing\"\
    \n\n  outcome:\n    $risk_score = max(35)\n    $mitre_attack_tactic = \"Exfiltration\"\
    \n    $mitre_attack_technique = \"Transfer Data to Cloud Account\"\n    $mitre_attack_technique_id\
    \ = \"T1537\"\n    $event_count = count_distinct($github.metadata.id)\n    $principal_ip\
    \ = array_distinct($github.principal.ip)\n    $principal_user_userid = array_distinct($github.principal.user.userid)\n\
    \    $principal_ip_country = array_distinct($github.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($github.principal.ip_geo_artifact.location.state)\n\
    \    $principal_ip_city = array_distinct($github.principal.location.city)\n  \
    \  $security_result_summary = array_distinct($github.security_result.summary)\n\
    \n  condition:\n    $github\n}"
  chronicle_rule_name: github_outgoing_organization_transfer_initiated
