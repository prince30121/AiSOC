detection:
  chronicle_yaral: "rule psexec_tool_execution {\n meta:\n    author = \"Thomas Patzke\"\
    \n    description = \"Detects PsExec service installation and execution events\
    \ (service and Sysmon)  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/YNK3AGI5NCcQ\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    mitre\
    \ = \"execution, t1035, s0029\"\n\n  events:\n(($service_installation.target.process.command_line\
    \ = \"PSEXESVC\" and (($service_installation.metadata.product_event_type = \"\
    7045\" and re.regex($service_installation.target.process.command_line, `.*\\\\\
    PSEXESVC\\.exe`)) or $service_installation.metadata.product_event_type = \"7036\"\
    )) or ($service_installation.metadata.product_event_type = \"1\" and re.regex($service_installation.target.process.file.full_path,\
    \ `.*\\\\PSEXESVC\\.exe`) and $service_installation.principal.user.user_display_name\
    \ = \"NT AUTHORITY\\\\SYSTEM\"))\n\n  condition:\n    $service_installation\n}"
  chronicle_rule_name: psexec_tool_execution
