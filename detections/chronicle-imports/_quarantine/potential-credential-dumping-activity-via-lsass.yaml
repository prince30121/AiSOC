id: chronicle-detection-rules-potential-credential-dumping-activity-via-lsass
name: potential_credential_dumping_activity_via_lsass
description: potential_credential_dumping_activity_via_lsass
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references: []
logsource:
  product: chronicle
detection:
  chronicle_yaral: "/*\n * Copyright 2025 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule potential_credential_dumping_activity_via_lsass {\n\n  meta:\n    author\
    \ = \"Samir Bousseaden, Michael Haag\"\n    description = \"Detects process access\
    \ requests to the LSASS process with specific call trace calls and access masks.\
    \ This behaviour is expressed by many credential dumping tools such as Mimikatz,\
    \ NanoDump, Invoke-Mimikatz, Procdump and even the Taskmgr dumping feature.\"\n\
    \    reference = \"https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_access/proc_access_win_lsass_memdump.yml\"\
    \n    license = \"https://github.com/SigmaHQ/Detection-Rule-License/blob/main/LICENSE.Detection.Rules.md\"\
    \n    rule_name = \"Potential Credential Dumping Activity Via LSASS\"\n    sigma_uuid\
    \ = \"5ef9853e-4d0e-4a70-846f-a9ca37d876da\"\n    sigma_status = \"experimental\"\
    \n    rule_id = \"mr_33474568-9a0a-4588-ba79-144ab7908f8e\"\n    tactic = \"TA0006\"\
    \n    technique = \"T1003.001\"\n    type = \"Detection\"\n    data_source = \"\
    Sysmon\"\n    platform = \"Windows\"\n    severity = \"Medium\"\n    priority\
    \ = \"Medium\"\n    false_positives = \"Unknown\"\n\n  events:\n    $process.metadata.event_type\
    \ = \"PROCESS_OPEN\"\n    re.regex($process.target.process.file.full_path, `\\\
    \\lsass\\.exe$`) nocase\n    (\n        strings.contains(strings.to_lower($process.target.resource.name),\
    \ \"0x1038\") or\n        strings.contains(strings.to_lower($process.target.resource.name),\
    \ \"0x1438\") or\n        strings.contains(strings.to_lower($process.target.resource.name),\
    \ \"0x143a\") or\n        strings.contains(strings.to_lower($process.target.resource.name),\
    \ \"0x1fffff\") //questionable, this one and others have been filtered out due\
    \ to FP\n    )\n    (\n        strings.contains(strings.to_lower($process.additional.fields[\"\
    CallTrace\"]), \"dbgcore.dll\") or\n        strings.contains(strings.to_lower($process.additional.fields[\"\
    CallTrace\"]), \"dbghelp.dll\") or\n        strings.contains(strings.to_lower($process.additional.fields[\"\
    CallTrace\"]), \"kernel32.dll\") or\n        strings.contains(strings.to_lower($process.additional.fields[\"\
    CallTrace\"]), \"kernelbase.dll\") or\n        strings.contains(strings.to_lower($process.additional.fields[\"\
    CallTrace\"]), \"ntdll.dll\")\n    )\n    NOT (\n            strings.contains($process.principal.administrative_domain,\
    \ \"AUTHORI\") or\n            strings.contains($process.principal.administrative_domain,\
    \ \"AUTORI\")\n        )\n    NOT (\n        strings.contains(strings.to_lower($process.additional.fields[\"\
    CallTrace\"]), \":\\\\windows\\\\temp\\\\asgard2-agent\\\\\") and\n        strings.contains(strings.to_lower($process.additional.fields[\"\
    CallTrace\"]), \"\\\\thor\\\\thor64.exe+\") and\n        strings.contains(strings.to_upper($process.additional.fields[\"\
    CallTrace\"]), \"|UNKNOWN(\") and\n        $process.target.resource.name = \"\
    0x103800\" nocase\n        )\n    NOT re.regex($process.principal.process.file.full_path,\
    \ `:\\\\Windows\\\\Sysmon64\\.exe$`) nocase\n    $process.principal.hostname =\
    \ $hostname\n\n  match:\n    $hostname over 5m\n\n  outcome:\n    //example usage\
    \ of specifying test hostname to adjust risk score\n    $risk_score = max(if($process.principal.hostname\
    \ = \"hostname\", 0, 15))\n    $principal_process_pid = array_distinct($process.principal.process.pid)\n\
    \    $principal_process_command_line = array_distinct($process.principal.process.command_line)\n\
    \    $principal_process_file_sha256 = array_distinct($process.principal.process.file.sha256)\n\
    \    $principal_process_file_full_path = array_distinct($process.principal.process.file.full_path)\n\
    \    $principal_process_product_specfic_process_id = array_distinct($process.principal.process.product_specific_process_id)\n\
    \    $principal_process_parent_process_product_specfic_process_id = array_distinct($process.principal.process.parent_process.product_specific_process_id)\n\
    \    $target_process_pid = array_distinct($process.target.process.pid)\n    $target_process_command_line\
    \ = array_distinct($process.target.process.command_line)\n    $target_process_file_sha256\
    \ = array_distinct($process.target.process.file.sha256)\n    $target_process_file_full_path\
    \ = array_distinct($process.target.process.file.full_path)\n    $target_process_product_specfic_process_id\
    \ = array_distinct($process.target.process.product_specific_process_id)\n    $log_type\
    \ = array_distinct(strings.concat($process.metadata.log_type,\"/\",$process.metadata.product_event_type))\n\
    \n  condition:\n    $process\n}"
  chronicle_rule_name: potential_credential_dumping_activity_via_lsass
