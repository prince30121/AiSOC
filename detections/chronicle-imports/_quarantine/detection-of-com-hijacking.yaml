detection:
  chronicle_yaral: "rule detection_of_com_hijacking {\n meta:\n    author = \"Emir\
    \ Erdogan\"\n    description = \"Hijacking a COM object requires a change in the\
    \ Windows Registry to replace a reference to a legitimate system component which\
    \ may cause that component to not work when executed.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/7TGQasRZEcf5\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"T1122\"\n\n  events:\n($selection.principal.process.file.full_path\
    \ = \"C:\\\\Windows\\\\System32\\\\cmd.exe\" and $selection.target.process.file.full_path\
    \ = \"C:\\\\Windows\\\\System32\\\\reg.exe\" and (re.regex($selection.target.process.command_line,\
    \ `reg add .*\\\\SOFTWARE\\\\Classes\\\\CLSID.*.*\\.dll`) or re.regex($selection.target.process.command_line,\
    \ `reg add .*\\\\SOFTWARE\\\\Classes\\\\CLSID.*.*\\.exe`)))\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: detection_of_com_hijacking
