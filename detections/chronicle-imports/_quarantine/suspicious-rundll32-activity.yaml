detection:
  chronicle_yaral: "rule suspicious_rundll32_activity {\n meta:\n    author = \"juju4\"\
    \n    description = \"Detects suspicious process related to rundll32 based on\
    \ arguments  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/wkXXRDEjMA9b\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"defense_evasion, execution, t1085\"\
    \n\n  events:\n((re.regex($selection.target.process.command_line, `.*\\\\rundll32\\\
    .exe.* url\\.dll,.*OpenURL .*`) or re.regex($selection.target.process.command_line,\
    \ `.*\\\\rundll32\\.exe.* url\\.dll,.*OpenURLA .*`) or re.regex($selection.target.process.command_line,\
    \ `.*\\\\rundll32\\.exe.* url\\.dll,.*FileProtocolHandler .*`) or re.regex($selection.target.process.command_line,\
    \ `.*\\\\rundll32\\.exe.* zipfldr\\.dll,.*RouteTheCall .*`) or re.regex($selection.target.process.command_line,\
    \ `.*\\\\rundll32\\.exe.* Shell32\\.dll,.*Control_RunDLL .*`) or re.regex($selection.target.process.command_line,\
    \ `.*\\\\rundll32\\.exe javascript:.*`) or re.regex($selection.target.process.command_line,\
    \ `.* url\\.dll,.*OpenURL .*`) or re.regex($selection.target.process.command_line,\
    \ `.* url\\.dll,.*OpenURLA .*`) or re.regex($selection.target.process.command_line,\
    \ `.* url\\.dll,.*FileProtocolHandler .*`) or re.regex($selection.target.process.command_line,\
    \ `.* zipfldr\\.dll,.*RouteTheCall .*`) or re.regex($selection.target.process.command_line,\
    \ `.* Shell32\\.dll,.*Control_RunDLL .*`) or re.regex($selection.target.process.command_line,\
    \ `.* javascript:.*`) or re.regex($selection.target.process.command_line, `.*\\\
    .RegisterXLL.*`)) and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: suspicious_rundll32_activity
