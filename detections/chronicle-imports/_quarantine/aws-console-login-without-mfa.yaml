detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule aws_console_login_without_mfa {\n\n    meta:\n      author = \"Google Cloud\
    \ Security\"\n      description = \"Detect when a user logs into AWS console without\
    \ MFA.\"\n      rule_id = \"mr_b03d1e57-7ed0-49e7-b125-6c18b364ae8c\"\n      rule_name\
    \ = \"AWS Console Login Without MFA\"\n      mitre_attack_tactic = \"Initial Access\"\
    \n      mitre_attack_technique = \"Valid Accounts: Cloud Accounts\"\n      mitre_attack_url\
    \ = \"https://attack.mitre.org/techniques/T1078/004/\"\n      mitre_attack_version\
    \ = \"v13.1\"\n      type = \"Alert\"\n      data_source = \"AWS CloudTrail\"\n\
    \      platform = \"AWS\"\n      severity = \"Low\"\n      priority = \"Low\"\n\
    \n    events:\n\n      $login.metadata.vendor_name = \"AMAZON\"\n      $login.metadata.product_name\
    \ = \"AWS CloudTrail\"\n      $login.metadata.event_type = \"USER_LOGIN\"\n  \
    \    $login.metadata.product_event_type = \"ConsoleLogin\"\n      $login.security_result.action=\
    \ \"ALLOW\"\n      $login.extensions.auth.auth_details = \"MFAUsed: No\"\n   \
    \   $login.additional.fields[\"recipientAccountId\"] = $account_id\n\n    match:\n\
    \      $account_id over 1h\n\n    outcome:\n      $risk_score = max(\n       \
    \ //Baseline\n        35 +\n        if($login.principal.resource.type = \"Root\"\
    , 50)\n      )\n      $mitre_attack_tactic = \"Initial Access\"\n      $mitre_attack_technique\
    \ = \"Valid Accounts: Cloud Accounts\"\n      $mitre_attack_technique_id = \"\
    T1078.004\"\n      $event_count = count_distinct($login.metadata.id)\n      $network_http_user_agent\
    \ = array_distinct($login.network.http.user_agent)\n      $principal_ip = array_distinct($login.principal.ip)\n\
    \      $principal_ip_country = array_distinct($login.principal.ip_geo_artifact.location.country_or_region)\n\
    \      $principal_ip_state = array_distinct($login.principal.ip_geo_artifact.location.state)\n\
    \      $target_user_display_name = array_distinct($login.target.user.user_display_name)\n\
    \      $target_user_userid = array_distinct($login.target.user.userid)\n     \
    \ $is_mfa_used = array_distinct($login.extensions.auth.auth_details)\n      $target_resource_name\
    \ = array_distinct($login.target.resource.name)\n      $target_resource_product_object_id\
    \ = array_distinct($login.target.resource.product_object_id)\n\n    condition:\n\
    \      $login\n}"
  chronicle_rule_name: aws_console_login_without_mfa
