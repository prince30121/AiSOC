    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule google_workspace_multiple_files_sent_as_email_attachment_from_google_drive\
    \ {\n\n  meta:\n    author = \"Google Cloud Security\"\n    description = \"Identifies\
    \ when a user sends multiple files from Google Drive as an email attachment to\
    \ a free email domain, which may indicate data exfiltration.\"\n    rule_id =\
    \ \"mr_125c517c-3ef9-4687-8af6-d71eff83d0e9\"\n    rule_name = \"Google Workspace\
    \ Multiple Files Sent As Email Attachments From Google Drive\"\n    mitre_attack_tactic\
    \ = \"Exfiltration\"\n    mitre_attack_technique = \"Exfiltration Over Web Service\"\
    \n    mitre_attack_url = \"https://attack.mitre.org/techniques/T1567/\"\n    mitre_attack_version\
    \ = \"v13.1\"\n    type = \"Alert\"\n    data_source = \"Workspace Activity\"\n\
    \    severity = \"High\"\n    priority = \"High\"\n\n  events:\n    $email.metadata.vendor_name\
    \ = \"Google Workspace\"\n    $email.metadata.product_name = \"drive\"\n    $email.metadata.event_type\
    \ = \"EMAIL_TRANSACTION\"\n    $email.metadata.product_event_type = \"email_as_attachment\"\
    \n    $email.target.user.email_addresses = /.*@gmail\\.com|.*@aol\\.com|.*@ymail\\\
    .com|.*@ymail\\.com|.*@hotmail\\.com|.*@outlook\\.com|.*@icloud\\.com/\n    $email.principal.user.userid\
    \ = $user_id\n\n  match:\n    $user_id over 1h\n\n  outcome:\n    $risk_score\
    \ = max(75)\n    $mitre_attack_tactic = \"Exfiltration\"\n    $mitre_attack_technique\
    \ = \"Exfiltration Over Web Service\"\n    $mitre_attack_technique_id = \"T1567\"\
    \n    $event_count = count_distinct($email.metadata.id)\n    $product_event_type\
    \ = array_distinct($email.metadata.product_event_type)\n    $userid = array_distinct($email.principal.user.userid)\n\
    \    $doc_type = array_distinct($email.src.resource.attribute.labels[\"doc_type\"\
    ])\n    $owner = array_distinct($email.target.resource.attribute.labels[\"owner\"\
    ])\n    $target_emails = array_distinct($email.target.user.email_addresses)\n\
    \    $doc_name = array_distinct($email.target.resource.name)\n    $doc_id = array_distinct($email.target.resource.product_object_id)\n\
    \    $count_docs = count_distinct($email.target.resource.product_object_id)\n\n\
    \  condition:\n    // Customize the value of $count_docs to set the alerting threshold\
    \ for your environment\n    $email and $count_docs > 10\n}"
  chronicle_rule_name: google_workspace_multiple_files_sent_as_email_attachment_from_google_drive
