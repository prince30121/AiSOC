detection:
  chronicle_yaral: "rule tunnel_rdp_out_port_443 {\n meta:\n    author = \"Emir Erdogan\"\
    \n    description = \"Using RDP To Access Servers Over 443  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/qQSfSVjmAYms\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"T1076\"\n\n  events:\n($selection.principal.process.file.full_path\
    \ = \"C:\\\\Windows\\\\System32\\\\cmd.exe\" and $selection.target.process.file.full_path\
    \ = \"C:\\\\Windows\\\\System32\\\\reg.exe\" and re.regex($selection.target.process.command_line,\
    \ `reg  add .*\\\\Control\\\\TerminalServer\\\\WinStations\\\\RDP-Tcp.* /v PortNumber\
    \ /t  REG_DWORD /d 443 /f`))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: tunnel_rdp_out_port_443
