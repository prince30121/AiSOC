detection:
  chronicle_yaral: "rule existing_service_modified_detector_sysmon_behavior {\n meta:\n\
    \    author = \"Lee Archinal (content)\"\n    description = \"Detects modification\
    \ of existing services's binpPath  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/Jz8LIlhKgGOl\"\n    version\
    \ = \"0.01\"\n    created = \"2019/07/06\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"persistence, t1031\"\n\n  events:\n(($selection1.metadata.product_event_type\
    \ = \"1\" and $selection1.target.process.file.full_path = \"C:\\\\Windows\\\\\
    System32\\\\sc.exe\" and re.regex($selection1.target.process.command_line, `sc\
    \ config .* binpPath= .*`) and $selection1.principal.process.file.full_path =\
    \ \"C:\\\\Windows\\\\System32\\\\cmd.exe\") or ($selection1.metadata.product_event_type\
    \ = \"13\" and $selection1.target.process.file.full_path = \"C:\\\\Windows\\\\\
    System32\\\\services.exe\" and re.regex($selection1.target.registry.registry_key,\
    \ `HKLM\\\\System\\\\CurrentControlSet\\\\services.*\\\\ImagePath`)))\n\n  condition:\n\
    \    $selection1\n}"
  chronicle_rule_name: existing_service_modified_detector_sysmon_behavior
