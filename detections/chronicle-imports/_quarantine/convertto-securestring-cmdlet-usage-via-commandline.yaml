    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule convertto_securestring_cmdlet_usage_via_commandline {\n\n  meta:\n    author\
    \ = \"Teymur Kheirkhabarov (idea), Vasiliy Burov (rule), oscd.community, Tim Shelton\"\
    \n    description = \"Detects usage of the \\\"ConvertTo-SecureString\\\" cmdlet\
    \ via the commandline. Which is fairly uncommon and could indicate potential suspicious\
    \ activity\"\n    reference = \"https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_creation/proc_creation_win_powershell_cmdline_convertto_securestring.yml\"\
    \n    license = \"https://github.com/SigmaHQ/Detection-Rule-License/blob/main/LICENSE.Detection.Rules.md\"\
    \n    rule_name = \"ConvertTo-SecureString Cmdlet Usage Via CommandLine\"\n  \
    \  sigma_uuid = \"74403157-20f5-415d-89a7-c505779585cf\"\n    sigma_status = \"\
    test\"\n    rule_id = \"mr_e637bcef-5047-4ef6-a51d-2108ce1ee0b5\"\n    tactic\
    \ = \"TA0002\"\n    technique = \"T1059.001\"\n    type = \"Detection\"\n    data_source\
    \ = \"Sysmon\"\n    platform = \"Windows\"\n    severity = \"Medium\"\n    priority\
    \ = \"Medium\"\n    false_positives = \"Legitimate use to pass password to different\
    \ powershell commands\"\n\n  events:\n    $process.metadata.event_type = \"PROCESS_LAUNCH\"\
    \n    (\n        re.regex($process.target.process.file.full_path, `\\\\powershell\\\
    .exe$`) nocase or\n        re.regex($process.target.process.file.full_path, `\\\
    \\pwsh\\.exe$`) nocase or\n        $process.src.process.file.full_path = \"powershell.exe\"\
    \ nocase or\n        $process.src.process.file.full_path = \"pwsh.dll\" nocase\n\
    \    )\n    strings.contains(strings.to_lower($process.target.process.command_line),\
    \ \"convertto-securestring\")\n    $process.principal.hostname = $hostname\n\n\
    \  match:\n    $hostname over 5m\n\n    outcome:\n      //example usage of specifying\
    \ test user and hostname to adjust risk score\n      $risk_score = max(if($process.principal.user.userid\
    \ = \"user\" and $process.principal.hostname = \"hostname\", 0, 15))\n      $principal_process_pid\
    \ = array_distinct($process.principal.process.pid)\n      $principal_process_command_line\
    \ = array_distinct($process.principal.process.command_line)\n      $principal_process_file_sha256\
    \ = array_distinct($process.principal.process.file.sha256)\n      $principal_process_file_full_path\
    \ = array_distinct($process.principal.process.file.full_path)\n      $principal_process_product_specfic_process_id\
    \ = array_distinct($process.principal.process.product_specific_process_id)\n \
    \     $principal_process_parent_process_product_specfic_process_id = array_distinct($process.principal.process.parent_process.product_specific_process_id)\n\
    \      $target_process_pid = array_distinct($process.target.process.pid)\n   \
    \   $target_process_command_line = array_distinct($process.target.process.command_line)\n\
    \      $target_process_file_sha256 = array_distinct($process.target.process.file.sha256)\n\
    \      $target_process_file_full_path = array_distinct($process.target.process.file.full_path)\n\
    \      $target_process_product_specfic_process_id = array_distinct($process.target.process.product_specific_process_id)\n\
    \      $principal_user_userid = array_distinct($process.principal.user.userid)\n\
    \      $log_type = array_distinct(strings.concat($process.metadata.log_type,\"\
    /\",$process.metadata.product_event_type))\n\n  condition:\n    $process\n}"
