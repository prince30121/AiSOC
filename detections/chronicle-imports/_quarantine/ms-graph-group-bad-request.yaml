detection:
  chronicle_yaral: "/*\n * Copyright 2025 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule ms_graph_group_bad_request {\n\n  meta:\n    author = \"Google Cloud Security\"\
    \n    description = \"Identify a 400 bad request to the groups endpoint in the\
    \ MS Graph API. GraphRunner's Invoke-SecurityGroupCloner function will trigger\
    \ this if it fails to duplicate a group.\"\n    rule_id = \"mr_09bafa2b-5131-452c-bf5a-021063cfd5c2\"\
    \n    rule_name = \"Hunt for Bad Request errors against the Groups endpoint in\
    \ the Microsoft Graph API\"\n    assumption = \"This detects all web activity\
    \ associated with the groups endpoint with a response code 400, normal admin actions\
    \ could trigger as well. Tune using IP address ranges for admins and user agents.\"\
    \n    reference = \"https://github.com/dafthack/GraphRunner/blob/main/GraphRunner.ps1\"\
    \n    type = \"Hunt\"\n    data_source = \"MS Graph Activity Logs\"\n    platform\
    \ = \"Azure\"\n    severity = \"Low\"\n    priority = \"Low\"\n\n  events:\n \
    \   $api.metadata.event_type = \"NETWORK_HTTP\"\n    $api.metadata.product_event_type\
    \ = \"Microsoft Graph Activity\"\n    $api.target.url = \"https://graph.microsoft.com/v1.0/groups\"\
    \ nocase\n    $api.network.http.method = \"POST\"\n    $api.network.http.response_code\
    \ = 400\n\n    //Can be tuned for specific User Agent strings being used\n   \
    \ //$api.network.http.user_agent = /PowerShell/ nocase\n    //SkypeSpaces triggered\
    \ during testing so filtering this out\n    $api.network.http.user_agent != \"\
    SkypeSpaces/1.0a$*+\"\n\n    $api.principal.ip = $ip\n    $api.network.session_id\
    \ = $session\n\n  match:\n    $ip, $session over 5m\n\n  outcome:\n    $risk_score\
    \ = 35\n    $event_count = count_distinct($api.metadata.id)\n    $requesting_user_guid\
    \ = array_distinct($api.principal.user.userid)\n    $requesting_ip = array_distinct($api.principal.ip)\n\
    \    $user_agent = array_distinct($api.network.http.user_agent)\n    $location\
    \ = array_distinct($api.principal.location.name)\n    $target_application_id_guid\
    \ = array_distinct($api.target.resource.product_object_id)\n    $session_id =\
    \ array_distinct($api.network.session_id)\n    $target_url = array_distinct($api.target.url)\n\
    \n  condition:\n    $api\n}"
  chronicle_rule_name: ms_graph_group_bad_request
