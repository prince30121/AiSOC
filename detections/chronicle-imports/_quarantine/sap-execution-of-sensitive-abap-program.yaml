    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule sap_execution_of_sensitive_abap_program {\n\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Detects the execution of high-risk ABAP\
    \ programs (AUW). These programs often bypass standard transaction-level security.\"\
    \n    severity = \"High\"\n    tactic = \"TA0002\"\n    technique = \"T1059\"\n\
    \n  events:\n    $e.metadata.log_type = \"SAP_SECURITY_AUDIT\"\n\n    $e.principal.process.file.names\
    \ = %sap_sensitive_abap_programs.abap_program\n\n    $user = $e.principal.user.userid\n\
    \n    //exclusions\n    not $user in %sap_admin_users.user\n\n  match:\n    $user\
    \ over 1h\n\n  outcome:\n    $risk_score = 60\n    $sensitive_abap_program = array_distinct($e.principal.process.file.names)\n\
    \    $description = array_distinct($e.metadata.description)\n    $sid = array_distinct($e.target.application)\n\
    \    $t_code = array_distinct($e.security_result.detection_fields[\"slgtc_1\"\
    ])\n\n  condition:\n    $e\n}"
  chronicle_rule_name: sap_execution_of_sensitive_abap_program
provenance:
