    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule rw_windows_password_spray_T1110_003 {\n\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Detect repeated authentication failure\
    \ with multiple users indicative of a password spray attack.\"\n    rule_id =\
    \ \"mr_5d6c9686-992f-4caf-bf1b-2fec05925c49\"\n    rule_name = \"MITRE ATT&CK\
    \ T1110.003 RW Windows Password Spray\"\n    type = \"alert\"\n    data_source\
    \ = \"microsoft windows events\"\n    tactic = \"TA0006\"\n    technique = \"\
    T1110.003\"\n    platform = \"Windows\"\n    severity = \"Medium\"\n    priority\
    \ = \"Medium\"\n\n  events:\n    $login.metadata.event_type = \"USER_LOGIN\"\n\
    \    $login.metadata.vendor_name = \"Microsoft\"\n    $login.principal.hostname\
    \ = $hostname\n    $login.target.user.userid = $user\n    $login.security_result.action\
    \ = \"BLOCK\"\n\n  match:\n    $hostname over 30m\n\n  outcome:\n    $risk_score\
    \ = 65\n    $event_count = count_distinct($login.metadata.id)\n    $user_login_threshold\
    \ = 10\n    $target_user_distinct_count = count_distinct($user)\n    $target_user_count\
    \ = count($user)\n    $tlp = array_distinct(\"amber\")\n    // added to populate\
    \ alert graph with additional context\n    // Commented out principal.hostname\
    \ because it is already represented in graph as match variable. If match changes,\
    \ can uncomment to add to results\n    //$principal_hostname = array_distinct($login.principal.hostname)\n\
    \    $principal_ip = array_distinct($login.principal.ip)\n    $target_hostname\
    \ = array_distinct($login.target.hostname)\n    $src_hostname = array_distinct($login.src.hostname)\n\
    \    $target_ip = array_distinct($login.target.ip)\n    $principal_user_userid\
    \ = array_distinct($login.principal.user.userid)\n    $target_user_userid = array_distinct($login.target.user.userid)\n\
    \    $principal_resource_name = array_distinct($login.principal.resource.name)\n\
    \    $target_resource_name = array_distinct($login.target.resource.name)\n   \
    \ $target_url = array_distinct($login.target.url)\n\n  condition:\n    #user >\
    \ 10\n}"
