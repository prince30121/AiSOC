detection:
  chronicle_yaral: "/*\n * Copyright 2025 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule ms_graph_estimate_access {\n\n  meta:\n    author = \"Google Cloud Security\"\
    \n    description = \"Estimate Access is an undocumented API in MS Graph and is\
    \ used in the following GraphRunner functions Get-UpdatableGroups, Get-DynamicGroups\
    \ and Invoke-GraphRecon. Although not inherently malicious, it does submit an\
    \ action and then determines if the user can perform it\"\n    rule_id = \"mr_381921b8-e935-4720-9ff6-2d966aa00a32\"\
    \n    rule_name = \"Hunt for Undocumented API - Estimate Access called in Microsoft\
    \ Graph API\"\n    assumption = \"This can be chatty due to other commands calling\
    \ this single API. Additional tuning of admin consoles and user agent strings\
    \ may be needed.\"\n    reference = \"https://github.com/dafthack/GraphRunner/blob/main/GraphRunner.ps1\"\
    \n    type = \"Hunt\"\n    data_source = \"MS Graph Activity Logs\"\n    platform\
    \ = \"Azure\"\n    severity = \"Low\"\n    priority = \"Low\"\n\n  events:\n \
    \   $api.metadata.event_type = \"NETWORK_HTTP\"\n    $api.metadata.product_event_type\
    \ = \"Microsoft Graph Activity\"\n    $api.target.url = \"https://graph.microsoft.com/beta/roleManagement/directory/estimateAccess\"\
    \ nocase\n    //Can be tuned for specific User Agent strings being used - by default\
    \ GraphRunner does not forge the UA for this action\n    //$api_est.network.http.user_agent\
    \ = /PowerShell/ nocase\n    $api.network.http.method = \"POST\"\n    $api.network.http.response_code\
    \ = 200\n    //Used to filter admin consoles and/or internal Microsoft addresses\
    \ as needed, the following IP CIDR blocks are part of Azure for instance\n   \
    \ //$api.principal.ip != \"10.10.10.10\"\n    NOT (\n        net.ip_in_range_cidr($api.principal.ip,\
    \ \"20.228.0.0/18\") or\n        net.ip_in_range_cidr($api.principal.ip, \"20.228.64.0/18\"\
    ) or\n        net.ip_in_range_cidr($api.principal.ip, \"20.228.128.0/17\")\n \
    \   )\n    /*Used to filter Microsoft IPv6 network ranges, can tune this further\
    \ as needed;\n      additional ranges may need to be added, but this provides\
    \ an example on how this can be done. */\n    NOT net.ip_in_range_cidr($api.principal.ip,\
    \ \"2a01:0111:f100:0000:0000:0000:0000:0000/40\")\n    $api.principal.ip = $ip\n\
    \    $api.network.session_id = $session\n\n  match:\n    $ip, $session over 5m\n\
    \n  outcome:\n    $risk_score = 35\n    $event_count = count_distinct($api.metadata.id)\n\
    \    $requesting_user_guid = array_distinct($api.principal.user.userid)\n    $requesting_ip\
    \ = array_distinct($api.principal.ip)\n    $user_agent = array_distinct($api.network.http.user_agent)\n\
    \    $location = array_distinct($api.principal.location.name)\n    $target_application_id_guid\
    \ = array_distinct($api.target.resource.product_object_id)\n    $session_id =\
    \ array_distinct($api.network.session_id)\n\n  condition:\n    //Can be modified\
    \ to add a threshold for how many estimate access events is considered accesptable\n\
    \    $api // and $event_count > 10\n}"
  chronicle_rule_name: ms_graph_estimate_access
