detection:
  chronicle_yaral: "/*\n * Copyright 2024 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    rule google_cloud_service_account_key_created_or_uploaded {\n\n  meta:\n    author\
    \ = \"Google Cloud Security\"\n    description = \"Detects when a service account\
    \ key is created in or uploaded to a monitored Google Cloud project.\"\n    rule_id\
    \ = \"mr_751d64b3-2aef-4c5b-bf39-abc6577f6ce8\"\n    rule_name = \"Google Cloud\
    \ Service Account Key Created or Uploaded\"\n    assumption = \"Google SecOps\
    \ is ingesting Google Cloud logs. Reference: https://cloud.google.com/chronicle/docs/ingestion/cloud/ingest-gcp-logs\"\
    \n    type = \"alert\"\n    severity = \"Medium\"\n    priority = \"Medium\"\n\
    \    platform = \"Google Cloud\"\n    data_source = \"GCP Cloud Audit\"\n    mitre_attack_tactic\
    \ = \"Persistence\"\n    mitre_attack_technique = \"Account Manipulation: Additional\
    \ Cloud Credentials\"\n    mitre_attack_url = \"https://attack.mitre.org/techniques/T1098/001/\"\
    \n    mitre_attack_version = \"v15\"\n    reference = \"https://cloud.google.com/iam/docs/best-practices-for-managing-service-account-keys\"\
    \n\n  events:\n    $gc.metadata.log_type = \"GCP_CLOUDAUDIT\"\n    $gc.metadata.product_name\
    \ = \"Google Cloud IAM\"\n    (\n        $gc.metadata.product_event_type = \"\
    google.iam.admin.v1.CreateServiceAccountKey\" or\n        $gc.metadata.product_event_type\
    \ = \"google.iam.admin.v1.UploadServiceAccountKey\"\n    )\n    $gc.security_result.action\
    \ = \"ALLOW\"\n    $gc.security_result.detection_fields[\"key_id\"] = $sa_key_id\n\
    \n  match:\n    $sa_key_id over 30m\n\n  outcome:\n    $risk_score = max(65)\n\
    \    $mitre_attack_tactic = \"Persistence\"\n    $mitre_attack_technique = \"\
    Account Manipulation: Additional Cloud Credentials\"\n    $mitre_attack_technique_id\
    \ = \"T1098.001\"\n    $event_count = count_distinct($gc.metadata.id)\n    $principal_ip\
    \ = array_distinct($gc.principal.ip)\n    $principal_user_userid = array_distinct($gc.principal.user.userid)\n\
    \    $principal_ip_country = array_distinct($gc.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($gc.principal.ip_geo_artifact.location.state)\n\
    \    $principal_ip_city = array_distinct($gc.principal.location.city)\n    $security_result_summary\
    \ = array_distinct($gc.security_result.summary)\n    $sa_key_expiry_date = array_distinct(timestamp.get_date(cast.as_int($gc.about.labels[\"\
    res_valid_before_time\"])))\n\n  condition:\n    $gc\n}"
  chronicle_rule_name: google_cloud_service_account_key_created_or_uploaded
