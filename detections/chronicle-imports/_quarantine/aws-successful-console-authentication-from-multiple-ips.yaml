detection:
  chronicle_yaral: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache\
    \ License, Version 2.0 (the \"License\");\n * you may not use this file except\
    \ in compliance with the License.\n * You may obtain a copy of the License at\n\
    \ *\n *     https://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required\
    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule aws_successful_console_authentication_from_multiple_ips {\n\n  meta:\n\
    \    author = \"Google Cloud Security\"\n    description = \"Detects when an AWS\
    \ user successfully authenticating from more than one unique IP address within\
    \ 5 minutes.\"\n    rule_id = \"mr_4a221c43-1059-4247-a7a6-69d8ce4dca2c\"\n  \
    \  rule_name = \"AWS Successful Console Authentication From Multiple IPs\"\n \
    \   mitre_attack_tactic = \"Resource Development\"\n    mitre_attack_technique\
    \ = \"Compromise Accounts\"\n    mitre_attack_url = \"https://attack.mitre.org/techniques/T1586/\"\
    \n    mitre_attack_version = \"v13.1\"\n    type = \"Alert\"\n    data_source\
    \ = \"AWS CloudTrail\"\n    platform = \"AWS\"\n    severity = \"Medium\"\n  \
    \  priority = \"Medium\"\n\n  events:\n    $login.metadata.vendor_name = \"AMAZON\"\
    \n    $login.metadata.product_name = \"AWS CloudTrail\"\n    $login.metadata.event_type\
    \ = \"USER_LOGIN\"\n    $login.metadata.product_event_type = \"ConsoleLogin\"\n\
    \    $login.security_result.action = \"ALLOW\"\n    $login.principal.ip = $ip\n\
    \    $login.target.user.userid = $user_id\n\n  match:\n    $user_id over 5m\n\n\
    \  outcome:\n    $risk_score = max(\n        // Unauthorized geographies\n   \
    \     if($login.principal.ip_geo_artifact.location.country_or_region = \"Cuba\"\
    , 40) +\n        if($login.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Iran\", 40) +\n        if($login.principal.ip_geo_artifact.location.country_or_region\
    \ = \"North Korea\" , 40) +\n        if($login.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Russia\", 40) +\n        if($login.principal.ip_geo_artifact.location.country_or_region\
    \ = \"Syria\", 40)\n    )\n    $mitre_attack_tactic = \"Resource Development\"\
    \n    $mitre_attack_technique = \"Compromise Accounts\"\n    $mitre_attack_technique_id\
    \ = \"T1586\"\n    $event_count = count_distinct($login.metadata.id)\n    $network_http_user_agent\
    \ = array_distinct($login.network.http.user_agent)\n    $principal_ip = array_distinct($login.principal.ip)\n\
    \    $principal_ip_country = array_distinct($login.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($login.principal.ip_geo_artifact.location.state)\n\
    \    $target_user_userid = array_distinct($login.target.user.userid)\n    $is_mfa_used\
    \ = array_distinct($login.extensions.auth.auth_details)\n    $target_resource_name\
    \ = array_distinct($login.target.resource.name)\n    $target_resource_product_object_id\
    \ = array_distinct($login.target.resource.product_object_id)\n\n  condition:\n\
    \    $login and #ip > 1\n}"
  chronicle_rule_name: aws_successful_console_authentication_from_multiple_ips
