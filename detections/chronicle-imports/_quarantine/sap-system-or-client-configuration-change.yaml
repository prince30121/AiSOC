    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule sap_system_or_client_configuration_change {\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Detects changes to either Global System\
    \ Changeability (EU1) or Client-Specific Configuration (EU2/SCC4).\"\n    severity\
    \ = \"High\"\n    tactic = \"TA0005\"\n    technique = \"T1562.001\"\n\n  events:\n\
    \    $e.metadata.log_type = \"SAP_SECURITY_AUDIT\"\n\n        (\n            $e.additional.fields[\"\
    msg_1\"] = \"EU1\" or\n            $e.additional.fields[\"msg_1\"] = \"EU2\"\n\
    \        )\n\n\n    $user = $e.principal.user.userid\n\n  match:\n    $user over\
    \ 1h\n\n  outcome:\n    $risk_score = max(if($e.additional.fields[\"msg_1\"] =\
    \ \"EU1\", 95, 60))\n\n    $client = array_distinct($e.target.resource.attribute.labels[\"\
    slgmand\"])\n    $principal_user = array_distinct($user)\n    $msg_id = array_distinct($e.additional.fields[\"\
    msg_1\"])\n    $terminal_ip = array_distinct($e.principal.ip)\n    $details =\
    \ array_distinct($e.metadata.description)\n\n  condition:\n    $e\n}"
  chronicle_rule_name: sap_system_or_client_configuration_change
