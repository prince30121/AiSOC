detection:
  chronicle_yaral: "rule powershell_download_sysmon {\n meta:\n    author = \"Michael\
    \ Haag, Alexandr Yampolskyi\"\n    description = \"Detects usage of Powershell\
    \ Download commands.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/ohSPUJGJvK0U\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"Execution, t1204, t1059\"\n\n  events:\n($selection.metadata.product_event_type\
    \ = \"1\" and $selection.target.process.file.full_path = \"powershell.exe\" and\
    \ (re.regex($selection.target.process.command_line, `.*DownloadFile.*`) or re.regex($selection.target.process.command_line,\
    \ `.*invoke-webrequest.*`) or re.regex($selection.target.process.command_line,\
    \ `.*iwr`)))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: powershell_download_sysmon
