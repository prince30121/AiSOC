detection:
  chronicle_yaral: "rule default_powersploit_schtasks_persistence {\n meta:\n    author\
    \ = \"Markus Neis\"\n    description = \"Detects the creation of a schtask via\
    \ PowerSploit Default Configuration  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/MbHasyqcmAzU\"\n    version\
    \ = \"0.01\"\n    created = \"2018/03/06\"\n    product = \"windows\"\n    service\
    \ = \"sysmon\"\n    mitre = \"execution, persistence, privilege_escalation, t1053,\
    \ t1086, s0111, g0022, g0060\"\n\n  events:\n(re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\Powershell\\.exe`) and (re.regex($selection.target.process.command_line,\
    \ `.*\\\\schtasks\\.exe.*/Create.*/RU.*system.*/SC.*ONLOGON.*`) or re.regex($selection.target.process.command_line,\
    \ `.*\\\\schtasks\\.exe.*/Create.*/RU.*system.*/SC.*DAILY.*`) or re.regex($selection.target.process.command_line,\
    \ `.*\\\\schtasks\\.exe.*/Create.*/RU.*system.*/SC.*ONIDLE.*`) or re.regex($selection.target.process.command_line,\
    \ `.*\\\\schtasks\\.exe.*/Create.*/RU.*system.*/SC.*HOURLY.*`)))\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: default_powersploit_schtasks_persistence
