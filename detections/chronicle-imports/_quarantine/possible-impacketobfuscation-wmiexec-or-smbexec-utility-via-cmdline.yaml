detection:
  chronicle_yaral: "rule possible_impacketobfuscation_wmiexec_or_smbexec_utility_via_cmdline\
    \ {\n meta:\n    author = \"SOC Prime Team, Fireeye\"\n    description = \"Impacket-Obfuscation\
    \ is a slightly obfuscated version of the open source Impacket framework. This\
    \ IOC looks for artifacts from the execution of SMBEXEC/WMIEXEC python script\
    \ which is part of Impacket-Obfuscation framework.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/OzLZ6gLruXjQ\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"persistence, privilege_escalation,\
    \ execution, lateral_movement, t1047, t1021.002, t1543.003\"\n\n  events:\n(($selection1.metadata.product_event_type\
    \ = \"4688\" or $selection1.metadata.product_event_type = \"1\") and ((re.regex($selection1.target.process.command_line,\
    \ `.*cmd.*`) and re.regex($selection1.target.process.command_line, `.*/K.*`) and\
    \ re.regex($selection1.target.process.command_line, `.*/Q.*`)) or (re.regex($selection1.target.process.command_line,\
    \ `.*/q.*`) or re.regex($selection1.target.process.command_line, `.*/K.*`) or\
    \ re.regex($selection1.target.process.command_line, `.*echo.*`) or re.regex($selection1.target.process.command_line,\
    \ `.*%CoMSpEC%.*`))))\n\n  condition:\n    $selection1\n}"
  chronicle_rule_name: possible_impacketobfuscation_wmiexec_or_smbexec_utility_via_cmdline
