    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule aws_ec2_get_windows_admin_password {\n\n  meta:\n    author = \"Google\
    \ Cloud Security\"\n    description = \"Detects a successful attempt to retrieve\
    \ the encrypted Administrator password for a Windows EC2 instance.\"\n    rule_id\
    \ = \"mr_92364192-b3c7-4e5d-a1a1-eb7b3adbd0e4\"\n    rule_name = \"AWS EC2 Get\
    \ Windows Admin Password\"\n    mitre_attack_tactic = \"Credential Access\"\n\
    \    mitre_attack_technique = \"Credentials from Password Stores\"\n    mitre_attack_url\
    \ = \"https://attack.mitre.org/techniques/T1555/\"\n    mitre_attack_version =\
    \ \"v13.1\"\n    type = \"Alert\"\n    data_source = \"AWS CloudTrail\"\n    platform\
    \ = \"AWS\"\n    severity = \"High\"\n    priority = \"High\"\n\n  events:\n \
    \   $cloudtrail.metadata.vendor_name = \"AMAZON\"\n    $cloudtrail.metadata.product_name\
    \ = \"AWS CloudTrail\"\n    $cloudtrail.metadata.product_event_type = \"GetPasswordData\"\
    \n    $cloudtrail.security_result.action = \"ALLOW\"\n    $cloudtrail.principal.ip\
    \ = $ip\n\n  match:\n    $ip over 1h\n\n  outcome:\n    $risk_score = max(75)\n\
    \    $mitre_attack_tactic = \"Credential Access\"\n    $mitre_attack_technique\
    \ = \"Credentials from Password Stores\"\n    $mitre_attack_technique_id = \"\
    T1555\"\n    $event_count = count_distinct($cloudtrail.metadata.id)\n    $network_http_user_agent\
    \ = array_distinct($cloudtrail.network.http.user_agent)\n    $principal_ip = array_distinct($cloudtrail.principal.ip)\n\
    \    $principal_ip_country = array_distinct($cloudtrail.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($cloudtrail.principal.ip_geo_artifact.location.state)\n\
    \    $principal_user_display_name = array_distinct($cloudtrail.principal.user.user_display_name)\n\
    \    $recipient_aws_account_id = array_distinct($cloudtrail.additional.fields[\"\
    recipientAccountId\"])\n    $aws_region = array_distinct($cloudtrail.principal.location.name)\n\
    \    $target_resource_ancestors_product_object_id = array_distinct($cloudtrail.target.resource_ancestors.product_object_id)\n\
    \n  condition:\n    $cloudtrail\n}"
  chronicle_rule_name: aws_ec2_get_windows_admin_password
