detection:
  chronicle_yaral: "rule possible_process_enumeration_sysmonwindows_logs {\n meta:\n\
    \    author = \"Roman Ranskyi\"\n    description = \"Adversaries may attempt to\
    \ get information about running processes on a system. Information obtained could\
    \ be used to gain an understanding of common software running on systems within\
    \ the network.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/GnIdeJaSAljy\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"Discovery, t1057\"\n\n  events:\n(($selection.target.process.command_line\
    \ = \"tasklist.exe\" or re.regex($selection.target.process.command_line, `Get-Process.*`))\
    \ and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: possible_process_enumeration_sysmonwindows_logs
