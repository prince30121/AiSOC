detection:
  chronicle_yaral: "rule dridex_process_pattern {\n meta:\n    author = \"Florian\
    \ Roth\"\n    description = \"Detects typical Dridex process patterns  License:\
    \ https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\n\
    \    reference = \"https://tdm.socprime.com/tdm/info/GN1qQlT3qRCj\"\n    version\
    \ = \"0.01\"\n    created = \"2019/01/10\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n\n  events:\n(($selection1.metadata.product_event_type\
    \ = \"4688\" or $selection1.metadata.product_event_type = \"1\") and (re.regex($selection1.target.process.command_line,\
    \ `.*\\\\svchost\\.exe C:\\\\Users\\\\.*\\\\Desktop\\\\.*`) or (re.regex($selection1.principal.process.file.full_path,\
    \ `.*\\\\svchost\\.exe.*`) and (re.regex($selection1.target.process.command_line,\
    \ `.*whoami\\.exe /all`) or re.regex($selection1.target.process.command_line,\
    \ `.*net\\.exe view`)))))\n\n  condition:\n    $selection1\n}"
  chronicle_rule_name: dridex_process_pattern
