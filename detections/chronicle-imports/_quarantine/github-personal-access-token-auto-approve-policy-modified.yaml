    \ by applicable law or agreed to in writing, software\n * distributed under the\
    \ License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS\
    \ OF ANY KIND, either express or implied.\n * See the License for the specific\
    \ language governing permissions and\n * limitations under the License.\n */\n\
    \nrule github_personal_access_token_auto_approve_policy_modified {\n\n  meta:\n\
    \    author = \"Google Cloud Security\"\n    description = \"Detects when changes\
    \ are made to a GitHub organization's fine-grained Personal Access Token approval\
    \ policy.\"\n    rule_id = \"mr_516c8368-2e3c-4585-afa1-c5df49b214ad\"\n    rule_name\
    \ = \"GitHub Personal Access Token Auto Approve Policy Modified\"\n    assumption\
    \ = \"Your GitHub enterprise audit log settings are configured to log the source\
    \ IP address for events. Reference: https://docs.github.com/en/organizations/keeping-your-organization-secure/managing-security-settings-for-your-organization/displaying-ip-addresses-in-the-audit-log-for-your-organization\"\
    \n    type = \"alert\"\n    severity = \"Medium\"\n    priority = \"Medium\"\n\
    \    platform = \"GitHub\"\n    data_source = \"github\"\n    mitre_attack_tactic\
    \ = \"Defense Evasion\"\n    mitre_attack_technique = \"Impair Defenses: Disable\
    \ or Modify Tools\"\n    mitre_attack_url = \"https://attack.mitre.org/versions/v14/techniques/T1562/001/\"\
    \n    mitre_attack_version = \"v14\"\n    reference = \"https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/audit-log-events-for-your-enterprise\"\
    \n\n  events:\n    $github.metadata.vendor_name = \"GITHUB\" nocase\n    $github.metadata.product_name\
    \ = \"GITHUB\"\n    (\n        $github.metadata.product_event_type = \"auto_approve_personal_access_token_requests.disable\"\
    \ or\n        $github.metadata.product_event_type = \"auto_approve_personal_access_token_requests.enable\"\
    \ or\n        $github.metadata.product_event_type = \"forbid_auto_approve_personal_access_token_requests.disable\"\
    \ or\n        $github.metadata.product_event_type = \"forbid_auto_approve_personal_access_token_requests.enable\"\
    \n    )\n\n  outcome:\n    $risk_score = max(65)\n    $mitre_attack_tactic = \"\
    Defense Evasion\"\n    $mitre_attack_technique = \"Impair Defenses: Disable or\
    \ Modify Tools\"\n    $mitre_attack_technique_id = \"T1562.001\"\n    $principal_ip\
    \ = array_distinct($github.principal.ip)\n    $principal_user_userid = array_distinct($github.principal.user.userid)\n\
    \    $principal_ip_country = array_distinct($github.principal.ip_geo_artifact.location.country_or_region)\n\
    \    $principal_ip_state = array_distinct($github.principal.ip_geo_artifact.location.state)\n\
    \    $principal_ip_city = array_distinct($github.principal.location.city)\n  \
    \  $security_result_summary = array_distinct($github.security_result.summary)\n\
    \n  condition:\n    $github\n}"
  chronicle_rule_name: github_personal_access_token_auto_approve_policy_modified
