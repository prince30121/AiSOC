detection:
  chronicle_yaral: "rule default_powersploit_and_empire_schtasks_persistence {\n meta:\n\
    \    author = \"Markus Neis, @Karneades\"\n    description = \"Detects the creation\
    \ of a schtask via PowerSploit or Empire Default Configuration.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/WqCUvktzgL7k\"\n    version\
    \ = \"0.01\"\n    created = \"2018/03/06\"\n    product = \"windows\"\n    category\
    \ = \"process_creation\"\n    mitre = \"execution, persistence, privilege_escalation,\
    \ t1053, t1086, s0111, g0022, g0060, car.2013-08-001\"\n\n  events:\n(re.regex($selection.principal.process.file.full_path,\
    \ `.*\\\\powershell\\.exe`) and (re.regex($selection.target.process.command_line,\
    \ `.*schtasks.*/Create.*/SC .*ONLOGON.*/TN .*Updater.*/TR .*powershell.*`) or\
    \ re.regex($selection.target.process.command_line, `.*schtasks.*/Create.*/SC .*DAILY.*/TN\
    \ .*Updater.*/TR .*powershell.*`) or re.regex($selection.target.process.command_line,\
    \ `.*schtasks.*/Create.*/SC .*ONIDLE.*/TN .*Updater.*/TR .*powershell.*`) or re.regex($selection.target.process.command_line,\
    \ `.*schtasks.*/Create.*/SC .*Updater.*/TN .*Updater.*/TR .*powershell.*`)) and\
    \ ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: default_powersploit_and_empire_schtasks_persistence
