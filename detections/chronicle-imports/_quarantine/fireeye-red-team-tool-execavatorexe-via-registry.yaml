detection:
  chronicle_yaral: "rule fireeye_red_team_tool__execavatorexe_via_registry {\n meta:\n\
    \    author = \"SOC Prime Team, FireEye\"\n    description = \"This rule has been\
    \ ported from Fireeye's HXIOC format to SIGMA. It detects the Fireeye tool excavator.exe\
    \ making a registry change affecting the iphlpsvc6 service.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/eQx73ocSqK7c\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    product = \"windows\"\n    category\
    \ = \"registry_event\"\n    mitre = \"credential_access, t1003.001\"\n\n  events:\n\
    ($selection.metadata.event_type = \"SetValue\" and re.regex($selection.target.registry.registry_key,\
    \ `.*CurrentControlSet\\\\services\\\\iphlpsvc6\\\\ImagePath`))\n\n  condition:\n\
    \    $selection\n}"
  chronicle_rule_name: fireeye_red_team_tool__execavatorexe_via_registry
