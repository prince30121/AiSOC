detection:
  chronicle_yaral: "rule fireeye_red_team_tool__g2js_suspicious_process_tree {\n meta:\n\
    \    author = \"Sittikorn S, FireEye\"\n    description = \"This rule has been\
    \ ported from Fireeye's HXIOC format to SIGMA. It detects the Fireeye tool GadgetToJScript(G2JS).\
    \  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/2CudqsJPVCUh\"\n    version\
    \ = \"0.01\"\n    created = \"2020/12/11\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, defense_evasion, t1218.005,\
    \ t1059\"\n\n  events:\n((re.regex($selection.target.process.file.full_path, `.*userinit\\\
    .exe.*`) or re.regex($selection.target.process.file.full_path, `.*colorcpl\\.exe.*`))\
    \ and (re.regex($selection.principal.process.file.full_path, `.*mshta\\.exe.*`)\
    \ or re.regex($selection.principal.process.file.full_path, `.*cscript\\.exe.*`)\
    \ or re.regex($selection.principal.process.file.full_path, `.*wscript\\.exe.*`))\
    \ and ($selection.metadata.product_event_type = \"4688\" or $selection.metadata.product_event_type\
    \ = \"1\"))\n\n  condition:\n    $selection\n}"
  chronicle_rule_name: fireeye_red_team_tool__g2js_suspicious_process_tree
