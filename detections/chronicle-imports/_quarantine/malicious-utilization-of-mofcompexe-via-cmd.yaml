detection:
  chronicle_yaral: "rule malicious_utilization_of_mofcompexe_via_cmd {\n meta:\n \
    \   author = \"Ariel Millahuel\"\n    description = \"Detects the invocation of\
    \ mofcomp.exe via CMD in order to execute an malicious script  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.\"\
    \n    reference = \"https://tdm.socprime.com/tdm/info/gi7fSTwClhB3\"\n    version\
    \ = \"0.01\"\n    created = \"2021-03-09\"\n    category = \"process_creation\"\
    \n    product = \"windows\"\n    mitre = \"execution, S0106\"\n\n  events:\n($selection1.target.process.file.full_path\
    \ = \"cmd.exe\" and ($selection1.metadata.product_event_type = \"4688\" or $selection1.metadata.product_event_type\
    \ = \"1\") and ((re.regex($selection1.target.process.command_line, `.* cmd /c\
    \ mofcomp\\.exe C:\\\\Windows\\\\temp.*\\.rar .*`) or re.regex($selection1.target.process.command_line,\
    \ `.* cmd /c del C:\\\\Windows\\\\temp.*\\.rar .*`) or re.regex($selection1.target.process.command_line,\
    \ `.* cmd /c mofcomp\\.exe C:\\\\Windows\\\\temp.*\\..*  .*`) or re.regex($selection1.target.process.command_line,\
    \ `.* cmd /c del C:\\\\Windows\\\\temp.*\\..* .*`)) or (re.regex($selection1.target.process.command_line,\
    \ `.* cmd /c mofcomp\\.exe C:\\\\Users.*\\\\AppData\\\\Local\\\\Temp.*\\..* .*`)\
    \ or re.regex($selection1.target.process.command_line, `.* cmd /c del C:\\\\Users.*\\\
    \\AppData\\\\Local\\\\Temp.*\\..* .*`))))\n\n  condition:\n    $selection1\n}"
  chronicle_rule_name: malicious_utilization_of_mofcompexe_via_cmd
