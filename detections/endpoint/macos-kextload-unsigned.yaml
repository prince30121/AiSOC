id: det-endpoint-208
name: kextload Of Unsigned Kernel Extension
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'kextload Of Unsigned
  Kernel Extension'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1547.006
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/kextload"
    AND kext_signed == false
false_positives:
- Approved hardware vendor (allow-listed)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
