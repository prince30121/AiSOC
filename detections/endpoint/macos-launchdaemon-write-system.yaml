id: det-endpoint-191
name: LaunchDaemon Plist Written To /Library/LaunchDaemons
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'LaunchDaemon Plist
  Written To /Library/LaunchDaemons'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1543.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "ES_EVENT_TYPE_NOTIFY_WRITE"
    AND path CONTAINS "/Library/LaunchDaemons/"
    AND creator_signing_id NOT IN ["com.apple.installer", "com.apple.softwareupdated"]
false_positives:
- Vendor pkg install (allow-listed)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
