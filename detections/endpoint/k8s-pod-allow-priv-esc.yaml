id: det-endpoint-244
name: Pod Allows Privilege Escalation
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Pod Allows Privilege
  Escalation'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    event_type == "create_pod"
    AND allow_privilege_escalation == true
    AND environment == "prod"
false_positives:
- Workload that needs setuid binaries (rare)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
