id: det-endpoint-296
name: Process Tapping macOS Keyboard Events
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Process Tapping
  macOS Keyboard Events'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1056.001
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: es_process_events
detection:
  condition: |
    event_type == "osquery_query_row"
    AND query_name CONTAINS "Keyboard_Event_Tap"
false_positives:
- Authorised accessibility software or approved input manager
playbook: tpl-collection
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
