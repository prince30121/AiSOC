id: det-endpoint-193
name: Login Item Added Via osascript
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Login Item Added
  Via osascript'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1547.015
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/osascript"
    AND argv CONTAINS "login items"
false_positives:
- IT helpdesk onboarding script
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
