id: det-endpoint-189
name: LD_PRELOAD Pointing To /tmp
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'LD_PRELOAD Pointing
  To /tmp'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1574.006
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execve"
    AND env_ld_preload STARTSWITH "/tmp/"
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
