id: det-endpoint-280
name: SCCM Client Installed From Untrusted Source
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'SCCM Client Installed
  From Untrusted Source'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1195.002
- tlp.white
category: endpoint
log_source:
  product: endpoint
  service: agent
detection:
  condition: |
    event_type == "agent_install"
    AND agent == "sccm"
    AND source_signed_by_known_publisher == false
false_positives:
- Migration to new MECM tenant
playbook: tpl-supply-chain
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
