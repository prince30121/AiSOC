id: det-endpoint-227
name: hyperkit Launched From Non-Standard Path
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'hyperkit Launched
  From Non-Standard Path'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1610
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path CONTAINS "/hyperkit"
    AND process_path_not STARTSWITH_ANY ["/Applications/", "/usr/local/bin/"]
false_positives:
- Custom virtualisation tooling
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
