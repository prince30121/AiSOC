id: det-endpoint-261
name: VPN App Installed On Managed Device
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'VPN App Installed
  On Managed Device'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1572
- tlp.white
category: endpoint
log_source:
  product: mobile
  service: mdm
detection:
  condition: |
    event_type == "app_install"
    AND category == "vpn"
false_positives:
- Approved corporate VPN
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
