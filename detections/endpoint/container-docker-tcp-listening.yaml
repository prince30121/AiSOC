id: det-endpoint-231
name: Docker Daemon Listening On TCP Socket
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Docker Daemon Listening
  On TCP Socket'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1610
- tlp.white
category: endpoint
log_source:
  product: docker
  service: dockerd
detection:
  condition: |
    event_type == "daemon_listening"
    AND address CONTAINS "tcp://0.0.0.0"
false_positives:
- Approved CI runner pattern (must require mTLS)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
