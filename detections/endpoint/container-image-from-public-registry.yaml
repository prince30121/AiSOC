id: det-endpoint-232
name: Production Container Pulled From Public Registry
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Production Container
  Pulled From Public Registry'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1525
- tlp.white
category: endpoint
log_source:
  product: docker
  service: dockerd
detection:
  condition: |
    event_type == "image_pull"
    AND image_registry IN ["docker.io", "ghcr.io"]
    AND environment == "prod"
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-supply-chain
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
