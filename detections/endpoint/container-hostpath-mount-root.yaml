id: det-endpoint-235
name: Container Mounted Host Root Filesystem
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Container Mounted
  Host Root Filesystem'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: docker
  service: dockerd
detection:
  condition: |
    event_type == "container_create"
    AND host_mount_path == "/"
false_positives:
- Sanctioned node-agent (allow-listed)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
