id: det-endpoint-219
name: iCloud Keychain Sync Toggled Off
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'iCloud Keychain
  Sync Toggled Off'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1562
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/defaults"
    AND argv CONTAINS_ALL ["com.apple.security", "AccountSettings", "Keychain"]
false_positives:
- Privacy compliance preference
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
