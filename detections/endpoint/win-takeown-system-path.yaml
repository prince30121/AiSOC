id: det-endpoint-121
name: takeown.exe Used Against System Path
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'takeown.exe Used
  Against System Path'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1222.001
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "takeown.exe"
    AND process_command_line CONTAINS_ANY ["c:\windows\", "system32"]
false_positives:
- Approved patch / maintenance window activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
