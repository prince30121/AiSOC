id: det-endpoint-281
name: AMoS Stealer Virtual Machine Detection via osquery
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'AMoS Stealer Virtual
  Machine Detection via osquery'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1059.002
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: processes
detection:
  condition: |
    event_type == "osquery_query_row"
    AND cmdline CONTAINS_ALL ["osascript", "system_profiler"]
    AND cmdline CONTAINS_ANY ["VMware", "QEMU", "VirtualBox"]
false_positives:
- Admin/developer running virtual machine checks (allow-listed)
playbook: tpl-malware-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
