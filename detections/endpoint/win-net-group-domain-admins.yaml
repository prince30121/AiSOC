id: det-endpoint-104
name: net group "Domain Admins" Enumerated
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'net group "Domain
  Admins" Enumerated'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1087.002
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_command_line CONTAINS_ALL ["net", "group", "domain admins"]
false_positives:
- IT helpdesk routine check
playbook: tpl-discovery
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
