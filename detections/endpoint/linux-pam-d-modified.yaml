id: det-endpoint-140
name: /etc/pam.d/ Configuration Modified
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by '/etc/pam.d/ Configuration
  Modified'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556.003
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "openat"
    AND path CONTAINS "/etc/pam.d/"
    AND exe NOT ENDSWITH_ANY ["/dpkg", "/rpm", "/yum"]
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
