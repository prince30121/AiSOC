id: det-endpoint-124
name: Mass Shadow Copy Deletion Via WMI
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Mass Shadow Copy
  Deletion Via WMI'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1490
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "wmic.exe"
    AND process_command_line CONTAINS_ALL ["shadowcopy", "delete"]
false_positives:
- Routine backup/disaster-recovery exercise
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
