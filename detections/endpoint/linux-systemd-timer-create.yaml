id: det-endpoint-132
name: Systemd Timer Unit Created
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Systemd Timer Unit
  Created'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1053.006
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "openat"
    AND path CONTAINS "/etc/systemd/system/"
    AND path ENDSWITH ".timer"
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
