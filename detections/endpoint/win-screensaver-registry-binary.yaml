id: det-endpoint-051
name: ScreenSaver Registry Path Set To Custom Binary
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'ScreenSaver Registry
  Path Set To Custom Binary'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1546.002
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 13
    AND target_object ENDSWITH "\scrnsave.exe"
false_positives:
- Corporate-branded screensaver via GPO
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
