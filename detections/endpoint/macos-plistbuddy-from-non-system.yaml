id: det-endpoint-194
name: PlistBuddy Used By Non-System Process
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'PlistBuddy Used
  By Non-System Process'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1547
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/PlistBuddy"
    AND responsible_signing_id NOT STARTSWITH "com.apple."
false_positives:
- Approved homebrew formula
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
