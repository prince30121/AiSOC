id: det-endpoint-195
name: Apple emond Rule Installed
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Apple emond Rule
  Installed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1546.014
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "ES_EVENT_TYPE_NOTIFY_WRITE"
    AND path CONTAINS "/etc/emond.d/rules/"
false_positives:
- Approved patch / maintenance window activity
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
