id: det-endpoint-215
name: login.keychain-db Read By Non-Owner UID
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'login.keychain-db
  Read By Non-Owner UID'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1555.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "ES_EVENT_TYPE_NOTIFY_OPEN"
    AND path ENDSWITH "/Keychains/login.keychain-db"
    AND actor_uid_neq_owner_uid == true
false_positives:
- DFIR responder running a documented playbook
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
