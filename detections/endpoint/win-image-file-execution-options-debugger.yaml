id: det-endpoint-048
name: Image File Execution Options Debugger Set
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Image File Execution
  Options Debugger Set'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1546.012
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 13
    AND target_object CONTAINS "image file execution options"
    AND value_name == "Debugger"
false_positives:
- Authorised debugger setup (development host)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
