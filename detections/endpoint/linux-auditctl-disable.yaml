id: det-endpoint-147
name: auditctl Used To Disable Audit Rules
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'auditctl Used To
  Disable Audit Rules'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.012
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execve"
    AND exe ENDSWITH "/auditctl"
    AND argv CONTAINS_ANY ["-D", "-e 0"]
false_positives:
- Confirmed test/tuning activity
- DFIR responder running a documented playbook
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
