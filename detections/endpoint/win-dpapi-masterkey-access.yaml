id: det-endpoint-099
name: DPAPI Master Key File Read From Roaming Dir
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'DPAPI Master Key
  File Read From Roaming Dir'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1555.003
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 11
    AND target_filename CONTAINS "\protect\"
    AND creator_process NOT ENDSWITH_ANY ["lsass.exe", "explorer.exe"]
false_positives:
- Migration / profile fix-up tool
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
