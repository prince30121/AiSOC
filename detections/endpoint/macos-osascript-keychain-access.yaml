id: det-endpoint-217
name: osascript Used To Read Keychain
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'osascript Used
  To Read Keychain'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1555.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/osascript"
    AND argv CONTAINS_ANY ["security 2>&1", "find-generic-password"]
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
