id: det-endpoint-149
name: /var/log/wtmp Or /var/log/btmp Modified Suspiciously
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by '/var/log/wtmp Or
  /var/log/btmp Modified Suspiciously'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1070.002
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "openat"
    AND path CONTAINS_ANY ["/var/log/wtmp", "/var/log/btmp"]
    AND exe NOT ENDSWITH_ANY ["/login", "/sshd", "/init"]
false_positives:
- DFIR responder running a documented playbook
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
