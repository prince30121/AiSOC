id: det-endpoint-088
name: cmstp.exe Loaded INF From Suspicious Path
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'cmstp.exe Loaded
  INF From Suspicious Path'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1218.003
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "cmstp.exe"
    AND process_command_line CONTAINS_ANY ["\appdata\", "\temp\"]
false_positives:
- Microsoft Configuration Manager rollouts
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
