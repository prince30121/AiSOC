id: det-endpoint-090
name: MSBuild Running Inline Task XML From User Path
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'MSBuild Running
  Inline Task XML From User Path'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1127.001
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "msbuild.exe"
    AND process_command_line CONTAINS_ANY ["\users\public\", "\appdata\"]
false_positives:
- Developer build pipeline (allow-listed)
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
