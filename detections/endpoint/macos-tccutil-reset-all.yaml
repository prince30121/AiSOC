id: det-endpoint-229
name: tccutil reset All Subsystems
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'tccutil reset All
  Subsystems'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1562.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/tccutil"
    AND argv CONTAINS_ALL ["reset", "All"]
false_positives:
- Privacy reset workflow
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
