id: det-endpoint-230
name: Find My Mac Disabled
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Find My Mac Disabled'.
  Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1562
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/defaults"
    AND argv CONTAINS_ALL ["com.apple.icloud", "FindMyMacEnabled", "0"]
false_positives:
- Asset offboarding
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
