id: det-endpoint-100
name: Chromium Login Data SQLite File Read
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Chromium Login
  Data SQLite File Read'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1555.003
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 11
    AND target_filename ENDSWITH "\login data"
    AND creator_process NOT ENDSWITH_ANY ["chrome.exe", "msedge.exe", "brave.exe"]
false_positives:
- Browser sync / migration tool
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
