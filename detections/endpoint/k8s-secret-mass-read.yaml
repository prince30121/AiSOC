id: det-endpoint-253
name: Many Secrets Read From Single Service Account
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Many Secrets Read
  From Single Service Account'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1552.007
- tlp.white
category: endpoint
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    event_type == "audit"
    AND verb == "get"
    AND resource == "secrets"
    AND events_5min > 30
false_positives:
- Sanctioned controller (allow-listed)
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
