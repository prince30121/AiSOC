id: det-endpoint-172
name: ptrace Attached To PID 1
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'ptrace Attached
  To PID 1'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "ptrace"
    AND target_pid == 1
false_positives:
- DFIR responder running a documented playbook
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
