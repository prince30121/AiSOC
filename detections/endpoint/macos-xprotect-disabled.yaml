id: det-endpoint-209
name: XProtect Updates Disabled
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'XProtect Updates
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/defaults"
    AND argv CONTAINS_ALL ["com.apple.MRT", "DisableMRTShim"]
false_positives:
- Authorised red-team or penetration test
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
