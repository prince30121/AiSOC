id: det-endpoint-113
name: PAExec Service Created
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'PAExec Service
  Created'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1021.002
- tlp.white
category: endpoint
log_source:
  product: windows
  service: services
detection:
  condition: |
    event_id == 7045
    AND service_name CONTAINS "paexec"
false_positives:
- IT remote support tooling (allow-listed)
playbook: tpl-lateral-movement
enabled: true
author: AiSOC
