id: det-endpoint-128
name: PDF Reader Spawned Shell
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'PDF Reader Spawned
  Shell'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1204.002
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND parent_process ENDSWITH_ANY ["acrord32.exe", "acrobat.exe", "foxitreader.exe"]
    AND process_name ENDSWITH_ANY ["cmd.exe", "powershell.exe"]
false_positives:
- PDF embedding signed plug-in
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
