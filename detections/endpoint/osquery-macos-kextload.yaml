id: det-endpoint-289
name: macOS Kernel Extension Loaded via kextload
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'macOS Kernel Extension
  Loaded via kextload'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1543
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: processes
detection:
  condition: |
    event_type == "osquery_query_row"
    AND name == "kextload"
false_positives:
- Authorised kernel extension for security or virtualisation tool
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
