id: det-endpoint-222
name: launchctl Loading Plist From /tmp
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'launchctl Loading
  Plist From /tmp'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1543.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/launchctl"
    AND argv CONTAINS_ANY ["/tmp/", "/private/tmp/"]
false_positives:
- Test workflow on dev machine
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
