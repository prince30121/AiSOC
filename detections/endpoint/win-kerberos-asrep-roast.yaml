id: det-endpoint-102
name: Kerberos AS-REP Roasting Pattern
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Kerberos AS-REP
  Roasting Pattern'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1558.004
- tlp.white
category: endpoint
log_source:
  product: windows
  service: security
detection:
  condition: |
    event_id == 4768
    AND preauth_required == false
    AND ticket_encryption_type == "0x17"
false_positives:
- Legacy app with preauth disabled (deprecated, must be tracked)
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
