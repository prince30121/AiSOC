id: det-endpoint-111
name: PsExec.exe Service Created On Host
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'PsExec.exe Service
  Created On Host'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1021.002
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "psexec.exe"
    AND process_command_line CONTAINS "\\"
false_positives:
- IT remote support tooling (allow-listed)
playbook: tpl-lateral-movement
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
