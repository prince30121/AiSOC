id: det-endpoint-122
name: rundll32.exe shell32 Control_RunDLL Used Suspiciously
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'rundll32.exe shell32
  Control_RunDLL Used Suspiciously'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1218.011
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "rundll32.exe"
    AND process_command_line CONTAINS_ANY ["shell32.dll,control_rundll", "shell32.dll, control_rundll"]
false_positives:
- Control panel applet legitimately invoked
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
