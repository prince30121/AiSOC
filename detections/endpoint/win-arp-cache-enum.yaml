id: det-endpoint-108
name: arp -a Enumeration By Workstation
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'arp -a Enumeration
  By Workstation'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: low
tags:
- mitre.attack.t1018
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "arp.exe"
    AND process_command_line CONTAINS "-a"
false_positives:
- Network diagnostics
playbook: tpl-discovery
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
