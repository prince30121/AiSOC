id: det-endpoint-156
name: /etc/shadow Read By Non-Root Process
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by '/etc/shadow Read
  By Non-Root Process'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1003.008
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "openat"
    AND path == "/etc/shadow"
    AND actor_uid_neq == 0
false_positives:
- Approved security scanner running with sudo
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
