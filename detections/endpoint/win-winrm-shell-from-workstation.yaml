id: det-endpoint-114
name: WinRM Shell From Workstation To DC
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'WinRM Shell From
  Workstation To DC'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1021.006
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_command_line CONTAINS "enter-pssession"
    AND destination_role == "domain-controller"
false_positives:
- Authorised AD admin from PAW
playbook: tpl-lateral-movement
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
