id: det-endpoint-265
name: Google Account Changed On Managed Android Device
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Google Account
  Changed On Managed Android Device'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078
- tlp.white
category: endpoint
log_source:
  product: android
  service: mdm
detection:
  condition: |
    event_type == "account_change"
    AND service == "google"
false_positives:
- Reassigned device
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
