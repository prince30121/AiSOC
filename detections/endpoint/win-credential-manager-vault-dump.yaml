id: det-endpoint-098
name: vaultcmd.exe Listed All Stored Credentials
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'vaultcmd.exe Listed
  All Stored Credentials'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1555.004
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "vaultcmd.exe"
    AND process_command_line CONTAINS "/listcreds"
false_positives:
- DFIR responder running a documented playbook
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
