id: det-endpoint-221
name: osascript do shell script with administrator privileges
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'osascript do shell
  script with administrator privileges'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1059.002
- mitre.attack.t1548.004
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/osascript"
    AND argv CONTAINS "do shell script"
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
