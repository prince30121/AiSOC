id: det-endpoint-061
name: Microsoft Defender Disabled Via Registry
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Microsoft Defender
  Disabled Via Registry'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 13
    AND target_object CONTAINS "\windows defender\"
    AND value_name == "DisableAntiSpyware"
    AND value_data == "1"
false_positives:
- Conflicting AV product install
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
