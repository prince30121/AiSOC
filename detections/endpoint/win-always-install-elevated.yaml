id: det-endpoint-073
name: AlwaysInstallElevated Registry Enabled
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'AlwaysInstallElevated
  Registry Enabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1548.002
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 13
    AND target_object ENDSWITH "\installer\alwaysinstallelevated"
    AND value_data == "1"
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
