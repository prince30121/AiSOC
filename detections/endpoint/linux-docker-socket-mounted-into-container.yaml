id: det-endpoint-165
name: Docker Socket Mounted Into Container
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Docker Socket Mounted
  Into Container'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: linux
  service: docker
detection:
  condition: |
    event_type == "container_create"
    AND host_path == "/var/run/docker.sock"
false_positives:
- Authorised CI runner pattern
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
