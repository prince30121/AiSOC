id: det-endpoint-293
name: macOS Suspicious Living-Off-The-Land Binary Execution
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'macOS Suspicious
  Living-Off-The-Land Binary Execution'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: low
tags:
- mitre.attack.t1059.004
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: processes
detection:
  condition: |
    event_type == "osquery_query_row"
    AND cmdline STARTSWITH_ANY ["funzip ", "openssl s_client", "openssl base64", "python -c import"]
false_positives:
- Developer using openssl for TLS testing (allow-listed)
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
