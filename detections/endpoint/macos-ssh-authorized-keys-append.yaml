id: det-endpoint-198
name: ~/.ssh/authorized_keys Modified
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by '~/.ssh/authorized_keys
  Modified'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1098.004
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "ES_EVENT_TYPE_NOTIFY_WRITE"
    AND path ENDSWITH "/.ssh/authorized_keys"
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
