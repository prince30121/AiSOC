id: det-endpoint-126
name: Office Application Spawned rundll32.exe
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Office Application
  Spawned rundll32.exe'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1218.011
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND parent_process ENDSWITH_ANY ["winword.exe", "excel.exe", "powerpnt.exe"]
    AND process_name ENDSWITH "rundll32.exe"
false_positives:
- Sanctioned add-in
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
