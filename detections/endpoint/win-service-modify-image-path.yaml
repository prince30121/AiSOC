id: det-endpoint-042
name: Windows Service Image Path Modified
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Windows Service
  Image Path Modified'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1543.003
- mitre.attack.t1574
- tlp.white
category: endpoint
log_source:
  product: windows
  service: services
detection:
  condition: |
    event_id == 4697
    AND service_image_path_changed == true
false_positives:
- Approved patch / maintenance window activity
- Approved binary upgrade
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
