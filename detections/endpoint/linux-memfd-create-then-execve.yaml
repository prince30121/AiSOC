id: det-endpoint-173
name: memfd_create Then Executed Anonymous Memory Region
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'memfd_create Then
  Executed Anonymous Memory Region'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1620
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execveat"
    AND fd_path STARTSWITH "/memfd:"
false_positives:
- Sanctioned packer / runtime that uses memfd
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
