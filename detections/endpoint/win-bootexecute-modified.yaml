id: det-endpoint-052
name: HKLM BootExecute Registry Value Modified
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'HKLM BootExecute
  Registry Value Modified'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1547
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 13
    AND target_object ENDSWITH "\session manager\bootexecute"
false_positives:
- Approved patch / maintenance window activity
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
