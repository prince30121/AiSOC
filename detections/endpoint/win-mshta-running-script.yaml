id: det-endpoint-079
name: mshta.exe Executed Inline Script
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'mshta.exe Executed
  Inline Script'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1218.005
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "mshta.exe"
    AND process_command_line CONTAINS_ANY ["javascript:", "vbscript:", "http"]
false_positives:
- Vendor installer that abuses mshta (allow-listed)
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
