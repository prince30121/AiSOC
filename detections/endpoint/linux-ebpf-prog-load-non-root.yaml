id: det-endpoint-171
name: eBPF Program Loaded By Non-Root
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'eBPF Program Loaded
  By Non-Root'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1547
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "bpf"
    AND cmd == "BPF_PROG_LOAD"
    AND actor_uid_neq == 0
false_positives:
- Sanctioned observability agent
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
