id: det-endpoint-204
name: csrutil disable (SIP Off)
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'csrutil disable
  (SIP Off)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1553
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/csrutil"
    AND argv CONTAINS "disable"
false_positives:
- Approved kernel-driver development workstation
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
