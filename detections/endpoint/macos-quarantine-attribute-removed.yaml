id: det-endpoint-206
name: com.apple.quarantine xattr Stripped
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'com.apple.quarantine
  xattr Stripped'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1553.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/xattr"
    AND argv CONTAINS_ALL ["-d", "com.apple.quarantine"]
false_positives:
- Sanctioned dev workflow
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
