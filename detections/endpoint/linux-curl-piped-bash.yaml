id: det-endpoint-163
name: curl/wget Piped Directly To Shell
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'curl/wget Piped
  Directly To Shell'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1059.004
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execve"
    AND argv CONTAINS_ANY ["curl | bash", "curl | sh", "wget -O- | bash", "wget -qO- | sh"]
false_positives:
- Vendor install script (allow-listed)
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
