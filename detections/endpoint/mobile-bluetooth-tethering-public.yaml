id: det-endpoint-270
name: Personal Hotspot Or Bluetooth Tethering Enabled In Restricted Site
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Personal Hotspot
  Or Bluetooth Tethering Enabled In Restricted Site'. Watch the 1 documented false-positive case before
  tuning.
version: 1.0.0
severity: low
tags:
- mitre.attack.t1011
- tlp.white
category: endpoint
log_source:
  product: mobile
  service: mdm
detection:
  condition: |
    event_type == "compliance"
    AND tethering_enabled == true
    AND geofence_in_restricted_zone == true
false_positives:
- Field engineer in approved zone
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
