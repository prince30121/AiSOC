id: det-endpoint-262
name: Find My Device Disabled
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Find My Device
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562
- tlp.white
category: endpoint
log_source:
  product: mobile
  service: mdm
detection:
  condition: |
    event_type == "compliance"
    AND find_device_enabled == false
false_positives:
- Privacy compliance setting (educate)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
