id: det-endpoint-234
name: Container Started As UID 0 In Production
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Container Started
  As UID 0 In Production'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: docker
  service: dockerd
detection:
  condition: |
    event_type == "container_start"
    AND user_uid == 0
    AND environment == "prod"
false_positives:
- Approved root-required workload (allow-listed)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
