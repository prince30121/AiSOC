id: det-endpoint-074
name: bcdedit Used To Disable Recovery
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'bcdedit Used To
  Disable Recovery'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1490
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "bcdedit.exe"
    AND process_command_line CONTAINS_ANY ["recoveryenabled no", "bootstatuspolicy ignoreallfailures"]
false_positives:
- DFIR responder running a documented playbook
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
