id: det-endpoint-148
name: rsyslog Configuration File Removed
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'rsyslog Configuration
  File Removed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "unlinkat"
    AND path CONTAINS_ANY ["/etc/rsyslog.d/", "/etc/rsyslog.conf"]
false_positives:
- Approved patch / maintenance window activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
