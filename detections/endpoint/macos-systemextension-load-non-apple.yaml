id: det-endpoint-220
name: SystemExtension Loaded From Non-Apple Bundle
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'SystemExtension
  Loaded From Non-Apple Bundle'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1547.006
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/systemextensionsctl"
    AND argv CONTAINS "install"
false_positives:
- Approved security vendor agent
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
