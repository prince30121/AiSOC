id: det-endpoint-158
name: SUID Bit Set On Newly Created Binary
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'SUID Bit Set On
  Newly Created Binary'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1548.001
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "fchmod"
    AND mode_octal CONTAINS "4"
    AND path_not STARTSWITH_ANY ["/usr/bin", "/usr/sbin", "/bin", "/sbin"]
false_positives:
- Approved deploy of internal tool
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
