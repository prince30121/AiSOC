id: det-endpoint-066
name: Windows Event Log Service Stopped
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Windows Event Log
  Service Stopped'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: endpoint
log_source:
  product: windows
  service: services
detection:
  condition: |
    event_id == 7036
    AND service_name == "eventlog"
    AND service_state == "stopped"
false_positives:
- Approved patch / maintenance window activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
