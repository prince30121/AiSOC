id: det-endpoint-212
name: codesign --force --deep Used By User
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'codesign --force
  --deep Used By User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1553.002
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/codesign"
    AND argv CONTAINS_ALL ["--force", "--deep"]
false_positives:
- Engineer signing personal build
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
