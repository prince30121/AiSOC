id: det-endpoint-200
name: Configuration Profile Installed
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Configuration Profile
  Installed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1078.003
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/profiles"
    AND argv CONTAINS "install"
false_positives:
- MDM rollout
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
