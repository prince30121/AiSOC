id: det-endpoint-118
name: cipher.exe /w Used (Secure Delete)
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'cipher.exe /w Used
  (Secure Delete)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1485
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "cipher.exe"
    AND process_command_line CONTAINS "/w"
false_positives:
- Decommission / disposal procedure
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
