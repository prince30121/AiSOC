id: det-endpoint-174
name: tar Output Piped To curl Upload
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'tar Output Piped
  To curl Upload'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1041
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execve"
    AND argv CONTAINS_ALL ["tar", "curl"]
false_positives:
- Sanctioned backup script (allow-listed)
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
