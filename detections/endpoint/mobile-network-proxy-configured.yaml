id: det-endpoint-267
name: Network Proxy Configured On Managed Device
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Network Proxy Configured
  On Managed Device'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1556
- tlp.white
category: endpoint
log_source:
  product: mobile
  service: mdm
detection:
  condition: |
    event_type == "config_change"
    AND key == "http_proxy"
false_positives:
- Corporate proxy rollout
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
