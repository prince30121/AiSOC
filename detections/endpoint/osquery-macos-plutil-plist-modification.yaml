id: det-endpoint-295
name: macOS Plist Modification via plutil
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'macOS Plist Modification
  via plutil'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1647
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: processes
detection:
  condition: |
    event_type == "osquery_query_row"
    AND path == "/usr/bin/plutil"
false_positives:
- Admin or developer editing plist files
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
