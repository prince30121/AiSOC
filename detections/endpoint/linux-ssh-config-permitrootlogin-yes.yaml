id: det-endpoint-145
name: sshd_config PermitRootLogin Set To Yes
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'sshd_config PermitRootLogin
  Set To Yes'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556.004
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "openat"
    AND path == "/etc/ssh/sshd_config"
    AND value CONTAINS "PermitRootLogin yes"
false_positives:
- Documented break-glass procedure
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
