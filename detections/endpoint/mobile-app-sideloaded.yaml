id: det-endpoint-259
name: App Sideloaded Outside Of Managed Store
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'App Sideloaded
  Outside Of Managed Store'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1659
- tlp.white
category: endpoint
log_source:
  product: mobile
  service: mdm
detection:
  condition: |
    event_type == "app_install"
    AND source IN ["unknown", "sideload", "adb"]
false_positives:
- Internal beta tester
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
