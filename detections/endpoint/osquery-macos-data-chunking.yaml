id: det-endpoint-282
name: macOS Data Chunking via dd or split
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'macOS Data Chunking
  via dd or split'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1030
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: processes
detection:
  condition: |
    event_type == "osquery_query_row"
    AND cmdline CONTAINS_ANY ["dd if=", "split -b"]
false_positives:
- Legitimate backup or data-processing script (allow-listed)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
