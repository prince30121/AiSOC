id: det-endpoint-250
name: Pod Security Admission Mode Disabled For Namespace
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Pod Security Admission
  Mode Disabled For Namespace'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: endpoint
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    event_type == "label_namespace"
    AND label_key == "pod-security.kubernetes.io/enforce"
    AND label_value == "privileged"
false_positives:
- Sandbox namespace
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
