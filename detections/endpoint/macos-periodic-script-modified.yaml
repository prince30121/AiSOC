id: det-endpoint-196
name: /private/etc/periodic Script Modified
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by '/private/etc/periodic
  Script Modified'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1037
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "ES_EVENT_TYPE_NOTIFY_WRITE"
    AND path CONTAINS "/private/etc/periodic/"
false_positives:
- Approved patch / maintenance window activity
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
