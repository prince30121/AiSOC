id: det-endpoint-205
name: nvram boot-args Modified
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'nvram boot-args
  Modified'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1542.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/nvram"
    AND argv CONTAINS "boot-args="
false_positives:
- Kernel driver development
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
