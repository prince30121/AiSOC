id: det-endpoint-188
name: modprobe Loaded Module From /tmp
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'modprobe Loaded
  Module From /tmp'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1547.006
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execve"
    AND exe ENDSWITH "/modprobe"
    AND argv CONTAINS_ANY ["/tmp/", "/dev/shm/"]
false_positives:
- Diagnostic kernel debug
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
