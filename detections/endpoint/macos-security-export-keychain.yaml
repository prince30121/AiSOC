id: det-endpoint-213
name: security export Used Against Login Keychain
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'security export
  Used Against Login Keychain'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1555.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/security"
    AND argv CONTAINS "export"
false_positives:
- DFIR responder running a documented playbook
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
