id: det-endpoint-117
name: Suspicious CreateRemoteThread Into explorer.exe
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Suspicious CreateRemoteThread
  Into explorer.exe'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1055
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 8
    AND target_image ENDSWITH "explorer.exe"
    AND source_image_path CONTAINS_ANY ["\temp\", "\appdata\"]
false_positives:
- EDR-allowed process injection
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
