id: det-endpoint-294
name: macOS Network Share Discovery via showmount or smbutil
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'macOS Network Share
  Discovery via showmount or smbutil'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: low
tags:
- mitre.attack.t1135
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: processes
detection:
  condition: |
    event_type == "osquery_query_row"
    AND name IN ["showmount", "smbutil"]
false_positives:
- Admin auditing network shares
playbook: tpl-discovery
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
