id: det-endpoint-187
name: systemd-portable Image Attached
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'systemd-portable
  Image Attached'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1543.002
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execve"
    AND exe ENDSWITH "/portablectl"
    AND argv CONTAINS "attach"
false_positives:
- Authorised platform engineering
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
