id: det-endpoint-136
name: /etc/rc.local Modified
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by '/etc/rc.local Modified'.
  Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1037.004
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "openat"
    AND path == "/etc/rc.local"
false_positives:
- Legacy boot workflow refresh
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
