id: det-endpoint-150
name: Bash History File Truncated Or Removed
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Bash History File
  Truncated Or Removed'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1070.003
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "openat"
    AND path ENDSWITH "/.bash_history"
    AND flags CONTAINS "O_TRUNC"
false_positives:
- DFIR responder running a documented playbook
- User cleared their own history (educate)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
