id: det-endpoint-210
name: Application Firewall Disabled
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Application Firewall
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1562.004
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/socketfilterfw"
    AND argv CONTAINS_ANY ["--setglobalstate off", "--setblockall off"]
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
