id: det-endpoint-083
name: wmic process call create Used For Remote Execution
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'wmic process call
  create Used For Remote Execution'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1047
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "wmic.exe"
    AND process_command_line CONTAINS_ALL ["/node:", "process call create"]
false_positives:
- IT remote support tooling (allow-listed)
playbook: tpl-lateral-movement
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
