id: det-endpoint-080
name: rundll32.exe Loaded DLL From Temp Path
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'rundll32.exe Loaded
  DLL From Temp Path'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1218.011
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "rundll32.exe"
    AND process_command_line CONTAINS_ANY ["\temp\", "\appdata\local\temp"]
false_positives:
- Approved patch / maintenance window activity
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
