id: det-endpoint-143
name: Sudoers File Granted NOPASSWD Privilege
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Sudoers File Granted
  NOPASSWD Privilege'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1548.003
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "openat"
    AND path CONTAINS_ANY ["/etc/sudoers", "/etc/sudoers.d/"]
    AND file_content CONTAINS "NOPASSWD"
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
