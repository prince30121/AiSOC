id: det-endpoint-247
name: Kubernetes Verb 'impersonate' Used
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Kubernetes Verb
  'impersonate' Used'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- tlp.white
category: endpoint
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    event_type == "audit"
    AND verb == "impersonate"
false_positives:
- Operator framework using impersonation
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
