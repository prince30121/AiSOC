id: det-endpoint-245
name: RoleBinding Created Bound To cluster-admin ClusterRole
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'RoleBinding Created
  Bound To cluster-admin ClusterRole'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1098.003
- tlp.white
category: endpoint
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    event_type == "create_rolebinding"
    AND role_ref_name == "cluster-admin"
false_positives:
- Initial cluster bootstrap
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
