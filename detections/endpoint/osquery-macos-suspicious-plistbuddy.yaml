id: det-endpoint-284
name: Suspicious PlistBuddy LaunchAgent Modification
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Suspicious PlistBuddy
  LaunchAgent Modification'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1543.001
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: processes
detection:
  condition: |
    event_type == "osquery_query_row"
    AND cmdline CONTAINS_ALL ["PlistBuddy"]
    AND cmdline CONTAINS_ANY ["LaunchAgents", "RunAtLoad"]
false_positives:
- Legitimate plist management by administrator (allow-listed)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
