id: det-endpoint-183
name: Process Executed From /proc/self/fd Anonymous Inode
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Process Executed
  From /proc/self/fd Anonymous Inode'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1620
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execveat"
    AND fd_path STARTSWITH "/proc/self/fd/"
false_positives:
- Sanctioned interpreter pattern
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
