id: det-endpoint-255
name: Pod Created From Known Cryptominer Image Family
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Pod Created From
  Known Cryptominer Image Family'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1496
- tlp.white
category: endpoint
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    event_type == "create_pod"
    AND image CONTAINS_ANY ["xmrig", "monero", "minerd"]
false_positives:
- Authorised red-team or penetration test
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
