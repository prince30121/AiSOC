id: det-endpoint-093
name: Mimikatz Marker String In Process Command Line
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Mimikatz Marker
  String In Process Command Line'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1003
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_command_line CONTAINS_ANY ["sekurlsa::", "lsadump::", "kerberos::", "crypto::"]
false_positives:
- Authorised red-team or penetration test
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
