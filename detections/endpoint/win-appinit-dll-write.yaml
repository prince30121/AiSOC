id: det-endpoint-049
name: AppInit_DLLs Registry Value Modified
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'AppInit_DLLs Registry
  Value Modified'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1546.010
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 13
    AND target_object ENDSWITH "\appinit_dlls"
false_positives:
- Endpoint protection installer
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
