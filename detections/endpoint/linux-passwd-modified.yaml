id: det-endpoint-157
name: /etc/passwd Modified By Non-Pkg Process
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by '/etc/passwd Modified
  By Non-Pkg Process'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1136.001
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "openat"
    AND path == "/etc/passwd"
    AND exe NOT ENDSWITH_ANY ["/useradd", "/usermod", "/groupadd", "/userdel"]
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
