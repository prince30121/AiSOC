id: det-endpoint-060
name: Print Monitor DLL Installed
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Print Monitor DLL
  Installed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1547.010
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 13
    AND target_object CONTAINS "\control\print\monitors\"
false_positives:
- Vendor printer driver install
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
