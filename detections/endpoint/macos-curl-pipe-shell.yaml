id: det-endpoint-223
name: curl Output Piped To Shell
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'curl Output Piped
  To Shell'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1105
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/sh"
    AND argv CONTAINS_ANY ["curl | sh", "curl | bash"]
false_positives:
- Sanctioned install scripts
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
