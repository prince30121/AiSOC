id: det-endpoint-243
name: Pod Created With privileged Security Context
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Pod Created With
  privileged Security Context'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    event_type == "create_pod"
    AND container_privileged == true
false_positives:
- Documented system DaemonSet
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
