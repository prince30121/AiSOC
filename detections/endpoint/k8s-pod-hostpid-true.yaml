id: det-endpoint-241
name: 'Pod Created With hostPID: true'
description: 'AiSOC v1 curated detection. Triggers on the endpoint signal described by ''Pod Created With
  hostPID: true''. Watch the 1 documented false-positive case before tuning.'
version: 1.0.0
severity: high
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    event_type == "create_pod"
    AND host_pid == true
false_positives:
- Sanctioned monitoring agent
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
