id: det-endpoint-192
name: User LaunchAgent Plist Created
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'User LaunchAgent
  Plist Created'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1543.004
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "ES_EVENT_TYPE_NOTIFY_WRITE"
    AND path CONTAINS_ANY ["/Users/", "/Library/LaunchAgents/"]
    AND path ENDSWITH ".plist"
false_positives:
- IDE / sync utility installer
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
