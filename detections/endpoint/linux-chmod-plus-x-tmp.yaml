id: det-endpoint-185
name: chmod +x Applied To File In /tmp
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'chmod +x Applied
  To File In /tmp'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1222.002
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execve"
    AND exe ENDSWITH "/chmod"
    AND argv CONTAINS_ALL ["+x", "/tmp/"]
false_positives:
- Test/CI ephemeral helpers
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
