id: det-endpoint-201
name: com.apple.loginitems Modified
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'com.apple.loginitems
  Modified'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1547.015
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "ES_EVENT_TYPE_NOTIFY_WRITE"
    AND path ENDSWITH "com.apple.backgroundtaskmanagement.plist"
false_positives:
- Apple OS update
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
