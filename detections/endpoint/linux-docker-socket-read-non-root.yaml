id: det-endpoint-164
name: Docker Socket Accessed By Non-Root User
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Docker Socket Accessed
  By Non-Root User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "connect"
    AND path == "/var/run/docker.sock"
    AND actor_uid_neq == 0
false_positives:
- docker group user (deprecated, must be ticketed)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
