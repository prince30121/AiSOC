id: det-endpoint-179
name: shred Used Against Production Data Path
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'shred Used Against
  Production Data Path'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1485
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execve"
    AND exe ENDSWITH "/shred"
    AND argv CONTAINS_ANY ["/var/lib", "/data", "/srv"]
false_positives:
- Decommission workflow
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
