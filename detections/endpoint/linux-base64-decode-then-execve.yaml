id: det-endpoint-177
name: base64 Decoded Then Executed In Shell
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'base64 Decoded
  Then Executed In Shell'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1027
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execve"
    AND argv CONTAINS_ANY ["base64 -d | bash", "base64 -d | sh", "echo  | base64 -d | sh"]
false_positives:
- Authorised red-team or penetration test
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
