id: det-endpoint-112
name: PSEXESVC Service Created (Remote PsExec)
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'PSEXESVC Service
  Created (Remote PsExec)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1021.002
- tlp.white
category: endpoint
log_source:
  product: windows
  service: services
detection:
  condition: |
    event_id == 7045
    AND service_name ENDSWITH "psexesvc"
    AND service_image_path CONTAINS "psexec"
false_positives:
- IT remote support tooling (allow-listed)
playbook: tpl-lateral-movement
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
