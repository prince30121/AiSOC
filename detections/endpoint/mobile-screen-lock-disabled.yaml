id: det-endpoint-263
name: Screen Lock Disabled On Managed Device
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Screen Lock Disabled
  On Managed Device'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078
- tlp.white
category: endpoint
log_source:
  product: mobile
  service: mdm
detection:
  condition: |
    event_type == "compliance"
    AND screen_lock_enabled == false
false_positives:
- Decommissioned device pending wipe
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
