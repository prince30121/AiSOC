id: det-endpoint-292
name: macOS LoginHook Persistence via defaults write
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'macOS LoginHook
  Persistence via defaults write'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1037.002
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: processes
detection:
  condition: |
    event_type == "osquery_query_row"
    AND cmdline CONTAINS_ALL ["defaults", "write", "loginwindow", "LoginHook"]
false_positives:
- Authorised enterprise login script (allow-listed)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
