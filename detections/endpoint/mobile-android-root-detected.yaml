id: det-endpoint-257
name: Android Root Detected By MDM
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Android Root Detected
  By MDM'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1404
- tlp.white
category: endpoint
log_source:
  product: android
  service: mdm
detection:
  condition: |
    event_type == "compliance"
    AND rooted == true
false_positives:
- Decommissioned dev device
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
