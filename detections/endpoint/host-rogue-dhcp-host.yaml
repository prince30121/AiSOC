id: det-endpoint-276
name: Host Advertising As DHCP Server
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Host Advertising
  As DHCP Server'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1557
- tlp.white
category: endpoint
log_source:
  product: endpoint
  service: agent
detection:
  condition: |
    event_type == "dhcp_offer_outbound"
false_positives:
- Approved DHCP failover
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
