id: det-endpoint-082
name: regsvr32.exe Used With scrobj.dll (Squiblydoo)
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'regsvr32.exe Used
  With scrobj.dll (Squiblydoo)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1218.010
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "regsvr32.exe"
    AND process_command_line CONTAINS_ALL ["scrobj.dll", "/i:"]
false_positives:
- Authorised red-team or penetration test
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
