id: det-endpoint-068
name: Windows System Event Log Cleared
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Windows System
  Event Log Cleared'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1070.001
- tlp.white
category: endpoint
log_source:
  product: windows
  service: security
detection:
  condition: |
    event_id == 104
    AND log_name == "System"
false_positives:
- Approved log archival job
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
