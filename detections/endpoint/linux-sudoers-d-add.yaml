id: det-endpoint-142
name: New File Added Under /etc/sudoers.d/
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'New File Added
  Under /etc/sudoers.d/'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "openat"
    AND path CONTAINS "/etc/sudoers.d/"
    AND exe NOT ENDSWITH_ANY ["/visudo", "/dpkg", "/rpm"]
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
