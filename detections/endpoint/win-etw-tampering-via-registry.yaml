id: det-endpoint-065
name: ETW Disabled Via Registry
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'ETW Disabled Via
  Registry'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.006
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 13
    AND target_object ENDSWITH "\autologger\eventlog-application"
    AND value_name == "Start"
    AND value_data == "0"
false_positives:
- Approved patch / maintenance window activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
