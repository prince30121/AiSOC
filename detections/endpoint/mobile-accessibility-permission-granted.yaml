id: det-endpoint-266
name: Accessibility Permission Granted To Untrusted App
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Accessibility Permission
  Granted To Untrusted App'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1530
- tlp.white
category: endpoint
log_source:
  product: android
  service: mdm
detection:
  condition: |
    event_type == "permission_grant"
    AND permission == "ACCESSIBILITY"
    AND app_signed_by_known_publisher == false
false_positives:
- Approved screen-reader app
playbook: tpl-collection
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
