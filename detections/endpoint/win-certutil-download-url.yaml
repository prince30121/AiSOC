id: det-endpoint-087
name: certutil.exe Used To Download Remote File
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'certutil.exe Used
  To Download Remote File'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1105
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "certutil.exe"
    AND process_command_line CONTAINS "-urlcache"
false_positives:
- Approved patch / maintenance window activity
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
