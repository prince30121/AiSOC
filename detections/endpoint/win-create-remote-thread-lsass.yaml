id: det-endpoint-116
name: CreateRemoteThread Targeting lsass.exe
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'CreateRemoteThread
  Targeting lsass.exe'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1055.001
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 8
    AND target_image ENDSWITH "lsass.exe"
false_positives:
- EDR-allowed process injection
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
