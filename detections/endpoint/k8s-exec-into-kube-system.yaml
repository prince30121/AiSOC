id: det-endpoint-252
name: Exec Into Pod In kube-system Namespace
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Exec Into Pod In
  kube-system Namespace'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    event_type == "pod_exec"
    AND namespace == "kube-system"
false_positives:
- Documented break-glass procedure
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
