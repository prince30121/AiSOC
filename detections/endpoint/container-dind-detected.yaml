id: det-endpoint-239
name: Docker-In-Docker Pattern Detected
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Docker-In-Docker
  Pattern Detected'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: docker
  service: dockerd
detection:
  condition: |
    event_type == "container_create"
    AND image_name CONTAINS "docker:dind"
false_positives:
- Sanctioned CI runner
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
