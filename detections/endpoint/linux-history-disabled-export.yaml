id: det-endpoint-151
name: HISTFILE Set To /dev/null
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'HISTFILE Set To
  /dev/null'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1070.003
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execve"
    AND argv CONTAINS_ANY ["histfile=/dev/null", "set +o history"]
false_positives:
- DFIR responder running a documented playbook
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
