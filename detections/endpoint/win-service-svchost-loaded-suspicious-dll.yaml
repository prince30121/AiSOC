id: det-endpoint-043
name: Windows svchost.exe Loaded DLL From User Path
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Windows svchost.exe
  Loaded DLL From User Path'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1574.002
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    image_loaded_path CONTAINS_ANY ["\users\", "\temp\", "\appdata\"]
    AND process_name == "svchost.exe"
false_positives:
- Sanctioned 3rd-party tooling installer
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
