id: det-endpoint-141
name: NSS Module Installed In /usr/lib
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'NSS Module Installed
  In /usr/lib'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "openat"
    AND path STARTSWITH "/usr/lib"
    AND path CONTAINS "libnss_"
    AND exe NOT ENDSWITH_ANY ["/dpkg", "/rpm"]
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
