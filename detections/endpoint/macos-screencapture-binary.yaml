id: det-endpoint-216
name: screencapture Binary Used
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'screencapture Binary
  Used'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: low
tags:
- mitre.attack.t1113
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/screencapture"
false_positives:
- User-driven screenshot (very common)
playbook: tpl-collection
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
