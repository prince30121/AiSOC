id: det-endpoint-168
name: Container Granted CAP_SYS_ADMIN
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Container Granted
  CAP_SYS_ADMIN'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: linux
  service: docker
detection:
  condition: |
    event_type == "container_create"
    AND added_caps HAS_ANY ["CAP_SYS_ADMIN", "ALL"]
false_positives:
- Documented container with documented exception
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
