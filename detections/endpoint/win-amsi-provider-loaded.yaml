id: det-endpoint-064
name: AMSI Provider DLL Loaded From User Path
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'AMSI Provider DLL
  Loaded From User Path'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 13
    AND target_object ENDSWITH "\amsi\providers"
    AND value_data CONTAINS_ANY ["\users\", "\temp\"]
false_positives:
- Authorised red-team or penetration test
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
