id: det-endpoint-170
name: Kernel Module Loaded With insmod
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Kernel Module Loaded
  With insmod'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1547.006
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execve"
    AND exe ENDSWITH "/insmod"
false_positives:
- Approved patch / maintenance window activity
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
