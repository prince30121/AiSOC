id: det-endpoint-197
name: User crontab Created (Rare On macOS)
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'User crontab Created
  (Rare On macOS)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1053.003
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/crontab"
    AND argv CONTAINS "-l"
false_positives:
- Migration from Linux
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
