id: det-endpoint-258
name: Device Marked Out Of MDM Compliance
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Device Marked Out
  Of MDM Compliance'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1078
- tlp.white
category: endpoint
log_source:
  product: mdm
  service: compliance
detection:
  condition: |
    event_type == "compliance"
    AND compliant == false
false_positives:
- Pending OS patch window
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
