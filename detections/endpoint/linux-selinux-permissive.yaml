id: det-endpoint-152
name: SELinux Set To Permissive
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'SELinux Set To
  Permissive'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execve"
    AND exe ENDSWITH "/setenforce"
    AND argv CONTAINS_ANY ["0", "permissive"]
false_positives:
- Documented break-glass procedure
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
