id: det-endpoint-254
name: NetworkPolicy Deleted In Restricted Namespace
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'NetworkPolicy Deleted
  In Restricted Namespace'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.004
- tlp.white
category: endpoint
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    event_type == "delete_networkpolicy"
    AND namespace IN ["prod", "production", "default"]
false_positives:
- Documented break-glass procedure
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
