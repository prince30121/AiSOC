id: det-endpoint-055
name: COM Hijack Via HKCR\CLSID\InprocServer32 Modification
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'COM Hijack Via
  HKCR\CLSID\InprocServer32 Modification'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1546.015
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 13
    AND target_object CONTAINS "\classes\clsid\"
    AND target_object ENDSWITH "\inprocserver32\(default)"
false_positives:
- MSI install of legitimate COM component
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
