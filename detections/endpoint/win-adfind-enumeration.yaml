id: det-endpoint-106
name: AdFind.exe Enumeration Detected
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'AdFind.exe Enumeration
  Detected'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1087.002
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "adfind.exe"
false_positives:
- IT diagnostic with security ticket
playbook: tpl-discovery
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
