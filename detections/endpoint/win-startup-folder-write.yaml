id: det-endpoint-053
name: Startup Folder Written By Non-Installer Process
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Startup Folder
  Written By Non-Installer Process'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1547.001
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 11
    AND target_filename CONTAINS "\start menu\programs\startup\"
    AND creator_process NOT ENDSWITH_ANY ["msiexec.exe", "setup.exe"]
false_positives:
- Self-published in-house tooling (allow-listed signer)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
