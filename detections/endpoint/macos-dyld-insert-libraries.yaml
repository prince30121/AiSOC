id: det-endpoint-224
name: DYLD_INSERT_LIBRARIES Set To /tmp Or User Path
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'DYLD_INSERT_LIBRARIES
  Set To /tmp Or User Path'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1574.006
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND env_dyld_insert_libraries STARTSWITH_ANY ["/tmp/", "/Users/"]
false_positives:
- Sanctioned dev workflow
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
