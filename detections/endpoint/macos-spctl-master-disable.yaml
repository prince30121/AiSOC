id: det-endpoint-203
name: spctl --master-disable (Gatekeeper Off)
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'spctl --master-disable
  (Gatekeeper Off)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1553.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/spctl"
    AND argv CONTAINS "--master-disable"
false_positives:
- Engineer running unsigned dev build (educate)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
