id: det-endpoint-207
name: TCC Database Modified Outside tccd
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'TCC Database Modified
  Outside tccd'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "ES_EVENT_TYPE_NOTIFY_WRITE"
    AND path ENDSWITH "/Library/Application Support/com.apple.TCC/TCC.db"
false_positives:
- Apple OS update
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
