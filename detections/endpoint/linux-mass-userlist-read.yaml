id: det-endpoint-161
name: /etc/passwd Read By Many Processes In Short Window
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by '/etc/passwd Read
  By Many Processes In Short Window'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: low
tags:
- mitre.attack.t1087.001
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "openat"
    AND path == "/etc/passwd"
    AND distinct_pid_5min > 50
false_positives:
- Container fleet startup (allow-listed)
playbook: tpl-discovery
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
