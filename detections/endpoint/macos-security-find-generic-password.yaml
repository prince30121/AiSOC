id: det-endpoint-214
name: security find-generic-password Used
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'security find-generic-password
  Used'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1555.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/security"
    AND argv CONTAINS "find-generic-password"
false_positives:
- Sanctioned helper tool
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
