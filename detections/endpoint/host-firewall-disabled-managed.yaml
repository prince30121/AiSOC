id: det-endpoint-271
name: Host Firewall Disabled On Managed Endpoint
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Host Firewall Disabled
  On Managed Endpoint'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.004
- tlp.white
category: endpoint
log_source:
  product: endpoint
  service: firewall
detection:
  condition: |
    event_type == "firewall_state_change"
    AND state == "disabled"
false_positives:
- Confirmed test/tuning activity
- Documented break-glass procedure
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
