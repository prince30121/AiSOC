id: det-endpoint-237
name: Container Created With ReadOnlyRootFilesystem False
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Container Created
  With ReadOnlyRootFilesystem False'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: low
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: docker
  service: dockerd
detection:
  condition: |
    event_type == "container_create"
    AND readonly_root_fs == false
    AND environment == "prod"
false_positives:
- Workload requires writable rootfs (allow-listed)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
