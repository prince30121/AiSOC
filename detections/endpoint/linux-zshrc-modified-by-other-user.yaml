id: det-endpoint-139
name: ~/.zshrc Modified By Other User
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by '~/.zshrc Modified
  By Other User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1546.004
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "openat"
    AND path ENDSWITH "/.zshrc"
    AND actor_uid_neq_owner_uid == true
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
