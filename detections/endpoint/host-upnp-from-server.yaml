id: det-endpoint-278
name: UPnP/SSDP Beacons From Server Subnet
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'UPnP/SSDP Beacons
  From Server Subnet'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1018
- tlp.white
category: endpoint
log_source:
  product: endpoint
  service: agent
detection:
  condition: |
    event_type == "ssdp_egress"
    AND source_subnet_role == "server"
false_positives:
- Approved IoT lab
playbook: tpl-discovery
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
