id: det-endpoint-162
name: netcat Listening Mode Detected
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'netcat Listening
  Mode Detected'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1059.004
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    syscall == "execve"
    AND exe ENDSWITH_ANY ["/nc", "/ncat", "/netcat"]
    AND argv CONTAINS_ANY ["-l", "-lvp", "--listen"]
false_positives:
- Lab / test exercise
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
