id: det-endpoint-218
name: defaults Wrote To com.apple.loginwindow
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'defaults Wrote
  To com.apple.loginwindow'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1547.005
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "exec"
    AND process_path ENDSWITH "/defaults"
    AND argv CONTAINS_ALL ["write", "com.apple.loginwindow"]
false_positives:
- MDM rollout
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
