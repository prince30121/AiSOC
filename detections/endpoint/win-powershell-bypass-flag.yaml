id: det-endpoint-077
name: PowerShell Run With ExecutionPolicy Bypass
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'PowerShell Run
  With ExecutionPolicy Bypass'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1059.001
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "powershell.exe"
    AND process_command_line CONTAINS_ANY ["-executionpolicy bypass", "-ep bypass"]
false_positives:
- Sanctioned automation/IaC pipeline
- Sanctioned dev environment
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
