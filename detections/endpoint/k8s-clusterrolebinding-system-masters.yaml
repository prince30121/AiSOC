id: det-endpoint-246
name: ClusterRoleBinding To system:masters
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'ClusterRoleBinding
  To system:masters'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1098.003
- tlp.white
category: endpoint
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    event_type == "create_clusterrolebinding"
    AND subject_group == "system:masters"
false_positives:
- Initial cluster bootstrap
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
