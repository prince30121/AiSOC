id: det-endpoint-092
name: comsvcs.dll MiniDump Of lsass
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'comsvcs.dll MiniDump
  Of lsass'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1003.001
- tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 1
    AND process_name ENDSWITH "rundll32.exe"
    AND process_command_line CONTAINS_ALL ["comsvcs.dll", "minidump"]
false_positives:
- DFIR responder running a documented playbook
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
