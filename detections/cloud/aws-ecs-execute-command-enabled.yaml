id: det-cloud-084
name: AWS ECS ExecuteCommand Enabled On Service
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS ECS ExecuteCommand
  Enabled On Service'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1059
- tlp.white
category: cloud
log_source:
  product: aws
  service: ecs
detection:
  condition: |
    event_name IN ["CreateService", "UpdateService"]
    AND enable_execute_command == true
false_positives:
- Debugging window
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
