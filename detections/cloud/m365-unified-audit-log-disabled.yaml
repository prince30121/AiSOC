id: det-cloud-225
name: M365 Unified Audit Log Disabled
description: Detects disabling of the Microsoft 365 unified audit log. Attackers disable
  auditing early in a compromise to erase their trail across Exchange, SharePoint, Teams,
  and Entra ID.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1562.008
- tlp.white
category: cloud
log_source:
  product: m365
  service: exchange-admin
detection:
  condition: |
    operation == "Set-AdminAuditLogConfig"
    AND parameters.UnifiedAuditLogIngestionEnabled == false
false_positives:
- Planned maintenance window with change ticket
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
