id: det-cloud-207
name: M365 Power Automate Flow Shared With External User
description: A Power Automate flow was shared with an external (guest) user. External
  users with flow access can trigger automations that read mailboxes, access SharePoint,
  or call Graph API on behalf of internal identities.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1078.004
- mitre.attack.t1199
- tlp.white
category: cloud
log_source:
  product: m365
  service: power-platform-admin
detection:
  condition: |
    operation == "EditFlowPermissions"
    AND shared_with_type == "ExternalUser"
false_positives:
- Cross-org automation with an approved partner
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
