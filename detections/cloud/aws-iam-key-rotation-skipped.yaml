id: det-cloud-042
name: AWS IAM Access Key Older Than 365 Days
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM Access Key
  Older Than 365 Days'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1078.004
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name == "ListAccessKeys"
    AND key_age_days > 365
false_positives:
- Sanctioned automation/IaC pipeline
- Service-account key intentionally pinned
playbook: tpl-credential-hygiene
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
