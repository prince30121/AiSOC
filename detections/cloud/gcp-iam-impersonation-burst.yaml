id: det-cloud-144
name: GCP Service Account Impersonation Burst
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP Service Account
  Impersonation Burst'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "GenerateAccessToken"
    AND distinct_targets_per_minute > 10
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
