id: det-cloud-178
name: Kubernetes Impersonate Privileged User
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Kubernetes Impersonate
  Privileged User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.001
- tlp.white
category: cloud
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    verb CONTAINS "impersonate"
    AND impersonated_user IN ["system:masters", "kubernetes-admin"]
false_positives:
- DFIR responder running a documented playbook
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
