id: det-cloud-052
name: AWS IAM ListAccessKeys Recon Across Users
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM ListAccessKeys
  Recon Across Users'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1087.004
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name == "ListAccessKeys"
    AND distinct_users_per_minute > 20
false_positives:
- Compliance audit job
playbook: tpl-discovery
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
