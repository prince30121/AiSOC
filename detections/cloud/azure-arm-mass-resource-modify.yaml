id: det-cloud-118
name: Azure Mass Resource Modify Burst
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Mass Resource
  Modify Burst'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name ENDSWITH_ANY ["/write", "/delete"]
    AND events_per_minute > 200
false_positives:
- IaC pipeline run
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
