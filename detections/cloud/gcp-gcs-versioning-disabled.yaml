id: det-cloud-150
name: GCS Object Versioning Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCS Object Versioning
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1490
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "storage.buckets.update"
    AND versioning_enabled == false
false_positives:
- Confirmed test/tuning activity
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
