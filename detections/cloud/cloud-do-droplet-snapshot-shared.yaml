id: det-cloud-184
name: DigitalOcean Droplet Snapshot Transferred
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'DigitalOcean Droplet
  Snapshot Transferred'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1537
- tlp.white
category: cloud
log_source:
  product: digitalocean
  service: api
detection:
  condition: |
    action == "snapshot.transfer"
    AND destination_account_external == true
false_positives:
- Approved DR copy
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
