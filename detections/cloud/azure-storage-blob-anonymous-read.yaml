id: det-cloud-121
name: Azure Storage Container Allows Anonymous Read
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Storage Container
  Allows Anonymous Read'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name ENDSWITH "blobServices/containers/write"
    AND public_access IN ["Container", "Blob"]
false_positives:
- Static-site container by design
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
