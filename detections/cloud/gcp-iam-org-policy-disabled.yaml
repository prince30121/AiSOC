id: det-cloud-141
name: GCP Organization Policy Constraint Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP Organization Policy
  Constraint Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "SetOrgPolicy"
    AND list_policy_all_values == "ALLOW"
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
