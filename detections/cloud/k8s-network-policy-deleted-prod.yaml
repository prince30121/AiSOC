id: det-cloud-180
name: Kubernetes NetworkPolicy Deleted In Production
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Kubernetes NetworkPolicy
  Deleted In Production'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.004
- tlp.white
category: cloud
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    verb == "delete"
    AND object_resource == "networkpolicies"
    AND object_namespace IN ["prod", "production"]
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
