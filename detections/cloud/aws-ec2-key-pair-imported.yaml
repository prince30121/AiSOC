id: det-cloud-065
name: AWS EC2 Key Pair Imported
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS EC2 Key Pair Imported'.
  Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1098.004
- tlp.white
category: cloud
log_source:
  product: aws
  service: ec2
detection:
  condition: |
    event_name == "ImportKeyPair"
false_positives:
- Bootstrap of golden image
- Sanctioned automation/IaC pipeline
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
