id: det-cloud-177
name: Kubernetes Pod Default ServiceAccount Token Mount
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Kubernetes Pod Default
  ServiceAccount Token Mount'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: low
tags:
- mitre.attack.t1078
- tlp.white
category: cloud
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    verb == "create"
    AND object_resource == "pods"
    AND service_account == "default"
    AND automount_token == true
false_positives:
- Greenfield workload
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
