id: det-cloud-061
name: AWS S3 Mass DeleteObject Burst
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS S3 Mass DeleteObject
  Burst'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: aws
  service: s3
detection:
  condition: |
    event_name == "DeleteObject"
    AND objects_per_minute > 1000
false_positives:
- Lifecycle policy run
- Routine backup/disaster-recovery exercise
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
