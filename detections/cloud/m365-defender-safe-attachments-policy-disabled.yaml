id: det-cloud-200
name: M365 Defender Safe Attachments Policy Disabled
description: A Safe Attachments policy was disabled or its action set to Allow.
  Disabling detonation-based attachment scanning exposes the org to weaponized
  document delivery.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: cloud
log_source:
  product: m365
  service: defender-admin
detection:
  condition: |
    operation IN ["Disable-SafeAttachmentRule", "Set-SafeAttachmentPolicy"]
    AND (parameters.Enable == false OR parameters.Action == "Allow")
false_positives:
- Temporary disable during troubleshooting with Microsoft support
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
