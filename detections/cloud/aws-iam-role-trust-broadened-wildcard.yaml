id: det-cloud-044
name: AWS IAM Role Trust Policy Allows Principal '*'
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM Role Trust
  Policy Allows Principal '*''. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1078.004
- mitre.attack.t1098.001
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name == "UpdateAssumeRolePolicy"
    AND trust_principal == "*"
false_positives:
- Sandbox / training account by design
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
