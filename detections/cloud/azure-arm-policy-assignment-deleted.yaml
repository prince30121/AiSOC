id: det-cloud-113
name: Azure Policy Assignment Deleted
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Policy Assignment
  Deleted'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name ENDSWITH "policyAssignments/delete"
    AND scope_root == true
false_positives:
- Policy refactor
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
