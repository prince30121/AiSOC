id: det-cloud-058
name: AWS S3 Replication Configured To External Account
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS S3 Replication
  Configured To External Account'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1537
- tlp.white
category: cloud
log_source:
  product: aws
  service: s3
detection:
  condition: |
    event_name == "PutBucketReplication"
    AND destination_account_external == true
false_positives:
- Approved cross-account DR pipeline
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
