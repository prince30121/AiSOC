id: det-cloud-134
name: Azure VM CustomScript Extension Installed
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure VM CustomScript
  Extension Installed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1059
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name ENDSWITH "extensions/write"
    AND extension_type == "CustomScript"
false_positives:
- Cloud-init bootstrap
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
