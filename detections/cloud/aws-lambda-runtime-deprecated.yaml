id: det-cloud-080
name: AWS Lambda Function Uses Deprecated Runtime
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS Lambda Function
  Uses Deprecated Runtime'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1610
- tlp.white
category: cloud
log_source:
  product: aws
  service: lambda
detection:
  condition: |
    event_name == "CreateFunction"
    AND runtime IN ["nodejs10.x", "nodejs12.x", "python2.7", "python3.6"]
false_positives:
- Confirmed test/tuning activity
playbook: tpl-vulnerability
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
