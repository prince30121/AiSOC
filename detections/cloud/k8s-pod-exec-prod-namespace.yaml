id: det-cloud-168
name: Kubernetes pods/exec In Production Namespace
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Kubernetes pods/exec
  In Production Namespace'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1610
- tlp.white
category: cloud
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    verb == "create"
    AND object_resource == "pods/exec"
    AND object_namespace IN ["prod", "production"]
false_positives:
- DFIR responder
- DFIR responder running a documented playbook
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
