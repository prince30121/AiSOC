id: det-cloud-067
name: AWS EC2 UserData Modified On Running Instance
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS EC2 UserData Modified
  On Running Instance'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1059.001
- mitre.attack.t1059.004
- tlp.white
category: cloud
log_source:
  product: aws
  service: ec2
detection:
  condition: |
    event_name == "ModifyInstanceAttribute"
    AND attribute == "userData"
    AND instance_state == "running"
false_positives:
- Approved cloud-init re-run
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
