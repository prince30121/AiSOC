id: det-cloud-191
name: AWS GuardDuty — UnauthorizedAccess:IAMUser/InstanceCredentialExfiltration
description: >
  Detects GuardDuty HIGH-severity finding that EC2 instance credentials (obtained via
  the IMDS) were used from an IP address outside of AWS — a strong signal of instance
  metadata theft and subsequent exfiltration of the temporary credentials to an
  attacker-controlled host. GuardDuty generates this when the calling IP is publicly
  routable and does not belong to the originating EC2 instance's region.
version: 1.0.0
severity: critical
tags:
  - mitre.attack.t1552.005    # Unsecured Credentials: Cloud Instance Metadata API
  - mitre.attack.t1078.004    # Valid Accounts: Cloud Accounts
  - mitre.attack.t1071.001    # Application Layer Protocol: Web Protocols
  - tlp.white
category: cloud
log_source:
  product: aws
  service: guardduty
detection:
  # GuardDuty findings arrive via EventBridge (default) or SNS.
  # The finding type string is stable — match on the canonical name.
  condition: |
    finding_type == "UnauthorizedAccess:IAMUser/InstanceCredentialExfiltration.OutsideAWS"
    OR (
      finding_type STARTSWITH "UnauthorizedAccess:IAMUser/InstanceCredentialExfiltration"
      AND finding_severity >= 7.0
    )
false_positives:
  - Misconfigured CI/CD runner that pulls instance-role creds and runs from a non-AWS IP
  - Lambda extension or custom exporter forwarding metrics from outside the originating region
  - Legitimate cross-region forwarding via a NAT device in a different AWS region
  - Penetration test or red-team exercise documented in the change management system
references:
  - https://docs.aws.amazon.com/guardduty/latest/ug/guardduty_finding-types-iam.html#unauthorizedaccess-iam-instancecredentialexfiltrationoutsideaws
  - https://attack.mitre.org/techniques/T1552/005/
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-06'
modified: '2026-05-06'
