id: det-cloud-165
name: GCP Compute Shielded VM Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP Compute Shielded
  VM Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1610
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "instances.update"
    AND shielded_instance_config == false
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
