id: det-cloud-082
name: AWS EKS Fargate Profile Targets default Namespace
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS EKS Fargate Profile
  Targets default Namespace'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1610
- tlp.white
category: cloud
log_source:
  product: aws
  service: eks
detection:
  condition: |
    event_name == "CreateFargateProfile"
    AND namespace == "default"
false_positives:
- Greenfield cluster
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
