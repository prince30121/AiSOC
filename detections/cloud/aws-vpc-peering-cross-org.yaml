id: det-cloud-071
name: AWS VPC Peering Connection Across Organizations
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS VPC Peering Connection
  Across Organizations'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1199
- tlp.white
category: cloud
log_source:
  product: aws
  service: ec2
detection:
  condition: |
    event_name == "CreateVpcPeeringConnection"
    AND peer_account_external == true
false_positives:
- Approved partner network
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
