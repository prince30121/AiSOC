id: det-cloud-057
name: AWS S3 Bucket Policy Allows Principal '*'
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS S3 Bucket Policy
  Allows Principal '*''. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: aws
  service: s3
detection:
  condition: |
    event_name == "PutBucketPolicy"
    AND policy_principal == "*"
false_positives:
- Public download bucket (documented)
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
