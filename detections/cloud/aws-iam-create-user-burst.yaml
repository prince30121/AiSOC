id: det-cloud-050
name: AWS IAM CreateUser Burst
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM CreateUser
  Burst'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1136.003
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name == "CreateUser"
    AND events_per_minute > 10
false_positives:
- Bulk onboarding window
- Sanctioned automation/IaC pipeline
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
