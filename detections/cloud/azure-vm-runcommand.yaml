id: det-cloud-133
name: Azure VM RunCommand Invoked
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure VM RunCommand
  Invoked'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1059
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name ENDSWITH "virtualMachines/runCommand/action"
false_positives:
- Approved DevOps script
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
