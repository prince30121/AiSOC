id: det-cloud-096
name: AWS Route53 Domain Transfer Out
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS Route53 Domain
  Transfer Out'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1583.001
- tlp.white
category: cloud
log_source:
  product: aws
  service: route53domains
detection:
  condition: |
    event_name == "TransferDomainToAnotherAwsAccount"
false_positives:
- Account merger workflow
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
