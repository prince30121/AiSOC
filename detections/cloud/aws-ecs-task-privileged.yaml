id: det-cloud-083
name: AWS ECS Task Definition With privileged=true
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS ECS Task Definition
  With privileged=true'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1611
- tlp.white
category: cloud
log_source:
  product: aws
  service: ecs
detection:
  condition: |
    event_name == "RegisterTaskDefinition"
    AND privileged == true
false_positives:
- Sysdig / debugger task
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
