id: det-cloud-049
name: AWS IAM Role Trusts Anonymous Federation
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM Role Trusts
  Anonymous Federation'.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1199
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name == "CreateRole"
    AND trust_principal IN ["anonymous", "AllUsers"]
false_positives: []
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
