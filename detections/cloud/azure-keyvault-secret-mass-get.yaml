id: det-cloud-127
name: Azure Key Vault Mass GetSecret
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Key Vault Mass
  GetSecret'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1552.001
- tlp.white
category: cloud
log_source:
  product: azure
  service: keyvault
detection:
  condition: |
    operation_name == "SecretGet"
    AND distinct_secrets_per_minute > 30
false_positives:
- App boot
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
