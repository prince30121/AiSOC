id: det-cloud-089
name: AWS SecretsManager Mass GetSecretValue
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS SecretsManager
  Mass GetSecretValue'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1552.001
- tlp.white
category: cloud
log_source:
  product: aws
  service: secretsmanager
detection:
  condition: |
    event_name == "GetSecretValue"
    AND distinct_secrets_per_minute > 30
false_positives:
- Bootstrap of new microservice
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
