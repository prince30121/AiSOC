id: det-cloud-190
name: Cloud Provider Root/Owner Email Modified
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Cloud Provider Root/Owner
  Email Modified'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1078.004
- tlp.white
category: cloud
log_source:
  product: multi-cloud
  service: iam
detection:
  condition: |
    event_name IN ["UpdateAccountEmail", "Update tenant primary contact", "ChangeRootMail"]
    AND actor_eq_target == false
false_positives:
- Approved ownership transfer
playbook: tpl-account-manipulation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
