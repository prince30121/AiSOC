id: det-cloud-218
name: GCP Audit Log Sink Deleted
description: A Cloud Logging sink was deleted. Sinks route audit logs to BigQuery,
  Cloud Storage, or SIEM destinations. Deleting a sink creates a blind spot in the
  security monitoring pipeline.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.008
- tlp.white
category: cloud
log_source:
  product: gcp
  service: cloud-audit
detection:
  condition: |
    method_name == "google.logging.v2.ConfigServiceV2.DeleteSink"
false_positives:
- Sink migration to a new destination during log architecture change
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
