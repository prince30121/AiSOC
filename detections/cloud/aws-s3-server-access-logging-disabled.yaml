id: det-cloud-059
name: AWS S3 Server Access Logging Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS S3 Server Access
  Logging Disabled'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1562.008
- tlp.white
category: cloud
log_source:
  product: aws
  service: s3
detection:
  condition: |
    event_name == "PutBucketLogging"
    AND logging_enabled == false
false_positives:
- Sanctioned automation/IaC pipeline
- Decommissioned bucket
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
