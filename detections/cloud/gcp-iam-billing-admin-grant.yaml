id: det-cloud-140
name: GCP roles/billing.admin Granted
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP roles/billing.admin
  Granted'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "SetIamPolicy"
    AND role_added == "roles/billing.admin"
false_positives:
- Org bootstrap
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
