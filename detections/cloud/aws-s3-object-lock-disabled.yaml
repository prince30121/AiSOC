id: det-cloud-060
name: AWS S3 Object Lock / Retention Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS S3 Object Lock
  / Retention Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: aws
  service: s3
detection:
  condition: |
    event_name IN ["PutObjectLockConfiguration", "PutObjectRetention"]
    AND retention_disabled == true
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
