id: det-cloud-152
name: GKE Cluster Anonymous Auth Enabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GKE Cluster Anonymous
  Auth Enabled'.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1133
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "clusters.update"
    AND anonymous_auth == true
false_positives: []
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
