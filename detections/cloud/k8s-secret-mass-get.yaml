id: det-cloud-167
name: Kubernetes Secret Mass Get
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Kubernetes Secret
  Mass Get'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1552.001
- tlp.white
category: cloud
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    verb == "get"
    AND object_resource == "secrets"
    AND distinct_secrets_per_minute > 30
false_positives:
- Operator boot
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
