id: det-cloud-214
name: Azure Defender for Cloud Plan Disabled
description: A Microsoft Defender for Cloud plan (Servers, Storage, SQL, etc.) was
  set to Free tier, removing threat detection and advanced security for that resource
  type across the subscription.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity-log
detection:
  condition: |
    operation_name == "Microsoft.Security/pricings/write"
    AND properties.pricingTier == "Free"
false_positives:
- Cost optimization on non-production subscription
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
