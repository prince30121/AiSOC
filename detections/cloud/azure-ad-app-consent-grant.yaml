id: det-cloud-101
name: Entra ID Admin Consent Granted To App
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Entra ID Admin Consent
  Granted To App'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1528
- tlp.white
category: cloud
log_source:
  product: azure
  service: entra-audit
detection:
  condition: |
    operation_name == "Consent to application"
    AND consent_type == "AllPrincipals"
false_positives:
- Sanctioned SaaS rollout
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
