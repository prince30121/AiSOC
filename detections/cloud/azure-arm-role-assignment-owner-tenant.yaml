id: det-cloud-115
name: Azure Role Assignment Owner At Tenant Scope
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Role Assignment
  Owner At Tenant Scope'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1078.004
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name ENDSWITH "roleAssignments/write"
    AND role == "Owner"
    AND scope_root == true
false_positives:
- Documented break-glass procedure
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
