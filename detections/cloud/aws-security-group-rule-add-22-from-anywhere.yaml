id: det-cloud-069
name: AWS SG Rule Allows SSH From 0.0.0.0/0
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS SG Rule Allows
  SSH From 0.0.0.0/0'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1133
- tlp.white
category: cloud
log_source:
  product: aws
  service: ec2
detection:
  condition: |
    event_name == "AuthorizeSecurityGroupIngress"
    AND ip_protocol == "tcp"
    AND from_port == 22
    AND to_port == 22
    AND cidr == "0.0.0.0/0"
false_positives:
- Bastion/jump-host with MFA
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
