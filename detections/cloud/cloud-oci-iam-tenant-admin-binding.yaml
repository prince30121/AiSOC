id: det-cloud-185
name: OCI Tenant Administrators Group Membership Added
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'OCI Tenant Administrators
  Group Membership Added'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1078.004
- tlp.white
category: cloud
log_source:
  product: oci
  service: audit
detection:
  condition: |
    event_name == "AddUserToGroup"
    AND group == "Administrators"
    AND compartment == "tenancy"
false_positives:
- Documented break-glass procedure
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
