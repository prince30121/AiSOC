id: det-cloud-053
name: AWS IAM Login Profile Added To Existing User
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM Login Profile
  Added To Existing User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098.001
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name == "CreateLoginProfile"
    AND user_existed == true
false_positives:
- Migrating service account to interactive use
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
