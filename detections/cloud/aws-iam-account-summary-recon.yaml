id: det-cloud-051
name: AWS IAM GetAccountSummary Recon Burst
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM GetAccountSummary
  Recon Burst'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: low
tags:
- mitre.attack.t1087.004
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name IN ["GetAccountSummary", "GetAccountAuthorizationDetails"]
    AND events_per_minute > 5
false_positives:
- IAM Access Analyzer routine
playbook: tpl-discovery
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
