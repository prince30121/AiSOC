id: det-cloud-142
name: GCP Service Account Key Burst
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP Service Account
  Key Burst'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098.001
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "CreateServiceAccountKey"
    AND events_per_minute > 5
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
