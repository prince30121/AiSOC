id: det-cloud-171
name: Kubernetes Role Created With Wildcard Verb
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Kubernetes Role Created
  With Wildcard Verb'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078
- tlp.white
category: cloud
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    verb IN ["create", "update"]
    AND object_resource IN ["roles", "clusterroles"]
    AND rule_verbs CONTAINS "*"
false_positives:
- Operator chart
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
