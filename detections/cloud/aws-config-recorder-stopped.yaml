id: det-cloud-091
name: AWS Config Recorder Stopped
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS Config Recorder
  Stopped'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1562.008
- tlp.white
category: cloud
log_source:
  product: aws
  service: config
detection:
  condition: |
    event_name == "StopConfigurationRecorder"
false_positives:
- Account decommission
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
