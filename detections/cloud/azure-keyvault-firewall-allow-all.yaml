id: det-cloud-129
name: Azure Key Vault Network ACL Allows All
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Key Vault Network
  ACL Allows All'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1133
- tlp.white
category: cloud
log_source:
  product: azure
  service: keyvault
detection:
  condition: |
    operation_name ENDSWITH "vaults/write"
    AND default_action == "Allow"
false_positives:
- Confirmed test/tuning activity
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
