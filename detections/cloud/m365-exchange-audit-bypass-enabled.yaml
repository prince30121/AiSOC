id: det-cloud-193
name: M365 Exchange Mailbox Audit Bypass Enabled
description: AuditBypassEnabled was set to True on a mailbox, suppressing all audit
  logging for that account. Threat actors use this to operate invisibly in a compromised
  mailbox.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.008
- tlp.white
category: cloud
log_source:
  product: m365
  service: exchange-admin
detection:
  condition: |
    operation == "Set-MailboxAuditBypassAssociation"
    AND parameters.AuditBypassEnabled == true
false_positives:
- Service accounts excluded by policy for performance reasons
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
