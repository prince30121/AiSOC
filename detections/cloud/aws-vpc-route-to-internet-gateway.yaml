id: det-cloud-068
name: AWS VPC Default Route Pointed At New IGW
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS VPC Default Route
  Pointed At New IGW'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1090
- tlp.white
category: cloud
log_source:
  product: aws
  service: ec2
detection:
  condition: |
    event_name == "CreateRoute"
    AND destination_cidr == "0.0.0.0/0"
    AND target_type == "internet-gateway"
false_positives:
- New public subnet provisioning
playbook: tpl-command-and-control
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
