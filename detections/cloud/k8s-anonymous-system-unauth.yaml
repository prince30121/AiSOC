id: det-cloud-170
name: Kubernetes Request By system:anonymous
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Kubernetes Request
  By system:anonymous'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1078
- tlp.white
category: cloud
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    user_name == "system:anonymous"
    AND response_status_code < 400
false_positives:
- Healthz probe (must be ticketed)
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
