id: det-cloud-148
name: GCS Mass Object Delete Burst
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCS Mass Object Delete
  Burst'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name == "storage.objects.delete"
    AND events_per_minute > 1000
false_positives:
- Lifecycle rule
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
