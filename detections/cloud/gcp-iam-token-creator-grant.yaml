id: det-cloud-139
name: GCP iam.serviceAccountTokenCreator Grant
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP iam.serviceAccountTokenCreator
  Grant'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "SetIamPolicy"
    AND role_added == "roles/iam.serviceAccountTokenCreator"
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
