id: det-cloud-162
name: GCP Firewall Rule 0.0.0.0/0 With Any Port
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP Firewall Rule
  0.0.0.0/0 With Any Port'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1133
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "firewalls.insert"
    AND source_ranges CONTAINS "0.0.0.0/0"
    AND port_any == true
false_positives:
- Lab project
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
