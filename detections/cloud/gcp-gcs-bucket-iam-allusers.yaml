id: det-cloud-146
name: GCS Bucket IAM Granted To allUsers
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCS Bucket IAM Granted
  To allUsers'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH_ANY ["storage.setIamPermissions", "storage.buckets.update"]
    AND added_member IN ["allUsers", "allAuthenticatedUsers"]
false_positives:
- Public CDN bucket by design
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
