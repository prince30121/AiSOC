id: det-cloud-079
name: AWS Lambda Function URL With AuthType=NONE
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS Lambda Function
  URL With AuthType=NONE'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1190
- tlp.white
category: cloud
log_source:
  product: aws
  service: lambda
detection:
  condition: |
    event_name == "CreateFunctionUrlConfig"
    AND auth_type == "NONE"
false_positives:
- Public ingest endpoint by design
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
