id: det-cloud-217
name: GCP Cloud Armor Security Policy Removed
description: A Cloud Armor security policy was deleted from a backend service. This
  removes WAF rules, DDoS protection, and geo-blocking controls from the exposed
  endpoint.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: cloud
log_source:
  product: gcp
  service: cloud-audit
detection:
  condition: |
    method_name == "v1.compute.backendServices.setSecurityPolicy"
    AND security_policy == ""
false_positives:
- Migration to a replacement security policy
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
