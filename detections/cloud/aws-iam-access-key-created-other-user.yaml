id: det-cloud-054
name: AWS IAM Access Key Created For Another User
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM Access Key
  Created For Another User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098.001
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name == "CreateAccessKey"
    AND actor_eq_target == false
false_positives:
- Helpdesk ticket (must be linked)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
