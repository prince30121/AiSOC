id: det-cloud-078
name: AWS Lambda Env Var Contains Secret Pattern
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS Lambda Env Var
  Contains Secret Pattern'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1552.001
- tlp.white
category: cloud
log_source:
  product: aws
  service: lambda
detection:
  condition: |
    event_name IN ["CreateFunction", "UpdateFunctionConfiguration"]
    AND env_secret_pattern == true
false_positives:
- Local-only fixture / unit-test value
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
