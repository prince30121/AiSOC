id: det-cloud-095
name: AWS Organizations Account Removed
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS Organizations
  Account Removed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- tlp.white
category: cloud
log_source:
  product: aws
  service: organizations
detection:
  condition: |
    event_name IN ["RemoveAccountFromOrganization", "LeaveOrganization"]
false_positives:
- Approved account divestiture
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
