id: det-cloud-094
name: AWS CloudTrail Event Selector Narrowed
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS CloudTrail Event
  Selector Narrowed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.008
- tlp.white
category: cloud
log_source:
  product: aws
  service: cloudtrail
detection:
  condition: |
    event_name == "PutEventSelectors"
    AND selector_includes_management_events == false
false_positives:
- Cost-optimisation work
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
