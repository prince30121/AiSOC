id: det-cloud-116
name: Azure ResourceGroup Locks Removed In Bulk
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure ResourceGroup
  Locks Removed In Bulk'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name ENDSWITH "locks/delete"
    AND events_per_minute > 10
false_positives:
- Decommission project
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
