id: det-cloud-151
name: GCS Bucket CORS Wildcard Origin
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCS Bucket CORS Wildcard
  Origin'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "storage.buckets.update"
    AND cors_origin == "*"
false_positives:
- Public API by design
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
