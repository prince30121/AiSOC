id: det-cloud-055
name: AWS IAM Policy Created With NotAction Wildcard
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM Policy Created
  With NotAction Wildcard'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name IN ["CreatePolicy", "CreatePolicyVersion"]
    AND policy_uses_notaction == true
false_positives:
- Confirmed test/tuning activity
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
