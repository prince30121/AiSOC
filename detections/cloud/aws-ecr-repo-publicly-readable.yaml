id: det-cloud-085
name: AWS ECR Repository Policy Public
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS ECR Repository
  Policy Public'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1525
- tlp.white
category: cloud
log_source:
  product: aws
  service: ecr
detection:
  condition: |
    event_name == "SetRepositoryPolicy"
    AND policy_principal == "*"
false_positives:
- Public images repo
playbook: tpl-supply-chain
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
