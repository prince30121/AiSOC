id: det-cloud-099
name: AWS SNS Topic Policy Allows Anonymous Subscribe
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS SNS Topic Policy
  Allows Anonymous Subscribe'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1098
- tlp.white
category: cloud
log_source:
  product: aws
  service: sns
detection:
  condition: |
    event_name == "SetTopicAttributes"
    AND policy_principal == "*"
false_positives:
- Public notifications topic
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
