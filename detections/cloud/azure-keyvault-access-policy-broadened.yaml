id: det-cloud-128
name: Azure Key Vault Access Policy Adds Permission '*'
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Key Vault Access
  Policy Adds Permission '*''.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1098
- tlp.white
category: cloud
log_source:
  product: azure
  service: keyvault
detection:
  condition: |
    operation_name ENDSWITH "vaults/accessPolicies/write"
    AND permissions CONTAINS "all"
false_positives: []
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
