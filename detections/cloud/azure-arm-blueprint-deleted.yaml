id: det-cloud-114
name: Azure Blueprint Assignment Removed
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Blueprint Assignment
  Removed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1562.001
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name ENDSWITH "blueprintAssignments/delete"
false_positives:
- Subscription decommission
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
