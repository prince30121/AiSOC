id: det-cloud-224
name: M365 Teams External Access Policy Enabled
description: Teams external access was changed to allow federation with all external
  domains or specific unblocked domains. Attackers leverage external access to phish
  internal users via Teams chat.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1566.003
- tlp.white
category: cloud
log_source:
  product: m365
  service: teams-admin
detection:
  condition: |
    operation IN ["Set-CsTenantFederationConfiguration", "Set-CsExternalAccessPolicy"]
    AND parameters.AllowFederatedUsers == true
false_positives:
- Planned partner federation for a joint project
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
