id: det-cloud-073
name: AWS RDS Snapshot Shared With Other Account
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS RDS Snapshot Shared
  With Other Account'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1537
- tlp.white
category: cloud
log_source:
  product: aws
  service: rds
detection:
  condition: |
    event_name == "ModifyDBSnapshotAttribute"
    AND shared_account_external == true
false_positives:
- DR copy to disaster account
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
