id: det-cloud-066
name: AWS EC2 DisableApiStop Protection Revoked
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS EC2 DisableApiStop
  Protection Revoked'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: aws
  service: ec2
detection:
  condition: |
    event_name == "ModifyInstanceAttribute"
    AND attribute == "disableApiStop"
    AND value == false
false_positives:
- Decommissioning workflow
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
