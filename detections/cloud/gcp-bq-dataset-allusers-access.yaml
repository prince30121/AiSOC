id: det-cloud-157
name: BigQuery Dataset ACL Adds allUsers
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'BigQuery Dataset ACL
  Adds allUsers'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name == "datasetservice.update"
    AND added_member IN ["allUsers", "allAuthenticatedUsers"]
false_positives:
- Public dataset by design
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
