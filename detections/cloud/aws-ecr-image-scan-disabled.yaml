id: det-cloud-086
name: AWS ECR Image Scan-On-Push Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS ECR Image Scan-On-Push
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: low
tags:
- mitre.attack.t1610
- tlp.white
category: cloud
log_source:
  product: aws
  service: ecr
detection:
  condition: |
    event_name == "PutImageScanningConfiguration"
    AND scan_on_push == false
false_positives:
- Confirmed test/tuning activity
playbook: tpl-vulnerability
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
