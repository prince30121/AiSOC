id: det-cloud-160
name: BigQuery Table Deleted Within 1 Hour Of Creation
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'BigQuery Table Deleted
  Within 1 Hour Of Creation'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name == "tableservice.delete"
    AND table_age_minutes < 60
false_positives:
- Test/CI run
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
