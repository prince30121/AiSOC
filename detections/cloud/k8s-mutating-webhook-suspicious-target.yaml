id: det-cloud-176
name: Kubernetes MutatingWebhookConfiguration With External Endpoint
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Kubernetes MutatingWebhookConfiguration
  With External Endpoint'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: cloud
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    verb IN ["create", "update"]
    AND object_resource == "mutatingwebhookconfigurations"
    AND webhook_url_external == true
false_positives:
- Approved policy controller
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
