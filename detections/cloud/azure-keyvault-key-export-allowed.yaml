id: det-cloud-130
name: Azure Key Vault Key Export Attribute Set
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Key Vault Key
  Export Attribute Set'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1552
- tlp.white
category: cloud
log_source:
  product: azure
  service: keyvault
detection:
  condition: |
    operation_name ENDSWITH "keys/create"
    AND exportable == true
false_positives:
- Approved cross-region migration
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
