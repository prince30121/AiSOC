id: det-cloud-125
name: Azure Blob Soft Delete Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Blob Soft Delete
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1490
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name ENDSWITH "blobServices/write"
    AND delete_retention_enabled == false
false_positives:
- Confirmed test/tuning activity
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
