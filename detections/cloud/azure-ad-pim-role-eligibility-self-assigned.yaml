id: det-cloud-105
name: Entra ID PIM Role Eligibility Self-Assigned
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Entra ID PIM Role
  Eligibility Self-Assigned'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- tlp.white
category: cloud
log_source:
  product: azure
  service: entra-audit
detection:
  condition: |
    operation_name == "Add eligible member to role"
    AND actor_eq_target == true
false_positives:
- Bootstrap by Global Admin
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
