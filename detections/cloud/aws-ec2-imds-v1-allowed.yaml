id: det-cloud-064
name: AWS EC2 Instance Launched With IMDSv1 Allowed
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS EC2 Instance Launched
  With IMDSv1 Allowed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1552.005
- tlp.white
category: cloud
log_source:
  product: aws
  service: ec2
detection:
  condition: |
    event_name == "RunInstances"
    AND imds_v1_allowed == true
false_positives:
- Legacy AMI (must be ticketed)
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
