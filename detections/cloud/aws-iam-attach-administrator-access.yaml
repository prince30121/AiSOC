id: det-cloud-041
name: AWS IAM AdministratorAccess Policy Attached
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM AdministratorAccess
  Policy Attached'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- mitre.attack.t1098
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name IN ["AttachUserPolicy", "AttachRolePolicy", "AttachGroupPolicy"]
    AND policy_arn == "arn:aws:iam::aws:policy/AdministratorAccess"
false_positives:
- IAM bootstrap during account vending
- Sanctioned automation/IaC pipeline
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
