id: det-cloud-147
name: GCS Uniform Bucket-Level Access Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCS Uniform Bucket-Level
  Access Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "storage.buckets.update"
    AND uniform_bucket_level_access == false
false_positives:
- Confirmed test/tuning activity
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
