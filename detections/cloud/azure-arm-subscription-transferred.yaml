id: det-cloud-120
name: Azure Subscription Transferred
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Subscription
  Transferred'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1078.004
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name CONTAINS "subscriptions/transfer"
false_positives:
- Approved EA migration
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
