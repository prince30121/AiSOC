id: det-cloud-199
name: M365 Teams Custom App Sideloading Enabled
description: The Teams app permission policy was changed to allow sideloading of
  custom apps. Malicious Teams apps can harvest tokens, exfiltrate chat data, and
  impersonate users.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1195.002
- tlp.white
category: cloud
log_source:
  product: m365
  service: teams-admin
detection:
  condition: |
    operation == "Set-CsTeamsAppPermissionPolicy"
    AND parameters.AllowSideloading == true
false_positives:
- Developer tenant used for Teams app testing
playbook: tpl-execution
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
