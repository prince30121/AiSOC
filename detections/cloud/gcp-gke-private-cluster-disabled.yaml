id: det-cloud-153
name: GKE Cluster Private Cluster Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GKE Cluster Private
  Cluster Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1133
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "clusters.update"
    AND private_cluster == false
    AND authorized_networks_empty == true
false_positives:
- Lab cluster
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
