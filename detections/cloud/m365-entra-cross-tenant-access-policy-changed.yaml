id: det-cloud-210
name: M365 Entra Cross-Tenant Access Policy Changed
description: An inbound or outbound cross-tenant access policy was created or modified.
  Misconfigured policies can allow external tenants to access internal resources or
  bypass B2B trust boundaries.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1199
- mitre.attack.t1078.004
- tlp.white
category: cloud
log_source:
  product: m365
  service: entra-audit
detection:
  condition: |
    operation IN ["Update a partner cross tenant access setting",
                   "Create a partner cross tenant access setting"]
false_positives:
- Onboarding a new B2B collaboration partner
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
