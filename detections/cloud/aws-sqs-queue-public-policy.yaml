id: det-cloud-100
name: AWS SQS Queue Policy Allows Principal '*'
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS SQS Queue Policy
  Allows Principal '*''. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1098
- tlp.white
category: cloud
log_source:
  product: aws
  service: sqs
detection:
  condition: |
    event_name == "SetQueueAttributes"
    AND policy_principal == "*"
false_positives:
- Public webhook ingestion
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
