id: det-cloud-197
name: M365 SharePoint Site Collection Admin Granted to External User
description: Detects an external (guest) user being granted site collection administrator
  rights on a SharePoint Online site. External admins can access all site content and
  modify permissions.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098.003
- tlp.white
category: cloud
log_source:
  product: m365
  service: sharepoint-admin
detection:
  condition: |
    operation == "Set-SPOUser"
    AND parameters.IsSiteCollectionAdmin == true
    AND target_user CONTAINS "#ext#"
false_positives:
- Approved vendor site administration
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
