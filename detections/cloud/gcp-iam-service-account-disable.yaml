id: det-cloud-137
name: GCP Service Account Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP Service Account
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1531
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "DisableServiceAccount"
false_positives:
- Decommissioning
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
