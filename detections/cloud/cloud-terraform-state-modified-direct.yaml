id: det-cloud-188
name: Terraform State File Modified Outside Pipeline
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Terraform State File
  Modified Outside Pipeline'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1565.001
- tlp.white
category: cloud
log_source:
  product: multi-cloud
  service: iac
detection:
  condition: |
    action == "state.modify"
    AND actor_in_pipeline == false
false_positives:
- Manual recovery (incident-tracked)
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
