id: det-cloud-175
name: Kubernetes ValidatingWebhookConfiguration Deleted
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Kubernetes ValidatingWebhookConfiguration
  Deleted'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1562.001
- tlp.white
category: cloud
