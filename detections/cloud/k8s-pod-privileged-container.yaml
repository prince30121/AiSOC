id: det-cloud-174
name: Kubernetes Privileged Container Created
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Kubernetes Privileged
  Container Created'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1611
- tlp.white
category: cloud
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    verb == "create"
    AND object_resource == "pods"
    AND privileged == true
false_positives:
- Sysdig / Falco DaemonSet
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
