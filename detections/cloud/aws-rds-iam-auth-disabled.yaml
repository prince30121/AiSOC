id: det-cloud-074
name: AWS RDS IAM Authentication Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS RDS IAM Authentication
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1556
- tlp.white
category: cloud
log_source:
  product: aws
  service: rds
detection:
  condition: |
    event_name == "ModifyDBInstance"
    AND iam_database_authentication_enabled == false
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
