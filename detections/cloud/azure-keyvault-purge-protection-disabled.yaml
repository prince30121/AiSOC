id: det-cloud-126
name: Azure Key Vault Purge Protection Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Key Vault Purge
  Protection Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: azure
  service: keyvault
detection:
  condition: |
    operation_name ENDSWITH "vaults/write"
    AND enable_purge_protection == false
false_positives:
- Confirmed test/tuning activity
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
