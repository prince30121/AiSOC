id: det-cloud-122
name: Azure Storage Account Firewall Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Storage Account
  Firewall Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1133
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name ENDSWITH "storageAccounts/write"
    AND default_action == "Allow"
false_positives:
- Public datalake by design
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
