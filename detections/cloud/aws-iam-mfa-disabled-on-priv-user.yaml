id: det-cloud-043
name: AWS IAM MFA Removed From Privileged User
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM MFA Removed
  From Privileged User'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1556.006
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name == "DeactivateMFADevice"
    AND target_user_priv == true
false_positives:
- Documented break-glass procedure
- Token rotation procedure
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
