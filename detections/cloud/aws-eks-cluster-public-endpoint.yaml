id: det-cloud-081
name: AWS EKS Cluster API Endpoint Made Public
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS EKS Cluster API
  Endpoint Made Public'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1133
- tlp.white
category: cloud
log_source:
  product: aws
  service: eks
detection:
  condition: |
    event_name IN ["CreateCluster", "UpdateClusterConfig"]
    AND endpoint_public_access == true
    AND public_access_cidrs CONTAINS "0.0.0.0/0"
false_positives:
- Lab cluster
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
