id: det-cloud-107
name: Entra ID Bulk User Creation Burst
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Entra ID Bulk User
  Creation Burst'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1136.003
- tlp.white
category: cloud
log_source:
  product: azure
  service: entra-audit
detection:
  condition: |
    operation_name == "Add user"
    AND events_per_minute > 25
false_positives:
- Bulk onboarding
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
