id: det-cloud-048
name: AWS IAM Role Trusts Foreign Account Root
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM Role Trusts
  Foreign Account Root'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1199
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name == "CreateRole"
    AND trust_principal ENDSWITH ":root"
    AND trust_principal_external == true
false_positives:
- Approved partner integration
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
