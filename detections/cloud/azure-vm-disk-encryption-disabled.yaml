id: det-cloud-135
name: Azure VM Disk Encryption Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure VM Disk Encryption
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name ENDSWITH "encryptionExtensions/write"
    AND encryption_enabled == false
false_positives:
- Data classification change
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
