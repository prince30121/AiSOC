id: det-cloud-161
name: BigQuery Dataset CMEK Removed
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'BigQuery Dataset CMEK
  Removed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
