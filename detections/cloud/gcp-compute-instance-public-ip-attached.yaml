id: det-cloud-163
name: GCP Compute Public IP Attached To Instance
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP Compute Public
  IP Attached To Instance'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1133
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "instances.insert"
    AND external_ip_attached == true
    AND label_internal == true
false_positives:
- Confirmed test/tuning activity
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
