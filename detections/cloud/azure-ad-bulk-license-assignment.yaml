id: det-cloud-110
name: Entra ID Bulk License Assignment
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Entra ID Bulk License
  Assignment'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: low
tags:
- mitre.attack.t1078.004
- tlp.white
category: cloud
log_source:
  product: azure
  service: entra-audit
detection:
  condition: |
    operation_name == "Change user license"
    AND events_per_minute > 50
false_positives:
- Bulk onboarding
playbook: tpl-discovery
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
