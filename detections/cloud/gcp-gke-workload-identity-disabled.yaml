id: det-cloud-154
name: GKE Workload Identity Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GKE Workload Identity
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1078
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "clusters.update"
    AND workload_identity_config IS NULL
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
