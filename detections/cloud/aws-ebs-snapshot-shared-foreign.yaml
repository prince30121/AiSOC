id: det-cloud-062
name: AWS EBS Snapshot Shared With Foreign Account
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS EBS Snapshot Shared
  With Foreign Account'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1537
- tlp.white
category: cloud
log_source:
  product: aws
  service: ec2
detection:
  condition: |
    event_name == "ModifySnapshotAttribute"
    AND shared_account_external == true
false_positives:
- Approved DR copy
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
