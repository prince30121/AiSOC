id: det-cloud-221
name: M365 Exchange Transport Rule Redirects Mail Externally
description: A transport rule was created or modified to redirect or BCC mail to an
  external domain. Attackers use this for persistent email exfiltration that survives
  password resets.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1114.003
- mitre.attack.t1020
- tlp.white
category: cloud
log_source:
  product: m365
  service: exchange-admin
detection:
  condition: |
    operation IN ["New-TransportRule", "Set-TransportRule"]
    AND (action_redirect_to MATCHES "*@*" AND action_redirect_to NOT MATCHES "*@<org_domain>")
false_positives:
- Compliance journaling rule to approved archive vendor
playbook: tpl-collection
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
