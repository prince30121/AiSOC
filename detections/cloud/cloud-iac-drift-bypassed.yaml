id: det-cloud-187
name: Infra-As-Code Drift Bypassed With Manual Override
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Infra-As-Code Drift
  Bypassed With Manual Override'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1610
- tlp.white
category: cloud
log_source:
  product: multi-cloud
  service: iac
detection:
  condition: |
    action == "manual_override"
    AND approver IN ["self"]
    AND out_of_hours == true
false_positives:
- Documented break-glass procedure
playbook: tpl-impact
enabled: true
author: AiSOC
