id: det-cloud-103
name: Entra ID Conditional Access Rule Excludes Privileged User
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Entra ID Conditional
  Access Rule Excludes Privileged User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: cloud
log_source:
  product: azure
  service: entra-audit
detection:
  condition: |
    operation_name == "Update policy"
    AND policy_excludes_priv_user == true
false_positives:
- Documented break-glass procedure
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
