id: det-cloud-063
name: AWS AMI Shared Publicly
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS AMI Shared Publicly'.
  Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1537
- tlp.white
category: cloud
log_source:
  product: aws
  service: ec2
detection:
  condition: |
    event_name == "ModifyImageAttribute"
    AND ami_made_public == true
false_positives:
- Marketplace publishing workflow
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
