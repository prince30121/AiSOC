id: det-cloud-112
name: Entra ID SSPR Policy Weakened
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Entra ID SSPR Policy
  Weakened'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1556
- tlp.white
category: cloud
log_source:
  product: azure
  service: entra-audit
detection:
  condition: |
    operation_name IN ["Update password reset policy", "Disable password reset policy"]
false_positives:
- Confirmed test/tuning activity
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
