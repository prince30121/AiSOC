id: det-cloud-097
name: AWS CloudFront Origin Changed Mid-Service
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS CloudFront Origin
  Changed Mid-Service'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1565.002
- tlp.white
category: cloud
log_source:
  product: aws
  service: cloudfront
detection:
  condition: |
    event_name == "UpdateDistribution"
    AND origin_changed == true
    AND distribution_age_days > 30
false_positives:
- Approved migration
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
