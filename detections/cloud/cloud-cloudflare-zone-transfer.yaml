id: det-cloud-181
name: Cloudflare Zone Transferred Out Of Account
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Cloudflare Zone Transferred
  Out Of Account'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1583.001
- tlp.white
category: cloud
log_source:
  product: cloudflare
  service: audit
detection:
  condition: |
    action == "zone.transfer_out"
false_positives:
- Approved org migration
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
