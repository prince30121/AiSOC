id: det-cloud-077
name: AWS Lambda AddPermission Allows Principal '*'
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS Lambda AddPermission
  Allows Principal '*''. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1190
- tlp.white
category: cloud
log_source:
  product: aws
  service: lambda
detection:
  condition: |
    event_name == "AddPermission"
    AND principal == "*"
false_positives:
- Public webhook endpoint by design
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
