id: det-cloud-104
name: Entra ID MFA Method Removed From Privileged User
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Entra ID MFA Method
  Removed From Privileged User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1556.006
- tlp.white
category: cloud
log_source:
  product: azure
  service: entra-audit
detection:
  condition: |
    operation_name IN ["User registered security info", "User deleted security info"]
    AND target_user_priv == true
    AND method_removed == true
false_positives:
- Documented break-glass procedure
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
