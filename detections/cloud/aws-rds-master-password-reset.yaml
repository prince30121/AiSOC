id: det-cloud-075
name: AWS RDS Master User Password Reset
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS RDS Master User
  Password Reset'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: cloud
log_source:
  product: aws
  service: rds
detection:
  condition: |
    event_name == "ModifyDBInstance"
    AND master_user_password_changed == true
false_positives:
- Scheduled rotation
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
