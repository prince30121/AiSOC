id: det-cloud-208
name: M365 Entra ID Conditional Access Policy Disabled
description: A Conditional Access policy was set to report-only or disabled. Disabling
  CA policies removes MFA enforcement, device compliance checks, or location-based
  access controls for the tenant.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- mitre.attack.t1556
- tlp.white
category: cloud
log_source:
  product: m365
  service: entra-audit
detection:
  condition: |
    operation == "Update conditional access policy"
    AND modified_properties.State IN ["disabled", "enabledForReportingButNotEnforced"]
false_positives:
- Policy moved to report-only during staged rollout
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
