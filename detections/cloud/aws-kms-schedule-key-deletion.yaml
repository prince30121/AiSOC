id: det-cloud-088
name: AWS KMS ScheduleKeyDeletion Used
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS KMS ScheduleKeyDeletion
  Used'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: aws
  service: kms
detection:
  condition: |
    event_name == "ScheduleKeyDeletion"
false_positives:
- Decommissioning
playbook: tpl-impact
enabled: true
author: AiSOC
