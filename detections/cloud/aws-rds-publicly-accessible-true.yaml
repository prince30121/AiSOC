id: det-cloud-072
name: AWS RDS Instance Modified To Publicly Accessible
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS RDS Instance Modified
  To Publicly Accessible'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: aws
  service: rds
detection:
  condition: |
    event_name IN ["CreateDBInstance", "ModifyDBInstance"]
    AND publicly_accessible == true
false_positives:
- Lab/demo workload only
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
