id: det-cloud-046
name: AWS IAM Permissions Boundary Removed
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM Permissions
  Boundary Removed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name == "DeleteUserPermissionsBoundary"
false_positives:
- Boundary refactor (tracked in change ticket)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
