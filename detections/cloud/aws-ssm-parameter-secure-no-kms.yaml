id: det-cloud-090
name: AWS SSM SecureString Parameter Created Without KMS
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS SSM SecureString
  Parameter Created Without KMS'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1552.001
- tlp.white
category: cloud
log_source:
  product: aws
  service: ssm
detection:
  condition: |
    event_name == "PutParameter"
    AND type == "SecureString"
    AND key_id IS NULL
false_positives:
- Confirmed test/tuning activity
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
