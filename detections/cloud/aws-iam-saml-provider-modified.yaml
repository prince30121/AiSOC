id: det-cloud-047
name: AWS IAM SAML Provider Updated
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM SAML Provider
  Updated'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name IN ["UpdateSAMLProvider", "CreateSAMLProvider"]
false_positives:
- IdP migration (must be ticketed)
- Sanctioned automation/IaC pipeline
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
