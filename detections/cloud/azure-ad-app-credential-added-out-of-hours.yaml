id: det-cloud-102
name: Entra ID App Credential Added Outside Business Hours
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Entra ID App Credential
  Added Outside Business Hours'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098.001
- tlp.white
category: cloud
log_source:
  product: azure
  service: entra-audit
detection:
  condition: |
    operation_name == "Add service principal credentials"
    AND is_business_hours == false
false_positives:
- On-call engineer rotation
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
