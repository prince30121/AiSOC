id: det-cloud-198
name: M365 Teams External Access Domain Allow-Listed
description: Detects modification of the Teams external access policy to allow federation
  with a new domain. Threat actors social-engineer admins or use compromised accounts to
  open federation for phishing or data exfiltration via Teams chat.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1199
- tlp.white
category: cloud
log_source:
  product: m365
  service: teams-admin
detection:
  condition: |
    operation == "Set-CsTenantFederationConfiguration"
    AND parameters.AllowedDomains CHANGED
false_positives:
- Planned partner federation
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
