id: det-cloud-045
name: AWS IAM Policy Version Set With Wildcard Action
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM Policy Version
  Set With Wildcard Action'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: cloud
log_source:
  product: aws
  service: iam
detection:
  condition: |
    event_name == "SetDefaultPolicyVersion"
    AND policy_action == "*"
    AND policy_resource == "*"
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
