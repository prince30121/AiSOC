id: det-cloud-183
name: Cloudflare Access Policy Bypass Granted
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Cloudflare Access
  Policy Bypass Granted'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1556
- tlp.white
category: cloud
log_source:
  product: cloudflare
  service: audit
detection:
  condition: |
    action == "access_policy.create"
    AND decision == "bypass"
false_positives:
- Documented break-glass procedure
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
