id: det-cloud-158
name: BigQuery Mass Export Burst
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'BigQuery Mass Export
  Burst'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1567.002
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name IN ["jobservice.jobcompleted", "jobs.insert"]
    AND job_type == "EXPORT"
    AND events_per_minute > 5
false_positives:
- Scheduled BI export
playbook: tpl-exfiltration
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
