id: det-cloud-143
name: GCP IAM Binding To External Domain
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP IAM Binding To
  External Domain'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1199
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH "SetIamPolicy"
    AND added_member_external_domain == true
false_positives:
- Approved partner identity
playbook: tpl-initial-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
