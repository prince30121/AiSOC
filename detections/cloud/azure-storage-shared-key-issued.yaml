id: det-cloud-123
name: Azure Storage Shared Access Signature Generated With Long TTL
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Storage Shared
  Access Signature Generated With Long TTL'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1078
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name CONTAINS "ListKeys"
    AND ttl_days > 365
false_positives:
- Sanctioned automation/IaC pipeline
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
