id: det-cloud-076
name: AWS RDS Deletion Protection Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS RDS Deletion Protection
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: aws
  service: rds
detection:
  condition: |
    event_name == "ModifyDBInstance"
    AND deletion_protection == false
false_positives:
- Planned decommission
playbook: tpl-impact
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
