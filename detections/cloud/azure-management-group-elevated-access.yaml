id: det-cloud-213
name: Azure Elevated Access to Manage All Subscriptions
description: A Global Admin activated elevated access at the management group root,
  granting User Access Administrator over every Azure subscription in the tenant.
  This is the single most powerful escalation in Azure and should be extremely rare.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- mitre.attack.t1098.003
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity-log
detection:
  condition: |
    operation_name == "Microsoft.Authorization/elevateAccess/action"
false_positives:
- Break-glass procedure during tenant recovery
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-07'
modified: '2026-05-07'
