id: sigmahq-sigma-5afee48e-67dd-4e03-a783-f74259dcf998
name: Potential LSASS Process Dump Via Procdump
description: 'Detects potential credential harvesting attempts through LSASS memory
  dumps using ProcDump.

  This rule identifies suspicious command-line patterns that combine memory dump flags
  (-ma, -mm, -mp) with LSASS-related process markers.

  LSASS (Local Security Authority Subsystem Service) contains sensitive authentication
  data including plaintext passwords, NTLM hashes, and Kerberos tickets in memory.

  Attackers commonly dump LSASS memory to extract credentials for lateral movement
  and privilege escalation.'
severity: high
enabled: true
tags:
  mitre:
  - T1036
  - T1003.001
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/sysinternals/downloads/procdump
- https://research.splunk.com/endpoint/3742ebfe-64c2-11eb-ae93-0242ac130002
- https://x.com/wietze/status/1958302556033065292?s=12
logsource:
  category: process_creation
  product: windows
detection:
  selection_flags:
    CommandLine|contains|windash:
    - ' -ma '
    - ' -mm '
    - ' -mp '
  selection_process:
    CommandLine|contains:
    - ' ls'
    - ' keyiso'
    - ' samss'
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 5afee48e-67dd-4e03-a783-f74259dcf998
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_sysinternals_procdump_lsass.yml
falsepositives:
- Unlikely, because no one should dump an lsass process memory
- Another tool that uses command line flags similar to ProcDump
