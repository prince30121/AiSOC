id: sigmahq-sigma-81bcb81b-5b1f-474b-b373-52c871aaa7b1
name: Stop Windows Service Via Sc.EXE
description: Detects the stopping of a Windows service via the "sc.exe" utility
severity: low
enabled: false
tags:
  mitre:
  - T1489
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2012-r2-and-2012/cc742107(v=ws.11)
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - OriginalFileName: sc.exe
  - Image|endswith: \sc.exe
  selection_cli:
    CommandLine|contains: ' stop '
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 81bcb81b-5b1f-474b-b373-52c871aaa7b1
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_sc_stop_service.yml
falsepositives:
- There are many legitimate reasons to stop a service. This rule isn't looking for
  any suspicious behavior in particular. Filter legitimate activity accordingly
notes:
  quarantine_reason: 'upstream status: test'
