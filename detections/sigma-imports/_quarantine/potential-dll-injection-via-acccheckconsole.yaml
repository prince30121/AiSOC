id: sigmahq-sigma-0f6da907-5854-4be6-859a-e9958747b0aa
name: Potential DLL Injection Via AccCheckConsole
description: 'Detects the execution "AccCheckConsole" a command-line tool for verifying
  the accessibility implementation of an application''s UI.

  One of the tests that this checker can run are called "verification routine", which
  tests for things like Consistency, Navigation, etc.

  The tool allows a user to provide a DLL that can contain a custom "verification
  routine". An attacker can build such DLLs and pass it via the CLI, which would then
  be loaded in the context of the "AccCheckConsole" utility.'
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references:
- https://gist.github.com/bohops/2444129419c8acf837aedda5f0e7f340
- https://twitter.com/bohops/status/1477717351017680899?s=12
- https://lolbas-project.github.io/lolbas/OtherMSBinaries/AccCheckConsole/
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \AccCheckConsole.exe
  - OriginalFileName: AccCheckConsole.exe
  selection_cli:
    CommandLine|contains:
    - ' -hwnd'
    - ' -process '
    - ' -window '
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 0f6da907-5854-4be6-859a-e9958747b0aa
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_acccheckconsole_execution.yml
falsepositives:
- Legitimate use of the UI Accessibility Checker
notes:
  quarantine_reason: 'upstream status: test'
