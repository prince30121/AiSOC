id: sigmahq-sigma-a537cfc3-4297-4789-92b5-345bfd845ad0
name: Service DACL Abuse To Hide Services Via Sc.EXE
description: Detects usage of the "sc.exe" utility adding a new service with special
  permission seen used by threat actors which makes the service hidden and unremovable.
severity: high
enabled: false
tags:
  mitre:
  - T1574.011
  categories:
  - endpoint
references:
- https://blog.talosintelligence.com/2021/10/threat-hunting-in-large-datasets-by.html
- https://www.sans.org/blog/red-team-tactics-hiding-windows-services/
- https://twitter.com/Alh4zr3d/status/1580925761996828672
- https://itconnect.uw.edu/tools-services-support/it-systems-infrastructure/msinf/other-help/understanding-sddl-syntax/
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \sc.exe
  - OriginalFileName: sc.exe
  selection_cli:
    CommandLine|contains|all:
    - sdset
    - DCLCWPDTSD
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: a537cfc3-4297-4789-92b5-345bfd845ad0
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_sc_sdset_hide_sevices.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
