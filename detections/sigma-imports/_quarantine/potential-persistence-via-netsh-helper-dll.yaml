id: sigmahq-sigma-56321594-9087-49d9-bf10-524fe8479452
name: Potential Persistence Via Netsh Helper DLL
description: Detects the execution of netsh with "add helper" flag in order to add
  a custom helper DLL. This technique can be abused to add a malicious helper DLL
  that can be used as a persistence proxy that gets called when netsh.exe is executed.
severity: medium
enabled: false
tags:
  mitre:
  - T1546.007
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1546.007/T1546.007.md
- https://github.com/outflanknl/NetshHelperBeacon
- https://web.archive.org/web/20160928212230/https://www.adaptforward.com/2016/09/using-netshell-to-execute-evil-dlls-and-persist-on-a-host/
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - OriginalFileName: netsh.exe
  - Image|endswith: \netsh.exe
  selection_cli:
    CommandLine|contains|all:
    - add
    - helper
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 56321594-9087-49d9-bf10-524fe8479452
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_netsh_helper_dll_persistence.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
