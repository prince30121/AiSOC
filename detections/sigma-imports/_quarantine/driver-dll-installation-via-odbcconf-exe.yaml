id: sigmahq-sigma-3f5491e2-8db8-496b-9e95-1029fce852d4
name: Driver/DLL Installation Via Odbcconf.EXE
description: Detects execution of "odbcconf" with "INSTALLDRIVER" which installs a
  new ODBC driver. Attackers abuse this to install and run malicious DLLs.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.008
  categories:
  - endpoint
references:
- https://lolbas-project.github.io/lolbas/Binaries/Odbcconf/
- https://web.archive.org/web/20191023232753/https://twitter.com/Hexacorn/status/1187143326673330176
- https://www.hexacorn.com/blog/2020/08/23/odbcconf-lolbin-trifecta/
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \odbcconf.exe
  - OriginalFileName: odbcconf.exe
  selection_cli:
    CommandLine|contains|all:
    - 'INSTALLDRIVER '
    - .dll
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 3f5491e2-8db8-496b-9e95-1029fce852d4
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_odbcconf_driver_install.yml
falsepositives:
- Legitimate driver DLLs being registered via "odbcconf" will generate false positives.
  Investigate the path of the DLL and its contents to determine if the action is authorized.
notes:
  quarantine_reason: 'upstream status: test'
