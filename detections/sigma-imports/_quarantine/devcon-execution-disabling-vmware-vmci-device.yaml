id: sigmahq-sigma-85f520e7-6f5e-43ca-874c-222e5bf9c0de
name: Devcon Execution Disabling VMware VMCI Device
description: 'Detects execution of devcon.exe with commands that disable the VMware
  Virtual Machine Communication Interface (VMCI) device.

  This can be legitimate during VMware Tools troubleshooting or driver conflicts,
  but may also indicate malware attempting to hijack communication with the hardware
  via the VMCI device.

  This has been used to facilitate VMware ESXi vulnerability exploits to escape VMs
  and execute code on the ESXi host.'
severity: high
enabled: false
tags:
  mitre:
  - T1543.003
  - T1685
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/windows-hardware/drivers/devtest/devcon
- https://communities.vmware.com/t5/VMware-Workstation-Pro/VMCI-driver-issues/td-p/2866060
- https://github.com/search?q=devcon+disable+VMWVMCIHOSTDEV
- https://huntress.com/blog/esxi-vm-escape-exploit
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \devcon.exe
  - OriginalFileName: DevCon.exe
  selection_action:
    CommandLine|contains: ' disable '
  selection_vmci_pci:
    CommandLine|contains:
    - 15AD&DEV_0740
    - VMWVMCIHOSTDEV
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 85f520e7-6f5e-43ca-874c-222e5bf9c0de
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_devcon_disable_vmci_driver.yml
falsepositives:
- Legitimate VMware administration, Tools installation/uninstallation, or troubleshooting
  driver conflicts.
- Automated scripts in virtualized environments for device cleanup.
notes:
  quarantine_reason: 'upstream status: experimental'
