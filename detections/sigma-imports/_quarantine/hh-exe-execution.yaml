id: sigmahq-sigma-68c8acb4-1b60-4890-8e82-3ddf7a6dba84
name: HH.EXE Execution
description: Detects the execution of "hh.exe" to open ".chm" files.
severity: low
enabled: false
tags:
  mitre:
  - T1218.001
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1218.001/T1218.001.md
- https://eqllib.readthedocs.io/en/latest/analytics/b25aa548-7937-11e9-8f5c-d46d6d62a49e.html
- https://www.zscaler.com/blogs/security-research/unintentional-leak-glimpse-attack-vectors-apt37
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - OriginalFileName: HH.exe
  - Image|endswith: \hh.exe
  selection_cli:
    CommandLine|contains: .chm
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 68c8acb4-1b60-4890-8e82-3ddf7a6dba84
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_hh_chm_execution.yml
falsepositives:
- False positives are expected with legitimate ".CHM"
notes:
  quarantine_reason: 'upstream status: test'
