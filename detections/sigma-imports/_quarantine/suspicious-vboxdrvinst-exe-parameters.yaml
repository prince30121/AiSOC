id: sigmahq-sigma-b7b19cb6-9b32-4fc4-a108-73f19acfe262
name: Suspicious VBoxDrvInst.exe Parameters
description: 'Detect VBoxDrvInst.exe run with parameters allowing processing INF file.

  This allows to create values in the registry and install drivers.

  For example one could use this technique to obtain persistence via modifying one
  of Run or RunOnce registry keys'
severity: medium
enabled: false
tags:
  mitre:
  - T1112
  categories:
  - endpoint
references:
- https://github.com/LOLBAS-Project/LOLBAS/blob/4db780e0f0b2e2bb8cb1fa13e09196da9b9f1834/yml/LOLUtilz/OtherBinaries/VBoxDrvInst.yml
- https://twitter.com/pabraeken/status/993497996179492864
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: \VBoxDrvInst.exe
    CommandLine|contains|all:
    - driver
    - executeinf
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: b7b19cb6-9b32-4fc4-a108-73f19acfe262
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_virtualbox_vboxdrvinst_execution.yml
falsepositives:
- Legitimate use of VBoxDrvInst.exe utility by VirtualBox Guest Additions installation
  process
notes:
  quarantine_reason: 'upstream status: test'
