id: sigmahq-sigma-932fb0d8-692b-4b0f-a26e-5643a50fe7d6
name: Audio Capture via PowerShell
description: Detects audio capture via PowerShell Cmdlet.
severity: medium
enabled: false
tags:
  mitre:
  - T1123
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1123/T1123.md
- https://eqllib.readthedocs.io/en/latest/analytics/ab7a6ef4-0983-4275-a4f1-5c6bd3c31c23.html
- https://github.com/frgnca/AudioDeviceCmdlets
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
    - WindowsAudioDevice-Powershell-Cmdlet
    - Toggle-AudioDevice
    - 'Get-AudioDevice '
    - 'Set-AudioDevice '
    - 'Write-AudioDevice '
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 932fb0d8-692b-4b0f-a26e-5643a50fe7d6
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_powershell_audio_capture.yml
falsepositives:
- Legitimate audio capture by legitimate user.
notes:
  quarantine_reason: 'upstream status: test'
