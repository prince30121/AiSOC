id: sigmahq-sigma-2db93a3f-3249-4f73-9e68-0e77a0f8ae7e
name: Remote Access Tool - TacticalRMM Agent Registration to Potentially Attacker-Controlled
  Server
description: 'Detects TacticalRMM agent installations where the --api, --auth, and
  related flags are used on the command line.

  These parameters configure the agent to connect to a specific RMM server with authentication,
  client ID, and site ID.

  This technique could indicate a threat actor attempting to register the agent with
  an attacker-controlled RMM infrastructure silently.'
severity: medium
enabled: false
tags:
  mitre:
  - T1219
  - T1105
  categories:
  - endpoint
references:
- https://github.com/amidaware/tacticalrmm
- https://apophis133.medium.com/powershell-script-tactical-rmm-installation-45afb639eff3
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|contains: \TacticalAgent\tacticalrmm.exe
    CommandLine|contains|all:
    - --api
    - --auth
    - --client-id
    - --site-id
    - --agent-type
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 2db93a3f-3249-4f73-9e68-0e77a0f8ae7e
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_remote_access_tools_tacticalrmm_agent_registration_via_cli.yml
falsepositives:
- Legitimate system administrator deploying TacticalRMM
notes:
  quarantine_reason: 'upstream status: experimental'
