  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/file/file_event/file_event_win_sysinternals_livekd_driver.yml
falsepositives:
- Legitimate usage of LiveKD for debugging purposes will also trigger this
notes:
