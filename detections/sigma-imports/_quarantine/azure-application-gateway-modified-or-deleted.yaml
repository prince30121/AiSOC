id: sigmahq-sigma-ad87d14e-7599-4633-ba81-aeb60cfe8cd6
name: Azure Application Gateway Modified or Deleted
description: Identifies when a application gateway is modified or deleted.
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - cloud
references:
- https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
logsource:
  product: azure
  service: activitylogs
detection:
  selection:
    operationName:
    - MICROSOFT.NETWORK/APPLICATIONGATEWAYS/WRITE
    - MICROSOFT.NETWORK/APPLICATIONGATEWAYS/DELETE
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: ad87d14e-7599-4633-ba81-aeb60cfe8cd6
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/cloud/azure/activity_logs/azure_application_gateway_modified_or_deleted.yml
falsepositives:
- Application gateway being modified or deleted may be performed by a system administrator.
- Verify whether the user identity, user agent, and/or hostname should be making changes
  in your environment.
- Application gateway modified or deleted from unfamiliar users should be investigated.
  If known behavior is causing false positives, it can be exempted from the rule.
notes:
  quarantine_reason: 'upstream status: test'
