id: sigmahq-sigma-35f41cd7-c98e-469f-8a02-ec4ba0cc7a7e
name: PowerShell Write-EventLog Usage
description: Detects usage of the "Write-EventLog" cmdlet with 'RawData' flag. The
  cmdlet can be levreage to write malicious payloads to the EventLog and then retrieve
  them later for later use
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references:
- https://www.blackhillsinfosec.com/windows-event-logs-for-red-teams/
logsource:
  product: windows
  category: ps_script
  definition: 'Requirements: Script Block Logging must be enabled'
detection:
  selection:
    ScriptBlockText|contains|all:
    - Write-EventLog
    - '-RawData '
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 35f41cd7-c98e-469f-8a02-ec4ba0cc7a7e
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/powershell/powershell_script/posh_ps_susp_write_eventlog.yml
falsepositives:
- Legitimate applications writing events via this cmdlet. Investigate alerts to determine
  if the action is benign
notes:
  quarantine_reason: 'upstream status: test'
