id: sigmahq-sigma-4beb6ae0-f85b-41e2-8f18-8668abc8af78
name: Sysinternals PsSuspend Suspicious Execution
description: Detects suspicious execution of Sysinternals PsSuspend, where the utility
  is used to suspend critical processes such as AV or EDR to bypass defenses
severity: high
enabled: false
tags:
  mitre:
  - T1685
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/sysinternals/downloads/pssuspend
- https://twitter.com/0gtweet/status/1638069413717975046
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - OriginalFileName: pssuspend.exe
  - Image|endswith:
    - \pssuspend.exe
    - \pssuspend64.exe
  selection_cli:
    CommandLine|contains: msmpeng.exe
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 4beb6ae0-f85b-41e2-8f18-8668abc8af78
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_sysinternals_pssuspend_susp_execution.yml
falsepositives:
- Unlikely
notes:
  quarantine_reason: 'upstream status: test'
