  for potential persistence
severity: high
enabled: false
tags:
  mitre:
  - T1037.001
  categories:
  - endpoint
references:
- https://cocomelonc.github.io/persistence/2022/12/09/malware-pers-20.html
logsource:
  category: process_creation
  product: windows
detection:
