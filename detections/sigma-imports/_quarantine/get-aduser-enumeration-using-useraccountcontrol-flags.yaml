id: sigmahq-sigma-96c982fe-3d08-4df4-bed2-eb14e02f21c8
name: Get-ADUser Enumeration Using UserAccountControl Flags
description: Detects AS-REP roasting is an attack that is often-overlooked. It is
  not very common as you have to explicitly set accounts that do not require pre-authentication.
severity: medium
enabled: false
tags:
  mitre:
  - T1033
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1069.002/T1069.002.md#atomic-test-11---get-aduser-enumeration-using-useraccountcontrol-flags-as-rep-roasting
- https://shellgeek.com/useraccountcontrol-flags-to-manipulate-properties/
logsource:
  product: windows
  category: ps_script
  definition: 'Requirements: Script Block Logging must be enabled'
detection:
  selection:
    ScriptBlockText|contains|all:
    - Get-ADUser
    - -Filter
    - useraccountcontrol
    - -band
    - '4194304'
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 96c982fe-3d08-4df4-bed2-eb14e02f21c8
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/powershell/powershell_script/posh_ps_as_rep_roasting.yml
falsepositives:
- Legitimate PowerShell scripts
notes:
  quarantine_reason: 'upstream status: test'
