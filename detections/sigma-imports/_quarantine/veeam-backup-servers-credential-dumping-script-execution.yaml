id: sigmahq-sigma-976d6e6f-a04b-4900-9713-0134a353e38b
name: Veeam Backup Servers Credential Dumping Script Execution
description: Detects execution of a PowerShell script that contains calls to the "Veeam.Backup"
  class, in order to dump stored credentials.
severity: high
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references:
- https://www.pwndefend.com/2021/02/15/retrieving-passwords-from-veeam-backup-servers/
- https://labs.withsecure.com/publications/fin7-target-veeam-servers
logsource:
  product: windows
  category: ps_script
  definition: bade5735-5ab0-4aa7-a642-a11be0e40872
detection:
  selection:
    ScriptBlockText|contains|all:
    - '[Credentials]'
    - '[Veeam.Backup.Common.ProtectedStorage]::GetLocalString'
    - Invoke-Sqlcmd
    - Veeam Backup and Replication
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 976d6e6f-a04b-4900-9713-0134a353e38b
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/powershell/powershell_script/posh_ps_veeam_credential_dumping_script.yml
falsepositives:
- Administrators backup scripts (must be investigated)
notes:
  quarantine_reason: 'upstream status: test'
