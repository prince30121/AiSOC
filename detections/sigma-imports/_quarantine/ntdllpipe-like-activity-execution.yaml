id: sigmahq-sigma-bbc865e4-7fcd-45a6-8ff1-95ced28ec5b2
name: NtdllPipe Like Activity Execution
description: Detects command that type the content of ntdll.dll to a different file
  or a pipe in order to evade AV / EDR detection. As seen being used in the POC NtdllPipe
severity: high
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references:
- https://web.archive.org/web/20220306121156/https://www.x86matthew.com/view_post?id=ntdll_pipe
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
    - type %windir%\system32\ntdll.dll
    - type %systemroot%\system32\ntdll.dll
    - type c:\windows\system32\ntdll.dll
    - \\ntdll.dll > \\\\.\\pipe\\
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: bbc865e4-7fcd-45a6-8ff1-95ced28ec5b2
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_cmd_ntdllpipe_redirect.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
