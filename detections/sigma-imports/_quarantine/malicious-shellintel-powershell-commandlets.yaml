id: sigmahq-sigma-402e1e1d-ad59-47b6-bf80-1ee44985b3a7
name: Malicious ShellIntel PowerShell Commandlets
description: Detects Commandlet names from ShellIntel exploitation scripts.
severity: high
enabled: false
tags:
  mitre:
  - T1059.001
  categories:
  - endpoint
references:
- https://github.com/Shellntel/scripts/
logsource:
  product: windows
  category: ps_script
  definition: 'Requirements: Script Block Logging must be enabled'
detection:
  selection:
    ScriptBlockText|contains:
    - Invoke-SMBAutoBrute
    - Invoke-GPOLinks
    - Invoke-Potato
  condition: selection
