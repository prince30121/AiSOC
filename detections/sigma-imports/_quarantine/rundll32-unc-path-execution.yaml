id: sigmahq-sigma-5cdb711b-5740-4fb2-ba88-f7945027afac
name: Rundll32 UNC Path Execution
description: Detects rundll32 execution where the DLL is located on a remote location
  (share)
severity: high
enabled: false
tags:
  mitre:
  - T1021.002
  - T1218.011
  categories:
  - endpoint
references:
- https://www.cybereason.com/blog/rundll32-the-infamous-proxy-for-executing-malicious-code
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \rundll32.exe
  - OriginalFileName: RUNDLL32.EXE
  - CommandLine|contains: rundll32
  selection_cli:
    CommandLine|contains: ' \\\\'
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 5cdb711b-5740-4fb2-ba88-f7945027afac
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_rundll32_unc_path.yml
falsepositives:
- Unlikely
notes:
  quarantine_reason: 'upstream status: test'
