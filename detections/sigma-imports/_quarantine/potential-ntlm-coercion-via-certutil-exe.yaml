id: sigmahq-sigma-6c6d9280-e6d0-4b9d-80ac-254701b64916
name: Potential NTLM Coercion Via Certutil.EXE
description: Detects possible NTLM coercion via certutil using the 'syncwithWU' flag
severity: high
enabled: false
tags:
  mitre:
  - T1218
  categories:
  - endpoint
references:
- https://github.com/LOLBAS-Project/LOLBAS/issues/243
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \certutil.exe
  - OriginalFileName: CertUtil.exe
  selection_cli:
    CommandLine|contains|all:
    - ' -syncwithWU '
    - ' \\\\'
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 6c6d9280-e6d0-4b9d-80ac-254701b64916
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_certutil_ntlm_coercion.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
