id: sigmahq-sigma-cd185561-4760-45d6-a63e-a51325112cae
name: Live Memory Dump Using Powershell
description: Detects usage of a PowerShell command to dump the live memory of a Windows
  machine
severity: high
enabled: false
tags:
  mitre:
  - T1003
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/powershell/module/storage/get-storagediagnosticinfo?view=windowsserver2022-ps
logsource:
  product: windows
  category: ps_script
  definition: 'Requirements: Script Block Logging must be enabled'
detection:
  selection:
    ScriptBlockText|contains|all:
    - Get-StorageDiagnosticInfo
    - -IncludeLiveDump
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: cd185561-4760-45d6-a63e-a51325112cae
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/powershell/powershell_script/posh_ps_memorydump_getstoragediagnosticinfo.yml
falsepositives:
- Diagnostics
notes:
  quarantine_reason: 'upstream status: test'
