id: sigmahq-sigma-c31364f7-8be6-4b77-8483-dd2b5a7b69a3
name: Import PowerShell Modules From Suspicious Directories - ProcCreation
description: Detects powershell scripts that import modules from suspicious directories
severity: medium
enabled: false
tags:
  mitre:
  - T1059.001
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1003.002/T1003.002.md
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
    - Import-Module "$Env:Temp\
    - Import-Module '$Env:Temp\
    - Import-Module $Env:Temp\
    - Import-Module "$Env:Appdata\
    - Import-Module '$Env:Appdata\
    - Import-Module $Env:Appdata\
    - Import-Module C:\Users\Public\
    - ipmo "$Env:Temp\
    - ipmo '$Env:Temp\
    - ipmo $Env:Temp\
    - ipmo "$Env:Appdata\
    - ipmo '$Env:Appdata\
    - ipmo $Env:Appdata\
    - ipmo C:\Users\Public\
  condition: selection
