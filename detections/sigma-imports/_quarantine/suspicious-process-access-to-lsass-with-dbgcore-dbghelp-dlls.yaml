id: sigmahq-sigma-9f5c1d59-33be-4e60-bcab-85d2f566effd
name: Suspicious Process Access to LSASS with Dbgcore/Dbghelp DLLs
description: 'Detects suspicious process access to LSASS.exe from processes located
  in uncommon locations with dbgcore.dll or dbghelp.dll in the call trace.

  These DLLs contain functions like MiniDumpWriteDump that can be abused for credential
  dumping purposes. While modern tools like Mimikatz have moved to using ntdll.dll,

  dbgcore.dll and dbghelp.dll are still used by basic credential dumping utilities
  and legacy tools for LSASS memory access and process suspension techniques.'
severity: high
enabled: false
tags:
  mitre:
  - T1003.001
  - T1685
  categories:
  - endpoint
references:
- https://www.splunk.com/en_us/blog/security/you-bet-your-lsass-hunting-lsass-access.html
- https://docs.microsoft.com/en-us/windows/win32/api/minidumpapiset/nf-minidumpwritedump
logsource:
  category: process_access
  product: windows
detection:
  selection_lsass_calltrace:
    TargetImage|endswith: \lsass.exe
    CallTrace|contains:
    - dbgcore.dll
    - dbghelp.dll
  selection_susp_location:
    SourceImage|contains:
    - :\Perflogs\
    - :\Temp\
    - :\Users\Public\
    - \$Recycle.Bin\
    - \AppData\Roaming\
    - \Contacts\
    - \Desktop\
    - \Documents\
    - \Downloads\
    - \Favorites\
    - \Favourites\
    - \inetpub\wwwroot\
    - \Music\
    - \Pictures\
    - \Start Menu\Programs\Startup\
    - \Users\Default\
    - \Videos\
    - \Windows\Temp\
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 9f5c1d59-33be-4e60-bcab-85d2f566effd
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_access/proc_access_win_susp_dbgcore_dbghelp_load.yml
falsepositives:
- Possibly during software installation or update processes
notes:
  quarantine_reason: 'upstream status: experimental'
