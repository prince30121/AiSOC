id: sigmahq-sigma-5a5152f1-463f-436b-b2f5-8eceb3964b42
name: Displaying Hidden Files Feature Disabled
description: 'Detects modifications to the "Hidden" and "ShowSuperHidden" explorer
  registry values in order to disable showing of hidden files and system files.

  This technique is abused by several malware families to hide their files from normal
  users.'
severity: medium
enabled: false
tags:
  mitre:
  - T1564.001
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1564.001/T1564.001.md#atomic-test-8---hide-files-through-registry
logsource:
  category: registry_set
  product: windows
detection:
  selection:
    TargetObject|endswith:
    - \Microsoft\Windows\CurrentVersion\Explorer\Advanced\ShowSuperHidden
    - \Microsoft\Windows\CurrentVersion\Explorer\Advanced\Hidden
    Details: DWORD (0x00000000)
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 5a5152f1-463f-436b-b2f5-8eceb3964b42
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/registry/registry_set/registry_set_hide_file.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
