id: sigmahq-sigma-9386d78a-7207-4048-9c9f-a93a7c2d1c05
name: Code Execution via Pcwutl.dll
description: Detects launch of executable by calling the LaunchApplication function
  from pcwutl.dll library.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.011
  categories:
  - endpoint
references:
- https://lolbas-project.github.io/lolbas/Libraries/Pcwutl/
- https://twitter.com/harr0ey/status/989617817849876488
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \rundll32.exe
  - OriginalFileName: RUNDLL32.EXE
  selection_cli:
    CommandLine|contains|all:
    - pcwutl
    - LaunchApplication
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 9386d78a-7207-4048-9c9f-a93a7c2d1c05
  source_commit: df5c6a6
