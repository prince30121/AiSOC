  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_lolbin_pcwutl.yml
falsepositives:
- Use of Program Compatibility Troubleshooter Helper
notes:
