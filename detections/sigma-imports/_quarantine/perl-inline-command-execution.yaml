id: sigmahq-sigma-f426547a-e0f7-441a-b63e-854ac5bdf54d
name: Perl Inline Command Execution
description: Detects execution of perl using the "-e"/"-E" flags. This is could be
  used as a way to launch a reverse shell or execute live perl code.
severity: medium
enabled: false
tags:
  mitre:
  - T1059
  categories:
  - endpoint
references:
- https://pentestmonkey.net/cheat-sheet/shells/reverse-shell-cheat-sheet
- https://www.revshells.com/
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \perl.exe
  - OriginalFileName: perl.exe
  selection_cli:
    CommandLine|contains: ' -e'
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: f426547a-e0f7-441a-b63e-854ac5bdf54d
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_perl_inline_command_execution.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
