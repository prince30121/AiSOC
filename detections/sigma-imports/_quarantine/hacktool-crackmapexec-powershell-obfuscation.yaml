id: sigmahq-sigma-6f8b3439-a203-45dc-a88b-abf57ea15ccf
name: HackTool - CrackMapExec PowerShell Obfuscation
description: The CrachMapExec pentesting framework implements a PowerShell obfuscation
  with some static strings detected by this rule.
severity: high
enabled: false
tags:
  mitre:
  - T1059.001
  - T1027.005
  categories:
  - endpoint
references:
- https://github.com/byt3bl33d3r/CrackMapExec
- https://github.com/byt3bl33d3r/CrackMapExec/blob/0a49f75347b625e81ee6aa8c33d3970b5515ea9e/cme/helpers/powershell.py#L242
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith:
    - \powershell.exe
    - \pwsh.exe
  - OriginalFileName:
    - PowerShell.EXE
    - pwsh.dll
  selection_cli:
    CommandLine|contains:
    - join*split
    - ( $ShellId[1]+$ShellId[13]+'x')
    - ( $PSHome[*]+$PSHOME[*]+
    - ( $env:Public[13]+$env:Public[5]+'x')
    - ( $env:ComSpec[4,*,25]-Join'')
    - '[1,3]+''x''-Join'''')'
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 6f8b3439-a203-45dc-a88b-abf57ea15ccf
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_hktl_crackmapexec_powershell_obfuscation.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
