id: sigmahq-sigma-4096a49c-7de4-4da0-a230-c66ccd56ea5a
name: Suspicious PowerShell Get Current User
description: Detects the use of PowerShell to identify the current logged user.
severity: low
enabled: false
tags:
  mitre:
  - T1033
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1033/T1033.md#atomic-test-4---user-discovery-with-env-vars-powershell-script
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1033/T1033.md#atomic-test-5---getcurrent-user-with-powershell-script
logsource:
  product: windows
  category: ps_script
  definition: 'Requirements: Script Block Logging must be enabled'
detection:
  selection:
    ScriptBlockText|contains:
    - '[System.Environment]::UserName'
    - $env:UserName
    - '[System.Security.Principal.WindowsIdentity]::GetCurrent()'
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 4096a49c-7de4-4da0-a230-c66ccd56ea5a
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/powershell/powershell_script/posh_ps_susp_get_current_user.yml
falsepositives:
- Legitimate PowerShell scripts
notes:
  quarantine_reason: 'upstream status: test'
