id: sigmahq-sigma-baef1ec6-2ca9-47a3-97cc-4cf2bda10b77
name: Potential Credential Dumping Attempt Using New NetworkProvider - CLI
description: Detects when an attacker tries to add a new network provider in order
  to dump clear text credentials, similar to how the NPPSpy tool does it
severity: high
enabled: false
tags:
  mitre:
  - T1003
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/troubleshoot/windows-client/setup-upgrade-and-drivers/network-provider-settings-removed-in-place-upgrade
- https://github.com/gtworek/PSBits/tree/master/PasswordStealing/NPPSpy
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains|all:
    - \System\CurrentControlSet\Services\
    - \NetworkProvider
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: baef1ec6-2ca9-47a3-97cc-4cf2bda10b77
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_registry_new_network_provider.yml
falsepositives:
- Other legitimate network providers used and not filtred in this rule
notes:
  quarantine_reason: 'upstream status: test'
