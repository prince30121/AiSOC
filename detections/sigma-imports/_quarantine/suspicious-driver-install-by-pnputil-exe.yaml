id: sigmahq-sigma-a2ea3ae7-d3d0-40a0-a55c-25a45c87cac1
name: Suspicious Driver Install by pnputil.exe
description: Detects when a possible suspicious driver is being installed via pnputil.exe
  lolbin
severity: medium
enabled: false
tags:
  mitre:
  - T1547
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/windows-hardware/drivers/devtest/pnputil-command-syntax
- https://strontic.github.io/xcyclopedia/library/pnputil.exe-60EDC5E6BDBAEE441F2E3AEACD0340D2.html
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
    - -i
    - /install
    - -a
    - /add-driver
    - '.inf'
    Image|endswith: \pnputil.exe
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: a2ea3ae7-d3d0-40a0-a55c-25a45c87cac1
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_lolbin_susp_driver_installed_by_pnputil.yml
falsepositives:
- Pnputil.exe being used may be performed by a system administrator.
- Verify whether the user identity, user agent, and/or hostname should be making changes
  in your environment.
- Pnputil.exe being executed from unfamiliar users should be investigated. If known
  behavior is causing false positives, it can be exempted from the rule.
notes:
  quarantine_reason: 'upstream status: test'
