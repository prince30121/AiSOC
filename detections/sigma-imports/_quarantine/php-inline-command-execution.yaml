id: sigmahq-sigma-d81871ef-5738-47ab-9797-7a9c90cd4bfb
name: Php Inline Command Execution
description: Detects execution of php using the "-r" flag. This is could be used as
  a way to launch a reverse shell or execute live php code.
severity: medium
enabled: false
tags:
  mitre:
  - T1059
  categories:
  - endpoint
references:
- https://www.php.net/manual/en/features.commandline.php
- https://www.revshells.com/
- https://pentestmonkey.net/cheat-sheet/shells/reverse-shell-cheat-sheet
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \php.exe
  - OriginalFileName: php.exe
  selection_cli:
    CommandLine|contains: ' -r'
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: d81871ef-5738-47ab-9797-7a9c90cd4bfb
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_php_inline_command_execution.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
