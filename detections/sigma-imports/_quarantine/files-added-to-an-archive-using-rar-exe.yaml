id: sigmahq-sigma-6f3e2987-db24-4c78-a860-b4f4095a7095
name: Files Added To An Archive Using Rar.EXE
description: Detects usage of "rar" to add files to an archive for potential compression.
  An adversary may compress data (e.g. sensitive documents) that is collected prior
  to exfiltration in order to make it portable and minimize the amount of data sent
  over the network.
severity: low
enabled: false
tags:
  mitre:
  - T1560.001
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1560.001/T1560.001.md
- https://eqllib.readthedocs.io/en/latest/analytics/1ec33c93-3d0b-4a28-8014-dbdaae5c60ae.html
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: \rar.exe
    CommandLine|contains: ' a '
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 6f3e2987-db24-4c78-a860-b4f4095a7095
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_rar_compress_data.yml
falsepositives:
- Highly likely if rar is a default archiver in the monitored environment.
notes:
  quarantine_reason: 'upstream status: test'
