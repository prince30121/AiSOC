id: sigmahq-sigma-53821412-17b0-4147-ade0-14faae67d54b
name: System Integrity Protection (SIP) Enumeration
description: Detects the use of csrutil to view the Configure System Integrity Protection
  (SIP) status. This technique is used in post-exploit scenarios.
severity: low
enabled: false
tags:
  mitre:
  - T1518.001
  categories:
  - endpoint
references:
- https://ss64.com/osx/csrutil.html
- https://objective-see.org/blog/blog_0x6D.html
- https://www.welivesecurity.com/2017/10/20/osx-proton-supply-chain-attack-elmedia/
- https://www.virustotal.com/gui/file/05a2adb266ec6c0ba9ed176d87d8530e71e845348c13caf9f60049760c312cd3/behavior
logsource:
  product: macos
  category: process_creation
detection:
  selection:
    Image|endswith: /csrutil
    CommandLine|contains: status
  condition: selection
