id: sigmahq-sigma-f0025a69-e1b7-4dda-a53c-db21fa2d4071
name: Script Interpreter Spawning Credential Scanner - Linux
description: 'Detects a script interpreter process (like node.js or bun) spawning
  a known credential scanning tool (e.g., trufflehog, gitleaks).

  This behavior is indicative of an attempt to find and steal secrets, as seen in
  the "Shai-Hulud: The Second Coming" campaign.'
severity: high
enabled: false
tags:
  mitre:
  - T1552
  - T1005
  - T1059.004
  categories:
  - endpoint
references:
- https://github.com/asyncapi/cli/blob/2efa4dff59bc3d3cecdf897ccf178f99b115d63d/bun_environment.js
- https://www.stepsecurity.io/blog/sha1-hulud-the-second-coming-zapier-ens-domains-and-other-prominent-npm-packages-compromised
- https://www.endorlabs.com/learn/shai-hulud-2-malware-campaign-targets-github-and-cloud-credentials-using-bun-runtime
- https://semgrep.dev/blog/2025/digging-for-secrets-sha1-hulud-the-second-coming-of-the-npm-worm/
logsource:
  category: process_creation
  product: linux
detection:
  selection_parent:
    ParentImage|endswith:
    - /node
    - /bun
  selection_child:
  - Image|endswith:
    - /trufflehog
    - /gitleaks
  - CommandLine|contains:
    - trufflehog
    - gitleaks
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: f0025a69-e1b7-4dda-a53c-db21fa2d4071
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/linux/process_creation/proc_creation_lnx_susp_script_interpretor_spawn_credential_scanner.yml
falsepositives:
- Legitimate pre-commit hooks or CI/CD pipeline jobs that use a script to run a credential
  scanner as part of a security check.
notes:
  quarantine_reason: 'upstream status: experimental'
