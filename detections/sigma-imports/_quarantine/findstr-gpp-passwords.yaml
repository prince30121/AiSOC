id: sigmahq-sigma-91a2c315-9ee6-4052-a853-6f6a8238f90d
name: Findstr GPP Passwords
description: Look for the encrypted cpassword value within Group Policy Preference
  files on the Domain Controller. This value can be decrypted with gpp-decrypt.
severity: high
enabled: false
tags:
  mitre:
  - T1552.006
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1552.006/T1552.006.md#atomic-test-1---gpp-passwords-findstr
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith:
    - \find.exe
    - \findstr.exe
  - OriginalFileName:
    - FIND.EXE
    - FINDSTR.EXE
  selection_cli:
    CommandLine|contains|all:
    - cpassword
    - \sysvol\
    - .xml
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 91a2c315-9ee6-4052-a853-6f6a8238f90d
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_findstr_gpp_passwords.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
