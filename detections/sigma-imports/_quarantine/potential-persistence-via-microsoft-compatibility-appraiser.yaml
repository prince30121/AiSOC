id: sigmahq-sigma-f548a603-c9f2-4c89-b511-b089f7e94549
name: Potential Persistence Via Microsoft Compatibility Appraiser
description: 'Detects manual execution of the "Microsoft Compatibility Appraiser"
  task via schtasks.

  In order to trigger persistence stored in the "\AppCompatFlags\TelemetryController"
  registry key.'
severity: medium
enabled: false
tags:
  mitre:
  - T1053.005
  categories:
  - endpoint
references:
- https://www.trustedsec.com/blog/abusing-windows-telemetry-for-persistence/
logsource:
  product: windows
  category: process_creation
detection:
  selection_img:
  - Image|endswith: \schtasks.exe
  - OriginalFileName: schtasks.exe
  selection_cli:
    CommandLine|contains|all:
    - 'run '
    - \Application Experience\Microsoft Compatibility Appraiser
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: f548a603-c9f2-4c89-b511-b089f7e94549
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_schtasks_persistence_windows_telemetry.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
