id: sigmahq-sigma-1cc50f3f-1fc8-4acf-b2e9-6f172e1fdebd
name: Suspicious Rundll32 Invoking Inline VBScript
description: Detects suspicious process related to rundll32 based on command line
  that invokes inline VBScript as seen being used by UNC2452
severity: high
enabled: false
tags:
  mitre:
  - T1055
  categories:
  - endpoint
references:
- https://www.microsoft.com/security/blog/2021/03/04/goldmax-goldfinder-sibot-analyzing-nobelium-malware/
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains|all:
    - rundll32.exe
    - Execute
    - RegRead
    - window.close
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 1cc50f3f-1fc8-4acf-b2e9-6f172e1fdebd
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_rundll32_inline_vbs.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
