id: sigmahq-sigma-92f84194-8d9a-4ee0-8699-c30bfac59780
name: AWS Key Pair Import Activity
description: Detects the import of SSH key pairs into AWS EC2, which may indicate
  an attacker attempting to gain unauthorized access to instances. This activity could
  lead to initial access, persistence, or privilege escalation, potentially compromising
  sensitive data and operations.
severity: medium
enabled: false
tags:
  mitre:
  - T1078
  categories:
  - cloud
references:
- https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_ImportKeyPair.html
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventSource: ec2.amazonaws.com
    eventName: ImportKeyPair
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 92f84194-8d9a-4ee0-8699-c30bfac59780
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/cloud/aws/cloudtrail/aws_ec2_import_key_pair_activity.yml
falsepositives:
- Legitimate administrative actions by authorized users importing keys for valid purposes.
- Automated processes for infrastructure setup may trigger this alert.
- Verify the user identity, user agent, and source IP address to ensure they are expected.
notes:
  quarantine_reason: 'upstream status: experimental'
