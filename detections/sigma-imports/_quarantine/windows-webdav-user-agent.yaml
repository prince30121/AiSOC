id: sigmahq-sigma-e09aed7a-09e0-4c9a-90dd-f0d52507347e
name: Windows WebDAV User Agent
description: Detects WebDav DownloadCradle
severity: high
enabled: false
tags:
  mitre:
  - T1071.001
  categories:
  - network
references:
- https://mgreen27.github.io/posts/2018/04/02/DownloadCradle.html
logsource:
  category: proxy
detection:
  selection:
    c-useragent|startswith: Microsoft-WebDAV-MiniRedir/
    cs-method: GET
  condition: selection
provenance:
