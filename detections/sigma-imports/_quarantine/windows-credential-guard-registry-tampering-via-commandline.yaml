id: sigmahq-sigma-c17d47b7-dcd6-4109-87eb-d1817bd4cbc9
name: Windows Credential Guard Registry Tampering Via CommandLine
description: 'Detects attempts to add, modify, or delete Windows Credential Guard
  related registry keys or values via command line tools such as Reg.exe or PowerShell.

  Credential Guard uses virtualization-based security to isolate secrets so that only
  privileged system software can access them.

  Adversaries may disable Credential Guard to gain access to sensitive credentials
  stored in the system, such as NTLM hashes and Kerberos tickets, which can be used
  for lateral movement and privilege escalation.

  The rule matches suspicious command lines that target DeviceGuard or LSA registry
  paths and manipulate keys like EnableVirtualizationBasedSecurity, RequirePlatformSecurityFeatures,
  or LsaCfgFlags.

  Such activity may indicate an attempt to disable or tamper with Credential Guard,
  potentially exposing sensitive credentials for misuse.'
severity: high
enabled: false
tags:
  mitre:
  - T1685
  categories:
  - endpoint
references:
- https://woshub.com/disable-credential-guard-windows/
- https://learn.microsoft.com/en-us/windows/client-management/mdm/policy-csp-deviceguard
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith:
    - \powershell.exe
    - \pwsh.exe
    - \reg.exe
  - OriginalFileName:
    - PowerShell.EXE
    - pwsh.dll
    - reg.exe
  selection_cli:
    CommandLine|contains:
    - 'add '
    - 'New-ItemProperty '
    - 'Set-ItemProperty '
    - 'si '
    - 'delete '
    - 'del '
    - 'Remove-ItemProperty '
    - 'rp '
  selection_key_base:
    CommandLine|contains:
    - \Control\DeviceGuard
    - \Control\LSA
    - Software\Policies\Microsoft\Windows\DeviceGuard
  selection_key_specific:
    CommandLine|contains:
    - EnableVirtualizationBasedSecurity
    - RequirePlatformSecurityFeatures
    - LsaCfgFlags
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: c17d47b7-dcd6-4109-87eb-d1817bd4cbc9
  source_commit: df5c6a6
