id: sigmahq-sigma-0cbe38c0-270c-41d9-ab79-6e5a9a669290
name: Trusted Path Bypass via Windows Directory Spoofing
description: 'Detects DLLs loading from a spoofed Windows directory path with an extra
  space (e.g "C:\Windows \System32") which can bypass Windows trusted path verification.

  This technique tricks Windows into treating the path as trusted, allowing malicious
  DLLs to load with high integrity privileges bypassing UAC.'
severity: high
enabled: false
tags:
  mitre:
  - T1574.007
  - T1548.002
  categories:
  - endpoint
references:
- https://x.com/Wietze/status/1933495426952421843
logsource:
  category: image_load
  product: windows
detection:
  selection:
    ImageLoaded|contains:
    - :\Windows \System32\
    - :\Windows \SysWOW64\
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 0cbe38c0-270c-41d9-ab79-6e5a9a669290
  source_commit: df5c6a6
