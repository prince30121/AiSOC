id: sigmahq-sigma-68bcd73b-37ef-49cb-95fc-edc809730be6
name: Potential Unquoted Service Path Reconnaissance Via Wmic.EXE
description: Detects known WMI recon method to look for unquoted service paths using
  wmic. Often used by pentester and attacker enumeration scripts
severity: medium
enabled: false
tags:
  mitre:
  - T1047
  categories:
  - endpoint
references:
- https://github.com/nccgroup/redsnarf/blob/35949b30106ae543dc6f2bc3f1be10c6d9a8d40e/redsnarf.py
- https://github.com/S3cur3Th1sSh1t/Creds/blob/eac23d67f7f90c7fc8e3130587d86158c22aa398/PowershellScripts/jaws-enum.ps1
- https://www.absolomb.com/2018-01-26-Windows-Privilege-Escalation-Guide/
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - OriginalFileName: wmic.exe
  - Image|endswith: \WMIC.exe
  selection_cli:
    CommandLine|contains|all:
    - ' service get '
    - name,displayname,pathname,startmode
  condition: all of selection*
provenance:
  source: SigmaHQ/sigma
  source_id: 68bcd73b-37ef-49cb-95fc-edc809730be6
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_wmic_recon_unquoted_service_search.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
