id: sigmahq-sigma-f0f7be61-9cf5-43be-9836-99d6ef448a18
name: Uninstall Crowdstrike Falcon Sensor
description: Adversaries may disable security tools to avoid possible detection of
  their tools and activities by uninstalling Crowdstrike Falcon
severity: high
enabled: false
tags:
  mitre:
  - T1685
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1562.001/T1562.001.md
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains|all:
    - \WindowsSensor.exe
    - ' /uninstall'
    - ' /quiet'
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: f0f7be61-9cf5-43be-9836-99d6ef448a18
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_uninstall_crowdstrike_falcon.yml
falsepositives:
- Administrator might leverage the same command line for debugging or other purposes.
  However this action must be always investigated
notes:
