id: sigmahq-sigma-66e563f9-1cbd-4a22-a957-d8b7c0f44372
name: HackTool - XORDump Execution
description: Detects suspicious use of XORDump process memory dumping utility
severity: high
enabled: false
tags:
  mitre:
  - T1036
  - T1003.001
  categories:
  - endpoint
references:
- https://github.com/audibleblink/xordump
logsource:
  category: process_creation
  product: windows
detection:
  selection:
  - Image|endswith: \xordump.exe
  - CommandLine|contains:
    - ' -process lsass.exe '
    - ' -m comsvcs '
    - ' -m dbghelp '
    - ' -m dbgcore '
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 66e563f9-1cbd-4a22-a957-d8b7c0f44372
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_hktl_xordump.yml
falsepositives:
- Another tool that uses the command line switches of XORdump
notes:
  quarantine_reason: 'upstream status: test'
