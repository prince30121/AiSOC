id: sigmahq-sigma-88a87a10-384b-4ad7-8871-2f9bf9259ce5
name: Suspicious Regsvr32 Execution From Remote Share
description: Detects REGSVR32.exe to execute DLL hosted on remote shares
severity: high
enabled: false
tags:
  mitre:
  - T1218.010
  categories:
  - endpoint
references:
- https://thedfirreport.com/2022/10/31/follina-exploit-leads-to-domain-compromise/
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \regsvr32.exe
  - OriginalFileName: \REGSVR32.EXE
  selection_cli:
    CommandLine|contains: ' \\\\'
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 88a87a10-384b-4ad7-8871-2f9bf9259ce5
  source_commit: df5c6a6
