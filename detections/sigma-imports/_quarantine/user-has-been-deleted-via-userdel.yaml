id: sigmahq-sigma-08f26069-6f80-474b-8d1f-d971c6fedea0
name: User Has Been Deleted Via Userdel
description: Detects execution of the "userdel" binary. Which is used to delete a
  user account and related files. This is sometimes abused by threat actors in order
  to cover their tracks
severity: medium
enabled: false
tags:
  mitre:
  - T1531
  categories:
  - endpoint
references:
- https://linuxize.com/post/how-to-delete-group-in-linux/
- https://www.cyberciti.biz/faq/linux-remove-user-command/
- https://www.cybrary.it/blog/0p3n/linux-commands-used-attackers/
- https://linux.die.net/man/8/userdel
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    Image|endswith: /userdel
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 08f26069-6f80-474b-8d1f-d971c6fedea0
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/linux/process_creation/proc_creation_lnx_userdel.yml
falsepositives:
- Legitimate administrator activities
notes:
