id: sigmahq-sigma-ed447910-bc30-4575-a598-3a2e49516a7a
name: Linux Setuid Capability Set on a Binary via Setcap Utility
description: 'Detects the use of the ''setcap'' utility to set the ''setuid'' capability
  (cap_setuid) on a binary file.

  This capability allows a non privileged process to make arbitrary manipulations
  of user IDs (UIDs), including setting its current UID to a value that would otherwise
  be restricted (i.e. UID 0, the root user).

  This behavior can be used by adversaries to backdoor a binary in order to escalate
  privileges again in the future if needed.'
severity: low
enabled: false
tags:
  mitre:
  - T1548
  - T1554
  categories:
  - endpoint
references:
- https://man7.org/linux/man-pages/man8/setcap.8.html
- https://dfir.ch/posts/linux_capabilities/
- https://juggernaut-sec.com/capabilities/#cap_setuid
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    Image|endswith: /setcap
    CommandLine|contains: cap_setuid
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: ed447910-bc30-4575-a598-3a2e49516a7a
  source_commit: df5c6a6
