id: sigmahq-sigma-d487ed4a-fd24-436d-a0b2-f4e95f7b2635
name: Suspicious ClickFix/FileFix Execution Pattern
description: 'Detects suspicious execution patterns where users are tricked into running
  malicious commands via clipboard manipulation, either through the Windows Run dialog
  (ClickFix) or File Explorer address bar (FileFix).

  Attackers leverage social engineering campaigns—such as fake CAPTCHA challenges
  or urgent alerts—encouraging victims to paste clipboard contents, often executing
  mshta.exe, powershell.exe, or similar commands to infect systems.'
severity: high
enabled: false
tags:
  mitre:
  - T1204.001
  - T1204.004
  categories:
  - endpoint
references:
- https://github.com/JohnHammond/recaptcha-phish
- https://www.zscaler.com/blogs/security-research/deepseek-lure-using-captchas-spread-malware
- https://www.threatdown.com/blog/clipboard-hijacker-tries-to-install-a-trojan/
- https://app.any.run/tasks/5c16b4db-4b36-4039-a0ed-9b09abff8be2
- https://www.esentire.com/security-advisories/netsupport-rat-clickfix-distribution
- https://www.scpx.com.au/2025/11/16/decades-old-finger-protocol-abused-in-clickfix-malware-attacks/
logsource:
  category: process_creation
  product: windows
detection:
  selection_parent:
    ParentImage|endswith: \explorer.exe
    CommandLine|contains: '#'
  selection_cli_captcha:
    CommandLine|contains:
    - account
    - anti-bot
    - botcheck
    - captcha
    - challenge
    - confirmation
    - fraud
    - human
    - identification
    - identificator
    - identity
    - robot
    - validation
    - verification
    - verify
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: d487ed4a-fd24-436d-a0b2-f4e95f7b2635
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_susp_clickfix_filefix_execution.yml
falsepositives:
- Unlikely
notes:
  quarantine_reason: 'upstream status: experimental'
