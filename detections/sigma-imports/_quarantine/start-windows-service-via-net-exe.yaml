id: sigmahq-sigma-2a072a96-a086-49fa-bcb5-15cc5a619093
name: Start Windows Service Via Net.EXE
description: Detects the usage of the "net.exe" command to start a service using the
  "start" flag
severity: low
enabled: false
tags:
  mitre:
  - T1569.002
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1569.002/T1569.002.md
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith:
    - \net.exe
    - \net1.exe
  - OriginalFileName:
    - net.exe
    - net1.exe
  selection_cli:
    CommandLine|contains: ' start '
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 2a072a96-a086-49fa-bcb5-15cc5a619093
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_net_start_service.yml
falsepositives:
- Legitimate administrator or user executes a service for legitimate reasons.
notes:
  quarantine_reason: 'upstream status: test'
