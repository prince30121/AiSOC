id: sigmahq-sigma-efc21479-9e83-41da-8cf1-122e06ba8db3
name: HackTool - NetExec File Indicators
description: 'Detects file creation events indicating NetExec (nxc.exe) execution
  on the local machine.

  NetExec is a PyInstaller-bundled binary that extracts its embedded data files to
  a "_MEI<random>" directory

  under the Temp folder upon execution. Files dropped under the "\nxc\" sub-directory
  of that

  extraction path are unique to NetExec and serve as reliable on-disk indicators of
  execution.

  NetExec (formerly CrackMapExec) is a widely used post-exploitation and lateral movement
  tool used for

  Active Directory enumeration, credential harvesting, and remote code execution.'
severity: high
enabled: false
tags:
  mitre:
  - T1021.002
  - T1059.005
  categories:
  - endpoint
references:
- https://github.com/Pennyw0rth/NetExec
- https://www.netexec.wiki/
logsource:
  product: windows
  category: file_event
detection:
  selection:
  - Image|contains: \nxc-windows-latest\
  - TargetFilename|contains|all:
    - \Temp\_MEI
    - \nxc\data\
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: efc21479-9e83-41da-8cf1-122e06ba8db3
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/file/file_event/file_event_win_hktl_netexec_file_indicators.yml
falsepositives:
- Unknown
notes:
