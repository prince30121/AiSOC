  source_id: 0ee4d8a5-4e67-4faf-acfa-62a78457d1f2
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/builtin/security/win_security_hybridconnectionmgr_svc_installation.yml
falsepositives:
- Legitimate use of Hybrid Connection Manager via Azure function apps.
notes:
