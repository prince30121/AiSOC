id: sigmahq-sigma-0ee4d8a5-4e67-4faf-acfa-62a78457d1f2
name: HybridConnectionManager Service Installation
description: Rule to detect the Hybrid Connection Manager service installation.
severity: high
enabled: false
tags:
  mitre:
  - T1554
  categories:
  - endpoint
references:
- https://twitter.com/Cyb3rWard0g/status/1381642789369286662
logsource:
  product: windows
  service: security
  definition: The 'System Security Extension' audit subcategory need to be enabled
    to log the EID 4697
detection:
  selection:
    EventID: 4697
    ServiceName: HybridConnectionManager
    ServiceFileName|contains: HybridConnectionManager
  condition: selection
provenance:
