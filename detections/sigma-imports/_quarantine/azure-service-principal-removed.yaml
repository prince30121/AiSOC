description: Identifies when a service principal was removed in Azure.
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - cloud
references:
- https://learn.microsoft.com/en-us/entra/identity/monitoring-health/reference-audit-activities#application-proxy
logsource:
  product: azure
  service: activitylogs
detection:
