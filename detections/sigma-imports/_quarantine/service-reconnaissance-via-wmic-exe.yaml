id: sigmahq-sigma-76f55eaa-d27f-4213-9d45-7b0e4b60bbae
name: Service Reconnaissance Via Wmic.EXE
description: 'An adversary might use WMI to check if a certain remote service is running
  on a remote device.

  When the test completes, a service information will be displayed on the screen if
  it exists.

  A common feedback message is that "No instance(s) Available" if the service queried
  is not running.

  A common error message is "Node - (provided IP or default) ERROR Description =The
  RPC server is unavailable" if the provided remote host is unreachable'
severity: medium
enabled: false
tags:
  mitre:
  - T1047
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1047/T1047.md
- https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/wmic
- https://learn.microsoft.com/en-us/windows/win32/cimwin32prov/win32-service
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \WMIC.exe
  - OriginalFileName: wmic.exe
  selection_cli:
    CommandLine|contains: service
  filter_main_win32_methods:
    CommandLine|contains:
    - Change
    - Create
    - Delete
    - PauseService
    - ResumeService
    - SetSecurityDescriptor
    - StartService
    - StopService
    - UserControlService
  condition: all of selection_* and not 1 of filter_main_*
provenance:
  source: SigmaHQ/sigma
  source_id: 76f55eaa-d27f-4213-9d45-7b0e4b60bbae
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_wmic_recon_service.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
