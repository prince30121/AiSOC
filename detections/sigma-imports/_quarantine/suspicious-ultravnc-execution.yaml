id: sigmahq-sigma-871b9555-69ca-4993-99d3-35a59f9f3599
name: Suspicious UltraVNC Execution
description: Detects suspicious UltraVNC command line flag combination that indicate
  a auto reconnect upon execution, e.g. startup (as seen being used by Gamaredon threat
  group)
severity: high
enabled: false
tags:
  mitre:
  - T1021.005
  categories:
  - endpoint
references:
- https://web.archive.org/web/20220224045756/https://www.ria.ee/sites/default/files/content-editors/kuberturve/tale_of_gamaredon_infection.pdf
- https://symantec-enterprise-blogs.security.com/blogs/threat-intelligence/shuckworm-gamaredon-espionage-ukraine
- https://unit42.paloaltonetworks.com/unit-42-title-gamaredon-group-toolset-evolution
- https://uvnc.com/docs/uvnc-viewer/52-ultravnc-viewer-commandline-parameters.html
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains|all:
    - '-autoreconnect '
    - '-connect '
    - '-id:'
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 871b9555-69ca-4993-99d3-35a59f9f3599
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_ultravnc_susp_execution.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
