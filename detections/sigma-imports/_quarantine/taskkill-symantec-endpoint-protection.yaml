id: sigmahq-sigma-4a6713f6-3331-11ed-a261-0242ac120002
name: Taskkill Symantec Endpoint Protection
description: 'Detects one of the possible scenarios for disabling Symantec Endpoint
  Protection.

  Symantec Endpoint Protection antivirus software services incorrectly implement the
  protected service mechanism.

  As a result, the NT AUTHORITY/SYSTEM user can execute the taskkill /im command several
  times ccSvcHst.exe /f, thereby killing the process belonging to the service, and
  thus shutting down the service.'
severity: high
enabled: false
tags:
  mitre:
  - T1685
  categories:
  - endpoint
references:
- https://www.exploit-db.com/exploits/37525
- https://community.spiceworks.com/topic/2195015-batch-script-to-uninstall-symantec-endpoint-protection
- https://community.broadcom.com/symantecenterprise/communities/community-home/digestviewer/viewthread?MessageKey=6ce94b67-74e1-4333-b16f-000b7fd874f0&CommunityKey=1ecf5f55-9545-44d6-b0f4-4e4a7f5f5e68&tab=digestviewer
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains|all:
    - taskkill
    - ' /F '
    - ' /IM '
    - ccSvcHst.exe
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 4a6713f6-3331-11ed-a261-0242ac120002
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_taskkill_sep.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
