id: sigmahq-sigma-88872991-7445-4a22-90b2-a3adadb0e827
name: Stop Windows Service Via Net.EXE
description: Detects the stopping of a Windows service via the "net" utility.
severity: low
enabled: false
tags:
  mitre:
  - T1489
  categories:
  - endpoint
references:
- https://ss64.com/nt/net-service.html
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - OriginalFileName:
    - net.exe
    - net1.exe
  - Image|endswith:
    - \net.exe
    - \net1.exe
  selection_cli:
    CommandLine|contains: ' stop '
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 88872991-7445-4a22-90b2-a3adadb0e827
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_net_stop_service.yml
falsepositives:
- There are many legitimate reasons to stop a service. This rule isn't looking for
  any suspicious behaviour in particular. Filter legitimate activity accordingly
notes:
  quarantine_reason: 'upstream status: test'
