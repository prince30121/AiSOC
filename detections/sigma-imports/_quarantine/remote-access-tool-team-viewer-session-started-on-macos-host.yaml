id: sigmahq-sigma-f459ccb4-9805-41ea-b5b2-55e279e2424a
name: Remote Access Tool - Team Viewer Session Started On MacOS Host
description: 'Detects the command line executed when TeamViewer starts a session started
  by a remote host.

  Once a connection has been started, an investigator can verify the connection details
  by viewing the "incoming_connections.txt" log file in the TeamViewer folder.'
severity: low
enabled: false
tags:
  mitre:
  - T1133
  categories:
  - endpoint
references:
- Internal Research
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    ParentImage|endswith: /TeamViewer_Service
    Image|endswith: /TeamViewer_Desktop
    CommandLine|endswith: /TeamViewer_Desktop --IPCport 5939 --Module 1
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: f459ccb4-9805-41ea-b5b2-55e279e2424a
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/macos/process_creation/proc_creation_macos_remote_access_tools_teamviewer_incoming_connection.yml
falsepositives:
- Legitimate usage of TeamViewer
notes:
  quarantine_reason: 'upstream status: test'
