id: sigmahq-sigma-f37aba28-a9e6-4045-882c-d5004043b337
name: Potential Arbitrary File Download Via Cmdl32.EXE
description: 'Detects execution of Cmdl32 with the "/vpn" and "/lan" flags.

  Attackers can abuse this utility in order to download arbitrary files via a configuration
  file.

  Inspect the location and the content of the file passed as an argument in order
  to determine if it is suspicious.'
severity: medium
enabled: false
tags:
  mitre:
  - T1218
  - T1202
  categories:
  - endpoint
references:
- https://lolbas-project.github.io/lolbas/Binaries/Cmdl32/
- https://twitter.com/SwiftOnSecurity/status/1455897435063074824
- https://github.com/LOLBAS-Project/LOLBAS/pull/151
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \cmdl32.exe
  - OriginalFileName: CMDL32.EXE
  selection_cli:
    CommandLine|contains|all:
    - /vpn
    - /lan
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: f37aba28-a9e6-4045-882c-d5004043b337
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_cmdl32_arbitrary_file_download.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
