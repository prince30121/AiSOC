id: sigmahq-sigma-9f0a8bf3-a65b-440a-8c1e-5cb1547c8e70
name: New DLL Registered Via Odbcconf.EXE
description: Detects execution of "odbcconf" with "REGSVR" in order to register a
  new DLL (equivalent to running regsvr32). Attackers abuse this to install and run
  malicious DLLs.
severity: medium
enabled: false
tags:
  mitre:
  - T1218.008
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/sql/odbc/odbcconf-exe?view=sql-server-ver16
- https://lolbas-project.github.io/lolbas/Binaries/Odbcconf/
- https://redcanary.com/blog/raspberry-robin/
- https://web.archive.org/web/20191023232753/https://twitter.com/Hexacorn/status/1187143326673330176
- https://www.hexacorn.com/blog/2020/08/23/odbcconf-lolbin-trifecta/
- https://www.trendmicro.com/en_us/research/17/h/backdoor-carrying-emails-set-sights-on-russian-speaking-businesses.html
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \odbcconf.exe
  - OriginalFileName: odbcconf.exe
  selection_cli:
    CommandLine|contains|all:
    - 'REGSVR '
    - .dll
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 9f0a8bf3-a65b-440a-8c1e-5cb1547c8e70
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_odbcconf_register_dll_regsvr.yml
falsepositives:
- Legitimate DLLs being registered via "odbcconf" will generate false positives. Investigate
  the path of the DLL and its content to determine if the action is authorized.
notes:
  quarantine_reason: 'upstream status: test'
