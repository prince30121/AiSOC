id: sigmahq-sigma-51cbac1e-eee3-4a90-b1b7-358efb81fa0a
name: Potential Windows Defender Tampering Via Wmic.EXE
description: Detects potential tampering with Windows Defender settings such as adding
  exclusion using wmic
severity: high
enabled: false
tags:
  mitre:
  - T1047
  - T1685
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/5c1e6f1b4fafd01c8d1ece85f510160fc1275fbf/atomics/T1562.001/T1562.001.md
- https://www.bleepingcomputer.com/news/security/gootkit-malware-bypasses-windows-defender-by-setting-path-exclusions/
- https://www.bleepingcomputer.com/news/security/iobit-forums-hacked-to-spread-ransomware-to-its-members/
logsource:
  product: windows
  category: process_creation
detection:
  selection_img:
  - OriginalFileName: wmic.exe
  - Image|endswith: \WMIC.exe
  selection_cli:
    CommandLine|contains: /Namespace:\\\\root\\Microsoft\\Windows\\Defender
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 51cbac1e-eee3-4a90-b1b7-358efb81fa0a
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_wmic_namespace_defender.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
