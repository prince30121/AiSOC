id: sigmahq-sigma-2158f96f-43c2-43cb-952a-ab4580f32382
name: Screen Capture Activity Via Psr.EXE
description: Detects execution of Windows Problem Steps Recorder (psr.exe), a utility
  used to record the user screen and clicks.
severity: medium
enabled: false
tags:
  mitre:
  - T1113
  categories:
  - endpoint
references:
- https://lolbas-project.github.io/lolbas/Binaries/Psr/
- https://web.archive.org/web/20200229201156/https://www.sans.org/cyber-security-summit/archives/file/summit-archive-1493861893.pdf
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1560.001/T1560.001.md
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: \Psr.exe
    CommandLine|contains:
    - /start
    - -start
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 2158f96f-43c2-43cb-952a-ab4580f32382
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_psr_capture_screenshots.yml
falsepositives:
- Unknown
