id: sigmahq-sigma-965e2db9-eddb-4cf6-a986-7a967df651e4
name: Potential Keylogger Activity
description: Detects PowerShell scripts that contains reference to keystroke capturing
  functions
severity: medium
enabled: false
tags:
  mitre:
  - T1056.001
  categories:
  - endpoint
references:
- https://twitter.com/ScumBots/status/1610626724257046529
- https://www.virustotal.com/gui/file/d4486b63512755316625230e0c9c81655093be93876e0d80732e7eeaf7d83476/content
- https://www.virustotal.com/gui/file/720a7ee9f2178c70501d7e3f4bcc28a4f456e200486dbd401b25af6da3b4da62/content
- https://learn.microsoft.com/en-us/dotnet/api/system.windows.input.keyboard.iskeydown?view=windowsdesktop-7.0
logsource:
  product: windows
  category: ps_script
  definition: 'Requirements: Script Block Logging must be enabled'
detection:
  selection:
    ScriptBlockText|contains: '[Windows.Input.Keyboard]::IsKeyDown([System.Windows.Input.Key]::'
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 965e2db9-eddb-4cf6-a986-7a967df651e4
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/powershell/powershell_script/posh_ps_susp_keylogger_activity.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
