id: sigmahq-sigma-34979410-e4b5-4e5d-8cfb-389fdff05c12
name: Remove Immutable File Attribute
description: Detects usage of the 'chattr' utility to remove immutable file attribute.
severity: medium
enabled: false
tags:
  mitre:
  - T1222.002
  categories:
  - endpoint
references:
- https://www.trendmicro.com/en_us/research/22/i/how-malicious-actors-abuse-native-linux-tools-in-their-attacks.html
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    Image|endswith: /chattr
    CommandLine|contains: ' -i '
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 34979410-e4b5-4e5d-8cfb-389fdff05c12
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/linux/process_creation/proc_creation_lnx_chattr_immutable_removal.yml
falsepositives:
- Administrator interacting with immutable files (e.g. for instance backups).
notes:
  quarantine_reason: 'upstream status: test'
