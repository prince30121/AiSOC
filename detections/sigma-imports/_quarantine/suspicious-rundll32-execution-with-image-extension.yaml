id: sigmahq-sigma-4aa6040b-3f28-44e3-a769-9208e5feb5ec
name: Suspicious Rundll32 Execution With Image Extension
description: Detects the execution of Rundll32.exe with DLL files masquerading as
  image files
severity: high
enabled: false
tags:
  mitre:
  - T1218.011
  categories:
  - endpoint
references:
- https://www.zscaler.com/blogs/security-research/onenote-growing-threat-malware-distribution
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \rundll32.exe
  - OriginalFileName: RUNDLL32.exe
  selection_cli:
    CommandLine|contains:
    - .bmp
    - .cr2
    - .eps
    - .gif
    - .ico
    - .jpeg
    - .jpg
    - .nef
    - .orf
    - .png
    - .raw
    - .sr2
    - .tif
    - .tiff
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 4aa6040b-3f28-44e3-a769-9208e5feb5ec
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_rundll32_susp_execution_with_image_extension.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
