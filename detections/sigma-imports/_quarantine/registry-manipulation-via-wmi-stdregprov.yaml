id: sigmahq-sigma-c453ab7a-1f5c-4716-a3b4-dea8135fb43a
name: Registry Manipulation via WMI Stdregprov
description: 'Detects the usage of wmic.exe to manipulate Windows registry via the
  WMI StdRegProv class.

  This behaviour could be potentially suspicious because it uses an alternative method
  to modify registry keys instead of legitimate registry tools like reg.exe or regedit.exe.

  Attackers specifically choose this technique to evade detection and bypass security
  monitoring focused on traditional registry modification commands.'
severity: medium
enabled: false
tags:
  mitre:
  - T1047
  - T1112
  - T1012
  categories:
  - endpoint
references:
- https://www.bitdefender.com/en-us/blog/businessinsights/shrinklocker-decryptor-from-friend-to-foe-and-back-again
- https://trustedsec.com/blog/command-line-underdog-wmic-in-action
- https://trustedsec.com/blog/wmi-for-script-kiddies
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \wmic.exe
  - OriginalFileName: wmic.exe
  selection_cli:
    CommandLine|contains|all:
    - call
    - stdregprov
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: c453ab7a-1f5c-4716-a3b4-dea8135fb43a
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_wmic_stdregprov_reg_modification.yml
falsepositives:
- Legitimate administrative activity
notes:
  quarantine_reason: 'upstream status: experimental'
