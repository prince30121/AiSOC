id: sigmahq-sigma-a0edd39f-a0c6-4c17-8141-261f958e8d8f
name: PowerShell Remote Session Creation
description: 'Adversaries may abuse PowerShell commands and scripts for execution.

  PowerShell is a powerful interactive command-line interface and scripting environment
  included in the Windows operating system'
severity: medium
enabled: false
tags:
  mitre:
  - T1059.001
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1059.001/T1059.001.md#atomic-test-10---powershell-invoke-downloadcradle
- https://learn.microsoft.com/en-us/powershell/module/microsoft.powershell.core/new-pssession?view=powershell-7.4
logsource:
  product: windows
  category: ps_script
  definition: 'Requirements: Script Block Logging must be enabled'
detection:
  selection:
    ScriptBlockText|contains|all:
    - New-PSSession
    - '-ComputerName '
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: a0edd39f-a0c6-4c17-8141-261f958e8d8f
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/powershell/powershell_script/posh_ps_remote_session_creation.yml
falsepositives:
- Legitimate administrative script
notes:
