id: sigmahq-sigma-7ee0b4aa-d8d4-4088-b661-20efdf41a04c
name: Azure Kubernetes Secret or Config Object Access
description: Identifies when a Kubernetes account access a sensitive objects such
  as configmaps or secrets.
severity: medium
enabled: false
tags:
  mitre:
  - T1485
  - T1496
  - T1489
  categories:
  - cloud
references:
- https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations#microsoftkubernetes
- https://www.microsoft.com/security/blog/2021/03/23/secure-containerized-environments-with-updated-threat-matrix-for-kubernetes/
- https://www.microsoft.com/security/blog/2020/04/02/attack-matrix-kubernetes/
- https://medium.com/mitre-engenuity/att-ck-for-containers-now-available-4c2359654bf1
logsource:
  product: azure
  service: activitylogs
detection:
  selection:
    operationName:
    - MICROSOFT.KUBERNETES/CONNECTEDCLUSTERS/CONFIGMAPS/WRITE
    - MICROSOFT.KUBERNETES/CONNECTEDCLUSTERS/CONFIGMAPS/DELETE
    - MICROSOFT.KUBERNETES/CONNECTEDCLUSTERS/SECRETS/WRITE
    - MICROSOFT.KUBERNETES/CONNECTEDCLUSTERS/SECRETS/DELETE
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 7ee0b4aa-d8d4-4088-b661-20efdf41a04c
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/cloud/azure/activity_logs/azure_kubernetes_secret_or_config_object_access.yml
falsepositives:
- Sensitive objects may be accessed by a system administrator. Verify whether the
  user identity, user agent, and/or hostname should be making changes in your environment.
  Sensitive objects accessed from unfamiliar users should be investigated. If known
  behavior is causing false positives, it can be exempted from the rule.
notes:
  quarantine_reason: 'upstream status: test'
