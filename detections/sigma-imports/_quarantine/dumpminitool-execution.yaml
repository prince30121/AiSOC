id: sigmahq-sigma-dee0a7a3-f200-4112-a99b-952196d81e42
name: DumpMinitool Execution
description: Detects the use of "DumpMinitool.exe" a tool that allows the dump of
  process memory via the use of the "MiniDumpWriteDump"
severity: medium
enabled: false
tags:
  mitre:
  - T1036
  - T1003.001
  categories:
  - endpoint
references:
- https://twitter.com/mrd0x/status/1511415432888131586
- https://twitter.com/mrd0x/status/1511489821247684615
- https://lolbas-project.github.io/lolbas/OtherMSBinaries/DumpMinitool/
- https://gist.github.com/nasbench/6d58c3c125e2fa1b8f7a09754c1b087f
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith:
    - \DumpMinitool.exe
    - \DumpMinitool.x86.exe
    - \DumpMinitool.arm64.exe
  - OriginalFileName:
    - DumpMinitool.exe
    - DumpMinitool.x86.exe
    - DumpMinitool.arm64.exe
  selection_cli:
    CommandLine|contains:
    - ' Full'
    - ' Mini'
    - ' WithHeap'
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: dee0a7a3-f200-4112-a99b-952196d81e42
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_dumpminitool_execution.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
