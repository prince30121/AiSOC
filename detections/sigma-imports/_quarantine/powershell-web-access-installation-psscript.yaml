id: sigmahq-sigma-5f9c7f1a-7c21-4c39-b2f3-8d8006e0e51f
name: PowerShell Web Access Installation - PsScript
description: Detects the installation and configuration of PowerShell Web Access,
  which could be used for remote access and potential abuse
severity: high
enabled: false
tags:
  mitre:
  - T1059.001
  categories:
  - endpoint
references:
- https://docs.microsoft.com/en-us/powershell/module/powershellwebaccess/install-pswawebapplication
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa24-241a
- https://gist.github.com/MHaggis/7e67b659af9148fa593cf2402edebb41
logsource:
  product: windows
  category: ps_script
  definition: 'Requirements: Script Block Logging must be enabled'
detection:
  selection_install:
    ScriptBlockText|contains: Install-WindowsFeature WindowsPowerShellWebAccess
  selection_config:
    ScriptBlockText|contains: Install-PswaWebApplication
  selection_auth:
    ScriptBlockText|contains|all:
    - Add-PswaAuthorizationRule
    - -UserName *
    - -ComputerName *
  condition: 1 of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 5f9c7f1a-7c21-4c39-b2f3-8d8006e0e51f
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/powershell/powershell_script/posh_ps_powershell_web_access_installation.yml
falsepositives:
- Legitimate PowerShell Web Access installations by administrators
notes:
  quarantine_reason: 'upstream status: test'
