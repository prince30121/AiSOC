id: sigmahq-sigma-bac9fb54-2da7-44e9-988f-11e9a5edbc0c
name: Potential Password Spraying Attempt Using Dsacls.EXE
description: Detects possible password spraying attempts using Dsacls
severity: medium
enabled: false
tags:
  mitre:
  - T1218
  categories:
  - endpoint
references:
- https://www.ired.team/offensive-security-experiments/active-directory-kerberos-abuse/using-dsacls-to-check-ad-object-permissions#password-spraying-anyone
- https://ss64.com/nt/dsacls.html
- https://learn.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2012-r2-and-2012/cc771151(v=ws.11)
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \dsacls.exe
  - OriginalFileName: DSACLS.EXE
  selection_cli:
    CommandLine|contains|all:
    - '/user:'
    - '/passwd:'
  condition: all of selection*
provenance:
  source: SigmaHQ/sigma
  source_id: bac9fb54-2da7-44e9-988f-11e9a5edbc0c
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_dsacls_password_spray.yml
falsepositives:
- Legitimate use of dsacls to bind to an LDAP session
notes:
  quarantine_reason: 'upstream status: test'
