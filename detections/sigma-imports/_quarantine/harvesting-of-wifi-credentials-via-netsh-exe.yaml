id: sigmahq-sigma-42b1a5b8-353f-4f10-b256-39de4467faff
name: Harvesting Of Wifi Credentials Via Netsh.EXE
description: Detect the harvesting of wifi credentials using netsh.exe
severity: medium
enabled: false
tags:
  mitre:
  - T1040
  categories:
  - endpoint
references:
- https://blog.malwarebytes.com/threat-analysis/2020/04/new-agenttesla-variant-steals-wifi-credentials/
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \netsh.exe
  - OriginalFileName: netsh.exe
  selection_cli:
    CommandLine|contains|all:
    - wlan
    - ' s'
    - ' p'
    - ' k'
    - =clear
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 42b1a5b8-353f-4f10-b256-39de4467faff
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_netsh_wifi_credential_harvesting.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
