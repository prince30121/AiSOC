id: sigmahq-sigma-c86500e9-a645-4680-98d7-f882c70c1ea3
name: AADInternals PowerShell Cmdlets Execution - ProccessCreation
description: Detects ADDInternals Cmdlet execution. A tool for administering Azure
  AD and Office 365. Which can be abused by threat actors to attack Azure AD or Office
  365.
severity: high
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references:
- https://o365blog.com/aadinternals/
- https://github.com/Gerenios/AADInternals
logsource:
  product: windows
  category: process_creation
detection:
  selection_img:
  - Image|endswith:
    - \powershell.exe
    - \powershell_ise.exe
    - \pwsh.exe
  - OriginalFileName:
    - PowerShell.Exe
    - pwsh.dll
  selection_cli:
    CommandLine|contains:
    - Add-AADInt
    - ConvertTo-AADInt
    - Disable-AADInt
    - Enable-AADInt
    - Export-AADInt
    - Find-AADInt
    - Get-AADInt
    - Grant-AADInt
    - Initialize-AADInt
    - Install-AADInt
    - Invoke-AADInt
    - Join-AADInt
    - New-AADInt
    - Open-AADInt
    - Read-AADInt
    - Register-AADInt
    - Remove-AADInt
    - Reset-AADInt
    - Resolve-AADInt
    - Restore-AADInt
    - Save-AADInt
    - Search-AADInt
    - Send-AADInt
    - Set-AADInt
    - Start-AADInt
    - Unprotect-AADInt
    - Update-AADInt
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: c86500e9-a645-4680-98d7-f882c70c1ea3
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_powershell_aadinternals_cmdlets_execution.yml
falsepositives:
- Legitimate use of the library for administrative activity
notes:
  quarantine_reason: 'upstream status: test'
