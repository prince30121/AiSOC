id: sigmahq-sigma-575dce0c-8139-4e30-9295-1ee75969f7fe
name: Potential Reconnaissance Activity Via GatherNetworkInfo.VBS
description: Detects execution of the built-in script located in "C:\Windows\System32\gatherNetworkInfo.vbs".
  Which can be used to gather information about the target machine
severity: medium
enabled: false
tags:
  mitre:
  - T1615
  - T1059.005
  categories:
  - endpoint
references:
- https://posts.slayerlabs.com/living-off-the-land/#gathernetworkinfovbs
- https://www.mandiant.com/resources/blog/trojanized-windows-installers-ukrainian-government
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith:
    - \cscript.exe
    - \wscript.exe
  - OriginalFileName:
    - cscript.exe
    - wscript.exe
  selection_cli:
    CommandLine|contains: gatherNetworkInfo.vbs
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 575dce0c-8139-4e30-9295-1ee75969f7fe
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_lolbin_gather_network_info.yml
falsepositives:
- Administrative activity
notes:
  quarantine_reason: 'upstream status: test'
