id: sigmahq-sigma-7e8f2d3b-9c1a-4f67-b9e8-8d9006e0e51f
name: PowerShell Web Access Feature Enabled Via DISM
description: Detects the use of DISM to enable the PowerShell Web Access feature,
  which could be used for remote access and potential abuse
severity: high
enabled: false
tags:
  mitre:
  - T1548.002
  categories:
  - endpoint
references:
- https://docs.microsoft.com/en-us/powershell/module/dism/enable-windowsoptionalfeature
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa24-241a
- https://gist.github.com/MHaggis/7e67b659af9148fa593cf2402edebb41
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \dism.exe
  - OriginalFileName: DISM.EXE
  selection_cli:
    CommandLine|contains|all:
    - WindowsPowerShellWebAccess
    - /online
    - /enable-feature
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 7e8f2d3b-9c1a-4f67-b9e8-8d9006e0e51f
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_dism_enable_powershell_web_access_feature.yml
falsepositives:
- Legitimate PowerShell Web Access installations by administrators
notes:
  quarantine_reason: 'upstream status: test'
