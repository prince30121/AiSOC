id: sigmahq-sigma-9e4b7d3a-6f2c-4e9a-8d1b-3c5e7a9f2b4d
name: Potentially Suspicious File Creation by OpenEDR's ITSMService
description: 'Detects the creation of potentially suspicious files by OpenEDR''s ITSMService
  process.

  The ITSMService is responsible for remote management operations and can create files
  on the system through the Process Explorer or file management features.

  While legitimate for IT operations, creation of executable or script files could
  indicate unauthorized file uploads, data staging, or malicious file deployment.'
severity: medium
enabled: false
tags:
  mitre:
  - T1105
  - T1570
  - T1219
  categories:
  - endpoint
references:
- https://kostas-ts.medium.com/detecting-abuse-of-openedrs-permissive-edr-trial-a-security-researcher-s-perspective-fc55bf53972c
logsource:
  product: windows
  category: file_event
detection:
  selection_process:
    Image|endswith: \COMODO\Endpoint Manager\ITSMService.exe
  selection_suspicious_extensions:
    TargetFilename|endswith:
    - .7z
    - .bat
    - .cmd
    - .com
    - .dll
    - .exe
    - .hta
    - .js
    - .pif
    - .ps1
    - .rar
    - .scr
    - .vbe
    - .vbs
    - .zip
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 9e4b7d3a-6f2c-4e9a-8d1b-3c5e7a9f2b4d
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/file/file_event/file_event_win_comodo_itsm_potentially_suspicious_file_creation.yml
falsepositives:
- Legitimate OpenEDR file management operations
- Authorized remote file uploads by IT administrators
- Software deployment through OpenEDR console
notes:
  quarantine_reason: 'upstream status: experimental'
