id: sigmahq-sigma-9069ea3c-b213-4c52-be13-86506a227ab1
name: Linux Crypto Mining Indicators
description: Detects command line parameters or strings often used by crypto miners
severity: high
enabled: false
tags:
  mitre:
  - T1496
  categories:
  - endpoint
references:
- https://www.poolwatch.io/coin/monero
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    CommandLine|contains:
    - ' --cpu-priority='
    - --donate-level=0
    - ' -o pool.'
    - ' --nicehash'
    - ' --algo=rx/0 '
    - stratum+tcp://
    - stratum+udp://
    - sh -c /sbin/modprobe msr allow_writes=on
    - LS1kb25hdGUtbGV2ZWw9
    - 0tZG9uYXRlLWxldmVsP
    - tLWRvbmF0ZS1sZXZlbD
    - c3RyYXR1bSt0Y3A6Ly
    - N0cmF0dW0rdGNwOi8v
    - zdHJhdHVtK3RjcDovL
    - c3RyYXR1bSt1ZHA6Ly
    - N0cmF0dW0rdWRwOi8v
    - zdHJhdHVtK3VkcDovL
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 9069ea3c-b213-4c52-be13-86506a227ab1
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/linux/process_creation/proc_creation_lnx_crypto_mining.yml
falsepositives:
- Legitimate use of crypto miners
notes:
  quarantine_reason: 'upstream status: test'
