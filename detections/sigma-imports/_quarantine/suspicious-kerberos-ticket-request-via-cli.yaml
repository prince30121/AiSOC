id: sigmahq-sigma-caa9a802-8bd8-4b9e-a5cd-4d6221670219
name: Suspicious Kerberos Ticket Request via CLI
description: 'Detects suspicious Kerberos ticket requests via command line using System.IdentityModel.Tokens.KerberosRequestorSecurityToken
  class.

  Threat actors may use command line interfaces to request Kerberos tickets for service
  accounts in order to

  perform offline password cracking attacks commonly known as Kerberoasting or other
  Kerberos ticket abuse

  techniques like silver ticket attacks.'
severity: high
enabled: false
tags:
  mitre:
  - T1558.003
  categories:
  - endpoint
references:
- https://www.huntress.com/blog/gootloader-threat-detection-woff2-obfuscation
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1558.003/T1558.003.md#atomic-test-4---request-a-single-ticket-via-powershell
- https://learn.microsoft.com/en-us/dotnet/api/system.identitymodel.tokens.kerberosrequestorsecuritytoken?view=netframework-4.8.1
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith:
    - \powershell.exe
    - \pwsh.exe
  - OriginalFileName:
    - powershell.exe
    - pwsh.dll
  selection_cli:
    CommandLine|contains|all:
    - System.IdentityModel.Tokens.KerberosRequestorSecurityToken
    - .GetRequest()
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: caa9a802-8bd8-4b9e-a5cd-4d6221670219
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_powershell_kerberos_kerberos_ticket_request_via_cli.yml
falsepositives:
- Legitimate command line usage by administrators or security tools.
notes:
  quarantine_reason: 'upstream status: experimental'
