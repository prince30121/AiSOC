id: sigmahq-sigma-e34cfa0c-0a50-4210-9cb3-5632d08eb041
name: Potential GobRAT File Discovery Via Grep
description: Detects the use of grep to discover specific files created by the GobRAT
  malware
severity: high
enabled: false
tags:
  mitre:
  - T1082
  categories:
  - endpoint
references:
- https://blogs.jpcert.or.jp/en/2023/05/gobrat.html
- https://www.virustotal.com/gui/file/60bcd645450e4c846238cf0e7226dc40c84c96eba99f6b2cffcd0ab4a391c8b3/detection
- https://www.virustotal.com/gui/file/3e44c807a25a56f4068b5b8186eee5002eed6f26d665a8b791c472ad154585d1/detection
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    Image|endswith: /grep
    CommandLine|contains:
    - apached
    - frpc
    - sshd.sh
    - zone.arm
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: e34cfa0c-0a50-4210-9cb3-5632d08eb041
  source_commit: df5c6a6
