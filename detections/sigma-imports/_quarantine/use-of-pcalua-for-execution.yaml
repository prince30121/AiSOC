id: sigmahq-sigma-0955e4e1-c281-4fb9-9ee1-5ee7b4b754d2
name: Use of Pcalua For Execution
description: Detects execition of commands and binaries from the context of The program
  compatibility assistant (Pcalua.exe). This can be used as a LOLBIN in order to bypass
  application whitelisting.
severity: medium
enabled: false
tags:
  mitre:
  - T1059
  categories:
  - endpoint
references:
- https://lolbas-project.github.io/lolbas/Binaries/Pcalua/
- https://pentestlab.blog/2020/07/06/indirect-command-execution/
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: \pcalua.exe
    CommandLine|contains: ' -a'
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 0955e4e1-c281-4fb9-9ee1-5ee7b4b754d2
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_lolbin_pcalua.yml
falsepositives:
- Legitimate use by a via a batch script or by an administrator.
notes:
  quarantine_reason: 'upstream status: test'
