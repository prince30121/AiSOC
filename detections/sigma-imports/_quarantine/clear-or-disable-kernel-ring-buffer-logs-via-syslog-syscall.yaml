id: sigmahq-sigma-eca5e022-d368-4043-98e5-9736fb01f72f
name: Clear or Disable Kernel Ring Buffer Logs via Syslog Syscall
description: 'Detects the use of the `syslog` syscall with action code 5 (SYSLOG_ACTION_CLEAR),

  (4 is SYSLOG_ACTION_READ_CLEAR and 6 is SYSLOG_ACTION_CONSOLE_OFF) which clears
  the kernel

  ring buffer (dmesg logs). This can be used by attackers to hide traces after exploitation

  or privilege escalation. A common technique is running `dmesg -c`, which triggers
  this syscall internally.'
severity: medium
enabled: false
tags:
  mitre:
  - T1685.006
  categories:
  - endpoint
references:
- https://man7.org/linux/man-pages/man2/syslog.2.html
- https://man7.org/linux/man-pages/man1/dmesg.1.html
logsource:
  product: linux
  service: auditd
  definition: 'Required auditd configuration:

    -a always,exit -F arch=b64 -S syslog -F a0=4 -k clear_dmesg_logs

    -a always,exit -F arch=b64 -S syslog -F a0=5 -k clear_dmesg_logs

    -a always,exit -F arch=b64 -S syslog -F a0=6 -k disable_dmesg_logs

    -a always,exit -F arch=b32 -S syslog -F a0=4 -k clear_dmesg_logs

    -a always,exit -F arch=b32 -S syslog -F a0=5 -k clear_dmesg_logs

    -a always,exit -F arch=b32 -S syslog -F a0=6 -k disable_dmesg_logs

    '
detection:
  selection:
    type: SYSCALL
    SYSCALL: syslog
    a0:
    - 4
    - 5
    - 6
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: eca5e022-d368-4043-98e5-9736fb01f72f
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/linux/auditd/syscall/lnx_auditd_clean_disable_dmesg_logs_via_syslog.yml
falsepositives:
- System administrators or scripts that intentionally clear logs
- Debugging scripts
notes:
  quarantine_reason: 'upstream status: experimental'
