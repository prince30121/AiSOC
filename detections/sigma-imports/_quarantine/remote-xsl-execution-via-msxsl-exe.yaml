id: sigmahq-sigma-75d0a94e-6252-448d-a7be-d953dff527bb
name: Remote XSL Execution Via Msxsl.EXE
description: Detects the execution of the "msxsl" binary with an "http" keyword in
  the command line. This might indicate a potential remote execution of XSL files.
severity: high
enabled: false
tags:
  mitre:
  - T1220
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1220/T1220.md
- https://lolbas-project.github.io/lolbas/OtherMSBinaries/Msxsl/
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: \msxsl.exe
    CommandLine|contains: http
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 75d0a94e-6252-448d-a7be-d953dff527bb
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_msxsl_remote_execution.yml
falsepositives:
- Msxsl is not installed by default and is deprecated, so unlikely on most systems.
notes:
  quarantine_reason: 'upstream status: test'
