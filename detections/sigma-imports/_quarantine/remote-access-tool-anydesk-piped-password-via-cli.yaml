id: sigmahq-sigma-b1377339-fda6-477a-b455-ac0923f9ec2c
name: Remote Access Tool - AnyDesk Piped Password Via CLI
description: Detects piping the password to an anydesk instance via CMD and the '--set-password'
  flag.
severity: medium
enabled: false
tags:
  mitre:
  - T1219.002
  categories:
  - endpoint
references:
- https://redcanary.com/blog/misbehaving-rats/
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains|all:
    - '/c '
    - 'echo '
    - .exe --set-password
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: b1377339-fda6-477a-b455-ac0923f9ec2c
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_remote_access_tools_anydesk_piped_password_via_cli.yml
falsepositives:
- Legitimate piping of the password to anydesk
- Some FP could occur with similar tools that uses the same command line '--set-password'
notes:
  quarantine_reason: 'upstream status: test'
