id: sigmahq-sigma-43fa5350-db63-4b8f-9a01-789a427074e1
name: Potential Obfuscated Ordinal Call Via Rundll32
description: Detects execution of "rundll32" with potential obfuscated ordinal calls
severity: medium
enabled: false
tags:
  mitre:
  - T1027.010
  categories:
  - endpoint
references:
- Internal Research
- https://www.youtube.com/watch?v=52tAmVLg1KM&t=2070s
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \rundll32.exe
  - OriginalFileName: RUNDLL32.EXE
  - CommandLine|contains: rundll32
  selection_cli:
    CommandLine|contains:
    - '#+'
    - '#-'
    - '#0'
    - '#655'
    - '#656'
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 43fa5350-db63-4b8f-9a01-789a427074e1
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_rundll32_obfuscated_ordinal_call.yml
falsepositives:
- Unknown
notes:
