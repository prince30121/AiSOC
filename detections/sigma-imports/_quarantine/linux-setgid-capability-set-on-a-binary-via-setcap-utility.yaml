id: sigmahq-sigma-3a716279-c18c-4488-83be-f9ececbfb9fc
name: Linux Setgid Capability Set on a Binary via Setcap Utility
description: 'Detects the use of the ''setcap'' utility to set the ''setgid'' capability
  (cap_setgid) on a binary file.

  This capability allows a non privileged process to make arbitrary manipulations
  of group IDs (GIDs), including setting its current GID to a value that would otherwise
  be restricted (i.e. GID 0, the root group).

  This behavior can be used by adversaries to backdoor a binary in order to escalate
  privileges again in the future if needed.'
severity: low
enabled: false
tags:
  mitre:
  - T1548
  - T1554
  categories:
  - endpoint
references:
- https://man7.org/linux/man-pages/man8/setcap.8.html
- https://dfir.ch/posts/linux_capabilities/
- https://juggernaut-sec.com/capabilities/#cap_setgid
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    Image|endswith: /setcap
    CommandLine|contains: cap_setgid
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 3a716279-c18c-4488-83be-f9ececbfb9fc
  source_commit: df5c6a6
