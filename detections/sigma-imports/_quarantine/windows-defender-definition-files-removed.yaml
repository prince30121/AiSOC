id: sigmahq-sigma-9719a8aa-401c-41af-8108-ced7ec9cd75c
name: Windows Defender Definition Files Removed
description: Adversaries may disable security tools to avoid possible detection of
  their tools and activities by removing Windows Defender Definition Files
severity: high
enabled: false
tags:
  mitre:
  - T1685
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1562.001/T1562.001.md
- https://unit42.paloaltonetworks.com/unit42-gorgon-group-slithering-nation-state-cybercrime/
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \MpCmdRun.exe
  - OriginalFileName: MpCmdRun.exe
  selection_cli:
    CommandLine|contains|all:
    - ' -RemoveDefinitions'
    - ' -All'
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 9719a8aa-401c-41af-8108-ced7ec9cd75c
  source_commit: df5c6a6
  license: DRL-1.1
