id: sigmahq-sigma-f62176f3-8128-4faa-bf6c-83261322e5eb
name: Malicious PowerShell Keywords
description: Detects keywords from well-known PowerShell exploitation frameworks
severity: medium
enabled: false
tags:
  mitre:
  - T1059.001
  categories:
  - endpoint
references:
- https://adsecurity.org/?p=2921
logsource:
  product: windows
  category: ps_script
  definition: 'Requirements: Script Block Logging must be enabled'
detection:
  selection:
    ScriptBlockText|contains:
    - AdjustTokenPrivileges
    - IMAGE_NT_OPTIONAL_HDR64_MAGIC
    - Metasploit
    - Microsoft.Win32.UnsafeNativeMethods
    - Mimikatz
    - MiniDumpWriteDump
    - PAGE_EXECUTE_READ
    - ReadProcessMemory.Invoke
    - SE_PRIVILEGE_ENABLED
    - SECURITY_DELEGATION
    - TOKEN_ADJUST_PRIVILEGES
    - TOKEN_ALL_ACCESS
    - TOKEN_ASSIGN_PRIMARY
    - TOKEN_DUPLICATE
    - TOKEN_ELEVATION
    - TOKEN_IMPERSONATE
    - TOKEN_INFORMATION_CLASS
    - TOKEN_PRIVILEGES
    - TOKEN_QUERY
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: f62176f3-8128-4faa-bf6c-83261322e5eb
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/powershell/powershell_script/posh_ps_malicious_keywords.yml
falsepositives:
- Depending on the scripts, this rule might require some initial tuning to fit the
  environment
notes:
  quarantine_reason: 'upstream status: test'
