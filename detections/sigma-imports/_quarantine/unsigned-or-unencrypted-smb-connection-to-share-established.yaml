id: sigmahq-sigma-8d91f6e4-9f3b-4c21-ae41-2c5b7d9f7a12
name: Unsigned or Unencrypted SMB Connection to Share Established
description: 'Detects SMB server connections to shares without signing or encryption
  enabled.

  This could indicate potential lateral movement activity using unsecured SMB shares.'
severity: medium
enabled: false
tags:
  mitre:
  - T1021.002
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/troubleshoot/windows-server/networking/overview-server-message-block-signing
logsource:
  product: windows
  service: smbserver-connectivity
detection:
  selection_shares:
    EventID: 4000
    ShareName|contains:
    - IPC$
    - ADMIN$
    - C$
  selection_status:
  - SigningUsed: 'false'
  - EncyptionUsed: 'false'
  filter_main_local_ips:
  - ClientAddress|cidr:
    - 127.0.0.0/8
    - 169.254.0.0/16
    - ::1/128
    - fe80::/10
    - fc00::/7
  - ClientAddress|contains:
    - '00000000000000000000000000000001'
    - FE80000000000000
    - FC00000000000000
    - 0200????7F
    - 0200????A9FE
  condition: all of selection_* and not 1 of filter_main_*
provenance:
  source: SigmaHQ/sigma
  source_id: 8d91f6e4-9f3b-4c21-ae41-2c5b7d9f7a12
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/builtin/smbserver/connectivity/win_smbserver_connectivity_unsigned_and_unencrypted_share_connection.yml
falsepositives:
- Connections from local or private IP addresses to SMB shares without signing or
  encryption enabled for older systems or misconfigured environments. Apply additional
  tuning as needed.
notes:
  quarantine_reason: 'upstream status: experimental'
