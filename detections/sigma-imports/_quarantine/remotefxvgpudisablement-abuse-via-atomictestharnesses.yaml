id: sigmahq-sigma-a6fc3c46-23b8-4996-9ea2-573f4c4d88c5
name: RemoteFXvGPUDisablement Abuse Via AtomicTestHarnesses
description: Detects calls to the AtomicTestHarnesses "Invoke-ATHRemoteFXvGPUDisablementCommand"
  which is designed to abuse the "RemoteFXvGPUDisablement.exe" binary to run custom
  PowerShell code via module load-order hijacking.
severity: high
enabled: false
tags:
  mitre:
  - T1218
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1218/T1218.md
- https://github.com/redcanaryco/AtomicTestHarnesses/blob/7e1e4da116801e3d6fcc6bedb207064577e40572/TestHarnesses/T1218_SignedBinaryProxyExecution/InvokeRemoteFXvGPUDisablementCommand.ps1
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains:
    - Invoke-ATHRemoteFXvGPUDisablementCommand
    - Invoke-ATHRemoteFXvGPUDisableme
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: a6fc3c46-23b8-4996-9ea2-573f4c4d88c5
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_powershell_remotefxvgpudisablement_abuse.yml
falsepositives:
- Unknown
notes:
