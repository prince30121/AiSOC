id: sigmahq-sigma-fabfb3a7-3ce1-4445-9c7c-3c27f1051cdd
name: Potential ReflectDebugger Content Execution Via WerFault.EXE
description: Detects execution of "WerFault.exe" with the "-pr" commandline flag that
  is used to run files stored in the ReflectDebugger key which could be used to store
  the path to the malware in order to masquerade the execution flow
severity: medium
enabled: false
tags:
  mitre:
  - T1036
  categories:
  - endpoint
references:
- https://cocomelonc.github.io/malware/2022/11/02/malware-pers-18.html
- https://www.hexacorn.com/blog/2018/08/31/beyond-good-ol-run-key-part-85/
logsource:
  product: windows
  category: process_creation
detection:
  selection_img:
  - Image|endswith: \WerFault.exe
  - OriginalFileName: WerFault.exe
  selection_cli:
    CommandLine|contains: ' -pr '
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: fabfb3a7-3ce1-4445-9c7c-3c27f1051cdd
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_werfault_reflect_debugger_exec.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
