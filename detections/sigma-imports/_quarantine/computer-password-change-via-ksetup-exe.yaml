id: sigmahq-sigma-de16d92c-c446-4d53-8938-10aeef41c8b6
name: Computer Password Change Via Ksetup.EXE
description: Detects password change for the computer's domain account or host principal
  via "ksetup.exe"
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references:
- https://twitter.com/Oddvarmoe/status/1641712700605513729
- https://learn.microsoft.com/en-gb/windows-server/administration/windows-commands/ksetup
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \ksetup.exe
  - OriginalFileName: ksetup.exe
  selection_cli:
    CommandLine|contains: ' /setcomputerpassword '
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: de16d92c-c446-4d53-8938-10aeef41c8b6
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_ksetup_password_change_computer.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
