id: sigmahq-sigma-515c8be5-e5df-4c5e-8f6d-a4a2f05e4b48
name: CreateDump Process Dump
description: Detects uses of the createdump.exe LOLOBIN utility to dump process memory
severity: high
enabled: false
tags:
  mitre:
  - T1036
  - T1003.001
  categories:
  - endpoint
references:
- https://www.crowdstrike.com/blog/overwatch-exposes-aquatic-panda-in-possession-of-log-4-shell-exploit-tools/
- https://twitter.com/bopin2020/status/1366400799199272960
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \createdump.exe
  - OriginalFileName: FX_VER_INTERNALNAME_STR
  selection_cli:
    CommandLine|contains:
    - ' -u '
    - ' --full '
    - ' -f '
    - ' --name '
    - '.dmp '
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 515c8be5-e5df-4c5e-8f6d-a4a2f05e4b48
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_createdump_lolbin_execution.yml
falsepositives:
- Command lines that use the same flags
notes:
  quarantine_reason: 'upstream status: test'
