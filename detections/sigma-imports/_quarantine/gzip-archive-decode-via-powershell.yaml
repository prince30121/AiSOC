id: sigmahq-sigma-98767d61-b2e8-4d71-b661-e36783ee24c1
name: Gzip Archive Decode Via PowerShell
description: Detects attempts of decoding encoded Gzip archives via PowerShell.
severity: medium
enabled: false
tags:
  mitre:
  - T1132.001
  categories:
  - endpoint
references:
- https://www.zscaler.com/blogs/security-research/onenote-growing-threat-malware-distribution
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains|all:
    - GZipStream
    - ::Decompress
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 98767d61-b2e8-4d71-b661-e36783ee24c1
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_powershell_decode_gzip.yml
falsepositives:
- Legitimate administrative scripts may use this functionality. Use "ParentImage"
  in combination with the script names and allowed users and applications to filter
  legitimate executions
notes:
  quarantine_reason: 'upstream status: test'
