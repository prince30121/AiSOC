id: sigmahq-sigma-378a05d8-963c-46c9-bcce-13c7657eac99
name: Potentially Suspicious Electron Application CommandLine
description: Detects potentially suspicious CommandLine of electron apps (teams, discord,
  slack, etc.). This could be a sign of abuse to proxy execution through a signed
  binary.
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references:
- https://positive.security/blog/ms-officecmd-rce
- https://lolbas-project.github.io/lolbas/Binaries/Teams/
- https://lolbas-project.github.io/lolbas/Binaries/Msedge/
- https://lolbas-project.github.io/lolbas/Binaries/msedgewebview2/
- https://medium.com/@MalFuzzer/one-electron-to-rule-them-all-dc2e9b263daf
- https://chromium.googlesource.com/chromium/chromium/+/master/content/public/common/content_switches.cc
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith:
    - \chrome.exe
    - \code.exe
    - \discord.exe
    - \GitHubDesktop.exe
    - \keybase.exe
    - \msedge_proxy.exe
    - \msedge.exe
    - \msedgewebview2.exe
    - \msteams.exe
    - \slack.exe
    - \Teams.exe
  - OriginalFileName:
    - chrome.exe
    - code.exe
    - discord.exe
    - GitHubDesktop.exe
    - keybase.exe
    - msedge_proxy.exe
    - msedge.exe
    - msedgewebview2.exe
    - msteams.exe
    - slack.exe
    - Teams.exe
  selection_cli:
    CommandLine|contains:
    - --browser-subprocess-path
    - --gpu-launcher
    - --renderer-cmd-prefix
    - --utility-cmd-prefix
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 378a05d8-963c-46c9-bcce-13c7657eac99
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_susp_electron_execution_proxy.yml
falsepositives:
- Legitimate usage for debugging purposes
notes:
  quarantine_reason: 'upstream status: test'
