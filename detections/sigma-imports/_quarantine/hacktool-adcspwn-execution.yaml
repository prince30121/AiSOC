id: sigmahq-sigma-cd8c163e-a19b-402e-bdd5-419ff5859f12
name: HackTool - ADCSPwn Execution
description: Detects command line parameters used by ADCSPwn, a tool to escalate privileges
  in an active directory network by coercing authenticate from machine accounts and
  relaying to the certificate service
severity: high
enabled: false
tags:
  mitre:
  - T1557.001
  categories:
  - endpoint
references:
- https://github.com/bats3c/ADCSPwn
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains|all:
    - ' --adcs '
    - ' --port '
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: cd8c163e-a19b-402e-bdd5-419ff5859f12
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_hktl_adcspwn.yml
falsepositives:
- Unlikely
notes:
  quarantine_reason: 'upstream status: test'
