id: sigmahq-sigma-a2d9e2f3-0f43-4c7a-bcd9-9acfc0d723aa
name: Suspicious Download and Execute Pattern via Curl/Wget
description: 'Detects suspicious use of command-line tools such as curl or wget to
  download remote

  content - particularly scripts - into temporary directories (e.g., /dev/shm, /tmp),
  followed by

  immediate execution, indicating potential malicious activity. This pattern is commonly
  used

  by malicious scripts, stagers, or downloaders in fileless or multi-stage Linux attacks.'
severity: high
enabled: false
tags:
  mitre:
  - T1059.004
  - T1203
  categories:
  - endpoint
references:
- https://gtfobins.github.io/gtfobins/wget/
- https://gtfobins.github.io/gtfobins/curl/
logsource:
  category: process_creation
  product: linux
detection:
  selection_downloader:
    CommandLine|contains:
    - /curl
    - /wget
  selection_tmp:
    CommandLine|contains:
    - /tmp/
    - /dev/shm/
  selection_executor:
    CommandLine|contains: sh -c
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: a2d9e2f3-0f43-4c7a-bcd9-9acfc0d723aa
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/linux/process_creation/proc_creation_lnx_curl_wget_exec_tmp.yml
falsepositives:
- System update scripts using temporary files
- Installer scripts or automated provisioning tools
notes:
  quarantine_reason: 'upstream status: experimental'
