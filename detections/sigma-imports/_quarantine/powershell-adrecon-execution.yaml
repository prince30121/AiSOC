id: sigmahq-sigma-bf72941a-cba0-41ea-b18c-9aca3925690d
name: PowerShell ADRecon Execution
description: Detects execution of ADRecon.ps1 for AD reconnaissance which has been
  reported to be actively used by FIN7
severity: high
enabled: false
tags:
  mitre:
  - T1059.001
  categories:
  - endpoint
references:
- https://github.com/sense-of-security/ADRecon/blob/11881a24e9c8b207f31b56846809ce1fb189bcc9/ADRecon.ps1
- https://bi-zone.medium.com/from-pentest-to-apt-attack-cybercriminal-group-fin7-disguises-its-malware-as-an-ethical-hackers-c23c9a75e319
logsource:
  product: windows
  category: ps_script
  definition: 'Requirements: Script Block Logging must be enabled'
detection:
  selection:
    ScriptBlockText|contains:
    - Function Get-ADRExcelComOb
    - Get-ADRGPO
    - Get-ADRDomainController
    - ADRecon-Report.xlsx
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: bf72941a-cba0-41ea-b18c-9aca3925690d
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/powershell/powershell_script/posh_ps_adrecon_execution.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
