id: sigmahq-sigma-3b8f4c92-6a51-4d7e-9c3a-8e2d1f5a7b09
name: Uncommon File Created by Notepad++ Updater Gup.EXE
description: 'Detects when the Notepad++ updater (gup.exe) creates files in suspicious
  or uncommon locations.

  This could indicate potential exploitation of the updater component to deliver unwanted
  malware or unwarranted files.'
severity: high
enabled: false
tags:
  mitre:
  - T1195.002
  - T1557
  categories:
  - endpoint
references:
- https://notepad-plus-plus.org/news/v889-released/
- https://www.heise.de/en/news/Notepad-updater-installed-malware-11109726.html
- https://www.rapid7.com/blog/post/tr-chrysalis-backdoor-dive-into-lotus-blossoms-toolkit/
- https://www.validin.com/blog/exploring_notepad_plus_plus_network_indicators/
- https://securelist.com/notepad-supply-chain-attack/118708/
logsource:
  category: file_event
  product: windows
detection:
  selection:
    Image|endswith: \gup.exe
  filter_main_legit_paths:
    TargetFilename|startswith:
    - C:\Program Files\Notepad++\
    - C:\Program Files (x86)\Notepad++\
  filter_main_temp_update_installer:
    TargetFilename|startswith: C:\Users\
    TargetFilename|contains|all:
    - \AppData\Local\Temp\
    - npp.
    - .Installer.
    - .exe
  filter_main_temp_generic_zip:
    TargetFilename|startswith: C:\Users\
    TargetFilename|contains|all:
    - \AppData\Local\Temp\
    - .zip
  filter_main_recycle_bin:
    TargetFilename|startswith: C:\$Recycle.Bin\S-1-5-21
  filter_main_plugins:
  - TargetFilename|contains:
    - \plugins\JsonTools\testfiles\
    - \Notepad++\plugins\ComparePlugin\
  - TargetFilename|contains|all:
    - npp.
    - .portable.
    - \plugins\
  condition: selection and not 1 of filter_main_*
provenance:
  source: SigmaHQ/sigma
  source_id: 3b8f4c92-6a51-4d7e-9c3a-8e2d1f5a7b09
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/file/file_event/file_event_win_gup_uncommon_file_creation.yml
falsepositives:
- Custom or portable Notepad++ installations in non-standard directories.
- Legitimate update processes creating temporary files in unexpected locations.
notes:
  quarantine_reason: 'upstream status: experimental'
