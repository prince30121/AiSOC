id: sigmahq-sigma-46530378-f9db-4af9-a9e5-889c177d3881
name: Azure Device or Configuration Modified or Deleted
description: Identifies when a device or device configuration in azure is modified
  or deleted.
severity: medium
enabled: false
tags:
  mitre:
  - T1485
  - T1565.001
  categories:
  - cloud
references:
- https://learn.microsoft.com/en-us/entra/identity/monitoring-health/reference-audit-activities#core-directory
logsource:
  product: azure
  service: activitylogs
detection:
  selection:
    properties.message:
    - Delete device
    - Delete device configuration
    - Update device
    - Update device configuration
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 46530378-f9db-4af9-a9e5-889c177d3881
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/cloud/azure/activity_logs/azure_device_or_configuration_modified_or_deleted.yml
falsepositives:
- Device or device configuration being modified or deleted may be performed by a system
  administrator.
- Verify whether the user identity, user agent, and/or hostname should be making changes
  in your environment.
- Device or device configuration modified or deleted from unfamiliar users should
  be investigated. If known behavior is causing false positives, it can be exempted
  from the rule.
notes:
  quarantine_reason: 'upstream status: test'
