id: sigmahq-sigma-5a9e1b2c-8f7d-4a1e-9b3c-0f6d7e5a4b1f
name: Windows Defender Threat Severity Default Action Modified
description: 'Detects modifications or creations of Windows Defender''s default threat
  action settings based on severity to ''allow'' or take ''no action''.

  This is a highly suspicious configuration change that effectively disables Defender''s
  ability to automatically mitigate threats of a certain severity level,

  allowing malicious software to run unimpeded. An attacker might use this technique
  to bypass defenses before executing payloads.'
severity: high
enabled: false
tags:
  mitre:
  - T1685
  categories:
  - endpoint
references:
- https://learn.microsoft.com/en-us/powershell/module/defender/set-mppreference
- https://learn.microsoft.com/en-us/windows-hardware/customize/desktop/unattend/security-malware-windows-defender-threatseveritydefaultaction
- https://research.splunk.com/endpoint/7215831c-8252-4ae3-8d43-db588e82f952
- https://gist.github.com/Dump-GUY/8daef859f382b895ac6fd0cf094555d2
- https://thedfirreport.com/2021/10/18/icedid-to-xinglocker-ransomware-in-24-hours/
logsource:
  category: registry_event
  product: windows
detection:
  selection:
    TargetObject|contains: \Microsoft\Windows Defender\Threats\ThreatSeverityDefaultAction\
    TargetObject|endswith:
    - \1
    - \2
    - \4
    - \5
    Details:
    - DWORD (0x00000006)
    - DWORD (0x00000009)
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 5a9e1b2c-8f7d-4a1e-9b3c-0f6d7e5a4b1f
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/registry/registry_event/registry_event_defender_threat_action_modified.yml
falsepositives:
- Legitimate administration via scripts or tools (e.g., SCCM, Intune, GPO enforcement).
  Correlate with administrative activity.
- Software installations that legitimately modify Defender settings (less common for
  these specific keys).
notes:
  quarantine_reason: 'upstream status: experimental'
