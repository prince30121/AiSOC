id: sigmahq-sigma-6812a10b-60ea-420c-832f-dfcc33b646ba
name: Potential PowerShell Execution Via DLL
description: 'Detects potential PowerShell execution from a DLL instead of the usual
  PowerShell process as seen used in PowerShdll.

  This detection assumes that PowerShell commands are passed via the CommandLine.'
severity: high
enabled: false
tags:
  mitre:
  - T1218.011
  categories:
  - endpoint
references:
- https://github.com/p3nt4/PowerShdll/blob/62cfa172fb4e1f7f4ac00ca942685baeb88ff356/README.md
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith:
    - \InstallUtil.exe
    - \RegAsm.exe
    - \RegSvcs.exe
    - \regsvr32.exe
    - \rundll32.exe
  - OriginalFileName:
    - InstallUtil.exe
    - RegAsm.exe
    - RegSvcs.exe
    - REGSVR32.EXE
    - RUNDLL32.EXE
  selection_cli:
    CommandLine|contains:
    - Default.GetString
    - DownloadString
    - FromBase64String
    - 'ICM '
    - 'IEX '
    - Invoke-Command
    - Invoke-Expression
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 6812a10b-60ea-420c-832f-dfcc33b646ba
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_susp_powershell_execution_via_dll.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
