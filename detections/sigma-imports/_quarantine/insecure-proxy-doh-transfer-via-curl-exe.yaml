id: sigmahq-sigma-2c1486f5-02e8-4f86-9099-b97f2da4ed77
name: Insecure Proxy/DOH Transfer Via Curl.EXE
description: Detects execution of "curl.exe" with the "insecure" flag over proxy or
  DOH.
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references:
- https://curl.se/docs/manpage.html
logsource:
  product: windows
  category: process_creation
detection:
  selection_img:
  - Image|endswith: \curl.exe
  - OriginalFileName: curl.exe
  selection_cli:
    CommandLine|contains:
    - --doh-insecure
    - --proxy-insecure
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 2c1486f5-02e8-4f86-9099-b97f2da4ed77
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_curl_insecure_proxy_or_doh.yml
falsepositives:
- Access to badly maintained internal or development systems
notes:
  quarantine_reason: 'upstream status: test'
