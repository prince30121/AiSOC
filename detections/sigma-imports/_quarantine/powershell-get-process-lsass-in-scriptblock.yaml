id: sigmahq-sigma-84c174ab-d3ef-481f-9c86-a50d0b8e3edb
name: PowerShell Get-Process LSASS in ScriptBlock
description: Detects a Get-Process command on lsass process, which is in almost all
  cases a sign of malicious activity
severity: high
enabled: false
tags:
  mitre:
  - T1003.001
  categories:
  - endpoint
references:
- https://web.archive.org/web/20220205033028/https://twitter.com/PythonResponder/status/1385064506049630211
logsource:
  product: windows
  category: ps_script
  definition: 'Requirements: Script Block Logging must be enabled'
detection:
  selection:
    ScriptBlockText|contains: Get-Process lsass
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 84c174ab-d3ef-481f-9c86-a50d0b8e3edb
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/powershell/powershell_script/posh_ps_susp_getprocess_lsass.yml
falsepositives:
- Legitimate certificate exports invoked by administrators or users (depends on processes
  in the environment - filter if unusable)
notes:
  quarantine_reason: 'upstream status: test'
