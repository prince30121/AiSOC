id: sigmahq-sigma-999c3b12-0a8c-40b6-8e13-dd7d62b75c7a
name: Potentially Suspicious Named Pipe Created Via Mkfifo
description: Detects the creation of a new named pipe using the "mkfifo" utility in
  a potentially suspicious location
severity: medium
enabled: false
tags:
