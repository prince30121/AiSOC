id: sigmahq-sigma-762bb580-79b4-40f4-8b9e-9349ce1710f4
name: Indirect Command Execution via SFTP ProxyCommand
description: 'Detects the use of SFTP.exe to execute commands indirectly via ProxyCommand
  parameter.

  Threat actors were seen leveraging this legitimate Windows binary to bypass security
  controls and execute arbitrary commands while evading detection.'
severity: medium
enabled: false
tags:
  mitre:
  - T1202
  categories:
  - endpoint
references:
- https://lolbas-project.github.io/lolbas/Binaries/Sftp/
- https://news.sophos.com/en-us/2025/05/09/lumma-stealer-coming-and-going/
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: \sftp.exe
    CommandLine|contains: ProxyCommand=
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 762bb580-79b4-40f4-8b9e-9349ce1710f4
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_sftp_proxy_command_execution.yml
falsepositives:
- Legitimate use of SFTP with proxy commands for administration or networking tasks
notes:
  quarantine_reason: 'upstream status: experimental'
