id: sigmahq-sigma-ddcd88cb-7f62-4ce5-86f9-1704190feb0a
name: Potential In-Memory Execution Using Reflection.Assembly
description: Detects usage of "Reflection.Assembly" load functions to dynamically
  load assemblies in memory
severity: medium
enabled: false
tags:
  mitre:
  - T1620
  categories:
  - endpoint
references:
- https://speakerdeck.com/heirhabarov/hunting-for-powershell-abuse?slide=50
logsource:
  product: windows
  category: ps_script
  definition: Script Block Logging must be enable
detection:
  selection:
    ScriptBlockText|contains: '[Reflection.Assembly]::load'
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: ddcd88cb-7f62-4ce5-86f9-1704190feb0a
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/powershell/powershell_script/posh_ps_dotnet_assembly_from_file.yml
falsepositives:
- Legitimate use of the library
notes:
  quarantine_reason: 'upstream status: test'
