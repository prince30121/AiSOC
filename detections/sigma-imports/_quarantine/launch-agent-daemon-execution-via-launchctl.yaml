id: sigmahq-sigma-ae9d710f-dcd1-4f75-a0a5-93a73b5dda0e
name: Launch Agent/Daemon Execution Via Launchctl
description: Detects the execution of programs as Launch Agents or Launch Daemons
  using launchctl on macOS.
severity: medium
enabled: false
tags:
  mitre:
  - T1569.001
  - T1543.001
  - T1543.004
  categories:
  - endpoint
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1569.001/T1569.001.md
- https://www.sentinelone.com/labs/20-common-tools-techniques-used-by-macos-threat-actors-malware/
- https://www.welivesecurity.com/2020/07/16/mac-cryptocurrency-trading-application-rebranded-bundled-malware/
- https://www.trendmicro.com/en_us/research/18/d/new-macos-backdoor-linked-to-oceanlotus-found.html
- https://www.loobins.io/binaries/launchctl/
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    Image|endswith: /launchctl
    CommandLine|contains:
    - submit
    - load
    - start
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: ae9d710f-dcd1-4f75-a0a5-93a73b5dda0e
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/macos/process_creation/proc_creation_macos_launchctl_execution.yml
falsepositives:
- Legitimate administration activities is expected to trigger false positives. Investigate
  the command line being passed to determine if the service or launch agent are suspicious.
notes:
  quarantine_reason: 'upstream status: test'
