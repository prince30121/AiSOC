id: sigmahq-sigma-bf241472-f014-4f01-a869-96f99330ca8c
name: Disk Image Mounting Via Hdiutil - MacOS
description: Detects the execution of the hdiutil utility in order to mount disk images.
severity: medium
enabled: false
tags:
  mitre:
  - T1566.001
  - T1560.001
  categories:
  - endpoint
references:
- https://www.loobins.io/binaries/hdiutil/
- https://www.sentinelone.com/blog/from-the-front-linesunsigned-macos-orat-malware-gambles-for-the-win/
- https://ss64.com/mac/hdiutil.html
logsource:
  product: macos
  category: process_creation
detection:
  selection:
    Image|endswith: /hdiutil
    CommandLine|contains:
    - 'attach '
    - 'mount '
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: bf241472-f014-4f01-a869-96f99330ca8c
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/macos/process_creation/proc_creation_macos_hdiutil_mount.yml
falsepositives:
- Legitimate usage of hdiutil by administrators and users.
notes:
  quarantine_reason: 'upstream status: test'
