id: sigmahq-sigma-30edb182-aa75-42c0-b0a9-e998bb29067c
name: Potential AMSI Bypass Via .NET Reflection
description: Detects Request to "amsiInitFailed" that can be used to disable AMSI
  Scanning
severity: high
enabled: false
tags:
  mitre:
  - T1685
  categories:
  - endpoint
references:
- https://s3cur3th1ssh1t.github.io/Bypass_AMSI_by_manual_modification/
- https://www.mdsec.co.uk/2018/06/exploring-powershell-amsi-and-logging-evasion/
logsource:
  category: process_creation
  product: windows
detection:
  selection:
  - CommandLine|contains|all:
    - System.Management.Automation.AmsiUtils
    - amsiInitFailed
  - CommandLine|contains|all:
    - '[Ref].Assembly.GetType'
    - SetValue($null,$true)
    - NonPublic,Static
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 30edb182-aa75-42c0-b0a9-e998bb29067c
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_powershell_amsi_init_failed_bypass.yml
falsepositives:
- Unlikely
notes:
  quarantine_reason: 'upstream status: test'
