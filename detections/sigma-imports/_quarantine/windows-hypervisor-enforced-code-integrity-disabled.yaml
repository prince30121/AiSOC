id: sigmahq-sigma-8b7273a4-ba5d-4d8a-b04f-11f2900d043a
name: Windows Hypervisor Enforced Code Integrity Disabled
description: Detects changes to the HypervisorEnforcedCodeIntegrity registry key and
  the "Enabled" value being set to 0 in order to disable the Hypervisor Enforced Code
  Integrity feature. This allows an attacker to load unsigned and untrusted code to
  be run in the kernel
severity: high
enabled: false
tags:
  mitre:
  - T1685
  categories:
  - endpoint
references:
- https://www.welivesecurity.com/2023/03/01/blacklotus-uefi-bootkit-myth-confirmed/
- https://github.com/redcanaryco/atomic-red-team/blob/04e487c1828d76df3e834621f4f893ea756d5232/atomics/T1562.001/T1562.001.md#atomic-test-43---disable-hypervisor-enforced-code-integrity-hvci
logsource:
  category: registry_set
  product: windows
detection:
  selection:
    TargetObject|endswith:
    - \Control\DeviceGuard\HypervisorEnforcedCodeIntegrity
    - \Control\DeviceGuard\Scenarios\HypervisorEnforcedCodeIntegrity\Enabled
    - \Microsoft\Windows\DeviceGuard\HypervisorEnforcedCodeIntegrity
    Details: DWORD (0x00000000)
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 8b7273a4-ba5d-4d8a-b04f-11f2900d043a
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/registry/registry_set/registry_set_deviceguard_hypervisorenforcedcodeintegrity_disabled.yml
falsepositives:
- Legitimate system administration tasks that require disabling HVCI for troubleshooting
  purposes when certain drivers or applications are incompatible with it.
notes:
  quarantine_reason: 'upstream status: test'
