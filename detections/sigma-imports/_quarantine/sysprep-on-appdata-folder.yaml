id: sigmahq-sigma-d5b9ae7a-e6fc-405e-80ff-2ff9dcc64e7e
name: Sysprep on AppData Folder
description: Detects suspicious sysprep process start with AppData folder as target
  (as used by Trojan Syndicasec in Thrip report by Symantec)
severity: medium
enabled: false
tags:
  mitre:
  - T1059
  categories:
  - endpoint
references:
- https://www.symantec.com/blogs/threat-intelligence/thrip-hits-satellite-telecoms-defense-targets
- https://app.any.run/tasks/61a296bb-81ad-4fee-955f-3b399f4aaf4b
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: \sysprep.exe
    CommandLine|contains: \AppData\
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: d5b9ae7a-e6fc-405e-80ff-2ff9dcc64e7e
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_sysprep_appdata.yml
falsepositives:
- False positives depend on scripts and administrative tools used in the monitored
  environment
notes:
  quarantine_reason: 'upstream status: test'
