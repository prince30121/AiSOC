id: sigmahq-sigma-3e3ceccd-6c06-48b8-b5ff-ab1d25db8c1d
name: Hardware Model Reconnaissance Via Wmic.EXE
description: Detects the execution of WMIC with the "csproduct" which is used to obtain
  information such as hardware models and vendor information
severity: medium
enabled: false
tags:
  mitre:
  - T1047
  categories:
  - endpoint
references:
- https://jonconwayuk.wordpress.com/2014/01/31/wmic-csproduct-using-wmi-to-identify-make-and-model-of-hardware/
- https://www.uptycs.com/blog/kuraystealer-a-bandit-using-discord-webhooks
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
  - Image|endswith: \wmic.exe
  - OriginalFileName: wmic.exe
  selection_cli:
    CommandLine|contains: csproduct
  condition: all of selection_*
provenance:
  source: SigmaHQ/sigma
  source_id: 3e3ceccd-6c06-48b8-b5ff-ab1d25db8c1d
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/windows/process_creation/proc_creation_win_wmic_recon_csproduct.yml
falsepositives:
- Unknown
notes:
  quarantine_reason: 'upstream status: test'
