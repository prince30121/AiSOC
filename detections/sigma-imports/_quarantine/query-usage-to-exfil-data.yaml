id: sigmahq-sigma-53ef0cef-fa24-4f25-a34a-6c72dfa2e6e2
name: Query Usage To Exfil Data
description: Detects usage of "query.exe" a system binary to exfil information such
  as "sessions" and "processes" for later use
severity: medium
enabled: false
tags:
  mitre: []
  categories:
  - endpoint
references:
- https://twitter.com/MichalKoczwara/status/1553634816016498688
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: :\Windows\System32\query.exe
    CommandLine|contains:
    - session >
    - process >
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 53ef0cef-fa24-4f25-a34a-6c72dfa2e6e2
  source_commit: df5c6a6
