id: sigmahq-sigma-0f79c4d2-4e1f-4683-9c36-b5469a665e06
name: Access of Sudoers File Content
description: Detects the execution of a text-based file access or inspection utilities
  to read the content of /etc/sudoers in order to potentially list all users that
  have sudo rights.
severity: medium
enabled: false
tags:
  mitre:
  - T1592.004
  categories:
  - endpoint
references:
- https://github.com/sleventyeleven/linuxprivchecker/
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    Image|endswith:
    - /cat
    - /ed
    - /egrep
    - /emacs
    - /fgrep
    - /grep
    - /head
    - /less
    - /more
    - /nano
    - /tail
    CommandLine|contains: ' /etc/sudoers'
  condition: selection
provenance:
  source: SigmaHQ/sigma
  source_id: 0f79c4d2-4e1f-4683-9c36-b5469a665e06
  source_commit: df5c6a6
  license: DRL-1.1
  license_url: https://github.com/SigmaHQ/Detection-Rule-License
  imported_at: '2026-05-04'
  imported_by: sigma_importer
  upstream_path: rules/linux/process_creation/proc_creation_lnx_susp_process_reading_sudoers.yml
falsepositives:
- Legitimate administration activities
notes:
  quarantine_reason: 'upstream status: test'
