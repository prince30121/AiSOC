id: tenable-io
name: Tenable Vulnerability Management Connector
version: "1.0.0"
plugin_type: connector
tier: stable
description: >
  Tenable.io / Tenable Vulnerability Management. Pulls vulnerability findings
  as alerts and exposes asset and vulnerability enrichment for the agent.
author: AiSOC Core Team
tags: [vuln, tenable, vulnerability-management]
homepage: https://github.com/beenuar/AiSOC/tree/main/services/connectors/app/connectors/tenable.py
license: MIT
min_aisoc_version: "4.0.0"
config_schema:
  type: object
  required: [access_key, secret_key]
  properties:
    access_key:
      type: string
      description: Access Key
    secret_key:
      type: string
      description: Secret Key
      secret: true
