id: cloudflare
name: Cloudflare Audit Logs Connector
version: "1.0.0"
plugin_type: connector
tier: stable
description: >
  Cloudflare account-scope audit logs (zone changes, API token grants, member
  adds, WAF/firewall edits) via the Cloudflare v4 API. Captures operator
  activity across the account so high-risk admin actions land in AiSOC
  alongside other identity-plane signal. Requires an API token scoped to
  Account: Audit Logs: Read.
author: AiSOC Core Team
tags: [saas, cloudflare, audit, identity, admin, edge]
homepage: https://github.com/beenuar/AiSOC/tree/main/services/connectors/app/connectors/cloudflare.py
license: MIT
min_aisoc_version: "4.0.0"
config_schema:
  type: object
  required: [account_id, api_token]
  properties:
    account_id:
      type: string
      description: "Cloudflare account ID (visible in any zone Overview)"
    api_token:
      type: string
      description: "Account-scoped API token with Audit Logs: Read permission"
      secret: true
